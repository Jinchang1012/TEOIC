56","category":"word","categoryName":"字彙辨析","question":"To avoid shipping delays, the warehouse clerk must _______ the inventory records weekly.","options":["reconcile","abandon","cancel","postpone"],"answer":0,"difficulty":"中階","translation":"為了避免出貨延誤,倉管人員必須每週核對庫存紀錄。","explanation":"本題考「核對紀錄」的動詞選擇。reconcile(核對、使一致)是會計與倉管情境的標準用詞,指比對兩份紀錄(如實際庫存與帳面庫存)使其一致,正好對應「避免出貨延誤」的目的——唯有核對正確才能防止出貨出錯。其餘三個動詞都是「終止/延後」某事的意思,與「每週例行核對紀錄」的情境矛盾。","optionNotes":["reconcile:核對、使一致——會計倉管標準動詞,正解。","abandon(放棄)紀錄同樣不合邏輯,無助於避免出貨延誤。","cancel(取消)紀錄無意義,倉管不會取消庫存紀錄。","postpone(延後)不會產生「避免延誤」的效果,語意矛盾。"],"keyWords":[{"word":"reconcile","pos":"v.","meaning":"核對、使一致","freq":"高頻"},{"word":"inventory","pos":"n.","meaning":"庫存","freq":"極高頻"}],"pattern":{"name":"reconcile records","note":"reconcile 常用於「核對帳目/紀錄」,如 reconcile accounts、reconcile the inventory。","example":"The accountant reconciled the bank statement with the ledger."}},{"id":"x-q157","category":"word","categoryName":"字彙辨析","question":"The customer support department offered a _______ credit to compensate for the service downtime.","options":["subsequent","hazardous","complimentary","stringent"],"answer":2,"difficulty":"基礎","translation":"客服部門提供免費抵用金,以補償服務中斷造成的損失。","explanation":"本題考形容詞搭配 credit(抵用金)。complimentary(免費贈送的)是商業補償情境的固定用法,常見於「complimentary credit / voucher / upgrade」表示廠商主動贈送以示補償或善意。其餘選項語意完全不搭:stringent(嚴格的)、subsequent(隨後的)、hazardous(危險的)都無法修飾「抵用金」表達補償之意。","optionNotes":["subsequent(隨後的)只表示時間順序,無補償語意。","hazardous(危險的)完全不合「credit」的語境。","complimentary:免費贈送的——補償情境固定搭配,正解。","stringent(嚴格的)常修飾規定、標準,不修飾「抵用金」。"],"keyWords":[{"word":"complimentary","pos":"adj.","meaning":"免費贈送的","freq":"高頻"},{"word":"downtime","pos":"n.","meaning":"停機、服務中斷時間","freq":"中頻"}]},{"id":"x-q158","category":"collo","categoryName":"慣用搭配與比較","question":"The procurement specialist negotiated an agreement to secure a steady _______ of raw silicon.","options":["remainder","supply","boundary","allowance"],"answer":1,"difficulty":"中階","translation":"採購專員談判簽約,以確保原矽穩定的供應來源。","explanation":"本題考固定搭配 a steady supply of + 原料名詞,表示「穩定供應某物」,是採購/供應鏈情境的高頻詞組。其餘選項與「原矽」搭配都不合語意:boundary(邊界)、remainder(剩餘部分)、allowance(津貼/容許量)皆無法表達「持續取得原料來源」之意。","optionNotes":["remainder(剩餘部分)不表示供應鏈的持續來源。","supply:供應(量)——與 steady 連用為固定搭配,正解。","boundary(邊界)與「原矽」無關,語意不合。","allowance(津貼、容許量)不用於描述原料供應。"],"keyWords":[{"word":"supply","pos":"n.","meaning":"供應、供給","freq":"極高頻"},{"word":"procurement","pos":"n.","meaning":"採購","freq":"高頻"}],"pattern":{"name":"a steady supply of N","note":"表示「穩定供應某物」,常見於供應鏈與採購情境。","example":"The company secured a steady supply of raw materials."}},{"id":"x-q159","category":"collo","categoryName":"慣用搭配與比較","question":"The newly appointed project manager possesses the _______ expertise to lead the tool install.","options":["temporary","casual","redundant","requisite"],"answer":3,"difficulty":"進階","translation":"新任命的專案經理具備領導設備安裝所需的必要專業知識。","explanation":"本題考固定搭配 requisite expertise/qualifications,requisite(必要的、必備的)專門用來形容「達成某任務所不可或缺」的資格或能力,符合「具備...專業知識以領導安裝工程」的語境。redundant(多餘的)、casual(隨意的)、temporary(暫時的)都不能表達「必要條件」的意思。","optionNotes":["temporary(暫時的)不表達「必備條件」之意。","casual(隨意的、非正式的)不修飾專業能力的必要性。","redundant(多餘的、累贅的)與「具備能力」語意相反。","requisite:必要的、必備的——與 expertise 連用表示任務所需資格,正解。"],"keyWords":[{"word":"requisite","pos":"adj.","meaning":"必要的、必備的","freq":"中頻"},{"word":"expertise","pos":"n.","meaning":"專業知識、專長","freq":"極高頻"}],"pattern":{"name":"requisite + N","note":"requisite 修飾名詞表示「達成目的所不可或缺的」,如 requisite skills/qualifications/expertise。","example":"She has the requisite qualifications for the position."}},{"id":"x-q160","category":"word","categoryName":"字彙辨析","question":"The manufacturing plant expansion will _______ require hiring twenty additional technicians.","options":["reluctantly","consequently","hesitantly","mutually"],"answer":1,"difficulty":"中階","translation":"工廠擴建因此將需要多聘僱二十名技術人員。","explanation":"本題考因果關係副詞。consequently(因此、結果)承接前句「工廠擴建」這個原因,導出後句「需要增聘人力」的結果,語意連貫。reluctantly(不情願地)、hesitantly(猶豫地)描述情緒態度,與「擴建導致增聘」的邏輯無關;mutually(互相地)需要雙方對象,句中無此語境。","optionNotes":["reluctantly(不情願地)是情緒副詞,與擴建的因果邏輯無關。","consequently:因此、結果——表達因果承接,正解。","hesitantly(猶豫地)同樣是情緒副詞,不符因果語境。","mutually(互相地)需雙方語境,本句不適用。"],"keyWords":[{"word":"consequently","pos":"adv.","meaning":"因此、結果","freq":"高頻"},{"word":"expansion","pos":"n.","meaning":"擴建、擴張","freq":"高頻"}]},{"id":"x-q161","category":"word","categoryName":"字彙辨析","question":"Marketech achieved a major _______ by finalizing the equipment contract ahead of schedule.","options":["scarcity","milestone","obstacle","liability"],"answer":1,"difficulty":"中階","translation":"Marketech 公司提前完成設備合約的簽訂,達成一項重大里程碑。","explanation":"本題考名詞語意。milestone(里程碑、重大成就)專門用來形容「提前達成的重要目標」,與「提前完成合約」形成正面呼應。obstacle(阻礙)、liability(負債/責任)、scarcity(短缺)皆為負面或不相關概念,與「achieved a major___」的正面語境矛盾。","optionNotes":["scarcity(短缺)與合約簽訂完全無關。","milestone:里程碑、重大成就——與「提前完成合約」呼應,正解。","obstacle(阻礙、障礙)是負面詞,與 achieved 的正面語境矛盾。","liability(負債、責任)不是「達成」的對象。"],"keyWords":[{"word":"milestone","pos":"n.","meaning":"里程碑、重大成就","freq":"高頻"},{"word":"finalize","pos":"v.","meaning":"完成、敲定","freq":"高頻"}]},{"id":"x-q162","category":"collo","categoryName":"慣用搭配與比較","question":"The legal department warned that any breach of clause 4 would incur severe _______.","options":["penalties","allowances","proposals","innovations"],"answer":0,"difficulty":"中階","translation":"法務部門警告,任何違反第四條款的行為都將招致嚴重罰則。","explanation":"本題考固定搭配 incur penalties(招致罰款/罰則),incur 意指「招致、招惹(通常是負面後果)」,與「違反條款」形成因果關係。proposals(提案)、allowances(津貼)、innovations(創新)皆為正面或中性名詞,無法與「違反條款」的懲罰邏輯搭配。","optionNotes":["penalties:罰則、罰款——與 incur 構成固定搭配,呼應違約情境,正解。","allowances(津貼、容許額)是正面/中性詞,不符合懲罰語境。","proposals(提案)與「違反條款招致…」的懲罰語境無關。","innovations(創新)與違約後果毫無關聯。"],"keyWords":[{"word":"incur","pos":"v.","meaning":"招致(通常指負面後果)","freq":"高頻"},{"word":"penalty","pos":"n.","meaning":"罰款、罰則","freq":"高頻"}],"pattern":{"name":"incur + N(負面後果)","note":"incur 常搭配負面結果的名詞,如 incur penalties/costs/losses/debt。","example":"Late payment will incur additional fees."}},{"id":"x-q163","category":"word","categoryName":"字彙辨析","question":"The layout design must be checked for _______ to prevent errors during the fabrication stage.","options":["poverty","accuracy","friction","disposal"],"answer":1,"difficulty":"基礎","translation":"佈局設計必須經過準確性檢查,以防止製造階段出現錯誤。","explanation":"本題考名詞語意。accuracy(準確性)是檢查設計圖是否正確的核心指標,與後方「防止製造錯誤」的目的直接呼應。disposal(處置、丟棄)、friction(摩擦)、poverty(貧窮)在語意上都與「設計圖檢查」無關。","optionNotes":["poverty(貧窮)與此工程情境完全無關。","accuracy:準確性——檢查設計圖的核心目的,正解。","friction(摩擦)是物理概念,不用於形容設計圖檢查項目。","disposal(處置、丟棄)與檢查設計圖的準確性無關。"],"keyWords":[{"word":"accuracy","pos":"n.","meaning":"準確性","freq":"高頻"},{"word":"fabrication","pos":"n.","meaning":"製造、加工","freq":"中頻"}]},{"id":"x-q164","category":"word","categoryName":"字彙辨析","question":"The supervisor implemented a _______ safety training routine to minimize cleanroom accidents.","options":["superficial","negligent","optional","rigorous"],"answer":3,"difficulty":"中階","translation":"主管實施了嚴格的安全訓練制度,以降低無塵室事故率。","explanation":"本題考形容詞語意。rigorous(嚴格的、嚴密的)修飾「安全訓練」,與後方「降低事故率」的目的相符——訓練越嚴格,越能有效預防意外。negligent(疏忽的)、optional(可選的)、superficial(表面的)都暗示訓練不夠確實,與「minimize accidents」的正面成效矛盾。","optionNotes":["superficial(表面的、膚淺的)同樣暗示訓練不夠深入,與目的矛盾。","negligent(疏忽的)與「安全訓練」語意矛盾,疏忽的訓練無法降低事故。","optional(可選的、非強制的)暗示訓練不確實,無法達成降低事故的效果。","rigorous:嚴格的、嚴密的——與降低事故率的目標一致,正解。"],"keyWords":[{"word":"rigorous","pos":"adj.","meaning":"嚴格的、嚴密的","freq":"高頻"},{"word":"minimize","pos":"v.","meaning":"使降到最低","freq":"高頻"}]},{"id":"x-q165","category":"word","categoryName":"字彙辨析","question":"The logistics clerk monitored the shipment's _______ via the carrier's real-time dashboard.","options":["aggression","bankruptcy","progress","incentive"],"answer":2,"difficulty":"基礎","translation":"物流人員透過貨運公司的即時儀表板監控貨物的運送進度。","explanation":"本題考名詞語意。progress(進度)是「監控貨物狀態」最直接對應的受詞,符合透過即時儀表板追蹤運送情形的物流常規。incentive(誘因)、aggression(侵略性)、bankruptcy(破產)皆與貨物運送監控毫無關聯。","optionNotes":["aggression(侵略性、攻擊性)與物流情境完全不合。","bankruptcy(破產)與監控貨物運送無關。","progress:進度——監控貨物運送狀態的直接對象,正解。","incentive(誘因、獎勵)與監控貨運進度無關。"],"keyWords":[{"word":"progress","pos":"n.","meaning":"進度、進展","freq":"極高頻"},{"word":"shipment","pos":"n.","meaning":"貨運、裝運","freq":"高頻"}]},{"id":"x-q166","category":"word","categoryName":"字彙辨析","question":"The engineering consultant recommended a _______ solution to bypass the hardware bottleneck.","options":["speculative","precarious","pragmatic","prohibitive"],"answer":2,"difficulty":"進階","translation":"工程顧問建議採用務實的解決方案,以繞過硬體瓶頸。","explanation":"本題考形容詞語意。pragmatic(務實的、講求實效的)修飾「解決方案」,符合顧問提出具體可行建議的專業情境。precarious(不穩定的)、prohibitive(令人卻步的,常指價格過高)、speculative(臆測性的、不確定的)都暗示方案不可靠或不可行,與「顧問建議的解方」語境矛盾。","optionNotes":["speculative(臆測性的)暗示方案不確定,與顧問專業建議的語境矛盾。","precarious(不穩定的、危險的)不適合形容顧問建議的解決方案。","pragmatic:務實的、講求實效的——符合顧問提出可行方案的情境,正解。","prohibitive(過高而令人卻步的)通常修飾價格/成本,不修飾「解決方案」本身。"],"keyWords":[{"word":"pragmatic","pos":"adj.","meaning":"務實的、講求實效的","freq":"中頻"},{"word":"bottleneck","pos":"n.","meaning":"瓶頸","freq":"中頻"}]},{"id":"x-q167","category":"collo","categoryName":"慣用搭配與比較","question":"The firm decision to _______ unserviceable tooling reduced annual maintenance overhead.","options":["postpone","discard","retain","cherish"],"answer":1,"difficulty":"中階","translation":"公司決定報廢無法維修的工具,進而降低了年度維護開銷。","explanation":"本題考動詞語意及因果邏輯。discard(報廢、丟棄)無法再維修的工具,才能合理導出「降低年度維護開銷」的結果——留著壞掉的工具只會持續產生維護成本。retain(保留)、cherish(珍惜)與「降低維護開銷」的結果矛盾;postpone(延後)處理也無法立即降低開銷。","optionNotes":["postpone(延後處理)無法立即達成「降低開銷」的結果。","discard:報廢、丟棄——處理掉無法維修的工具才能降低開銷,正解。","retain(保留)壞掉的工具只會持續產生維護費用,與結果矛盾。","cherish(珍惜、珍愛)不用於形容處置報廢工具,語意不合。"],"keyWords":[{"word":"discard","pos":"v.","meaning":"報廢、丟棄","freq":"中頻"},{"word":"overhead","pos":"n.","meaning":"營運開銷","freq":"中頻"}]},{"id":"x-q168","category":"word","categoryName":"字彙辨析","question":"The software developer created an automated script to streamline _______ office tasks.","options":["fictional","unprecedented","repetitive","luxurious"],"answer":2,"difficulty":"基礎","translation":"軟體工程師撰寫自動化腳本,以簡化重複性的辦公室工作。","explanation":"本題考形容詞語意。repetitive(重複性的)修飾「辦公室工作」,符合「自動化腳本簡化流程」的典型應用場景——自動化最常用來處理反覆性任務。unprecedented(前所未有的)、luxurious(奢華的)、fictional(虛構的)都與「辦公室日常工作」及「自動化簡化」的語境不符。","optionNotes":["fictional(虛構的)不用於形容真實的辦公室工作。","unprecedented(前所未有的)與「日常辦公室工作」的語境不合。","repetitive:重複性的——自動化腳本最常簡化的任務類型,正解。","luxurious(奢華的)與辦公室任務完全無關。"],"keyWords":[{"word":"repetitive","pos":"adj.","meaning":"重複性的","freq":"中頻"},{"word":"streamline","pos":"v.","meaning":"使流程化、簡化","freq":"中頻"}]},{"id":"x-q169","category":"word","categoryName":"字彙辨析","question":"The sales representatives offered a 10 percent volume discount to prospective _______.","options":["applicants","clients","predecessors","competitors"],"answer":1,"difficulty":"基礎","translation":"業務代表向潛在客戶提供百分之十的大宗採購折扣。","explanation":"本題考名詞語意。clients(客戶)是業務人員提供折扣的對象,「prospective clients」(潛在客戶)為業務開發的高頻詞組。competitors(競爭對手)、predecessors(前任、前身)、applicants(申請人)都不是業務會提供折扣爭取的對象。","optionNotes":["applicants(申請人)通常用於求職/申請情境,非銷售對象。","clients:客戶——業務提供折扣爭取的對象,正解。","predecessors(前任、前身)與銷售情境無關。","competitors(競爭對手)不會是提供折扣爭取的對象。"],"keyWords":[{"word":"prospective","pos":"adj.","meaning":"潛在的、未來可能的","freq":"高頻"},{"word":"client","pos":"n.","meaning":"客戶","freq":"極高頻"}],"pattern":{"name":"prospective + N","note":"prospective 修飾「潛在的、未來可能成為...的」人或事,如 prospective clients/buyers/employees。","example":"The company sent brochures to prospective buyers."}},{"id":"x-q170","category":"word","categoryName":"字彙辨析","question":"The technical writer refined the handbook layout to enhance text _______ for users.","options":["liquidity","fatigue","readability","contamination"],"answer":2,"difficulty":"中階","translation":"技術文件撰寫者改良手冊版面,以提升文字對使用者的易讀性。","explanation":"本題考名詞語意。readability(易讀性)是修改文件排版最直接的目的,與「enhance text ___ for users」完美呼應。liquidity(流動性,金融用語)、fatigue(疲勞)、contamination(污染)都與文件排版和易讀性無關。","optionNotes":["liquidity(流動性)是金融術語,與文件排版無關。","fatigue(疲勞)不是排版改良想提升的對象。","readability:易讀性——排版改良的核心目的,正解。","contamination(污染)與文件易讀性完全無關。"],"keyWords":[{"word":"readability","pos":"n.","meaning":"易讀性","freq":"中頻"},{"word":"refine","pos":"v.","meaning":"改良、精煉","freq":"中頻"}]},{"id":"x-q171","category":"word","categoryName":"字彙辨析","question":"The team leader allocated resources _______ to ensure all project phases meet deadlines.","options":["judiciously","haphazardly","arrogantly","reluctantly"],"answer":0,"difficulty":"進階","translation":"團隊領導明智地分配資源,以確保所有專案階段都能如期完成。","explanation":"本題考副詞語意。judiciously(明智地、審慎地)修飾「分配資源」的方式,唯有審慎分配才能確保各階段如期完成,語意連貫。haphazardly(隨意地、雜亂無章地)與「確保如期完成」的結果矛盾;arrogantly(傲慢地)、reluctantly(不情願地)則是與資源分配效率無關的態度副詞。","optionNotes":["judiciously:明智地、審慎地——與「確保如期完成」的結果呼應,正解。","haphazardly(隨意地、雜亂無章地)會導致進度失控,與結果矛盾。","arrogantly(傲慢地)是態度副詞,與資源分配的成效無關。","reluctantly(不情願地)同樣是態度副詞,不影響分配是否得當。"],"keyWords":[{"word":"judiciously","pos":"adv.","meaning":"明智地、審慎地","freq":"中頻"},{"word":"allocate","pos":"v.","meaning":"分配","freq":"高頻"}]},{"id":"x-q172","category":"collo","categoryName":"慣用搭配與比較","question":"The company guidelines dictate that all employee travel expenses must be _______.","options":["reimbursed","depreciated","forfeited","confiscated"],"answer":0,"difficulty":"中階","translation":"公司規定所有員工的差旅費用都必須獲得報銷。","explanation":"本題考財務常用動詞 reimburse(報銷、償還費用),「travel expenses must be reimbursed」是公司財務規定的固定表達方式。confiscated(沒收)、forfeited(被剝奪、喪失)、depreciated(折舊)皆為財務用語但語意不合——費用不會被「沒收」或「折舊」。","optionNotes":["reimbursed:報銷、償還——差旅費用的標準財務處理方式,正解。","depreciated(折舊)用於固定資產貶值,不用於費用報銷情境。","forfeited(被剝奪、喪失)語意為懲罰性損失,與費用報銷矛盾。","confiscated(沒收)通常用於違禁品或罰沒財產,不用於差旅費用報銷。"],"keyWords":[{"word":"reimburse","pos":"v.","meaning":"報銷、償還費用","freq":"高頻"},{"word":"expense","pos":"n.","meaning":"費用、開支","freq":"高頻"}]},{"id":"x-q173","category":"word","categoryName":"字彙辨析","question":"The research lab discovered a _______ alternative substance to replace expensive platinum wires.","options":["volatile","vacant","viable","vulnerable"],"answer":2,"difficulty":"進階","translation":"研究實驗室發現了一種可行的替代物質,能取代昂貴的鉑金線。","explanation":"本題考形容詞語意。viable(可行的、可實施的)修飾「替代物質」,表示該物質確實可用來取代鉑金線,符合研發成果的正面語境。volatile(易揮發的/不穩定的)、vulnerable(易受傷害的)、vacant(空置的)皆無法表達「可行、可替代」之意。","optionNotes":["volatile(易揮發的、不穩定的)常用於化學物質特性,但不表達「可行」之意,且暗示不穩定,與正面研發成果矛盾。","vacant(空置的、空缺的)與物質特性無關。","viable:可行的、可實施的——研發替代方案的核心特質,正解。","vulnerable(易受攻擊的、脆弱的)不修飾「替代物質」的可行性。"],"keyWords":[{"word":"viable","pos":"adj.","meaning":"可行的、可實施的","freq":"高頻"},{"word":"substance","pos":"n.","meaning":"物質","freq":"中頻"}]},{"id":"x-q174","category":"word","categoryName":"字彙辨析","question":"The customer's initial feedback was highly _______, praising the interface redesign.","options":["tedious","favorable","skeptical","adverse"],"answer":1,"difficulty":"基礎","translation":"客戶最初的回饋非常正面,對介面重新設計讚譽有加。","explanation":"本題考形容詞語意,並依後半句「praising」(讚美)判斷前半句情感傾向。favorable(正面的、讚許的)與「praising」語意一致。adverse(不利的、負面的)、skeptical(懷疑的)皆與「讚美」矛盾;tedious(乏味的)則不是描述「回饋」情感傾向的用詞。","optionNotes":["tedious(乏味的、單調的)不用於形容「回饋」的情感傾向。","favorable:正面的、讚許的——與後方 praising 語意一致,正解。","skeptical(懷疑的)暗示不信任,與「讚美」矛盾。","adverse(不利的、負面的)與「讚美」的語境直接矛盾。"],"keyWords":[{"word":"favorable","pos":"adj.","meaning":"正面的、有利的","freq":"高頻"},{"word":"praise","pos":"v.","meaning":"讚美、稱讚","freq":"高頻"}]},{"id":"x-q175","category":"word","categoryName":"字彙辨析","question":"The factory supervisor noted that a mechanical malfunction caused the production _______.","options":["disruption","prosperity","sponsorship","harmony"],"answer":0,"difficulty":"基礎","translation":"工廠主管指出,機械故障導致了生產中斷。","explanation":"本題考名詞語意及因果邏輯。disruption(中斷、干擾)是「機械故障」最直接導致的負面結果,符合因果邏輯。harmony(和諧)、prosperity(繁榮)是正面詞,與「故障」的負面原因矛盾;sponsorship(贊助)與生產流程無關。","optionNotes":["disruption:中斷、干擾——機械故障導致的合理結果,正解。","prosperity(繁榮)同樣是正面詞,與故障情境矛盾。","sponsorship(贊助)與生產流程故障無關。","harmony(和諧)是正面詞,與「故障」的負面因果矛盾。"],"keyWords":[{"word":"disruption","pos":"n.","meaning":"中斷、干擾","freq":"高頻"},{"word":"malfunction","pos":"n.","meaning":"故障","freq":"中頻"}]},{"id":"x-q176","category":"word","categoryName":"字彙辨析","question":"The contractor guaranteed that the cleanroom modification would meet all _______ guidelines.","options":["obsolete","arbitrary","fictitious","regulatory"],"answer":3,"difficulty":"進階","translation":"承包商保證無塵室的改造工程將符合所有法規指南。","explanation":"本題考形容詞語意。regulatory(法規的、監管的)修飾「guidelines」,表示官方訂定的規範標準,符合工程必須遵循官方要求的語境。arbitrary(隨意的、武斷的)、fictitious(虛構的)、obsolete(過時的)皆無法表達「官方法規」之意。","optionNotes":["obsolete(過時的、淘汰的)與「guarantee...meet」的正面承諾矛盾。","arbitrary(隨意的、武斷的)與「guidelines」需具官方權威性的語境矛盾。","fictitious(虛構的、假造的)不可能是工程須遵循的指南。","regulatory:法規的、監管的——官方訂定規範的標準用詞,正解。"],"keyWords":[{"word":"regulatory","pos":"adj.","meaning":"法規的、監管的","freq":"高頻"},{"word":"guideline","pos":"n.","meaning":"指南、準則","freq":"高頻"}]},{"id":"x-q177","category":"collo","categoryName":"慣用搭配與比較","question":"The procurement manager requested an updated price _______ from the component vendor.","options":["compliment","recession","objection","quotation"],"answer":3,"difficulty":"中階","translation":"採購經理向零件供應商索取最新的價格報價單。","explanation":"本題考固定搭配 price quotation(報價單),quotation 指廠商提供的正式報價文件,是採購流程中的標準商務文件。compliment(讚美)、objection(異議)、recession(經濟衰退)皆與「向供應商索取價格文件」的語境無關。","optionNotes":["compliment(讚美、恭維)與價格文件毫無關聯,且與 compliance 為易混淆字。","recession(經濟衰退)與索取報價單的情境無關。","objection(異議、反對)不是採購時向供應商索取的文件。","quotation:報價單——與 price 構成固定搭配,採購流程標準文件,正解。"],"keyWords":[{"word":"quotation","pos":"n.","meaning":"報價單","freq":"中頻"},{"word":"procurement","pos":"n.","meaning":"採購","freq":"高頻"}],"pattern":{"name":"price quotation","note":"表示廠商提供的正式報價文件,採購流程常用詞。","example":"Please send us a price quotation for the new components."}},{"id":"x-q178","category":"word","categoryName":"字彙辨析","question":"The software platform's intuitive layout makes it highly _______ to first-time users.","options":["prohibitive","defiant","accessible","redundant"],"answer":2,"difficulty":"中階","translation":"該軟體平台直覺式的版面設計,讓初次使用的使用者也能輕易上手。","explanation":"本題考形容詞語意及因果呼應。accessible(易於使用的、好上手的)與前方「intuitive layout」(直覺式版面)形成因果呼應——版面直覺,自然容易上手。prohibitive(令人卻步的,常指價格過高)、defiant(反抗的)、redundant(多餘的)皆無法與「直覺式版面」形成正面因果關係。","optionNotes":["prohibitive(令人卻步的)常修飾價格過高,與「易於使用」語意相反。","defiant(反抗的、挑釁的)用於形容人的態度,不用於軟體平台特性。","accessible:易於使用的、好上手的——與直覺式版面因果呼應,正解。","redundant(多餘的、累贅的)與「直覺式版面」的正面描述矛盾。"],"keyWords":[{"word":"accessible","pos":"adj.","meaning":"易於使用的、易於取得的","freq":"高頻"},{"word":"intuitive","pos":"adj.","meaning":"直覺的","freq":"中頻"}]},{"id":"x-q179","category":"word","categoryName":"字彙辨析","question":"The database backup files are stored in an off-site server to ensure data _______.","options":["scarcity","extinction","redundancy","negligence"],"answer":2,"difficulty":"進階","translation":"資料庫備份檔案存放於異地伺服器,以確保資料的備援機制。","explanation":"本題考名詞語意。redundancy(此處指「備援、冗餘機制」)是資訊科技領域的專有意涵,異地備份的目的正是建立備援以防資料遺失,與句意相符。scarcity(短缺)、extinction(滅絕)、negligence(疏忽)皆無法表達「資料安全備援」之意。","optionNotes":["scarcity(短缺、稀少)與資料備援的技術目的無關。","extinction(滅絕、消失)過於誇張且不符合資訊科技語境。","redundancy:備援、冗餘機制——異地備份的技術目的,正解。","negligence(疏忽)是異地備份要避免的原因,而非目的本身,語意不合。"],"keyWords":[{"word":"redundancy","pos":"n.","meaning":"備援、冗餘機制(資訊領域)","freq":"中頻"},{"word":"off-site","pos":"adj.","meaning":"異地的、場外的","freq":"中頻"}]},{"id":"x-q180","category":"word","categoryName":"字彙辨析","question":"The executive committee evaluated the financial _______ of opening a branch in Hsinchu.","options":["feasibility","hostility","casualty","fragility"],"answer":0,"difficulty":"中階","translation":"執行委員會評估在新竹開設分公司的財務可行性。","explanation":"本題考名詞語意。feasibility(可行性)是高層評估重大投資決策(如展店計畫)時的核心指標,「evaluate the feasibility of + Ving」為固定表達。fragility(脆弱性)、hostility(敵意)、casualty(傷亡)皆與「評估開設分公司」的財務決策情境無關。","optionNotes":["feasibility:可行性——評估重大投資決策的核心指標,正解。","hostility(敵意、對立)與開設分公司的財務評估無關。","casualty(傷亡、損失者)與此商業決策情境不合。","fragility(脆弱性)與財務可行性評估無關。"],"keyWords":[{"word":"feasibility","pos":"n.","meaning":"可行性","freq":"中頻"},{"word":"evaluate","pos":"v.","meaning":"評估","freq":"高頻"}],"pattern":{"name":"evaluate the feasibility of N/Ving","note":"評估某計畫的可行性,常見於企業決策情境。","example":"The board evaluated the feasibility of merging with a competitor."}},{"id":"x-q181","category":"collo","categoryName":"慣用搭配與比較","question":"The automated sensor will _______ an alarm if the cleanroom pressure drops below limits.","options":["soothe","postpone","neglect","trigger"],"answer":3,"difficulty":"基礎","translation":"若無塵室壓力低於限制值,自動感測器將會觸發警報。","explanation":"本題考固定搭配 trigger an alarm(觸發警報),trigger 意指「觸發、引發」,是感測器自動反應機制的標準用詞。postpone(延後)、soothe(安撫)、neglect(忽略)都無法表達「感測器啟動警報」的因果動作。","optionNotes":["soothe(安撫、緩和)語意與「啟動警報」相反。","postpone(延後)無法表達感測器「啟動」警報的動作。","neglect(忽略、疏忽)與感測器自動反應的功能矛盾。","trigger:觸發、引發——與 alarm 構成固定搭配,感測器機制標準用詞,正解。"],"keyWords":[{"word":"trigger","pos":"v.","meaning":"觸發、引發","freq":"高頻"},{"word":"sensor","pos":"n.","meaning":"感測器","freq":"中頻"}],"pattern":{"name":"trigger an alarm","note":"表示「觸發警報」,常見於自動化系統與安全監控情境。","example":"Any unauthorized entry will trigger an alarm."}},{"id":"x-q182","category":"collo","categoryName":"慣用搭配與比較","question":"The sudden spike in microchip orders required the factory to work at full _______.","options":["liability","deficit","capacity","scarcity"],"answer":2,"difficulty":"中階","translation":"微晶片訂單量暴增,使工廠必須以滿載產能運作。","explanation":"本題考固定片語 at full capacity(以最大產能),capacity(產能、產量上限)與 full 搭配是描述工廠全力生產的標準用語。liability(責任、負債)、deficit(赤字)、scarcity(短缺)都不能與「full」搭配表達「全力運作」之意。","optionNotes":["liability(責任、負債)不與 full 搭配表達產能全開之意。","deficit(赤字、不足額)與「全力生產」的正面情境矛盾。","capacity:產能——與 full 構成固定片語 at full capacity,正解。","scarcity(短缺)與「工廠滿載運作」的語意相反。"],"keyWords":[{"word":"capacity","pos":"n.","meaning":"產能、容量","freq":"高頻"},{"word":"spike","pos":"n.","meaning":"急遽增加、高峰","freq":"中頻"}],"pattern":{"name":"at full capacity","note":"表示「以最大產能/全力運作」,常見於製造業情境。","example":"The plant is operating at full capacity to meet demand."}},{"id":"x-q183","category":"word","categoryName":"字彙辨析","question":"The training manual clarifies the _______ procedures for disposing of chemical waste.","options":["random","speculative","standard","eccentric"],"answer":2,"difficulty":"基礎","translation":"訓練手冊闡明了處理化學廢棄物的標準程序。","explanation":"本題考形容詞語意。standard(標準的)修飾「procedures」,符合安全規範文件描述「既定、統一程序」的語境。eccentric(古怪的)、random(隨機的)、speculative(臆測性的)皆與「安全處置程序」應具備的一致性與規範性矛盾。","optionNotes":["random(隨機的、任意的)與化學廢棄物處置須遵循固定規範的要求矛盾。","speculative(臆測性的、不確定的)與「訓練手冊闡明的既定程序」矛盾。","standard:標準的——安全規範程序的一致用詞,正解。","eccentric(古怪的、不尋常的)與「標準程序」的規範性矛盾。"],"keyWords":[{"word":"standard","pos":"adj.","meaning":"標準的","freq":"極高頻"},{"word":"dispose of","pos":"phr.","meaning":"處置、丟棄","freq":"高頻"}]},{"id":"x-q184","category":"collo","categoryName":"慣用搭配與比較","question":"The marketing team's primary focus is to elevate brand _______ among digital consumers.","options":["defiance","awareness","allowance","recession"],"answer":1,"difficulty":"基礎","translation":"行銷團隊的首要重點是提升數位消費者間的品牌知名度。","explanation":"本題考固定搭配 brand awareness(品牌知名度),是行銷領域最核心的關鍵績效指標之一。allowance(津貼)、defiance(反抗)、recession(經濟衰退)皆無法與 brand 搭配表達行銷團隊追求的目標。","optionNotes":["defiance(反抗、蔑視)與品牌行銷目標無關。","awareness:知名度、認知度——與 brand 構成固定搭配,行銷核心指標,正解。","allowance(津貼、容許量)不與 brand 搭配,語意不合。","recession(經濟衰退)與提升品牌知名度的正面目標矛盾。"],"keyWords":[{"word":"awareness","pos":"n.","meaning":"知名度、認知度","freq":"高頻"},{"word":"elevate","pos":"v.","meaning":"提升","freq":"中頻"}],"pattern":{"name":"brand awareness","note":"品牌知名度,行銷領域核心關鍵績效指標(KPI)。","example":"The campaign successfully increased brand awareness."}},{"id":"x-q185","category":"word","categoryName":"字彙辨析","question":"The technician executed the hardware diagnostic routine with absolute _______.","options":["reluctance","expertise","hesitation","negligence"],"answer":1,"difficulty":"進階","translation":"技術人員以絕對的專業技能執行硬體診斷程序。","explanation":"本題考名詞語意。expertise(專業知識、技術)是唯一能與「absolute」搭配表達正面專業素質的名詞,符合技術人員執行診斷工作展現的能力。negligence(疏忽)、hesitation(猶豫)、reluctance(不情願)皆為負面特質,與「執行診斷程序」應具備的正面態度矛盾。","optionNotes":["reluctance(不情願)同樣是負面態度,與專業執行工作矛盾。","expertise:專業知識、技術——唯一符合正面專業素質的選項,正解。","hesitation(猶豫)暗示不確定,與「執行程序」的果斷語境不合。","negligence(疏忽、粗心)是負面特質,與技術人員應有的專業表現矛盾。"],"keyWords":[{"word":"expertise","pos":"n.","meaning":"專業知識、技術","freq":"高頻"},{"word":"diagnostic","pos":"adj.","meaning":"診斷的","freq":"中頻"}]},{"id":"x-q186","category":"word","categoryName":"字彙辨析","question":"The newly introduced compiler can _______ processing times for large datasets.","options":["accelerate","postpone","deteriorate","fluctuate"],"answer":0,"difficulty":"中階","translation":"新推出的編譯器能夠加快大型資料集的處理時間。","explanation":"本題考動詞語意。accelerate(加速)修飾「processing times」,符合新技術帶來效能提升的正面語境。postpone(延後)、fluctuate(波動)、deteriorate(惡化)皆無法表達「新編譯器提升處理速度」的正面技術優勢。","optionNotes":["accelerate:加速——新技術帶來效能提升的正面用詞,正解。","postpone(延後)與「加快處理時間」的技術優勢矛盾。","deteriorate(惡化、變差)與新編譯器帶來的正面優勢矛盾。","fluctuate(波動、變動不定)不表達「加速」的正面效果。"],"keyWords":[{"word":"accelerate","pos":"v.","meaning":"加速","freq":"高頻"},{"word":"compiler","pos":"n.","meaning":"編譯器","freq":"中頻"}]},{"id":"x-q187","category":"collo","categoryName":"慣用搭配與比較","question":"The firm signed a _______ agreement with the university to sponsor advanced research.","options":["collaborative","hostile","precarious","superficial"],"answer":0,"difficulty":"中階","translation":"該公司與大學簽署合作協議,共同贊助尖端研究。","explanation":"本題考形容詞搭配 collaborative agreement(合作協議),collaborative(合作的)修飾與大學共同贊助研究的結盟關係,語意連貫。hostile(敵對的)與「簽署協議合作」的語境直接矛盾;precarious(不穩定的)、superficial(表面的)皆無法表達「共同贊助研究」的正式結盟關係。","optionNotes":["collaborative:合作的——與大學共同贊助研究的結盟關係,正解。","hostile(敵對的)與「簽署協議合作」的正面語境矛盾。","precarious(不穩定的、危險的)不修飾正式簽署的協議關係。","superficial(表面的、膚淺的)與「贊助尖端研究」的深度合作矛盾。"],"keyWords":[{"word":"collaborative","pos":"adj.","meaning":"合作的","freq":"高頻"},{"word":"sponsor","pos":"v.","meaning":"贊助","freq":"高頻"}],"pattern":{"name":"collaborative agreement","note":"合作協議,常見於企業與學術機構或其他公司的結盟情境。","example":"The two firms entered into a collaborative agreement on R&D."}},{"id":"x-q188","category":"word","categoryName":"字彙辨析","question":"The accounting audit uncovered several _______ errors in the spreadsheet formulas.","options":["intentional","inadvertent","malicious","fraudulent"],"answer":1,"difficulty":"進階","translation":"會計稽核發現試算表公式中有數個非故意的錯誤。","explanation":"本題考形容詞語意。inadvertent(非故意的、疏忽的)修飾「errors」,符合試算表公式出錯多為無心之過的常態情境。intentional(故意的)、fraudulent(詐欺的)、malicious(惡意的)皆暗示「蓄意犯錯」,若成立則稽核情境會升級為刑事/舞弊調查,與一般公式錯誤的常態語境不符。","optionNotes":["intentional(故意的)暗示蓄意犯錯,與一般公式疏失的常態語境不符。","inadvertent:非故意的、疏忽的——公式出錯的常態情境用詞,正解。","malicious(惡意的)同樣暗示蓄意破壞,與試算表公式疏失的情境不符。","fraudulent(詐欺的、舞弊的)語意過重,暗示刑事舞弊而非單純公式錯誤。"],"keyWords":[{"word":"inadvertent","pos":"adj.","meaning":"非故意的、疏忽的","freq":"中頻"},{"word":"audit","pos":"n./v.","meaning":"稽核、審計","freq":"高頻"}]},{"id":"x-q189","category":"word","categoryName":"字彙辨析","question":"The project timeline was _______ adjusted to accommodate the delay in tool delivery.","options":["prematurely","coincidentally","subsequently","randomly"],"answer":2,"difficulty":"進階","translation":"由於工具交付延誤,專案時程隨後進行了調整。","explanation":"本題考副詞語意及邏輯順序。subsequently(隨後、接著)表示「先有交付延誤,後有時程調整」的先後次序,語意連貫。prematurely(過早地)、coincidentally(巧合地)、randomly(隨機地)皆無法表達「因延誤而順勢調整」的因果與時序關係。","optionNotes":["prematurely(過早地)與「因應延誤才調整」的時序相反。","coincidentally(巧合地)暗示調整與延誤無關,但句意明確指出兩者有因果關係。","subsequently:隨後、接著——表達因延誤而順勢調整的時序邏輯,正解。","randomly(隨機地、任意地)與「因應延誤而調整」的合理決策過程矛盾。"],"keyWords":[{"word":"subsequently","pos":"adv.","meaning":"隨後、接著","freq":"高頻"},{"word":"accommodate","pos":"v.","meaning":"配合、順應","freq":"中頻"}]},{"id":"x-q190","category":"word","categoryName":"字彙辨析","question":"The client gave explicit _______ that the customized features met their operational needs.","options":["confirmation","grievance","hesitation","rejection"],"answer":0,"difficulty":"中階","translation":"客戶明確確認客製化功能已符合其營運需求。","explanation":"本題考名詞語意。confirmation(確認)與「explicit」(明確的)搭配,並與後方「符合營運需求」形成正面呼應,表示客戶正式認可。hesitation(猶豫)、rejection(拒絕)、grievance(不滿、申訴)皆為負面或不確定的態度,與「met their operational needs」的正面結果矛盾。","optionNotes":["confirmation:確認——與「符合需求」的正面結果呼應,正解。","grievance(不滿、申訴)同樣是負面詞,與正面結果矛盾。","hesitation(猶豫)與「明確」(explicit)的語意矛盾,猶豫不會是明確的。","rejection(拒絕)與「符合營運需求」的正面結果直接矛盾。"],"keyWords":[{"word":"confirmation","pos":"n.","meaning":"確認","freq":"高頻"},{"word":"explicit","pos":"adj.","meaning":"明確的、清楚表明的","freq":"中頻"}]},{"id":"x-q191","category":"collo","categoryName":"慣用搭配與比較","question":"The vendor agreed to _______ the shipping costs as a gesture of goodwill.","options":["forfeit","absorb","disrupt","inflate"],"answer":1,"difficulty":"進階","translation":"供應商同意自行吸收運費,以展現商務善意。","explanation":"本題考固定搭配 absorb costs(吸收/自行承擔成本),absorb 意指「主動承擔原本該由對方負擔的費用」,符合「展現善意」的商務語境。inflate(哄抬、誇大)、forfeit(喪失、被沒收)、disrupt(擾亂)皆無法表達「主動承擔費用」之意。","optionNotes":["forfeit(喪失、被沒收)通常指被迫失去而非主動承擔,語意不合。","absorb:吸收、承擔(費用)——與 costs 構成固定搭配,展現善意的商務用語,正解。","disrupt(擾亂、中斷)與「支付運費」的財務行為無關。","inflate(哄抬、誇大)與「同意承擔費用以示善意」的語境相反。"],"keyWords":[{"word":"absorb","pos":"v.","meaning":"吸收、自行承擔(費用)","freq":"中頻"},{"word":"goodwill","pos":"n.","meaning":"善意","freq":"中頻"}],"pattern":{"name":"absorb costs","note":"表示「主動承擔成本」,常見於商務讓利或善意補償的情境。","example":"The company decided to absorb the extra costs rather than raise prices."}},{"id":"x-q192","category":"collo","categoryName":"慣用搭配與比較","question":"The newly established safety protocols are designed to _______ cleanroom hazards.","options":["magnify","neglect","provoke","mitigate"],"answer":3,"difficulty":"中階","translation":"新建立的安全規範旨在減輕無塵室的潛在危害。","explanation":"本題考固定搭配 mitigate hazards(減輕危害),mitigate(減輕、緩和)符合安全規範制定的核心目的——降低風險。magnify(放大)、provoke(激起、引發)皆與「安全規範」的目的相反;neglect(忽略)則與「設計來因應危害」的積極態度矛盾。","optionNotes":["magnify(放大、擴大)與安全規範降低風險的目的相反。","neglect(忽略、漠視)與安全規範積極因應危害的態度矛盾。","provoke(激起、引發)與「設計來減少危害」的目的矛盾。","mitigate:減輕、緩和——安全規範制定的核心目的,正解。"],"keyWords":[{"word":"mitigate","pos":"v.","meaning":"減輕、緩和","freq":"高頻"},{"word":"hazard","pos":"n.","meaning":"危害、風險","freq":"中頻"}],"pattern":{"name":"mitigate hazards/risks","note":"表示「降低風險或危害」,常見於安全與風險管理情境。","example":"The new protocol helps mitigate workplace hazards."}},{"id":"x-q193","category":"word","categoryName":"字彙辨析","question":"The financial forecast outlines the _______ growth potential of the AI tech market.","options":["obsolete","negligible","substantial","marginal"],"answer":2,"difficulty":"進階","translation":"財務預測報告概述了人工智慧科技市場可觀的成長潛力。","explanation":"本題考形容詞語意。substantial(可觀的、大量的)修飾「growth potential」,符合當前 AI 科技市場被普遍看好的正面語境。marginal(邊際的、微小的)、negligible(微不足道的)皆表達「成長有限」,與「AI市場前景看好」的常識矛盾;obsolete(過時的)與「成長潛力」語意不合。","optionNotes":["obsolete(過時的、淘汰的)不能修飾「成長潛力」,語意不合。","negligible(微不足道的)同樣暗示幾乎沒有成長潛力,與句意矛盾。","substantial:可觀的、大量的——符合 AI 市場被看好的正面語境,正解。","marginal(邊際的、僅有微小差異的)暗示成長有限,與 AI 市場前景看好的常識矛盾。"],"keyWords":[{"word":"substantial","pos":"adj.","meaning":"可觀的、大量的","freq":"高頻"},{"word":"forecast","pos":"n.","meaning":"預測","freq":"高頻"}]},{"id":"x-q194","category":"word","categoryName":"字彙辨析","question":"The engineering crew conducted a _______ inspection of the pipeline before initialization.","options":["haphazard","meticulous","superficial","careless"],"answer":1,"difficulty":"中階","translation":"工程團隊在啟用管線前進行了一絲不苟的檢查。","explanation":"本題考形容詞語意。meticulous(一絲不苟的、極仔細的)修飾「inspection」,符合管線啟用前安全檢查應具備的最高嚴謹度。careless(粗心的)、superficial(表面的)、haphazard(雜亂無章的)皆暗示檢查不夠確實,與「啟用前安全檢查」應有的嚴謹態度矛盾。","optionNotes":["haphazard(雜亂無章的、隨意的)同樣與嚴謹檢查的要求矛盾。","meticulous:一絲不苟的、極仔細的——啟用前安全檢查應有的嚴謹度,正解。","superficial(表面的、膚淺的)暗示檢查不夠深入,與管線啟用前的安全要求矛盾。","careless(粗心的、不小心的)與安全檢查應有的嚴謹態度矛盾。"],"keyWords":[{"word":"meticulous","pos":"adj.","meaning":"一絲不苟的、極仔細的","freq":"中頻"},{"word":"pipeline","pos":"n.","meaning":"管線","freq":"中頻"}]},{"id":"x-q195","category":"word","categoryName":"字彙辨析","question":"The storage array offers high data throughput to eliminate network _______.","options":["congestion","prosperity","harmony","allowance"],"answer":0,"difficulty":"進階","translation":"該儲存陣列提供高資料吞吐量,以消除網路壅塞。","explanation":"本題考名詞語意及因果邏輯。congestion(壅塞)是「高資料吞吐量」直接要消除的問題,語意連貫。prosperity(繁榮)、harmony(和諧)是正面詞,無法作為「要被消除」的負面對象;allowance(容許量、津貼)與網路技術情境無關。","optionNotes":["congestion:壅塞——高吞吐量所要消除的技術問題,正解。","prosperity(繁榮)是正面詞,不會是要被「消除」的對象。","harmony(和諧)同樣是正面詞,與「消除」的負面對象邏輯矛盾。","allowance(容許量、津貼)與網路壅塞的技術情境無關。"],"keyWords":[{"word":"congestion","pos":"n.","meaning":"壅塞、擁塞","freq":"中頻"},{"word":"throughput","pos":"n.","meaning":"吞吐量","freq":"中頻"}]},{"id":"x-q196","category":"collo","categoryName":"慣用搭配與比較","question":"The facility management team plans to _______ the old cooling units with efficient ones.","options":["replace","neglect","discard","retain"],"answer":0,"difficulty":"中階","translation":"設施管理團隊計畫用高效能的新機組取代老舊的冷卻裝置。","explanation":"本題考固定句型 replace A with B(用 B 取代 A),句中「with efficient ones」明確提示需要搭配 replace 才能構成「用新機組取代舊機組」的完整句意。retain(保留)、discard(丟棄,不與 with 搭配表示替換對象)、neglect(忽略)皆無法與「with efficient ones」構成合理句型。","optionNotes":["replace:取代——與 with 構成固定句型 replace A with B,正解。","neglect(忽略、疏於維護)與「with efficient ones」搭配不合語法邏輯。","discard(丟棄)雖然語意接近淘汰舊機組,但不與 with + 新機組 構成替換句型,用法不合。","retain(保留)與「with efficient ones」搭配不合邏輯,保留舊機組不需搭配新機組受詞。"],"keyWords":[{"word":"replace","pos":"v.","meaning":"取代、更換","freq":"極高頻"},{"word":"facility","pos":"n.","meaning":"設施","freq":"高頻"}],"pattern":{"name":"replace A with B","note":"用 B 取代 A,為固定句型,B 前面搭配介系詞 with。","example":"The company replaced the outdated software with a cloud-based system."}},{"id":"x-q197","category":"word","categoryName":"字彙辨析","question":"The technician referenced the blueprint to determine the _______ placement of the valve.","options":["casual","arbitrary","ambiguous","precise"],"answer":3,"difficulty":"中階","translation":"技術人員參照藍圖以確定閥門的精確安裝位置。","explanation":"本題考形容詞語意。precise(精確的)修飾「placement」,符合技術人員查閱藍圖決定安裝位置時應具備的精準要求。casual(隨意的)、ambiguous(模糊不清的)、arbitrary(任意的、主觀認定的)皆與「參照藍圖決定位置」所需的精準性矛盾。","optionNotes":["casual(隨意的、非正式的)與「參照藍圖」的精準工程要求矛盾。","arbitrary(任意的、主觀認定的)與「依藍圖」的客觀依據矛盾。","ambiguous(模糊不清的)與「確定位置」的明確目的矛盾。","precise:精確的——查閱藍圖確定安裝位置的精準要求,正解。"],"keyWords":[{"word":"precise","pos":"adj.","meaning":"精確的","freq":"高頻"},{"word":"blueprint","pos":"n.","meaning":"藍圖、設計圖","freq":"中頻"}]},{"id":"x-q198","category":"word","categoryName":"字彙辨析","question":"The regional office reported a _______ increase in new client subscriptions last quarter.","options":["negligible","stagnant","steady","volatile"],"answer":2,"difficulty":"中階","translation":"區域辦事處回報上一季新客戶訂閱數穩定增長。","explanation":"本題考形容詞語意。steady(穩定的)修飾「increase」,表達持續穩健的正向成長趨勢,符合業績報告的常見正面描述。negligible(微不足道的)暗示成長幅度極小,與「increase」的正面陳述語氣不搭;volatile(波動不定的)與「steady」語意相反;stagnant(停滯的)則與「increase」(增長)直接矛盾。","optionNotes":["negligible(微不足道的)暗示幾乎沒有成長,語氣與句子強調的正面成長不符。","stagnant(停滯不前的)與「increase」(增長)語意直接矛盾。","steady:穩定的——與 increase 搭配表達持續穩健成長,正解。","volatile(不穩定的、波動的)與穩健成長的語境相反。"],"keyWords":[{"word":"steady","pos":"adj.","meaning":"穩定的","freq":"高頻"},{"word":"subscription","pos":"n.","meaning":"訂閱","freq":"中頻"}]},{"id":"x-q199","category":"collo","categoryName":"慣用搭配與比較","question":"The system administrator issued a warning regarding unauthorized _______ to the server room.","options":["allocation","access","disposal","recession"],"answer":1,"difficulty":"基礎","translation":"系統管理員針對未經授權進入伺服器機房發出警告。","explanation":"本題考固定搭配 unauthorized access(未經授權的存取/進入),是資安與機房安全管理的標準用語。disposal(處置)、recession(經濟衰退)、allocation(分配)皆無法與「to the server room」構成合理搭配,語意不合。","optionNotes":["allocation(分配)不用於形容「進入」機房的行為。","access:存取、進入——與 unauthorized 構成固定搭配,機房安全標準用語,正解。","disposal(處置、丟棄)與「進入機房」的安全情境無關。","recession(經濟衰退)與機房安全管理完全無關。"],"keyWords":[{"word":"access","pos":"n.","meaning":"存取、進入(權限)","freq":"極高頻"},{"word":"unauthorized","pos":"adj.","meaning":"未經授權的","freq":"高頻"}],"pattern":{"name":"unauthorized access","note":"未經授權的存取/進入,資安與安全管理領域高頻詞組。","example":"The firewall blocks unauthorized access to the network."}},{"id":"x-q200","category":"word","categoryName":"字彙辨析","question":"The legal consultant suggested adding a specific _______ to protect intellectual property.","options":["clause","receipt","deficit","budget"],"answer":0,"difficulty":"中階","translation":"法律顧問建議增加一項特定條款,以保護智慧財產權。","explanation":"本題考名詞語意。clause(條款)是法律合約中規範特定事項的段落,符合「增加條款以保護智財權」的法律情境。receipt(收據)、budget(預算)、deficit(赤字)皆與合約條款的法律情境無關。","optionNotes":["clause:條款——法律合約中規範特定事項的標準用詞,正解。","receipt(收據)與合約條款的法律情境無關。","deficit(赤字、不足額)同樣與合約保護智財權的情境無關。","budget(預算)是財務規劃用詞,不是合約中的法律條款。"],"keyWords":[{"word":"clause","pos":"n.","meaning":"(合約)條款","freq":"高頻"},{"word":"intellectual property","pos":"n.","meaning":"智慧財產權","freq":"高頻"}]},{"id":"x-q201","category":"word","categoryName":"字彙辨析","question":"The factory engineering division announced a significant _______ in wafer fabrication efficiency.","options":["penalty","deficit","setback","breakthrough"],"answer":3,"difficulty":"中階","translation":"工廠工程部門宣布晶圓製造效率有重大突破。","explanation":"本題考名詞語意。breakthrough(突破、重大進展)修飾「efficiency」提升,符合工程技術進步的正面商務描述。setback(挫折、倒退)與「提升效率」的正面語境矛盾;deficit(赤字)、penalty(罰則)皆與「製造效率提升」的技術情境無關。","optionNotes":["penalty(罰則、罰款)與宣布效率提升的正面情境矛盾。","deficit(赤字、不足額)與晶圓製造效率無關。","setback(挫折、倒退)與「效率提升」的正面語境矛盾。","breakthrough:突破、重大進展——工程技術提升的正面用詞,正解。"],"keyWords":[{"word":"breakthrough","pos":"n.","meaning":"突破、重大進展","freq":"高頻"},{"word":"fabrication","pos":"n.","meaning":"製造、加工","freq":"中頻"}]},{"id":"x-q202","category":"collo","categoryName":"慣用搭配與比較","question":"To maintain system integrity, administrators must perform routine _______ every Saturday.","options":["negligence","maintenance","violation","recession"],"answer":1,"difficulty":"基礎","translation":"為維持系統完整性,管理員必須於每週六執行例行維護。","explanation":"本題考固定搭配 routine maintenance(例行維護),maintenance(維護)是確保系統完整性的必要管理程序,與 routine 搭配為 IT 領域高頻詞組。negligence(疏忽)、recession(經濟衰退)、violation(違反)皆與「維持系統完整性」的目的矛盾或無關。","optionNotes":["negligence(疏忽)與「維持系統完整性」的積極目的矛盾。","maintenance:維護——與 routine 構成固定搭配,確保系統完整性的必要程序,正解。","violation(違反、違規)與「執行例行維護」的正面管理行為矛盾。","recession(經濟衰退)與系統管理情境完全無關。"],"keyWords":[{"word":"maintenance","pos":"n.","meaning":"維護、保養","freq":"極高頻"},{"word":"integrity","pos":"n.","meaning":"完整性","freq":"中頻"}],"pattern":{"name":"routine maintenance","note":"例行維護,IT 與設備管理領域高頻詞組。","example":"The server undergoes routine maintenance every weekend."}},{"id":"x-q203","category":"collo","categoryName":"慣用搭配與比較","question":"The technical documentation must be revised to ensure complete _______ with global security standards.","options":["resistance","ignorance","compliance","defiance"],"answer":2,"difficulty":"進階","translation":"技術文件必須修訂,以確保完全符合全球資安標準。","explanation":"本題考固定搭配 compliance with standards(符合標準),compliance(合規、遵守)與 with 連用是規範審查與認證情境的固定用語。defiance(反抗)、resistance(抗拒)、ignorance(無知)皆與「符合標準」的正面語境相反或無關。","optionNotes":["resistance(抗拒、抵抗)同樣與「遵守標準」的正面目的矛盾。","ignorance(無知、忽視)與「確保完全符合標準」的嚴謹要求矛盾。","compliance:合規、遵守——與 with standards 構成固定搭配,正解。","defiance(反抗、蔑視)與「確保符合標準」的目的直接矛盾。"],"keyWords":[{"word":"compliance","pos":"n.","meaning":"合規、遵守","freq":"高頻"},{"word":"revise","pos":"v.","meaning":"修訂","freq":"高頻"}],"pattern":{"name":"compliance with N","note":"表示「符合/遵守某規範」,常見於法規與資安認證情境。","example":"The factory ensures compliance with international safety standards."}},{"id":"x-q204","category":"word","categoryName":"字彙辨析","question":"The newly developed AI software offers an intuitive interface designed to enhance user _______.","options":["friction","contamination","productivity","fatigue"],"answer":2,"difficulty":"基礎","translation":"新開發的人工智慧軟體提供直覺式介面,旨在提升使用者的生產力。","explanation":"本題考名詞語意。productivity(生產力)是導入現代化軟體或 AI 工具時最核心的預期成效,與「enhance」(提升)形成正面呼應。fatigue(疲勞)、contamination(污染)、friction(摩擦)皆為負面或不相關概念,與「提升使用者...」的正面目的矛盾。","optionNotes":["friction(摩擦、阻力)是負面詞,與「enhance」(提升)的正面語境矛盾。","contamination(污染)與軟體介面情境完全無關。","productivity:生產力——導入 AI 工具最核心的預期成效,正解。","fatigue(疲勞)是負面詞,與「提升使用者」的正面目的矛盾。"],"keyWords":[{"word":"productivity","pos":"n.","meaning":"生產力","freq":"高頻"},{"word":"intuitive","pos":"adj.","meaning":"直覺的","freq":"中頻"}]},{"id":"x-q205","category":"collo","categoryName":"慣用搭配與比較","question":"The operations manager conducted a detailed cost-benefit _______ before approving the purchase.","options":["disposal","analysis","casualty","obstacle"],"answer":1,"difficulty":"中階","translation":"營運經理在核准採購前進行了詳細的成本效益分析。","explanation":"本題考固定搭配 cost-benefit analysis(成本效益分析),是管理層在核准採購或預算支出前必須進行的標準評估程序。disposal(處置)、casualty(傷亡)、obstacle(阻礙)皆無法與「cost-benefit」搭配構成有意義的名詞片語。","optionNotes":["disposal(處置、丟棄)不與 cost-benefit 搭配,語意不合。","analysis:分析——與 cost-benefit 構成固定搭配,採購決策前的標準評估程序,正解。","casualty(傷亡、損失者)與成本效益評估的商務情境無關。","obstacle(阻礙、障礙)同樣不構成「cost-benefit」的合理搭配。"],"keyWords":[{"word":"analysis","pos":"n.","meaning":"分析","freq":"極高頻"},{"word":"approve","pos":"v.","meaning":"核准、批准","freq":"高頻"}],"pattern":{"name":"cost-benefit analysis","note":"成本效益分析,管理決策核准前的標準評估程序。","example":"The company performed a cost-benefit analysis before launching the new product."}}];
const BUILTIN_VOCAB = /*V_DATA*/[{"id":"office-1","theme":"office","themeName":"辦公室與人資","word":"streamline","pos":"v.","meaning":"（流程）使精簡、簡化","example":"The new software will streamline the approval process across departments.","exampleZh":"新軟體將使各部門的核准流程更加精簡。","collocations":["streamline the process","streamline operations","streamline workflow"],"freq":"高頻","tip":"stream（水流）+ line，想像把繁瑣流程理成一條直線水流般順暢。"},{"id":"office-2","theme":"office","themeName":"辦公室與人資","word":"delegate","pos":"v.","meaning":"（工作、權責）委派、授權給下屬","example":"The manager delegated the quarterly report to her assistant last week.","exampleZh":"經理上週把季報告委派給她的助理處理。","collocations":["delegate a task","delegate authority","delegate responsibility"],"freq":"高頻","tip":"名詞當「代表」也是delegate，注意詞性判斷：a delegate（人）vs. to delegate（動作）。"},{"id":"office-3","theme":"office","themeName":"辦公室與人資","word":"prioritize","pos":"v.","meaning":"優先處理、排定優先順序","example":"Employees should prioritize urgent client requests over routine paperwork.","exampleZh":"員工應優先處理緊急客戶需求，而非例行文書工作。","collocations":["prioritize tasks","prioritize requests","prioritize accordingly"],"freq":"高頻","tip":"priority（優先事項）+ -ize（動詞化字尾），記字根就能秒懂。"},{"id":"office-4","theme":"office","themeName":"辦公室與人資","word":"oversee","pos":"v.","meaning":"監督、督導（部門或專案運作）","example":"The senior supervisor oversees daily operations at both branch offices.","exampleZh":"資深主管監督兩間分公司的日常營運。","collocations":["oversee operations","oversee a project","oversee staff"],"freq":"高頻","tip":"over（在...之上）+ see（看），從高處往下看＝監督，別跟overlook（忽略）搞混。"},{"id":"office-5","theme":"office","themeName":"辦公室與人資","word":"qualification","pos":"n.","meaning":"（應徵、任職）資格；學經歷條件","example":"The candidate's qualifications exceed the minimum requirements for this position.","exampleZh":"這名應徵者的資格條件超過這個職位的最低要求。","collocations":["meet the qualifications","professional qualification","lack qualification"],"freq":"極高頻","tip":"常考複數形 qualifications 指「各項資格條件」，單數則指單一資格證明。"},{"id":"office-6","theme":"office","themeName":"辦公室與人資","word":"retain","pos":"v.","meaning":"（正式）留住（人才、客戶）；保留","example":"Competitive benefits help the firm retain talented employees long term.","exampleZh":"具競爭力的福利有助於公司長期留住優秀員工。","collocations":["retain talent","retain employees","retain customers"],"freq":"高頻","tip":"re-（回、再）+ tain（拿、握，同contain），字面是「一直握著不放」。"},{"id":"office-7","theme":"office","themeName":"辦公室與人資","word":"appraisal","pos":"n.","meaning":"（人資）績效評估、考核","example":"Annual performance appraisals determine eligibility for a salary raise.","exampleZh":"年度績效評估決定加薪資格。","collocations":["performance appraisal","conduct an appraisal","annual appraisal"],"freq":"高頻","tip":"動詞appraise（評估）+ -al，別跟praise（讚美）拼錯搞混。"},{"id":"office-8","theme":"office","themeName":"辦公室與人資","word":"compensation","pos":"n.","meaning":"（正式）薪酬、薪資福利總和；賠償金","example":"The compensation package includes health insurance and annual bonuses.","exampleZh":"這份薪酬方案包含健康保險與年度獎金。","collocations":["compensation package","competitive compensation","seek compensation"],"freq":"高頻","tip":"HR情境多指「薪酬」，法律情境則指「賠償」，靠上下文判斷語意。"},{"id":"office-9","theme":"office","themeName":"辦公室與人資","word":"tenure","pos":"n.","meaning":"（正式）任職年資、任期","example":"Employees with over ten years of tenure receive additional paid leave.","exampleZh":"任職年資超過十年的員工可獲得額外的有薪假。","collocations":["length of tenure","during her tenure","job tenure"],"freq":"中頻","tip":"學術界亦指「終身職」，商務情境則單純指「在職期間」。"},{"id":"office-10","theme":"office","themeName":"辦公室與人資","word":"onboarding","pos":"n.","meaning":"（人資）新進人員教育訓練、入職流程","example":"The onboarding program helps new hires adjust within their first month.","exampleZh":"新人培訓計畫幫助新進員工在第一個月內順利適應。","collocations":["onboarding program","onboarding process","complete onboarding"],"freq":"高頻","tip":"on-board（上船、上任）的引申用法，把新人「帶上船」融入團隊。"},{"id":"office-11","theme":"office","themeName":"辦公室與人資","word":"endorsement","pos":"n.","meaning":"（正式）背書、認可；（合約）批注","example":"The training certificate requires an endorsement from the HR director.","exampleZh":"這張培訓證書需要人資主管的背書認可。","collocations":["require an endorsement","official endorsement","product endorsement"],"freq":"中頻","tip":"動詞endorse（背書、簽署認可），常考搭配 endorse a policy/candidate。"},{"id":"office-12","theme":"office","themeName":"辦公室與人資","word":"incentive","pos":"n.","meaning":"（正式）獎勵、誘因（金錢或非金錢）","example":"The company offers performance incentives to boost employee productivity.","exampleZh":"公司提供績效獎勵來提升員工生產力。","collocations":["offer an incentive","incentive program","financial incentive"],"freq":"高頻","tip":"字源與拉丁文「incinere」（吹奏、激起）有關，同chant（歌詠）字根，引申為「激起動機」。"},{"id":"office-13","theme":"office","themeName":"辦公室與人資","word":"attendee","pos":"n.","meaning":"（會議、活動）與會者、出席者","example":"All attendees must register at the front desk before the training session.","exampleZh":"所有與會者必須在培訓場次開始前於櫃檯報到。","collocations":["all attendees","register attendees","expected attendees"],"freq":"高頻","tip":"attend（出席）+ -ee（被動接受動作的人），如employee、interviewee同構詞。"},{"id":"office-14","theme":"office","themeName":"辦公室與人資","word":"facilitate","pos":"v.","meaning":"（正式）主持、促成；使便利進行","example":"The HR consultant will facilitate the leadership workshop next Tuesday.","exampleZh":"人資顧問將於下週二主持這場領導力工作坊。","collocations":["facilitate a workshop","facilitate discussion","facilitate the process"],"freq":"高頻","tip":"facile（容易的）+ -itate，讓事情「變得容易進行」＝促成、主持。"},{"id":"office-15","theme":"office","themeName":"辦公室與人資","word":"preside over","pos":"phr.","meaning":"（正式）主持（會議、儀式）","example":"The department head will preside over the quarterly performance review meeting.","exampleZh":"部門主管將主持這場季度績效檢討會議。","collocations":["preside over a meeting","preside over the ceremony","preside over negotiations"],"freq":"中頻","tip":"preside（統管）+ over，字面是「凌駕、坐鎮於...之上」主持全場。"},{"id":"office-16","theme":"office","themeName":"辦公室與人資","word":"adjourn","pos":"v.","meaning":"（正式）（會議）休會、宣布散會","example":"The board meeting was adjourned until further notice from the chairperson.","exampleZh":"董事會會議在主席另行通知前暫時休會。","collocations":["adjourn the meeting","adjourn until","formally adjourn"],"freq":"中頻","tip":"ad-（向）+ journ（日，同journal），原意「延到另一天」，考題常配until。"},{"id":"office-17","theme":"office","themeName":"辦公室與人資","word":"in accordance with","pos":"phr.","meaning":"（正式）依照、按照（規定或政策）","example":"Salaries are adjusted in accordance with the company's annual review policy.","exampleZh":"薪資將依照公司的年度考核政策進行調整。","collocations":["in accordance with regulations","act in accordance with policy","in accordance with the contract"],"freq":"高頻","tip":"accord（一致）延伸，介系詞固定用with，Part 5高頻介系詞搭配陷阱。"},{"id":"office-18","theme":"office","themeName":"辦公室與人資","word":"on behalf of","pos":"phr.","meaning":"代表（某人或某單位）","example":"The HR manager signed the offer letter on behalf of the company.","exampleZh":"人資經理代表公司簽署了這封錄取通知信。","collocations":["on behalf of the company","speak on behalf of","sign on behalf of"],"freq":"高頻","tip":"behalf本身不單獨使用，固定片語on behalf of，別漏掉of。"},{"id":"office-19","theme":"office","themeName":"辦公室與人資","word":"probation","pos":"n.","meaning":"（人資）試用期；（法律）緩刑","example":"New employees must complete a three-month probation period before confirmation.","exampleZh":"新進員工必須完成三個月試用期才能轉為正式員工。","collocations":["probation period","complete probation","during probation"],"freq":"高頻","tip":"HR情境固定搭配probation period，別跟promotion（升遷）字形混淆。"},{"id":"office-20","theme":"office","themeName":"辦公室與人資","word":"severance","pos":"n.","meaning":"（人資）資遣、離職補償金","example":"Laid-off staff will receive severance pay equal to two months' salary.","exampleZh":"被資遣的員工將獲得相當於兩個月薪資的資遣費。","collocations":["severance pay","severance package","receive severance"],"freq":"中頻","tip":"sever（切斷）+ -ance，指「切斷雇傭關係」時給付的補償金，固定搭配severance pay。"},{"id":"biz-1","theme":"biz","themeName":"會議、行銷與業務","word":"preside over","pos":"phr. v.","meaning":"主持（會議、活動）；正式場合的主導者角色","example":"The vice president will preside over the quarterly sales review meeting.","exampleZh":"副總將主持本季的業務檢討會議。","collocations":["preside over a meeting","preside over the ceremony","preside over negotiations"],"freq":"高頻","tip":"pre-（在前）+ side（座位）→坐在最前面主持；別與 preside at 混淆，over 更常見於正式場合。"},{"id":"biz-2","theme":"biz","themeName":"會議、行銷與業務","word":"facilitate","pos":"v.","meaning":"（會議、討論）促進、使順利進行","example":"An experienced moderator will facilitate the panel discussion this afternoon.","exampleZh":"一位經驗豐富的主持人將促進今天下午的座談討論。","collocations":["facilitate a discussion","facilitate communication","facilitate the workshop"],"freq":"高頻","tip":"facil-字根=easy，facilitate＝使容易進行；常考名詞 facilitator（主持人）。"},{"id":"biz-3","theme":"biz","themeName":"會議、行銷與業務","word":"adjourn","pos":"v.","meaning":"（會議）休會、宣布散會","example":"The chairperson adjourned the meeting until further notice.","exampleZh":"主席宣布會議休會，直到另行通知為止。","collocations":["adjourn the meeting","adjourn until next week","stand adjourned"],"freq":"中頻","tip":"易與 postpone（延期）混淆：adjourn 指「當場暫停/結束」，postpone 指「事先延後」。"},{"id":"biz-4","theme":"biz","themeName":"會議、行銷與業務","word":"consensus","pos":"n.","meaning":"（會議決策）共識、一致意見","example":"The board reached a consensus on the new marketing budget allocation.","exampleZh":"董事會就新的行銷預算分配達成共識。","collocations":["reach a consensus","build consensus","general consensus"],"freq":"高頻","tip":"con-（共同）+ sens（感覺）→大家有相同感覺；常見動詞為 reach/build a consensus。"},{"id":"biz-5","theme":"biz","themeName":"會議、行銷與業務","word":"proponent","pos":"n.","meaning":"（提案、方案的）支持者、倡導者","example":"She is a strong proponent of switching to a subscription-based pricing model.","exampleZh":"她是轉換為訂閱制定價模式的堅定支持者。","collocations":["a proponent of","leading proponent","proponents argue that"],"freq":"中頻","tip":"與 opponent（反對者）成對記憶，pro-（贊成）vs op-（反對）。"},{"id":"biz-6","theme":"biz","themeName":"會議、行銷與業務","word":"streamline","pos":"v.","meaning":"（流程、簡報）使精簡、簡化以提高效率","example":"The new software will streamline the approval process for expense reports.","exampleZh":"這套新軟體將簡化費用報告的核准流程。","collocations":["streamline the process","streamline operations","streamline workflow"],"freq":"高頻","tip":"stream（水流）+ line（直線）→讓流程像水流一樣順暢無阻。"},{"id":"biz-7","theme":"biz","themeName":"會議、行銷與業務","word":"visual aid","pos":"phr. n.","meaning":"（簡報）視覺輔助工具，如圖表、投影片","example":"Using visual aids can make complex data much easier to understand.","exampleZh":"使用視覺輔助工具能讓複雜的資料更容易理解。","collocations":["use visual aids","effective visual aids","rely on visual aids"],"freq":"中頻","tip":"簡報主題常考搭配詞，等同 slides、charts、graphs 的統稱。"},{"id":"biz-8","theme":"biz","themeName":"會議、行銷與業務","word":"elaborate on","pos":"phr. v.","meaning":"（簡報、討論）進一步詳細說明","example":"Could you elaborate on the financial projections mentioned earlier?","exampleZh":"您能否針對稍早提到的財務預測進一步說明？","collocations":["elaborate on a point","elaborate further","please elaborate"],"freq":"高頻","tip":"e-（向外）+ labor（勞動）→把想法「加工延伸」講得更清楚。"},{"id":"biz-9","theme":"biz","themeName":"會議、行銷與業務","word":"endorsement","pos":"n.","meaning":"（行銷）代言、背書；（文件）批准簽署","example":"The celebrity endorsement significantly increased the brand's visibility online.","exampleZh":"這位名人的代言大幅提升了該品牌在網路上的能見度。","collocations":["celebrity endorsement","product endorsement","seek an endorsement"],"freq":"高頻","tip":"endorse 原意「背書簽名」，衍生為公開支持、代言。"},{"id":"biz-10","theme":"biz","themeName":"會議、行銷與業務","word":"target audience","pos":"phr. n.","meaning":"（行銷）目標客群、目標受眾","example":"The campaign was carefully designed to reach a younger target audience.","exampleZh":"這個活動經過精心設計，以觸及較年輕的目標客群。","collocations":["reach the target audience","define a target audience","appeal to the target audience"],"freq":"極高頻","tip":"行銷單元核心片語，常與 demographic（人口統計群）互換出現。"},{"id":"biz-11","theme":"biz","themeName":"會議、行銷與業務","word":"brand loyalty","pos":"phr. n.","meaning":"（行銷）品牌忠誠度","example":"Excellent customer service has helped the company build strong brand loyalty.","exampleZh":"優質的客戶服務幫助這家公司建立了強大的品牌忠誠度。","collocations":["build brand loyalty","strengthen brand loyalty","foster brand loyalty"],"freq":"高頻","tip":"常與 customer retention（客戶留存）一起出現在同一段落。"},{"id":"biz-12","theme":"biz","themeName":"會議、行銷與業務","word":"outreach","pos":"n.","meaning":"（行銷、業務）推廣、對外接觸活動","example":"The nonprofit expanded its outreach efforts to attract younger donors.","exampleZh":"這個非營利組織擴大了推廣活動，以吸引較年輕的捐款人。","collocations":["outreach efforts","community outreach","outreach program"],"freq":"中頻","tip":"out（向外）+ reach（伸展）→把手伸出去接觸潛在客群。"},{"id":"biz-13","theme":"biz","themeName":"會議、行銷與業務","word":"projection","pos":"n.","meaning":"（業務）預估、預測（數字方面）","example":"Sales projections for the next quarter look more promising than expected.","exampleZh":"下一季的銷售預測看起來比預期更樂觀。","collocations":["sales projections","revenue projections","financial projections"],"freq":"高頻","tip":"易混淆 project（動詞：預測）與 projection（名詞：預測值），注意詞性。"},{"id":"biz-14","theme":"biz","themeName":"會議、行銷與業務","word":"clientele","pos":"n.","meaning":"（業務）客群、（統稱）顧客群","example":"The boutique hotel has built a loyal clientele over the past decade.","exampleZh":"這家精品旅館在過去十年間累積了一群忠實的客群。","collocations":["loyal clientele","attract clientele","diverse clientele"],"freq":"中頻","tip":"為不可數集合名詞，指所有顧客的整體，不同於單一 client。"},{"id":"biz-15","theme":"biz","themeName":"會議、行銷與業務","word":"incentive","pos":"n.","meaning":"（業務、行銷）誘因、獎勵措施","example":"The sales team offered incentives to encourage customers to renew early.","exampleZh":"業務團隊提供獎勵誘因，鼓勵客戶提前續約。","collocations":["offer an incentive","financial incentive","incentive program"],"freq":"極高頻","tip":"in-（向內）+ cent（唱、激勵）→內在驅動力，常搭配 offer/provide。"},{"id":"biz-16","theme":"biz","themeName":"會議、行銷與業務","word":"retention","pos":"n.","meaning":"（客戶服務）留存、保留（客戶或員工）","example":"Improving customer retention is more cost-effective than acquiring new clients.","exampleZh":"提升客戶留存率比開發新客戶更符合成本效益。","collocations":["customer retention","retention rate","employee retention"],"freq":"高頻","tip":"retain（動詞）→retention（名詞），常與 acquisition（開發新客）對比出現。"},{"id":"biz-17","theme":"biz","themeName":"會議、行銷與業務","word":"escalate","pos":"v.","meaning":"（客訴、問題）向上呈報、升級處理","example":"If the issue remains unresolved, please escalate it to the manager.","exampleZh":"若問題仍未解決，請將其呈報給經理處理。","collocations":["escalate an issue","escalate to management","escalate the complaint"],"freq":"高頻","tip":"字根 scale（階梯）→ e-scalate 沿階梯向上，指問題層級提升。"},{"id":"biz-18","theme":"biz","themeName":"會議、行銷與業務","word":"complaint resolution","pos":"phr. n.","meaning":"（客戶服務）客訴處理、申訴解決","example":"The support team prioritizes swift complaint resolution to retain customers.","exampleZh":"客服團隊優先快速處理客訴，以留住客戶。","collocations":["complaint resolution process","effective complaint resolution","handle complaint resolution"],"freq":"中頻","tip":"客服主題常考複合名詞，注意 resolve（動詞）vs resolution（名詞）詞性轉換。"},{"id":"biz-19","theme":"biz","themeName":"會議、行銷與業務","word":"concession","pos":"n.","meaning":"（談判）讓步、妥協","example":"Both parties made concessions to finalize the contract before the deadline.","exampleZh":"雙方都做出讓步，以便在期限前完成合約簽署。","collocations":["make a concession","mutual concessions","offer a concession"],"freq":"中頻","tip":"con-（一起）+ ced（讓）→共同退讓；談判主題核心字，常搭配 make/offer。"},{"id":"biz-20","theme":"biz","themeName":"會議、行銷與業務","word":"leverage","pos":"v. / n.","meaning":"（談判、業務）運用、借力使力；影響力、籌碼","example":"The supplier used its market position to leverage better contract terms.","exampleZh":"這家供應商利用其市場地位來爭取更優惠的合約條件。","collocations":["leverage its market position","use as leverage","leverage relationships"],"freq":"高頻","tip":"原意「槓桿」，商業英文常作動詞使用，意指用既有資源撬動更大利益。"},{"id":"fin-1","theme":"fin","themeName":"財務、採購與物流","word":"procurement","pos":"n.","meaning":"採購（作業/部門）；（正式）泛指企業取得物料或服務的流程","example":"The procurement department reviewed three suppliers before signing the contract.","exampleZh":"採購部門在簽約前審查了三家供應商。","collocations":["procurement department","procurement process","streamline procurement"],"freq":"高頻","tip":"字根pro-（向前）+ cure（照料）→取得所需物資；別跟purchase order搞混，procurement是流程，purchase order是單據"},{"id":"fin-2","theme":"fin","themeName":"財務、採購與物流","word":"invoice","pos":"n./v.","meaning":"發票、請款單；（動詞）開立發票給某人","example":"Please invoice us within seven days after the shipment is delivered.","exampleZh":"請於貨物送達後七天內開立發票給我們。","collocations":["issue an invoice","invoice for the goods","outstanding invoice"],"freq":"極高頻","tip":"可當名詞也可當及物動詞，考題常考動詞用法 invoice sb for sth"},{"id":"fin-3","theme":"fin","themeName":"財務、採購與物流","word":"reimburse","pos":"v.","meaning":"（公司對員工）報銷、償還費用；（正式）多用於出差或業務支出","example":"The company will reimburse employees for approved travel expenses promptly.","exampleZh":"公司將迅速報銷員工已核准的出差費用。","collocations":["reimburse expenses","fully reimbursed","request reimbursement"],"freq":"高頻","tip":"名詞形式是reimbursement；易混淆字：refund（退款給消費者）vs reimburse（償還員工/個人墊付款項）"},{"id":"fin-4","theme":"fin","themeName":"財務、採購與物流","word":"outstanding","pos":"adj.","meaning":"（帳款）未付清的、未結清的；另有「傑出的」之意，需依上下文判斷","example":"The client still has an outstanding balance from last quarter's order.","exampleZh":"該客戶上一季訂單仍有未付清的餘額。","collocations":["outstanding balance","outstanding payment","outstanding invoice"],"freq":"高頻","tip":"財務語境幾乎都指「未付款」，不是「優秀」，考試常見一字多義陷阱"},{"id":"fin-5","theme":"fin","themeName":"財務、採購與物流","word":"depreciation","pos":"n.","meaning":"（會計）折舊；資產價值隨時間減損","example":"The accounting team calculates equipment depreciation at the end of each year.","exampleZh":"會計團隊在每年年底計算設備折舊。","collocations":["calculate depreciation","depreciation expense","accumulated depreciation"],"freq":"中頻","tip":"de-（向下）+ price相關字根，價值往下掉；動詞是depreciate"},{"id":"fin-6","theme":"fin","themeName":"財務、採購與物流","word":"expenditure","pos":"n.","meaning":"（正式）支出、開銷；常用於預算報告，比expense更正式書面","example":"Annual expenditure on raw materials increased due to rising freight costs.","exampleZh":"由於運費上漲，原物料的年度支出增加了。","collocations":["annual expenditure","capital expenditure","reduce expenditure"],"freq":"高頻","tip":"考題常見複合詞 capital expenditure（資本支出，簡稱CapEx）"},{"id":"fin-7","theme":"fin","themeName":"財務、採購與物流","word":"audit","pos":"n./v.","meaning":"（財務）稽核、審計；（動詞）稽核某帳目","example":"An external firm will audit the company's financial statements next month.","exampleZh":"一家外部事務所將於下個月稽核公司的財務報表。","collocations":["conduct an audit","audit the accounts","annual audit"],"freq":"高頻","tip":"名詞動詞同形，考題常考 auditor（稽核員）與audit的詞性轉換"},{"id":"fin-8","theme":"fin","themeName":"財務、採購與物流","word":"deficit","pos":"n.","meaning":"（財務）赤字、虧損；收入低於支出的差額","example":"The subsidiary reported a budget deficit for the third consecutive quarter.","exampleZh":"該子公司連續第三季申報預算赤字。","collocations":["budget deficit","trade deficit","run a deficit"],"freq":"中頻","tip":"反義詞是surplus（盈餘/剩餘），兩字常成對出現在財報題"},{"id":"fin-9","theme":"fin","themeName":"財務、採購與物流","word":"surplus","pos":"n./adj.","meaning":"（財務/物流）剩餘、過剩；可指資金盈餘或庫存過剩","example":"The warehouse is storing a surplus of unsold inventory from last season.","exampleZh":"倉庫存放著上季未售出的過剩庫存。","collocations":["budget surplus","surplus inventory","trade surplus"],"freq":"中頻","tip":"與deficit相對；財務指盈餘，物流指庫存過多"},{"id":"fin-10","theme":"fin","themeName":"財務、採購與物流","word":"remittance","pos":"n.","meaning":"（正式）匯款、匯付款項；常見於付款通知或發票結尾","example":"Kindly send your remittance to the account listed on the invoice.","exampleZh":"請將匯款匯至發票上所列的帳戶。","collocations":["send remittance","remittance advice","upon remittance"],"freq":"中頻","tip":"動詞remit（匯款）+ -ance名詞化；remittance advice是常考的「匯款通知單」"},{"id":"fin-11","theme":"fin","themeName":"財務、採購與物流","word":"quotation","pos":"n.","meaning":"（商業）報價（單）；供應商提供的價格條件","example":"We requested a quotation from the supplier before placing the bulk order.","exampleZh":"我們在下大量訂單前先向供應商索取了報價單。","collocations":["request a quotation","provide a quotation","quotation for bulk orders"],"freq":"高頻","tip":"口語常縮寫為quote（動詞/名詞皆可），quotation較正式書面"},{"id":"fin-12","theme":"fin","themeName":"財務、採購與物流","word":"consignment","pos":"n.","meaning":"（貿易）寄售；一批託運/待售的貨物","example":"The retailer agreed to sell the goods on a consignment basis.","exampleZh":"該零售商同意以寄售方式銷售這批貨物。","collocations":["on a consignment basis","a consignment of goods","consignment sale"],"freq":"中頻","tip":"consign（委託運送/寄售）+ -ment；片語on a consignment basis常考"},{"id":"fin-13","theme":"fin","themeName":"財務、採購與物流","word":"backorder","pos":"n./v.","meaning":"（物流）缺貨待補訂單；商品暫時缺貨但已下單等待補貨","example":"Several items in your order are on backorder due to supply shortages.","exampleZh":"由於供應短缺，您訂單中的幾項商品目前缺貨待補。","collocations":["on backorder","place a backorder","backorder status"],"freq":"中頻","tip":"back（延後）+ order，常與out of stock互相對照使用；也可作動詞，如'the item was backordered'"},{"id":"fin-14","theme":"fin","themeName":"財務、採購與物流","word":"expedite","pos":"v.","meaning":"（正式）加快處理、加速進行；常用於出貨或審批流程","example":"We can expedite your shipment for an additional handling fee.","exampleZh":"若加收額外處理費，我們可以加快您貨物的出貨速度。","collocations":["expedite the shipment","expedite the process","expedite delivery"],"freq":"高頻","tip":"字首ex-（向外）+ pedi（腳，如pedestrian）→加快腳步；商務email高頻動詞"},{"id":"fin-15","theme":"fin","themeName":"財務、採購與物流","word":"logistics","pos":"n.","meaning":"（企業）物流、後勤；貨物從生產到交付的整體管理","example":"Our logistics team coordinates shipments across multiple distribution centers.","exampleZh":"我們的物流團隊統籌協調多個配送中心的貨運。","collocations":["logistics team","supply chain logistics","handle logistics"],"freq":"極高頻","tip":"雖字尾是-s但當單數不可數名詞，動詞用單數：Logistics is complex"},{"id":"fin-16","theme":"fin","themeName":"財務、採購與物流","word":"distributor","pos":"n.","meaning":"（商業）經銷商、批發商；負責將產品配送至零售端的中間商","example":"The manufacturer partners with a regional distributor to reach more retailers.","exampleZh":"製造商與一家區域經銷商合作，以觸及更多零售商。","collocations":["regional distributor","authorized distributor","partner with a distributor"],"freq":"高頻","tip":"distribute（動詞，配送）+ -or（人）；別跟distribution（配送/分布，抽象名詞）混淆"},{"id":"fin-17","theme":"fin","themeName":"財務、採購與物流","word":"tariff","pos":"n.","meaning":"（貿易）關稅；政府對進出口商品徵收的稅","example":"Rising tariffs on imported components have increased our production costs.","exampleZh":"進口零組件的關稅上漲，已提高我們的生產成本。","collocations":["impose a tariff","tariffs on imports","reduce tariffs"],"freq":"中頻","tip":"與duty同義可互換使用，常搭配impose / lift等動詞"},{"id":"fin-18","theme":"fin","themeName":"財務、採購與物流","word":"malfunction","pos":"n./v.","meaning":"（設備）故障、失靈；機器未能正常運作","example":"Production was halted after a critical machine malfunctioned overnight.","exampleZh":"一台關鍵機器在夜間故障後，生產線因此停擺。","collocations":["equipment malfunction","machine malfunctioned","report a malfunction"],"freq":"中頻","tip":"mal-（不良的，如malpractice）+ function（運作）→運作不良"},{"id":"fin-19","theme":"fin","themeName":"財務、採購與物流","word":"durable","pos":"adj.","meaning":"（產品）耐用的、耐久的；常用於描述商品品質","example":"Customers prefer durable packaging that can withstand long-distance shipping.","exampleZh":"顧客偏好能承受長途運輸的耐用包裝。","collocations":["durable goods","highly durable","durable materials"],"freq":"中頻","tip":"durable goods（耐久財）是財經新聞常見複合詞，如汽車、家電"},{"id":"fin-20","theme":"fin","themeName":"財務、採購與物流","word":"comply with","pos":"phr. v.","meaning":"（正式）遵守、符合（規定/合約條款）","example":"All suppliers must comply with the company's quality control standards.","exampleZh":"所有供應商都必須遵守公司的品質管控標準。","collocations":["comply with regulations","comply with the contract","fail to comply"],"freq":"極高頻","tip":"介系詞固定搭配with，名詞形compliance；850分介系詞搭配必考題型"},{"id":"x-v1","theme":"office","themeName":"辦公室與人資","word":"agenda","pos":"n.","meaning":"議程、待辦事項清單","example":"Please review the agenda before tomorrow's staff meeting.","exampleZh":"請在明天的員工會議前先看過議程。","collocations":["set the agenda","hidden agenda","on the agenda"],"freq":"極高頻","tip":"常考 on the agenda（列入議程）；hidden agenda 指「別有用心」。"},{"id":"x-v2","theme":"office","themeName":"辦公室與人資","word":"memo","pos":"n.","meaning":"備忘錄、公告便箋","example":"A memo was circulated announcing the new dress code policy.","exampleZh":"一份備忘錄已發出，宣布新的服裝規定。","collocations":["circulate a memo","internal memo","memo to staff"],"freq":"高頻","tip":"memorandum 的縮寫，辦公室書信題型常見開頭 This memo is to inform..."},{"id":"x-v3","theme":"office","themeName":"辦公室與人資","word":"deadline","pos":"n.","meaning":"截止期限","example":"The submission deadline has been extended to next Friday.","exampleZh":"繳交截止期限已延到下週五。","collocations":["meet a deadline","miss a deadline","extend a deadline"],"freq":"極高頻","tip":"meet（趕上）vs. miss（錯過）deadline 是常見易混搭配。"},{"id":"x-v4","theme":"office","themeName":"辦公室與人資","word":"schedule","pos":"v./n.","meaning":"安排、排定時程；時程表","example":"The meeting has been rescheduled to accommodate the client's flight.","exampleZh":"會議已重新安排時間以配合客戶的航班。","collocations":["schedule a meeting","ahead of schedule","behind schedule"],"freq":"極高頻","tip":"ahead of schedule（超前進度）與 behind schedule（落後進度）常成對出題。"},{"id":"x-v5","theme":"office","themeName":"辦公室與人資","word":"confirm","pos":"v.","meaning":"確認","example":"Please confirm your attendance by replying to this email.","exampleZh":"請回覆此信以確認您的出席。","collocations":["confirm a reservation","confirm receipt","confirm attendance"],"freq":"極高頻","tip":"confirm 後直接加受詞，不加 that 子句時常見 confirm + N/Ving。"},{"id":"x-v6","theme":"office","themeName":"辦公室與人資","word":"postpone","pos":"v.","meaning":"延期、延後","example":"The product launch was postponed due to a supply shortage.","exampleZh":"因供應短缺，產品發表會被延後了。","collocations":["postpone a meeting","postpone until","postpone indefinitely"],"freq":"高頻","tip":"postpone 後接 Ving 不接 to V，與 delay 用法相近可互換。"},{"id":"x-v7","theme":"office","themeName":"辦公室與人資","word":"attach","pos":"v.","meaning":"附加、附上（檔案）","example":"I have attached the revised contract for your review.","exampleZh":"我已附上修訂後的合約供您審閱。","collocations":["attach a file","as attached","attach herewith"],"freq":"極高頻","tip":"email 開頭高頻句型 Please find attached...，注意介係詞 attach A to B。"},{"id":"x-v8","theme":"office","themeName":"辦公室與人資","word":"forward","pos":"v.","meaning":"轉寄、轉交","example":"Could you forward this invoice to the accounting department?","exampleZh":"可以請你把這張發票轉寄給會計部門嗎？","collocations":["forward an email","forward to","look forward to"],"freq":"高頻","tip":"注意 look forward to 的 to 是介係詞須接 Ving，勿與此處動詞用法混淆。"},{"id":"x-v9","theme":"office","themeName":"辦公室與人資","word":"notify","pos":"v.","meaning":"通知","example":"Employees will be notified of the schedule change by email.","exampleZh":"員工將會透過電子郵件被通知時程異動。","collocations":["notify someone of","prior notification","notify in advance"],"freq":"高頻","tip":"notify sb. of sth. 固定搭配，被動式 be notified of 是考點。"},{"id":"x-v10","theme":"office","themeName":"辦公室與人資","word":"revise","pos":"v.","meaning":"修訂、修改","example":"The budget proposal was revised after the finance team's feedback.","exampleZh":"預算提案在財務團隊回饋後已被修訂。","collocations":["revise a document","revised edition","revise upward/downward"],"freq":"高頻","tip":"revise（改內容）與 review（審閱）詞形相近但意義不同，勿混淆。"},{"id":"x-v11","theme":"office","themeName":"辦公室與人資","word":"recruit","pos":"v.","meaning":"招募","example":"The firm plans to recruit ten engineers by the end of the quarter.","exampleZh":"公司計畫在本季結束前招募十名工程師。","collocations":["recruit staff","recruit talent","actively recruit"],"freq":"高頻","tip":"名詞 recruit 指「新進人員」，recruitment 才是「招募」這個抽象名詞。"},{"id":"x-v12","theme":"office","themeName":"辦公室與人資","word":"candidate","pos":"n.","meaning":"應徵者、候選人","example":"Only three candidates were shortlisted for the final interview.","exampleZh":"只有三位應徵者進入最終面試名單。","collocations":["qualified candidate","shortlist candidates","potential candidate"],"freq":"高頻","tip":"shortlist candidates（列入決選名單）為人事類文章高頻搭配。"},{"id":"x-v13","theme":"office","themeName":"辦公室與人資","word":"résumé","pos":"n.","meaning":"履歷（表）","example":"Applicants must submit an updated résumé along with a cover letter.","exampleZh":"應徵者必須連同求職信一起繳交更新後的履歷。","collocations":["submit a résumé","update a résumé","résumé and cover letter"],"freq":"高頻","tip":"美式拼法常省略重音符寫成 resume，與「恢復」的 resume 為同形異義字。"},{"id":"x-v14","theme":"office","themeName":"辦公室與人資","word":"promotion","pos":"n.","meaning":"升遷；促銷","example":"She received a promotion to senior manager after five years.","exampleZh":"她任職五年後獲得升遷為資深經理。","collocations":["get a promotion","promotion to","sales promotion"],"freq":"高頻","tip":"多益中 promotion 常一詞兩義：人事升遷 vs. 行銷促銷，須看語境判斷。"},{"id":"x-v15","theme":"office","themeName":"辦公室與人資","word":"resign","pos":"v.","meaning":"辭職","example":"He decided to resign from his position at the end of the month.","exampleZh":"他決定在月底辭去他的職位。","collocations":["resign from","resign effective","tender one's resignation"],"freq":"高頻","tip":"resign from + 職位/公司，固定搭配介係詞 from 不可省略。"},{"id":"x-v16","theme":"office","themeName":"辦公室與人資","word":"benefits","pos":"n.","meaning":"（員工）福利","example":"The company offers competitive salaries and generous benefits.","exampleZh":"公司提供有競爭力的薪資與優渥的福利。","collocations":["employee benefits","benefits package","health benefits"],"freq":"高頻","tip":"人事廣告常見 benefits package（福利方案），恆用複數形。"},{"id":"x-v17","theme":"office","themeName":"辦公室與人資","word":"applicant","pos":"n.","meaning":"申請人、應徵者","example":"All applicants must have at least two years of relevant experience.","exampleZh":"所有申請人須具備至少兩年相關經驗。","collocations":["prospective applicant","applicant pool","eligible applicant"],"freq":"高頻","tip":"apply（動）→ applicant（人）→ application（申請書/程式），三者詞性須分清。"},{"id":"x-v18","theme":"office","themeName":"辦公室與人資","word":"interview","pos":"n./v.","meaning":"面試","example":"The HR manager will interview five candidates this afternoon.","exampleZh":"人資經理今天下午將面試五位應徵者。","collocations":["conduct an interview","job interview","interview for a position"],"freq":"極高頻","tip":"conduct an interview（進行面試）為固定搭配動詞，勿誤用 make/do。"},{"id":"x-v19","theme":"office","themeName":"辦公室與人資","word":"supervisor","pos":"n.","meaning":"主管、督導","example":"Any overtime request must be approved by your direct supervisor.","exampleZh":"任何加班申請都須經直屬主管核准。","collocations":["direct supervisor","report to a supervisor","under a supervisor"],"freq":"高頻","tip":"report to one's supervisor（向主管回報）是職場信件常見句型。"},{"id":"x-v20","theme":"office","themeName":"辦公室與人資","word":"implement","pos":"v.","meaning":"實施、執行","example":"The new safety policy will be implemented starting next month.","exampleZh":"新的安全政策將從下個月開始實施。","collocations":["implement a policy","implement changes","fully implemented"],"freq":"高頻","tip":"implement 強調「落實執行」計畫或政策，語感比 do 更正式。"},{"id":"x-v21","theme":"office","themeName":"辦公室與人資","word":"coordinate","pos":"v.","meaning":"協調、統籌","example":"She will coordinate logistics between the two branch offices.","exampleZh":"她將負責協調兩間分公司之間的後勤事務。","collocations":["coordinate with","coordinate efforts","coordinate a project"],"freq":"高頻","tip":"coordinate with sb.（與某人協調）固定搭配介係詞 with。"},{"id":"x-v22","theme":"office","themeName":"辦公室與人資","word":"address","pos":"n./v.","meaning":"地址；處理、演講","example":"The CEO will address employee concerns at the town hall meeting.","exampleZh":"執行長將在全員大會上針對員工的疑慮做出回應。","collocations":["address an issue","address the audience","keynote address"],"freq":"高頻","tip":"當動詞時意為「處理／向…致詞」，是多益一字多義高頻考點。"},{"id":"x-v23","theme":"office","themeName":"辦公室與人資","word":"issue","pos":"n./v.","meaning":"議題；發行、核發","example":"The IT department will issue new laptops to all remote workers.","exampleZh":"資訊部門將核發新筆電給所有遠端員工。","collocations":["issue a statement","raise an issue","issue a refund"],"freq":"高頻","tip":"當動詞常見 issue a refund/statement/permit，意為正式「發出」。"},{"id":"x-v24","theme":"office","themeName":"辦公室與人資","word":"party","pos":"n.","meaning":"派對；（合約）一方、當事人","example":"Both parties must sign the agreement before it becomes valid.","exampleZh":"雙方當事人都必須簽署協議，協議才生效。","collocations":["both parties","third party","the parties involved"],"freq":"高頻","tip":"合約文件中 party 指「締約方」，third party（第三方）為常見考點。"},{"id":"x-v25","theme":"office","themeName":"辦公室與人資","word":"affect","pos":"v.","meaning":"影響","example":"The power outage affected production for nearly two hours.","exampleZh":"停電影響了將近兩小時的生產作業。","collocations":["affect negatively","directly affect","affect the outcome"],"freq":"高頻","tip":"affect 是動詞「影響」，勿與名詞 effect（效果）詞性混淆，此為經典考點。"},{"id":"x-v26","theme":"office","themeName":"辦公室與人資","word":"effect","pos":"n.","meaning":"效果、影響","example":"The new policy took effect immediately after approval.","exampleZh":"新政策在核准後立即生效。","collocations":["take effect","have an effect on","in effect"],"freq":"高頻","tip":"take effect（生效）是固定片語；effect 當動詞時意為「達成」較少考。"},{"id":"x-v27","theme":"office","themeName":"辦公室與人資","word":"assure","pos":"v.","meaning":"向某人保證","example":"The manager assured the team that layoffs were not planned.","exampleZh":"經理向團隊保證目前並沒有裁員計畫。","collocations":["assure someone that","rest assured","assure sb. of sth."],"freq":"中頻","tip":"assure 後接「人」為受詞（assure sb.），與 ensure 的用法不同，常互相考。"},{"id":"x-v28","theme":"office","themeName":"辦公室與人資","word":"ensure","pos":"v.","meaning":"確保某事","example":"Please ensure that all documents are signed before the deadline.","exampleZh":"請確保所有文件在截止期限前都已簽署完畢。","collocations":["ensure that","ensure compliance","ensure quality"],"freq":"極高頻","tip":"ensure 後接「事」（that 子句），不可像 assure 一樣接人當受詞。"},{"id":"x-v29","theme":"office","themeName":"辦公室與人資","word":"considerable","pos":"adj.","meaning":"相當大的、可觀的","example":"The merger required a considerable amount of paperwork.","exampleZh":"這次合併需要相當大量的文書作業。","collocations":["considerable amount","considerable effort","considerable time"],"freq":"高頻","tip":"considerable 修飾「數量、程度」，與下方 considerate（體貼的）拼字相近易混淆。"},{"id":"x-v30","theme":"office","themeName":"辦公室與人資","word":"considerate","pos":"adj.","meaning":"體貼的、周到的","example":"It was considerate of him to reschedule the call for everyone.","exampleZh":"他很體貼地為大家重新安排了通話時間。","collocations":["considerate of","thoughtful and considerate","considerate gesture"],"freq":"中頻","tip":"考點：considerate 形容「人的態度」，considerable 形容「數量或程度」。"},{"id":"x-v31","theme":"office","themeName":"辦公室與人資","word":"be responsible for","pos":"phr.","meaning":"負責","example":"The logistics team is responsible for coordinating all shipments.","exampleZh":"物流團隊負責統籌所有貨運事宜。","collocations":["responsible for","take responsibility","hold responsible"],"freq":"極高頻","tip":"be responsible for + Ving/N，介係詞固定用 for，職缺說明中極常見。"},{"id":"x-v32","theme":"office","themeName":"辦公室與人資","word":"depend on","pos":"phr.","meaning":"取決於、依賴","example":"The final price will depend on the quantity ordered.","exampleZh":"最終價格將取決於訂購的數量。","collocations":["depend on","depending on","dependent on"],"freq":"高頻","tip":"depending on（視…而定）常放句首當分詞片語，是閱讀高頻連接詞。"},{"id":"x-v33","theme":"office","themeName":"辦公室與人資","word":"result in","pos":"phr.","meaning":"導致","example":"The delayed shipment resulted in several customer complaints.","exampleZh":"延遲出貨導致了幾起客戶投訴。","collocations":["result in","directly result in","result in a decrease"],"freq":"高頻","tip":"result in 後接「結果」，result from 後接「原因」，方向相反須分清。"},{"id":"x-v34","theme":"office","themeName":"辦公室與人資","word":"result from","pos":"phr.","meaning":"由...造成、源自於","example":"The delay resulted from a shortage of raw materials.","exampleZh":"這次延誤是由原物料短缺所造成。","collocations":["result from","directly result from","problems resulting from"],"freq":"高頻","tip":"與 result in 成對出題：A results in B＝B results from A，方向互換。"},{"id":"x-v35","theme":"office","themeName":"辦公室與人資","word":"benefit from","pos":"phr.","meaning":"從...中受益","example":"New employees can benefit from the mentorship program.","exampleZh":"新進員工能從導師制度中受益。","collocations":["benefit from","greatly benefit from","mutually benefit"],"freq":"高頻","tip":"benefit 當名詞是「福利」，此處為動詞片語 benefit from，詞性別搞混。"},{"id":"x-v36","theme":"office","themeName":"辦公室與人資","word":"in charge of","pos":"phr.","meaning":"負責、掌管","example":"Mr. Lin is in charge of the entire marketing department.","exampleZh":"林先生負責掌管整個行銷部門。","collocations":["in charge of","take charge of","person in charge"],"freq":"高頻","tip":"in charge of 後接名詞/Ving，語感比 be responsible for 更偏「掌權管理」。"},{"id":"x-v37","theme":"office","themeName":"辦公室與人資","word":"subordinate","pos":"n.","meaning":"下屬、部屬","example":"A good leader delegates tasks fairly among subordinates.","exampleZh":"優秀的領導者會公平地將任務分配給下屬。","collocations":["subordinate staff","direct subordinate","supervisor and subordinate"],"freq":"中頻","tip":"與 supervisor（主管）相對詞，也可當形容詞意為「次要的、從屬的」。"},{"id":"x-v38","theme":"office","themeName":"辦公室與人資","word":"colleague","pos":"n.","meaning":"同事","example":"She often collaborates with colleagues from the design team.","exampleZh":"她經常與設計團隊的同事合作。","collocations":["work with colleagues","fellow colleague","close colleague"],"freq":"高頻","tip":"colleague 較 coworker 正式，多用於書面或正式對話語境。"},{"id":"x-v39","theme":"office","themeName":"辦公室與人資","word":"coworker","pos":"n.","meaning":"同事","example":"He asked a coworker to cover his shift on Friday.","exampleZh":"他請一位同事在週五幫他代班。","collocations":["fellow coworker","coworker's help","among coworkers"],"freq":"中頻","tip":"coworker 語感較口語，等同 colleague，聽力對話中較常出現。"},{"id":"x-v40","theme":"office","themeName":"辦公室與人資","word":"recruitment","pos":"n.","meaning":"招募（活動）","example":"The recruitment process now includes an online skills test.","exampleZh":"招募流程現在包含一項線上技能測驗。","collocations":["recruitment process","recruitment campaign","recruitment agency"],"freq":"中頻","tip":"抽象名詞，recruitment agency（獵才仲介）為常見複合詞。"},{"id":"x-v41","theme":"office","themeName":"辦公室與人資","word":"vacancy","pos":"n.","meaning":"職缺、空缺","example":"There are currently three vacancies in the customer service team.","exampleZh":"客服團隊目前有三個職缺。","collocations":["job vacancy","fill a vacancy","no vacancy"],"freq":"中頻","tip":"fill a vacancy（補上職缺）常見於人事公告，飯店客滿也用 no vacancy。"},{"id":"x-v42","theme":"office","themeName":"辦公室與人資","word":"credential","pos":"n.","meaning":"證明文件、資歷","example":"Applicants should attach copies of their academic credentials.","exampleZh":"應徵者應附上學歷證明文件的影本。","collocations":["academic credentials","present credentials","professional credentials"],"freq":"中頻","tip":"常用複數 credentials，指足以證明資格的文件或經歷總稱。"},{"id":"x-v43","theme":"office","themeName":"辦公室與人資","word":"resume","pos":"n.","meaning":"履歷","example":"Please email your resume and references by Monday.","exampleZh":"請於週一前將履歷與推薦人資料以電子郵件寄送。","collocations":["email a resume","tailor a resume","resume screening"],"freq":"高頻","tip":"與動詞 resume（恢復、繼續）同形，此處為名詞「履歷」，讀音重音在前。"},{"id":"x-v44","theme":"office","themeName":"辦公室與人資","word":"cover letter","pos":"n.","meaning":"求職信","example":"A well-written cover letter can set you apart from other applicants.","exampleZh":"一封寫得好的求
