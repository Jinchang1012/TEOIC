稱單數動詞，句中已有主要動詞 are，再放一個動詞會造成雙動詞錯誤，且主詞 steps 是複數也不搭配單數動詞。","confuse 是原形動詞，同樣與 are 衝突形成雙動詞結構，不合語法。","confusing 是現在分詞作形容詞，表「令人困惑的」，主詞 steps 是引發感受的事物（非感受者），用 -ing 形而非 -ed 形，結構與語意皆正確，為本題正解。"],"keyWords":[{"word":"indicate","pos":"v.","meaning":"顯示、指出","freq":"極高頻"},{"word":"booking","pos":"n.","meaning":"預訂","freq":"高頻"},{"word":"surprisingly","pos":"adv.","meaning":"出乎意料地","freq":"中頻"}],"pattern":{"name":"be＋副詞＋形容詞（情緒分詞形容詞）","note":"be 動詞後的補語位置若前面有程度副詞（surprisingly、unnecessarily、extremely），只能填形容詞。描述事物本身的性質用 -ing 形（confusing），描述人的感受用 -ed 形（confused）。","example":"The assembly instructions are unnecessarily complicated."}},{"id":"x-q2","category":"conj","categoryName":"連接詞辨析","question":"【官方考點改編 No.102】Ms. Okafor has maintained an outstanding client-retention record ___ she transferred to the Kaohsiung branch three years ago.","options":["during","since","despite","except"],"answer":1,"difficulty":"基礎","translation":"自從三年前調到高雄分公司以來，Okafor 女士一直保持傑出的客戶留存紀錄。","explanation":"考點是連接詞與介係詞的辨析，搭配時態線索。定位兩個訊號：主要子句用現在完成式 has maintained，空格後是一個完整子句 she transferred...three years ago（過去式＋明確過去時間點）。「現在完成式＋since＋過去式子句」是固定句型，表示「自從……以來一直……」，正解為 since。during 和 despite 都是介係詞，後面只能接名詞（片語），不能接完整子句；except 表「除了」，語意完全不合，且同樣無法引導此類時間子句。官方原題即以 since 為正解、despite／except／during 為誘答，本題保留同一組誘答邏輯。","optionNotes":["during 是介係詞，後面須接名詞（during the meeting），不能接「主詞＋動詞」的完整子句，是只看中文語感「在……期間」的陷阱。","since 作連接詞可引導過去式時間子句，與主句的現在完成式呼應，表「自從……以來」，文法與語意皆正確，為本題正解。","despite 是介係詞，表「儘管」，後接名詞而非子句；且前後句之間不存在讓步轉折關係。","except 表「除了……之外」，語意與本句「持續保持紀錄」完全不相關，屬純語意誘答。"],"keyWords":[{"word":"maintain","pos":"v.","meaning":"維持、保持","freq":"極高頻"},{"word":"transfer","pos":"v.","meaning":"調職、轉移","freq":"高頻"},{"word":"retention","pos":"n.","meaning":"保留、留存","freq":"中頻"}],"pattern":{"name":"現在完成式＋since＋過去式子句","note":"看到主要子句是 have/has＋p.p.，而空格後是過去式子句加明確的過去時間（two years ago、last April），十之八九選 since。","example":"Sales have doubled since the company launched its mobile app."}},{"id":"x-q3","category":"pos","categoryName":"詞性","question":"【官方考點改編 No.103】The firm's professional-development guidelines state that ___ reviewing industry publications strengthens analytical judgment.","options":["consistent","consistency","consistently","consist"],"answer":2,"difficulty":"中階","translation":"這間公司的專業發展準則指出，持續固定地研讀產業刊物能強化分析判斷力。","explanation":"考點是「副詞修飾動名詞」。定位 that 子句的結構：___ reviewing industry publications strengthens...，其中 reviewing industry publications 是動名詞片語作子句主詞，strengthens 是子句動詞。動名詞保留動詞性質，要用副詞修飾，故空格填副詞 consistently（持續固定地）。誘答核心在於很多人看到後面是 V-ing 就以為那是名詞、想配形容詞 consistent——但 reviewing 後面帶了受詞 industry publications，證明它是動名詞而非純名詞，必須用副詞。consistency 是名詞，會與動名詞片語撞成兩個主詞成分；consist 是動詞原形，放進來會造成雙動詞。此結構與官方原題（副詞＋動名詞主詞＋單數動詞）完全同型。","optionNotes":["consistent 是形容詞，只能修飾名詞；reviewing 在此帶受詞、是動名詞（動詞性質），須用副詞修飾，這是本題最強的誘答選項。","consistency 是名詞，填入後與 reviewing... 形成兩個名詞成分疊放，句構破碎。","consistently 是副詞，正確修飾動名詞 reviewing，整個動名詞片語作主詞、搭配單數動詞 strengthens，為本題正解。","consist 是動詞原形，子句已有動詞 strengthens，填入會造成雙動詞錯誤；且 consist 為不及物動詞，也無法直接接 reviewing。"],"keyWords":[{"word":"guidelines","pos":"n.","meaning":"準則、指導方針","freq":"高頻"},{"word":"publication","pos":"n.","meaning":"刊物、出版品","freq":"高頻"},{"word":"analytical","pos":"adj.","meaning":"分析的","freq":"中頻"}],"pattern":{"name":"副詞＋動名詞（V-ing）主詞","note":"動名詞作主詞時仍保有動詞性質，前面用副詞修飾而非形容詞。判斷關鍵：V-ing 後面若接受詞，它一定是動名詞。","example":"Carefully proofreading each report prevents costly errors."}},{"id":"x-q4","category":"pron","categoryName":"代名詞與關係詞","question":"【官方考點改編 No.104】Among ___ honored at this year's regional trade exhibition were chief engineer Marta Kowalski and account manager Felix Ruiz.","options":["they","who","those","whose"],"answer":2,"difficulty":"中階","translation":"在今年區域貿易展中獲得表揚的人士當中，包括總工程師 Marta Kowalski 與客戶經理 Felix Ruiz。","explanation":"考點是「those＋過去分詞」表「……的人們」，外加地點副詞片語開頭的倒裝句。定位句構：Among ___ honored... were A and B 是倒裝句，正常語序為 A and B were among ___ honored...。介係詞 among 後面需要受詞，honored at... 是過去分詞片語作後位修飾，能被分詞修飾又能當受詞的只有指示代名詞 those（= the people who were honored，獲表揚的那些人）。they 是主格，不能作介係詞受詞；who 是關係代名詞，前面沒有先行詞可以依附；whose 是所有格關係詞，後面必須接名詞。官方原題正解同為 those，誘答組合 who／whose／they 完全對應。","optionNotes":["they 是主格代名詞，不能放在介係詞 among 之後作受詞（受格也應是 them，且 them honored 亦不成立此結構）。","who 是關係代名詞，必須有先行詞（the employees who...），此處 among 後面沒有任何先行詞，無所依附。","those 作指示代名詞指「那些人」，後接過去分詞 honored 作修飾（= those who were honored），並作 among 的受詞，為本題正解。","whose 是所有格關係詞，後面必須緊接名詞（whose designs），此處直接接分詞，結構不合。"],"keyWords":[{"word":"honor","pos":"v.","meaning":"表揚、給予榮譽","freq":"高頻"},{"word":"exhibition","pos":"n.","meaning":"展覽","freq":"高頻"},{"word":"account manager","pos":"n.","meaning":"客戶經理","freq":"中頻"}],"pattern":{"name":"Among those＋過去分詞＋倒裝","note":"「Among those p.p. were/was＋主詞」是多益常見倒裝句型，those 指「符合該條件的人們」。看到 Among ___＋分詞，優先想 those。","example":"Among those invited to the ceremony were several city officials."}},{"id":"x-q5","category":"word","categoryName":"字彙辨析","question":"【官方考點改編 No.105】Every soap sold at Meadowlane Naturals is made from plant-based oils and contains no ___ fragrances.","options":["immediate","artificial","reasonable","assumed"],"answer":1,"difficulty":"中階","translation":"Meadowlane Naturals 販售的每一塊香皂都以植物性油脂製成，不含任何人工香料。","explanation":"考點是純字彙語意辨析：四個選項都是形容詞、文法上都放得進空格，只能靠語意選答。定位語意線索：前半句強調 plant-based oils（植物性油脂＝天然），and 之後說 contains no ___ fragrances，與「天然」形成對比的是「人工的」，故選 artificial（人工合成的），對應官方原題以 synthetic（合成的）與 natural materials 對比的邏輯。immediate（立即的）、reasonable（合理的）、assumed（假定的）修飾 fragrances 都不構成通順語意。這類題目的解法是抓句中的對比或呼應字眼——本題的天然（plant-based）對人工（artificial）。","optionNotes":["immediate 意為「立即的」，用於時間概念（immediate response），修飾香料語意不通。","artificial 意為「人工的、合成的」，與前文 plant-based（植物性、天然）形成正反呼應，「不含人工香料」語意完整，為本題正解。","reasonable 意為「合理的」，通常修飾價格或要求（reasonable prices），與香料搭配不成立。","assumed 意為「假定的、假冒的」，用於名稱或身分（an assumed name），修飾香料不知所云。"],"keyWords":[{"word":"artificial","pos":"adj.","meaning":"人工的、人造的","freq":"高頻"},{"word":"fragrance","pos":"n.","meaning":"香味、香料","freq":"中頻"},{"word":"plant-based","pos":"adj.","meaning":"植物性的","freq":"中頻"}],"pattern":{"name":"對比線索解字彙題","note":"字彙題先找句內的對比或同義呼應：natural/plant-based 對 artificial/synthetic；官方樣題與本題都是「天然材質…不含〇〇」的對比結構。","example":"The juice is sweetened naturally and contains no artificial flavors."}},{"id":"xb-q1","category":"pos","categoryName":"詞性","question":"The swimming pool is ___ every day this summer.","options":["open","opens","opener","opening"],"answer":0,"difficulty":"基礎","translation":"這個游泳池今年夏天每天都開放。","explanation":"暖身題（Bridge 考點改編）。考點：be 動詞後接形容詞當主詞補語。空格前是 is，後面沒有受詞，句意是描述泳池的狀態「開放的」，要用形容詞 open 當主詞補語。opens 是動詞第三人稱單數形式，不能跟在 be 動詞後面重複當謂語；opener（開瓶器、開場者）與 opening（開幕、開口）都是名詞，放在此處語意不通。","optionNotes":["open 是形容詞，意思是「開放的」，放在 be 動詞後面當主詞補語，正確描述泳池的狀態，為本題正解。","opens 是動詞的第三人稱單數形式，句子已經有 is 當謂語動詞，不能再放一個動詞，是誤把空格當成謂語動詞的陷阱。","opener 是名詞，指「開瓶器」或「開場的人／事物」，與泳池狀態的語意不符。","opening 作名詞指「開幕、空缺、開口」，作形容詞則修飾比賽等，皆不符合「泳池是開放的」這個語意。"],"keyWords":[{"word":"pool","pos":"n.","meaning":"游泳池","freq":"高頻"},{"word":"open","pos":"adj.","meaning":"開放的、營業中的","freq":"極高頻"}]},{"id":"xb-q2","category":"pron","categoryName":"代名詞","question":"Carlos borrowed ___ neighbor's ladder to clean the roof.","options":["he","his","him","himself"],"answer":1,"difficulty":"基礎","translation":"Carlos 借了他鄰居的梯子來清理屋頂。","explanation":"暖身題（Bridge 考點改編）。考點：所有格代名詞修飾名詞。空格後面是 neighbor's ladder（名詞片語），空格要填一個能修飾名詞、表示「屬於誰」的所有格形容詞，his 意思是「他的」，符合語法與語意。he 是主格，不能放在名詞前面當修飾語；him 是受格，同樣不能修飾名詞；himself 是反身代名詞，用來強調主詞或作反身受詞，不能修飾名詞。","optionNotes":["he 是主格代名詞，只能當句子主詞，不能放在名詞前面修飾名詞，是誤把所有格與主格混淆的陷阱。","his 是所有格形容詞，意思是「他的」，直接修飾後面的 neighbor，為本題正解。","him 是受格代名詞，用在動詞或介系詞後面當受詞，不能修飾名詞。","himself 是反身代名詞，用來表示「他自己」，不具備修飾名詞的所有格功能，是誤用反身代名詞的陷阱。"],"keyWords":[{"word":"borrow","pos":"v.","meaning":"借入","freq":"高頻"},{"word":"ladder","pos":"n.","meaning":"梯子","freq":"中頻"}]},{"id":"xb-q3","category":"word","categoryName":"字彙選擇","question":"Please slice the bread ___ so that each piece is the same size.","options":["lately","far","evenly","very"],"answer":2,"difficulty":"基礎","translation":"請把麵包切得平均一點,讓每一片大小相同。","explanation":"暖身題（Bridge 考點改編）。考點：副詞字義辨析。空格修飾動詞 slice（切），後半句解釋「讓每一片大小相同」，代表切的方式要「平均、均勻」，evenly 正是「平均地、均勻地」的意思，語意最吻合。lately（最近）用於時間副詞，與「切的方式」無關；far（遠、大幅地）通常修飾距離或比較級；very（非常）是程度副詞，只能修飾形容詞或副詞，不能單獨修飾動詞 slice。","optionNotes":["lately 意思是「最近」，是時間副詞，與句子描述「切的方式」的語意不符。","far 意思是「遠、大幅地」，常用於距離或修飾比較級，不能表達「均勻地切」。","evenly 意思是「平均地、均勻地」，修飾動詞 slice，說明切法讓每片大小一致，為本題正解。","very 是程度副詞，只能修飾形容詞或副詞（如 very good），不能直接修飾動詞 slice，是誤用程度副詞的陷阱。"],"keyWords":[{"word":"slice","pos":"v./n.","meaning":"切片；薄片","freq":"中頻"},{"word":"evenly","pos":"adv.","meaning":"平均地、均勻地","freq":"中頻"}]},{"id":"xb-q4","category":"pos","categoryName":"詞性","question":"The heavy rain caused several ___ on the mountain road last night.","options":["landslide","landslides","landslid","landsliding"],"answer":1,"difficulty":"基礎","translation":"昨晚的豪雨在山路上造成了好幾起土石流。","explanation":"暖身題（Bridge 考點改編）。考點：名詞單複數。空格前有 several（好幾個，後面須接複數可數名詞），空格是動詞 caused 的受詞，要填名詞 landslide（土石流）的複數形 landslides，才能與 several 的數量搭配一致。landslide 是單數名詞，不能跟在 several 後面；landslid 不是正確的英文詞形（不存在此字）；landsliding 若視為動名詞則不能被 several 修飾、也不符合「造成好幾起土石流」的具體事件語意。","optionNotes":["landslide 是單數名詞，與前面表達複數概念的 several 不搭配，是忽略單複數一致的陷阱。","landslides 是複數名詞，與 several 搭配一致，表示「好幾起土石流事件」，為本題正解。","landslid 不是標準英文單字形式,此選項為干擾用的錯誤拼寫。","landsliding 若當名詞使用通常指不可數的「山崩現象」整體概念，不能被 several 這種計數修飾語直接修飾，也无法表達「好幾起」的具體事件數量。"],"keyWords":[{"word":"landslide","pos":"n.","meaning":"土石流、山崩","freq":"中頻"},{"word":"several","pos":"det.","meaning":"好幾個的","freq":"高頻"}]},{"id":"xb-q5","category":"verb","categoryName":"動詞片語","question":"Before you submit the application, please ___ this form completely.","options":["pay back","try on","fill out","give away"],"answer":2,"difficulty":"基礎","translation":"在您提交申請之前,請完整地填寫這份表格。","explanation":"暖身題（Bridge 考點改編）。考點：動詞片語搭配。空格受詞是 this form（表格），且句意是「提交申請前要先……這份表格」，fill out 意思是「填寫（表格）」，是與 form 最自然的固定搭配，也對應官方原題同類考法。pay back 指「償還（金錢）」；try on 指「試穿（衣物）」；give away 指「贈送、洩漏」，三者的受詞語意都與「表格」不搭配。","optionNotes":["pay back 意思是「償還」，受詞通常是金錢或債務，不能用於表格。","try on 意思是「試穿」，受詞通常是衣物或鞋子，與表格無關。","fill out 意思是「填寫（表格、文件）」，與 form 是最自然的固定搭配，為本題正解。","give away 意思是「贈送」或「洩漏（秘密）」，受詞語意都與填寫表格的情境不符。"],"keyWords":[{"word":"submit","pos":"v.","meaning":"提交","freq":"高頻"},{"word":"fill out","pos":"phr.","meaning":"填寫（表格）","freq":"極高頻"},{"word":"application","pos":"n.","meaning":"申請（書）","freq":"極高頻"}]},{"id":"x-q6","category":"pos","categoryName":"詞性","question":"The project manager requested a ___ evaluation of the new software platform before deployment.","options":["comprehension","comprehensive","comprehensively","comprehend"],"answer":1,"difficulty":"基礎","translation":"專案經理在部署前要求對新軟體平台進行一次全面的評估。","explanation":"空格夾在不定冠詞 a 與名詞 evaluation 之間,必須填形容詞修飾 evaluation。comprehensive(全面的)語意通順,符合「a + adj + n」結構。","optionNotes":["comprehension 是名詞,若填入會造成 evaluation 前又疊一個名詞,兩個名詞不能並列。","comprehensive 為形容詞(全面的),修飾 evaluation,結構與語意皆正確,為本題正解。","comprehensively 是副詞,副詞不能修飾名詞,放在 a 與 evaluation 之間不合文法。","comprehend 是動詞原形,不能放在冠詞與名詞之間修飾名詞,是誤把空格當動詞的陷阱。"],"keyWords":[{"word":"comprehensive","pos":"adj.","meaning":"全面的、詳盡的","freq":"高頻"},{"word":"deployment","pos":"n.","meaning":"部署、實施","freq":"中頻"},{"word":"evaluation","pos":"n.","meaning":"評估","freq":"高頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"不定冠詞 a/an 與名詞之間的空格,通常要填形容詞來修飾後面的名詞。","example":"The team conducted a thorough review of the contract."}},{"id":"x-q7","category":"pos","categoryName":"詞性","question":"The engineering team worked ___ to resolve the database architecture glitch before the client meeting.","options":["diligently","diligented","diligence","diligent"],"answer":0,"difficulty":"基礎","translation":"工程團隊在客戶會議前勤奮地努力解決資料庫架構的故障。","explanation":"worked 是不及物動詞,句子主結構已完整,空格用來修飾 worked 說明工作的方式,須用副詞。diligently(勤奮地)符合語意與文法。","optionNotes":["diligently 為副詞,修飾動詞 worked,說明工作方式,結構語意皆正確,為本題正解。","diligented 不是英文正確的詞形變化(diligent 不是動詞,無法加 -ed),為不存在的誘答字。","diligence 是名詞,不能放在完整不及物動詞後面修飾動詞。","diligent 是形容詞,只能修飾名詞或作補語,不能直接修飾動詞 worked。"],"keyWords":[{"word":"diligently","pos":"adv.","meaning":"勤奮地","freq":"中頻"},{"word":"resolve","pos":"v.","meaning":"解決","freq":"極高頻"},{"word":"glitch","pos":"n.","meaning":"故障、小問題","freq":"中頻"}],"pattern":{"name":"不及物動詞+副詞","note":"當動詞後面沒有受詞、句子結構已完整時,空格通常要填副詞修飾該動詞。","example":"The staff responded quickly to the emergency."}},{"id":"x-q8","category":"pos","categoryName":"詞性","question":"Please obtain written ___ from the division head before purchasing additional laboratory equipment.","options":["authorized","authorize","authorization","authorizingly"],"answer":2,"difficulty":"基礎","translation":"在購買額外的實驗室設備之前,請先取得部門主管的書面授權。","explanation":"obtain 是及物動詞,written 是形容詞修飾後面的名詞,故空格須填名詞作為 obtain 的受詞。authorization(授權)符合語意與結構。","optionNotes":["authorized 是過去分詞/形容詞,不能單獨作受詞使用。","authorize 是動詞原形,不能作為 obtain 的受詞,且與前面的形容詞 written 不搭。","authorization 是名詞(授權),作 obtain 的受詞,並與 written 形成「形容詞+名詞」修飾關係,為本題正解。","authorizingly 不是標準英文詞形,為不存在的誘答字。"],"keyWords":[{"word":"authorization","pos":"n.","meaning":"授權、批准","freq":"高頻"},{"word":"division head","pos":"n.","meaning":"部門主管","freq":"中頻"},{"word":"laboratory equipment","pos":"n.","meaning":"實驗室設備","freq":"中頻"}],"pattern":{"name":"及物動詞+受詞(名詞)","note":"及物動詞後面必須接名詞作受詞;若受詞前有形容詞,空格通常仍是名詞。","example":"The manager obtained formal approval before signing the deal."}},{"id":"x-q9","category":"pos","categoryName":"詞性","question":"The newly installed automation system operates more ___ than the previous model.","options":["efficient","efficiency","efficiencies","efficiently"],"answer":3,"difficulty":"基礎","translation":"新安裝的自動化系統運作得比舊型號更有效率。","explanation":"operates 是不及物動詞,more ___ than 是比較級結構修飾動詞,須填副詞。efficiently(有效率地)符合語意與文法。","optionNotes":["efficient 是形容詞,不能直接修飾動詞 operates。","efficiency 是名詞,不能放在「more___than」的副詞比較結構中修飾動詞。","efficiencies 是名詞複數,同樣不能修飾動詞。","efficiently 為副詞,修飾動詞 operates,搭配比較級 more...than,結構正確,為本題正解。"],"keyWords":[{"word":"efficiently","pos":"adv.","meaning":"有效率地","freq":"高頻"},{"word":"automation","pos":"n.","meaning":"自動化","freq":"中頻"},{"word":"previous","pos":"adj.","meaning":"先前的","freq":"高頻"}],"pattern":{"name":"more+副詞+than比較結構","note":"修飾動詞的比較級用 more + 副詞 + than,而非形容詞。","example":"The new engine performs more smoothly than the old one."}},{"id":"x-q10","category":"pos","categoryName":"詞性","question":"The financial report provides a highly ___ analysis of the semiconductor market trends.","options":["accurate","accuracy","accurately","accurateness"],"answer":0,"difficulty":"基礎","translation":"這份財務報告提供了對半導體市場趨勢高度精確的分析。","explanation":"程度副詞 highly 修飾後面的形容詞,而形容詞再修飾名詞 analysis,故空格填形容詞。accurate(準確的)符合「highly+adj+n」結構。","optionNotes":["accurate 是形容詞,與 highly 形成副詞修飾形容詞的正確搭配,再共同修飾名詞 analysis,為本題正解。","accuracy 是名詞,highly 不能修飾名詞,且名詞不能疊放在 analysis 前。","accurately 是副詞,副詞不能修飾名詞 analysis。","accurateness 也是名詞,同樣不符合 highly 後面須接形容詞的規則。"],"keyWords":[{"word":"accurate","pos":"adj.","meaning":"準確的","freq":"高頻"},{"word":"semiconductor","pos":"n.","meaning":"半導體","freq":"高頻"},{"word":"trend","pos":"n.","meaning":"趨勢","freq":"高頻"}],"pattern":{"name":"程度副詞+形容詞+名詞","note":"highly/extremely 等程度副詞後面接形容詞,再一起修飾名詞。","example":"The company published a highly detailed forecast of next year's sales."}},{"id":"x-q11","category":"pos","categoryName":"詞性","question":"The lead developer suggested a ___ modification to the source code.","options":["minority","minor","minored","minonly"],"answer":1,"difficulty":"基礎","translation":"首席開發人員建議對原始碼進行一個小幅的修改。","explanation":"空格夾在冠詞 a 與名詞 modification 之間,須填形容詞。minor(小的、次要的)語意通順,符合結構。","optionNotes":["minority 是名詞(少數),不能放在冠詞與名詞之間修飾另一個名詞。","minor 是形容詞(小的、次要的),修飾 modification,結構語意皆正確,為本題正解。","minored 不是標準詞形(minor 作動詞用法罕見且此處不符句意),為誘答項。","minonly 不是英文正確單字,是由 minor 誤造出的不存在誘答字,可直接排除。"],"keyWords":[{"word":"minor","pos":"adj.","meaning":"次要的、小的","freq":"高頻"},{"word":"modification","pos":"n.","meaning":"修改","freq":"中頻"},{"word":"source code","pos":"n.","meaning":"原始碼","freq":"中頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"a/an 與名詞之間的空格通常填形容詞。","example":"The engineer proposed a minor adjustment to the schedule."}},{"id":"x-q12","category":"pos","categoryName":"詞性","question":"All participants must fill out the registration form ___.","options":["completely","complete","completing","completion"],"answer":0,"difficulty":"基礎","translation":"所有參加者都必須完整地填寫報名表。","explanation":"fill out the registration form 已是完整的「動詞+受詞」結構,句尾空格用來修飾動詞 fill out,說明填寫的完整程度,須用副詞。completely(完整地)符合語意。","optionNotes":["completely 為副詞,修飾動詞片語 fill out,表示「完整地」填寫,為本題正解。","complete 是形容詞或動詞原形,不能放在完整句尾修飾動詞。","completing 是動名詞/現在分詞,若填入會使句尾多出一個不合語法的分詞,語意也不通。","completion 是名詞,句尾已無介系詞承接,無法安插名詞。"],"keyWords":[{"word":"completely","pos":"adv.","meaning":"完全地、徹底地","freq":"極高頻"},{"word":"registration form","pos":"n.","meaning":"報名表","freq":"高頻"},{"word":"participant","pos":"n.","meaning":"參加者","freq":"高頻"}],"pattern":{"name":"動詞+受詞+副詞(句尾修飾)","note":"完整的「主詞+動詞+受詞」句子後面加副詞,修飾整個動作的方式或程度。","example":"Employees should complete the survey honestly."}},{"id":"x-q13","category":"pos","categoryName":"詞性","question":"The board announced the ___ of the new regional research facility.","options":["expansively","expansion","expand","expansive"],"answer":1,"difficulty":"基礎","translation":"董事會宣布了新區域研發中心的擴建計畫。","explanation":"announced 是及物動詞,the 與 of 之間需要填名詞作為 announced 的受詞核心。expansion(擴建、擴張)符合語意與結構。","optionNotes":["expansively 是副詞,不能放在冠詞後面作名詞用。","expansion 是名詞,作 announced 的受詞,且能接 of 引出的介系詞片語,為本題正解。","expand 是動詞原形,不能放在冠詞 the 與介系詞 of 之間作受詞。","expansive 是形容詞,不能單獨作受詞使用。"],"keyWords":[{"word":"expansion","pos":"n.","meaning":"擴張、擴建","freq":"高頻"},{"word":"facility","pos":"n.","meaning":"設施、廠房","freq":"高頻"},{"word":"regional","pos":"adj.","meaning":"區域的","freq":"中頻"}],"pattern":{"name":"the+名詞+of","note":"the ___ of... 結構中,空格通常填名詞,搭配 of 引出的介系詞片語說明該名詞的內容。","example":"The company celebrated the completion of the new factory."}},{"id":"x-q14","category":"pos","categoryName":"詞性","question":"Subscribers will receive ___ notifications regarding server upgrades.","options":["periodically","period","periodic","periodical"],"answer":2,"difficulty":"基礎","translation":"訂閱者將會收到有關伺服器升級的定期通知。","explanation":"空格修飾複數名詞 notifications,須填形容詞。periodic(定期的)語意通順,符合「adj+n」結構。","optionNotes":["periodically 是副詞,不能修飾名詞。","period 是名詞,不能修飾另一個名詞 notifications。","periodic 是形容詞(定期的),修飾 notifications,結構語意正確,為本題正解。","periodical 雖也可作形容詞,但更常作名詞(期刊),此處語意不如 periodic 精準且易生混淆,故非最佳答案(以官方標準 periodic 為正解)。"],"keyWords":[{"word":"periodic","pos":"adj.","meaning":"定期的、週期性的","freq":"中頻"},{"word":"notification","pos":"n.","meaning":"通知","freq":"高頻"},{"word":"subscriber","pos":"n.","meaning":"訂閱者","freq":"中頻"}],"pattern":{"name":"形容詞+複數名詞","note":"名詞前的空格若無其他線索,通常直接填形容詞修飾。","example":"The system sends automatic alerts to registered users."}},{"id":"x-q15","category":"pos","categoryName":"詞性","question":"The legal consultant reviewed the terms to ensure full ___ with local codes.","options":["compliance","compliantly","compliant","comply"],"answer":0,"difficulty":"基礎","translation":"法律顧問審閱條款,以確保完全符合當地法規。","explanation":"形容詞 full 後方須接名詞,且此名詞作 ensure 的受詞。compliance(符合、遵守)符合語意與結構,並常與 with 連用（compliance with）。","optionNotes":["compliance 是名詞,與 full 形成「adj+n」結構,並可接 with 引出對象,為本題正解。","compliantly 是副詞,同樣不能接在 full 之後作受詞。","compliant 是形容詞,不能放在另一個形容詞 full 後面。","comply 是動詞原形,不能接在形容詞 full 後面作受詞。"],"keyWords":[{"word":"compliance","pos":"n.","meaning":"合規、遵守","freq":"極高頻"},{"word":"local codes","pos":"n.","meaning":"當地法規","freq":"中頻"},{"word":"terms","pos":"n.","meaning":"條款","freq":"高頻"}],"pattern":{"name":"形容詞+名詞(compliance with)","note":"compliance with 是固定搭配,表示「符合某規範」,前面常加 full/strict 等形容詞。","example":"The factory ensures full compliance with safety regulations."}},{"id":"x-q16","category":"pos","categoryName":"詞性","question":"The technical documentation was ___ prepared by the senior staff.","options":["carefulness","care","careful","carefully"],"answer":3,"difficulty":"基礎","translation":"這份技術文件是由資深員工細心準備的。","explanation":"was...prepared 是被動語態動詞片語,中間空格用來修飾動詞,須填副詞。carefully(仔細地)符合語意與文法。","optionNotes":["carefulness 是名詞,不能修飾動詞。","care 是名詞或動詞原形,同樣不能插入被動語態中間。","careful 是形容詞,不能插入 be 動詞與過去分詞之間修飾動詞。","carefully 為副詞,置於 was 與 prepared 之間修飾整個被動動詞片語,為本題正解。"],"keyWords":[{"word":"carefully","pos":"adv.","meaning":"仔細地、小心地","freq":"極高頻"},{"word":"documentation","pos":"n.","meaning":"文件、文檔","freq":"高頻"},{"word":"senior staff","pos":"n.","meaning":"資深員工","freq":"中頻"}],"pattern":{"name":"be+副詞+過去分詞","note":"被動語態 be+p.p. 中間可插入副詞,修飾動作發生的方式。","example":"The report was thoroughly reviewed before submission."}},{"id":"x-q17","category":"pos","categoryName":"詞性","question":"The company offers an ___ training program for entry-level developers.","options":["intensely","intensify","intensive","intensity"],"answer":2,"difficulty":"基礎","translation":"公司為初階開發人員提供密集的培訓課程。","explanation":"空格在冠詞 an 與名詞片語 training program 之間,須填形容詞修飾 program。intensive(密集的)符合語意與結構。","optionNotes":["intensely 是副詞,不能修飾名詞。","intensify 是動詞原形,不能作形容詞用。","intensive 是形容詞(密集的),修飾 training program,結構語意皆正確,為本題正解。","intensity 是名詞,不能放在冠詞後面修飾另一個名詞片語。"],"keyWords":[{"word":"intensive","pos":"adj.","meaning":"密集的","freq":"高頻"},{"word":"entry-level","pos":"adj.","meaning":"初階的","freq":"中頻"},{"word":"training program","pos":"n.","meaning":"培訓課程","freq":"高頻"}],"pattern":{"name":"冠詞+形容詞+名詞片語","note":"an ___ + 名詞片語 結構,空格填形容詞修飾整個名詞片語。","example":"The firm launched an extensive marketing campaign."}},{"id":"x-q18","category":"pos","categoryName":"詞性","question":"The system administrator monitors the cloud server network ___.","options":["continuity","continuation","continuously","continuous"],"answer":2,"difficulty":"基礎","translation":"系統管理員持續監控雲端伺服器網路。","explanation":"monitors the cloud server network 已是完整的「動詞+受詞」結構,句尾空格修飾動詞 monitors,須填副詞。continuously(持續地)符合語意。","optionNotes":["continuity 是名詞,句尾已無介系詞可承接,無法安插。","continuation 也是名詞,同樣不符合句尾修飾動詞的需求。","continuously 為副詞,修飾動詞 monitors,說明監控的持續性,為本題正解。","continuous 是形容詞,不能修飾動詞,也不能放在句尾單獨使用。"],"keyWords":[{"word":"continuously","pos":"adv.","meaning":"持續地、不斷地","freq":"高頻"},{"word":"administrator","pos":"n.","meaning":"管理員","freq":"高頻"},{"word":"monitor","pos":"v.","meaning":"監控","freq":"高頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"及物動詞完成受詞後,句尾常加副詞修飾動作方式。","example":"The technician checks the equipment regularly."}},{"id":"x-q19","category":"pos","categoryName":"詞性","question":"Management expressed deep ___ with the initial prototype design.","options":["satisfaction","satisfactory","satisfy","satisfactorily"],"answer":0,"difficulty":"基礎","translation":"管理層對最初的原型設計表示深切的滿意。","explanation":"形容詞 deep 修飾後面的名詞,且該名詞作 expressed 的受詞。satisfaction(滿意)符合「adj+n」結構與語意。","optionNotes":["satisfaction 是名詞,與 deep 形成「adj+n」結構,作 expressed 的受詞,為本題正解。","satisfactory 是形容詞,不能放在另一個形容詞 deep 之後。","satisfy 是動詞原形,不能接在形容詞 deep 後面作受詞。","satisfactorily 是副詞,同樣不能作受詞使用。"],"keyWords":[{"word":"satisfaction","pos":"n.","meaning":"滿意","freq":"極高頻"},{"word":"prototype","pos":"n.","meaning":"原型","freq":"中頻"},{"word":"express","pos":"v.","meaning":"表達","freq":"高頻"}],"pattern":{"name":"形容詞+抽象名詞","note":"deep/great/strong 等形容詞常修飾表達情感的抽象名詞。","example":"The client expressed strong interest in the proposal."}},{"id":"x-q20","category":"pos","categoryName":"詞性","question":"The logistics supervisor handles shipping schedules with great ___.","options":["precisely","precise","precisest","precision"],"answer":3,"difficulty":"基礎","translation":"物流主管以極高的精確度處理出貨時程。","explanation":"介系詞 with 後方須接名詞,而 great 修飾該名詞。precision(精確度)符合「with+adj+n」結構。","optionNotes":["precisely 是副詞,不能作介系詞的受詞。","precise 是形容詞,不能直接作介系詞 with 的受詞。","precisest 不是標準比較/最高級用法(precise 屬多音節形容詞,最高級應為 most precise),為不存在的誘答形式。","precision 是名詞,作 with 的受詞,並與 great 形成「adj+n」修飾,為本題正解。"],"keyWords":[{"word":"precision","pos":"n.","meaning":"精確度、精密度","freq":"中頻"},{"word":"logistics","pos":"n.","meaning":"物流","freq":"高頻"},{"word":"shipping schedule","pos":"n.","meaning":"出貨時程","freq":"中頻"}],"pattern":{"name":"with+形容詞+名詞","note":"with great/high + 名詞,表示「以...的方式/程度」,是常見副詞片語結構。","example":"The technician completed the repair with remarkable speed."}},{"id":"x-q21","category":"pos","categoryName":"詞性","question":"The marketing director proposed an ___ approach to online advertising.","options":["innovatively","innovative","innovation","innovate"],"answer":1,"difficulty":"基礎","translation":"行銷總監提出了一個創新的線上廣告策略。","explanation":"空格在冠詞 an 與名詞 approach 之間,須填形容詞修飾 approach。innovative(創新的)符合語意與結構。","optionNotes":["innovatively 是副詞,不能修飾名詞。","innovative 是形容詞,修飾 approach,結構語意皆正確,為本題正解。","innovation 是名詞,不能疊放在另一個名詞 approach 前面。","innovate 是動詞原形,不能放在冠詞與名詞之間修飾名詞。"],"keyWords":[{"word":"innovative","pos":"adj.","meaning":"創新的","freq":"高頻"},{"word":"approach","pos":"n.","meaning":"方法、策略","freq":"高頻"},{"word":"advertising","pos":"n.","meaning":"廣告","freq":"高頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"an ___ + 名詞,空格填形容詞修飾該名詞。","example":"The team adopted an innovative strategy for product launch."}},{"id":"x-q22","category":"pos","categoryName":"詞性","question":"The contract requires a clear ___ of roles within the joint venture.","options":["definition","definitive","definitively","define"],"answer":0,"difficulty":"基礎","translation":"合約要求對合資企業內的角色有清楚的界定。","explanation":"形容詞 clear 修飾後面的名詞,且該名詞後接 of roles 說明內容,並作 requires 的受詞。definition(界定、定義)符合結構與語意。","optionNotes":["definition 是名詞,與 clear 形成「adj+n」,並可接 of 引出的片語,為本題正解。","definitive 是形容詞,不能放在另一個形容詞 clear 之後。","definitively 是副詞,同樣不能作受詞使用。","define 是動詞原形,不能接在形容詞 clear 後面作受詞,也無法承接 of 片語。"],"keyWords":[{"word":"definition","pos":"n.","meaning":"界定、定義","freq":"中頻"},{"word":"joint venture","pos":"n.","meaning":"合資企業","freq":"中頻"},{"word":"contract","pos":"n.","meaning":"合約","freq":"極高頻"}],"pattern":{"name":"形容詞+名詞+of片語","note":"clear/detailed 等形容詞修飾名詞,再接 of 引出說明內容。","example":"The manual provides a detailed explanation of the procedure."}},{"id":"x-q23","category":"pos","categoryName":"詞性","question":"The server migration process was completed ___ without data loss.","options":["smoothly","smooth","smoothness","smoothen"],"answer":0,"difficulty":"中階","translation":"伺服器遷移過程順利完成,沒有造成任何資料遺失。","explanation":"was completed 是被動語態完整動詞片語,空格修飾該動詞,須填副詞。smoothly(順利地)符合語意。","optionNotes":["smoothly 為副詞,修飾被動動詞片語 was completed,說明完成的方式,為本題正解。","smooth 是形容詞,不能修飾動詞 completed。","smoothness 是名詞,不能直接修飾動詞。","smoothen 是動詞原形,不能放在完整被動語態後面重複作動詞。"],"keyWords":[{"word":"smoothly","pos":"adv.","meaning":"順利地","freq":"高頻"},{"word":"migration","pos":"n.","meaning":"遷移","freq":"中頻"},{"word":"data loss","pos":"n.","meaning":"資料遺失","freq":"中頻"}],"pattern":{"name":"be動詞+p.p.+副詞","note":"被動語態動詞片語後方加副詞,修飾動作完成的方式。","example":"The transition was handled smoothly by the IT team."}},{"id":"x-q24","category":"pos","categoryName":"詞性","question":"The budget committee expects a ___ increase in microchip demand.","options":["significantly","signified","significant","significance"],"answer":2,"difficulty":"基礎","translation":"預算委員會預期晶片需求將出現顯著的增長。","explanation":"空格在冠詞 a 與名詞 increase 之間,須填形容詞修飾 increase。significant(顯著的)符合語意與結構。","optionNotes":["significantly 是副詞,不能修飾名詞。","signified 是動詞的過去式/分詞形式,不能放在冠詞與名詞之間作形容詞用。","significant 是形容詞,修飾 increase,結構語意皆正確,為本題正解。","significance 是名詞,不能疊放在另一個名詞 increase 前面。"],"keyWords":[{"word":"significant","pos":"adj.","meaning":"顯著的、重大的","freq":"極高頻"},{"word":"demand","pos":"n.","meaning":"需求","freq":"高頻"},{"word":"committee","pos":"n.","meaning":"委員會","freq":"高頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"a ___ increase/decrease 是常見結構,空格填形容詞描述變化程度。","example":"Analysts predict a significant drop in raw material costs."}},{"id":"x-q25","category":"pos","categoryName":"詞性","question":"Engineers must verify the ___ of the data infrastructure regularly.","options":["security","securely","secure","securable"],"answer":0,"difficulty":"基礎","translation":"工程師必須定期驗證資料基礎架構的安全性。","explanation":"the 與 of 之間須填名詞,作 verify 的受詞,並接 of 引出說明對象。security(安全性)符合結構與語意。","optionNotes":["security 是名詞,作 verify 的受詞,並可接 of 片語,為本題正解。","securely 是副詞,不能作受詞使用。","secure 是形容詞或動詞原形,不能放在 the 與 of 之間作受詞。","securable 不是常見標準英文形容詞用法,為誘答項。"],"keyWords":[{"word":"security","pos":"n.","meaning":"安全性","freq":"極高頻"},{"word":"infrastructure","pos":"n.","meaning":"基礎架構","freq":"高頻"},{"word":"verify","pos":"v.","meaning":"驗證","freq":"高頻"}],"pattern":{"name":"the+名詞+of","note":"the ___ of + 名詞,空格填名詞,常見於「the+抽象名詞+of+主體」結構。","example":"The team must ensure the reliability of the network."}},{"id":"x-q26","category":"pos","categoryName":"詞性","question":"The QA inspector examined the semiconductor wafers ___.","options":["critically","criticize","critical","criticism"],"answer":0,"difficulty":"基礎","translation":"品管檢驗員仔細地檢查了半導體晶圓。","explanation":"examined the semiconductor wafers 已是完整「動詞+受詞」結構,句尾空格修飾動詞 examined,須填副詞。critically(細緻地、嚴謹地)符合語意。","optionNotes":["critically 為副詞,修飾動詞 examined,說明檢驗的嚴謹程度,為本題正解。","criticize 是動詞原形,不能放在完整句尾重複作動詞。","critical 是形容詞,不能修飾動詞,也不能單獨置於句尾。","criticism 是名詞,句尾無介系詞承接,無法安插。"],"keyWords":[{"word":"critically","pos":"adv.","meaning":"嚴謹地、批判性地","freq":"中頻"},{"word":"wafer","pos":"n.","meaning":"晶圓","freq":"中頻"},{"word":"inspector","pos":"n.","meaning":"檢驗員","freq":"中頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"及物動詞接完受詞後,句尾加副詞修飾動作方式。","example":"The auditor reviewed the accounts thoroughly."}},{"id":"x-q27","category":"pos","categoryName":"詞性","question":"The legal department found a substantial ___ between the two accounts.","options":["discrepant","discrepancies","discrepantly","discrepancy"],"answer":3,"difficulty":"中階","translation":"法務部門發現這兩份帳目之間存在重大差異。","explanation":"形容詞 substantial 修飾單數可數名詞,且該名詞作 found 的受詞。discrepancy(差異,單數)符合語意與結構,並與後面的 between 呼應。","optionNotes":["discrepant 是形容詞,不能接在另一個形容詞 substantial 後面作受詞。","discrepancies 是複數形式,與前面的不定冠詞 a 不合(a 只能接單數名詞),故不成立。","discrepantly 是副詞,不能作受詞使用。","discrepancy 是可數名詞單數形式,與冠詞 a 及形容詞 substantial 搭配(a substantial discrepancy),為本題正解。"],"keyWords":[{"word":"discrepancy","pos":"n.","meaning":"差異、不一致","freq":"中頻"},{"word":"substantial","pos":"adj.","meaning":"重大的、可觀的","freq":"高頻"},{"word":"account","pos":"n.","meaning":"帳目、帳戶","freq":"高頻"}],"pattern":{"name":"a+形容詞+單數名詞","note":"不定冠詞 a/an 後面只能接單數可數名詞,不可接複數形式。","example":"The audit revealed a significant discrepancy in the inventory count."}},{"id":"x-q28","category":"pos","categoryName":"詞性","question":"The division manager handles customer complaints ___.","options":["professional","professionally","profession","professionalism"],"answer":1,"difficulty":"基礎","translation":"部門經理以專業的態度處理客戶投訴。","explanation":"handles customer complaints 已是完整的「動詞+受詞」結構,句尾空格修飾動詞 handles,須填副詞。professionally(專業地)符合語意。","optionNotes":["professional 是形容詞,不能修飾動詞。","professionally 為副詞,修飾動詞片語 handles complaints,說明處理方式,為本題正解。","profession 也是名詞,同樣不符合句尾修飾動詞的需求。","professionalism 是名詞,句尾無介系詞承接,無法安插。"],"keyWords":[{"word":"professionally","pos":"adv.","meaning":"專業地","freq":"高頻"},{"word":"complaint","pos":"n.","meaning":"投訴","freq":"高頻"},{"word":"division manager","pos":"n.","meaning":"部門經理","freq":"中頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句尾加副詞,修飾整體動作的方式。","example":"The staff member addressed the issue professionally."}},{"id":"x-q29","category":"pos","categoryName":"詞性","question":"The software update requires a ___ amount of storage space.","options":["considerable","considerably","consider","consideration"],"answer":0,"difficulty":"基礎","translation":"這次軟體更新需要相當可觀的儲存空間。","explanation":"空格在冠詞 a 與名詞 amount 之間,須填形容詞。considerable(相當可觀的)符合語意與結構。","optionNotes":["considerable 是形容詞(相當大的),修飾 amount,結構語意皆正確,為本題正解。","considerably 是副詞,不能修飾名詞。","consider 是動詞原形,不能放在冠詞與名詞之間修飾名詞。","consideration 是名詞,不能疊放在另一個名詞 amount 前面。"],"keyWords":[{"word":"considerable","pos":"adj.","meaning":"相當可觀的","freq":"高頻"},{"word":"storage space","pos":"n.","meaning":"儲存空間","freq":"中頻"},{"word":"amount","pos":"n.","meaning":"數量","freq":"高頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"a ___ amount of + 名詞,空格填形容詞描述數量程度。","example":"The project required a considerable amount of planning."}},{"id":"x-q30","category":"pos","categoryName":"詞性","question":"The laboratory technicians maintain a ___ clean environment.","options":["strictly","stricter","strictness","strict"],"answer":0,"difficulty":"基礎","translation":"實驗室技術人員維持一個極其乾淨的環境。","explanation":"空格修飾後面的形容詞 clean,須填副詞。strictly(嚴格地,此處引申為「極其」)符合「副詞+形容詞+名詞」結構。","optionNotes":["strictly 為副詞,修飾形容詞 clean,強調乾淨的程度,為本題正解。","stricter 是比較級形容詞,同樣不能修飾另一個形容詞。","strictness 是名詞,不能修飾形容詞。","strict 是形容詞,不能修飾另一個形容詞 clean。"],"keyWords":[{"word":"strictly","pos":"adv.","meaning":"嚴格地","freq":"高頻"},{"word":"laboratory","pos":"n.","meaning":"實驗室","freq":"高頻"},{"word":"maintain","pos":"v.","meaning":"維持","freq":"高頻"}],"pattern":{"name":"副詞+形容詞+名詞","note":"副詞修飾形容詞,再一起修飾名詞,常見於強調程度的表達。","example":"The clinic maintains a strictly sterile environment."}},{"id":"x-q31","category":"pos","categoryName":"詞性","question":"The executive board seeks a ___ solution to the logistics bottleneck.","options":["permanently","permanency","permanence","permanent"],"answer":3,"difficulty":"基礎","translation":"執行董事會正在尋求解決物流瓶頸的永久性方案。","explanation":"空格在冠詞 a 與名詞 solution 之間,須填形容詞修飾 solution。permanent(永久的)符合語意與結構。","optionNotes":["permanently 是副詞,不能修飾名詞。","permanency 也是名詞,同樣不符合冠詞後接形容詞的規則。","permanence 是名詞,不能疊放在另一個名詞 solution 前面。","permanent 是形容詞,修飾 solution,結構語意皆正確,為本題正解。"],"keyWords":[{"word":"permanent","pos":"adj.","meaning":"永久的","freq":"高頻"},{"word":"bottleneck","pos":"n.","meaning":"瓶頸","freq":"中頻"},{"word":"solution","pos":"n.","meaning":"解決方案","freq":"高頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"a ___ solution,空格填形容詞描述方案的性質。","example":"The team is looking for a permanent fix to the recurring error."}},{"id":"x-q32","category":"pos","categoryName":"詞性","question":"Clients are advised to backup files ___ to prevent accidental loss.","options":["regularize","regularly","regular","regularity"],"answer":1,"difficulty":"基礎","translation":"建議客戶定期備份檔案,以防止意外遺失。","explanation":"backup files 已是完整的「動詞+受詞」結構,空格修飾動詞 backup,須填副詞。regularly(定期地)符合語意。","optionNotes":["regularize 是動詞原形,不能放在完整動詞後面重複作動詞。","regularly 為副詞,修飾動詞 backup,說明備份的頻率,為本題正解。","regular 是形容詞,不能修飾動詞 backup。","regularity 是名詞,不能修飾動詞。"],"keyWords":[{"word":"regularly","pos":"adv.","meaning":"定期地","freq":"極高頻"},{"word":"backup","pos":"v.","meaning":"備份","freq":"高頻"},{"word":"accidental loss","pos":"n.","meaning":"意外遺失","freq":"中頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"及物動詞接完受詞後,句中或句尾加副詞修飾動作頻率。","example":"Staff should update their passwords regularly."}},{"id":"x-q33","category":"pos","categoryName":"詞性","question":"The firm announced the ___ of a new machine-learning framework.","options":["introductory","introduction","introduce","introduced"],"answer":1,"difficulty":"基礎","translation":"該公司宣布推出一個新的機器學習框架。","explanation":"announced 是及物動詞,the 與 of 之間須填名詞作為受詞核心。introduction(引進、推出)符合語意與結構。","optionNotes":["introductory 是形容詞,不能單獨作受詞。","introduction 是名詞,作 announced 的受詞,並接 of 引出的片語,為本題正解。","introduce 是動詞原形,不能放在冠詞與介系詞之間作受詞。","introduced 是過去式/過去分詞,不能放在冠詞後面作名詞用。"],"keyWords":[{"word":"introduction","pos":"n.","meaning":"引進、推出","freq":"高頻"},{"word":"framework","pos":"n.","meaning":"框架","freq":"中頻"},{"word":"machine-learning","pos":"adj.","meaning":"機器學習的","freq":"中頻"}],"pattern":{"name":"the+名詞+of","note":"the ___ of + 名詞,空格填名詞,常用於宣布新事物的推出。","example":"The company celebrated the launch of its latest product line."}},{"id":"x-q34","category":"pos","categoryName":"詞性","question":"The internal audit provided ___ evidence of financial stability.","options":["conclusion","conclusive","conclude","conclusively"],"answer":1,"difficulty":"基礎","translation":"內部稽核提供了財務穩定的確鑿證據。","explanation":"空格修飾後面的名詞 evidence,須填形容詞。conclusive(確鑿的、決定性的)符合語意與結構。","optionNotes":["conclusion 是名詞,不能疊放在另一個名詞 evidence 前面。","conclusive 是形容詞,修飾 evidence,結構語意皆正確,為本題正解。","conclude 是動詞原形,不能直接修飾名詞 evidence。","conclusively 是副詞,不能修飾名詞。"],"keyWords":[{"word":"conclusive","pos":"adj.","meaning":"確鑿的、決定性的","freq":"中頻"},{"word":"evidence","pos":"n.","meaning":"證據","freq":"高頻"},{"word":"stability","pos":"n.","meaning":"穩定性","freq":"高頻"}],"pattern":{"name":"形容詞+名詞","note":"名詞前的空格若無冠詞以外的其他線索,通常直接填形容詞修飾。","example":"The lab test provided definitive proof of contamination."}},{"id":"x-q35","category":"pos","categoryName":"詞性","question":"The new supervisor manages team assignments ___.","options":["effective","effectively","effectiveness","effect"],"answer":1,"difficulty":"基礎","translation":"新任主管有效地管理團隊分工。","explanation":"manages team assignments 已是完整「動詞+受詞」結構,句尾空格修飾動詞 manages,須填副詞。effectively(有效地)符合語意。","optionNotes":["effective 是形容詞,不能修飾動詞。","effectively 為副詞,修飾動詞 manages,說明管理的成效,為本題正解。","effectiveness 是名詞,句尾無介系詞承接,無法安插。","effect 也是名詞(或罕見動詞用法),不符合此處句尾修飾動詞的需求。"],"keyWords":[{"word":"effectively","pos":"adv.","meaning":"有效地","freq":"極高頻"},{"word":"assignment","pos":"n.","meaning":"分派任務","freq":"中頻"},{"word":"supervisor","pos":"n.","meaning":"主管","freq":"高頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句尾加副詞修飾動作成效或方式。","example":"The leader communicates expectations effectively."}},{"id":"x-q36","category":"pos","categoryName":"詞性","question":"The property appraisal showed a ___ increase in real estate value.","options":["noticeable","noticed","notice","noticeably"],"answer":0,"difficulty":"基礎","translation":"房地產鑑價顯示不動產價值有明顯的增長。","explanation":"空格在冠詞 a 與名詞 increase 之間,須填形容詞。noticeable(明顯的)符合語意與結構。","optionNotes":["noticeable 是形容詞,修飾 increase,結構語意皆正確,為本題正解。","noticed 是過去式/過去分詞,不能放在冠詞與名詞之間作形容詞用(無此固定搭配)。","notice 是名詞或動詞原形,不能疊放在另一個名詞 increase 前面或作形容詞用。","noticeably 是副詞,不能修飾名詞。"],"keyWords":[{"word":"noticeable","pos":"adj.","meaning":"明顯的","freq":"中頻"},{"word":"appraisal","pos":"n.","meaning":"鑑價、評估","freq":"中頻"},{"word":"real estate","pos":"n.","meaning":"不動產","freq":"高頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"a ___ increase/change,空格填形容詞描述變化的顯著程度。","example":"The survey revealed a noticeable shift in consumer preferences."}},{"id":"x-q37","category":"pos","categoryName":"詞性","question":"The factory workers executed the machinery relocation ___.","options":["seamless","seamlessly","seamlessness","seamed"],"answer":1,"difficulty":"中階","translation":"工廠工人以無縫接軌的方式完成了機械設備的搬遷。","explanation":"executed the machinery relocation 已是完整「動詞+受詞」結構,句尾空格修飾動詞 executed,須填副詞。seamlessly(無縫地、順暢地)符合語意。","optionNotes":["seamless 是形容詞,不能修飾動詞 executed。","seamlessly 為副詞,修飾動詞 executed,說明執行的順暢程度,為本題正解。","seamlessness 是名詞,句尾無介系詞承接,無法安插。","seamed 是過去分詞形式,不符合句尾修飾動詞的需求,語意也不通。"],"keyWords":[{"word":"seamlessly","pos":"adv.","meaning":"無縫地、順暢地","freq":"中頻"},{"word":"relocation","pos":"n.","meaning":"搬遷","freq":"中頻"},{"word":"execute","pos":"v.","meaning":"執行","freq":"高頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句尾加副詞修飾動作執行的方式。","example":"The team completed the software rollout seamlessly."}},{"id":"x-q38","category":"pos","categoryName":"詞性","question":"The engineering consultant submitted a detailed ___ for the project.","options":["proposal","propose","proposed","proposing"],"answer":0,"difficulty":"基礎","translation":"工程顧問為這個專案提交了一份詳細的提案。","explanation":"形容詞 detailed 修飾後面的名詞,且該名詞作 submitted 的受詞。proposal(提案)符合語意與結構。","optionNotes":["proposal 是名詞,與 detailed 形成「adj+n」,作 submitted 的受詞,為本題正解。","propose 是動詞原形,不能接在形容詞 detailed 後面作受詞。","proposed 是過去分詞/形容詞,不能單獨作受詞使用。","proposing 是動名詞/現在分詞,一般不與 detailed 直接搭配作受詞核心。"],"keyWords":[{"word":"proposal","pos":"n.","meaning":"提案","freq":"高頻"},{"word":"detailed","pos":"adj.","meaning":"詳細的","freq":"高頻"},{"word":"submit","pos":"v.","meaning":"提交","freq":"極高頻"}],"pattern":{"name":"形容詞+名詞","note":"detailed/comprehensive 等形容詞常修飾 proposal/report 等名詞。","example":"The team submitted a comprehensive report on the incident."}},{"id":"x-q39","category":"pos","categoryName":"詞性","question":"The team leader checked the specifications ___ before fabrication.","options":["thoroughest","thoroughly","thoroughness","thorough"],"answer":1,"difficulty":"基礎","translation":"團隊負責人在製造之前徹底檢查了規格。","explanation":"checked the specifications 已是完整「動詞+受詞」結構,空格修飾動詞 checked,須填副詞。thoroughly(徹底地)符合語意。","optionNotes":["thoroughest 不是標準最高級形式(thorough 的最高級應為 most thorough),為不存在的誘答字。","thoroughly 為副詞,修飾動詞 checked,說明檢查的徹底程度,為本題正解。","thoroughness 是名詞,不能修飾動詞。","thorough 是形容詞,不能修飾動詞 checked。"],"keyWords":[{"word":"thoroughly","pos":"adv.","meaning":"徹底地","freq":"高頻"},{"word":"specification","pos":"n.","meaning":"規格","freq":"中頻"},{"word":"fabrication","pos":"n.","meaning":"製造、加工","freq":"中頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句子後方加副詞修飾動作徹底程度。","example":"The inspector examined the wiring thoroughly."}},{"id":"x-q40","category":"pos","categoryName":"詞性","question":"The newly developed compiler exhibits high ___ across platforms.","options":["flexibly","flexibilize","flexible","flexibility"],"answer":3,"difficulty":"基礎","translation":"新開發的編譯器在跨平台上展現高度的靈活性。","explanation":"exhibits 是及物動詞,high 修飾其後的名詞,而該名詞作 exhibits 的受詞。flexibility(靈活性)符合語意與結構。","optionNotes":["flexibly 是副詞,不能作受詞使用。","flexibilize 不是標準英文單字,為不存在的誘答字。","flexible 是形容詞,不能接在另一個形容詞 high 後面作受詞。","flexibility 是名詞,與 high 形成「adj+n」,作 exhibits 的受詞,為本題正解。"],"keyWords":[{"word":"flexibility","pos":"n.","meaning":"靈活性、彈性","freq":"高頻"},{"word":"compiler","pos":"n.","meaning":"編譯器","freq":"中頻"},{"word":"platform","pos":"n.","meaning":"平台","freq":"高頻"}],"pattern":{"name":"動詞+形容詞+名詞(受詞)","note":"exhibit/show/demonstrate 等動詞後常接「形容詞+抽象名詞」作受詞。","example":"The device exhibits remarkable durability under stress."}},{"id":"x-q41","category":"pos","categoryName":"詞性","question":"The maintenance crew responded ___ to the pipeline leakage report.","options":["promptly","promptness","prompt","prompted"],"answer":0,"difficulty":"基礎","translation":"維修團隊迅速地回應了管線洩漏的報告。","explanation":"responded 是不及物動詞,空格修飾該動詞,須填副詞。promptly(迅速地)符合語意與文法。","optionNotes":["promptly 為副詞,修飾動詞 responded,說明回應的速度,為本題正解。","promptness 是名詞,不能修飾動詞。","prompt 是形容詞或動詞原形,不能直接修飾動詞 responded。","prompted 是過去式/過去分詞,不能放在完整動詞後面重複作動詞。"],"keyWords":[{"word":"promptly","pos":"adv.","meaning":"迅速地、立即地","freq":"高頻"},{"word":"leakage","pos":"n.","meaning":"洩漏","freq":"中頻"},{"word":"maintenance crew","pos":"n.","meaning":"維修團隊","freq":"中頻"}],"pattern":{"name":"不及物動詞+副詞","note":"不及物動詞後接副詞,修飾動作發生的速度或方式。","example":"The support team responded swiftly to the outage."}},{"id":"x-q42","category":"pos","categoryName":"詞性","question":"The corporate merger resulted in the ___ of two sales divisions.","options":["integration","integrated","integrate","integrative"],"answer":0,"difficulty":"基礎","translation":"公司合併導致兩個銷售部門的整合。","explanation":"the 與 of 之間須填名詞,作為 in 的受詞核心,並接 of 引出說明對象。integration(整合)符合語意與結構。","optionNotes":["integration 是名詞,作 in 的受詞,並接 of 片語,為本題正解。","integrated 是過去分詞/形容詞,不能放在冠詞後面作名詞用。","integrate 是動詞原形,不能放在冠詞與介系詞之間作受詞。","integrative 是形容詞,不能單獨作受詞。"],"keyWords":[{"word":"integration","pos":"n.","meaning":"整合","freq":"高頻"},{"word":"merger","pos":"n.","meaning":"合併","freq":"高頻"},{"word":"division","pos":"n.","meaning":"部門","freq":"高頻"}],"pattern":{"name":"the+名詞+of","note":"resulted in the ___ of...,空格填名詞說明合併/變動帶來的結果。","example":"The reform led to the restructuring of the entire department."}},{"id":"x-q43","category":"pos","categoryName":"詞性","question":"The technical writer drafting the guide possesses ___ knowledge.","options":["extensive","extension","extensively","extending"],"answer":0,"difficulty":"基礎","translation":"撰寫這份指南的技術文件撰寫員擁有廣博的知識。","explanation":"空格修飾後面的名詞 knowledge,須填形容詞。extensive(廣泛的、淵博的)符合語意與結構。","optionNotes":["extensive 是形容詞,修飾 knowledge,結構語意皆正確,為本題正解。","extension 是名詞,不能疊放在另一個名詞 knowledge 前面。","extensively 是副詞,不能修飾名詞。","extending 是現在分詞,一般不用來作「淵博」語意的形容詞修飾 knowledge。"],"keyWords":[{"word":"extensive","pos":"adj.","meaning":"廣泛的、淵博的","freq":"高頻"},{"word":"possess","pos":"v.","meaning":"擁有","freq":"中頻"},{"word":"draft","pos":"v.","meaning":"起草、草擬","freq":"中頻"}],"pattern":{"name":"形容詞+名詞","note":"extensive/in-depth 等形容詞常修飾 knowledge/experience 等抽象名詞。","example":"The candidate has extensive experience in supply chain management."}},{"id":"x-q44","category":"pos","categoryName":"詞性","question":"The HR specialist conducts staff evaluations ___ every six months.","options":["annualized","annuity","annually","annual"],"answer":2,"difficulty":"基礎","translation":"人資專員每六個月定期進行一次員工考核。","explanation":"conducts staff evaluations 已是完整「動詞+受詞」結構,空格修飾動詞 conducts,須填副詞,並與 every six months 呼應「定期」的語意。annually(每年地,此處引申為週期性)符合語意。","optionNotes":["annualized 是過去分詞形式(年化的),不能放在完整句尾修飾動詞。","annuity 是名詞(年金),語意與文法皆不合。","annually 為副詞,修飾動詞 conducts,呼應 every six months 表達的週期性,為本題正解。","annual 是形容詞,不能修飾動詞 conducts。"],"keyWords":[{"word":"annually","pos":"adv.","meaning":"每年、定期地","freq":"中頻"},{"word":"evaluation","pos":"n.","meaning":"考核、評估","freq":"高頻"},{"word":"HR specialist","pos":"n.","meaning":"人資專員","freq":"中頻"}],"pattern":{"name":"動詞+受詞+頻率副詞","note":"完整句尾加頻率副詞,常搭配 every+時間 的片語強調週期性。","example":"The department reviews performance quarterly, every three months."}},{"id":"x-q45","category":"pos","categoryName":"詞性","question":"The architecture firm gained ___ for its energy-saving designs.","options":["recognizable","recognizably","recognize","recognition"],"answer":3,"difficulty":"基礎","translation":"這家建築事務所因其節能設計而獲得肯定。","explanation":"gained 是及物動詞,空格須填名詞作為受詞。recognition(認可、肯定)符合語意與結構。","optionNotes":["recognizable 是形容詞,不能單獨作受詞。","recognizably 是副詞,同樣不能作受詞使用。","recognize 是動詞原形,不能作為 gained 的受詞。","recognition 是名詞,作 gained 的受詞,為本題正解。"],"keyWords":[{"word":"recognition","pos":"n.","meaning":"認可、讚譽","freq":"高頻"},{"word":"energy-saving","pos":"adj.","meaning":"節能的","freq":"中頻"},{"word":"architecture firm","pos":"n.","meaning":"建築事務所","freq":"中頻"}],"pattern":{"name":"及物動詞+名詞受詞","note":"gain/receive/earn 等動詞後面須接名詞作受詞。","example":"The startup gained attention for its sustainable packaging."}},{"id":"x-q46","category":"pos","categoryName":"詞性","question":"The accounting team processed the transaction receipts ___.","options":["accurately","accurate","accuracy","accurateness"],"answer":0,"difficulty":"基礎","translation":"會計團隊準確地處理了交易收據。","explanation":"processed the transaction receipts 已是完整「動詞+受詞」結構,句尾空格修飾動詞 processed,須填副詞。accurately(準確地)符合語意。","optionNotes":["accurately 為副詞,修飾動詞 processed,說明處理的準確程度,為本題正解。","accurate 是形容詞,不能修飾動詞 processed。","accuracy 是名詞,句尾無介系詞承接,無法安插。","accurateness 也是名詞,同樣不符合句尾修飾動詞的需求。"],"keyWords":[{"word":"accurately","pos":"adv.","meaning":"準確地","freq":"高頻"},{"word":"transaction","pos":"n.","meaning":"交易","freq":"高頻"},{"word":"receipt","pos":"n.","meaning":"收據","freq":"中頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句尾加副詞修飾動作準確程度。","example":"The clerk recorded the figures accurately."}},{"id":"x-q47","category":"pos","categoryName":"詞性","question":"The CEO emphasized the ___ of meeting the product launch deadline.","options":["importantly","import","important","importance"],"answer":3,"difficulty":"基礎","translation":"執行長強調準時達成產品上市期限的重要性。","explanation":"emphasized 是及物動詞,the 與 of 之間須填名詞作為受詞核心,並接 of 引出的動名詞片語。importance(重要性)符合語意與結構。","optionNotes":["importantly 是副詞,同樣不能作受詞使用。","import 雖可作名詞(進口/意義),但此處語意應為「重要性」,與慣用搭配 the importance of 不符,為誘答項。","important 是形容詞,不能放在冠詞與介系詞之間作受詞。","importance 是名詞(重要性),作 emphasized 的受詞,並接 of 片語,為本題正解。"],"keyWords":[{"word":"importance","pos":"n.","meaning":"重要性","freq":"極高頻"},{"word":"emphasize","pos":"v.","meaning":"強調","freq":"高頻"},{"word":"deadline","pos":"n.","meaning":"期限","freq":"高頻"}],"pattern":{"name":"the importance of + 動名詞","note":"the importance of doing sth. 是固定搭配,表示「做某事的重要性」。","example":"The manager stressed the importance of following safety protocols."}},{"id":"x-q48","category":"pos","categoryName":"詞性","question":"The inventory control manager checked the stock level ___.","options":["systematically","systematize","system","systematic"],"answer":0,"difficulty":"基礎","translation":"庫存管理經理有系統地檢查了庫存水準。","explanation":"checked the stock level 已是完整「動詞+受詞」結構,句尾空格修飾動詞 checked,須填副詞。systematically(有系統地)符合語意。","optionNotes":["systematically 為副詞,修飾動詞 checked,說明檢查的方式,為本題正解。","systematize 是動詞原形,不能放在完整句尾重複作動詞。","system 是名詞,句尾無介系詞承接,無法安插。","systematic 是形容詞,不能修飾動詞 checked。"],"keyWords":[{"word":"systematically","pos":"adv.","meaning":"有系統地","freq":"中頻"},{"word":"inventory","pos":"n.","meaning":"庫存","freq":"高頻"},{"word":"stock level","pos":"n.","meaning":"庫存水準","freq":"中頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句尾加副詞修飾動作進行的方式。","example":"The auditor reviewed the ledger systematically."}},{"id":"x-q49","category":"pos","categoryName":"詞性","question":"The legal settlement requires a ___ commitment from both parties.","options":["formal","formalize","formally","formality"],"answer":0,"difficulty":"基礎","translation":"這項法律和解需要雙方提出正式的承諾。","explanation":"空格在冠詞 a 與名詞 commitment 之間,須填形容詞。formal(正式的)符合語意與結構。","optionNotes":["formal 是形容詞,修飾 commitment,結構語意皆正確,為本題正解。","formalize 是動詞原形,不能作形容詞用。","formally 是副詞,不能修飾名詞。","formality 是名詞,不能疊放在另一個名詞 commitment 前面。"],"keyWords":[{"word":"formal","pos":"adj.","meaning":"正式的","freq":"高頻"},{"word":"commitment","pos":"n.","meaning":"承諾","freq":"高頻"},{"word":"settlement","pos":"n.","meaning":"和解","freq":"中頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"a ___ commitment,空格填形容詞描述承諾的性質。","example":"Both companies made a formal agreement to share resources."}},{"id":"x-q50","category":"pos","categoryName":"詞性","question":"The local distributor expanded its market share ___ over two years.","options":["substantial","substance","substantiate","substantially"],"answer":3,"difficulty":"基礎","translation":"這家本地經銷商在兩年內大幅擴大了市場佔有率。","explanation":"expanded its market share 已是完整「動詞+受詞」結構,句尾空格修飾動詞 expanded,須填副詞。substantially(大幅地)符合語意。","optionNotes":["substantial 是形容詞,不能修飾動詞 expanded。","substance 是名詞,句尾無介系詞承接,無法安插。","substantiate 是動詞原形,不能放在完整句尾重複作動詞。","substantially 為副詞,修飾動詞 expanded,說明擴張的幅度,為本題正解。"],"keyWords":[{"word":"substantially","pos":"adv.","meaning":"大幅地、實質上","freq":"高頻"},{"word":"distributor","pos":"n.","meaning":"經銷商","freq":"中頻"},{"word":"market share","pos":"n.","meaning":"市場佔有率","freq":"高頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句尾加副詞修飾動作變化的幅度。","example":"The company increased its revenue substantially last year."}},{"id":"x-q51","category":"pos","categoryName":"詞性","question":"The operations director noted a ___ decline in manufacturing scrap.","options":["sharpen","sharply","sharpness","sharp"],"answer":3,"difficulty":"基礎","translation":"營運總監注意到製造廢料出現急劇的下降。","explanation":"空格在冠詞 a 與名詞 decline 之間,須填形容詞。sharp(急劇的)符合語意與結構。","optionNotes":["sharpen 是動詞原形,不能放在冠詞與名詞之間作形容詞用。","sharply 是副詞,不能修飾名詞。","sharpness 是名詞,不能疊放在另一個名詞 decline 前面。","sharp 是形容詞,修飾 decline,結構語意皆正確,為本題正解。"],"keyWords":[{"word":"sharp","pos":"adj.","meaning":"急劇的、鋭利的","freq":"高頻"},{"word":"decline","pos":"n.","meaning":"下降","freq":"高頻"},{"word":"scrap","pos":"n.","meaning":"廢料","freq":"中頻"}],"pattern":{"name":"冠詞+形容詞+名詞","note":"a ___ decline/rise,空格填形容詞描述變化幅度或速度。","example":"The report showed a sharp rise in production costs."}},{"id":"x-q52","category":"pos","categoryName":"詞性","question":"The programming wizard fixed the server configuration error ___.","options":["effort","effortless","effortlessly","effortlessness"],"answer":2,"difficulty":"中階","translation":"這位程式高手輕鬆地修好了伺服器的配置錯誤。","explanation":"fixed the server configuration error 已是完整「動詞+受詞」結構,句尾空格修飾動詞 fixed,須填副詞。effortlessly(輕鬆地、不費力地)符合語意。","optionNotes":["effort 也是名詞,同樣不符合句尾修飾動詞的需求。","effortless 是形容詞,不能修飾動詞 fixed。","effortlessly 為副詞,修飾動詞 fixed,說明解決問題的輕鬆程度,為本題正解。","effortlessness 是名詞,句尾無介系詞承接,無法安插。"],"keyWords":[{"word":"effortlessly","pos":"adv.","meaning":"輕鬆地、不費力地","freq":"中頻"},{"word":"configuration","pos":"n.","meaning":"配置、設定","freq":"高頻"},{"word":"fix","pos":"v.","meaning":"修復","freq":"高頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句尾加副詞修飾動作完成的難易程度。","example":"She resolved the technical issue effortlessly."}},{"id":"x-q53","category":"pos","categoryName":"詞性","question":"The research division published a study on consumer ___.","options":["prefer","preferable","preferably","preference"],"answer":3,"difficulty":"基礎","translation":"研究部門發表了一項關於消費者偏好的研究。","explanation":"介系詞 on 後方須接名詞,consumer 是名詞作形容詞用,修飾後面的核心名詞。preference(偏好)符合結構與語意。","optionNotes":["prefer 是動詞原形,不能作介系詞 on 的受詞核心。","preferable 是形容詞,不能作受詞核心。","preferably 是副詞,同樣不能作受詞使用。","preference 是名詞,作 on 的受詞,並與 consumer 組成複合名詞(consumer preference,消費者偏好),為本題正解。"],"keyWords":[{"word":"preference","pos":"n.","meaning":"偏好","freq":"高頻"},{"word":"consumer","pos":"n.","meaning":"消費者","freq":"高頻"},{"word":"publish","pos":"v.","meaning":"發表、出版","freq":"高頻"}],"pattern":{"name":"名詞+名詞(複合名詞)","note":"consumer preference/customer satisfaction 等為常見「名詞+名詞」複合結構,第二個名詞是核心。","example":"The survey focused on employee satisfaction."}},{"id":"x-q54","category":"pos","categoryName":"詞性","question":"The procurement agent verified the vendor credentials ___.","options":["independent","dependency","independence","independently"],"answer":3,"difficulty":"基礎","translation":"採購人員獨立地驗證了供應商的資格證明。","explanation":"verified the vendor credentials 已是完整「動詞+受詞」結構,句尾空格修飾動詞 verified,須填副詞。independently(獨立地)符合語意。","optionNotes":["independent 是形容詞,不能修飾動詞 verified。","dependency 語意相反(依賴性)且詞性為名詞,不符合句意與文法。","independence 是名詞,句尾無介系詞承接,無法安插。","independently 為副詞,修飾動詞 verified,說明驗證是自主進行、不受他人影響,為本題正解。"],"keyWords":[{"word":"independently","pos":"adv.","meaning":"獨立地","freq":"高頻"},{"word":"vendor","pos":"n.","meaning":"供應商","freq":"高頻"},{"word":"credential","pos":"n.","meaning":"資格證明","freq":"中頻"}],"pattern":{"name":"動詞+受詞+副詞","note":"完整句尾加副詞修飾動作是否獨立完成。","example":"The auditor confirmed the figures independently."}},{"id":"x-q55","category":"pos","categoryName":"詞性","question":"The new policy provides ___ guidelines for equipment calibration.","options":["specific","specifically","specify","specification"],"answer":0,"difficulty":"基礎","translation":"新政策提供了設備校準的具體指引。","explanation":"空格修飾複數名詞 guidelines,須填形容詞。specific(具體的、明確的)符合語意與結構。","optionNotes":["specific 是形容詞,修飾 guidelines,結構語意皆正確,為本題正解。","specifically 是副詞,不能修飾名詞。","specify 是動詞原形,不能作形容詞用。","specification 是名詞,不能疊放在另一個名詞 guidelines 前面。"],"keyWords":[{"word":"specific","pos":"adj.","meaning":"具體的、明確的","freq":"極高頻"},{"word":"guideline","pos":"n.","meaning":"指引、準則","freq":"高頻"},{"word":"calibration","pos":"n.","meaning":"校準","freq":"中頻"}],"pattern":{"name":"形容詞+複數名詞","note":"名詞前的空格若無其他線索,通常直接填形容詞修飾。","example":"The manual offers specific instructions for machine setup."}},{"id":"x-q56","category":"verb","categoryName":"動詞時態與語態","question":"By the time the new equipment arrives, the technicians ___ the calibration.","options":["finish","will have finished","finished","will finish"],"answer":1,"difficulty":"中階","translation":"等到新設備抵達時，技術人員將已完成校準作業。","explanation":"解題線索：By the time 引導的子句用現在式 arrives，表示未來某個時間點；主要子句描述在那個未來時間點「之前」就已完成的動作。文法規則：By the time + 現在式子句，主要子句須用未來完成式（will have + p.p.）表達「在未來某時點前已完成」。正解 will have finished 唯一符合此條件。","optionNotes":["finish 是現在式，只能表達現在的習慣或事實，無法表達「未來某時點前已完成」的時間邏輯，是誤把 arrives 的現在式誤認為全句都用現在式的陷阱。","正解：will have finished 是未來完成式，精準對應 By the time + 現在式子句表達的「未來某時點前已完成」邏輯。","finished 是過去式，與句子描述的未來情境（equipment arrives 為未來事件）矛盾，時態方向錯誤。","will finish 是簡單未來式，表示未來會做這個動作，但沒有「在某時點之前已完成」的完成語意，時態層次不足。"],"keyWords":[{"word":"by the time","pos":"conj.","meaning":"到...時候為止","freq":"高頻"},{"word":"calibration","pos":"n.","meaning":"校準","freq":"中頻"}],"pattern":{"name":"By the time + 現在式，主句用未來完成式","note":"表達「未來某時間點之前已完成」的動作時，從屬子句用現在式，主要子句用 will have + p.p.，是 TOEIC 常考的未來完成式觸發句型。","example":"By the time the auditors leave, the accountant will have prepared all the documents."}},{"id":"x-q57","category":"verb","categoryName":"動詞時態與語態","question":"Mr. Lin ___ the regional office since he was promoted to director last winter.","options":["has managed","managed","is managing","manages"],"answer":0,"difficulty":"中階","translation":"林先生自從去年冬天升任總監以來，一直在管理這個區域辦公室。","explanation":"解題線索：since 後方接過去式子句 he was promoted，表示動作從過去某時點持續至今。文法規則：since + 過去時間點/子句，主要子句須用現在完成式（have/has + p.p.）表示「從過去持續到現在」。正解 has managed 唯一符合此固定搭配。","optionNotes":["正解：has managed 是現在完成式，精準對應 since + 過去子句所表達「從過去持續到現在」的語意。","managed 是簡單過去式，只表示過去單一時間點的動作，不能表達持續到現在的狀態，與 since 的用法牴觸。","is managing 是現在進行式，強調當下正在進行，但無法涵蓋「自過去某時點以來」的持續期間意涵。","manages 是簡單現在式，只表示現在的習慣或事實，無法呈現「從過去持續至今」的時間跨度，與 since 子句搭配不合。"],"keyWords":[{"word":"promote","pos":"v.","meaning":"晉升","freq":"高頻"},{"word":"regional office","pos":"n.phr.","meaning":"區域辦公室","freq":"中頻"}],"pattern":{"name":"since + 過去子句，主句用現在完成式","note":"since 引導過去時間點或過去式子句時，主要子句固定搭配現在完成式，表示動作或狀態持續至今。","example":"The firm has expanded rapidly since it merged with a local competitor."}},{"id":"x-q58","category":"verb","categoryName":"動詞時態與語態","question":"Yesterday, the board of directors ___ to allocate funds for the lab upgrade.","options":["deciding","decides","decided","will decide"],"answer":2,"difficulty":"基礎","translation":"昨天，董事會決定撥款用於實驗室升級。","explanation":"解題線索：句首明確過去時間副詞 Yesterday，指示句子描述的是過去已發生的動作。文法規則：明確過去時間副詞（yesterday、last week 等）搭配簡單過去式。正解 decided 為唯一符合的過去式動詞。","optionNotes":["deciding 是現在分詞，不能單獨作句子的主要動詞，句子會缺少限定動詞而不成立。","decides 是現在式，與 Yesterday 這個過去時間副詞矛盾，是忽略時間線索、直接選現在式的常見陷阱。","正解：decided 是簡單過去式，precisely 對應 Yesterday 這個明確過去時間點。","will decide 是未來式，與過去時間副詞 Yesterday 方向相反，時態邏輯錯誤。"],"keyWords":[{"word":"board of directors","pos":"n.phr.","meaning":"董事會","freq":"高頻"},{"word":"allocate","pos":"v.","meaning":"撥款、分配","freq":"中頻"}],"pattern":null},{"id":"x-q59","category":"verb","categoryName":"動詞時態與語態","question":"The supervisor requested that all team members ___ the safety seminar.","options":["attended","attend","attending","attends"],"answer":1,"difficulty":"進階","translation":"主管要求所有team成員都要出席安全講座。","explanation":"解題線索：主要動詞 requested（要求）屬於表示「命令、要求、建議」的動詞（如 request、suggest、recommend、insist、demand）。文法規則：這類動詞後方接 that 子句時，子句動詞須用「省略 should 的原形動詞」，不受主詞單複數與時態影響，稱為虛擬語氣（subjunctive mood）。正解 attend 為唯一原形動詞選項。","optionNotes":["attended 是過去式，虛擬語氣中的子句動詞不隨時態變化，一律使用原形，故此選項不符合句型規則。","正解：attend 是動詞原形，符合 request that + S + 原形動詞的虛擬語氣句型，不因主詞 all team members 為複數而改變。","attending 是動名詞/現在分詞，不能作為 that 子句中的限定動詞，句子會缺少正式動詞而不成立。","attends 是第三人稱單數現在式，若填入會誤用一般現在式規則，但此處是虛擬語氣句型，動詞恆用原形，故錯誤。"],"keyWords":[{"word":"request","pos":"v.","meaning":"要求","freq":"極高頻"},{"word":"seminar","pos":"n.","meaning":"講座、研討會","freq":"高頻"}],"pattern":{"name":"要求/建議動詞 + that + S + 原形動詞（虛擬語氣）","note":"request、suggest、recommend、insist、demand、propose 等動詞接 that 子句時，子句動詞使用原形（省略 should），不受主詞人稱與時態影響。","example":"The manager suggested that the report be revised before submission."}},{"id":"x-q60","category":"verb","categoryName":"動詞時態與語態","question":"Next month, the software engineering department ___ a new version of the app.","options":["released","has released","will release","releases"],"answer":2,"difficulty":"基礎","translation":"下個月，軟體工程部門將發布新版本的應用程式。","explanation":"解題線索：句首未來時間副詞 Next month 明確指示動作發生在未來。文法規則：未來時間副詞搭配簡單未來式（will + 原形動詞）。正解 will release 唯一符合。","optionNotes":["released 是過去式，方向與 Next month 所指的未來相反，時態錯誤。","has released 是現在完成式，表示動作已完成並持續影響現在，與尚未發生的未來動作矛盾。","正解：will release 是簡單未來式，精準對應 Next month 這個未來時間副詞。","releases 是簡單現在式，表達習慣或現在事實，與 Next month 這個未來時間點不搭配。"],"keyWords":[{"word":"release","pos":"v.","meaning":"發布、推出","freq":"極高頻"},{"word":"version","pos":"n.","meaning":"版本","freq":"高頻"}],"pattern":null},{"id":"x-q61","category":"verb","categoryName":"動詞時態與語態","question":"The factory production lines ___ for routine maintenance since 6:00 AM.","options":["stopped","have been stopped","are stopping","stop"],"answer":1,"difficulty":"中階","translation":"工廠生產線自上午六點起，因例行保養而已停止運作。","explanation":"解題線索：句尾 since 6:00 AM 表示動作從過去某時間點持續至今；且生產線是「被停止」的對象（產線本身不會主動停止自己）。文法規則：since + 時間點需搭配現在完成式，加上被動關係須用 be 動詞的完成式被動語態 have/has been + p.p.。正解 have been stopped 同時滿足時態與語態兩條件。","optionNotes":["stopped 單獨使用時，since 開頭的句子不能用簡單過去式（since 固定搭配現在完成式），且缺少 be 動詞無法表達被動，故錯誤。","正解：have been stopped 是現在完成被動式，同時符合 since 需要現在完成式、以及產線被停止的被動關係。","are stopping 是現在進行式主動語態，既未表達被動意涵，也無法呈現 since 所需的「持續至今」時間跨度。","stop 是原形/簡單現在式，既無法表達現在完成的時間跨度，也未呈現被動關係，兩項條件皆不符。"],"keyWords":[{"word":"routine maintenance","pos":"n.phr.","meaning":"例行保養","freq":"高頻"},{"word":"production line","pos":"n.phr.","meaning":"生產線","freq":"高頻"}],"pattern":{"name":"since + 過去時間點，主句用現在完成式（含被動）","note":"since 後接明確過去時間點時，主要子句固定用現在完成式；若主詞是動作承受者，需疊加被動語態 have/has been + p.p.。","example":"The website has been down since this morning."}},{"id":"x-q62","category":"verb","categoryName":"動詞時態與語態","question":"The quality control team ___ the batch of microchips before they were shipped.","options":["inspected","inspecting","will inspect","inspects"],"answer":0,"difficulty":"基礎","translation":"品管團隊在這批微晶片出貨前進行了檢驗。","explanation":"解題線索：before 引導的子句 they were shipped 使用過去式，顯示整體事件發生在過去；主要子句描述的檢驗動作依時間順序發生在出貨之前。文法規則：子句已定調為過去時空，主要子句的動作同樣落在過去，四個選項中唯一的限定過去式動詞為 inspected。","optionNotes":["正解：inspected 是簡單過去式，與 before they were shipped 所處的過去時間點一致，依序描述「先檢驗、後出貨」。","inspecting 是現在分詞，不能單獨作為句子的主要動詞，缺少 be 動詞會使句子結構不完整。","will inspect 是未來式，與句尾 before they were shipped 的過去時態方向相反，時態矛盾。","inspects 是簡單現在式，與 before 子句的過去式 were shipped 所建立的過去時空不一致。"],"keyWords":[{"word":"quality control","pos":"n.phr.","meaning":"品質管制","freq":"極高頻"},{"word":"batch","pos":"n.","meaning":"一批、一批貨","freq":"中頻"}],"pattern":null},{"id":"x-q63","category":"verb","categoryName":"動詞時態與語態","question":"The IT department currently ___ a new security patch across all workstations.","options":["installed","is installing","installs","has installed"],"answer":1,"difficulty":"基礎","translation":"IT 部門目前正在所有工作站上安裝一項新的安全性修補程式。","explanation":"解題線索：時間副詞 currently（目前）明確指示動作正在此刻進行中，而非習慣性或已完成的動作。文法規則：currently、at the moment、right now 等副詞搭配現在進行式（be + V-ing）。正解 is installing 唯一符合。","optionNotes":["installed 是過去式，與 currently 所指的「現在此刻」時間點矛盾。","正解：is installing 是現在進行式，精準對應 currently 所表達的「此刻正在進行」的動作。","installs 是簡單現在式，表達習慣或常態事實，無法呈現 currently 所強調「正在進行」的動態語意。","has installed 是現在完成式，強調動作已完成，與 currently 描述的進行中狀態不符。"],"keyWords":[{"word":"security patch","pos":"n.phr.","meaning":"安全性修補程式","freq":"中頻"},{"word":"workstation","pos":"n.","meaning":"工作站","freq":"中頻"}],"pattern":null},{"id":"x-q64","category":"verbal","categoryName":"分詞與不定詞","question":"Management expects ___ the contract negotiations by Friday afternoon.","options":["finalizing","to finalize","finalize","finalized"],"answer":1,"difficulty":"基礎","translation":"管理層預期能在星期五下午前完成合約談判。","explanation":"解題線索：動詞 expect 表示「預期、期望」，其後接動詞作受詞時有固定搭配。文法規則：expect 屬於後方習慣接不定詞（to V）作受詞的動詞（同類尚有 want、hope、plan、decide）。正解 to finalize 唯一符合此固定搭配。","optionNotes":["finalizing 是動名詞，expect 通常不接動名詞作受詞，此為誤用動名詞受詞動詞的常見陷阱。","正解：to finalize 是不定詞，符合 expect + to V 的固定搭配，表示「期望完成」。","finalize 是動詞原形，不能直接作為 expect 的受詞，expect 後方不可直接接原形動詞。","finalized 是過去分詞，無法直接作為 expect 的受詞，詞性與句型皆不符。"],"keyWords":[{"word":"expect","pos":"v.","meaning":"預期、期望","freq":"極高頻"},{"word":"finalize","pos":"v.","meaning":"完成、確定","freq":"高頻"}],"pattern":{"name":"expect + to V","note":"expect、want、hope、decide、plan、manage 等動詞後方接不定詞（to V）作為受詞，是 TOEIC 高頻動詞型態考點。","example":"The client expects to receive the shipment within a week."}},{"id":"x-q65","category":"verb","categoryName":"動詞時態與語態","question":"The shift supervisor always ___ the facility logs before leaving the site.","options":["reviewing","reviews","review","reviewed"],"answer":1,"difficulty":"基礎","translation":"值班主管總是在離開現場前檢查設施日誌。","explanation":"解題線索：頻率副詞 always 表示常態性、習慣性的行為；主詞 the shift supervisor 為第三人稱單數。文法規則：頻率副詞搭配簡單現在式描述習慣，且第三人稱單數主詞動詞需加 -s。正解 reviews 同時符合時態與主詞一致性。","optionNotes":["reviewing 是現在分詞，不能單獨作句子的主要動詞，缺少 be 動詞會使句子不完整。","正解：reviews 是第三人稱單數現在式，符合 always 表達的常態習慣，且主詞單數動詞正確加 -s。","review 是動詞原形，主詞為第三人稱單數 supervisor，動詞需加 -s，此選項犯了主詞動詞一致性錯誤。","reviewed 是過去式，與 always 所表達的「一貫、經常性」習慣語意不符，習慣性描述應用現在式。"],"keyWords":[{"word":"shift supervisor","pos":"n.phr.","meaning":"值班主管","freq":"中頻"},{"word":"facility log","pos":"n.phr.","meaning":"設施日誌","freq":"低頻"}],"pattern":null},{"id":"x-q66","category":"verb","categoryName":"動詞時態與語態","question":"If the sample test fails, the engineering team ___ the entire process.","options":["would revise","revises","will revise","revised"],"answer":2,"difficulty":"中階","translation":"如果樣品測試失敗，工程團隊將修改整個流程。","explanation":"解題線索：If 子句使用現在式 fails，描述一個未來可能發生的真實狀況。文法規則：第一類條件句（真實條件句）結構為 If + 現在式，主要子句 + will + 原形動詞，表示未來可能發生的結果。正解 will revise 唯一符合。","optionNotes":["would revise 用於第二類條件句（與現在事實相反的假設），但 If 子句用的是現在式 fails 而非過去式，故不適用。","revises 是現在式，不能作為條件句主要子句表達未來結果的動詞形式，第一類條件句主要子句需用未來式。","正解：will revise 符合第一類條件句「If + 現在式，主句 + will + 原形」的固定句型，表達未來可能發生的結果。","revised 是過去式，與 If 子句的現在式 fails 所建立的「未來可能」情境不符。"],"keyWords":[{"word":"sample test","pos":"n.phr.","meaning":"樣品測試","freq":"中頻"},{"word":"revise","pos":"v.","meaning":"修改、修訂","freq":"高頻"}],"pattern":{"name":"第一類條件句：If + 現在式，主句 + will + 原形","note":"描述未來真實可能發生的情況時，If 子句用現在式，主要子句用 will + 原形動詞，不可用 would（那是與現在事實相反的假設語氣）。","example":"If the client approves the design, the team will begin production next week."}},{"id":"x-q67","category":"verb","categoryName":"動詞時態與語態","question":"All company vehicle logs must ___ by the logistics clerk each week.","options":["be verified","verified","verify","verifying"],"answer":0,"difficulty":"中階","translation":"所有公司車輛日誌每週都必須由物流事務員核實。","explanation":"解題線索：主詞 vehicle logs（車輛日誌）是被核實的對象，而非主動執行核實動作的一方；句中並有 by the logistics clerk 表明動作執行者，是典型被動語態標誌。文法規則：情態助動詞 must 後方接原形動詞，若語意為被動則用 must be + p.p.。正解 be verified 同時符合情態助動詞句型與被動語態。","optionNotes":["正解：be verified 是「must + be + p.p.」的被動結構，符合日誌被核實、且有 by 引導動作執行者的語意。","verified 單獨使用缺少 be 動詞，不能直接接在 must 後方構成被動語態，結構不完整。","verify 是主動原形動詞，若填入會變成「日誌必須核實」，但日誌不會主動核實自己，語態邏輯錯誤。","verifying 是現在分詞/動名詞，不能接在情態助動詞 must 後方作為主要動詞，詞性不符。"],"keyWords":[{"word":"logistics clerk","pos":"n.phr.","meaning":"物流事務員","freq":"低頻"},{"word":"verify","pos":"v.","meaning":"核實、驗證","freq":"高頻"}],"pattern":{"name":"must + be + p.p.（情態助動詞被動式）","note":"情態助動詞（must、should、can 等）後方接原形動詞；若主詞是動作承受者，須用 must be + 過去分詞構成被動語態。","example":"All visitors must be registered at the front desk before entering the facility."}},{"id":"x-q68","category":"verb","categoryName":"動詞時態與語態","question":"The research scientist ___ several patents by the time she joined Marketech.","options":["filed","files","had filed","has filed"],"answer":2,"difficulty":"進階","translation":"這位研究科學家在加入 Marketech 之前，就已經申請了好幾項專利。","explanation":"（本題已將原句 before joining Marketech 改寫為 by the time she joined Marketech，加入明確過去式子句以消除「過去式／過去完成式皆可」的歧義，考點不變）解題線索：by the time 後方接過去式子句 she joined，表示過去某個時間點；主要子句描述在那個過去時間點「之前」就已完成的動作。文法規則：by the time + 過去式子句，主要子句須用過去完成式（had + p.p.）表達「過去某時點前已完成」。正解 had filed 唯一符合。","optionNotes":["filed 是簡單過去式，只能表達與 joined 同時發生的過去動作，無法呈現「在加入之前就已完成」的先後順序，層次不足。","files 是簡單現在式，與全句描述的過去情境（joined 為過去式）矛盾，時態方向錯誤。","正解：had filed 是過去完成式，精準對應 by the time + 過去式子句所要求的「過去某時點之前已完成」的邏輯。","has filed 是現在完成式，與全句過去時空的敘事（she joined 為過去式）不一致，時態基準點錯誤。"],"keyWords":[{"word":"patent","pos":"n.","meaning":"專利","freq":"中頻"},{"word":"file a patent","pos":"phr.","meaning":"申請專利","freq":"中頻"}],"pattern":{"name":"by the time + 過去式，主句用過去完成式","note":"與未來完成式的觸發句型對稱：by the time 後接過去式子句時，主要子句須用過去完成式，表示在該過去時間點之前已完成的動作。","example":"By the time the inspector arrived, the crew had already fixed the leak."}},{"id":"x-q69","category":"verbal","categoryName":"分詞與不定詞","question":"The newly hired technician proved ___ highly skilled at circuit design.","options":["to be","be","been","being"],"answer":0,"difficulty":"中階","translation":"這位新聘的技術人員證明了自己在電路設計方面非常熟練。","explanation":"解題線索：動詞 prove 在「證明是...」的意義下，後方常接不定詞作補語。文法規則：prove/turn out + to be + 形容詞/名詞，表示「證明是、結果是」。正解 to be 唯一符合此固定搭配。","optionNotes":["正解：to be 是不定詞，符合 prove + to be + 形容詞的固定句型，表示「證明是」。","be 是原形動詞，不能直接接在 prove 後方作補語，缺少 to 的不定詞結構不合語法。","been 是過去分詞，不能直接接在 prove 後方作補語，須搭配 have 才能構成完成式，此處不適用。","being 是動名詞/現在分詞，prove 後方接補語時慣用不定詞而非動名詞，此為詞性混淆陷阱。"],"keyWords":[{"word":"prove to be","pos":"phr.v.","meaning":"證明是、結果是","freq":"高頻"},{"word":"circuit design","pos":"n.phr.","meaning":"電路設計","freq":"中頻"}],"pattern":{"name":"prove/turn out + to be","note":"prove、turn out 表示「證明是、結果是」時，後方接不定詞 to be 加形容詞或名詞作補語。","example":"The new supplier turned out to be more reliable than expected."}},{"id":"x-q70","category":"verb","categoryName":"動詞時態與語態","question":"The accounting software ___ automatically every Sunday at midnight.","options":["will update","is updating","updated","updates"],"answer":3,"difficulty":"基礎","translation":"這套會計軟體每週日午夜會自動更新。","explanation":"解題線索：every Sunday at midnight 表示週期性、規律重複發生的排程事件；主詞 software 為第三人稱單數。文法規則：描述規律性、習慣性事實時使用簡單現在式，且第三人稱單數需加 -s。正解 updates 同時符合時態與主詞一致性。","optionNotes":["will update 是未來式，僅表達單一次未來動作，無法呈現 every Sunday 這種持續重複發生的規律性。","is updating 是現在進行式，強調此刻正在進行的單一動作，與描述週期性規律事件的語意不符。","updated 是過去式，與 every Sunday 所表達的「每週固定重複」規律語意不符，規律性描述應用現在式。","正解：updates 是第三人稱單數現在式，符合 every Sunday 所表達的週期性規律事件，且動詞形式與單數主詞一致。"],"keyWords":[{"word":"automatically","pos":"adv.","meaning":"自動地","freq":"高頻"},{"word":"midnight","pos":"n.","meaning":"午夜","freq":"中頻"}],"pattern":null},{"id":"x-q71","category":"verb","categoryName":"動詞時態與語態","question":"The shipping company confirmed that the package ___ tomorrow.","options":["delivered","will be delivered","delivers","has delivered"],"answer":1,"difficulty":"中階","translation":"運送公司確認這件包裹將於明天送達。","explanation":"解題線索：that 子句尾端有明確未來時間副詞 tomorrow；且主詞 the package 是被遞送的對象（包裹不會自己遞送自己）。文法規則：未來時間副詞搭配未來式，加上被動關係須用 will be + p.p.。正解 will be delivered 同時滿足時態與語態兩條件。","optionNotes":["delivered 是簡單過去式，與句尾 tomorrow 這個未來時間副詞方向相反，時態矛盾。","正解：will be delivered 是未來被動式，同時符合 tomorrow 所需的未來時態，以及包裹被遞送的被動語態。","delivers 是簡單現在式主動語態，既未表達未來時間，也未呈現包裹被遞送的被動關係，兩項皆不符。","has delivered 是現在完成式主動語態，既非未來式，也未呈現被動關係，與句意不符。"],"keyWords":[{"word":"confirm","pos":"v.","meaning":"確認","freq":"極高頻"},{"word":"deliver","pos":"v.","meaning":"遞送、交付","freq":"極高頻"}],"pattern":null},{"id":"x-q72","category":"verbal","categoryName":"分詞與不定詞","question":"The division head delayed ___ the final budget report until next Tuesday.","options":["submitting","to submit","submit","submitted"],"answer":0,"difficulty":"基礎","translation":"部門主管將最終預算報告的提交延到了下星期二。","explanation":"解題線索：動詞 delay（延遲）表示「延後做某事」，其後接動詞作受詞時有固定搭配。文法規則：delay 屬於後方固定接動名詞（V-ing）作受詞的動詞（同類尚有 postpone、avoid、consider、suggest）。正解 submitting 唯一符合此固定搭配。","optionNotes":["正解：submitting 是動名詞，符合 delay + V-ing 的固定搭配，表示「延遲提交」。","to submit 是不定詞，delay 慣用動名詞作受詞而非不定詞，此為動詞後接詞型混淆的常見陷阱。","submit 是動詞原形，不能直接作為 delay 的受詞，delay 後方不接原形動詞。","submitted 是過去分詞，無法直接作為 delay 的受詞，詞性與句型皆不符。"],"keyWords":[{"word":"delay","pos":"v.","meaning":"延遲、推遲","freq":"高頻"},{"word":"budget report","pos":"n.phr.","meaning":"預算報告","freq":"高頻"}],"pattern":{"name":"delay/postpone/avoid/consider + V-ing","note":"這類動詞後方接動名詞（V-ing）作受詞，是 TOEIC 常考的動詞型態固定搭配，不可接不定詞或原形動詞。","example":"The committee postponed announcing the final results until Friday."}},{"id":"x-q73","category":"verb","categoryName":"動詞時態與語態","question":"The network administrators ___ the server infrastructure for eight hours.","options":["have been upgrading","will upgrade","upgraded","upgrade"],"answer":0,"difficulty":"中階","translation":"網路管理員已經升級伺服器基礎設施長達八小時。","explanation":"解題線索：句尾 for eight hours 表示動作從過去某時點持續進行了一段時間，且暗示動作可能仍在進行或剛結束、強調過程的持續性。文法規則：for + 一段時間，搭配現在完成進行式（have/has been + V-ing）表示「持續進行一段時間」。正解 have been upgrading 唯一符合。","optionNotes":["正解：have been upgrading 是現在完成進行式，精準對應 for eight hours 所強調的「持續進行一段時間」語意。","will upgrade 是未來式，與句子描述已經歷時八小時的既成過程矛盾，時態方向錯誤。","upgraded 是簡單過去式，只表示過去單一時間點的動作，未能呈現持續八小時的過程感。","upgrade 是簡單現在式，無法表達「持續進行一段時間」的時間跨度，與 for eight hours 不搭配。"],"keyWords":[{"word":"server infrastructure","pos":"n.phr.","meaning":"伺服器基礎設施","freq":"中頻"},{"word":"administrator","pos":"n.","meaning":"管理員","freq":"高頻"}],"pattern":{"name":"for + 一段時間，搭配現在完成進行式","note":"for + 時間長度（for eight hours、for two weeks）常搭配現在完成式或現在完成進行式，強調動作從過去持續至今、且延續一段時間的過程感。","example":"The technicians have been troubleshooting the issue for three hours."}},{"id":"x-q74","category":"verb","categoryName":"動詞時態與語態","question":"By the time the new CEO took office, the company's organizational chart ___.","options":["modifies","was modified","had been modified","modified"],"answer":2,"difficulty":"進階","translation":"等到新執行長上任時，公司的組織架構圖已經被修改過了。","explanation":"（本題已將原句 Before the new CEO took office 改寫為 By the time the new CEO took office，以消除「過去式與過去完成式皆可」的歧義，考點不變）解題線索：By the time 後方接過去式子句 took office，表示過去某個時間點；主要子句描述組織架構圖在該過去時間點「之前」就已被修改完成，且主詞是被修改的對象。文法規則：by the time + 過去式子句，主要子句須用過去完成式，並因被動關係採 had been + p.p.。正解 had been modified 同時符合時態與語態兩條件。","optionNotes":["modifies 是簡單現在式，與全句過去時空的敘事（took office 為過去式）矛盾，時態方向錯誤。","was modified 是簡單過去式被動語態，雖符合被動關係，但只能表示與 took office 同時發生的過去動作，缺少「先於該時點已完成」的完成層次。","正解：had been modified 是過去完成被動式，同時符合 by the time + 過去式子句所需的過去完成時態，以及組織圖被修改的被動關係。","modified 單獨使用時是簡單過去式主動語態，既缺乏被動所需的 be 動詞，也無法表達「在過去某時點之前已完成」的先後順序。"],"keyWords":[{"word":"take office","pos":"phr.v.","meaning":"就職、上任","freq":"中頻"},{"word":"organizational chart","pos":"n.phr.","meaning":"組織架構圖","freq":"中頻"}],"pattern":{"name":"by the time + 過去式，主句用過去完成式（被動）","note":"by the time 後接過去式子句時，主要子句用過去完成式表達更早發生的動作；若主詞是動作承受者，須疊加被動語態 had been + p.p.。","example":"By the time the audit began, the missing invoices had already been located."}},{"id":"x-q75","category":"verb","categoryName":"動詞時態與語態","question":"Mr. Chang usually ___ the status report before the weekly meeting begins.","options":["is preparing","prepares","prepare","prepared"],"answer":1,"difficulty":"基礎","translation":"張先生通常會在每週會議開始前準備好狀態報告。","explanation":"解題線索：頻率副詞 usually 表示常態性、習慣性的行為；主詞 Mr. Chang 為第三人稱單數。文法規則：頻率副詞搭配簡單現在式描述習慣，第三人稱單數主詞動詞需加 -s。正解 prepares 同時符合時態與主詞一致性。","optionNotes":["is preparing 是現在進行式，強調此刻正在進行的單一動作，與 usually 描述的常態習慣語意不符。","正解：prepares 是第三人稱單數現在式，符合 usually 所表達的常態習慣，且動詞形式與單數主詞 Mr. Chang 一致。","prepare 是動詞原形，主詞為第三人稱單數 Mr. Chang，動詞需加 -s，此選項犯了主詞動詞一致性錯誤。","prepared 是過去式，與 usually 所表達的「一貫、經常性」習慣語意不符，習慣性描述應用現在式。"],"keyWords":[{"word":"status report","pos":"n.phr.","meaning":"狀態報告","freq":"高頻"},{"word":"weekly meeting","pos":"n.phr.","meaning":"週會","freq":"高頻"}],"pattern":null},{"id":"x-q76","category":"verbal","categoryName":"分詞與不定詞","question":"The legal consultants recommended ___ the non-disclosure agreement immediately.","options":["sign","to sign","signing","signed"],"answer":2,"difficulty":"基礎","translation":"法律顧問建議立即簽署保密協議。","explanation":"解題線索：動詞 recommend（建議）若直接接動詞作為受詞（而非接 that 子句），有固定的詞性搭配。文法規則：recommend 直接接動詞受詞時須用動名詞形式（V-ing）（同類尚有 suggest、consider、avoid）。正解 signing 唯一符合此固定搭配。","optionNotes":["sign 是動詞原形，不能直接作為 recommend 的受詞，recommend 後方不接原形動詞作賓語。","to sign 是不定詞，recommend 直接接受詞時慣用動名詞而非不定詞，此為動詞後接詞型混淆的常見陷阱。","正解：signing 是動名詞，符合 recommend + V-ing 的固定搭配，表示「建議簽署」。","signed 是過去分詞，無法直接作為 recommend 的受詞，詞性與句型皆不符。"],"keyWords":[{"word":"recommend","pos":"v.","meaning":"建議","freq":"極高頻"},{"word":"non-disclosure agreement","pos":"n.phr.","meaning":"保密協議","freq":"中頻"}],"pattern":{"name":"recommend/suggest + V-ing","note":"recommend、suggest 直接接動詞作受詞時，須用動名詞（V-ing）；若改用 that 子句，則子句動詞用原形（虛擬語氣）。","example":"The consultant suggested restructuring the department before the merger."}},{"id":"x-q77","category":"verb","categoryName":"動詞時態與語態","question":"The data security protocol ___ by the IT taskforce last month.","options":["was implemented","implements","implemented","is implemented"],"answer":0,"difficulty":"中階","translation":"這項資料安全協定是在上個月由 IT 專案小組所實施的。","explanation":"解題線索：句尾明確過去時間副詞 last month，且主詞 the data security protocol 是被實施的對象（協定不會自己實施自己），並有 by the IT taskforce 表明動作執行者。文法規則：明確過去時間副詞搭配簡單過去式，加上被動關係須用 was/were + p.p.。正解 was implemented 同時滿足時態與語態兩條件。","optionNotes":["正解：was implemented 是簡單過去式被動語態，同時符合 last month 所需的過去時態，以及協定被實施的被動關係。","implements 是簡單現在式主動語態，既與 last month 這個過去時間矛盾，也未呈現協定被實施的被動關係。","implemented 單獨使用是簡單過去式主動語態，雖時態正確，但缺少 be 動詞無法表達被動語態，語態不符。","is implemented 是現在式被動語態，語態正確但時態錯誤，與 last month 這個過去時間副詞矛盾。"],"keyWords":[{"word":"protocol","pos":"n.","meaning":"協定、規範","freq":"中頻"},{"word":"taskforce","pos":"n.","meaning":"專案小組","freq":"中頻"}],"pattern":null},{"id":"x-q78","category":"verb","categoryName":"動詞時態與語態","question":"The procurement manager ___ with three potential suppliers later today.","options":["meets","will meet","met","has met"],"answer":1,"difficulty":"基礎","translation":"採購經理今天稍晚將與三家潛在供應商會面。","explanation":"解題線索：句尾 later today 表示今日稍晚、屬於未來的時間點，描述的是採購經理尚未發生的個人安排。文法規則：未來時間副詞搭配簡單未來式（will + 原形動詞）表達尚未發生的計畫或動作。正解 will meet 唯一符合。","optionNotes":["meets 是簡單現在式，若無明確固定時刻表語境，不足以表達 later today 這種尚未發生的個人安排，容易與時間副詞矛盾。","正解：will meet 是簡單未來式，精準對應 later today 所表達的尚未發生的未來動作。","met 是過去式，與 later today 所指的未來時間方向相反，時態錯誤。","has met 是現在完成式，強調動作已完成，與 later today 描述的未來安排矛盾。"],"keyWords":[{"word":"procurement manager","pos":"n.phr.","meaning":"採購經理","freq":"高頻"},{"word":"potential supplier","pos":"n.phr.","meaning":"潛在供應商","freq":"中頻"}],"pattern":null},{"id":"x-q79","category":"verbal","categoryName":"分詞與不定詞","question":"The lab technician was seen ___ the cleanroom after hours.","options":["entered","enters","enter","entering"],"answer":3,"difficulty":"進階","translation":"這名實驗室技術人員被目擊在下班後的時間進入無塵室。","explanation":"解題線索：句型 was seen（被看見）是感官動詞 see 的被動語態，後方接的補語形式與主動語態時不同。文法規則：感官動詞主動語態接受詞 + 原形動詞（see sb do），但改為被動語態時，原形動詞須還原為現在分詞（be seen + V-ing）或不定詞（be seen to V）；此處選項只提供現在分詞形式。正解 entering 符合此被動轉換規則。","optionNotes":["entered 是過去式，不能作為 was seen 後方的補語，補語應為分詞或不定詞而非限定動詞。","enters 是第三人稱單數現在式，同樣不能作為 was seen 後方的補語，詞性不符句型需求。","enter 是原形動詞，只能用於主動語態 see sb enter 的句型，被動語態 was seen 後方不可直接接原形動詞。","正解：entering 是現在分詞，符合感官動詞被動語態 be seen + V-ing 的補語形式，表示「被看見正在做某事」。"],"keyWords":[{"word":"cleanroom","pos":"n.","meaning":"無塵室","freq":"低頻"},{"word":"after hours","pos":"phr.","meaning":"下班後、非上班時間","freq":"中頻"}],"pattern":{"name":"感官動詞被動語態：be seen/heard + V-ing","note":"感官動詞主動語態用 see/hear + sb + 原形動詞或 V-ing；改為被動語態後，原形動詞必須改為現在分詞（V-ing）或不定詞（to V），不可保留原形。","example":"The manager was heard discussing the layoffs with HR."}},{"id":"x-q80","category":"verb","categoryName":"動詞時態與語態","question":"Last week, the marketing department ___ the budget constraints before launching the ads.","options":["considering","will consider","considered","considers"],"answer":2,"difficulty":"中階","translation":"上週，行銷部門在投放廣告之前先考量了預算限制。","explanation":"（本題已加入句首 Last week 明確過去時間副詞，以消除原句在「習慣性現在式」與「單一過去事件」間的歧義，考點不變）解題線索：句首明確過去時間副詞 Last week，指示這是一次已發生的具體過去事件，而非常態性習慣。文法規則：明確過去時間副詞搭配簡單過去式。正解 considered 唯一符合。","optionNotes":["considering 是現在分詞，不能單獨作句子的主要動詞，缺少 be 動詞會使句子結構不完整。","will consider 是未來式，與 Last week 所指的過去時間方向相反，時態矛盾。","正解：considered 是簡單過去式，精準對應 Last week 這個明確過去時間副詞，描述一次已完成的具體行為。","considers 是簡單現在式，用於描述習慣性或常態性行為，與 Last week 這個具體過去時間點矛盾。"],"keyWords":[{"word":"budget constraint","pos":"n.phr.","meaning":"預算限制","freq":"中頻"},{"word":"launch","pos":"v.","meaning":"推出、發起","freq":"高頻"}],"pattern":null},{"id":"x-q81","category":"verb","categoryName":"動詞時態與語態","question":"The production line supervisor ensures that all machinery ___ properly.","options":["is lubricated","lubricates","lubricate","lubricating"],"answer":0,"difficulty":"中階","translation":"生產線主管確保所有機械都得到妥善的潤滑。","explanation":"解題線索：主詞 all machinery（機械）是被潤滑的對象，機械本身不會主動潤滑自己；且 ensures that 描述的是一般性、常態性的確保事實，非虛擬語氣觸發詞。文法規則：ensure that 子句依實際語意選用時態，此處為現在式常態事實，並因被動關係採 is + p.p.。正解 is lubricated 同時符合時態與語態兩條件。","optionNotes":["正解：is lubricated 是簡單現在式被動語態，符合機械被潤滑的被動關係，且對應常態性事實的現在式時態。","lubricates 是簡單現在式主動語態，但機械是被潤滑的對象而非主動執行者，語態方向錯誤。","lubricate 是動詞原形；ensure 不像 request、insist 等動詞會觸發虛擬語氣，此處子句需依常態事實用是現在式的 is lubricated，故原形動詞不適用。","lubricating 是現在分詞，不能單獨作為 that 子句的主要動詞，缺少 be 動詞句子不完整。"],"keyWords":[{"word":"ensure","pos":"v.","meaning":"確保","freq":"極高頻"},{"word":"lubricate","pos":"v.","meaning":"潤滑","freq":"低頻"}],"pattern":null},{"id":"x-q82","category":"verbal","categoryName":"分詞與不定詞","question":"We look forward to ___ your technical team at the upcoming exhibition.","options":["meet","meeting","to meet","met"],"answer":1,"difficulty":"中階","translation":"我們期待在即將舉行的展覽上與貴公司的技術團隊會面。","explanation":"解題線索：固定片語 look forward to 中的 to 是介系詞，而非不定詞的 to。文法規則：介系詞後方須接名詞或動名詞，不能接原形動詞。正解 meeting 為動名詞，唯一符合介系詞 to 後方的詞性要求。","optionNotes":["meet 是動詞原形，不能直接接在介系詞 to 後方，違反介系詞後接名詞/動名詞的規則。","正解：meeting 是動名詞，符合 look forward to（介系詞 to）+ V-ing 的固定搭配。","to meet 誤把 look forward to 的 to 當成不定詞的 to，形成 to to meet 的重複結構，是最容易誤選的陷阱選項。","met 是過去式動詞，同樣不能接在介系詞後方，詞性完全不符。"],"keyWords":[{"word":"look forward to","pos":"phr.v.","meaning":"期待","freq":"極高頻"},{"word":"exhibition","pos":"n.","meaning":"展覽","freq":"高頻"}],"pattern":{"name":"look forward to + V-ing（to 為介系詞）","note":"look forward to、be used to、object to 等片語中的 to 是介系詞，後方必須接動名詞（V-ing），是 TOEIC 最常考的介系詞 vs 不定詞混淆陷阱之一。","example":"The staff are used to working under tight deadlines."}},{"id":"x-q83","category":"verb","categoryName":"動詞時態與語態","question":"The structural analysis ___ that the pipeline can withstand high pressure.","options":["indicated","indicates","indicating","indicate"],"answer":1,"difficulty":"中階","translation":"結構分析顯示這條管線能承受高壓。","explanation":"解題線索：書面報告、研究、分析類主詞（report、study、analysis）陳述其內容時，英語慣例採用簡單現在式，表示該文件「目前所呈現」的內容，不論分析何時完成；且主詞為單數。文法規則：報告類主詞 + 現在式動詞（indicates、shows、states）陳述文件內容，第三人稱單數需加 -s。正解 indicates 同時符合此慣例與主詞一致性。","optionNotes":["indicated 是過去式，雖然分析可能是過去完成的，但描述報告內容時英語慣例仍用現在式陳述其結論，故不選過去式。","正解：indicates 是第三人稱單數現在式，符合「報告/分析顯示...」的英語慣用陳述時態，且與單數主詞 analysis 一致。","indicating 是現在分詞，不能單獨作句子的主要動
