職信能讓你在眾多應徵者中脫穎而出。","collocations":["write a cover letter","attach a cover letter","tailored cover letter"],"freq":"中頻","tip":"通常與 résumé 一起提交，考題常出現 résumé and cover letter 並列。"},{"id":"x-v45","theme":"office","themeName":"辦公室與人資","word":"interviewer","pos":"n.","meaning":"面試官","example":"The interviewer asked about her experience managing remote teams.","exampleZh":"面試官詢問她管理遠端團隊的經驗。","collocations":["panel of interviewers","interviewer's questions","impress the interviewer"],"freq":"中頻","tip":"-er 字尾表「執行動作的人」，interviewee 則為「被面試者」，注意詞尾對比。"},{"id":"x-v46","theme":"office","themeName":"辦公室與人資","word":"orientation","pos":"n.","meaning":"職前訓練、新人導覽","example":"All new hires must complete a one-day orientation session.","exampleZh":"所有新進員工都必須完成一天的職前訓練課程。","collocations":["orientation session","new employee orientation","orientation program"],"freq":"中頻","tip":"orientation session（新人說明會）是人事類文章開場常見場景字。"},{"id":"x-v47","theme":"office","themeName":"辦公室與人資","word":"payroll","pos":"n.","meaning":"薪資名冊、薪資作業","example":"The payroll department processes salaries on the last day of each month.","exampleZh":"薪資部門在每個月最後一天處理薪資發放作業。","collocations":["payroll department","on the payroll","payroll system"],"freq":"中頻","tip":"on the payroll 意為「在職、領薪」，常見於人力配置相關敘述。"},{"id":"x-v48","theme":"office","themeName":"辦公室與人資","word":"layoff","pos":"n.","meaning":"裁員","example":"The company announced layoffs affecting 200 employees nationwide.","exampleZh":"公司宣布了影響全國兩百名員工的裁員計畫。","collocations":["announce layoffs","face layoffs","layoff notice"],"freq":"中頻","tip":"名詞連字號寫法 layoff，動詞片語則拆開寫 lay off employees，拼法易混。"},{"id":"x-v49","theme":"office","themeName":"辦公室與人資","word":"termination","pos":"n.","meaning":"終止（僱用）","example":"The contract outlines the conditions for termination of employment.","exampleZh":"該合約載明了終止僱傭關係的條件。","collocations":["termination of employment","termination clause","upon termination"],"freq":"中頻","tip":"termination clause（終止條款）常見於合約類閱讀文章。"},{"id":"x-v50","theme":"office","themeName":"辦公室與人資","word":"resignation","pos":"n.","meaning":"辭職","example":"He submitted his resignation letter two weeks in advance.","exampleZh":"他提前兩週遞交了辭職信。","collocations":["submit a resignation","letter of resignation","tender one's resignation"],"freq":"中頻","tip":"submit/tender one's resignation 為固定搭配，letter of resignation 即辭呈。"},{"id":"x-v51","theme":"office","themeName":"辦公室與人資","word":"demotion","pos":"n.","meaning":"降職","example":"His demotion came after several missed sales targets.","exampleZh":"他的降職發生在多次未達成銷售目標之後。","collocations":["demotion from","face demotion","demotion to"],"freq":"中頻","tip":"與 promotion（升遷）恰為反義詞，字首 de- 常表「向下、去除」。"},{"id":"x-v52","theme":"office","themeName":"辦公室與人資","word":"performance review","pos":"n.","meaning":"績效考核","example":"Annual performance reviews determine eligibility for bonuses.","exampleZh":"年度績效考核將決定是否有資格獲得獎金。","collocations":["annual performance review","conduct a performance review","performance review meeting"],"freq":"中頻","tip":"conduct a performance review 為固定動詞搭配，常與 evaluation 互換使用。"},{"id":"x-v53","theme":"office","themeName":"辦公室與人資","word":"evaluation","pos":"n.","meaning":"評估","example":"The manager will complete a written evaluation for each team member.","exampleZh":"經理將為每位團隊成員完成一份書面評估。","collocations":["performance evaluation","conduct an evaluation","evaluation criteria"],"freq":"中頻","tip":"evaluation criteria（評估標準）為常見複合搭配，動詞為 evaluate。"},{"id":"x-v54","theme":"office","themeName":"辦公室與人資","word":"feedback","pos":"n.","meaning":"意見回饋","example":"We welcome feedback from customers to improve our service.","exampleZh":"我們歡迎顧客提供意見回饋以改善服務。","collocations":["provide feedback","constructive feedback","feedback on"],"freq":"高頻","tip":"feedback 為不可數名詞，不可加 s 或搭配 a，考題常出這個文法陷阱。"},{"id":"x-v55","theme":"office","themeName":"辦公室與人資","word":"bonus","pos":"n.","meaning":"獎金","example":"Employees will receive a year-end bonus based on performance.","exampleZh":"員工將依績效領取年終獎金。","collocations":["year-end bonus","signing bonus","performance bonus"],"freq":"高頻","tip":"signing bonus（簽約獎金）常見於招募類文章，注意與薪資 salary 區分。"},{"id":"x-v56","theme":"office","themeName":"辦公室與人資","word":"stipend","pos":"n.","meaning":"津貼","example":"Interns receive a monthly stipend to cover basic expenses.","exampleZh":"實習生每月可領取一筆津貼以支應基本開銷。","collocations":["monthly stipend","housing stipend","receive a stipend"],"freq":"中頻","tip":"stipend 常用於實習生或研究人員的固定津貼，與正式薪資 salary 不同。"},{"id":"x-v57","theme":"office","themeName":"辦公室與人資","word":"allowance","pos":"n.","meaning":"津貼","example":"Sales staff receive a travel allowance for client visits.","exampleZh":"業務人員因拜訪客戶可領取一筆交通津貼。","collocations":["travel allowance","housing allowance","meal allowance"],"freq":"中頻","tip":"allowance 泛指各類補貼（travel/housing/meal），比 stipend 使用範圍更廣。"},{"id":"x-v58","theme":"office","themeName":"辦公室與人資","word":"pension","pos":"n.","meaning":"退休金","example":"The firm contributes a fixed percentage to each employee's pension.","exampleZh":"公司會依固定比例為每位員工提撥退休金。","collocations":["pension plan","pension fund","contribute to a pension"],"freq":"中頻","tip":"pension plan/fund 為固定複合詞，常見於員工福利說明段落。"},{"id":"x-v59","theme":"office","themeName":"辦公室與人資","word":"retirement","pos":"n.","meaning":"退休","example":"She plans to travel extensively after her retirement next year.","exampleZh":"她計畫在明年退休後大量旅行。","collocations":["early retirement","retirement plan","upon retirement"],"freq":"中頻","tip":"early retirement（提前退休）是人事類文章常見片語。"},{"id":"x-v60","theme":"office","themeName":"辦公室與人資","word":"seniority","pos":"n.","meaning":"年資","example":"Vacation days increase according to an employee's seniority.","exampleZh":"休假天數會依員工的年資增加。","collocations":["based on seniority","seniority system","gain seniority"],"freq":"中頻","tip":"senior（資深的）的抽象名詞形式，常搭配 based on seniority。"},{"id":"x-v61","theme":"office","themeName":"辦公室與人資","word":"workforce","pos":"n.","meaning":"勞動力、員工總數","example":"The factory's workforce has grown by 15 percent this year.","exampleZh":"這間工廠的員工總數今年成長了百分之十五。","collocations":["skilled workforce","workforce reduction","expand the workforce"],"freq":"中頻","tip":"workforce 為集合名詞，指某公司或地區「全體勞動人口」，單數視為整體。"},{"id":"x-v62","theme":"office","themeName":"辦公室與人資","word":"staffing","pos":"n.","meaning":"人力配置","example":"The clinic is reviewing its staffing levels ahead of the busy season.","exampleZh":"診所正在旺季前檢討其人力配置水準。","collocations":["staffing levels","staffing agency","staffing needs"],"freq":"中頻","tip":"staffing agency（人力仲介公司）常見於招募類廣告文章。"},{"id":"x-v63","theme":"office","themeName":"辦公室與人資","word":"headcount","pos":"n.","meaning":"員工人數","example":"Management approved an increase in headcount for the new branch.","exampleZh":"管理層核准了新分公司增加員工人數的計畫。","collocations":["increase headcount","headcount freeze","current headcount"],"freq":"中頻","tip":"headcount freeze（人力凍結）為財報與人事新聞常見用語。"},{"id":"x-v64","theme":"office","themeName":"辦公室與人資","word":"personnel","pos":"n.","meaning":"人事、員工","example":"Only authorized personnel are allowed in the server room.","exampleZh":"只有經授權的人員才能進入伺服器機房。","collocations":["authorized personnel","personnel department","military personnel"],"freq":"高頻","tip":"personnel 作「全體員工」解時視為複數，不加 s；當「人事部門」則為單數名詞。"},{"id":"x-v65","theme":"office","themeName":"辦公室與人資","word":"supervise","pos":"v.","meaning":"監督","example":"He supervises a team of eight customer service representatives.","exampleZh":"他監督一個八人的客服代表團隊。","collocations":["supervise a team","closely supervise","supervise operations"],"freq":"中頻","tip":"supervisor（主管）為此動詞的行為者名詞，兩者常一起出現在句子填空題。"},{"id":"x-v66","theme":"office","themeName":"辦公室與人資","word":"mentor","pos":"n.","meaning":"導師","example":"Every new employee is paired with a mentor during the first month.","exampleZh":"每位新進員工在第一個月都會配對一位導師。","collocations":["assign a mentor","mentor and mentee","act as a mentor"],"freq":"中頻","tip":"mentor 也可作動詞「指導」，注意 mentor 與 mentee（受指導者）的角色對比。"},{"id":"x-v67","theme":"office","themeName":"辦公室與人資","word":"mentorship","pos":"n.","meaning":"指導關係","example":"The mentorship program pairs junior staff with senior executives.","exampleZh":"這項指導計畫將資淺員工與資深主管配對。","collocations":["mentorship program","under someone's mentorship","formal mentorship"],"freq":"中頻","tip":"mentorship program 是人資福利類文章的常見專案名稱。"},{"id":"x-v68","theme":"office","themeName":"辦公室與人資","word":"coaching","pos":"n.","meaning":"指導、教練","example":"The sales team receives weekly coaching from the regional director.","exampleZh":"業務團隊每週都會接受區域總監的指導。","collocations":["receive coaching","coaching session","one-on-one coaching"],"freq":"中頻","tip":"one-on-one coaching（一對一指導）常見於員工培訓相關廣告。"},{"id":"x-v69","theme":"office","themeName":"辦公室與人資","word":"workshop","pos":"n.","meaning":"研習營、工作坊","example":"The company organized a workshop on effective time management.","exampleZh":"公司舉辦了一場關於有效時間管理的工作坊。","collocations":["attend a workshop","conduct a workshop","hands-on workshop"],"freq":"中頻","tip":"attend/conduct a workshop 固定搭配，常與 seminar 一起考選字辨析。"},{"id":"x-v70","theme":"office","themeName":"辦公室與人資","word":"seminar","pos":"n.","meaning":"研討會","example":"She will lead a seminar on workplace communication skills.","exampleZh":"她將主持一場關於職場溝通技巧的研討會。","collocations":["lead a seminar","attend a seminar","seminar on"],"freq":"中頻","tip":"seminar 偏「講座式」，workshop 偏「實作式」，兩字常互為誘答選項。"},{"id":"x-v71","theme":"office","themeName":"辦公室與人資","word":"grievance","pos":"n.","meaning":"申訴、不滿","example":"Employees can file a grievance through the HR complaint system.","exampleZh":"員工可以透過人資申訴系統提出申訴。","collocations":["file a grievance","grievance procedure","address a grievance"],"freq":"中頻","tip":"file a grievance（提出申訴）常與 dispute、mediation 一起出現於勞資段落。"},{"id":"x-v72","theme":"office","themeName":"辦公室與人資","word":"dispute","pos":"n.","meaning":"糾紛","example":"The contract dispute was eventually settled through arbitration.","exampleZh":"這起合約糾紛最終透過仲裁解決。","collocations":["labor dispute","settle a dispute","dispute over"],"freq":"中頻","tip":"settle a dispute（解決糾紛）常搭配 arbitration/mediation 作為解決方式。"},{"id":"x-v73","theme":"office","themeName":"辦公室與人資","word":"mediation","pos":"n.","meaning":"調解","example":"Both parties agreed to resolve the issue through mediation.","exampleZh":"雙方同意透過調解來解決此問題。","collocations":["through mediation","mediation process","seek mediation"],"freq":"中頻","tip":"mediation（第三方協助雙方和解）比 arbitration（仲裁定案）較無約束力，常對比出題。"},{"id":"x-v74","theme":"office","themeName":"辦公室與人資","word":"arbitration","pos":"n.","meaning":"仲裁","example":"The union and management submitted the dispute to arbitration.","exampleZh":"工會與資方將這起糾紛提交仲裁。","collocations":["submit to arbitration","binding arbitration","arbitration clause"],"freq":"中頻","tip":"binding arbitration（有約束力的仲裁）常見於合約 arbitration clause 條款。"},{"id":"x-v75","theme":"office","themeName":"辦公室與人資","word":"union","pos":"n.","meaning":"工會","example":"The union negotiated better working conditions for factory staff.","exampleZh":"工會為工廠員工爭取到了更好的工作條件。","collocations":["labor union","union member","union negotiation"],"freq":"中頻","tip":"labor union（勞工工會）為固定複合詞，negotiation 常一起出現。"},{"id":"x-v76","theme":"office","themeName":"辦公室與人資","word":"harassment","pos":"n.","meaning":"騷擾","example":"The company has a zero-tolerance policy on workplace harassment.","exampleZh":"公司對職場騷擾採取零容忍政策。","collocations":["workplace harassment","harassment policy","report harassment"],"freq":"中頻","tip":"zero-tolerance policy on harassment 為職場行為準則常見固定句型。"},{"id":"x-v77","theme":"office","themeName":"辦公室與人資","word":"discrimination","pos":"n.","meaning":"歧視","example":"The policy prohibits discrimination based on age or gender.","exampleZh":"該政策禁止基於年齡或性別的歧視。","collocations":["discrimination based on","prohibit discrimination","face discrimination"],"freq":"中頻","tip":"discrimination based on + 特徵（age/gender/race）為固定搭配句型。"},{"id":"x-v78","theme":"office","themeName":"辦公室與人資","word":"diversity","pos":"n.","meaning":"多元性","example":"The firm launched an initiative to promote diversity in leadership roles.","exampleZh":"公司推出一項倡議，以促進領導職位的多元性。","collocations":["promote diversity","diversity and inclusion","cultural diversity"],"freq":"中頻","tip":"diversity and inclusion（多元與包容，簡稱 D&I）常成對出現於企業文件。"},{"id":"x-v79","theme":"office","themeName":"辦公室與人資","word":"inclusion","pos":"n.","meaning":"包容","example":"The training focuses on fostering inclusion across all departments.","exampleZh":"這項訓練著重於在各部門間培養包容的氛圍。","collocations":["foster inclusion","diversity and inclusion","sense of inclusion"],"freq":"中頻","tip":"與 diversity 幾乎必然成對出現，常縮寫為 D&I 出現在企業政策文章。"},{"id":"x-v80","theme":"office","themeName":"辦公室與人資","word":"code of conduct","pos":"n.","meaning":"行為準則","example":"All contractors are required to follow the company's code of conduct.","exampleZh":"所有承包商都必須遵守公司的行為準則。","collocations":["follow the code of conduct","violate the code of conduct","sign the code of conduct"],"freq":"中頻","tip":"violate the code of conduct（違反行為準則）常見於合規類文章。"},{"id":"x-v81","theme":"office","themeName":"辦公室與人資","word":"job description","pos":"n.","meaning":"職位說明","example":"The job description lists both required and preferred qualifications.","exampleZh":"職位說明列出了必要與加分的資格條件。","collocations":["detailed job description","match the job description","job description includes"],"freq":"中頻","tip":"招募廣告閱讀題常直接引用 job description 內容出題比對細節。"},{"id":"x-v82","theme":"office","themeName":"辦公室與人資","word":"responsibility","pos":"n.","meaning":"職責","example":"Managing client accounts is one of her main responsibilities.","exampleZh":"管理客戶帳戶是她的主要職責之一。","collocations":["take responsibility","primary responsibility","assume responsibility"],"freq":"高頻","tip":"assume/take responsibility for（承擔責任）為固定搭配，後接 for + N/Ving。"},{"id":"x-v83","theme":"office","themeName":"辦公室與人資","word":"duty","pos":"n.","meaning":"職責、任務","example":"Reception staff have a duty to greet all visitors promptly.","exampleZh":"接待人員有責任迅速地迎接所有訪客。","collocations":["on duty","duty to","carry out duties"],"freq":"中頻","tip":"on duty（值勤中）與 off duty（下班）為聽力對話高頻片語。"},{"id":"x-v84","theme":"office","themeName":"辦公室與人資","word":"attendance","pos":"n.","meaning":"出勤","example":"Perfect attendance this quarter earned her a small bonus.","exampleZh":"這一季全勤讓她獲得了一筆小獎金。","collocations":["attendance record","perfect attendance","take attendance"],"freq":"中頻","tip":"attendance record（出勤紀錄）常見於人事考核類文章。"},{"id":"x-v85","theme":"office","themeName":"辦公室與人資","word":"punctual","pos":"adj.","meaning":"準時的","example":"Being punctual for client meetings reflects professionalism.","exampleZh":"準時出席客戶會議展現了專業態度。","collocations":["punctual arrival","remain punctual","punctual for"],"freq":"中頻","tip":"形容詞修飾人或行為，其副詞為 punctually，名詞為 punctuality。"},{"id":"x-v86","theme":"office","themeName":"辦公室與人資","word":"punctuality","pos":"n.","meaning":"準時","example":"Punctuality is highly valued in this company's culture.","exampleZh":"準時在這間公司的文化中備受重視。","collocations":["value punctuality","punctuality is essential","emphasize punctuality"],"freq":"中頻","tip":"punctual（形容詞）→ punctuality（名詞），詞性變化常出現在字彙題。"},{"id":"x-v87","theme":"office","themeName":"辦公室與人資","word":"receipt","pos":"n.","meaning":"收據","example":"Keep your receipt in case you need to request a refund.","exampleZh":"請保留收據，以備日後需要申請退款時使用。","collocations":["keep a receipt","upon receipt","receipt of payment"],"freq":"高頻","tip":"upon receipt of（一收到…就）為公文常見片語，注意 p 不發音。"},{"id":"x-v88","theme":"fin","themeName":"財務、採購與物流","word":"budget","pos":"n.","meaning":"預算","example":"The marketing team must stay within the approved budget.","exampleZh":"行銷團隊必須維持在核准的預算範圍內。","collocations":["within budget","budget for","tight budget"],"freq":"極高頻","tip":"within budget（在預算內）與 over budget（超支）為常見對比片語。"},{"id":"x-v89","theme":"fin","themeName":"財務、採購與物流","word":"expense","pos":"n.","meaning":"開支、費用","example":"Travel expenses must be submitted with original receipts.","exampleZh":"差旅開支必須連同正本收據一起提交。","collocations":["travel expense","expense report","at the expense of"],"freq":"高頻","tip":"expense report（費用報告）為財務核銷類文章高頻詞。"},{"id":"x-v90","theme":"fin","themeName":"財務、採購與物流","word":"refund","pos":"n./v.","meaning":"退款","example":"Customers are entitled to a full refund within 30 days.","exampleZh":"顧客在三十天內有權獲得全額退款。","collocations":["full refund","request a refund","refund policy"],"freq":"高頻","tip":"refund policy（退款政策）常見於客服與購物類閱讀文章。"},{"id":"x-v91","theme":"fin","themeName":"財務、採購與物流","word":"warranty","pos":"n.","meaning":"保固","example":"The printer comes with a two-year manufacturer's warranty.","exampleZh":"這台印表機附有兩年的原廠保固。","collocations":["under warranty","extend a warranty","warranty period"],"freq":"中頻","tip":"under warranty（在保固期內）為固定片語，常見於產品說明與客服信件。"},{"id":"x-v92","theme":"fin","themeName":"財務、採購與物流","word":"purchase order","pos":"n.","meaning":"採購單","example":"No shipment will be processed without an approved purchase order.","exampleZh":"沒有核准的採購單，任何貨物都不會出貨處理。","collocations":["issue a purchase order","approve a purchase order","purchase order number"],"freq":"中頻","tip":"常縮寫為 PO，issue a purchase order 為採購流程固定搭配。"},{"id":"x-v93","theme":"fin","themeName":"財務、採購與物流","word":"revenue","pos":"n.","meaning":"營收","example":"Quarterly revenue exceeded analysts' expectations this year.","exampleZh":"今年的季度營收超出了分析師的預期。","collocations":["generate revenue","revenue growth","annual revenue"],"freq":"高頻","tip":"generate revenue（創造營收）為財經類文章最常見動詞搭配。"},{"id":"x-v94","theme":"fin","themeName":"財務、採購與物流","word":"deposit","pos":"n.","meaning":"訂金、存款","example":"A 20 percent deposit is required to confirm the booking.","exampleZh":"確認訂位須先支付百分之二十的訂金。","collocations":["pay a deposit","security deposit","deposit is required"],"freq":"中頻","tip":"security deposit（保證金）常見於租賃合約，也是房產類高頻詞。"},{"id":"x-v95","theme":"fin","themeName":"財務、採購與物流","word":"interest","pos":"n.","meaning":"興趣；利息","example":"The savings account offers a 2 percent annual interest rate.","exampleZh":"這個儲蓄帳戶提供百分之二的年利率。","collocations":["interest rate","earn interest","in the interest of"],"freq":"高頻","tip":"財經語境中 interest 指「利息」，interest rate（利率）為必考搭配。"},{"id":"x-v96","theme":"fin","themeName":"財務、採購與物流","word":"principal","pos":"n./adj.","meaning":"本金；主要的","example":"Monthly payments cover both principal and interest.","exampleZh":"每月還款同時涵蓋本金與利息。","collocations":["principal and interest","principal amount","principal office"],"freq":"中頻","tip":"與 principle（原則）同音異義，財經語境中意為「本金」須靠拼字分辨。"},{"id":"x-v97","theme":"fin","themeName":"財務、採購與物流","word":"capital","pos":"n./adj.","meaning":"資本；首都；大寫的","example":"The startup needs additional capital to expand overseas.","exampleZh":"這間新創公司需要額外的資本才能拓展海外市場。","collocations":["raise capital","capital investment","working capital"],"freq":"高頻","tip":"raise capital（募集資金）為財經類文章高頻動詞搭配，勿與 capitol（國會大廈）混淆。"},{"id":"x-v98","theme":"fin","themeName":"財務、採購與物流","word":"insure","pos":"v.","meaning":"投保","example":"The shipment was insured against damage during transit.","exampleZh":"這批貨物已投保以防運送途中受損。","collocations":["insure against","fully insured","insure a shipment"],"freq":"中頻","tip":"insure against（針對…投保）固定搭配，與 ensure（確保）拼字相近須分辨。"},{"id":"x-v99","theme":"fin","themeName":"財務、採購與物流","word":"economic","pos":"adj.","meaning":"經濟的","example":"Economic growth slowed slightly in the last quarter.","exampleZh":"上一季的經濟成長略微放緩。","collocations":["economic growth","economic policy","economic downturn"],"freq":"高頻","tip":"economic 修飾「經濟面」的客觀事物，與下方 economical（省錢的）意義不同。"},{"id":"x-v100","theme":"fin","themeName":"財務、採購與物流","word":"economical","pos":"adj.","meaning":"節省的、划算的","example":"Buying in bulk is a more economical option for the office.","exampleZh":"大量採購對辦公室而言是更划算的選擇。","collocations":["economical option","economical choice","fuel-economical"],"freq":"中頻","tip":"economical 形容「省錢、划算」，常與 economic（經濟的）搭配詞義辨析出題。"},{"id":"x-v101","theme":"fin","themeName":"財務、採購與物流","word":"account for","pos":"phr.","meaning":"說明；佔（比例）","example":"Overseas sales account for nearly 40 percent of total revenue.","exampleZh":"海外銷售約佔總營收的百分之四十。","collocations":["account for","account for a percentage","fully account for"],"freq":"高頻","tip":"account for a percentage（佔百分比）是財報圖表類閱讀題常見句型。"},{"id":"x-v102","theme":"fin","themeName":"財務、採購與物流","word":"overhead","pos":"n.","meaning":"營運成本、間接費用","example":"The company reduced overhead by moving to a smaller office.","exampleZh":"公司透過搬到較小的辦公室來降低營運成本。","collocations":["reduce overhead","overhead costs","cover overhead"],"freq":"中頻","tip":"overhead costs 泛指租金、水電等固定間接成本，與直接生產成本不同。"},{"id":"x-v103","theme":"fin","themeName":"財務、採購與物流","word":"profit margin","pos":"n.","meaning":"利潤率","example":"Rising material costs have narrowed the company's profit margin.","exampleZh":"原物料成本上升已使公司的利潤率縮小。","collocations":["narrow profit margin","healthy profit margin","increase profit margin"],"freq":"中頻","tip":"narrow/widen profit margin 為財經類文章常見動詞搭配。"},{"id":"x-v104","theme":"fin","themeName":"財務、採購與物流","word":"net income","pos":"n.","meaning":"淨收入","example":"Net income rose 12 percent compared to the previous year.","exampleZh":"淨收入較去年同期成長了百分之十二。","collocations":["net income rose","report net income","net income of"],"freq":"中頻","tip":"net（淨額，扣除成本後）與 gross（總額，未扣除）為財報常見對比詞。"},{"id":"x-v105","theme":"fin","themeName":"財務、採購與物流","word":"gross income","pos":"n.","meaning":"總收入","example":"Gross income does not reflect taxes and other deductions.","exampleZh":"總收入並未反映稅金與其他扣除額。","collocations":["gross income","gross revenue","gross versus net"],"freq":"中頻","tip":"與 net income 成對出題，gross 指扣除前的總額，net 指扣除後的淨額。"},{"id":"x-v106","theme":"fin","themeName":"財務、採購與物流","word":"fiscal year","pos":"n.","meaning":"會計年度","example":"The company's fiscal year begins in April and ends in March.","exampleZh":"這間公司的會計年度從四月開始到三月結束。","collocations":["fiscal year ends","current fiscal year","fiscal year begins"],"freq":"中頻","tip":"fiscal year 不一定與日曆年相同，閱讀題常考起訖月份的細節比對。"},{"id":"x-v107","theme":"fin","themeName":"財務、採購與物流","word":"quarterly","pos":"adj.","meaning":"每季的","example":"The board reviews quarterly earnings reports every three months.","exampleZh":"董事會每三個月審視一次季度盈餘報告。","collocations":["quarterly report","quarterly earnings","quarterly basis"],"freq":"中頻","tip":"quarterly report（季報）常與 annual report（年報）對比出現於財經文章。"},{"id":"x-v108","theme":"fin","themeName":"財務、採購與物流","word":"annual report","pos":"n.","meaning":"年報","example":"Shareholders will receive the annual report before the meeting.","exampleZh":"股東將在會議前收到年報。","collocations":["publish an annual report","annual report shows","review the annual report"],"freq":"中頻","tip":"annual report 常搭配 shareholders/board 出現，是財報類閱讀常見主題。"},{"id":"x-v109","theme":"fin","themeName":"財務、採購與物流","word":"balance sheet","pos":"n.","meaning":"資產負債表","example":"The balance sheet lists all of the company's assets and liabilities.","exampleZh":"資產負債表列出了公司所有的資產與負債。","collocations":["review a balance sheet","balance sheet shows","strong balance sheet"],"freq":"中頻","tip":"balance sheet 記錄「某時間點」的資產負債狀況，與 income statement 記錄期間損益不同。"},{"id":"x-v110","theme":"fin","themeName":"財務、採購與物流","word":"income statement","pos":"n.","meaning":"損益表","example":"The income statement shows a steady rise in operating profit.","exampleZh":"損益表顯示營業利潤穩定上升。","collocations":["prepare an income statement","income statement reflects","review the income statement"],"freq":"中頻","tip":"income statement 反映「一段期間」的收入與支出，與資產負債表的時點性質不同。"},{"id":"x-v111","theme":"fin","themeName":"財務、採購與物流","word":"cash flow","pos":"n.","meaning":"現金流","example":"Delayed payments from clients have hurt the firm's cash flow.","exampleZh":"客戶延遲付款已經影響了公司的現金流。","collocations":["cash flow problem","positive cash flow","cash flow statement"],"freq":"高頻","tip":"positive/negative cash flow 為財經新聞常見對比，statement 三大報表之一。"},{"id":"x-v112","theme":"fin","themeName":"財務、採購與物流","word":"asset","pos":"n.","meaning":"資產","example":"Real estate remains the company's most valuable asset.","exampleZh":"不動產仍是這間公司最有價值的資產。","collocations":["fixed asset","valuable asset","asset management"],"freq":"高頻","tip":"fixed asset（固定資產）與 liability（負債）為資產負債表核心對比概念。"},{"id":"x-v113","theme":"fin","themeName":"財務、採購與物流","word":"liability","pos":"n.","meaning":"負債；（法律）責任","example":"The company's liabilities exceeded its assets after the acquisition.","exampleZh":"併購後，該公司的負債超過了資產。","collocations":["current liability","liability for damages","assume liability"],"freq":"高頻","tip":"會計上與 asset（資產）相對；片語 liable for 表示「對…負有責任」。"},{"id":"x-v114","theme":"fin","themeName":"財務、採購與物流","word":"equity","pos":"n.","meaning":"股權、淨值","example":"Investors negotiated a 20% equity stake in the startup.","exampleZh":"投資人談定取得該新創公司 20% 的股權。","collocations":["equity stake","private equity","shareholders' equity"],"freq":"高頻","tip":"private equity（私募股權）為常考複合詞，別與 equality（平等）搞混。"},{"id":"x-v115","theme":"fin","themeName":"財務、採購與物流","word":"dividend","pos":"n.","meaning":"股利、股息","example":"The board approved a higher dividend payout for shareholders this year.","exampleZh":"董事會核准今年提高股東的股利發放。","collocations":["pay a dividend","dividend payout","dividend yield"],"freq":"高頻","tip":"常與 pay/declare 搭配；dividend yield（股息殖利率）是財經新聞高頻詞。"},{"id":"x-v116","theme":"fin","themeName":"財務、採購與物流","word":"shareholder","pos":"n.","meaning":"股東","example":"Shareholders will vote on the merger proposal next month.","exampleZh":"股東將於下個月就併購提案進行表決。","collocations":["shareholder meeting","shareholder value","majority shareholder"],"freq":"高頻","tip":"英式常拼 shareholder，美式也用 stockholder，兩者可互換。"},{"id":"x-v117","theme":"fin","themeName":"財務、採購與物流","word":"portfolio","pos":"n.","meaning":"投資組合","example":"She diversified her investment portfolio to reduce risk.","exampleZh":"她將投資組合多角化以降低風險。","collocations":["investment portfolio","diversify a portfolio","portfolio manager"],"freq":"高頻","tip":"也可指「作品集」，職場情境需依上下文判斷語意。"},{"id":"x-v118","theme":"fin","themeName":"財務、採購與物流","word":"diversification","pos":"n.","meaning":"多角化、分散投資","example":"Diversification across sectors helped the fund survive the downturn.","exampleZh":"跨產業的分散投資讓該基金撐過景氣下滑。","collocations":["portfolio diversification","diversification strategy","market diversification"],"freq":"中頻","tip":"動詞為 diversify；常與 risk（風險）搭配討論分散風險的策略。"},{"id":"x-v119","theme":"fin","themeName":"財務、採購與物流","word":"amortization","pos":"n.","meaning":"攤銷","example":"The amortization schedule spreads the loan cost over ten years.","exampleZh":"攤銷計畫將貸款成本分攤在十年內。","collocations":["amortization schedule","loan amortization","amortization period"],"freq":"中頻","tip":"常與 depreciation（折舊）並列：amortization 用於無形資產，depreciation 用於有形資產。"},{"id":"x-v120","theme":"fin","themeName":"財務、採購與物流","word":"auditor","pos":"n.","meaning":"查帳員、審計師","example":"An external auditor was hired to review the annual financial statements.","exampleZh":"公司聘請外部審計師審查年度財務報表。","collocations":["external auditor","internal auditor","auditor's report"],"freq":"高頻","tip":"動詞 audit（查帳）＋ -or（人）；audit 也可作名詞，指「稽核」這個動作本身。"},{"id":"x-v121","theme":"fin","themeName":"財務、採購與物流","word":"reimbursement","pos":"n.","meaning":"報銷、費用核銷","example":"Employees must submit receipts for travel expense reimbursement.","exampleZh":"員工須檢附收據才能申請差旅費用核銷。","collocations":["expense reimbursement","reimbursement request","seek reimbursement"],"freq":"高頻","tip":"動詞 reimburse 後接人＋for＋費用，如 reimburse you for the taxi fare。"},{"id":"x-v122","theme":"fin","themeName":"財務、採購與物流","word":"wire transfer","pos":"n.","meaning":"電匯","example":"The supplier requested payment via wire transfer within five business days.","exampleZh":"供應商要求在五個工作天內以電匯付款。","collocations":["via wire transfer","international wire transfer","wire transfer fee"],"freq":"中頻","tip":"介係詞常搭配 via 或 by：pay by wire transfer；動詞可簡化為 wire（電匯錢）。"},{"id":"x-v123","theme":"fin","themeName":"財務、採購與物流","word":"installment","pos":"n.","meaning":"分期付款","example":"Customers can pay for the equipment in monthly installments.","exampleZh":"顧客可以按月分期付款購買設備。","collocations":["monthly installment","pay in installments","installment plan"],"freq":"中頻","tip":"英式拼法為 instalment（單 l）；常見片語 in installments 表示「分期」。"},{"id":"x-v124","theme":"fin","themeName":"財務、採購與物流","word":"deficit spending","pos":"n.","meaning":"赤字支出","example":"The government relied on deficit spending to fund the infrastructure project.","exampleZh":"政府靠赤字支出來資助這項基礎建設計畫。","collocations":["deficit spending policy","reduce deficit spending","budget deficit"],"freq":"中頻","tip":"deficit（赤字）與 surplus（盈餘）相對，多益財經文章常見對比考點。"},{"id":"x-v125","theme":"fin","themeName":"財務、採購與物流","word":"allocate","pos":"v.","meaning":"分配、撥款","example":"The finance team allocated additional funds to the marketing department.","exampleZh":"財務團隊撥出額外資金給行銷部門。","collocations":["allocate funds","allocate resources","allocate budget"],"freq":"高頻","tip":"常見句型 allocate A to B（把 A 分配給 B），名詞 allocation 同樣高頻。"},{"id":"x-v126","theme":"fin","themeName":"財務、採購與物流","word":"allocation","pos":"n.","meaning":"分配","example":"The budget allocation for R&D increased by 15% this quarter.","exampleZh":"本季研發部門的預算分配增加了 15%。","collocations":["budget allocation","resource allocation","allocation of funds"],"freq":"高頻","tip":"與動詞 allocate 成對記憶；常搭配 budget、resource 等名詞。"},{"id":"x-v127","theme":"fin","themeName":"財務、採購與物流","word":"forecast","pos":"n.","meaning":"預測","example":"The sales forecast for next quarter looks more optimistic than expected.","exampleZh":"下季的銷售預測比預期更為樂觀。","collocations":["sales forecast","revenue forecast","forecast accuracy"],"freq":"高頻","tip":"可作動詞（forecast growth）或名詞，詞形不變，注意句中詞性判斷。"},{"id":"x-v128","theme":"fin","themeName":"財務、採購與物流","word":"estimate","pos":"n.","meaning":"估算","example":"The contractor provided a rough estimate of the renovation cost.","exampleZh":"承包商提供了裝修成本的粗略估算。","collocations":["cost estimate","rough estimate","provide an estimate"],"freq":"高頻","tip":"動詞 estimate 後常接 that 子句或 at＋數字，如 estimated at $10,000。"},{"id":"x-v129","theme":"fin","themeName":"財務、採購與物流","word":"arrears","pos":"n.","meaning":"欠款、拖欠款項","example":"The tenant fell into arrears after missing three rent payments.","exampleZh":"房客因連續三次未繳房租而陷入欠款。","collocations":["in arrears","fall into arrears","arrears payment"],"freq":"中頻","tip":"恆為複數形，固定片語 in arrears（拖欠中）為考點，不可加 s 以外的變化。"},{"id":"x-v130","theme":"fin","themeName":"財務、採購與物流","word":"delinquent","pos":"adj.","meaning":"逾期未繳的","example":"Delinquent accounts will be charged an additional late fee.","exampleZh":"逾期未繳的帳戶將被加收滯納金。","collocations":["delinquent account","delinquent payment","become delinquent"],"freq":"中頻","tip":"財經語境多指「逾期未付」，與日常指「行為不良（青少年）」的用法不同，依情境判斷。"},{"id":"x-v131","theme":"fin","themeName":"財務、採購與物流","word":"default","pos":"v.","meaning":"違約、拖欠不還","example":"The borrower defaulted on the loan after losing his job.","exampleZh":"該借款人失業後便對貸款違約未還。","collocations":["default on a loan","default on payment","risk of default"],"freq":"高頻","tip":"固定搭配介係詞 on：default on + 債務名稱；也可作名詞（in default）。"},{"id":"x-v132","theme":"fin","themeName":"財務、採購與物流","word":"collateral","pos":"n.","meaning":"擔保品","example":"The bank required the house as collateral for the business loan.","exampleZh":"銀行要求以房屋作為該筆商業貸款的擔保品。","collocations":["provide collateral","collateral for a loan","secured by collateral"],"freq":"中頻","tip":"常與 secure（擔保）連用：a loan secured by collateral，表示有抵押品的貸款。"},{"id":"x-v133","theme":"fin","themeName":"財務、採購與物流","word":"interest rate","pos":"n.","meaning":"利率","example":"The central bank raised interest rates to curb inflation.","exampleZh":"中央銀行調升利率以抑制通貨膨脹。","collocations":["raise interest rates","interest rate hike","low interest rate"],"freq":"高頻","tip":"raise／cut interest rates 為財經新聞固定搭配，rate hike 指升息。"},{"id":"x-v134","theme":"fin","themeName":"財務、採購與物流","word":"credit rating","pos":"n.","meaning":"信用評等","example":"The company's credit rating was downgraded after weak quarterly earnings.","exampleZh":"該公司在季報表現疲弱後信用評等遭到調降。","collocations":["credit rating agency","downgrade a credit rating","high credit rating"],"freq":"中頻","tip":"常與 downgrade（調降）／upgrade（調升）搭配，rating agency 指信評機構。"},{"id":"x-v135","theme":"fin","themeName":"財務、採購與物流","word":"solvency","pos":"n.","meaning":"償債能力","example":"Auditors questioned the firm's solvency given its mounting debts.","exampleZh":"鑑於債務不斷攀升，審計師對該公司的償債能力提出質疑。","collocations":["question solvency","maintain solvency","solvency ratio"],"freq":"中頻","tip":"與 insolvency（無力償債）互為反義詞，字首 in- 表否定。"},{"id":"x-v136","theme":"fin","themeName":"財務、採購與物流","word":"insolvency","pos":"n.","meaning":"無力償債","example":"The retailer filed for insolvency after years of declining sales.","exampleZh":"該零售商在銷售連年下滑後聲請無力償債。","collocations":["file for insolvency","insolvency proceedings","state of insolvency"],"freq":"中頻","tip":"file for insolvency 近似 file for bankruptcy，兩詞常出現在同一篇財經報導。"},{"id":"x-v137","theme":"fin","themeName":"財務、採購與物流","word":"bankruptcy","pos":"n.","meaning":"破產","example":"The airline filed for bankruptcy after failing to secure new funding.","exampleZh":"該航空公司在未能取得新資金後聲請破產。","collocations":["file for bankruptcy","declare bankruptcy","bankruptcy protection"],"freq":"高頻","tip":"固定片語 file for bankruptcy 為多益財經文章高頻用法，須整組記憶。"},{"id":"x-v138","theme":"fin","themeName":"財務、採購與物流","word":"liquidation","pos":"n.","meaning":"清算","example":"The court ordered the liquidation of the company's remaining assets.","exampleZh":"法院下令清算該公司剩餘的資產。","collocations":["asset liquidation","go into liquidation","liquidation sale"],"freq":"中頻","tip":"go into liquidation 表示「進入清算程序」；別與 liquidity（流動性）混淆。"},{"id":"x-v139","theme":"fin","themeName":"財務、採購與物流","word":"liquidity","pos":"n.","meaning":"流動性","example":"The firm boosted its liquidity by selling non-core assets.","exampleZh":"該公司透過出售非核心資產來提高流動性。","collocations":["liquidity ratio","boost liquidity","cash liquidity"],"freq":"中頻","tip":"指資產變現的容易程度；與上一字 liquidation（清算）字形相近但意義不同，須辨析。"},{"id":"x-v140","theme":"fin","themeName":"財務、採購與物流","word":"subsidy","pos":"n.","meaning":"補助金","example":"Farmers receive government subsidies to offset rising fuel costs.","exampleZh":"農民獲得政府補助金以抵銷上漲的燃料成本。","collocations":["government subsidy","subsidy program","receive a subsidy"],"freq":"中頻","tip":"動詞為 subsidize（補助）；常與 government、farmer、industry 等名詞搭配。"},{"id":"x-v141","theme":"fin","themeName":"財務、採購與物流","word":"grant","pos":"n.","meaning":"補助款","example":"The nonprofit received a research grant from a private foundation.","exampleZh":"該非營利組織獲得一家私人基金會的研究補助款。","collocations":["research grant","apply for a grant","grant funding"],"freq":"高頻","tip":"作動詞時意為「授予」（grant permission），名詞則指「補助款項」，需依詞性判斷。"},{"id":"x-v142","theme":"fin","themeName":"財務、採購與物流","word":"tax deduction","pos":"n.","meaning":"稅務減免","example":"Business owners can claim a tax deduction for office supplies.","exampleZh":"企業主可就辦公用品申請稅務減免。","collocations":["claim a tax deduction","tax deduction for","eligible for a deduction"],"freq":"中頻","tip":"常見動詞搭配 claim（申請）；與 tax exemption（免稅）程度不同，減免非全免。"},{"id":"x-v143","theme":"fin","themeName":"財務、採購與物流","word":"tax exemption","pos":"n.","meaning":"免稅","example":"Nonprofit organizations typically qualify for tax exemption status.","exampleZh":"非營利組織通常符合免稅資格。","collocations":["tax exemption status","qualify for exemption","tax-exempt organization"],"freq":"中頻","tip":"形容詞形式 tax-exempt（免稅的）常直接修飾機構名稱，注意連字號用法。"},{"id":"x-v144","theme":"fin","themeName":"財務、採購與物流","word":"levy","pos":"v.","meaning":"徵收（稅款）","example":"The city plans to levy a new tax on vacant properties.","exampleZh":"該市計畫對空置房產徵收新稅。","collocations":["levy a tax","levy a fine","levy on imports"],"freq":"中頻","tip":"及物動詞，後直接接稅目名稱：levy a tax on sth，也可作名詞。"},{"id":"x-v145","theme":"fin","themeName":"財務、採購與物流","word":"appreciate","pos":"v.","meaning":"增值","example":"Real estate in the area has appreciated significantly over the decade.","exampleZh":"該地區的不動產在過去十年大幅增值。","collocations":["appreciate in value","currency appreciates","property appreciates"],"freq":"高頻","tip":"財經語境意為「增值」，與常用義「感激」不同；固定搭配 appreciate in value。"},{"id":"x-v146","theme":"fin","themeName":"財務、採購與物流","word":"depreciate","pos":"v.","meaning":"貶值、折舊","example":"New vehicles depreciate rapidly within the first two years.","exampleZh":"新車在頭兩年內會迅速折舊貶值。","collocations":["depreciate in value","asset depreciates","depreciate rapidly"],"freq":"高頻","tip":"與 appreciate 互為反義詞，成對記憶；名詞 depreciation 常見於會計報表。"},{"id":"x-v147","theme":"fin","themeName":"財務、採購與物流","word":"valuation","pos":"n.","meaning":"估值","example":"The startup's valuation doubled after the latest funding round.","exampleZh":"這家新創公司在最新一輪募資後估值翻倍。","collocations":["company valuation","market valuation","valuation model"],"freq":"高頻","tip":"常見於創投新聞，與 funding round（募資輪次）常同句出現。"},{"id":"x-v148","theme":"fin","themeName":"財務、採購與物流","word":"stock option","pos":"n.","meaning":"認股權","example":"The company offers stock options as part of its compensation package.","exampleZh":"該公司將認股權納入薪酬方案的一部分。","collocations":["stock option plan","exercise a stock option","offer stock options"],"freq":"中頻","tip":"exercise a stock option 指「行使認股權」，為常見動詞搭配。"},{"id":"x-v149","theme":"fin","themeName":"財務、採購與物流","word":"venture capital","pos":"n.","meaning":"創投資金","example":"The tech firm secured venture capital to expand into new markets.","exampleZh":"這家科技公司取得創投資金以拓展新市場。","collocations":["venture capital firm","secure venture capital","venture capitalist"],"freq":"中頻","tip":"從業者稱 venture capitalist（VC），常簡稱 VC funding。"},{"id":"x-v150","theme":"fin","themeName":"財務、採購與物流","word":"funding round","pos":"n.","meaning":"募資輪次","example":"The startup closed its Series B funding round last week.","exampleZh":"這家新創公司上週完成了 B 輪募資。","collocations":["close a funding round","Series A funding round","lead a funding round"],"freq":"中頻","tip":"常搭配輪次代號 Series A/B/C；動詞用 close 或 complete 表示「完成募資」。"},{"id":"x-v151","theme":"fin","themeName":"財務、採購與物流","word":"underwrite","pos":"v.","meaning":"承保、擔保發行","example":"The bank agreed to underwrite the company's new bond issue.","exampleZh":"該銀行同意為公司新發行的債券提供承銷擔保。","collocations":["underwrite a bond issue","underwrite an IPO","underwriting fee"],"freq":"中頻","tip":"金融語境常與 IPO、bond issue 連用；名詞 underwriter 指承銷商。"},{"id":"x-v152","theme":"biz","themeName":"會議、行銷與業務","word":"discount","pos":"n.","meaning":"折扣","example":"Loyal customers receive a 10% discount on their next purchase.","exampleZh":"忠實顧客可在下次購買時享有 10% 折扣。","collocations":["offer a discount","discount on","bulk discount"],"freq":"高頻","tip":"常搭配介係詞 on：a discount on sth；動詞用 offer／give 表示「提供折扣」。"},{"id":"x-v153","theme":"biz","themeName":"會議、行銷與業務","word":"client","pos":"n.","meaning":"客戶","example":"The account manager scheduled a call with an overseas client.","exampleZh":"客戶經理安排了一通與海外客戶的通話。","collocations":["client meeting","potential client","client relationship"],"freq":"高頻","tip":"多指專業服務業的客戶（如律師、顧問），零售業客戶則常用 customer。"},{"id":"x-v154","theme":"biz","themeName":"會議、行銷與業務","word":"negotiate","pos":"v.","meaning":"協商","example":"Both parties negotiated the contract terms for over three hours.","exampleZh":"雙方就合約條款協商了三個多小時。","collocations":["negotiate terms","negotiate a deal","negotiate with"],"freq":"高頻","tip":"常接 with（與誰協商）或直接接受詞（協商的內容），名詞 negotiation 同樣常考。"},{"id":"x-v155","theme":"biz","themeName":"會議、行銷與業務","word":"launch","pos":"v./n.","meaning":"發表、推出","example":"The company will launch its latest smartphone model next month.","exampleZh":"該公司將於下個月推出最新款智慧型手機。","collocations":["product launch","launch a campaign","launch date"],"freq":"高頻","tip":"名詞常搭配 date（發表日）；動詞後直接接受詞，不需 out 等介係詞。"},{"id":"x-v156","theme":"biz","themeName":"會議、行銷與業務","word":"campaign","pos":"n.","meaning":"（行銷）活動","example":"The marketing team launched a campaign to boost holiday sales.","exampleZh":"行銷團隊發起了一項活動以刺激假期銷售。","collocations":["marketing campaign","launch a campaign","advertising campaign"],"freq":"高頻","tip":"常與動詞 launch、run 搭配；別誤譯為單一「廣告」，campaign 指一系列行銷行動。"},{"id":"x-v157","theme":"biz","themeName":"會議、行銷與業務","word":"merchandise","pos":"n.","meaning":"商品","example":"The store displayed seasonal merchandise near the entrance.","exampleZh":"該店在入口附近陳列了季節性商品。","collocations":["display merchandise","merchandise display","promotional merchandise"],"freq":"中頻","tip":"不可數名詞，不加 s；動詞 merchandise 則指「推銷、行銷商品」。"},{"id":"x-v158","theme":"biz","themeName":"會議、行銷與業務","word":"brand awareness","pos":"n.","meaning":"品牌知名度","example":"The sponsorship deal significantly increased the brand's awareness among young consumers.","exampleZh":"這筆贊助合約大幅提升了該品牌在年輕消費者間的知名度。","collocations":["raise brand awareness","brand awareness campaign","increase awareness"],"freq":"中頻","tip":"常與 raise、build、increase 搭配，指「提升品牌知名度」的行銷目標。"},{"id":"x-v159","theme":"biz","themeName":"會議、行銷與業務","word":"sponsorship","pos":"n.","meaning":"贊助","example":"The event secured corporate sponsorship from three major brands.","exampleZh":"該活動獲得三個主要品牌的企業贊助。","collocations":["corporate sponsorship","secure sponsorship","sponsorship deal"],"freq":"中頻","tip":"動詞 sponsor（贊助）；sponsorship deal 指贊助合約，為常見商業新聞用語。"},{"id":"x-v160","theme":"biz","themeName":"會議、行銷與業務","word":"markup","pos":"n.","meaning":"加價、漲價幅度","example":"Retailers typically apply a markup of 50% on imported goods.","exampleZh":"零售商通常對進口商品加價 50%。","collocations":["apply a markup","markup on","markup rate"],"freq":"中頻","tip":"與 markdown（降價）相對；作動詞片語時寫成 mark up（兩字分開）。"},{"id":"x-v161","theme":"biz","themeName":"會議、行銷與業務","word":"markdown","pos":"n.","meaning":"降價","example":"The store announced a markdown on all winter clothing lines.","exampleZh":"該店宣布所有冬季服飾全面降價。","collocations":["price markdown","markdown on","seasonal markdown"],"freq":"中頻","tip":"與 markup 成對記憶；動詞片語為 mark down（兩字分開），名詞連寫。"},{"id":"x-v162","theme":"biz","themeName":"會議、行銷與業務","word":"prospect","pos":"n.","meaning":"潛在客戶","example":"The sales rep followed up with a promising prospect from the trade show.","exampleZh":"業務代表跟進了一位在展覽會上發掘的潛力客戶。","collocations":["promising prospect","qualify a prospect","potential prospect"],"freq":"中頻","tip":"作動詞 prospect for 指「探勘、尋找」；名詞複數 prospects 另指「前景」。"},{"id":"x-v163","theme":"biz","themeName":"會議、行銷與業務","word":"lead generation","pos":"n.","meaning":"開發潛在客戶","example":"The company invested heavily in lead generation through social media ads.","exampleZh":"該公司大量投資透過社群媒體廣告開發潛在客戶。","collocations":["lead generation strategy","generate leads","lead generation tool"],"freq":"中頻","tip":"動詞片語 generate leads 為同義表達，lead 在此為名詞「潛在客戶名單」。"},{"id":"x-v164","theme":"biz","themeName":"會議、行銷與業務","word":"pitch","pos":"n.","meaning":"推銷說詞、提案","example":"The team rehearsed their sales pitch before meeting the investors.","exampleZh":"團隊在與投資人會面前先演練了一次業務提案說詞。","collocations":["sales pitch","pitch a product","elevator pitch"],"freq":"中頻","tip":"elevator pitch 指「電梯簡報」（極短時間內的推銷說詞），為商務常見片語。"},{"id":"x-v165","theme":"biz","themeName":"會議、行銷與業務","word":"quote","pos":"n.","meaning":"報價","example":"The supplier sent a quote for the bulk order within two days.","exampleZh":"供應商在兩天內就大量訂單提供了報價。","collocations":["provide a quote","request a quote","quote for"],"freq":"高頻","tip":"動詞 quote sb a price 表示「向某人報價」；作名詞時常與 request、provide 搭配。"},{"id":"x-v166","theme":"biz","themeName":"會議、行銷與業務","word":"negotiation","pos":"n.","meaning":"談判","example":"The negotiation between the two firms lasted well into the evening.","exampleZh":"這兩家公司之間的談判一直持續到深夜。","collocations":["contract negotiation","enter negotiations","negotiation table"],"freq":"高頻","tip":"常用複數 negotiations 指整個談判過程；動詞形 negotiate 需分辨詞性。"},{"id":"x-v167","theme":"biz","themeName":"會議、行銷與業務","word":"competitor","pos":"n.","meaning":"競爭對手","example":"The firm lowered its prices to stay ahead of competitors.","exampleZh":"該公司調降價格以持續領先競爭對手。","collocations":["main competitor","outperform competitors","competitor analysis"],"freq":"高頻","tip":"常搭配 analysis（競爭對手分析）；形容詞 competitive 指「有競爭力的」。"},{"id":"x-v168","theme":"biz","themeName":"會議、行銷與業務","word":"market share","pos":"n.","meaning":"市場佔有率","example":"The brand gained market share after launching its budget-friendly product line.","exampleZh":"該品牌在推出平價產品線後提升了市場佔有率。","collocations":["gain market share","lose market share","market share growth"],"freq":"高頻","tip":"常與 gain／lose 搭配，表示市佔率的增減，為財經新聞高頻詞組。"},{"id":"x-v169","theme":"biz","themeName":"會議、行銷與業務","word":"niche","pos":"n.","meaning":"利基市場","example":"The company found a profitable niche in eco-friendly packaging.","exampleZh":"該公司在環保包裝領域找到了有利可圖的利基市場。","collocations":["find a niche","niche market","carve out a niche"],"freq":"中頻","tip":"carve out a niche 意為「開拓出一片利基市場」，為常見搭配動詞。"},{"id":"x-v170","theme":"biz","themeName":"會議、行銷與業務","word":"demographic","pos":"n.","meaning":"人口統計特徵","example":"The ad campaign targeted a younger demographic on streaming platforms.","exampleZh":"這波廣告活動鎖定串流平台上較年輕的族群。","collocations":["target demographic","demographic data","key demographic"],"freq":"中頻","tip":"常見搭配 target demographic（目標客群），行銷企劃書高頻用詞。"},{"id":"x-v171","theme":"biz","themeName":"會議、行銷與業務","word":"survey","pos":"n.","meaning":"調查","example":"The company conducted a customer satisfaction survey after the product launch.","exampleZh":"該公司在產品上市後進行了一項顧客滿意度調查。","collocations":["conduct a survey","survey results","customer survey"],"freq":"高頻","tip":"動詞搭配 conduct（進行調查），也可作動詞 survey customers（調查顧客）。"},{"id":"x-v172","theme":"biz","themeName":"會議、行銷與業務","word":"consumer behavior","pos":"n.","meaning":"消費者行為","example":"Analysts studied consumer behavior to predict holiday shopping trends.","exampleZh":"分析師研究消費者行為以預測假期購物趨勢。","collocations":["study consumer behavior","consumer behavior pattern","shift in consumer behavior"],"freq":"中頻","tip":"美式拼法 behavior、英式拼 behaviour，多益兩者皆可能出現。"},{"id":"x-v173","theme":"biz","themeName":"會議、行銷與業務","word":"purchasing power","pos":"n.","meaning":"購買力","example":"Rising inflation has weakened consumers' purchasing power this year.","exampleZh":"今年不斷上漲的通膨削弱了消費者的購買力。","collocations":["weaken purchasing power","increase purchasing power","purchasing power parity"],"freq":"中頻","tip":"常與 inflation（通膨）同句出現，purchasing power parity（購買力平價）為進階經濟詞。"},{"id":"x-v174","theme":"biz","themeName":"會議、行銷與業務","word":"customer loyalty","pos":"n.","meaning":"顧客忠誠度","example":"The loyalty program was designed to strengthen customer loyalty over time.","exampleZh":"這項會員方案旨在長期強化顧客忠誠度。","collocations":["build customer loyalty","loyalty program","boost customer loyalty"],"freq":"高頻","tip":"常與 loyalty program（忠誠度方案／會員計畫）連用，行銷高頻詞組。"},{"id":"x-v175","theme":"biz","themeName":"會議、行銷與業務","word":"testimonial","pos":"n.","meaning":"（顧客）推薦、見證","example":"The website features testimonials from satisfied long-term customers.","exampleZh":"該網站刊登了滿意的長期顧客所提供的推薦見證。","collocations":["customer testimonial","feature a testimonial","glowing testimonial"],"freq":"中頻","tip":"glowing testimonial 指「熱情洋溢的推薦」，常見於行銷網頁用語。"},{"id":"x-v176","theme":"biz","themeName":"會議、行銷與業務","word":"word of mouth","pos":"n.","meaning":"口碑","example":"Positive word of mouth helped the small bakery attract new customers.","exampleZh":"良好的口碑幫助這家小麵包店吸引了新顧客。","collocations":["spread by word of mouth","positive word of mouth","word-of-mouth marketing"],"freq":"中頻","tip":"作形容詞修飾名詞時加連字號：word-of-mouth marketing（口碑行銷）。"},{"id":"x-v177","theme":"biz","themeName":"會議、行銷與業務","word":"wholesaler","pos":"n.","meaning":"批發商","example":"The wholesaler supplies electronics to retailers across the region.","exampleZh":"這家批發商為區域內的零售商供應電子產品。","collocations":["local wholesaler","buy from a wholesaler","wholesaler price"],"freq":"中頻","tip":"與 retailer（零售商）成對記憶；wholesale 作副詞可表示「以批發價」。"},{"id":"x-v178","theme":"biz","themeName":"會議、行銷與業務","word":"retailer","pos":"n.","meaning":"零售商","example":"The retailer negotiated better terms directly with the manufacturer.","exampleZh":"該零售商直接與製造商協商出更好的條件。","collocations":["major retailer","online retailer","retailer discount"],"freq":"高頻","tip":"online retailer（網路零售商）為常見複合詞，注意與 wholesaler 的角色區分。"},{"id":"x-v179","theme":"biz","themeName":"會議、行銷與業務","word":"franchise","pos":"n.","meaning":"加盟、特許經營","example":"The coffee chain expanded rapidly through franchise agreements.","exampleZh":"這家咖啡連鎖店透過加盟協議迅速擴張。","collocations":["franchise agreement","open a franchise","franchise owner"],"freq":"中頻","tip":"動詞 franchise out 指「授權加盟」；franchisee 為加盟主，franchisor 為授權方。"},{"id":"x-v180","theme":"biz","themeName":"會議、行銷與業務","word":"commission","pos":"n.","meaning":"佣金","example":"Sales representatives earn a commission on every closed deal.","exampleZh":"業務代表每成交一筆交易就能賺取佣金。","collocations":["earn a commission","commission rate","work on commission"],"freq":"高頻","tip":"work on commission 表示「以佣金制方式工作」，為業務職缺常見用語。"},{"id":"x-v181","theme":"biz","themeName":"會議、行銷與業務","word":"quota","pos":"n.","meaning":"業績配額","example":"The regional team exceeded its quarterly sales quota by 20%.","exampleZh":"該區域團隊超額完成本季業績配額達 20%。","collocations":["meet a quota","exceed a quota","sales quota"],"freq":"中頻","tip":"常搭配動詞 meet（達成）、exceed（超越）、fall short of（未達）配額。"},{"id":"x-v182","theme":"biz","themeName":"會議、行銷與業務","word":"prospective","pos":"adj.","meaning":"潛在的、未來的","example":"The firm invited prospective clients to a private product demonstration.","exampleZh":"該公司邀請潛在客戶參加一場私人產品展示會。","collocations":["prospective client","prospective buyer","prospective employee"],"freq":"中頻","tip":"與名詞 prospect（潛在客戶）同源，注意此為形容詞用法，需修飾名詞。"},{"id":"x-v183","theme":"biz","themeName":"會議、行銷與業務","word":"subscription","pos":"n.","meaning":"訂閱","example":"The magazine offers a discounted subscription rate for students.","exampleZh":"這本雜誌為學生提供優惠的訂閱價格。","collocations":["annual subscription","subscription fee","cancel a subscription"],"freq":"高頻","tip":"動詞 subscribe to（訂閱某服務），介係詞固定用 to，是常見文法考點。"},{"id":"x-v184","theme":"biz","themeName":"會議、行銷與業務","word":"renewal","pos":"n.","meaning":"續約、續訂","example":"The contract renewal will take effect at the start of next fiscal year.","exampleZh":"合約續約將於下個財政年度開始時生效。","collocations":["contract renewal","renewal notice","automatic renewal"],"freq":"中頻","tip":"動詞為 renew；automatic renewal（自動續約）為訂閱服務常見條款用語。"},{"id":"x-v185","theme":"biz","themeName":"會議、行銷與業務","word":"upsell","pos":"v.","meaning":"推銷升級商品","example":"The salesperson tried to upsell customers to the premium package.","exampleZh":"這位業務員嘗試向顧客推銷升級為進階方案。","collocations":["upsell a customer","upsell to premium","upselling technique"],"freq":"中頻","tip":"句型 upsell sb to sth（向某人推銷升級版），常與 cross-sell 對比出現。"},{"id":"x-v186","theme":"biz","themeName":"會議、行銷與業務","word":"cross-sell","pos":"v.","meaning":"交叉銷售","example":"The bank trained staff to cross-sell insurance products to existing clients.","exampleZh":"該銀行訓練員工向現有客戶交叉銷售保險商品。","collocations":["cross-sell products","cross-selling opportunity","cross-sell to clients"],"freq":"中頻","tip":"與 upsell 常成對出現：upsell 賣「更貴的」，cross-sell 賣「相關的其他商品」。"},{"id":"x-v187","theme":"biz","themeName":"會議、行銷與業務","word":"rebrand","pos":"v.","meaning":"重塑品牌","example":"The airline decided to rebrand itself to attract younger travelers.","exampleZh":"該航空公司決定重塑品牌以吸引年輕旅客。","collocations":["rebrand a company","rebranding campaign","rebrand as"],"freq":"中頻","tip":"名詞 rebranding 常見於商業新聞標題，指整體品牌形象的翻新。"},{"id":"x-v188","theme":"biz","themeName":"會議、行銷與業務","word":"slogan","pos":"n.","meaning":"標語","example":"The new advertising slogan quickly became popular with consumers.","exampleZh":"這句新的廣告標語很快就受到消費者喜愛。","collocations":["catchy slogan","advertising slogan","coin a slogan"],"freq":"中頻","tip":"常搭配形容詞 catchy（朗朗上口的），coin a slogan 表示「創造出一句標語」。"},{"id":"x-v189","theme":"biz","themeName":"會議、行銷與業務","word":"billboard","pos":"n.","meaning":"廣告看板","example":"The company rented a billboard along the highway to promote its new store.","exampleZh":"該公司在高速公路旁租下一塊廣告看板來宣傳新店開幕。","collocations":["rent a billboard","digital billboard","billboard advertising"],"freq":"中頻","tip":"digital billboard（數位看板）為近年常見形式，注意與 poster（海報）的規模區別。"},{"id":"x-v190","theme":"biz","themeName":"會議、行銷與業務","word":"circulation","pos":"n.","meaning":"（刊物）發行量","example":"The magazine's circulation dropped as more readers switched to digital editions.","exampleZh":"隨著更多讀者轉向數位版，該雜誌的發行量下降了。","collocations":["magazine circulation","circulation figures","boost circulation"],"freq":"中頻","tip":"circulation figures 指「發行量數據」；也可指「（貨幣）流通」，依語境判斷。"},{"id":"x-v191","theme":"biz","themeName":"會議、行銷與業務","word":"publicity","pos":"n.","meaning":"宣傳、公開曝光","example":"The scandal generated unwanted publicity for the brand.","exampleZh":"這起醜聞為該品牌帶來了不受歡迎的公開曝光。","collocations":["generate publicity","negative publicity","publicity stunt"],"freq":"中頻","tip":"不可數名詞，不加 s；publicity stunt 指「炒作噱頭」，商業新聞常見詞。"},{"id":"x-v192","theme":"biz","themeName":"會議、行銷與業務","word":"spokesperson","pos":"n.","meaning":"發言人、代言人","example":"The company appointed a spokesperson to address media inquiries.","exampleZh":"該公司指派一位發言人回應媒體詢問。","collocations":["company spokesperson","appoint a spokesperson","official spokesperson"],"freq":"中頻","tip":"中性詞彙，取代性別化的 spokesman/spokeswoman，多益偏好使用。"},{"id":"x-v193","theme":"biz","themeName":"會議、行銷與業務","word":"niche market","pos":"n.","meaning":"利基市場","example":"The startup targeted a niche market of eco-conscious pet owners.","exampleZh":"這家新創公司鎖定重視環保的寵物飼主這一利基市場。","collocations":["target a niche market","dominate a niche market","niche market strategy"],"freq":"中頻","tip":"與單字 niche 意義相同，此為完整片語形式，常見於行銷策略文章。"},{"id":"x-v194","theme":"biz","themeName":"會議、行銷與業務","word":"brand identity","pos":"n.","meaning":"品牌識別","example":"The design agency helped the company establish a consistent brand identity.","exampleZh":"這家設計公司協助該公司建立一致的品牌識別。","collocations":["establish brand identity","consistent brand identity","brand identity design"],"freq":"中頻","tip":"常與 consistent（一致的）搭配，指涵蓋標誌、色調、語調等整體形象。"},{"id":"x-v195","theme":"biz","themeName":"會議、行銷與業務","word":"customer acquisition","pos":"n.","meaning":"顧客獲取","example":"The company reduced its customer acquisition cost through targeted ads.","exampleZh":"該公司透過精準投放廣告降低了顧客獲取成本。","collocations":["customer acquisition cost","acquisition strategy","reduce acquisition cost"],"freq":"中頻","tip":"常見縮寫 CAC（customer acquisition cost），行銷分析報告高頻詞。"},{"id":"x-v196","theme":"biz","themeName":"會議、行銷與業務","word":"conversion rate","pos":"n.","meaning":"轉換率","example":"The redesigned website improved the checkout conversion rate significantly.","exampleZh":"重新設計的網站大幅提升了結帳轉換率。","collocations":["improve conversion rate","conversion rate optimization","low conversion rate"],"freq":"中頻","tip":"conversion rate optimization（CRO）為數位行銷專有名詞，常縮寫使用。"},{"id":"x-v197","theme":"biz","themeName":"會議、行銷與業務","word":"benchmark","pos":"n.","meaning":"基準、指標","example":"The team used last year's results as a benchmark for this year's goals.","exampleZh":"團隊以去年的業績作為今年目標的基準。","collocations":["set a benchmark","benchmark against","industry benchmark"],"freq":"中頻","tip":"可作動詞 benchmark against sth（與…做比較基準），商業分析常用詞。"},{"id":"x-v198","theme":"biz","themeName":"會議、行銷與業務","word":"markup rate","pos":"n.","meaning":"加價率","example":"The boutique applies a markup rate of nearly 100% on handmade items.","exampleZh":"這家精品店對手工商品的加價率接近 100%。","collocations":["markup rate of","calculate a markup rate","standard markup rate"],"freq":"中頻","tip":"與單字 markup 意義相同，此片語強調以百分比呈現加價幅度。"},{"id":"x-v199","theme":"biz","themeName":"會議、行銷與業務","word":"consumer","pos":"n.","meaning":"消費者","example":"Consumers are becoming more conscious of environmentally friendly packaging.","exampleZh":"消費者對環保包裝的意識正日益提高。","collocations":["consumer demand","average consumer","consumer protection"],"freq":"高頻","tip":"consumer protection（消費者保護）為常見法規用語，與 customer 略有語域差異。"},{"id":"x-v200","theme":"biz","themeName":"會議、行銷與業務","word":"retail price","pos":"n.","meaning":"零售價","example":"The retail price of the device dropped after the holiday season.","exampleZh":"該裝置的零售價在假期季過後下降了。","collocations":["suggested retail price","retail price increase","below retail price"],"freq":"中頻","tip":"suggested retail price（建議售價，常縮寫 MSRP）為零售業常見用語。"},{"id":"x-v201","theme":"biz","themeName":"會議、行銷與業務","word":"brand ambassador","pos":"n.","meaning":"品牌大使","example":"The athlete was named the brand ambassador for the sportswear company.","exampleZh":"這位運動員被任命為該運動服飾公司的品牌大使。","collocations":["appoint a brand ambassador","official brand ambassador","brand ambassador program"],"freq":"中頻","tip":"與 spokesperson 相近但更強調長期代言與形象連結，常見於運動、時尚產業。"},{"id":"x-v202","theme":"biz","themeName":"會議、行銷與業務","word":"focus group","pos":"n.","meaning":"焦點小組","example":"The company ran a focus group to test reactions to the new packaging.","exampleZh":"該公司舉辦了一場焦點小組，測試消費者對新包裝的反應。","collocations":["conduct a focus group","focus group session","focus group feedback"],"freq":"中頻","tip":"動詞常搭配 conduct／run；為質化市場研究方法，常與 survey（問卷調查）對比。"},{"id":"x-v203","theme":"biz","themeName":"會議、行銷與業務","word":"promotional material","pos":"n.","meaning":"宣傳資料","example":"The team distributed promotional materials at the trade show booth.","exampleZh":"團隊在展覽會攤位上發放了宣傳資料。","collocations":["distribute promotional materials","design promotional materials","printed promotional material"],"freq":"中頻","tip":"material 在此語境常用不可數形式；promotional 為 promote 的形容詞形。"},{"id":"x-v204","theme":"biz","themeName":"會議、行銷與業務","word":"clearance sale","pos":"n.","meaning":"清倉拍賣","example":"The store held a clearance sale to make room for new inventory.","exampleZh":"該店舉辦清倉拍賣以騰出空間擺放新進貨品。","collocations":["hold a clearance sale","clearance sale price","end-of-season clearance"],"freq":"中頻","tip":"end-of-season clearance（季末清倉）為零售業常見複合用語。"},{"id":"x-v205","theme":"biz","themeName":"會議、行銷與業務","word":"bulk discount","pos":"n.","meaning":"大量採購折扣","example":"The supplier offers a bulk discount for orders over 500 units.","exampleZh":"供應商對超過 500 件的訂單提供大量採購折扣。","collocations":["offer a bulk discount","bulk discount rate","qualify for a bulk discount"],"freq":"中頻","tip":"bulk 作形容詞表示「大量的」，也可獨立作名詞 in bulk（大量地）。"},{"id":"x-v206","theme":"biz","themeName":"會議、行銷與業務","word":"loyalty card","pos":"n.","meaning":"會員卡","example":"Customers can earn points toward rewards with a loyalty card.","exampleZh":"顧客可以用會員卡累積點數兌換獎勵。","collocations":["earn points with a loyalty card","loyalty card program","sign up for a loyalty card"],"freq":"中頻","tip":"與 customer loyalty（顧客忠誠度）同源，此為具體的會員集點工具。"},{"id":"x-v207","theme":"biz","themeName":"會議、行銷與業務","word":"brand recognition","pos":"n.","meaning":"品牌辨識度","example":"Decades of consistent advertising gave the company strong brand recognition.","exampleZh":"數十年如一日的廣告投放為該公司帶來強大的品牌辨識度。","collocations":["strong brand recognition","build brand recognition","instant brand recognition"],"freq":"中頻","tip":"與 brand awareness 意義相近，recognition 更強調「一眼認出」的視覺辨識層面。"},{"id":"x-v208","theme":"biz","themeName":"會議、行銷與業務","word":"keynote","pos":"n.","meaning":"主題演講","example":"The CEO delivered the keynote at this year's industry conference.","exampleZh":"執行長在今年的產業研討會上發表了主題演講。","collocations":["deliver a keynote","keynote speaker","keynote address"],"freq":"高頻","tip":"動詞固定搭配 deliver／give a keynote；keynote speaker 指主講嘉賓。"},{"id":"x-v209","theme":"biz","themeName":"會議、行銷與業務","word":"venue","pos":"n.","meaning":"場地","example":"The organizers booked a larger venue to accommodate more attendees.","exampleZh":"主辦單位預訂了更大的場地以容納更多與會者。","collocations":["book a venue","conference venue","venue capacity"],"freq":"高頻","tip":"動詞搭配 book／reserve；別與 location（地點）混用，venue 專指活動舉辦場所。"},{"id":"x-v210","theme":"biz","themeName":"會議、行銷與業務","word":"session","pos":"n.","meaning":"場次","example":"The afternoon session will focus on customer service strategies.","exampleZh":"下午場次將聚焦於顧客服務策略。","collocations":["breakout session","morning session","attend a session"],"freq":"高頻","tip":"breakout session 指「分組討論場次」，大型研討會議程常見用詞。"},{"id":"x-v211","theme":"biz","themeName":"會議、行銷與業務","word":"refreshments","pos":"n.","meaning":"茶點","example":"Refreshments will be served during the coffee break between sessions.","exampleZh":"場次之間的茶歇時間將提供茶點。","collocations":["serve refreshments","light refreshments","refreshments provided"],"freq":"中頻","tip":"恆用複數形，會議通知常見固定句：Refreshments will be provided/served。"},{"id":"x-v212","theme":"biz","themeName":"會議、行銷與業務","word":"RSVP","pos":"v.","meaning":"回覆是否出席","example":"Guests are asked to RSVP by this Friday for the annual gala.","exampleZh":"賓客須於本週五前回覆是否出席年度晚宴。","collocations":["RSVP by","please RSVP","RSVP to"],"freq":"高頻","tip":"源自法文縮寫，常見句型 RSVP by + 日期／RSVP to + 收件人，邀請函必考詞。"},{"id":"x-v213","theme":"biz","themeName":"會議、行銷與業務","word":"however","pos":"adv.","meaning":"然而","example":"The proposal was well received; however, funding remains uncertain.","exampleZh":"這項提案獲得好評，然而資金仍未確定。","collocations":["however,","; however,","however uncertain"],"freq":"高頻","tip":"句中連接兩獨立子句時前置分號、後加逗號：句號/分號 however, 子句。"},{"id":"x-v214","theme":"biz","themeName":"會議、行銷與業務","word":"therefore","pos":"adv.","meaning":"因此","example":"Sales figures dropped sharply; therefore, the board revised its forecast.","exampleZh":"銷售數字大幅下滑，因此董事會修改了預測。","collocations":["therefore,","and therefore","therefore concluded"],"freq":"高頻","tip":"表結果的轉承副詞，多益 Part 6 空格題常考，需與 however（轉折）區分邏輯關係。"},{"id":"x-v215","theme":"biz","themeName":"會議、行銷與業務","word":"nevertheless","pos":"adv.","meaning":"儘管如此","example":"The budget was tight; nevertheless, the team completed the project on time.","exampleZh":"儘管預算吃緊，團隊仍準時完成了專案。","collocations":["nevertheless,","but nevertheless","nevertheless proceeded"],"freq":"中頻","tip":"語意近似 however，但語氣更強調「儘管有前述困難仍然…」的堅持感。"},{"id":"x-v216","theme":"biz","themeName":"會議、行銷與業務","word":"in addition","pos":"phr.","meaning":"此外","example":"In addition, the company plans to open two new branches this year.","exampleZh":"此外，該公司計畫今年再開設兩家新分店。","collocations":["in addition to","in addition,","in addition, the"],"freq":"高頻","tip":"in addition to + 名詞/動名詞（另有其他意涵），與句首單獨使用的 In addition, 需區分。"},{"id":"x-v217","theme":"biz","themeName":"會議、行銷與業務","word":"as a result","pos":"phr.","meaning":"結果","example":"Demand surged unexpectedly; as a result, the factory increased production.","exampleZh":"需求意外激增，結果工廠因此提高了產量。","collocations":["as a result,","as a result of","as a direct result"],"freq":"高頻","tip":"as a result of + 名詞表示「由於…的緣故」，與獨立使用的 As a result, 用法不同。"},{"id":"x-v218","theme":"biz","themeName":"會議、行銷與業務","word":"on the other hand","pos":"phr.","meaning":"另一方面","example":"On the one hand, costs rose; on the other hand, revenue also increased.","exampleZh":"一方面成本上升，另一方面營收也隨之增加。","collocations":["on the one hand... on the other hand","on the other hand,"],"freq":"中頻","tip":"常與 on the one hand 成對使用，表達對比的兩個面向。"},{"id":"x-v219","theme":"biz","themeName":"會議、行銷與業務","word":"for instance","pos":"phr.","meaning":"舉例","example":"Several departments cut costs; for instance, IT reduced software subscriptions.","exampleZh":"多個部門都刪減了成本，舉例來說，資訊部門減少了軟體訂閱。","collocations":["for instance,","take, for instance","for example / for instance"],"freq":"中頻","tip":"與 for example 可互換，皆用於句中或句首舉例說明前述論點。"},{"id":"x-v220","theme":"biz","themeName":"會議、行銷與業務","word":"furthermore","pos":"adv.","meaning":"此外、再者","example":"The report highlighted rising costs; furthermore, it warned of supply delays.","exampleZh":"報告強調成本上升，再者還警告了供應延遲的風險。","collocations":["furthermore,","and furthermore","furthermore noted"],"freq":"高頻","tip":"語氣比 in addition 更正式，常見於書面報告與正式信函的補充論點。"},{"id":"x-v221","theme":"biz","themeName":"會議、行銷與業務","word":"consequently","pos":"adv.","meaning":"因此","example":"The vendor missed the deadline; consequently, the launch was postponed.","exampleZh":"供應商未能如期交貨，因此發表會被迫延期。","collocations":["consequently,","and consequently","consequently delayed"],"freq":"中頻","tip":"與 therefore 意義相近，皆表結果，但 consequently 語氣稍正式、書面感較重。"},{"id":"x-v222","theme":"biz","themeName":"會議、行銷與業務","word":"meanwhile","pos":"adv.","meaning":"同時","example":"The design team finalized the layout; meanwhile, marketing prepared the launch materials.","exampleZh":"設計團隊敲定了版面，同時行銷部門準備了發表資料。","collocations":["meanwhile,","in the meantime","meanwhile, the"],"freq":"中頻","tip":"表「同一時間發生的另一件事」，與 in the meantime 意義相通，可互換。"},{"id":"x-v223","theme":"biz","themeName":"會議、行銷與業務","word":"otherwise","pos":"adv.","meaning":"否則","example":"Submit the form by Friday; otherwise, your application will not be processed.","exampleZh":"請於週五前繳交表單，否則您的申請將不予受理。","collocations":["otherwise,","or otherwise","otherwise stated"],"freq":"高頻","tip":"常見於規範性語句，表達「若不遵守前述條件則…」的後果，公告信函高頻詞。"},{"id":"x-v224","theme":"biz","themeName":"會議、行銷與業務","word":"presentation","pos":"n.","meaning":"簡報","example":"She prepared a detailed presentation for the quarterly board meeting.","exampleZh":"她為本季董事會會議準備了一份詳盡的簡報。","collocations":["give a presentation","prepare a presentation","presentation slides"],"freq":"高頻","tip":"動詞固定搭配 give／deliver a presentation，不用 do a presentation（非慣用）。"},{"id":"x-v225","theme":"biz","themeName":"會議、行銷與業務","word":"presenter","pos":"n.","meaning":"報告人、簡報者","example":"The presenter used three slides to explain the sales forecast.","exampleZh":"報告人用三張投影片說明銷售預測。","collocations":["keynote presenter","guest presenter","the presenter explained"],"freq":"高頻","tip":"present（呈現）+ -er（人），簡報的人；別與 present（禮物/現在）混淆詞性。"},{"id":"x-v226","theme":"biz","themeName":"會議、行銷與業務","word":"conference","pos":"n.","meaning":"會議、研討會","example":"Delegates from twelve countries attended the annual trade conference.","exampleZh":"來自十二個國家的代表出席了年度貿易研討會。","collocations":["attend a conference","conference room","press conference"],"freq":"高頻","tip":"conference 偏正式、大型的多方會議，日常小組討論多用 meeting。"},{"id":"x-v227","theme":"biz","themeName":"會議、行銷與業務","word":"conference call","pos":"n.","meaning":"電話會議","example":"We scheduled a conference call with the Tokyo office at 9 a.m.","exampleZh":"我們排定早上九點和東京辦公室開電話會議。","collocations":["schedule a conference call","join a conference call","dial into a conference call"],"freq":"中頻","tip":"動詞常搭 join/dial into；注意複合名詞不可拆開使用。"},{"id":"x-v228","theme":"biz","themeName":"會議、行銷與業務","word":"teleconference","pos":"n.","meaning":"（多方）視訊或電話會議","example":"Technical issues delayed the teleconference by almost ten minutes.","exampleZh":"技術問題讓這場視訊會議延誤了將近十分鐘。","collocations":["hold a teleconference","teleconference system","via teleconference"],"freq":"中頻","tip":"tele-（遠距）+ conference，泛指遠端會議，涵蓋語音與視訊兩種形式。"},{"id":"x-v229","theme":"biz","themeName":"會議、行銷與業務","word":"videoconference","pos":"n.","meaning":"視訊會議","example":"The board approved the merger during a videoconference last Friday.","exampleZh":"董事會上週五在視訊會議中通過了合併案。","collocations":["via videoconference","videoconference software","set up a videoconference"],"freq":"中頻","tip":"與 teleconference 相對，videoconference 特指有畫面的視訊會議。"},{"id":"x-v230","theme":"biz","themeName":"會議、行銷與業務","word":"facilitator","pos":"n.","meaning":"主持人、引導者","example":"A trained facilitator kept the workshop discussion on schedule.","exampleZh":"一位受過訓練的引導者讓工作坊討論按進度進行。","collocations":["workshop facilitator","act as facilitator","facilitator's role"],"freq":"中頻","tip":"facilitate（促成、使容易）+ -or；facilitator 重在「引導流程」而非發表意見。"},{"id":"x-v231","theme":"biz","themeName":"會議、行銷與業務","word":"moderator","pos":"n.","meaning":"（座談/辯論）主持人","example":"The moderator invited each panelist to give a two-minute summary.","exampleZh":"主持人邀請每位座談者做兩分鐘總結。","collocations":["panel moderator","the moderator asked","serve as moderator"],"freq":"中頻","tip":"moderator 常見於 panel discussion 或辯論場合，與 facilitator 語意相近但更偏正式場合稱謂。"},{"id":"x-v232","theme":"biz","themeName":"會議、行銷與業務","word":"panel discussion","pos":"n.","meaning":"座談討論","example":"The panel discussion covered emerging trends in digital marketing.","exampleZh":"這場座談討論涵蓋了數位行銷的新興趨勢。","collocations":["host a panel discussion","join a panel discussion","panel discussion on"],"freq":"中頻","tip":"panel 指「座談小組」，discussion 是討論本身，兩字合用固定成詞組。"},{"id":"x-v233","theme":"biz","themeName":"會議、行銷與業務","word":"participant","pos":"n.","meaning":"參與者","example":"Each participant received a name tag and a copy of the agenda.","exampleZh":"每位參與者都拿到一張名牌和一份議程。","collocations":["conference participant","active participant","participant feedback"],"freq":"高頻","tip":"participate in（參與）的名詞形式；考題常考 participant vs. participation 詞性辨析。"},{"id":"x-v234","theme":"biz","themeName":"會議、行銷與業務","word":"reschedule","pos":"v.","meaning":"重新安排時間","example":"The client asked to reschedule the meeting to next Wednesday.","exampleZh":"客戶要求把會議改到下週三舉行。","collocations":["reschedule a meeting","reschedule to a later date","reschedule an appointment"],"freq":"高頻","tip":"re-（重新）+ schedule（排程）；多益常搭配 postpone、push back 出現同義替換題。"},{"id":"x-v235","theme":"biz","themeName":"會議、行銷與業務","word":"opponent","pos":"n.","meaning":"反對者、對手","example":"Several opponents of the proposal raised concerns during the Q&A.","exampleZh":"幾位反對這項提案的人在問答時間提出疑慮。","collocations":["opponent of the plan","vocal opponent","opponents argued"],"freq":"中頻","tip":"opponent（人，反對某方案或比賽對手）別與 opposition（反對意見/在野黨，較抽象）混用。"},{"id":"x-v236","theme":"biz","themeName":"會議、行銷與業務","word":"proposal","pos":"n.","meaning":"提案","example":"The marketing team submitted a proposal for the new ad campaign.","exampleZh":"行銷團隊提交了一份新廣告活動的提案。","collocations":["submit a proposal","accept a proposal","proposal for"],"freq":"高頻","tip":"propose（提議，動詞）→ proposal（提案，名詞）；常搭 submit/draft/review。"},{"id":"x-v237","theme":"biz","themeName":"會議、行銷與業務","word":"recommendation","pos":"n.","meaning":"建議","example":"The consultant's recommendation was to outsource customer support.","exampleZh":"顧問的建議是將客服外包。","collocations":["make a recommendation","follow a recommendation","recommendation letter"],"freq":"高頻","tip":"recommend（動詞，建議）的名詞形式；動詞後接 that 子句用假設語氣（should）為考點。"},{"id":"x-v238","theme":"biz","themeName":"會議、行銷與業務","word":"elaborate","pos":"v.","meaning":"詳細說明","example":"Could you elaborate on the budget figures in slide five?","exampleZh":"能否請您詳細說明第五張投影片的預算數字？","collocations":["elaborate on","elaborate further","please elaborate"],"freq":"中頻","tip":"動詞恆搭介係詞 on；elaborate 當形容詞則意為「精心設計的」，注意詞性切換。"},{"id":"x-v239","theme":"biz","themeName":"會議、行銷與業務","word":"clarify","pos":"v.","meaning":"澄清、說明","example":"The manager clarified the new expense policy for the team.","exampleZh":"經理向團隊說明了新的報銷政策。","collocations":["clarify a point","clarify the policy","to clarify"],"freq":"高頻","tip":"clear（清楚）+ -ify（使…化）；口語常用 to clarify 作插入語開頭一句話。"},{"id":"x-v240","theme":"biz","themeName":"會議、行銷與業務","word":"outline","pos":"v.","meaning":"概述、勾勒要點","example":"The CEO outlined the company's strategy for the coming year.","exampleZh":"執行長概述了公司來年的策略方向。","collocations":["outline a plan","outline the steps","briefly outline"],"freq":"高頻","tip":"outline 當名詞是「大綱」，當動詞是「概述」，考題常考詞性一致。"},{"id":"x-v241","theme":"biz","themeName":"會議、行銷與業務","word":"summarize","pos":"v.","meaning":"總結","example":"She summarized the key findings at the end of the presentation.","exampleZh":"她在簡報結尾總結了主要發現。","collocations":["summarize the findings","summarize briefly","to summarize"],"freq":"高頻","tip":"summary（名詞，摘要）與 summarize（動詞）拼字不同，考題易混淆。"},{"id":"x-v242","theme":"biz","themeName":"會議、行銷與業務","word":"handout","pos":"n.","meaning":"講義","example":"Please take a handout from the table before the session begins.","exampleZh":"請在課程開始前從桌上拿一份講義。","collocations":["distribute a handout","hand out handouts","printed handout"],"freq":"中頻","tip":"hand（手）+ out（外）→發出去的東西；動詞片語是 hand out，名詞連寫成 handout。"},{"id":"x-v243","theme":"biz","themeName":"會議、行銷與業務","word":"projector","pos":"n.","meaning":"投影機","example":"The projector malfunctioned right before the client presentation.","exampleZh":"投影機在客戶簡報開始前突然故障。","collocations":["connect a projector","projector screen","turn on the projector"],"freq":"中頻","tip":"project（投射，動詞）+ -or（機器）；常與 screen、slide 搭配出現在辦公室情境。"},{"id":"x-v244","theme":"biz","themeName":"會議、行銷與業務","word":"whiteboard","pos":"n.","meaning":"白板","example":"He sketched the workflow diagram on the whiteboard.","exampleZh":"他在白板上畫出了工作流程圖。","collocations":["write on the whiteboard","whiteboard marker","erase the whiteboard"],"freq":"中頻","tip":"複合字 white + board，會議室常見物品字彙，考題多出現在情境對話而非單獨考文法。"},{"id":"x-v245","theme":"biz","themeName":"會議、行銷與業務","word":"agenda item","pos":"n.","meaning":"議程項目","example":"The budget review is the first agenda item this morning.","exampleZh":"今天早上的第一項議程是預算檢討。","collocations":["next agenda item","add an agenda item","cover an agenda item"],"freq":"中頻","tip":"agenda（議程）本身已含多項目，item 特指「其中一項」，注意單複數搭配。"},{"id":"x-v246","theme":"biz","themeName":"會議、行銷與業務","word":"floor","pos":"n.","meaning":"發言權","example":"The chairperson gave the floor to the finance director.","exampleZh":"主席將發言權交給了財務總監。","collocations":["give someone the floor","have the floor","take the floor"],"freq":"中頻","tip":"floor 本義「地板/樓層」，會議情境轉義為「發言權」，固定搭配 give/have/take the floor。"},{"id":"x-v247","theme":"biz","themeName":"會議、行銷與業務","word":"question and answer session","pos":"n.","meaning":"問答時間","example":"A question and answer session followed the keynote speech.","exampleZh":"主題演講結束後接著是問答時間。","collocations":["hold a Q&A session","during the Q&A session","open the floor for Q&A"],"freq":"中頻","tip":"口語與書面常縮寫為 Q&A session，聽力題常見這種縮寫發音。"},{"id":"x-v248","theme":"biz","themeName":"會議、行銷與業務","word":"brainstorm","pos":"v.","meaning":"腦力激盪","example":"The team will brainstorm new slogans for the product launch.","exampleZh":"團隊將為新品上市腦力激盪想標語。","collocations":["brainstorm ideas","brainstorm session","brainstorm solutions"],"freq":"中頻","tip":"當名詞常搭 session（brainstorming session）；動詞用法不需加 about，直接接受詞。"},{"id":"x-v249","theme":"fin","themeName":"財務、採購與物流","word":"inventory","pos":"n.","meaning":"庫存","example":"The warehouse manager conducted a full inventory count last night.","exampleZh":"倉庫經理昨晚進行了完整的庫存盤點。","collocations":["inventory count","excess inventory","manage inventory"],"freq":"高頻","tip":"不可數名詞，動詞常搭配 take/conduct an inventory（做盤點）。"},{"id":"x-v250","theme":"fin","themeName":"財務、採購與物流","word":"shipment","pos":"n.","meaning":"貨運、一批貨","example":"The shipment of raw materials arrived two days behind schedule.","exampleZh":"這批原料的貨運比預定時間晚了兩天抵達。","collocations":["a shipment of","delay a shipment","track a shipment"],"freq":"高頻","tip":"ship（動詞，運送）+ -ment；可數名詞，指「一批貨」，注意與不可數的 shipping 區分。"},{"id":"x-v251","theme":"fin","themeName":"財務、採購與物流","word":"warehouse","pos":"n.","meaning":"倉庫","example":"All finished products are stored in the central warehouse.","exampleZh":"所有成品都存放在中央倉庫。","collocations":["central warehouse","warehouse staff","store in a warehouse"],"freq":"高頻","tip":"ware（貨物）+ house（房子）；也可作動詞用，意為「存放於倉庫」。"},{"id":"x-v252","theme":"fin","themeName":"財務、採購與物流","word":"defective","pos":"adj.","meaning":"有瑕疵的","example":"Customers can return any defective product within 30 days.","exampleZh":"顧客可在三十天內退回任何有瑕疵的產品。","collocations":["defective product","defective unit","found to be defective"],"freq":"中頻","tip":"defect（瑕疵，名詞）+ -ive（形容詞化）；常見於退換貨與品管情境。"},{"id":"x-v253","theme":"fin","themeName":"財務、採購與物流","word":"assembly","pos":"n.","meaning":"組裝","example":"The final assembly of the machine takes about two hours.","exampleZh":"這台機器的最終組裝大約需要兩小時。","collocations":["final assembly","assembly process","assembly instructions"],"freq":"中頻","tip":"assemble（動詞，組裝）的名詞形式；another 常混淆的是 assembly（集會），注意上下文判斷。"},{"id":"x-v254","theme":"fin","themeName":"財務、採購與物流","word":"supplier","pos":"n.","meaning":"供應商","example":"The company switched suppliers after repeated delivery delays.","exampleZh":"公司在多次延遲交貨後更換了供應商。","collocations":["reliable supplier","supplier contract","negotiate with a supplier"],"freq":"高頻","tip":"supply（提供）+ -er；與 vendor 意思相近，但 supplier 更強調長期供貨關係。"},{"id":"x-v255","theme":"fin","themeName":"財務、採購與物流","word":"distribute","pos":"v.","meaning":"分銷、配送","example":"The firm distributes its products to over forty countries.","exampleZh":"該公司將產品配送至超過四十個國家。","collocations":["distribute products","distribute nationwide","distribute to retailers"],"freq":"中頻","tip":"distribute 也可指「分發文件」，考題常考名詞 distribution 與 distributor 的詞性轉換。"},{"id":"x-v256","theme":"fin","themeName":"財務、採購與物流","word":"assembly line","pos":"n.","meaning":"裝配線","example":"Workers on the assembly line inspect each unit before packing.","exampleZh":"裝配線上的工人在包裝前會檢查每個單位。","collocations":["on the assembly line","assembly line worker","automate the assembly line"],"freq":"中頻","tip":"固定複合名詞，不可拆開使用，常與 automate、efficiency 搭配出現。"},{"id":"x-v257","theme":"fin","themeName":"財務、採購與物流","word":"automation","pos":"n.","meaning":"自動化","example":"Automation reduced labor costs at the packaging plant significantly.","exampleZh":"自動化大幅降低了包裝廠的人力成本。","collocations":["increase automation","automation technology","invest in automation"],"freq":"中頻","tip":"automate（動詞）→ automation（名詞）→ automatic（形容詞），三態詞性辨析常考。"},{"id":"x-v258","theme":"fin","themeName":"財務、採購與物流","word":"raw material","pos":"n.","meaning":"原料","example":"Rising prices of raw materials squeezed the factory's profit margin.","exampleZh":"原料價格上漲壓縮了工廠的利潤空間。","collocations":["raw material costs","source raw materials","shortage of raw materials"],"freq":"高頻","tip":"raw（未加工的）+ material（材料）；複數用法 raw materials 更常見於供應鏈情境。"},{"id":"x-v259","theme":"fin","themeName":"財務、採購與物流","word":"component","pos":"n.","meaning":"零組件","example":"Each component is tested separately before final assembly.","exampleZh":"每個零組件在最終組裝前都會分別測試。","collocations":["key component","electronic component","component part"],"freq":"高頻","tip":"component 泛指構成整體的一部分，也可比喻用於「策略的一環」等抽象語境。"},{"id":"x-v260","theme":"fin","themeName":"財務、採購與物流","word":"defect","pos":"n.","meaning":"瑕疵、缺陷","example":"Quality inspectors found a minor defect in the casing.","exampleZh":"品管員在外殼上發現了一個小瑕疵。","collocations":["manufacturing defect","minor defect","free of defects"],"freq":"中頻","tip":"名詞 defect 與形容詞 defective 拼法相近但詞性不同，注意句中位置判斷。"},{"id":"x-v261","theme":"fin","themeName":"財務、採購與物流","word":"durability","pos":"n.","meaning":"耐用性","example":"The brand is known for the durability of its outdoor equipment.","exampleZh":"這個品牌以其戶外裝備的耐用性聞名。","collocations":["test for durability","durability of a product","improve durability"],"freq":"中頻","tip":"durable（形容詞，耐用的）+ -ity（名詞化字尾），常見於產品評測與廣告文案。"},{"id":"x-v262","theme":"fin","themeName":"財務、採購與物流","word":"prototype","pos":"n.","meaning":"原型、樣品","example":"Engineers built a prototype to test the new design concept.","exampleZh":"工程師打造了一個原型來測試新設計概念。","collocations":["build a prototype","test a prototype","prototype design"],"freq":"中頻","tip":"proto-（最初）+ type（型態）→最初的樣品；常搭配 build/develop/unveil。"},{"id":"x-v263","theme":"fin","themeName":"財務、採購與物流","word":"quality control","pos":"n.","meaning":"品質管控","example":"The factory added an extra quality control step before shipping.","exampleZh":"工廠在出貨前多加了一道品質管控程序。","collocations":["quality control process","quality control team","pass quality control"],"freq":"高頻","tip":"常縮寫為 QC，考題會考複合名詞當形容詞使用，如 quality control department。"},{"id":"x-v264","theme":"fin","themeName":"財務、採購與物流","word":"inspection","pos":"n.","meaning":"檢驗","example":"The shipment passed inspection without any issues.","exampleZh":"這批貨順利通過檢驗，沒有任何問題。","collocations":["pass inspection","routine inspection","conduct an inspection"],"freq":"高頻","tip":"inspect（動詞）→ inspection（名詞）；常搭配 pass/fail，是多益考題高頻詞。"},{"id":"x-v265","theme":"fin","themeName":"財務、採購與物流","word":"inspect","pos":"v.","meaning":"檢查","example":"A technician will inspect the equipment before it ships out.","exampleZh":"技術人員會在設備出貨前進行檢查。","collocations":["inspect equipment","inspect closely","inspect for defects"],"freq":"高頻","tip":"in-（向內）+ spect（看）→仔細查看；常見同義字有 examine、check。"},{"id":"x-v266","theme":"fin","themeName":"財務、採購與物流","word":"output","pos":"n.","meaning":"產量","example":"The new machinery increased daily output by twenty percent.","exampleZh":"新機器使每日產量提高了百分之二十。","collocations":["increase output","daily output","output level"],"freq":"中頻","tip":"與 input（投入）相對；output 也可指「電腦輸出」，注意上下文語境判斷。"},{"id":"x-v267","theme":"fin","themeName":"財務、採購與物流","word":"capacity","pos":"n.","meaning":"產能、容量","example":"The plant is operating at full capacity this quarter.","exampleZh":"這座工廠本季正以滿載產能運作。","collocations":["full capacity","production capacity","expand capacity"],"freq":"高頻","tip":"固定搭配 at full capacity（滿載）；也可抽象指「能力」，如 in his capacity as manager。"},{"id":"x-v268","theme":"fin","themeName":"財務、採購與物流","word":"efficiency","pos":"n.","meaning":"效率","example":"The consultant recommended changes to improve production efficiency.","exampleZh":"顧問建議做出改變以提升生產效率。","collocations":["improve efficiency","operational efficiency","efficiency gains"],
