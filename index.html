\nEvent Date: May 15 – May 18, 2026\nVenue: Taipei World Trade Center, Exhibition Hall 1\n\nThe annual Taipei Trade & Career Expo is the region's largest professional networking and technology demonstration event. Corporate exhibitors intending to reserve booth space must review the following regulations:\n\nBooth Setup and Clearance: All demonstration machinery, promotional banners, and visual display units must be installed by 8:00 PM on May 14. Exhibitors displaying semiconductor manufacturing equipment or heavy optical instruments must submit a Structural Safety Certification Form to the venue management office no later than April 30. Standard booth dimensions are 3 meters by 3 meters. Any customized booth structures exceeding 2.5 meters in height require special permit clearance from the expo engineering committee.\n\nBadges and Access Control: Each registered exhibitor company is allocated eight complimentary vendor access badges. Staff members must wear their badges visibly at all times to clear venue security checkpoints. Additional vendor badges can be purchased online for $20 each prior to May 10. On-site badge purchasing at the registration desk will incur a $10 surcharge per badge."}],"questions":[{"q":"What is required for exhibitors displaying heavy optical instruments?","options":["They must pay an additional security surcharge of $20.","They must install their machinery during the exhibition opening hours.","They must submit a Structural Safety Certification Form by April 30.","They must limit their booth height to exactly 1.5 meters."],"answer":2,"explanation":"考點：細節定位題。定位 Booth Setup and Clearance 段：「Exhibitors displaying semiconductor manufacturing equipment or heavy optical instruments must submit a Structural Safety Certification Form to the venue management office no later than April 30」，直接對應選項 (C)，為正解。(A) $20 附加費是「額外購買現場臨時廠商證」的規定，與重型光學儀器展示無關，屬張冠李戴；(B) 文中要求設備須在 5 月 14 日晚上 8 點「前」完成安裝，也就是在展覽開放時段「之前」，並非在開放時段中安裝；(D) 文中限制的是「超過 2.5 公尺」的客製化攤位需申請許可，並非硬性規定所有攤位限高 1.5 公尺。","optionNotes":["$20 是線上加購廠商證的費用，與重型光學儀器的規定無關，屬混淆誘答。","文中要求須於開展前（5 月 14 日晚 8 點前）完成安裝，而非在開放時段中安裝，時序相反。","與「須於 4 月 30 日前提交結構安全認證表」直接對應，為正解。","文中規定超過 2.5 公尺才需申請許可，並無「限高 1.5 公尺」的規定，數字遭竄改。"]},{"q":"What is indicated about vendor access badges?","options":["Each exhibitor company receives eight free badges.","Badges can only be obtained on the first day of the event.","Exhibitors must return their badges at the end of each day.","On-site badge purchases receive a 10 percent discount."],"answer":0,"explanation":"考點：細節定位題。定位 Badges and Access Control 段：「Each registered exhibitor company is allocated eight complimentary vendor access badges」，明確指出每家參展公司可獲得八張免費廠商證，對應選項 (A)，為正解。(B) 文中並未限定廠商證只能在展覽第一天領取；(C) 全文沒有每日歸還證件的規定；(D) 現場購買廠商證是「加收 $10 附加費」，屬於加價而非「打九折」，方向完全相反。","optionNotes":["與「Each registered exhibitor company is allocated eight complimentary vendor access badges」完全對應，為正解。","全文未限定廠商證僅能在展覽首日領取，屬無中生有。","全文未提及每日歸還證件的規定，屬捏造。","現場購買是加收 $10 附加費（漲價），並非打折，方向相反，是明顯誘答。"]},{"q":"How much would an exhibitor pay to buy an additional vendor badge at the on-site registration desk during the event?","options":["$10","$20","$30","$40"],"answer":2,"explanation":"考點：計算推論題。定位 Badges and Access Control 段最後兩句：線上加購廠商證每張 $20（限 5 月 10 日前），而現場登記處購買則「incur a $10 surcharge per badge」，即在原價 $20 的基礎上「額外」加收 $10 附加費，而非單獨收 $10。因此現場購買一張廠商證的總金額為 $20 + $10 = $30，對應選項 (C)。(A) $10 僅為附加費金額，並非總價，是最容易誤算的陷阱；(B) $20 是線上優惠價，不適用於現場購買；(D) $40 為過度加總（如誤將 $20 附加費兩倍計算）的錯誤結果。","optionNotes":["$10 只是現場購買時「額外加收」的附加費金額，並非總價，是最容易誤算漏加基本費的陷阱。","$20 是 5 月 10 日前線上購買的優惠價，不適用於展覽期間現場登記處購買。","$20 基本價＋$10 現場附加費＝$30，為正解，需將兩個數字相加才能得出正確總價。","$40 屬於計算過度膨脹的錯誤數字，文中無對應依據。"]}],"translation":"2026 台北貿易與職涯博覽會－參展廠商登記須知\n展覽日期：2026 年 5 月 15 日至 5 月 18 日\n地點：台北世界貿易中心 展覽一館\n\n一年一度的台北貿易與職涯博覽會是本區域規模最大的專業人脈與科技展示活動。有意預訂攤位的企業參展商，須詳閱以下規定：\n\n攤位搭建與清場：所有展示機具、宣傳布條與視覺展示裝置，須於 5 月 14 日晚間 8 點前完成安裝。展示半導體製造設備或重型光學儀器的參展商，須於 4 月 30 日前將「結構安全認證表」提交至場館管理處。標準攤位尺寸為 3 公尺乘 3 公尺，任何客製化攤位結構若高度超過 2.5 公尺，須向博覽會工程委員會申請特別許可。\n\n識別證與門禁管制：每家登記參展的公司可獲得八張免費廠商識別證。工作人員須全程配戴識別證，以利通過場館安全檢查哨。額外廠商識別證可於 5 月 10 日前於線上加購，每張 $20；於展覽期間在登記處現場購買，每張將加收 $10 附加費。","keyWords":[{"word":"exhibitor","pos":"n.","meaning":"參展商","freq":"高頻"},{"word":"certification","pos":"n.","meaning":"認證","freq":"中頻"},{"word":"allocate","pos":"v.","meaning":"分配、撥給","freq":"中頻"},{"word":"surcharge","pos":"n.","meaning":"附加費","freq":"中頻"},{"word":"clearance","pos":"n.","meaning":"許可、通行核准","freq":"中頻"}]},{"id":"xf-r1","part":7,"title":"Wetland Venue Spaces 場地預約（Email + 確認單）","genre":"雙篇對照","difficulty":"中階","passages":[{"label":"電子郵件","text":"To: booking@wetland-events.com\nFrom: h.chen@plainlaw-podcast.tw\nDate: August 14\nSubject: Live Podcast Event Venue Booking Inquiry\n\nDear Booking Manager,\n\nI am coordinating the venue scheduling for our upcoming live legal podcast session titled \"Understanding Commercial Contracts,\" scheduled for Saturday, September 20. We expect an audience of approximately 80 attendees.\n\nWe require a quiet event space equipped with professional audiovisual gear, including four wireless microphones, a digital mixing console, and a high-definition projector. Additionally, our registration team will need two check-in tables set up outside the entrance. Could you confirm which room in your facility best accommodates our technical requirements and provide the applicable hourly rental rates?\n\nSincerely,\nHelena Chen, Event Coordinator"},{"label":"場地預約確認單","text":"Wetland Venue Spaces - Booking Summary\nDate of Event: Saturday, September 20\nClient: Helena Chen (Plain Law Podcast)\nAssigned Space: The Horizon Studio (3rd Floor)\n\nRoom Rental - Horizon Studio (Capacity: 100 seated): $120/hr x 4hrs = $480\nAV Package B - 4 Wireless Mics, Mixing Console, Projector: Flat Rate 1 set = $150\nSetup Service - 2 Registration Tables & Lobby Signage: Complimentary 1 set = $0\nSecurity Fee - Weekend Access Clearance Staff: $30/hr x 4hrs = $120\n\nTotal Payable Amount: $750\nDeposit Required: $375 (Due by August 25 to secure reservation)\n\nNote: Access to the Horizon Studio begins exactly 60 minutes prior to the scheduled event start time for sound testing and equipment calibration."}],"questions":[{"q":"Why did Ms. Chen send the email to Wetland Venue Spaces?","options":["To cancel a previously scheduled legal seminar","To inquire about room availability and technical equipment rates for a live event","To apply for a job as an audiovisual technician","To complain about a defective projector during a live broadcast"],"answer":1,"explanation":"考點：主旨題，僅需 Passage 1（Email）即可作答，不需跨篇。信件開頭說明是為 9/20 現場podcast活動協調場地，內文詳列所需的麥克風、混音器、投影機等AV設備規格，並在結尾詢問「哪個房間最適合我們的技術需求」及「適用的每小時租金」，明確是在詢問場地與設備租金，對應(B)。(A)未提及取消任何活動；(C)Chen是活動協調人而非應徵技術員；(D)信中並無投影機故障或直播抱怨的描述。","optionNotes":["(A) 信件通篇在安排新活動，並無「取消」字眼或情境，錯誤。","(B) 正解：信末兩個問句直接對應「詢問場地與設備費率」的目的。","(C) Chen的職稱是Event Coordinator（活動協調人），並非求職應徵AV技術員，錯誤。","(D) 全信未提到任何直播中的設備故障或客訴內容，屬無中生有。"]},{"q":"In Passage 2, how much is charged for setting up the registration tables?","options":["$0","$30","$120","$150"],"answer":0,"explanation":"考點：表格數字定位題，僅需 Passage 2（確認單）費用明細即可作答。表中「Setup Service - 2 Registration Tables & Lobby Signage」對應金額為「Complimentary 1 set = $0」，即兩張報到桌與大廳指示牌的佈置服務為免費贈送，收費金額為$0，對應(A)。$30/hr是保全費率（非佈置費）、$120是保全費4小時總額或房租的一部分、$150是AV設備套組費用，皆與報到桌佈置費無關，屬選項混淆同表格內其他金額的誘答。","optionNotes":["(A) 正解：確認單明確標示Setup Service金額為$0（Complimentary，即贈送）。","(B) $30為Security Fee的每小時費率，非佈置費用，混淆同張表格數字。","(C) $120為Security Fee 4小時總額，與報到桌設置無關。","(D) $150為AV Package B（麥克風、混音器、投影機）的整組費用，非桌椅佈置費。"]},{"q":"What is indicated about Ms. Chen's booking?","options":["She must pay the full amount of $750 by August 25.","Her event will be held in a room located on the ground floor.","She must pay a deposit of $375 by August 25 to secure the room.","Her team is prohibited from testing microphones before the event begins."],"answer":2,"explanation":"考點：細節推論題，需對照Passage 2確認單中的付款條款與備註兩處資訊。確認單載明「Deposit Required: $375 (Due by August 25 to secure reservation）」，即Chen須在8/25前支付$375訂金以保留場地，對應(C)。(A)誤將訂金金額$375說成總金額$750須全額於8/25繳清，與原文不符；(B)確認單標示場地為「The Horizon Studio (3rd Floor)」，是三樓而非一樓，錯誤；(D)備註寫的是「Access...begins...60 minutes prior...for sound testing」，代表活動前60分鐘即可入場進行「音效測試」，並非禁止測試麥克風，與(D)完全相反。","optionNotes":["(A) 混淆「訂金$375」與「總金額$750」，原文8/25前應繳的是訂金而非全額，錯誤。","(B) 場地為3rd Floor（三樓），非一樓，與確認單標示矛盾。","(C) 正解：確認單訂金條款與(C)敘述完全一致。","(D) 備註明確允許提前60分鐘入場做「sound testing」（音效測試），與「禁止測試麥克風」相反，錯誤。"]}],"translation":"【電子郵件】收件者：booking@wetland-events.com；寄件者：h.chen@plainlaw-podcast.tw；日期：8月14日；主旨：現場Podcast活動場地預約詢問\n親愛的預約經理：我正在為我們即將舉行的現場法律Podcast節目「認識商業合約」協調場地事宜，該活動訂於9月20日（星期六）舉行。我們預計約有80位觀眾出席。我們需要一個安靜的活動空間，並配備專業視聽設備，包括四支無線麥克風、一台數位混音控制台，以及一台高畫質投影機。此外，我們的報到team需要在入口外設置兩張報到桌。可否請您確認貴場地哪個房間最能滿足我們的技術需求，並提供適用的每小時租金？\n此致 Helena Chen，活動協調人\n\n【場地預約確認單】Wetland Venue Spaces－預約摘要\n活動日期：9月20日（星期六）\n客戶：Helena Chen（Plain Law Podcast）\n指定場地：Horizon工作室（三樓）\n\n房間租金－Horizon工作室（可容納100人）：每小時$120 x 4小時 = $480\nAV套組B－4支無線麥克風、混音控制台、投影機：整組固定價 = $150\n佈置服務－2張報到桌與大廳指示牌：贈送1組 = $0\n保全費－週末門禁管制人員：每小時$30 x 4小時 = $120\n\n應付總額：$750\n所需訂金：$375（須於8月25日前繳納以保留場地）\n\n備註：Horizon工作室可於活動預定開始時間前60分鐘開放進場，供音效測試與設備校準之用。","keyWords":[{"word":"inquiry","pos":"n.","meaning":"詢問、查詢","freq":"高頻"},{"word":"accommodate","pos":"v.","meaning":"容納；滿足（需求）","freq":"高頻"},{"word":"complimentary","pos":"adj.","meaning":"贈送的、免費的","freq":"高頻"},{"word":"deposit","pos":"n.","meaning":"訂金、押金","freq":"極高頻"},{"word":"secure","pos":"v.","meaning":"確保、保留（預約）","freq":"高頻"}]},{"id":"xf-r2","part":7,"title":"Apex Industrial Tooling 產品目錄與保固Email","genre":"雙篇對照","difficulty":"中階","passages":[{"label":"產品目錄","text":"Product Catalog - Precision Valve Components\nManufacturer: Apex Industrial Tooling Corp.\n\nModel: PV-100 Standard Brass Flow Valve | Max Pressure: Up to 50 PSI | Warranty: 1 Year | Price: $45\nModel: PV-200 High-Pressure Stainless Valve | Max Pressure: Up to 150 PSI | Warranty: 2 Years | Price: $85\nModel: PV-350 Ultra-High-Vacuum Control Valve | Max Pressure: Up to 300 PSI | Warranty: 3 Years | Price: $160\nModel: PV-500 Automated Ceramic Gate Valve | Max Pressure: Up to 500 PSI | Warranty: 5 Years | Price: $320\n\nNote: All valve models feature our patented leak-proof seal technology. For bulk orders exceeding 50 units, a 10 percent volume discount is applied automatically at checkout."},{"label":"電子郵件","text":"To: customer.servicing@apex-tooling.com\nFrom: b.chang@marketech-intl.com\nDate: October 12\nSubject: Maintenance Inquiry: Valve Component Replacement\n\nDear Support Team,\n\nOur engineering division purchased 60 units of your automated ceramic gate valves last year for our Hsinchu assembly facility. They have performed exceptionally well under rigorous cleanroom operating conditions.\n\nHowever, during our routine quarterly maintenance yesterday, our technicians noted that three of the units are showing minor pressure fluctuations when operating above 450 PSI. Since these components are still well within their guarantee period, we would like to request warranty replacements for the three affected units. Please let us know the standard return procedure and whether we need to ship the original valves back to your inspection center prior to receiving the replacements.\n\nSincerely,\nBai-Jin Chang, Project Manager"}],"questions":[{"q":"Which valve model did Mr. Chang's division purchase last year?","options":["PV-100","PV-200","PV-350","PV-500"],"answer":3,"explanation":"考點：跨篇對照題，需將Passage 2信件中的產品描述與Passage 1目錄的型號名稱比對。信件寫「purchased 60 units of your automated ceramic gate valves」（採購60組自動化陶瓷閘閥），對照目錄中唯一名稱為「Automated Ceramic Gate Valve」的型號是PV-500，故對應(D)。其餘型號名稱分別為標準黃銅流量閥（PV-100）、高壓不鏽鋼閥（PV-200）、超高真空控制閥（PV-350），皆與「automated ceramic gate valve」的字面描述不符。","optionNotes":["(A) PV-100是Standard Brass Flow Valve（標準黃銅流量閥），非陶瓷閘閥，錯誤。","(B) PV-200是High-Pressure Stainless Valve（高壓不鏽鋼閥），錯誤。","(C) PV-350是Ultra-High-Vacuum Control Valve（超高真空控制閥），錯誤。","(D) 正解：PV-500的型號名稱Automated Ceramic Gate Valve與信件描述逐字相符。"]},{"q":"What is indicated about Mr. Chang's original order last year?","options":["It was delivered by express air freight without charge.","It received a 10 percent volume discount.","It was paid in full using physical cash at the factory.","It was cancelled due to a severe supply chain bottleneck."],"answer":1,"explanation":"考點：跨篇推論題，需同時使用Passage 2的採購數量（60units）與Passage 1目錄備註的折扣門檻規則才能推得答案，是本組最需要兩篇合併運算的題目。目錄備註寫「For bulk orders exceeding 50 units, a 10 percent volume discount is applied automatically」，即訂購超過50組會自動享有10%折扣；信件說明去年訂購了60組（60>50），故可推論該筆訂單已自動獲得10%折扣，對應(B)。(A)(C)(D)在兩篇文章中皆未被提及任何運送方式、付款方式或訂單取消的資訊，均為無中生有的選項。","optionNotes":["(A) 兩篇文章皆未提及運送方式為航空快遞或免運費，屬無中生有。","(B) 正解：60組超過目錄備註的50組門檻，依規則自動套用10%折扣。","(C) 文中未提及付款方式，更未提到現金支付，屬無中生有。","(D) 信件反而說明產品「performed exceptionally well」，並無訂單被取消的描述，錯誤。"]},{"q":"Why did Mr. Chang contact customer servicing?","options":["To request a price quotation for standard brass valves","To report pressure fluctuations and request warranty replacements","To apply for an extension on an overdue invoice payment","To complain about a delayed shipment from the regional warehouse"],"answer":1,"explanation":"考點：主旨題，僅需Passage 2（Email）即可作答，不需跨篇。信件第二段明確指出技術人員發現三組閥件在超過450 PSI運作時出現輕微壓力波動，且因產品仍在保固期內，故要求針對受影響的三組進行保固更換，對應(B)。(A)信件討論的是已購入的陶瓷閘閥保固問題，並非詢問黃銅閥報價；(C)信中未提及任何逾期發票或付款展延問題；(D)信中沒有提到出貨延遲或倉庫相關的抱怨。","optionNotes":["(A) 信件主旨與PV-100標準黃銅閥報價無關，錯誤。","(B) 正解：信件明確要求「warranty replacements for the three affected units」，即報告壓力異常並要求保固更換。","(C) 全信未提及任何發票逾期或付款展延事宜，屬無中生有。","(D) 信中沒有提及出貨延遲或區域倉庫相關情事，錯誤。"]}],"translation":"【產品目錄】精密閥件產品目錄\n製造商：Apex Industrial Tooling Corp.\n\n型號：PV-100標準黃銅流量閥｜最大壓力：50 PSI以下｜保固：1年｜價格：$45\n型號：PV-200高壓不鏽鋼閥｜最大壓力：150 PSI以下｜保固：2年｜價格：$85\n型號：PV-350超高真空控制閥｜最大壓力：300 PSI以下｜保固：3年｜價格：$160\n型號：PV-500自動化陶瓷閘閥｜最大壓力：500 PSI以下｜保固：5年｜價格：$320\n\n備註：所有閥件型號皆採用本公司專利防漏密封技術。大宗訂購超過50組，結帳時將自動套用9折（10%）優惠。\n\n【電子郵件】收件者：customer.servicing@apex-tooling.com；寄件者：b.chang@marketech-intl.com；日期：10月12日；主旨：維護詢問：閥件更換\n親愛的客服團隊：我們的工程部門去年為新竹組裝廠採購了60組貴公司的自動化陶瓷閘閥，這些產品在嚴苛的無塵室運作條件下表現優異。然而，在昨天的例行季度維護中，我們的技術人員發現有三組閥件在超過450 PSI運作時出現輕微的壓力波動。由於這些組件仍在保固期內，我們希望針對這三組受影響的閥件申請保固更換。請告知標準退貨流程，以及在收到替換品前是否需要將原閥件寄回貴公司的檢驗中心。\n此致 Bai-Jin Chang，專案經理","keyWords":[{"word":"bulk order","pos":"n. phrase","meaning":"大宗訂購","freq":"高頻"},{"word":"volume discount","pos":"n. phrase","meaning":"依採購量計算的折扣","freq":"高頻"},{"word":"fluctuation","pos":"n.","meaning":"波動","freq":"中頻"},{"word":"guarantee period","pos":"n. phrase","meaning":"保固期","freq":"高頻"},{"word":"warranty replacement","pos":"n. phrase","meaning":"保固更換","freq":"高頻"}]},{"id":"xf-r3","part":7,"title":"Silicon-Tech Supply 採購單、Email與驗收日誌","genre":"三篇對照","difficulty":"進階","passages":[{"label":"採購單","text":"Purchase Order #MK-8819\nBuyer: Marketech International Corp.\nVendor: Silicon-Tech Supply Ltd.\nOrder Date: April 10\n\nPart ST-102 Wafer Alignment Contact Platforms | Qty: 10 | Unit Price: $200 | Total: $2,000\nPart ST-205 Ceramic Vacuum Suction Pads | Qty: 40 | Unit Price: $50 | Total: $2,000\nPart ST-309 Optical Sensor Calibration Jigs | Qty: 20 | Unit Price: $100 | Total: $2,000\n\nDelivery Terms: Standard Freight delivery to Hsinchu Plant by April 18.\nPayment Terms: Net 30 days upon inspection clearance."},{"label":"電子郵件","text":"To: shipping@silicon-tech.com\nFrom: logistics@marketech-intl.com\nDate: April 15\nSubject: Dispatch Notification Inquiry: PO #MK-8819\n\nDear Shipping Department,\n\nWe are reviewing our incoming logistics schedules for this week. We note that our order (#MK-8819) is due to arrive by April 18. However, our tracking portal indicates that while items ST-205 and ST-309 left your warehouse yesterday, part number ST-102 is currently listed as \"Processing.\"\n\nPlease clarify if all items will arrive together, or if ST-102 will be delivered in a separate shipment. Our technical assembly team requires all components on hand by Monday, April 21, to commence tool installation.\n\nSincerely,\nKen Lin, Logistics Coordinator"},{"label":"品保驗收日誌","text":"Quality Assurance & Receiving Log\nFacility: Hsinchu Assembly Plant\nLog ID: #RC-2026-0419\nDate: April 19\nInspector: Elena Wu\n\n- Shipment 1 (Received April 17): Contained 40 units of Part #ST-205 and 20 units of Part #ST-309. All items underwent mechanical tolerance testing and cleared quality verification.\n- Shipment 2 (Received April 19): Contained 10 units of Part #ST-102 (Shipped via express courier due to vendor packaging delay).\n- Inspection Finding: Upon opening Shipment 2, two units of Part #ST-102 exhibited cracked mounting edges due to severe transit vibration.\n- Action Taken: Eight compliant units accepted into inventory. Two defective units quarantined. Vendor contacted on April 19; replacement shipment of two units dispatched immediately via priority air freight (Tracking #EX-9912-TW)."}],"questions":[{"q":"What was the total dollar amount of Purchase Order #MK-8819?","options":["$2,000","$4,000","$6,000","$8,000"],"answer":2,"explanation":"考點：表格加總計算題，僅需Passage 1（採購單）即可作答。採購單列出三個品項，各自小計金額分別為ST-102 = $2,000、ST-205 = $2,000、ST-309 = $2,000，三者加總為$2,000+$2,000+$2,000 = $6,000，對應(C)。選項(A)只是單一品項的金額，(B)是任兩品項加總，(D)則超過實際加總金額，皆為誘答陷阱，須將三行金額全部加總才能得到正解，不能只看單一行。","optionNotes":["(A) $2,000僅為其中一個品項（如ST-102）的小計，並非採購單總額，錯誤。","(B) $4,000為任兩品項加總（如$2,000+$2,000），漏加第三品項，錯誤。","(C) 正解：三品項小計$2,000+$2,000+$2,000=$6,000，為採購單總金額。","(D) $8,000超過實際三品項加總金額，計算錯誤。"]},{"q":"According to Passage 2, why was Mr. Lin concerned about part number ST-102?","options":["Its unit price was higher than originally quoted in the catalog.","The tracking portal showed its status as \"Processing\" while other items had already shipped.","The components were delivered to the wrong regional office in Taipei.","The vendor refused to honor the standard two-year warranty period."],"answer":1,"explanation":"考點：細節理解題，答案主要位於Passage 2信件內，但需連結Passage 1採購單訂明的4/18到貨期限才能完整理解Lin為何緊張。信中寫道「ST-205 and ST-309 left your warehouse yesterday, part number ST-102 is currently listed as 'Processing'」，即其他兩項已出貨，唯獨ST-102仍卡在「處理中」狀態，對照採購單載明須於4/18前送達新竹廠，才能理解此狀態差異為何令Lin擔憂交期，對應(B)。(A)信中未提及單價爭議；(C)未提及送錯地點；(D)採購單與信件皆未提到保固爭議（且原採購單本身也無載明保固年限）。","optionNotes":["(A) 信件內容與單價高於報價無關，屬無中生有。","(B) 正解：信中明確指出ST-102狀態仍為Processing，與已出貨的另兩項形成對比，是Lin擔憂的原因。","(C) 信件未提及貨物送錯至台北或其他地區的辦公室，錯誤。","(D) 全篇未提及保固期爭議，且本題材料是採購交期而非保固條款，錯誤。"]},{"q":"What is indicated about part number ST-102 in the receiving log?","options":["All ten units failed mechanical tolerance testing on April 17.","Two units arrived with cracked mounting edges, and the vendor dispatched replacements for them immediately.","The entire shipment was cancelled permanently due to severe packaging errors.","It was discontinued by the manufacturer without prior notification."],"answer":1,"explanation":"考點：細節理解題，需綜合Passage 3日誌中「Shipment 2」段落與「Action Taken」段落兩處資訊才能完整確認正解，並注意原文動詞時態的精確度。日誌指出Shipment 2（4/19到貨）內含10組ST-102，開箱後發現其中2組因運送震動出現安裝邊緣裂損，故8組合格品驗收入庫、2組瑕疵品被隔離，廠商已於4/19聯繫並「立即以優先空運派送2組替代品（dispatched immediately）」，對應(B)。需特別留意：日誌原文僅記載替代品已「派送dispatched」，尚未記載已送達或完成更換，因此本題選項已改寫為「the vendor dispatched replacements for them immediately」以精確對應原文時態，避免與「已完成更換(were replaced)」的說法混淆而造成語意超譯。(A)日誌明確寫是10組中的「2組」有瑕疵，並非全部10組都測試不合格（且ST-102本身是Shipment 2，並未提及4/17做機械公差測試，4/17做測試的是Shipment 1的ST-205與ST-309）；(C)日誌顯示8組已驗收入庫、2組瑕疵品也已由廠商安排補送，並非整批永久取消；(D)全篇未提及停產訊息。","optionNotes":["(A) 4/17做機械公差測試並驗收合格的是Shipment 1（ST-205、ST-309），並非ST-102；且ST-102僅2組（非全部10組）有瑕疵，錯誤。","(B) 正解：日誌「Inspection Finding」與「Action Taken」兩段合併確認2組裂損且廠商已立即派送替代品，用詞與原文「dispatched immediately」時態一致。","(C) 日誌顯示8組合格品已驗收入庫，僅2組瑕疵品被隔離並安排補送，並非整批出貨遭永久取消，錯誤。","(D) 全文未提及ST-102停產或廠商未事先通知停產的資訊，屬無中生有。"]}],"translation":"【採購單】採購單編號 #MK-8819\n買方：Marketech International Corp.\n賣方：Silicon-Tech Supply Ltd.\n訂購日期：4月10日\n\n品項ST-102晶圓對位接觸平台｜數量：10｜單價：$200｜總計：$2,000\n品項ST-205陶瓷真空吸盤｜數量：40｜單價：$50｜總計：$2,000\n品項ST-309光學感測器校正治具｜數量：20｜單價：$100｜總計：$2,000\n\n交貨條件：標準貨運，於4月18日前送達新竹廠。\n付款條件：驗收合格後淨30天付款。\n\n【電子郵件】收件者：shipping@silicon-tech.com；寄件者：logistics@marketech-intl.com；日期：4月15日；主旨：出貨通知詢問：採購單 #MK-8819\n親愛的出貨部門：我們正在檢視本週的到貨進度排程。我們的訂單（#MK-8819）應於4月18日前送達。然而，我們的追蹤系統顯示，ST-205與ST-309已於昨日離開貴公司倉庫，但ST-102目前狀態仍顯示為「處理中」。請告知所有品項是否會一起送達，或ST-102是否會分批出貨。我們的技術組裝團隊須在4月21日（星期一）前備齊所有零件才能開始安裝工具。\n此致 Ken Lin，物流協調員\n\n【品保驗收日誌】品保與驗收日誌\n廠區：新竹組裝廠\n日誌編號：#RC-20 /* ── 儲存層 ── */
function probeStorage(){
  try{ localStorage.setItem('toeic850_probe','1'); localStorage.removeItem('toeic850_probe'); return true; }
  catch(e){ return false; }
}
let storageOK = probeStorage();
let corruptRaw = null;     // load() 解析失敗時暫存的原始字串，供「下載損毀原始資料」使用
function defaults(){ return {qstats:{}, vsrs:{}, custom:{questions:[],vocab:[],reading:[],seq:1}, history:{}, meta:{lastSaved:null,lastBackup:null,answersSinceBackup:0}}; }
let store = load();
function load(){
  let raw=null;
  try{
    raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaults();
    const s = JSON.parse(raw);
    if(!s || typeof s!=='object'){ corruptRaw = raw; return defaults(); }
    const d = defaults();
    for(const k in d) if(!(k in s)) s[k]=d[k];
    if(!s.custom.seq) s.custom.seq=1;
    if(!s.custom.reading) s.custom.reading=[];
    if(!s.meta || typeof s.meta!=='object') s.meta={lastSaved:null,lastBackup:null,answersSinceBackup:0};
    else{
      if(s.meta.lastSaved===undefined) s.meta.lastSaved=null;
      if(s.meta.lastBackup===undefined) s.meta.lastBackup=null;
      if(s.meta.answersSinceBackup===undefined) s.meta.answersSinceBackup=0;
    }
    return s;
  }catch(e){ corruptRaw = raw; return defaults(); }
}
function save(){
  store.meta.lastSaved = new Date().toISOString();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); storageOK = true; }
  catch(e){ storageOK = false; }
}
function today(){ return Math.floor(Date.now()/864e5); }

function allQ(){ return BUILTIN_QUESTIONS.concat(store.custom.questions); }
function allV(){ return BUILTIN_VOCAB.concat(store.custom.vocab); }
function qById(id){ return allQ().find(q=>q.id===id); }
function readSets(){ return BUILTIN_READING.concat(store.custom.reading||[]); }
function rsetById(id){ return readSets().find(s=>s.id===id); }
function subId(id,i){ return id+'#'+i; }
function rsetAgg(s){
  let a=0,c=0,w=0,lw=0;
  s.questions.forEach((q,i)=>{const st=store.qstats[subId(s.id,i)]; if(st){a+=st.a;c+=st.c;w+=st.w;if(st.lw)lw++;}});
  return {a,c,w,lw};
}
function qstat(id){ return store.qstats[id] || (store.qstats[id]={a:0,c:0,w:0,star:false,lw:false}); }
function vsrs(id){ return store.vsrs[id] || (store.vsrs[id]={box:0,due:today(),seen:0,star:false}); }
function catName(key){ const c=CATEGORIES.find(c=>c.key===key); return c?c.name:key; }
function markActive(correct){
  const d=String(today());
  const h=store.history[d]||(store.history[d]={a:0,c:0});
  h.a++; if(correct) h.c++;
}
function streak(){
  let d=today(), n=0;
  if(!store.history[String(d)]) d--;           // 今天還沒練，從昨天往回數
  while(store.history[String(d)]){ n++; d--; }
  return n;
}

/* ── 工具 ── */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

/* ── 發音（瀏覽器內建 speechSynthesis，無外部資源） ── */
const SPEECH_OK = (typeof window!=='undefined' && 'speechSynthesis' in window && typeof SpeechSynthesisUtterance!=='undefined');
const ACCENT_KEY = 'toeic850_accent';
let ACCENT = 'us';
try{ const a = localStorage.getItem(ACCENT_KEY); if(a==='us'||a==='uk') ACCENT=a; }catch(e){}
function setAccent(a){ ACCENT = (a==='uk') ? 'uk' : 'us'; try{ localStorage.setItem(ACCENT_KEY, ACCENT); }catch(e){} }
let _voices = [];
function _loadVoices(){ try{ _voices = speechSynthesis.getVoices()||[]; }catch(e){ _voices=[]; } }
function _onVoicesReady(){ _loadVoices(); _fillVoiceSel(); }
if(SPEECH_OK){
  _loadVoices();
  if(typeof speechSynthesis.addEventListener==='function'){
    speechSynthesis.addEventListener('voiceschanged', _onVoicesReady);
  } else {
    speechSynthesis.onvoiceschanged = _onVoicesReady;
  }
}
function _fillVoiceSel(){
  const sel = document.getElementById('voicesel');
  if(!sel) return;
  if(!SPEECH_OK || !_voices.length){ sel.style.display='none'; sel.innerHTML=''; return; }
  const enVoices = _voices.filter(v=>/^en-/i.test(v.lang));
  if(!enVoices.length){ sel.style.display='none'; sel.innerHTML=''; return; }
  const cur = _savedVoiceName();
  const shortName = n => n.replace(/^Microsoft\s+/i,'').replace(/\s*-\s*(English.*)$/i,'').trim();
  const groups = {};
  enVoices.forEach(v=>{ (groups[v.lang]=groups[v.lang]||[]).push(v); });
  let html = '<option value="auto">自動（推薦）</option>';
  Object.keys(groups).sort().forEach(lang=>{
    html += '<optgroup label="'+esc(lang)+'">';
    groups[lang].forEach(v=>{
      html += '<option value="'+esc(v.name)+'" '+(cur===v.name?'selected':'')+'>'+esc(shortName(v.name))+'</option>';
    });
    html += '</optgroup>';
  });
  sel.innerHTML = html;
  sel.style.display = '';
  if(cur==='auto') sel.value='auto';
}
const VOICE_KEY = 'toeic850_voice';
function _savedVoiceName(){ try{ return localStorage.getItem(VOICE_KEY) || 'auto'; }catch(e){ return 'auto'; } }
function _scoreVoice(v){
  let s = 0;
  if(/Natural/i.test(v.name)) s += 100;
  if(/Neural/i.test(v.name)) s += 80;
  if(/Google/i.test(v.name)) s += 60;
  if(/Online/i.test(v.name)) s += 20;
  if(/Desktop/i.test(v.name)) s -= 50;
  if(v.localService===false) s += 10;
  return s;
}
function _bestOf(list){
  if(!list.length) return null;
  return list.slice().sort((a,b)=>_scoreVoice(b)-_scoreVoice(a))[0];
}
function _pickVoice(){
  if(!_voices || !_voices.length) _loadVoices();
  if(!_voices || !_voices.length) return null;
  const chosen = _savedVoiceName();
  if(chosen && chosen!=='auto'){
    const v = _voices.find(v=>v.name===chosen);
    if(v) return v;
  }
  const wantLang = ACCENT==='uk' ? 'en-GB' : 'en-US';
  const sameAccent = _voices.filter(v=>v.lang===wantLang);
  if(sameAccent.length) return _bestOf(sameAccent);
  const anyEn = _voices.filter(v=>/^en-/i.test(v.lang));
  return _bestOf(anyEn);
}
function speak(text){
  if(!SPEECH_OK || !text) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = ACCENT==='uk' ? 'en-GB' : 'en-US';
    u.rate = 0.95;
    const v = _pickVoice();
    if(v){ try{ u.voice = v; u.lang = v.lang; }catch(e){ /* 指派失敗就用預設聲照唸 */ } }
    speechSynthesis.speak(u);
  }catch(e){ /* 靜默失敗，不中斷 UI */ }
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pct(c,a){ return a? Math.round(c/a*100) : null; }
const ABC = ['A','B','C','D'];

/* 題幹渲染：標高頻字（虛線底線）＋空格 */
function sentHtml(q, answered){
  let html = esc(q.question);
  const kws = (q.keyWords||[]).slice().sort((x,y)=>y.word.length-x.word.length);
  if(answered){
    for(const k of kws){
      try{
        const re = new RegExp('\\b('+escReg(k.word)+')\\b','i');
        if(re.test(html)) html = html.replace(re,'<span class="kw-mark">$1</span>');
      }catch(e){}
    }
  }
  const fill = answered ? esc(q.options[q.answer]) : '&nbsp;';
  html = html.replace(/_{3,}/, '<span class="blank">'+fill+'</span>');
  return html;
}
/* 發音用：把題目中的空格佔位換成 "blank" 唸出來 */
function speakableQuestion(q){
  return String(q.question||'').replace(/_{3,}/g, 'blank');
}

/* ── 紀錄備份／還原（F1-F5） ── */
function fmtDT(iso){
  const d=new Date(iso);
  if(isNaN(d.getTime())) return '未知時間';
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
}
function backupInfoLine(){
  const m = store.meta || {};
  const asb = m.answersSinceBackup||0;
  if(!m.lastBackup) return '尚未備份過｜未備份作答：'+asb+' 題';
  const days = Math.floor((Date.now()-Date.parse(m.lastBackup))/864e5);
  return '上次備份：'+fmtDT(m.lastBackup)+'（距今 '+days+' 天）｜未備份作答：'+asb+' 題';
}
function diagBlock(){
  const sizeKB = (JSON.stringify(store).length/1024).toFixed(1);
  const learned = Object.values(store.vsrs).filter(s=>s && s.seen>0).length;
  const lastSaved = store.meta && store.meta.lastSaved ? fmtDT(store.meta.lastSaved) : '尚未儲存';
  return `<details style="margin-top:14px">

      <div>最後儲存時間：${esc(lastSaved)}</div>
    </div>
  </details>`;
}
function parseBackupInput(raw){
  const obj = JSON.parse(raw);
  if(!obj || typeof obj!=='object') throw new Error('不是有效的紀錄檔');
  if(obj.store && typeof obj.store==='object' && 'qstats' in obj.store) return obj.store;
  if('qstats' in obj) return obj;
  throw new Error('不是有效的紀錄檔');
}
/* 合併匯入：逐欄位取「較大/較新」的一方，重複匯入同一份不會膨脹 */
function mergeStore(local, incoming){
  let vN=0, qN=0, hN=0, cN=0;
  const incV = incoming.vsrs||{};
  for(const id in incV){
    const inc=incV[id], loc=local.vsrs[id];
    if(!loc){ local.vsrs[id]=inc; vN++; continue; }
    const seenA=loc.seen||0, seenB=inc.seen||0;
    let winner;
    if(seenB>seenA) winner=inc;
    else if(seenA>seenB) winner=loc;
    else winner=(inc.box||0)>(loc.box||0)?inc:loc;
    local.vsrs[id] = Object.assign({}, winner, {star: !!(loc.star||inc.star)});
    vN++;
  }
  const incQ = incoming.qstats||{};
  for(const id in incQ){
    const inc=incQ[id], loc=local.qstats[id];
    if(!loc){ local.qstats[id]=inc; qN++; continue; }
    const winner=(inc.a||0)>(loc.a||0)?inc:loc;
    local.qstats[id] = Object.assign({}, winner, {star: !!(loc.star||inc.star), lw: winner.lw});
    qN++;
  }
  const incH = incoming.history||{};
  for(const d in incH){
    const inc=incH[d], loc=local.history[d];
    local.history[d] = loc ? {a:Math.max(loc.a||0,inc.a||0), c:Math.max(loc.c||0,inc.c||0)} : inc;
    hN++;
  }
  const incC = incoming.custom||{questions:[],vocab:[],reading:[],seq:1};
  ['questions','vocab','reading'].forEach(kind=>{
    const locList = local.custom[kind]||(local.custom[kind]=[]);
    const incList = incC[kind]||[];
    const ids = new Set(locList.map(x=>x.id));
    incList.forEach(item=>{ if(!ids.has(item.id)){ locList.push(item); ids.add(item.id); cN++; } });
  });
  local.custom.seq = Math.max(local.custom.seq||1, incC.seq||1);
  const incM = incoming.meta||{};
  const locB = local.meta.lastBackup?Date.parse(local.meta.lastBackup):0;
  const incB = incM.lastBackup?Date.parse(incM.lastBackup):0;
  if(incB>locB) local.meta.lastBackup = incM.lastBackup;
  return '合併完成：單字狀態 '+vN+' 筆、題目統計 '+qN+' 筆、歷史 '+hN+' 天'+(cN?('、新增自訂內容 '+cN+' 筆'):'')+'。';
}
function makeBackupPayload(){
  return {app:'toeic850', ver:1, exportedAt:new Date().toISOString(), store:store};

function downloadJSON(obj, filenamePrefix, ext){
  const blob = new Blob([typeof obj==='string'?obj:JSON.stringify(obj)], {type: ext==='txt'?'text/plain':'application/json'});
  const now=new Date(); const p=n=>String(n).padStart(2,'0');
  const fname = filenamePrefix+'-'+now.getFullYear()+p(now.getMonth()+1)+p(now.getDate())+'-'+p(now.getHours())+p(now.getMinutes())+'.'+ext;
  const a=document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = fname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

/* ── 閱讀 6・7 ── */
function passageHtml(s){
  const R=ui.read;
  return s.passages.map(p=>{
    let t=esc(p.text);
    t=t.replace(/\[\[(\d+)\]\]/g,(m,n)=>{
      const i=+n-1, q=s.questions[i];
      if(!q) return m;
      if(R.answers[i]!=null) return '<span class="blank" style="min-width:auto;padding:0 5px;font-size:15px">'+esc(q.options[q.answer])+'</span>';
      return '<span class="pblank'+(i===R.idx?' cur':'')+'">'+(i+1)+'</span>';
    });
    t=t.replace(/\n/g,'<br>');
    return '<div class="passage">'+(p.label?'<div class="plabel">'+esc(p.label)+'</div>':'')+'<div class="ptext">'+t+'</div></div>';
  }).join('');
}
function rRead(){
  const R=ui.read;
  if(R.stage==='play') return rReadPlay();
  if(R.stage==='done') return rReadDone();
  const sets=readSets().filter(s=>R.filter==='all'||('p'+s.part)===R.filter);
  const chips=`<div class="chiprow" style="margin-bottom:12px">
    <button class="fchip ${R.filter==='all'?'on':''}" data-act="rdFilter" data-f="all">全部</button>
    <button class="fchip ${R.filter==='p6'?'on':''}" data-act="rdFilter" data-f="p6">Part 6 段落填空</button>
    <button class="fchip ${R.filter==='p7'?'on':''}" data-act="rdFilter" data-f="p7">Part 7 閱讀測驗</button>
  </div>`;
  if(!sets.length) return chips+'<div class="card empty">這個分類還沒有文章</div>';
  return chips+sets.map(s=>{
    const g=rsetAgg(s);
    const star=(store.qstats[s.id]||{}).star;
    const acc=g.a?pct(g.c,g.a):null;
    return `<div class="rset">
      <div class="fav-meta">
        <span class="tag">Part ${s.part}</span>
        ${s.genre?'<span class="tag diff">'+esc(s.genre)+'</span>':''}
        ${s.difficulty?'<span class="tag diff">'+esc(s.difficulty)+'</span>':''}
        ${g.lw?'<span class="tag clay">有 '+g.lw+' 題待重練</span>':''}
        <span class="sp"><button class="starbtn ${star?'on':''}" style="font-size:18px" data-act="rdStar" data-id="${esc(s.id)}">${star?'★':'☆'}</button></span>
      </div>
      <div class="t">${esc(s.title||'')}</div>
      <div class="faint" style="font-size:13px;margin-bottom:8px">${s.questions.length} 小題${acc!==null?'　·　歷史正確率 '+acc+'%':''}</div>
      <div><button class="btn primary small" data-act="rdOpen" data-id="${esc(s.id)}">開始作答</button></div>
    </div>`;
  }).join('');
}
function rdExpHtml(q,pick){
  const ok=pick===q.answer;
  return `<div class="verdict ${ok?'ok':'no'}">${ok?'✓ 答對了':'✗ 答錯了，正解是 '+ABC[q.answer]}</div>
  <div class="exp">
    <div class="sec"><div class="lbl">解題思路</div><p>${esc(q.explanation||'')}</p></div>
    ${(q.optionNotes&&q.optionNotes.length===4)?`<div class="sec"><div class="lbl">選項解析</div>
      ${q.options.map((o,i)=>'<div class="onote '+(i===q.answer?'ok':'')+'"><span class="m '+(i===q.answer?'':'x')+'">'+ABC[i]+(i===q.answer?' ✓':' ✗')+'</span><span>'+esc(q.optionNotes[i]||'')+'</span></div>').join('')}
    </div>`:''}
  </div>`;
}
function rReadPlay(){
  const R=ui.read, s=rsetById(R.setId);
  if(!s){ R.stage='list'; return rRead(); }
  const q=s.questions[R.idx];
  if(!q){ R.stage='done'; return rReadDone(); }
  const pick=R.answers[R.idx];
  const answered=pick!=null;
  const star=(store.qstats[s.id]||{}).star;
  return `
  <div class="prog"><i style="width:${Object.keys(R.answers).length/s.questions.length*100}%"></i></div>
  <div class="card">
    <div class="q-head">
      <span class="faint" style="font-variant-numeric:tabular-nums">第 ${R.idx+1} / ${s.questions.length} 題</span>
      <span class="tagline"><span class="tag">Part ${s.part}</span>
        <button class="starbtn ${star?'on':''}" data-act="rdStar" data-id="${esc(s.id)}" aria-label="收藏本篇">${star?'★':'☆'}</button></span>
    </div>
    ${passageHtml(s)}
    <div class="rq">
      <div class="qtext">${s.part===6?'空格 ['+(R.idx+1)+'] 應填入：':esc(q.q||'')}${q.sentenceInsertion?'<span class="tag brass" style="margin-left:8px">插入句</span>':''}</div>
      <div class="opts">
        ${q.options.map((o,i)=>{
          let cls='';
          if(answered){ if(i===q.answer)cls='correct'; else if(i===pick)cls='wrong'; else cls='dim'; }
          return '<button class="opt '+cls+'" data-act="rdPick" data-i="'+i+'" '+(answered?'disabled':'')+'><span class="abc">'+ABC[i]+'</span><span>'+esc(o)+'</span></button>';
        }).join('')}
      </div>
      ${answered?rdExpHtml(q,pick):''}
    </div>
    <div class="q-foot">
      <button class="btn ghost small" data-act="rdQuit">結束</button>
      ${answered?'<button class="btn primary" data-act="rdNext">'+(R.idx+1>=s.questions.length?'看成績':'下一題 →')+'</button>':''}
    </div>
  </div>`;
}
function rReadDone(){
  const R=ui.read, s=rsetById(R.setId);
  if(!s){ R.stage='list'; return rRead(); }
  const total=s.questions.length;
  const good=s.questions.filter((q,i)=>R.answers[i]===q.answer).length;
  return `<div class="card">
    <div class="sum-score">
      <div class="lbl" style="text-align:center">${esc(s.title||'')}</div>
      <div class="big">${good}<span style="font-size:24px;color:var(--ink-faint)"> / ${total}</span></div>
      <div class="muted">${total?Math.round(good/total*100):0}% 正確率</div>
    </div>
    <hr class="hr">
    <div class="lbl">逐題回顧</div>
    ${s.questions.map((q,i)=>{
      const ok=R.answers[i]===q.answer;
      return '<div class="onote '+(ok?'ok':'')+'"><span class="m '+(ok?'':'x')+'">'+(i+1)+(ok?' ✓':' ✗')+'</span><span>'+(s.part===6?'空格 '+(i+1)+'：'+esc(q.options[q.answer]):esc(q.q||''))+(ok?'':'　→ 正解 '+ABC[q.answer])+'</span></div>';
    }).join('')}
    ${s.translation?`<hr class="hr"><details><summary>全文中文翻譯</summary><p class="muted" style="font-size:14.5px;white-space:pre-wrap">${esc(s.translation)}</p></details>`:''}
    ${(s.keyWords&&s.keyWords.length)?`<hr class="hr"><div class="lbl">本文高頻字彙</div><div class="kwchips">${s.keyWords.map(k=>'<div class="kwchip"><span class="w">'+esc(k.word)+'</span><span class="p">'+esc(k.pos||'')+'</span><span>'+esc(k.meaning||'')+'</span><span class="f">'+esc(k.freq||'')+'</span></div>').join('')}</div>`:''}
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <button class="btn primary" data-act="rdRetry">重練這篇</button>
      <button class="btn ghost" data-act="rdQuit">回文章列表</button>
    </div>
  </div>`;
}

function rFav(){
  const F=ui.fav, qs=allQ();
  const starQ = qs.filter(q=>{const s=store.qstats[q.id];return s&&s.star;});
  const wrongQ= qs.filter(q=>{const s=store.qstats[q.id];return s&&s.lw;});
  const starW = allV().filter(w=>{const s=store.vsrs[w.id];return s&&s.star;});
  const starR = readSets().filter(s=>{const st=store.qstats[s.id];return st&&st.star;});
  const wrongR=[];
  readSets().forEach(s=>s.questions.forEach((q,i)=>{const st=store.qstats[subId(s.id,i)]; if(st&&st.lw) wrongR.push({s,q,i});}));
  const list = F.filter==='star'?starQ : F.filter==='wrong'?wrongQ : starW;
  const chips=`<div class="chiprow" style="margin-bottom:12px">
    <button class="fchip ${F.filter==='star'?'on':''}" data-act="favF" data-f="star">⭐ 收藏（${starQ.length+starR.length}）</button>
    <button class="fchip ${F.filter==='wrong'?'on':''}" data-act="favF" data-f="wrong">錯題本（${wrongQ.length+wrongR.length}）</button>
    <button class="fchip ${F.filter==='word'?'on':''}" data-act="favF" data-f="word">收藏單字（${starW.length}）</button>
  </div>`;

  if(F.filter==='word'){
    return chips+(starW.length
      ? '<div class="card">'+starW.map(w=>'<div class="wordrow"><span class="w">'+esc(w.word)+'</span><span class="fc-pos" style="font-size:12px">'+esc(w.pos)+'</span><span class="m">'+esc(w.meaning)+'</span><span class="starbtn on" style="margin-left:auto;font-size:17px" data-act="vStar" data-id="'+esc(w.id)+'">★</span></div>').join('')+'</div>'
      : '<div class="card empty">還沒有收藏的單字——在單字卡右上角按 ☆ 收藏</div>');
  }

  /* 閱讀（Part 6・7）項目 */
  const rItems = F.filter==='star'
    ? starR.map(s=>`<div class="fav-item"><div class="fav-meta"><span class="tag">Part ${s.part}</span>${s.genre?'<span class="tag diff">'+esc(s.genre)+'</span>':''}<span class="sp"><button class="starbtn on" style="font-size:18px" data-act="rdStar" data-id="${esc(s.id)}">★</button><button style="color:var(--pine);font-weight:700;font-size:13.5px" data-act="favGoRead" data-id="${esc(s.id)}">去練 →</button></span></div><div class="qt">${esc(s.title||'')}</div></div>`).join('')
    : wrongR.map(({s,q,i})=>{
        const key=subId(s.id,i), open=F.open.has(key), st=store.qstats[key];
        return `<div class="fav-item"><div class="fav-meta"><span class="tag">Part ${s.part}</span><span class="tag clay">錯 ${st.w} 次</span><span class="sp"><button style="color:var(--pine);font-weight:700;font-size:13.5px" data-act="favOpen" data-id="${key}">${open?'收合 ▲':'看詳解 ▼'}</button><button style="color:var(--pine);font-weight:700;font-size:13.5px" data-act="favGoRead" data-id="${esc(s.id)}">練整篇 →</button></span></div>
        <div class="qt">${esc(s.title||'')}　·　${s.part===6?'空格 ['+(i+1)+']':esc(q.q||('第 '+(i+1)+' 小題'))}</div>
        ${open?`<div class="faint" style="font-size:13.5px;margin-bottom:4px">${q.options.map((o,j)=>ABC[j]+'. '+esc(o)).join('　')}</div><div class="onote ok"><span class="m">${ABC[q.answer]} ✓</span><span>${esc(q.explanation||'')}</span></div>`:''}</div>`;
      }).join('');

  if(!list.length && !rItems){
    return chips+'<div class="card empty">'+(F.filter==='star'?'還沒有收藏——練習時按題目右上角的 ☆':'錯題本是空的，太強了 💪<br><span style="font-size:13px">（答錯的題會自動進來；重練答對一次就移出）</span>')+'</div>';
  }
  return chips+(list.length?`
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <button class="btn primary small" data-act="favPractice" data-f="${F.filter}">練這 ${list.length} 題（Part 5）</button>
  </div>`:'')+rItems+`
  ${list.map(q=>{
    const s=qstat(q.id), open=F.open.has(q.id);
    return `<div class="fav-item">
      <div class="fav-meta">
        <span class="tag">${esc(q.categoryName||catName(q.category))}</span>
        <span class="tag diff">${esc(q.difficulty||'中階')}</span>
        ${s.w?'<span class="tag clay">錯過 '+s.w+' 次</span>':''}
        <span class="sp">
          <button class="starbtn ${s.star?'on':''}" style="font-size:18px" data-act="qStar" data-id="${esc(q.id)}">${s.star?'★':'☆'}</button>
          <button style="color:var(--pine);font-weight:700;font-size:13.5px" data-act="favOpen" data-id="${esc(q.id)}">${open?'收合 ▲':'看詳解 ▼'}</button>
        </span>
      </div>
      <div class="qt">${open?sentHtml(q,true):esc(q.question.replace(/_{3,}/,'（　）'))}</div>
      ${open?`<div class="faint" style="font-size:13.5px;margin-bottom:4px">${q.options.map((o,i)=>ABC[i]+'. '+esc(o)).join('　')}</div>`+qExpHtml(q,q.answer):''}
    </div>`;
  }).join('')}`;
}

  ${(cq.length||cv.length||cr.length)?`<div class="card">
    <div class="lbl">自訂內容管理</div>
    ${cq.map(q=>'<div class="bank-row"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🧩 '+esc(q.question.slice(0,46))+'…</span><button class="del" data-act="delCustom" data-kind="q" data-id="'+esc(q.id)+'">刪除</button></div>').join('')}
    ${cr.map(s=>'<div class="bank-row"><span>📖 Part '+s.part+'　'+esc((s.title||'').slice(0,30))+'</span><button class="del" data-act="delCustom" data-kind="r" data-id="'+esc(s.id)+'">刪除</button></div>').join('')}
    ${cv.map(w=>'<div class="bank-row"><span>🔤 '+esc(w.word)+'　<span class="faint">'+esc(w.meaning.slice(0,18))+'</span></span><button class="del" data-act="delCustom" data-kind="v" data-id="'+esc(w.id)+'">刪除</button></div>').join('')}
  </div>`:''}

  <div class="card" style="background:var(--pine-tint);border-color:#CBDCCB">
    <div class="lbl" style="color:var(--pine)">另一條路：直接叫 Claude 加進內建題庫</div>
    <p style="font-size:14px;margin:0">在 Claude Code 對話裡把題目貼上，說「<b>加進 850 訓練場</b>」，Claude 會讀取格式說明檔、轉檔加入內建題庫並重新發佈，這樣換瀏覽器也不會不見。</p>
  </div>`;
}

/* =====================================================================
   匯入驗證
   ===================================================================== */
function validateImport(text){
  let data;
  try{ data=JSON.parse(text); }catch(e){ return {err:'JSON 解析失敗：'+esc(e.message)}; }
  if(!Array.isArray(data)){
    if(data && typeof data==='object' && (Array.isArray(data.questions)||Array.isArray(data.vocab)||Array.isArray(data.reading)))
      data=(data.questions||[]).concat(data.reading||[], data.vocab||[]);
    else return {err:'需要 JSON 陣列（或含 questions / reading / vocab 欄位的物件）'};
  }
  const qs=[], vs=[], rs=[], errs=[];
  data.forEach((it,i)=>{
    if(!it||typeof it!=='object'){ errs.push('第 '+(i+1)+' 筆不是物件'); return; }
    if(Array.isArray(it.options)){         /* 文法題 */
      const e=[];
      if(typeof it.question!=='string'||!it.question.trim()) e.push('缺 question');
      else if(!/_{3,}/.test(it.question)) e.push('question 需含 ___ 空格');
      if(!Array.isArray(it.options)||it.options.length!==4) e.push('options 需恰好 4 個');
      if(!Number.isInteger(it.answer)||it.answer<0||it.answer>3) e.push('answer 需為 0-3');
      if(e.length){ errs.push('第 '+(i+1)+' 筆（文法題）：'+e.join('、')); return; }
      const cat=CATEGORIES.some(c=>c.key===it.category)?it.category:'word';
      qs.push({
        id:'c-q'+(store.custom.seq++), category:cat, categoryName:catName(cat),
        question:String(it.question), options:it.options.map(String), answer:it.answer,
        difficulty:['基礎','中階','進階'].includes(it.difficulty)?it.difficulty:'中階',
        translation:String(it.translation||''), explanation:String(it.explanation||''),
        optionNotes:(Array.isArray(it.optionNotes)&&it.optionNotes.length===4)?it.optionNotes.map(String):['','','',''],
        keyWords:Array.isArray(it.keyWords)?it.keyWords.filter(k=>k&&k.word).map(k=>({word:String(k.word),pos:String(k.pos||''),meaning:String(k.meaning||''),freq:String(k.freq||'高頻')})):[],
        pattern:(it.pattern&&it.pattern.name)?{name:String(it.pattern.name),note:String(it.pattern.note||''),example:String(it.pattern.example||'')}:undefined,
      });
    }else if((it.part===6||it.part===7)&&Array.isArray(it.passages)&&Array.isArray(it.questions)){ /* 閱讀組 */
      const e=[];
      if(!it.passages.length||it.passages.some(p=>!p||typeof p.text!=='string'||!p.text.trim())) e.push('passages 每篇需有 text');
      if(!it.questions.length) e.push('questions 不可為空');
      it.questions.forEach((q,j)=>{
        if(!q||!Array.isArray(q.options)||q.options.length!==4) e.push('第 '+(j+1)+' 小題 options 需 4 個');
        else if(!Number.isInteger(q.answer)||q.answer<0||q.answer>3) e.push('第 '+(j+1)+' 小題 answer 需 0-3');
      });
      if(it.part===6){
        const t=it.passages.map(p=>p.text).join('\n');
        it.questions.forEach((q,j)=>{ if(t.indexOf('[['+(j+1)+']]')<0) e.push('文章缺 [['+(j+1)+']] 空格標記'); });
      }
      if(e.length){ errs.push('第 '+(i+1)+' 筆（閱讀組）：'+e.join('、')); return; }
      rs.push({
        id:'c-r'+(store.custom.seq++), part:it.part,
        title:String(it.title||('Part '+it.part+' 閱讀')), genre:String(it.genre||''),
        difficulty:['基礎','中階','進階'].includes(it.difficulty)?it.difficulty:'中階',
        passages:it.passages.map(p=>({label:String(p.label||''),text:String(p.text)})),
        questions:it.questions.map(q=>({q:String(q.q||''),options:q.options.map(String),answer:q.answer,
          explanation:String(q.explanation||''),
          optionNotes:(Array.isArray(q.optionNotes)&&q.optionNotes.length===4)?q.optionNotes.map(String):undefined,
          sentenceInsertion:!!q.sentenceInsertion})),
        translation:String(it.translation||''),
        keyWords:Array.isArray(it.keyWords)?it.keyWords.filter(k=>k&&k.word).map(k=>({word:String(k.word),pos:String(k.pos||''),meaning:String(k.meaning||''),freq:String(k.freq||'高頻')})):[],
      });
    }else if(typeof it.word==='string'){   /* 單字卡 */
      const e=[];
      if(!it.word.trim()) e.push('缺 word');
      if(typeof it.meaning!=='string'||!it.meaning.trim()) e.push('缺 meaning');
      if(e.length){ errs.push('第 '+(i+1)+' 筆（單字）：'+e.join('、')); return; }
      const th=THEMES.some(t=>t.key===it.theme)?it.theme:'biz';
      vs.push({
        id:'c-v'+(store.custom.seq++), theme:th, themeName:(THEMES.find(t=>t.key===th)||{}).name,
        word:String(it.word), pos:String(it.pos||''), meaning:String(it.meaning),
        example:String(it.example||''), exampleZh:String(it.exampleZh||''),
        collocations:Array.isArray(it.collocations)?it.collocations.map(String):[],
        freq:['極高頻','高頻','中頻'].includes(it.freq)?it.freq:'高頻',
        tip:it.tip?String(it.tip):undefined,
      });
    }else errs.push('第 '+(i+1)+' 筆看不出是文法題（需 options）、閱讀組（需 part/passages/questions）還是單字（需 word）');
  });
  return {qs,vs,rs,errs};
}

/* =====================================================================
   動作
   ===================================================================== */
function copyText(t,btn){
  const done=()=>{ if(btn){ const o=btn.textContent; btn.textContent='已複製 ✓'; setTimeout(()=>{btn.textContent=o;},1600);} };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done,()=>fallback());
  else fallback();
  function fallback(){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');done();}catch(e){} ta.remove(); }
}

const ACTIONS = {
  nav(d){ ui.tab=d.tab; if(d.tab==='vocab'){ buildVQueue(); } render(); },
  /* 總覽 */
  goVocab(){ ui.tab='vocab'; ui.vocab.mode='due'; buildVQueue(); render(); },
  goQuizSmart(){ ui.tab='quiz'; Object.assign(ui.quiz,{stage:'setup',cats:new Set(['all']),count:10,src:'smart'}); startQuiz(); },
  goWrong(){ ui.tab='quiz'; Object.assign(ui.quiz,{stage:'setup',cats:new Set(['all']),count:999,src:'wrong'}); startQuiz(); },
  goCat(d){ ui.tab='quiz'; Object.assign(ui.quiz,{stage:'setup',cats:new Set([d.cat]),count:10,src:'smart'}); startQuiz(); },
  expProg(d,el){
    copyText(JSON.stringify(makeBackupPayload()),el);
    store.meta.lastBackup=new Date().toISOString(); store.meta.answersSinceBackup=0; save();
    const m=document.getElementById('bk-msg'); if(m)m.innerHTML='<div class="imp-msg ok">已複製到剪貼簿，貼到記事本保存即可。</div>';
    const info=document.getElementById('bk-info'); if(info) info.textContent=backupInfoLine();
  },
  impProgShow(){ ui.backupShow=!ui.backupShow; render(); },
  dlBackup(){
    downloadJSON(makeBackupPayload(),'toeic850-backup','json');
    store.meta.lastBackup=new Date().toISOString(); store.meta.answersSinceBackup=0;
    save(); render();
    const m=document.getElementById('bk-msg'); if(m)m.innerHTML='<div class="imp-msg ok">已下載備份檔。</div>';
  },
  dlCorrupt(){ if(corruptRaw) downloadJSON(corruptRaw,'toeic850-corrupt','txt'); },
  closeStorageBanner(){ ui.storageBannerClosed=true; render(); },
  closeBackupReminder(){ ui.backupReminderClosed=true; render(); },
  impProgDo(d){
    const ta=document.getElementById('bk-ta');
    const raw = ta && ta.value.trim();
    const msgEl=document.getElementById('bk-msg');
    if(!raw){ if(msgEl) msgEl.innerHTML='<div class="imp-msg err">請先貼上 JSON 或選擇檔案</div>'; return; }
    try{
      const incoming = parseBackupInput(raw);
      let summary;
      if(d.mode==='merge'){
        summary = mergeStore(store, incoming);
      }else{
        store = incoming;
        const dft=defaults(); for(const k in dft) if(!(k in store)) store[k]=dft[k];
        if(!store.custom.seq) store.custom.seq=1;
        if(!store.custom.reading) store.custom.reading=[];
        if(!store.meta || typeof store.meta!=='object') store.meta={lastSaved:null,lastBackup:null,answersSinceBackup:0};
        summary = '已覆蓋匯入現有紀錄。';
      }
      store.meta.answersSinceBackup = 0;
      save(); ui.backupShow=false; render();
      document.getElementById('bk-msg').innerHTML='<div class="imp-msg ok">'+summary+'</div>';
    }catch(e){ if(msgEl) msgEl.innerHTML='<div class="imp-msg err">匯入失敗：'+esc(e.message)+'</div>'; }
  },
  /* 單字卡 */
  vTheme(d){ ui.vocab.theme=d.t; ui.vocab.browseIdx=0; ui.vocab.done=0; buildVQueue(); render(); },
  vMode(d){ ui.vocab.mode=d.m; ui.vocab.flip=false; ui.vocab.done=0; if(d.m==='due') buildVQueue(); render(); },
  vFlip(d,el){ ui.vocab.flip=!ui.vocab.flip; render(); },
  vPrev(){ const n=vBrowseList().length; ui.vocab.browseIdx=(ui.vocab.browseIdx-1+n)%n; ui.vocab.flip=false; render(); },
  vNext(){ const n=vBrowseList().length; ui.vocab.browseIdx=(ui.vocab.browseIdx+1)%n; ui.vocab.flip=false; render(); },
  vRebuild(){ ui.vocab.done=0; buildVQueue(); render(); },
  vStar(d,el){ const s=vsrs(d.id); s.star=!s.star; save(); render(); },
  /* 發音 */
  speakWord(d){ speak(d.text); },
  speakEx(d){ speak(d.text); },
  speakQ(d){ const q=qById(d.id); if(q) speak(speakableQuestion(q)); },
  setAccent(d){ setAccent(d.a); render(); },
  vGrade(d){
    const V=ui.vocab, id=V.queue[V.idx], s=vsrs(id), g=+d.g;
    s.seen++;
    if(g===0){ s.box=0; s.due=today(); V.queue.push(id); }        // 不熟：今天排隊尾再出現
    else if(g===1){ s.box=Math.max(1,s.box); s.due=today()+1; }   // 有點忘：明天
    else { s.box=Math.min(4,s.box+1); s.due=today()+SRS_IV[s.box]; } // 記得：依盒距
    markActive(g===2); store.meta.answersSinceBackup++; save();
    V.idx++; V.done++; V.flip=false; render();
  },
  /* Part 5 */
  qCat(d){
    const C=ui.quiz.cats;
    if(d.c==='all'){ C.clear(); C.add('all'); }
    else{
      C.delete('all');
      C.has(d.c)?C.delete(d.c):C.add(d.c);
      if(!C.size) C.add('all');
    }
    render();
  },
  qCount(d){ ui.quiz.count=+d.n; render(); },
  qSrc(d){ ui.quiz.src=d.s; render(); },
  qStart(){ startQuiz(); },
  qPick(d){
    const Q=ui.quiz; if(Q.picked!==null) return;
    const q=qById(Q.list[Q.idx]); if(!q) return;
    const i=+d.i, ok=i===q.answer, s=qstat(q.id);
    Q.picked=i; Q.session.push({id:q.id,ok});
    s.a++; ok?s.c++:s.w++;
    s.lw = ok ? false : true;              // 答對移出錯題本；答錯進錯題本
    markActive(ok); store.meta.answersSinceBackup++; save(); render();
  },
  qNext(){
    const Q=ui.quiz;
    Q.idx++; Q.picked=null;
    if(Q.idx>=Q.list.length) Q.stage='done';
    render();
  },
  qQuit(){ ui.quiz.stage = ui.quiz.session.length ? 'done' : 'setup'; render(); },
  qAgain(){ ui.quiz.stage='setup'; ui.quiz.session=[]; render(); },
  qRetryWrong(){
    const wrongIds=[...new Set(ui.quiz.session.filter(s=>!s.ok).map(s=>s.id))];
    Object.assign(ui.quiz,{stage:'play',list:shuffle(wrongIds),idx:0,picked:null,session:[]});
    render();
  },
  qStar(d){ const s=qstat(d.id); s.star=!s.star; save(); render(); },
  /* 收藏/錯題 */
  favF(d){ ui.fav.filter=d.f; render(); },
  favOpen(d){ const o=ui.fav.open; o.has(d.id)?o.delete(d.id):o.add(d.id); render(); },
  favPractice(d){
    const qs=allQ().filter(q=>{const s=store.qstats[q.id]; return s && (d.f==='star'?s.star:s.lw);});
    if(!qs.length) return;
    ui.tab='quiz';
    Object.assign(ui.quiz,{stage:'play',list:shuffle(qs.map(q=>q.id)),idx:0,picked:null,session:[]});
    render();
  },
  /* 閱讀 6・7 */
  rdFilter(d){ ui.read.filter=d.f; render(); },
  rdStar(d){ const s=qstat(d.id); s.star=!s.star; save(); render(); },
  rdOpen(d){ Object.assign(ui.read,{stage:'play',setId:d.id,idx:0,answers:{}}); render(); },
  favGoRead(d){ ui.tab='read'; Object.assign(ui.read,{stage:'play',setId:d.id,idx:0,answers:{}}); render(); },
  goRead(){ ui.tab='read'; ui.read.stage='list'; render(); },
  rdPick(d){
    const R=ui.read, s=rsetById(R.setId); if(!s||R.answers[R.idx]!=null) return;
    const q=s.questions[R.idx], i=+d.i, ok=i===q.answer;
    R.answers[R.idx]=i;
    const st=qstat(subId(s.id,R.idx));
    st.a++; ok?st.c++:st.w++; st.lw=!ok;
    markActive(ok); store.meta.answersSinceBackup++; save(); render();
  },
  rdNext(){ const R=ui.read, s=rsetById(R.setId); R.idx++; if(!s||R.idx>=s.questions.length) R.stage='done'; render(); },
  rdQuit(){ ui.read.stage='list'; render(); },
  rdRetry(){ Object.assign(ui.read,{stage:'play',idx:0,answers:{}}); render(); },
  /* 題庫 */
  impDo(){
    const ta=document.getElementById('imp-ta'); if(!ta||!ta.value.trim()){ ui.bank.msg={type:'err',html:'請先貼上 JSON'}; render(); return; }
    const r=validateImport(ta.value);
    if(r.err){ ui.bank.msg={type:'err',html:r.err}; render(); return; }
    store.custom.questions.push(...r.qs);
    store.custom.vocab.push(...r.vs);
    store.custom.reading.push(...r.rs);
    save();
    const done=[];
    if(r.qs.length) done.push('文法題 '+r.qs.length+' 題');
    if(r.rs.length) done.push('閱讀組 '+r.rs.length+' 組');
    if(r.vs.length) done.push('單字 '+r.vs.length+' 個');
    let html=done.length?'匯入成功：'+done.join('、'):'沒有可匯入的資料';
    if(r.errs.length) html+='<br>跳過 '+r.errs.length+' 筆：<br>'+r.errs.map(esc).join('<br>');
    ui.bank.msg={type:done.length?'ok':'err',html};
    render();
  },
  copyTpl(d,el){ copyText(CLAUDE_PROMPT_TPL,el); },
  delCustom(d){
    if(d.kind==='q') store.custom.questions=store.custom.questions.filter(q=>q.id!==d.id);
    else if(d.kind==='r') store.custom.reading=store.custom.reading.filter(s=>s.id!==d.id);
    else store.custom.vocab=store.custom.vocab.filter(w=>w.id!==d.id);
    save(); render();
  },
};

function startQuiz(){
  const Q=ui.quiz;
  let pool=quizPool();
  if(!pool.length){ Q.stage='setup'; render(); return; }
  if(Q.src==='smart'){
    pool=pool.map(q=>{
      const s=store.qstats[q.id];
      const wgt=(s?s.w*3:0)+((!s||!s.a)?2:0)+Math.random();
      return {q,wgt};
    }).sort((a,b)=>b.wgt-a.wgt).map(x=>x.q);
    pool=shuffle(pool.slice(0,Math.min(Q.count,pool.length)));
  }else{
    pool=shuffle(pool).slice(0,Math.min(Q.count,pool.length));
  }
  Object.assign(Q,{stage:'play',list:pool.map(q=>q.id),idx:0,picked:null,session:[]});
  render();
}

/* 事件委派 */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');
  if(!el) return;
  /* 星號在卡片(button)內層：阻止外層翻面 */
  if(el.dataset.act==='vStar'||el.dataset.act==='qStar'||el.dataset.act==='speakWord'||el.dataset.act==='speakEx'||el.dataset.act==='speakQ') e.stopPropagation();
  const fn=ACTIONS[el.dataset.act];
  if(fn){ e.preventDefault(); fn(el.dataset,el); }
},true);

/* 匯入紀錄：檔案選取（讀入後填入 textarea，沿用同一個解析器按鈕） */
document.addEventListener('change', e=>{
  if(!e.target || e.target.id!=='bk-file') return;
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const ta=document.getElementById('bk-ta'); if(ta) ta.value = reader.result;
    const m=document.getElementById('bk-msg');
    if(m) m.innerHTML = '<div class="imp-msg ok">已讀取檔案「'+esc(file.name)+'」，請選擇下方按鈕匯入。</div>';
  };
  reader.onerror = ()=>{ const m=document.getElementById('bk-msg'); if(m) m.innerHTML='<div class="imp-msg err">讀取檔案失敗。</div>'; };
  reader.readAsText(file);
});

    const val = e.target.value;
    try{ localStorage.setItem(VOICE_KEY, val); }catch(err){}
    speak('This is a voice preview.');
  });
}

_fillVoiceSel();
render();
