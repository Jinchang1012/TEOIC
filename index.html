詞，缺少 be 動詞句子不完整。","indicate 是動詞原形，主詞 analysis 為第三人稱單數，動詞須加 -s，此選項犯了主詞動詞一致性錯誤。"],"keyWords":[{"word":"structural analysis","pos":"n.phr.","meaning":"結構分析","freq":"中頻"},{"word":"withstand","pos":"v.","meaning":"承受、耐受","freq":"中頻"}],"pattern":{"name":"報告/研究類主詞 + 現在式動詞","note":"report、study、analysis、chart、sign 等作主詞陳述其內容時，習慣用現在式（indicates、shows、states），表示文件目前呈現的內容，與文件完成的實際時間無關。","example":"The annual report shows a steady increase in overseas sales."}},{"id":"x-q84","category":"verb","categoryName":"動詞時態與語態","question":"The team leader insisted that the code ___ reviewed by two senior peers.","options":["be","is","being","was"],"answer":0,"difficulty":"進階","translation":"團隊負責人堅持這段程式碼必須經過兩位資深同事的審查。","explanation":"解題線索：主要動詞 insisted（堅持）屬於表示「命令、要求、建議」的動詞。文法規則：insist that 子句須用「省略 should 的原形動詞」構成虛擬語氣，不受主詞單複數與主要子句時態影響。正解 be 為唯一原形動詞選項，搭配後方 reviewed 構成 be + p.p. 被動結構。","optionNotes":["正解：be 是動詞原形，符合 insist that + S + 原形動詞的虛擬語氣句型，並與 reviewed 構成 be + p.p. 被動語態，表示「必須被審查」。","is 是第三人稱單數現在式，若填入會誤用一般現在式規則，但此處是虛擬語氣句型，動詞恆用原形，故錯誤。","being 是動名詞/現在分詞，不能作為 that 子句中的限定動詞，句子會缺少正式動詞而不成立。","was 是過去式，虛擬語氣中的子句動詞不隨主要子句的過去式 insisted 而變化，一律使用原形，故此選項不符合句型規則。"],"keyWords":[{"word":"insist","pos":"v.","meaning":"堅持","freq":"高頻"},{"word":"senior peer","pos":"n.phr.","meaning":"資深同事","freq":"低頻"}],"pattern":{"name":"insist that + S + 原形動詞（虛擬語氣）","note":"insist、demand、require、request 等動詞接 that 子句時，子句動詞用原形（省略 should），即使主要子句是過去式，子句動詞仍不變化，也不受主詞單複數影響。","example":"The auditor insisted that the records be kept for at least five years."}},{"id":"x-q85","category":"verb","categoryName":"動詞時態與語態","question":"While the engineers ___ the hardware, the power suddenly cut out.","options":["test","have tested","were testing","tested"],"answer":2,"difficulty":"中階","translation":"當工程師們正在測試硬體時，電力突然中斷了。","explanation":"解題線索：句尾 the power suddenly cut out 是簡單過去式描述的突發事件，打斷了 While 子句中正在進行的動作。文法規則：While + 過去進行式，描述背景中持續進行的動作，被主要子句的簡單過去式（突發、瞬間發生的事件）所打斷，是 TOEIC 常考的時態對比句型。正解 were testing 唯一符合此固定搭配。","optionNotes":["test 是簡單現在式，與全句過去時空的敘事（cut out 為過去式）矛盾，時態方向錯誤。","have tested 是現在完成式，與全句過去時空的敘事矛盾，且無法表達過去某時刻正在進行的動作。","正解：were testing 是過去進行式，精準對應 While 子句所需的「持續進行中的背景動作」，並被主要子句的突發過去事件打斷。","tested 是簡單過去式，雖時態方向正確，但無法呈現「正在進行中被打斷」的背景動作語感，與 suddenly 強調的瞬間打斷不搭配。"],"keyWords":[{"word":"hardware","pos":"n.","meaning":"硬體","freq":"高頻"},{"word":"cut out","pos":"phr.v.","meaning":"（電力等）中斷","freq":"中頻"}],"pattern":{"name":"While + 過去進行式，主句用簡單過去式（打斷句型）","note":"While 引導過去進行式子句描述背景中持續進行的動作，主要子句用簡單過去式描述突然發生、打斷該動作的事件，常與 suddenly、when 搭配出現。","example":"While the technician was updating the system, the server suddenly rebooted."}},{"id":"x-q86","category":"verb","categoryName":"動詞時態與語態","question":"The client servicing team ___ clients about the system update last night.","options":["notified","notifies","notifying","will notify"],"answer":0,"difficulty":"基礎","translation":"客戶服務團隊昨晚已通知客戶系統更新的事宜。","explanation":"解題線索：句尾明確過去時間副詞 last night，指示動作發生在過去。文法規則：明確過去時間副詞搭配簡單過去式。正解 notified 唯一符合。","optionNotes":["正解：notified 是簡單過去式，精準對應 last night 這個明確過去時間點。","notifies 是簡單現在式，與 last night 這個過去時間副詞矛盾。","notifying 是現在分詞，不能單獨作句子的主要動詞，句子會缺少限定動詞而不成立。","will notify 是未來式，與過去時間副詞 last night 方向相反，時態邏輯錯誤。"],"keyWords":[{"word":"notify","pos":"v.","meaning":"通知","freq":"高頻"},{"word":"system update","pos":"n.phr.","meaning":"系統更新","freq":"高頻"}],"pattern":null},{"id":"x-q87","category":"verb","categoryName":"動詞時態與語態","question":"The firm's total revenue ___ by 12 percent since the restructuring.","options":["grew","is growing","has grown","grows"],"answer":2,"difficulty":"中階","translation":"自從重組以來，公司的總營收已成長了百分之十二。","explanation":"解題線索：since the restructuring 表示動作從過去某個時間點（重組）持續至今，累積出目前的成長幅度。文法規則：since + 名詞片語（表過去時間點）搭配現在完成式，表示「從過去持續到現在」的累積結果。正解 has grown 唯一符合此固定搭配。","optionNotes":["grew 是簡單過去式，since 引導的句子不能用簡單過去式（since 固定搭配現在完成式），是常見的文法規則誤用陷阱。","is growing 是現在進行式，強調當下正在進行的動作，無法呈現 since 所需的「自過去累積至今」的完成語感。","正解：has grown 是現在完成式，精準對應 since + 名詞片語所表達「從過去持續累積到現在」的語意。","grows 是簡單現在式，只表示現在的習慣或事實，無法呈現「自過去某時點累積成長至今」的時間跨度，與 since 用法不符。"],"keyWords":[{"word":"revenue","pos":"n.","meaning":"營收","freq":"極高頻"},{"word":"restructuring","pos":"n.","meaning":"重組","freq":"中頻"}],"pattern":null},{"id":"x-q88","category":"verb","categoryName":"動詞時態與語態","question":"The building maintenance crew ___ the HVAC filter every three months.","options":["replaced","replacing","replaces","replace"],"answer":2,"difficulty":"基礎","translation":"大樓維護團隊每三個月更換一次空調濾網。","explanation":"解題線索：every three months 表示週期性、規律重複發生的例行工作；主詞 crew 為集合名詞，在此語境中視為單數整體。文法規則：週期性副詞片語搭配簡單現在式描述例行慣例，且視為單數的集合名詞主詞動詞需加 -s。正解 replaces 同時符合時態與主詞一致性。","optionNotes":["replaced 是過去式，與 every three months 所表達的「每隔固定週期重複」規律語意不符，規律性描述應用現在式。","replacing 是現在分詞，不能單獨作句子的主要動詞，缺少 be 動詞會使句子不完整。","正解：replaces 是第三人稱單數現在式，符合 every three months 所表達的週期性例行工作，且與視為單數的集合名詞 crew 一致。","replace 是動詞原形，crew 在此作單數集合名詞看待，動詞需加 -s，此選項犯了主詞動詞一致性錯誤。"],"keyWords":[{"word":"maintenance crew","pos":"n.phr.","meaning":"維護團隊","freq":"中頻"},{"word":"HVAC filter","pos":"n.phr.","meaning":"空調濾網","freq":"低頻"}],"pattern":null},{"id":"x-q89","category":"verbal","categoryName":"分詞與不定詞","question":"The purchasing department chose ___ the vendor contract for another fiscal year.","options":["renewing","renew","renewed","to renew"],"answer":3,"difficulty":"基礎","translation":"採購部門選擇將供應商合約再續約一個會計年度。","explanation":"解題線索：動詞 choose（選擇）表示「選擇做某事」，其後接動詞作受詞時有固定搭配。文法規則：choose 屬於後方固定接不定詞（to V）作受詞的動詞（同類尚有 decide、agree、plan）。正解 to renew 唯一符合此固定搭配。","optionNotes":["renewing 是動名詞，choose 通常不接動名詞作受詞，此為誤用動名詞受詞動詞的常見陷阱。","renew 是動詞原形，不能直接作為 choose 的受詞，choose 後方不接原形動詞。","renewed 是過去分詞，無法直接作為 choose 的受詞，詞性與句型皆不符。","正解：to renew 是不定詞，符合 choose + to V 的固定搭配，表示「選擇續約」。"],"keyWords":[{"word":"vendor contract","pos":"n.phr.","meaning":"供應商合約","freq":"中頻"},{"word":"fiscal year","pos":"n.phr.","meaning":"會計年度","freq":"高頻"}],"pattern":{"name":"choose/decide/agree/plan + to V","note":"choose、decide、agree、plan、hope、want 等動詞後方接不定詞（to V）作為受詞，是 TOEIC 高頻動詞型態考點。","example":"The board agreed to postpone the merger until the review was complete."}},{"id":"x-q90","category":"verb","categoryName":"動詞時態與語態","question":"The chief architect ___ the blueprint designs by the end of next week.","options":["will have completed","completes","completed","has completed"],"answer":0,"difficulty":"中階","translation":"總建築師將在下週末前完成藍圖設計。","explanation":"解題線索：by the end of next week（到下週末為止）是未來的一個截止時間點，句子描述在該時間點之前將完成的動作。文法規則：by + 未來時間點搭配未來完成式（will have + p.p.），表示「未來某時點前已完成」。正解 will have completed 唯一符合。","optionNotes":["正解：will have completed 是未來完成式，精準對應 by + 未來時間點所表達的「未來某時點前已完成」邏輯。","completes 是簡單現在式，無法表達「未來某截止時點前已完成」的時間邏輯，與 by the end of next week 不搭配。","completed 是過去式，與 by the end of next week 所指的未來時間方向相反，時態矛盾。","has completed 是現在完成式，僅表示到現在為止已完成，無法對應句中指向未來截止點（next week）的時間邏輯。"],"keyWords":[{"word":"blueprint","pos":"n.","meaning":"藍圖","freq":"中頻"},{"word":"architect","pos":"n.","meaning":"建築師","freq":"中頻"}],"pattern":{"name":"by + 未來時間點，主句用未來完成式","note":"by the end of + 未來時間（by the end of next week/month/year）搭配未來完成式，表示在該未來截止點之前動作已經完成。","example":"By the end of this quarter, the sales team will have closed at least ten new accounts."}},{"id":"x-q91","category":"verb","categoryName":"動詞時態與語態","question":"All lab instruments must ___ before any physical experiments begin.","options":["be sterilized","sterilize","sterilized","sterilizing"],"answer":0,"difficulty":"中階","translation":"所有實驗室儀器在任何物理實驗開始前都必須經過殺菌消毒。","explanation":"解題線索：主詞 all lab instruments（實驗室儀器）是被殺菌消毒的對象，而非主動執行殺菌動作的一方。文法規則：情態助動詞 must 後方接原形動詞，若語意為被動則用 must be + p.p.。正解 be sterilized 同時符合情態助動詞句型與被動語態。","optionNotes":["正解：be sterilized 是「must + be + p.p.」的被動結構，符合儀器被殺菌消毒的語意。","sterilize 是主動原形動詞，若填入會變成「儀器必須殺菌」，但儀器不會主動殺菌自己，語態邏輯錯誤。","sterilized 單獨使用缺少 be 動詞，不能直接接在 must 後方構成被動語態，結構不完整。","sterilizing 是現在分詞，不能接在情態助動詞 must 後方作為主要動詞，詞性不符。"],"keyWords":[{"word":"sterilize","pos":"v.","meaning":"殺菌、消毒","freq":"低頻"},{"word":"lab instrument","pos":"n.phr.","meaning":"實驗室儀器","freq":"中頻"}],"pattern":null},{"id":"x-q92","category":"verb","categoryName":"動詞時態與語態","question":"The operations manager avoids ___ manual entries into the database.","options":["made","make","making","to make"],"answer":2,"difficulty":"基礎","translation":"營運經理避免手動輸入資料到資料庫中。","explanation":"解題線索：動詞 avoid（避免）表示「避免做某事」，其後接動詞作受詞時有固定搭配。文法規則：avoid 屬於後方固定接動名詞（V-ing）作受詞的動詞（同類尚有 consider、suggest、finish、enjoy）。正解 making 唯一符合此固定搭配。","optionNotes":["made 是過去分詞，無法直接作為 avoid 的受詞，詞性與句型皆不符。","make 是動詞原形，不能直接作為 avoid 的受詞，avoid 後方不接原形動詞。","正解：making 是動名詞，符合 avoid + V-ing 的固定搭配，表示「避免做」。","to make 是不定詞，avoid 固定接動名詞作受詞而非不定詞，此為動詞後接詞型混淆的常見陷阱。"],"keyWords":[{"word":"avoid","pos":"v.","meaning":"避免","freq":"極高頻"},{"word":"manual entry","pos":"n.phr.","meaning":"手動輸入","freq":"中頻"}],"pattern":{"name":"avoid/consider/suggest/finish + V-ing","note":"avoid、consider、suggest、finish、enjoy、mind 等動詞後方固定接動名詞（V-ing）作受詞，不可接不定詞，是 TOEIC 高頻動詞型態考點。","example":"The technician suggested replacing the outdated sensor before it fails."}},{"id":"x-q93","category":"verbal","categoryName":"分詞與不定詞","question":"The HR representative is responsible for ___ new employee orientations.","options":["conducts","conducted","conduct","conducting"],"answer":3,"difficulty":"基礎","translation":"人資代表負責主持新進員工的教育訓練。","explanation":"解題線索：固定片語 be responsible for 中的 for 是介系詞。文法規則：介系詞後方須接名詞或動名詞，不能接原形動詞或限定動詞。正解 conducting 為動名詞，唯一符合介系詞 for 後方的詞性要求。","optionNotes":["conducts 是第三人稱單數現在式動詞，不能接在介系詞後方作受詞，詞性完全不符。","conducted 是過去分詞，若填入無法構成正確的介系詞受詞結構，詞性不符。","conduct 是動詞原形，不能直接接在介系詞 for 後方，違反介系詞後接名詞/動名詞的規則。","正解：conducting 是動名詞，符合 be responsible for + V-ing 的固定搭配，表示「負責主持」。"],"keyWords":[{"word":"be responsible for","pos":"phr.","meaning":"負責","freq":"極高頻"},{"word":"orientation","pos":"n.","meaning":"新人訓練、說明會","freq":"中頻"}],"pattern":{"name":"介系詞 + V-ing（be responsible for、be interested in 等）","note":"be responsible for、be interested in、be good at 等「be + 形容詞 + 介系詞」片語，後方接動名詞（V-ing）作受詞，因為介系詞後不可直接接原形動詞。","example":"The quality inspector is skilled at detecting minor defects."}},{"id":"x-q94","category":"verb","categoryName":"動詞時態與語態","question":"The inventory system ___ automatically when an item is scanned.","options":["adjusted","will adjust","adjusts","is adjusting"],"answer":2,"difficulty":"中階","translation":"當有品項被掃描時，庫存系統會自動調整。","explanation":"解題線索：when 子句使用現在式 is scanned，描述的是系統運作的一般性、普遍性事實與規則，而非單一事件。文法規則：描述一般事實、系統規則或習慣性因果關係時，主要子句與從屬子句皆用簡單現在式。正解 adjusts 唯一符合。","optionNotes":["adjusted 是過去式，與描述系統普遍規則的現在式語境不符，過去式僅適用於單一次過去事件。","will adjust 是未來式，但此句描述的是系統一貫的運作原理（每次掃描都會如此），而非單一未來事件，故不適用未來式。","正解：adjusts 是第三人稱單數現在式，符合描述系統運作的一般性事實，並與 when 子句的現在式 is scanned 相呼應。","is adjusting 是現在進行式，強調當下正在進行的單一動作，與描述一般性、重複性規則的語意不符。"],"keyWords":[{"word":"inventory system","pos":"n.phr.","meaning":"庫存系統","freq":"高頻"},{"word":"scan","pos":"v.","meaning":"掃描","freq":"高頻"}],"pattern":{"name":"when/if + 現在式，描述一般規則（雙現在式）","note":"描述系統運作原理、自然規律或普遍事實時，when、if 引導的子句與主要子句皆用簡單現在式，兩者並非條件句而是恆常因果關係。","example":"The alarm sounds automatically when the temperature exceeds the set limit."}},{"id":"x-q95","category":"verb","categoryName":"動詞時態與語態","question":"Yesterday's safety drill ___ by the fire marshall from the municipal office.","options":["observes","was observed","observed","is observed"],"answer":1,"difficulty":"中階","translation":"昨天的安全演習是由市政府的消防隊長所監督觀察的。","explanation":"解題線索：主詞 Yesterday's safety drill 本身即帶有明確過去時間標記，且演習是被觀察的對象（演習不會主動觀察自己），並有 by the fire marshall 表明動作執行者。文法規則：過去時間標記搭配簡單過去式，加上被動關係須用 was/were + p.p.。正解 was observed 同時滿足時態與語態兩條件。","optionNotes":["observes 是簡單現在式主動語態，既與 Yesterday's 這個過去時間矛盾，也未呈現演習被觀察的被動關係。","正解：was observed 是簡單過去式被動語態，同時符合 Yesterday's 所需的過去時態，以及演習被觀察的被動關係。","observed 單獨使用是簡單過去式主動語態，雖時態正確，但缺少 be 動詞無法表達被動語態，語態不符。","is observed 是現在式被動語態，語態正確但時態錯誤，與 Yesterday's 這個過去時間標記矛盾。"],"keyWords":[{"word":"safety drill","pos":"n.phr.","meaning":"安全演習","freq":"中頻"},{"word":"fire marshall","pos":"n.phr.","meaning":"消防隊長","freq":"低頻"}],"pattern":null},{"id":"x-q96","category":"verbal","categoryName":"分詞與不定詞","question":"The executive assistant managed ___ all flight bookings before the deadline.","options":["arranged","to arrange","arranging","arrange"],"answer":1,"difficulty":"中階","translation":"這位行政助理成功地在截止期限前安排好了所有的機票預訂。","explanation":"解題線索：動詞 manage 在「設法完成、成功做到」的意義下，後方接動詞作受詞時有固定搭配。文法規則：manage 屬於後方固定接不定詞（to V）作受詞的動詞，表示「成功完成某事」（同類尚有 fail、hope、strive）。正解 to arrange 唯一符合此固定搭配。","optionNotes":["arranged 是過去分詞，無法直接作為 manage 的受詞，詞性與句型皆不符。","正解：to arrange 是不定詞，符合 manage + to V 的固定搭配，表示「成功安排」。","arranging 是動名詞，manage（設法做到）通常不接動名詞作受詞，此為誤用動名詞受詞動詞的常見陷阱。","arrange 是動詞原形，不能直接作為 manage 的受詞，manage 後方不接原形動詞。"],"keyWords":[{"word":"manage to V","pos":"phr.v.","meaning":"設法做到、成功完成","freq":"高頻"},{"word":"flight booking","pos":"n.phr.","meaning":"機票預訂","freq":"中頻"}],"pattern":{"name":"manage/fail/hope + to V","note":"manage（設法做到）、fail（未能做到）、hope（希望做到）等動詞後方固定接不定詞（to V）作受詞，是 TOEIC 高頻動詞型態考點。","example":"Despite the tight schedule, the crew managed to finish the installation on time."}},{"id":"x-q97","category":"verb","categoryName":"動詞時態與語態","question":"The system logs indicate that the network failure ___ at 2:00 AM.","options":["occurring","occurred","occurs","will occur"],"answer":1,"difficulty":"中階","translation":"系統日誌顯示，網路故障發生在凌晨兩點。","explanation":"解題線索：句尾 at 2:00 AM 是日誌記錄中一個具體、已發生的過去時間點，描述的是已經記錄在案的單一事件。文法規則：明確具體的過去時間點（即使沒有 yesterday 等字眼，但語境為日誌記錄的既成事件）搭配簡單過去式。正解 occurred 唯一符合，主要子句 indicate 用現在式是報告類動詞的慣例用法，不影響 that 子句依實際發生時間選用過去式。","optionNotes":["occurring 是現在分詞，不能單獨作為 that 子句的主要動詞，缺少 be 動詞句子不完整。","正解：occurred 是簡單過去式，精準對應日誌中記錄的、已在凌晨兩點發生過的具體故障事件。","occurs 是簡單現在式，用於描述習慣性或一般性事實，與 at 2:00 AM 所指的具體單一過去事件不符。","will occur 是未來式，與日誌記錄「已發生」的既成過去事實矛盾，時態方向錯誤。"],"keyWords":[{"word":"network failure","pos":"n.phr.","meaning":"網路故障","freq":"中頻"},{"word":"occur","pos":"v.","meaning":"發生","freq":"高頻"}],"pattern":null},{"id":"x-q98","category":"verbal","categoryName":"分詞與不定詞","question":"The software company plans ___ its engineering workforce next year.","options":["expand","to expand","expanded","expanding"],"answer":1,"difficulty":"基礎","translation":"這家軟體公司計劃在明年擴大其工程人力。","explanation":"解題線索：動詞 plan（計劃）表示「計劃做某事」，其後接動詞作受詞時有固定搭配。文法規則：plan 屬於後方固定接不定詞（to V）作受詞的動詞，常用來表達未來的計劃目標（同類尚有 intend、aim、hope）。正解 to expand 唯一符合此固定搭配。","optionNotes":["expand 是動詞原形，不能直接作為 plan 的受詞，plan 後方不接原形動詞。","正解：to expand 是不定詞，符合 plan + to V 的固定搭配，表示「計劃擴大」。","expanded 是過去分詞，無法直接作為 plan 的受詞，詞性與句型皆不符。","expanding 是動名詞，plan 通常不接動名詞作受詞，此為誤用動名詞受詞動詞的常見陷阱。"],"keyWords":[{"word":"plan to V","pos":"phr.v.","meaning":"計劃做...","freq":"極高頻"},{"word":"workforce","pos":"n.","meaning":"勞動力、人力","freq":"高頻"}],"pattern":{"name":"plan/intend/aim + to V","note":"plan、intend、aim、hope 等表達未來計劃、目標的動詞後方接不定詞（to V）作受詞，是 TOEIC 高頻動詞型態考點。","example":"The startup intends to launch its product in three overseas markets."}},{"id":"x-q99","category":"verb","categoryName":"動詞時態與語態","question":"The specialized training session ___ by the chief analyst next Monday.","options":["led","has been led","leads","will be led"],"answer":3,"difficulty":"中階","translation":"這場專門的訓練課程將於下星期一由首席分析師主持。","explanation":"解題線索：句尾未來時間副詞 next Monday，且主詞 the training session 是被主持、被帶領的對象（課程不會自己帶領自己），並有 by the chief analyst 表明動作執行者。文法規則：未來時間副詞搭配未來式，加上被動關係須用 will be + p.p.。正解 will be led 同時滿足時態與語態兩條件。","optionNotes":["led 是過去式，與 next Monday 所指的未來時間方向相反，時態矛盾。","has been led 是現在完成式被動語態，雖語態正確，但時態上表示已完成，與尚未發生的未來課程矛盾。","leads 是簡單現在式主動語態，既與 next Monday 這個未來時間矛盾，也未呈現課程被主持的被動關係。","正解：will be led 是未來被動式，同時符合 next Monday 所需的未來時態，以及課程被主持的被動關係。"],"keyWords":[{"word":"chief analyst","pos":"n.phr.","meaning":"首席分析師","freq":"中頻"},{"word":"training session","pos":"n.phr.","meaning":"訓練課程","freq":"高頻"}],"pattern":null},{"id":"x-q100","category":"verbal","categoryName":"分詞與不定詞","question":"The developer spent three days ___ the encryption algorithm backend.","options":["optimize","optimized","optimizing","to optimize"],"answer":2,"difficulty":"基礎","translation":"這位開發人員花了三天時間優化加密演算法的後端。","explanation":"解題線索：句型 spend + 一段時間 + 動詞，是描述「花費多少時間做某事」的固定句型。文法規則：spend/waste + 時間/金錢 + V-ing，後方動詞須用動名詞形式。正解 optimizing 唯一符合此固定句型。","optionNotes":["optimize 是動詞原形，不能直接接在 spend + 時間 後方，違反 spend + 時間 + V-ing 的固定句型。","optimized 是過去分詞，無法直接接在 spend + 時間 後方，詞性與句型皆不符。","正解：optimizing 是動名詞，符合 spend + 時間 + V-ing 的固定句型，表示「花時間做某事」。","to optimize 是不定詞，spend 時間句型固定用動名詞而非不定詞，此為句型混淆的常見陷阱。"],"keyWords":[{"word":"spend + 時間 + V-ing","pos":"phr.","meaning":"花時間做某事","freq":"極高頻"},{"word":"encryption algorithm","pos":"n.phr.","meaning":"加密演算法","freq":"中頻"}],"pattern":{"name":"spend/waste + 時間/金錢 + V-ing","note":"spend、waste 後方接時間或金錢名詞，再接動名詞（V-ing）表示「花費...在做某事上」，是 TOEIC 常考固定句型。","example":"The team spent two weeks testing the new payment gateway."}},{"id":"x-q101","category":"verb","categoryName":"動詞時態與語態","question":"The regional manager requested Mr. Wu ___ the production metrics.","options":["reviewing","review","reviewed","reviews"],"answer":1,"difficulty":"進階","translation":"區域經理要求吳先生檢視生產指標數據。","explanation":"解題線索：request 為表示「要求」的動詞，其後接「(that) + 受詞 + 動詞」的結構時，that 常可省略，形成 request + 人 + 原形動詞的虛擬語氣句型。文法規則：request（that）+ S + 原形動詞，不受主詞人稱與時態影響。正解 review 為唯一原形動詞選項。","optionNotes":["reviewing 是現在分詞，不能作為此句省略 that 後的限定動詞，句子會缺少正式動詞而不成立。","正解：review 是動詞原形，符合 request (that) + Mr. Wu + 原形動詞的虛擬語氣句型，即使省略 that，動詞仍維持原形。","reviewed 是過去式，虛擬語氣中的動詞不隨時態變化，一律使用原形，此選項不符合句型規則。","reviews 是第三人稱單數現在式，若填入會誤用一般現在式規則，但此處為省略 that 的虛擬語氣句型，動詞應為原形，故錯誤。"],"keyWords":[{"word":"regional manager","pos":"n.phr.","meaning":"區域經理","freq":"高頻"},{"word":"production metrics","pos":"n.phr.","meaning":"生產指標","freq":"中頻"}],"pattern":{"name":"request (that) + S + 原形動詞（省略 that 的虛擬語氣）","note":"request、suggest、insist 等動詞接受詞子句時，連接詞 that 可省略，但子句動詞仍須維持原形，構成虛擬語氣，是進階常考的省略句型。","example":"The director requested the team submit the proposal by Monday."}},{"id":"x-q102","category":"verb","categoryName":"動詞時態與語態","question":"The automated mail system ___ a confirmation once payment is received.","options":["sent","will send","sends","has sent"],"answer":2,"difficulty":"中階","translation":"一旦收到付款，自動郵件系統就會發送確認信。","explanation":"解題線索：once 子句使用現在式 is received，描述的是系統運作的一般性、自動化規則，而非單一特定事件。文法規則：描述自動化流程或一般性因果規則時，主要子句與從屬子句皆用簡單現在式。正解 sends 唯一符合。","optionNotes":["sent 是過去式，與描述系統普遍自動化規則的現在式語境不符，過去式僅適用於單一次過去事件。","will send 是未來式，但此句描述的是系統一貫的自動化流程（每次收到付款都會如此），而非單一未來事件，故不適用未來式。","正解：sends 是第三人稱單數現在式，符合描述自動化系統運作的一般性規則，並與 once 子句的現在式 is received 相呼應。","has sent 是現在完成式，強調動作已完成，與描述一般性、重複性自動化規則的語意不符。"],"keyWords":[{"word":"confirmation","pos":"n.","meaning":"確認（信）","freq":"高頻"},{"word":"payment","pos":"n.","meaning":"付款","freq":"極高頻"}],"pattern":null},{"id":"x-q103","category":"verb","categoryName":"動詞時態與語態","question":"The maintenance workers ___ repairing the generator by the time the storm hit.","options":["will finish","had finished","finished","finish"],"answer":1,"difficulty":"進階","translation":"等到暴風雨來襲時，維修工人已經修好了發電機。","explanation":"（本題已將原句 before the storm hit 改寫為 by the time the storm hit，以消除「過去式與過去完成式皆可」的歧義，考點不變）解題線索：by the time 後方接過去式子句 the storm hit，表示過去某個時間點；主要子句描述維修工人在那個過去時間點「之前」就已完成修理工作。文法規則：by the time + 過去式子句，主要子句須用過去完成式（had + p.p.）表達「過去某時點前已完成」。正解 had finished 唯一符合。","optionNotes":["will finish 是未來式，與全句過去時空的敘事（the storm hit 為過去式）矛盾，時態方向錯誤。","正解：had finished 是過去完成式，精準對應 by the time + 過去式子句所要求的「過去某時點之前已完成」的邏輯。","finished 是簡單過去式，只能表達與 hit 同時或先後不明的過去動作，無法呈現「在暴風雨來襲之前就已完成」的先後順序，層次不足。","finish 是簡單現在式，與全句過去時空的敘事（hit 為過去式）矛盾，時態方向錯誤。"],"keyWords":[{"word":"generator","pos":"n.","meaning":"發電機","freq":"中頻"},{"word":"storm","pos":"n.","meaning":"暴風雨","freq":"中頻"}],"pattern":{"name":"by the time + 過去式，主句用過去完成式","note":"by the time 後接過去式子句時，主要子句須用過去完成式，表示在該過去時間點之前已完成的動作，與未來完成式的觸發句型相互對稱。","example":"By the time the technician arrived, the backup system had already taken over."}},{"id":"x-q104","category":"verbal","categoryName":"分詞與不定詞","question":"The research department considers ___ a new series of material trials.","options":["run","running","ran","to run"],"answer":1,"difficulty":"基礎","translation":"研發部門正考慮進行一系列新的材料試驗。","explanation":"解題線索：動詞 consider（考慮）表示「考慮做某事」，其後接動詞作受詞時有固定搭配。文法規則：consider 屬於後方固定接動名詞（V-ing）作受詞的動詞（同類尚有 avoid、suggest、finish）。正解 running 唯一符合此固定搭配。","optionNotes":["run 是動詞原形，不能直接作為 consider 的受詞，consider 後方不接原形動詞。","正解：running 是動名詞，符合 consider + V-ing 的固定搭配，表示「考慮進行」。","ran 是過去式，無法直接作為 consider 的受詞，詞性與句型皆不符。","to run 是不定詞，consider 固定接動名詞作受詞而非不定詞，此為動詞後接詞型混淆的常見陷阱。"],"keyWords":[{"word":"consider","pos":"v.","meaning":"考慮","freq":"極高頻"},{"word":"material trial","pos":"n.phr.","meaning":"材料試驗","freq":"低頻"}],"pattern":{"name":"consider + V-ing","note":"consider、avoid、suggest、finish、enjoy 等動詞後方固定接動名詞（V-ing）作受詞，不可接不定詞，是 TOEIC 高頻動詞型態考點。","example":"The engineer considered redesigning the cooling system entirely."}},{"id":"x-q105","category":"verbal","categoryName":"分詞與不定詞","question":"The company guidelines strictly prohibit staff from ___ server logs.","options":["altering","altered","to alter","alter"],"answer":0,"difficulty":"中階","translation":"公司規範嚴格禁止員工竄改伺服器日誌。","explanation":"解題線索：固定片語 prohibit A from + V-ing 中的 from 是介系詞。文法規則：介系詞後方須接名詞或動名詞，不能接原形動詞或過去式動詞。正解 altering 為動名詞，唯一符合介系詞 from 後方的詞性要求。","optionNotes":["正解：altering 是動名詞，符合 prohibit A from + V-ing 的固定搭配，表示「禁止...做某事」。","altered 是過去分詞/過去式，不能直接接在介系詞 from 後方作受詞，詞性不符。","to alter 是不定詞，prohibit...from 的 from 是介系詞而非不定詞的 to，此為詞性混淆陷阱。","alter 是動詞原形，不能直接接在介系詞 from 後方，違反介系詞後接名詞/動名詞的規則。"],"keyWords":[{"word":"prohibit A from V-ing","pos":"phr.v.","meaning":"禁止A做某事","freq":"高頻"},{"word":"server log","pos":"n.phr.","meaning":"伺服器日誌","freq":"中頻"}],"pattern":{"name":"prohibit/prevent/keep A from + V-ing","note":"prohibit、prevent、keep、stop 等動詞搭配「A from + V-ing」的結構，from 是介系詞，後方必須接動名詞，不可接原形動詞或不定詞。","example":"The new policy prevents employees from sharing passwords across accounts."}},{"id":"x-q106","category":"prep","categoryName":"介係詞","question":"___ the extreme weather conditions, the logistics team delivered the cargo on time.","options":["Because","Unless","Despite","Although"],"answer":2,"difficulty":"中階","translation":"儘管天氣狀況極端惡劣，物流團隊仍準時送達了這批貨物。","explanation":"解題線索：空格後方是「the extreme weather conditions」這個名詞片語，而非「主詞+動詞」的完整子句，且語意是「儘管有此不利因素，結果仍達成」的讓步轉折。適用文法規則：Despite 是介系詞，後面直接接名詞片語，表示「儘管」；Although 是從屬連接詞，必須接完整子句。為何是正解：Despite the extreme weather conditions 文法正確（介系詞+名詞），且語意精準表達「儘管天氣惡劣，仍準時送達」的讓步邏輯。","optionNotes":["Because 表示因果關係「因為」，若套入會變成「因為天氣惡劣，所以準時送達」，因果邏輯不合常理，與句意的讓步轉折相反。","Unless 表示「除非」的條件關係，與句意「儘管天氣惡劣仍準時送達」的讓步邏輯完全不符。","正解：Despite 為介系詞，可直接接名詞片語 the extreme weather conditions，語意「儘管」完全符合前後轉折關係。","Although 是從屬連接詞，必須接「主詞+動詞」的完整子句（如 although the weather was extreme），但空格後只有名詞片語，詞性不合，是最容易與 despite 混淆的陷阱。"],"keyWords":[{"word":"logistics","pos":"n.","meaning":"物流","freq":"高頻"},{"word":"cargo","pos":"n.","meaning":"貨物","freq":"中頻"},{"word":"extreme","pos":"adj.","meaning":"極端的","freq":"高頻"}],"pattern":{"name":"despite / in spite of + N vs. although + S + V","note":"despite 和 in spite of 為介系詞片語，後面只能接名詞或動名詞；although、though、even though 為連接詞，須接完整子句，兩者中文皆譯「儘管」但詞性不同，是 Part 5 最常考的陷阱之一。","example":"Despite the tight deadline, the design team delivered flawless mockups."}},{"id":"x-q107","category":"conj","categoryName":"連接詞辨析","question":"The client will sign the contract ___ the engineering team provides the prototype.","options":["despite","once","during","until"],"answer":1,"difficulty":"中階","translation":"一旦工程團隊提供原型，客戶就會簽署合約。","explanation":"解題線索：空格後方是「the engineering team provides the prototype」這個完整子句（現在式表示未來已知條件），且語意是「一旦滿足此條件，即會發生前述動作」。適用文法規則：once + 子句，表示「一旦…就」，常用於描述條件達成後接續發生的動作，是商務合約情境中常見的時間/條件連接詞；until 表「持續到…為止」，若套入會變成「簽約會持續到提供原型為止」，語意不通，因為簽約是一次性動作而非持續狀態。為何是正解：once the team provides the prototype 精準表達「原型一到位，合約就簽署」的商業邏輯。","optionNotes":["despite 是介系詞，後面只能接名詞片語，不能直接接完整子句 the engineering team provides，詞性不合。","正解：once 表示「一旦…就」，符合「原型提供後即簽約」的條件式時間邏輯，是商務情境的典型用法。","during 是純介系詞，須接名詞（如 during the development phase），不能接完整子句，詞性不合。","until 表示「持續到…為止」，通常搭配延續性的動詞或否定句（如 will not sign until），但此句是肯定的一次性動作 will sign，套入 until 語意不通順。"],"keyWords":[{"word":"prototype","pos":"n.","meaning":"原型","freq":"中頻"},{"word":"contract","pos":"n.","meaning":"合約","freq":"極高頻"},{"word":"engineering team","pos":"n.","meaning":"工程團隊","freq":"中頻"}],"pattern":{"name":"once + S + V（一旦…就）","note":"once 引導的子句表示「條件一達成」，主句便隨之發生，常見於商務合約、流程說明中描述觸發條件的句型。","example":"Once the vendor confirms the shipment date, we will finalize the payment schedule."}},{"id":"x-q108","category":"conj","categoryName":"連接詞辨析","question":"Mr. Lin cannot attend the briefing ___ he returns from his business trip in time.","options":["although","unless","because of","provided"],"answer":1,"difficulty":"中階","translation":"除非林先生能及時從出差返回，否則他無法出席簡報會議。","explanation":"解題線索：空格後方是「he returns from his business trip in time」這個完整子句，且主句是否定句「cannot attend」，語意是「除非滿足此條件，否則無法做到前述動作」。適用文法規則：unless + 子句，表示「除非」，等同 if...not...，引導否定條件；provided 雖也可作連接詞表「假如、只要」，但通常用於正向假設語氣較強的條件句（provided that + 條件，主句傾向正面結果），與此處「無法出席」的否定語意搭配較不自然。為何是正解：unless he returns in time 精準表達「除非及時返回，否則不能出席」的邏輯。","optionNotes":["although 表示「雖然」的讓步語意，若套入會變成「雖然他及時趕回，但無法出席」，與常理矛盾（趕回來應該就能出席），語意不合。","正解：unless 表示「除非」，等同於 if...not...，符合「除非及時趕回，否則無法出席」的否定條件邏輯。","because of 是介系詞片語，只能接名詞（如 because of his trip），不能直接接完整子句 he returns，詞性不合。","provided（=provided that）雖可表「假如、只要」，但慣用語氣傾向於「只要滿足條件，就會有正面結果」，與本句「無法出席」的否定結果直接搭配較不通順，不如 unless 精準。"],"keyWords":[{"word":"briefing","pos":"n.","meaning":"簡報、說明會","freq":"高頻"},{"word":"business trip","pos":"n.","meaning":"出差","freq":"高頻"},{"word":"in time","pos":"phr.","meaning":"及時","freq":"高頻"}],"pattern":{"name":"unless + S + V（除非，等同 if...not）","note":"unless 引導的子句表示「除非」，常與否定式主句（cannot、will not）搭配，說明唯一能避免否定結果的條件。","example":"The shipment cannot be released unless the customs paperwork is fully processed."}},{"id":"x-q109","category":"prep","categoryName":"介係詞","question":"The software upgrade was suspended ___ unexpected compatibility issues with old servers.","options":["because","although","whereas","due to"],"answer":3,"difficulty":"中階","translation":"由於舊伺服器出現了未預期的相容性問題，軟體升級因此暫停。","explanation":"解題線索：空格後方是「unexpected compatibility issues with old servers」這個名詞片語，且語意是說明「升級暫停」的原因。適用文法規則：due to + 名詞片語，表示原因，意同 because of；because 是連接詞，須接「主詞+動詞」的完整子句才能使用，不能直接接名詞片語。為何是正解：due to unexpected compatibility issues 文法正確（介系詞+名詞），且語意精準表達升級暫停的原因。","optionNotes":["because 是連接詞，須接完整子句（如 because there were unexpected issues），不能直接接名詞片語 unexpected compatibility issues，詞性不合，是常見陷阱。","although 是連接詞，須接完整子句，且語意為「雖然」的讓步關係，與此處單純的因果邏輯不符。","whereas 表示「然而、對比」，用於比較兩個相反的情況，與「因相容性問題而暫停」的因果語意不符。","正解：due to 為介系詞片語，意同 because of，後接名詞片語，因果語意與詞性皆正確。"],"keyWords":[{"word":"compatibility","pos":"n.","meaning":"相容性","freq":"中頻"},{"word":"suspend","pos":"v.","meaning":"暫停","freq":"高頻"},{"word":"upgrade","pos":"n.","meaning":"升級","freq":"高頻"}],"pattern":{"name":"due to + N vs. because + S + V","note":"due to 為介系詞片語接名詞，功能等同 because of；because 為連接詞接完整子句，兩者中文皆譯「因為」但詞性不同，是 Part 5 經典陷阱。","example":"The flight was delayed due to severe weather conditions, because the runway was unsafe for landing."}},{"id":"x-q110","category":"conj","categoryName":"連接詞辨析","question":"The factory must run tests ___ the manufacturing lines can be fully certified.","options":["since","before","while","during"],"answer":1,"difficulty":"中階","translation":"工廠必須先進行測試，生產線才能獲得完整認證。","explanation":"解題線索：空格後方是「the manufacturing lines can be fully certified」這個完整子句，且語意是「先做某動作，才能達成後面的結果」。適用文法規則：before + 子句，表示「在…之前」，引導時間子句說明必須先完成前一動作，後一事件才會發生；during 是介系詞須接名詞不能接子句。為何是正解：before the lines can be certified 精準表達「必須先測試，生產線才能獲得認證」的時間先後與因果邏輯。","optionNotes":["since 表示「自從…以來」，須搭配完成式時態，且語意與「先測試才能認證」的先後順序邏輯不符。","正解：before 表示「在…之前」，符合「先測試，才能認證」的時間先後順序，文法上可直接接完整子句。","while 表示「當…同時」，若套入會變成「測試的同時生產線就能被認證」，與句意「先測試才能認證」的先後順序不同。","during 是純介系詞，只能接名詞片語（如 during the certification process），不能接完整子句 the manufacturing lines can be certified，詞性不合。"],"keyWords":[{"word":"certify","pos":"v.","meaning":"認證、發證明","freq":"中頻"},{"word":"manufacturing line","pos":"n.","meaning":"生產線","freq":"高頻"},{"word":"run tests","pos":"phr.","meaning":"進行測試","freq":"高頻"}],"pattern":{"name":"before + S + V（先決條件的時間順序）","note":"before 引導的子句說明「必須先發生的事件」，主句則是「之後才能達成的結果」，常用於描述先決條件與後續結果的關係。","example":"Employees must complete the safety course before they can operate heavy machinery."}},{"id":"x-q111","category":"prep","categoryName":"介係詞","question":"The technical seminar will take place ___ Room 402 of the conference center.","options":["on","in","at","to"],"answer":1,"difficulty":"基礎","translation":"這場技術研討會將在會議中心的402室舉行。","explanation":"解題線索：空格後方是「Room 402」這種有邊界、內部空間的具體房間名稱。適用文法規則：表示某個房間、建築物內部等具封閉空間感的地點時，固定用 in；at 用於較小的定點（如某地址、某櫃檯），on 用於接觸面（如街道、樓層某側）。為何是正解：Room 402 是一個有牆壁範圍的房間，屬於「內部空間」，故用 in。","optionNotes":["on 用於接觸面或街道、樓層（如 on the third floor），不用於房間內部，語意不合。","正解：in 表示在某個封閉空間、房間之內，Room 402 屬於此類地點。","at 通常用於較小的定點或地址（如 at the front desk），此處房間強調內部空間感，用 in 更精準。","to 表示方向、移動的終點，與「在…舉行」的靜態地點語意不符。"],"keyWords":[{"word":"seminar","pos":"n.","meaning":"研討會","freq":"高頻"},{"word":"take place","pos":"phr.","meaning":"舉行、發生","freq":"極高頻"},{"word":"conference center","pos":"n.","meaning":"會議中心","freq":"中頻"}],"pattern":{"name":"in + 封閉空間 vs. at + 定點 vs. on + 接觸面/樓層","note":"in 用於房間、建築物內部等有邊界的空間；at 用於視為一個點的地址或定點；on 用於接觸面或某層樓、某條街。","example":"The workshop will be held in Conference Room B, not at the reception desk."}},{"id":"x-q112","category":"prep","categoryName":"介係詞","question":"The executive board debated the proposal ___ the entire duration of the afternoon session.","options":["among","between","along","throughout"],"answer":3,"difficulty":"中階","translation":"執行董事會在整個下午場次期間都在討論這項提案。","explanation":"解題線索：空格後接「the entire duration of the afternoon session」，強調「從頭到尾整段期間」。適用文法規則：throughout + 一段時間，表示「自始至終、貫穿整個期間」；between 用於兩者之間、among 用於三者以上之間，皆非時間長度用法；along 表沿著（方向/路線）。為何是正解：throughout 精準呼應 entire duration（整段期間）的語意。","optionNotes":["among 用於三者以上之間的比較或分配，與時間長度無關。","between 須接兩個對象（between A and B），此處是單一時間段，用法不合。","along 表示沿著某條路線或方向移動，與「持續整段時間」的語意不符。","正解：throughout 表示「貫穿整個期間、從頭到尾」，與 the entire duration 呼應。"],"keyWords":[{"word":"debate","pos":"v.","meaning":"辯論、討論","freq":"高頻"},{"word":"duration","pos":"n.","meaning":"期間、持續時間","freq":"中頻"},{"word":"session","pos":"n.","meaning":"場次、會議時段","freq":"高頻"}],"pattern":{"name":"throughout + 一段時間","note":"throughout 強調在整個期間內從頭到尾持續不間斷，常與 entire、whole 等字連用。","example":"The factory maintained full output throughout the entire holiday period."}},{"id":"x-q113","category":"prep","categoryName":"介係詞","question":"The project must be completed ___ the strict budget limits set by the finance team.","options":["against","except","without","within"],"answer":3,"difficulty":"中階","translation":"這個專案必須在財務團隊訂定的嚴格預算限制之內完成。","explanation":"解題線索：空格後接「the strict budget limits」，語意是「不超出此範圍」。適用文法規則：within + 範圍/限制，表示「在…之內、不超過」；without 表示「沒有」；against 表示「對抗、違反」；except 表示「除了」。為何是正解：within the budget limits 表達專案花費不能超出預算範圍，語意唯一合理。","optionNotes":["against 表示「對抗、違反」，套入會變成「違反預算限制完成」，語意不合邏輯。","except 表示「除了…之外」，與「在限制範圍內完成」的語意不符。","without 表示「沒有、缺少」，若套入會變成「沒有預算限制地完成」，與句意（有嚴格限制）相反。","正解：within 表示「在…範圍/限制之內」，符合「在預算限制內完成」的語意。"],"keyWords":[{"word":"budget","pos":"n.","meaning":"預算","freq":"極高頻"},{"word":"limit","pos":"n.","meaning":"限制、界限","freq":"高頻"},{"word":"strict","pos":"adj.","meaning":"嚴格的","freq":"高頻"}],"pattern":{"name":"within + 範圍/期限","note":"within 常用於表達「不超過某個時間長度或數量範圍」，如 within budget、within a week。","example":"The renovation was finished within the allocated budget."}},{"id":"x-q114","category":"conj","categoryName":"連接詞辨析","question":"___ Ms. Gao nor Mr. Vance was able to audit the laboratory inventory yesterday.","options":["Neither","Both","Either","Whether"],"answer":0,"difficulty":"基礎","translation":"高女士和范斯先生都無法在昨天稽核實驗室的庫存。","explanation":"解題線索：空格後方出現「nor」，這是固定的關聯詞搭配訊號。適用文法規則：neither...nor... 表示「兩者都不」，是固定的對稱連接詞組合；either 搭配 or，both 搭配 and，whether 搭配 or。為何是正解：句中已出現 nor，只能與 neither 搭配成 neither...nor... 的結構。","optionNotes":["正解：neither 與 nor 為固定搭配 neither...nor...，表示「兩者皆不」，符合「兩人都無法稽核」的語意。","both 必須搭配 and 使用（both...and...），且 both 之後動詞通常用複數，與 nor 完全不對應。","either 必須搭配 or 使用（either...or...），與句中的 nor 不對應，是典型的關聯詞混淆陷阱。","whether 通常搭配 or（whether...or...）用於表達選擇或不確定性，不與 nor 搭配。"],"keyWords":[{"word":"audit","pos":"v.","meaning":"稽核、審計","freq":"高頻"},{"word":"inventory","pos":"n.","meaning":"庫存","freq":"高頻"},{"word":"laboratory","pos":"n.","meaning":"實驗室","freq":"中頻"}],"pattern":{"name":"neither A nor B","note":"neither...nor... 表示「A和B都不」，動詞通常依最接近的主詞（此處 Mr. Vance）決定單複數。","example":"Neither the manager nor the assistants were informed of the schedule change."}},{"id":"x-q115","category":"prep","categoryName":"介係詞","question":"The shipping rates vary ___ the weight and destination of the parcel.","options":["according to","as for","ahead of","in spite of"],"answer":0,"difficulty":"中階","translation":"運費會依包裹的重量與目的地而有所不同。","explanation":"解題線索：句意是「運費依據…而變動」，需要表示「依據、根據」的介系詞片語。適用文法規則：according to + 依據的標準/因素，常與 vary、depend 等字搭配；in spite of 表讓步；as for 表示「至於」；ahead of 表示「在…之前」。為何是正解：according to the weight and destination 精準表達運費隨重量與目的地變化的依據。","optionNotes":["正解：according to 表示「根據、依據」，與 vary（因…而不同）的語意完全呼應。","as for 表示「至於、談到」，通常用於轉換話題，不用於表達變動的依據。","ahead of 表示「在…之前、領先於」，與運費依重量目的地變動的語意無關。","in spite of 表示「儘管」的讓步語意，與「依據某因素而變動」的邏輯不符。"],"keyWords":[{"word":"vary","pos":"v.","meaning":"變化、不同","freq":"高頻"},{"word":"destination","pos":"n.","meaning":"目的地","freq":"高頻"},{"word":"parcel","pos":"n.","meaning":"包裹","freq":"中頻"}],"pattern":{"name":"vary according to N","note":"according to 常與 vary、differ、depend 等動詞搭配，表示「依據某個標準而有所不同」。","example":"Employee bonuses vary according to individual performance and tenure."}},{"id":"x-q116","category":"conj","categoryName":"連接詞辨析","question":"The laboratory will remain closed ___ the renovation work is completed.","options":["unless","during","while","until"],"answer":3,"difficulty":"基礎","translation":"實驗室將持續關閉，直到裝修工程完成為止。","explanation":"解題線索：空格後方是「the renovation work is completed」，一個完整子句（主詞+被動動詞），且語意是「持續某狀態直到某事發生」。適用文法規則：until + 子句，表示「直到…為止」，強調狀態持續到某個時間點終止；during 是介系詞，後面只能接名詞不能接子句。為何是正解：until 精準表達「關閉狀態會持續，直到裝修完成才結束」。","optionNotes":["unless 表示「除非」，套入會變成「除非裝修完成否則關閉」，邏輯上意思相近但語感上不如 until 直接強調終止時間點，且原句強調的是持續到某時間點而非條件。","during 是介系詞，後面只能接名詞片語（如 during the renovation），不能直接接子句 the renovation work is completed，詞性不合。","while 表示「當…同時」，若套入會變成「裝修完成的同時關閉」，與原意「持續到完成為止」不同。","正解：until 表示「直到…為止」，符合「持續關閉直到裝修完成」的語意與文法（可接完整子句）。"],"keyWords":[{"word":"renovation","pos":"n.","meaning":"裝修、翻新","freq":"高頻"},{"word":"remain","pos":"v.","meaning":"保持、仍然","freq":"高頻"},{"word":"complete","pos":"v./adj.","meaning":"完成的","freq":"極高頻"}],"pattern":{"name":"until + S + V","note":"until 引導時間子句，表示某狀態或動作持續到子句描述的事件發生為止；作介系詞時可直接接時間點/名詞。","example":"The office will operate on reduced hours until the new system is fully installed."}},{"id":"x-q117","category":"conj","categoryName":"連接詞辨析","question":"Employees must wash hands before entering the cleanroom ___ prevent contamination.","options":["because of","so that","with a view to","in order to"],"answer":3,"difficulty":"中階","translation":"員工在進入無塵室之前必須洗手，以避免污染。","explanation":"解題線索：空格後方直接接動詞原形「prevent」，且語意是表達動作的目的。適用文法規則：in order to + 原形動詞，表目的「為了」；so that 後面須接「主詞+動詞」的完整子句；because of 是介系詞片語只能接名詞；with a view to 後面須接動名詞（V-ing）。為何是正解：in order to prevent 文法正確且語意通順，表達洗手的目的是防止污染。","optionNotes":["because of 是介系詞片語，只能接名詞或動名詞（如 because of contamination），不能接原形動詞，且語意也偏向原因而非目的。","so that 之後必須接完整子句（主詞+動詞，如 so that they can prevent），不能直接接原形動詞 prevent，詞性不合。","with a view to 之後須接動名詞（with a view to preventing），而非原形動詞 prevent，是常見的詞性陷阱。","正解：in order to + 原形動詞 prevent，表示「為了防止」，文法與語意皆正確。"],"keyWords":[{"word":"cleanroom","pos":"n.","meaning":"無塵室","freq":"中頻"},{"word":"contamination","pos":"n.","meaning":"污染","freq":"中頻"},{"word":"prevent","pos":"v.","meaning":"防止、預防","freq":"高頻"}],"pattern":{"name":"in order to + V原形","note":"in order to 後面固定接原形動詞表目的，是 so as to 的同義用法；so that 則須接完整子句。","example":"The technician recalibrated the sensor in order to reduce measurement errors."}},{"id":"x-q118","category":"conj","categoryName":"連接詞辨析","question":"The system update went smoothly ___ there were a few minor glitches at the start.","options":["because of","even though","despite","in case"],"answer":1,"difficulty":"中階","translation":"儘管一開始有一些小故障，系統更新的過程還算順利。","explanation":"解題線索：空格後方是「there were a few minor glitches」，一個完整子句，且與前句「進行順利」形成語意上的轉折反差。適用文法規則：even though + 完整子句，表示「雖然、儘管」的讓步關係；despite 是介系詞，後面只能接名詞不能接子句。為何是正解：even though 文法上可接子句，語意上也精準表達「儘管有小故障，整體仍順利」的讓步邏輯。","optionNotes":["because of 是介系詞片語，且語意為因果關係，若套入會變成「因為有小故障所以順利」，邏輯矛盾。","正解：even though 為從屬連接詞，可接完整子句 there were...glitches，語意表達讓步轉折，符合句意。","despite 是介系詞，後面只能接名詞或動名詞片語（如 despite a few glitches），不能直接接子句 there were，詞性不合，是常見陷阱。","in case 表示「以防萬一」，通常用於敘述預防措施的情境，與此處「儘管發生了小故障仍順利」的讓步語意不符。"],"keyWords":[{"word":"glitch","pos":"n.","meaning":"小故障、小問題","freq":"中頻"},{"word":"smoothly","pos":"adv.","meaning":"順利地","freq":"高頻"},{"word":"minor","pos":"adj.","meaning":"輕微的","freq":"高頻"}],"pattern":{"name":"even though + S + V vs. despite + N","note":"even though／although／though 皆為連接詞接子句；despite／in spite of 為介系詞片語接名詞，兩者中文意思相近但詞性不同。","example":"Even though the server experienced a brief outage, no customer data was lost."}},{"id":"x-q119","category":"prep","categoryName":"介係詞","question":"The manager scheduled the review meeting ___ 2:00 PM on Friday.","options":["at","in","for","on"],"answer":0,"difficulty":"基礎","translation":"經理將檢討會議排定在星期五下午兩點。","explanation":"解題線索：空格後方是「2:00 PM」這種精確的時間點。適用文法規則：at + 精確時刻（幾點幾分），是固定用法；on 用於星期幾或日期；in 用於較長的時間範圍（月份、年份）。為何是正解：2:00 PM 是明確的鐘點時刻，固定搭配 at。","optionNotes":["正解：at 用於表達精確的鐘點時刻，如 at 2:00 PM、at noon，是時間介系詞的基本規則。","in 用於較長的時間單位，如月份、季節、年份（in July、in 2026），不用於精確鐘點。","for 通常表示「持續的時間長度」或「目的」，不用於標示某個時間點。","on 用於星期幾或特定日期（如 on Friday），此處空格後緊接的是時刻 2:00 PM 而非日期，用法不合。"],"keyWords":[{"word":"schedule","pos":"v.","meaning":"安排、排定","freq":"極高頻"},{"word":"review meeting","pos":"n.","meaning":"檢討會議","freq":"高頻"}],"pattern":{"name":"at + 精確時刻 vs. on + 日期 vs. in + 長時段","note":"時間介系詞三層規則：at 用於鐘點與節日當下（at noon, at Christmas）、on 用於日期與星期（on Monday）、in 用於月份年份季節（in June, in 2026）。","example":"The conference call is set for 9:30 AM on Tuesday, not in the afternoon."}},{"id":"x-q120","category":"prep","categoryName":"介係詞","question":"Please verify all data tables ___ submitting the final research draft.","options":["although","forward","prior to","unless"],"answer":2,"difficulty":"中階","translation":"請在提交最終研究草稿之前先核對所有數據表。","explanation":"解題線索：空格後方接動名詞「submitting」，且語意是「在某動作之前」。適用文法規則：prior to + 動名詞/名詞，意同 before，表示「在…之前」；although 和 unless 是連接詞，須接完整子句而非動名詞；forward 不具備此介系詞用法。為何是正解：prior to submitting 文法正確，且語意表達「核對數據表」要發生在「提交草稿」之前。","optionNotes":["although 是從屬連接詞，須接「主詞+動詞」的完整子句，不能直接接動名詞 submitting，詞性不合。","forward 是副詞或動詞，並非介系詞，不能直接接名詞/動名詞作「之前」的意思，用法錯誤。","正解：prior to 是介系詞片語，意同 before，後面可接動名詞 submitting，語意與文法皆正確。","unless 同樣是連接詞，須接完整子句，且語意「除非」與句子要求的時間先後順序不符。"],"keyWords":[{"word":"verify","pos":"v.","meaning":"核對、驗證","freq":"高頻"},{"word":"draft","pos":"n.","meaning":"草稿","freq":"高頻"},{"word":"submit","pos":"v.","meaning":"提交","freq":"極高頻"}],"pattern":{"name":"prior to + N/V-ing","note":"prior to 是較正式的介系詞片語，意同 before，後方可接名詞或動名詞，常見於商務與學術文件。","example":"Prior to signing the lease, tenants should inspect the property thoroughly."}},{"id":"x-q121","category":"conj","categoryName":"連接詞辨析","question":"The building security team checks badges ___ anyone enters the corporate facility.","options":["whatever","whenever","however","whichever"],"answer":1,"difficulty":"中階","translation":"無論何時只要有人要進入公司大樓，保全團隊都會檢查識別證。","explanation":"解題線索：空格後方是「anyone enters the corporate facility」這個完整子句，且語意是「每當有人進入時」。適用文法規則：whenever + 子句，表示「每當、無論何時」，引導時間副詞子句；whatever／whichever 用於引導名詞子句或表示「無論什麼/哪一個」，通常接名詞或子句作受詞；however 用於「無論多麼」+ 形容詞/副詞。為何是正解：whenever anyone enters 精準表達「每次有人進入時都檢查」的重複性時間邏輯。","optionNotes":["whatever 表示「無論什麼事物」，通常作受詞或修飾名詞使用，與此處單純的時間邏輯不符。","正解：whenever 表示「每當、無論何時」，引導時間副詞子句，符合「每次有人進入就檢查」的語意。","however 表示「無論多麼」，後面通常接形容詞或副詞（however difficult it is），不能直接接「anyone enters」這樣的完整子句作時間狀語。","whichever 表示「無論哪一個」，用於在有限選項中做選擇，與句意「任何人進入的時刻」無關。"],"keyWords":[{"word":"badge","pos":"n.","meaning":"識別證、門禁卡","freq":"中頻"},{"word":"facility","pos":"n.","meaning":"廠房、設施","freq":"高頻"},{"word":"security","pos":"n.","meaning":"保全、安全","freq":"極高頻"}],"pattern":{"name":"whenever + S + V","note":"whenever 引導時間副詞子句，表示「每當、無論什麼時候」，常用於描述重複發生的規定或習慣性動作。","example":"The gate opens automatically whenever an authorized vehicle approaches."}},{"id":"x-q122","category":"prep","categoryName":"介係詞","question":"The legal files are organized ___ alphabetical order for quick retrieval.","options":["in","by","on","with"],"answer":0,"difficulty":"基礎","translation":"法務檔案依字母順序整理，以便快速調閱。","explanation":"解題線索：空格後方是「alphabetical order」，這是固定搭配片語的一部分。適用文法規則：in alphabetical order（依字母順序）是英文中的固定介系詞片語，同類還有 in numerical order、in chronological order。為何是正解：in alphabetical order 是唯一符合英語慣用搭配的組合，其餘介系詞不能與 order 搭配出「依…順序」的意思。","optionNotes":["正解：in alphabetical order 為固定搭配片語，表示「依字母順序」，是英文中排序描述的標準用法。","by 雖然可表示依據（by size），但與 order 連用時並非慣用搭配，英文不說 by alphabetical order。","on 通常用於接觸面或依據某個清單/紀錄（on the list），與 alphabetical order 不構成固定搭配。","with 表示「伴隨、使用」，與「依字母順序整理」的語意及固定用法不符。"],"keyWords":[{"word":"organize","pos":"v.","meaning":"整理、組織","freq":"高頻"},{"word":"retrieval","pos":"n.","meaning":"調閱、取回","freq":"中頻"},{"word":"alphabetical","pos":"adj.","meaning":"按字母順序的","freq":"中頻"}],"pattern":{"name":"in alphabetical/chronological/numerical order","note":"表示排序方式的固定片語一律用 in，如 in alphabetical order、in chronological order、in numerical order。","example":"The archived contracts are filed in chronological order by signing date."}},{"id":"x-q123","category":"prep","categoryName":"介係詞","question":"The operation stopped ___ a critical mechanical error in the conveyor belt system.","options":["although","because","because of","whereas"],"answer":2,"difficulty":"基礎","translation":"由於輸送帶系統發生嚴重的機械故障，作業因此停止。","explanation":"解題線索：空格後方是「a critical mechanical error」這個名詞片語，而非完整子句。適用文法規則：because of + 名詞片語，表示原因；because 是連接詞，後面須接「主詞+動詞」的完整子句；although／whereas 皆為表讓步或對比的連接詞，語意也不符因果關係。為何是正解：because of a critical mechanical error 文法正確（介系詞+名詞），且語意表達了作業停止的原因。","optionNotes":["although 表示「雖然」的讓步關係，與句子單純的因果邏輯不符。","because 是連接詞，須接完整子句（如 because a critical error occurred），不能直接接名詞片語，詞性不合，是常見陷阱。","正解：because of 是介系詞片語，後接名詞片語 a critical mechanical error，文法與因果語意皆正確。","whereas 表示「然而、對比」，用於比較兩個相反的情況，與「因為機械故障而停止」的因果語意不符。"],"keyWords":[{"word":"conveyor belt","pos":"n.","meaning":"輸送帶","freq":"中頻"},{"word":"mechanical error","pos":"n.","meaning":"機械故障","freq":"中頻"},{"word":"critical","pos":"adj.","meaning":"嚴重的、關鍵的","freq":"高頻"}],"pattern":{"name":"because of + N vs. because + S + V","note":"because of 為介系詞片語接名詞，because 為連接詞接完整子句，兩者中文都翻「因為」但詞性不同，是 Part 5 經典陷阱。","example":"Production slowed because of a parts shortage, because the supplier missed its delivery window."}},{"id":"x-q124","category":"prep","categoryName":"介係詞","question":"The marketing budget was split evenly ___ the three product development teams.","options":["between","through","among","along"],"answer":2,"difficulty":"基礎","translation":"行銷預算平均分配給三個產品開發團隊。","explanation":"解題線索：空格後方是「the three product development teams」，三個以上的對象進行分配。適用文法規則：among 用於三者或三者以上之間的分配、比較；between 只能用於兩者之間；along 表示沿著；through 表示穿過或透過某方式。為何是正解：three teams 是三個對象，符合 among 的使用條件。","optionNotes":["between 只能用於「兩者之間」（如 between the two teams），此處是三個團隊，用法不合，是常見誘答。","through 表示「穿過、透過某方式」，與「平均分配給三個團隊」的語意不符。","正解：among 用於三者以上之間的分配或比較，符合「分配給三個團隊」的語意。","along 表示「沿著」某條路線或方向，與「分配給多個團隊」的語意無關。"],"keyWords":[{"word":"split","pos":"v.","meaning":"分配、分割","freq":"高頻"},{"word":"evenly","pos":"adv.","meaning":"平均地","freq":"中頻"},{"word":"development","pos":"n.","meaning":"開發","freq":"高頻"}],"pattern":{"name":"between + 兩者 vs. among + 三者以上","note":"between 用於明確的兩個對象之間；among 用於三個或三個以上的群體之間，是 Part 5 高頻數量陷阱。","example":"Responsibilities were divided among the four regional offices, not just between two."}},{"id":"x-q125","category":"conj","categoryName":"連接詞辨析","question":"You can reach the technician ___ either by email or via the internal chat application.","options":["neither","both","whether","either"],"answer":3,"difficulty":"基礎","translation":"你可以透過電子郵件或內部聊天應用程式聯繫到這位技術人員。","explanation":"解題線索：空格後方出現「or」，這是固定關聯詞的搭配訊號。適用文法規則：either...or... 表示「不是…就是…、兩者擇一」，是固定的對稱連接詞組合；neither 搭配 nor；both 搭配 and；whether 搭配 or 但通常用於名詞子句或副詞子句而非此處的方式並列。為何是正解：句中已出現 or，唯一能與其搭配的是 either，形成 either...or... 的結構。","optionNotes":["neither 必須搭配 nor 使用（neither...nor...），與句中的 or 不對應，是典型陷阱。","both 必須搭配 and 使用（both...and...），若套入會變成「兩者都」，但句型結構須用 and 而非 or，不合。","whether 通常搭配 or 用於表達「是否」的疑問或讓步語意（whether...or not），並非用於單純表達「透過方式A或方式B聯繫」的對等並列，語感不如 either 自然。","正解：either 與 or 為固定搭配 either...or...，表示「透過兩種方式擇一」，符合句意。"],"keyWords":[{"word":"reach","pos":"v.","meaning":"聯繫上、觸及","freq":"高頻"},{"word":"via","pos":"prep.","meaning":"透過、經由","freq":"高頻"},{"word":"internal","pos":"adj.","meaning":"內部的","freq":"高頻"}],"pattern":{"name":"either A or B","note":"either...or... 表示「A或B兩者擇一」，是英文中最常見的對等連接詞組合之一。","example":"Applicants can submit the form either online or in person at the front desk."}},{"id":"x-q126","category":"conj","categoryName":"連接詞辨析","question":"The supervisor extended the deadline ___ the team had encountered database errors.","options":["despite","because","so that","regardless of"],"answer":1,"difficulty":"中階","translation":"由於團隊遇到了資料庫錯誤，主管因此延長了截止期限。","explanation":"解題線索：空格後方是「the team had encountered database errors」這個完整子句，且與前句「延長截止期限」形成因果關係（先有錯誤，才延長期限）。適用文法規則：because + 子句，表示原因；so that 也接子句但表示「目的」，語意方向相反。為何是正解：because 精準表達「因為團隊遇到資料庫錯誤，所以主管延長期限」的因果邏輯，若用 so that 則會變成「主管延長期限是為了讓團隊遇到錯誤」，邏輯不通。","optionNotes":["despite 是介系詞，後面只能接名詞片語（如 despite the errors），不能接完整子句 the team had encountered，詞性不合。","正解：because 引導原因子句，精準表達「因為資料庫發生錯誤」是「延長期限」的原因。","so that 引導目的子句，若套入會變成「延長期限以便團隊遇到資料庫錯誤」，因果方向錯誤，語意不合邏輯。","regardless of 是介系詞片語，表示「不論、不管」，同樣只能接名詞，且語意上與因果關係不符。"],"keyWords":[{"word":"extend","pos":"v.","meaning":"延長","freq":"高頻"},{"word":"deadline","pos":"n.","meaning":"截止期限","freq":"極高頻"},{"word":"encounter","pos":"v.","meaning":"遇到、碰到","freq":"高頻"}],"pattern":{"name":"because + S + V（原因）vs. so that + S + V（目的）","note":"because 引導的子句說明「為什麼發生前面的動作」，so that 引導的子句說明「做前面動作的目的為何」，兩者因果方向相反，判讀時須留意何者是因、何者是果。","example":"The team worked overtime because the client moved up the delivery date, so that the shipment would arrive on time."}},{"id":"x-q127","category":"prep","categoryName":"介係詞","question":"The conference registration desk is located ___ the main lobby and the exhibition hall.","options":["against","among","through","between"],"answer":3,"difficulty":"基礎","translation":"會議報到櫃檯位於主大廳與展覽廳之間。","explanation":"解題線索：句中出現「A and B」的結構（the main lobby and the exhibition hall），且是兩個明確的地點。適用文法規則：between A and B 為固定句型，表示「在兩者之間」；among 用於三者以上；through 表示穿過；against 表示倚靠、對抗。為何是正解：只有兩個地點（大廳與展覽廳），且句型為 between...and...，故選 between。","optionNotes":["against 表示「倚靠、對抗」，與「位於兩地點之間」的方位語意無關。","among 須用於三個以上的對象，且不與 and 構成 among A and B 這種句型，用法不合。","through 表示「穿過、通過」某空間，與「位於兩者之間」的靜態位置描述不符。","正解：between A and B 為固定句型，表示「位於兩者之間」，此處恰好是兩個地點，完全吻合。"],"keyWords":[{"word":"registration desk","pos":"n.","meaning":"報到櫃檯","freq":"中頻"},{"word":"lobby","pos":"n.","meaning":"大廳","freq":"高頻"},{"word":"exhibition hall","pos":"n.","meaning":"展覽廳","freq":"中頻"}],"pattern":{"name":"between A and B","note":"between 常與 and 搭配構成 between A and B，表示「在A與B兩者之間」，用於恰好兩個對象的方位描述。","example":"The break room is situated between the printing station and the manager's office."}},{"id":"x-q128","category":"conj","categoryName":"連接詞辨析","question":"The laboratory staff must wear protective eyewear ___ handling hazardous acids.","options":["during","while","until","unless"],"answer":1,"difficulty":"中階","translation":"實驗室人員在處理危險酸性物質時必須配戴護目鏡。","explanation":"解題線索：空格後方是動名詞片語「handling hazardous acids」，語意是「在做某動作的同時」。適用文法規則：while + V-ing，是 while they are handling 的省略結構，常見於「同時進行」的情境；during 是純介系詞，後面須接名詞（如 during the handling process），不能直接接動名詞子句化的 handling。為何是正解：while handling 為固定省略句型，表示「當處理…的同時」，語意通順且文法正確。","optionNotes":["during 是純介系詞，理論上須接名詞片語（如 during the handling of acids），直接接 handling hazardous acids 作動名詞用法不如 while 自然，屬於常見誤用陷阱。","正解：while + V-ing 是 while they are handling 的省略結構，表示「在處理的同時」，符合安全規範的情境語意。","until 表示「直到…為止」，與「同時進行防護」的語意不符，套入後不合邏輯。","unless 表示「除非」，若套入會變成「除非處理危險酸性物質，否則須戴護目鏡」，邏輯完全相反，不合句意。"],"keyWords":[{"word":"protective eyewear","pos":"n.","meaning":"護目鏡","freq":"中頻"},{"word":"hazardous","pos":"adj.","meaning":"危險的","freq":"中頻"},{"word":"handle","pos":"v.","meaning":"處理、操作","freq":"高頻"}],"pattern":{"name":"while + V-ing（省略主詞與be動詞）","note":"當從屬子句主詞與主句主詞相同時，while/when/before/after 等連接詞可省略主詞與be動詞，直接接現在分詞，是 Part 5 常考的簡化結構。","example":"Technicians must power down the equipment while performing routine maintenance."}},{"id":"x-q129","category":"prep","categoryName":"介係詞","question":"The server migration took longer than expected ___ the massive size of the database.","options":["even if","although","owing to","in order that"],"answer":2,"difficulty":"中階","translation":"由於資料庫的體積龐大，伺服器遷移花費的時間比預期更長。","explanation":"解題線索：空格後方是「the massive size of the database」這個名詞片語，且語意是說明「花費時間較長」的原因。適用文法規則：owing to + 名詞片語，表示原因，意同 because of／due to；although 和 even if 是連接詞須接子句；in order that 引導目的子句也須接子句。為何是正解：owing to the massive size 文法正確（介系詞+名詞），且語意精準表達資料庫龐大是遷移耗時的原因。","optionNotes":["even if 是連接詞，表示「即使」的假設讓步語意，須接子句，且與此處單純的因果關係不符。","although 是連接詞，須接完整子句（如 although the database was massive），不能直接接名詞片語，詞性不合。","正解：owing to 為介系詞片語，意同 because of，後接名詞片語 the massive size，因果語意正確。","in order that 引導目的子句，須接「主詞+動詞」的完整子句，且語意為「以便」，與原因說明的語意不符。"],"keyWords":[{"word":"migration","pos":"n.","meaning":"遷移","freq":"中頻"},{"word":"massive","pos":"adj.","meaning":"巨大的、龐大的","freq":"高頻"},{"word":"database","pos":"n.","meaning":"資料庫","freq":"高頻"}],"pattern":{"name":"owing to / due to / because of + N","note":"owing to、due to、because of 三者皆為介系詞片語，後面只能接名詞或名詞片語，表示原因，功能上可與 because + 子句互換但詞性不同。","example":"The rollout was delayed owing to unresolved licensing issues."}},{"id":"x-q130","category":"prep","categoryName":"介係詞","question":"The legal team requires all signature pages ___ the end of the business day.","options":["by","until","in","on"],"answer":0,"difficulty":"中階","translation":"法務團隊要求所有簽名頁必須在營業日結束前繳交。","explanation":"解題線索：空格後方是「the end of the business day」，語意是「不遲於此時間點」的截止概念。適用文法規則：by + 時間點，表示「最晚在…之前、不遲於」，強調動作須在該時間點或之前完成；until 強調「持續到某時間點」，常搭配延續性動詞而非「繳交」這種一次性完成動作。為何是正解：by the end of the business day 精準表達「簽名頁最晚必須在營業日結束前交齊」的截止語意。","optionNotes":["正解：by 表示「最晚在…之前、不遲於」，符合「必須在營業日結束前完成繳交」的截止語意。","until 強調某動作或狀態「持續」到某時間點，通常搭配延續性動詞（如 remain open until），與「一次性繳交完成」的語意不太吻合，是常見混淆陷阱。","in 用於較長的時間範圍（如 in a week），無法表達「不遲於此精確時間點」的截止語意。","on 用於表達特定日期或星期，不用於表達「不遲於」的截止期限概念。"],"keyWords":[{"word":"signature page","pos":"n.","meaning":"簽名頁","freq":"中頻"},{"word":"business day","pos":"n.","meaning":"營業日、工作日","freq":"高頻"},{"word":"require","pos":"v.","meaning":"要求","freq":"極高頻"}],"pattern":{"name":"by + 時間點 vs. until + 時間點","note":"by 表示「最晚不超過某時間點完成一次性動作」；until 表示「某狀態持續到該時間點」，常見於 Part 5 截止期限題型。","example":"All expense reports must be submitted by Friday, though the portal remains open until midnight."}},{"id":"x-q131","category":"conj","categoryName":"連接詞辨析","question":"___ the product design was flawless, the high pricing restricted initial sales volume.","options":["While","Unless","Despite","Because of"],"answer":0,"difficulty":"中階","translation":"雖然產品設計完美無瑕，但過高的定價限制了初期的銷售量。","explanation":"解題線索：空格後方是「the product design was flawless」這個完整子句（主詞+be動詞），且與後半句「限制了銷售量」形成語意上的轉折反差。適用文法規則：While 在此作連接詞，表示「雖然、儘管」的讓步語意，後接完整子句；Despite 是介系詞，只能接名詞不能接子句。為何是正解：While 文法上可接子句，語意上也精準表達「設計雖完美，但定價仍限制銷量」的讓步轉折。","optionNotes":["正解：While 作連接詞使用時可表示「雖然、儘管」的讓步語意，後接完整子句 the product design was flawless，文法與語意皆正確。","Unless 表示「除非」的條件語意，與句子「儘管設計完美但銷量仍受限」的讓步轉折邏輯不符。","Despite 是介系詞，後面只能接名詞或動名詞片語（如 despite the flawless design），不能直接接子句 the product design was，詞性不合，是常見陷阱。","Because of 是介系詞片語表原因，且語意若套入會變成「因為設計完美，所以定價限制了銷量」，因果邏輯不通。"],"keyWords":[{"word":"flawless","pos":"adj.","meaning":"完美無瑕的","freq":"中頻"},{"word":"restrict","pos":"v.","meaning":"限制","freq":"高頻"},{"word":"initial","pos":"adj.","meaning":"最初的、初期的","freq":"高頻"}],"pattern":{"name":"While（讓步）+ S + V","note":"while 除了表示「當…同時」的時間用法外，也常作「雖然、儘管」的讓步連接詞使用，後方須接完整子句，與 although 用法相通。","example":"While the new policy improved efficiency, it also increased employee workload."}},{"id":"x-q132","category":"prep","categoryName":"介係詞","question":"The factory manager signed the vendor agreement ___ carefully reviewing the clauses.","options":["after","prior","following to","beforehand"],"answer":0,"difficulty":"中階","translation":"廠長在仔細審閱過條款之後，才簽署了供應商協議。","explanation":"解題線索：空格後方接動名詞片語「carefully reviewing the clauses」，且語意是「先審閱、後簽署」的時間先後順序。適用文法規則：after + 動名詞，表示「在…之後」，是介系詞的標準用法；beforehand 是副詞不能直接接受詞；prior 須搭配 to 才能作介系詞（prior to）；following to 為錯誤搭配（following 本身即為介系詞，不需再加 to）。為何是正解：after carefully reviewing 文法正確，且語意符合「先審閱條款，再簽署協議」的邏輯順序。","optionNotes":["正解：after 是介系詞，可直接接動名詞 reviewing，表示「審閱之後」，文法與語意皆正確。","prior 單獨使用並非介系詞，必須寫成 prior to 才能接名詞/動名詞（prior to reviewing），此處缺少 to，用法錯誤。","following to 為錯誤搭配，following 本身已具介系詞功能（意同 after），後面不需再加 to，此為故意設計的錯誤誘答。","beforehand 是副詞，本身不能接受詞（不能說 beforehand reviewing），必須獨立使用（如 reviewed the clauses beforehand），詞性不合。"],"keyWords":[{"word":"vendor agreement","pos":"n.","meaning":"供應商協議","freq":"中頻"},{"word":"clause","pos":"n.","meaning":"條款","freq":"中頻"},{"word":"review","pos":"v.","meaning":"審閱、檢視","freq":"高頻"}],"pattern":{"name":"after + V-ing vs. prior to + V-ing","note":"after 可直接作介系詞接動名詞；prior to 也是介系詞片語但須完整寫出 to，不可省略；following（作介系詞用）後面則直接接名詞/動名詞，不加 to。","example":"The team finalized the budget after consulting with every department head."}},{"id":"x-q133","category":"conj","categoryName":"連接詞辨析","question":"The system backup runs automatically ___ the office is empty at night.","options":["until","while","during","when"],"answer":3,"difficulty":"基礎","translation":"系統備份會在辦公室夜間淨空時自動執行。","explanation":"解題線索：空格後方是「the office is empty at night」這個完整子句，且語意是描述備份自動執行的特定時間情境。適用文法規則：when + 子句，表示「當…的時候」，用於指出動作發生的特定時間點或情境；during 是介系詞須接名詞，不能接子句。為何是正解：when the office is empty 精準描述「辦公室淨空的時候」這個備份自動執行的時間點。","optionNotes":["until 表示「直到…為止」，與句意「在辦公室淨空時執行備份」的時間點語意不符。","while 表示「當…同時」，強調兩個動作同時進行的持續性，而此處語意較著重於「特定時間點觸發」，when 更貼切，且 while 與備份「自動執行」這種瞬間觸發動作搭配較不自然。","during 是純介系詞，後面只能接名詞片語（如 during the night），不能直接接完整子句 the office is empty，詞性不合。","正解：when 引導時間子句，表示「當…時」，符合「辦公室夜間淨空時」這個特定時間情境的語意。"],"keyWords":[{"word":"backup","pos":"n.","meaning":"備份","freq":"高頻"},{"word":"automatically","pos":"adv.","meaning":"自動地","freq":"高頻"},{"word":"empty","pos":"adj.","meaning":"空的、無人的","freq":"高頻"}],"pattern":{"name":"when + S + V（時間點/情境）","note":"when 引導的子句說明動作發生的具體時間點或情境，是最基本且泛用的時間連接詞。","example":"The alarm system arms itself automatically when all employees have left the building."}},{"id":"x-q134","category":"prep","categoryName":"介係詞","question":"The application forms must be sent ___ the human resources department directly.","options":["at","to","by","on"],"answer":1,"difficulty":"基礎","translation":"申請表格必須直接送交人力資源部門。","explanation":"解題線索：動詞為「sent」，且空格後方是接收表格的對象「the human resources department」。適用文法規則：send something to someone/somewhere，to 表示動作傳遞的方向與對象，是 send 的固定搭配介系詞。為何是正解：sent to the department 文法正確，表達表格傳送的方向和目的地。","optionNotes":["at 通常用於表示靜態定點或攻擊/瞄準的方向（look at），不用於表達「傳送給某對象」。","正解：to 表示動作的方向與接收對象，send...to... 是固定搭配，符合「送交至人資部門」的語意。","by 通常表示方式、手段（by email）或行為主體（by the manager），不能表達「傳送的目的地/對象」。","on 用於接觸面或依據某平台，與「傳送給某部門」的方向語意不符。"],"keyWords":[{"word":"application form","pos":"n.","meaning":"申請表格","freq":"高頻"},{"word":"human resources","pos":"n.","meaning":"人力資源","freq":"高頻"},{"word":"directly","pos":"adv.","meaning":"直接地","freq":"高頻"}],"pattern":{"name":"send N to N（傳遞對象）","note":"send、submit、forward、deliver 等傳遞類動詞常搭配 to 表示接收對象或目的地。","example":"Please forward the signed contract to the legal department by Friday."}},{"id":"x-q135","category":"prep","categoryName":"介係詞","question":"The supervisor handles all shift assignments ___ any bias or favoritism.","options":["against","without","except","besides"],"answer":1,"difficulty":"中階","translation":"主管在安排輪班時毫無偏見或偏袒。","explanation":"解題線索：空格後方是「any bias or favoritism」，且語意是「排除、沒有」這些負面因素。適用文法規則：without + 名詞，表示「沒有、不帶有」；against 表示「對抗、反對」；except 表示「除了…之外」；besides 表示「除了…還有」（附加）。為何是正解：without any bias or favoritism 精準表達主管排班時完全不帶偏見與偏袒的公正態度。","optionNotes":["against 表示「對抗、違反」，若套入會變成「反對偏見地處理排班」，語意不自然且不符合常見英文表達習慣。","正解：without 表示「沒有、不帶有」，符合「毫無偏見或偏袒地安排輪班」的公正語意。","except 表示「除了…之外」，語意是排除某個特定項目，與「完全不帶有偏見」的整體否定語意不同。","besides 表示「除了…還有」，是附加語意而非否定排除，與句子想表達的「公正無偏」語意不符。"],"keyWords":[{"word":"shift assignment","pos":"n.","meaning":"輪班安排","freq":"中頻"},{"word":"bias","pos":"n.","meaning":"偏見","freq":"中頻"},{"word":"favoritism","pos":"n.","meaning":"偏袒、徇私","freq":"低頻"}],"pattern":{"name":"without + N（否定伴隨狀態）","note":"without 表示「在沒有…的情況下」，常用於描述動作進行時所排除的負面因素或條件。","example":"The committee reviewed every application without any personal preference."}},{"id":"x-q136","category":"prep","categoryName":"介係詞","question":"The production volume increased ___ the implementation of advanced machine tooling.","options":["although","instead","unless","following"],"answer":3,"difficulty":"中階","translation":"在導入先進的機械加工設備之後，產量隨之提升。","explanation":"解題線索：空格後方是「the implementation of advanced machine tooling」這個名詞片語，且語意是「在某事之後」。適用文法規則：following 可作介系詞使用，意同 after，後面直接接名詞片語，不需再加 to；although 是連接詞須接子句；unless 是連接詞表條件；instead 是副詞不能接受詞。為何是正解：following the implementation 文法正確（介系詞+名詞），且語意表達「導入新設備之後，產量隨之提升」的時間因果順序。","optionNotes":["although 是連接詞，須接「主詞+動詞」的完整子句，不能直接接名詞片語 the implementation，詞性不合。","instead 是副詞，通常單獨使用或搭配 of（instead of），不能直接接名詞片語作「在…之後」的意思，用法錯誤。","unless 是連接詞，表示「除非」的條件語意，且同樣須接完整子句，與句意的時間先後順序不符。","正解：following 作介系詞使用時意同 after，可直接接名詞片語 the implementation，符合「導入設備之後」的時間語意。"],"keyWords":[{"word":"implementation","pos":"n.","meaning":"實施、導入","freq":"高頻"},{"word":"tooling","pos":"n.","meaning":"工具設備、加工機具","freq":"低頻"},{"word":"production volume","pos":"n.","meaning":"產量","freq":"高頻"}],"pattern":{"name":"following + N（作介系詞，意同 after）","note":"following 除了作動詞的現在分詞外，也常直接作介系詞使用，意思等同 after，後面直接接名詞或名詞片語。","example":"Following the merger, the two companies unified their customer service systems."}},{"id":"x-q137","category":"prep","categoryName":"介係詞","question":"Please place all sensitive scrap documents ___ the designated shredding bin.","options":["through","above","into","onto"],"answer":2,"difficulty":"基礎","translation":"請將所有敏感的廢棄文件放入指定的碎紙回收桶中。","explanation":"解題線索：空格後方是「the designated shredding bin」，一個有內部空間可容納物品的容器，且動詞是「place」（放置）。適用文法規則：into + 容器，表示「進入某個內部空間」，強調從外部移動到內部；onto 強調「移到某物表面之上」而非內部；above 表示「在…上方」（無接觸）；through 表示「穿過」。為何是正解：into the shredding bin 表達文件被放入桶子內部，符合「丟入回收桶」的實際情境。","optionNotes":["through 表示「穿過」，與「放入容器」的方向語意不同。","above 表示「在…上方」，強調沒有接觸的上方位置，與「放入容器內」的語意不符。","正解：into 表示「進入某個容器/空間內部」，符合「將文件放入碎紙桶中」的語意。","onto 表示「移到某物表面之上」（如放在桌面上），而碎紙桶是有內部空間的容器，文件應放入內部而非桶子表面，用法不合。"],"keyWords":[{"word":"scrap document","pos":"n.","meaning":"廢棄文件","freq":"低頻"},{"word":"shredding bin","pos":"n.","meaning":"碎紙回收桶","freq":"低頻"},{"word":"designated","pos":"adj.","meaning":"指定的","freq":"高頻"}],"pattern":{"name":"into + 容器（移入內部）","note":"into 強調物體從外部移動進入某個具有內部空間的容器或場所，常與 place、put、drop 等動詞搭配。","example":"Employees should drop confidential papers into the locked recycling container."}},{"id":"x-q138","category":"prep","categoryName":"介係詞","question":"The laboratory data is confidential and cannot be shared ___ explicit authorization.","options":["without","unless","despite","although"],"answer":0,"difficulty":"中階","translation":"實驗室數據屬機密，未經明確授權不得分享。","explanation":"解題線索：空格後方是「explicit authorization」這個名詞片語，且語意是「缺少此條件則不能分享」。適用文法規則：without + 名詞，表示「在沒有…的情況下」；despite 語意為「儘管」不符因果條件邏輯；although／unless 是連接詞須接完整子句而非單純名詞。為何是正解：without explicit authorization 精準表達「沒有明確授權的情況下不得分享」的條件語意，且文法上介系詞接名詞完全正確。","optionNotes":["正解：without 表示「在沒有…的情況下」，符合「未經授權不得分享」的條件語意，且詞性為介系詞可直接接名詞。","unless 是連接詞，同樣須接完整子句（如 unless it is authorized），若只接名詞則文法不完整，是常見詞性混淆陷阱。","despite 表示「儘管」的讓步語意，若套入會變成「儘管有明確授權也不能分享」，與句子想表達的條件邏輯完全相反。","although 是連接詞，須接「主詞+動詞」的完整子句（如 although it is authorized），不能直接接名詞片語 explicit authorization，詞性不合。"],"keyWords":[{"word":"confidential","pos":"adj.","meaning":"機密的","freq":"高頻"},{"word":"authorization","pos":"n.","meaning":"授權","freq":"高頻"},{"word":"explicit","pos":"adj.","meaning":"明確的","freq":"中頻"}],"pattern":{"name":"without + N（條件/伴隨狀態）","note":"without 後接名詞，表達「缺少某條件」的情況，常用於規範性文件描述禁止事項的前提。","example":"No visitor may enter the server room without prior approval from IT security."}},{"id":"x-q139","category":"conj","categoryName":"連接詞辨析","question":"The machinery will continue to run ___ the emergency power shutoff button is pressed.","options":["since","while","until","during"],"answer":2,"difficulty":"基礎","translation":"機器將持續運轉，直到有人按下緊急電源關閉按鈕為止。","explanation":"解題線索：空格後方是「the emergency power shutoff button is pressed」這個完整子句，且語意是「持續某動作直到特定事件發生」。適用文法規則：until + 子句，表示「直到…為止」，強調動作持續到某事件發生才終止；during 是介系詞須接名詞不能接子句。為何是正解：until the button is pressed 精準表達「機器會一直運轉，直到按鈕被按下才停止」的持續至終點語意。","optionNotes":["since 表示「自從…以來」，須搭配完成式時態，與此處描述未來持續運轉的語境不符。","while 表示「當…同時」，若套入會變成「按鈕被按下的同時機器運轉」，與原句「運轉會因按鈕而終止」的語意不同。","正解：until 表示「直到…為止」，符合「持續運轉直到按鈕被按下」的語意與文法（可接完整子句）。","during 是純介系詞，只能接名詞片語（如 during the shutdown），不能接完整子句 the button is pressed，詞性不合。"],"keyWords":[{"word":"machinery","pos":"n.","meaning":"機械、機具","freq":"高頻"},{"word":"shutoff","pos":"n.","meaning":"關閉、停止","freq":"低頻"},{"word":"emergency","pos":"n./adj.","meaning":"緊急情況（的）","freq":"高頻"}],"pattern":{"name":"until + S + V（持續到終點事件）","note":"until 引導子句時，表示前面的動作或狀態會一直持續，直到子句所描述的事件發生才停止。","example":"The alarm will keep sounding until someone enters the correct access code."}},{"id":"x-q140","category":"prep","categoryName":"介係詞","question":"The logistics office is situated directly ___ the main manufacturing assembly building.","options":["across from","throughout","alongside of","between"],"answer":0,"difficulty":"進階","translation":"物流辦公室正好位於主要製造組裝大樓的對面。","explanation":"解題線索：句中有「directly」強調精確的相對位置，且語意是「面對面的對面」。適用文法規則：across from 為固定介系詞片語，表示「在…的對面」，常與 directly 搭配加強語氣；throughout 表示「貫穿整個範圍」；alongside of 為錯誤搭配（正確應為 alongside，不需加 of）；between 須接兩個對象（between A and B）而此處只有一個地點。為何是正解：across from 精準表達「正對面」的方位關係，且與 directly 語意呼應。","optionNotes":["正解：across from 是固定介系詞片語，表示「在…正對面」，與 directly 搭配使用語意自然且常見。","throughout 表示「貫穿整個空間或期間」，與「正對面」這種精確方位語意不符。","alongside of 為錯誤搭配，正確用法應為 alongside（本身已含介系詞功能，不需加 of），此為故意設計的錯誤誘答，類似 despite of 的陷阱。","between 通常須搭配兩個對象構成 between A and B，此處只接單一建築物，用法不合。"],"keyWords":[{"word":"situated","pos":"adj.","meaning":"位於","freq":"中頻"},{"word":"assembly building","pos":"n.","meaning":"組裝大樓","freq":"低頻"},{"word":"logistics","pos":"n.","meaning":"物流","freq":"高頻"}],"pattern":{"name":"across from + N（正對面）","note":"across from 表示「在…的正對面」，常與 directly、right 等副詞連用加強語氣；注意 alongside 本身即為介系詞，後面不可再加 of。","example":"The new café is located directly across from the train station entrance."}},{"id":"x-q141","category":"prep","categoryName":"介係詞","question":"The new supervisor treats everyone with respect ___ their position in the hierarchy.","options":["in addition to","contrary to","because of","regardless of"],"answer":3,"difficulty":"中階","translation":"這位新主管不論職位高低，都會尊重對待每一個人。","explanation":"解題線索：空格後方是「their position in the hierarchy」，且語意是「不因此因素而有差別待遇」。適用文法規則：regardless of + 名詞，表示「不管、不論」，強調某因素不影響結果；because of 表因果；in addition to 表附加；contrary to 表「與…相反」。為何是正解：regardless of their position 精準表達「不論職位高低都一視同仁」的語意，符合句子描述主管公平對待所有人的邏輯。","optionNotes":["in addition to 表示「除了…之外還有」，是附加語意，與「不論職位高低」的排除因素語意不符。","contrary to 表示「與…相反」，通常用於描述與預期或事實相反的情況，與「不論職位」的語意不同。","because of 表示因果關係「因為」，若套入會變成「因為職位而尊重對待」，與句意「不論職位」的語意相反。","正解：regardless of 表示「不管、不論」，符合「不因職位高低而有差別待遇」的公平語意。"],"keyWords":[{"word":"hierarchy","pos":"n.","meaning":"階級、位階","freq":"中頻"},{"word":"supervisor","pos":"n.","meaning":"主管","freq":"高頻"},{"word":"respect","pos":"n.","meaning":"尊重","freq":"高頻"}],"pattern":{"name":"regardless of + N","note":"regardless of 表示「不管、不論」，強調後面的因素不會影響前述行為或結果，常用於描述公平、一致的原則。","example":"All applicants are evaluated regardless of their educational background."}},{"id":"x-q142","category":"conj","categoryName":"連接詞辨析","question":"The software developers worked overnight ___ they could deploy the hotfix by dawn.","options":["because of","although","so that","in order to"],"answer":2,"difficulty":"中階","translation":"軟體工程師徹夜工作，以便能在天亮前部署修復程式。","explanation":"解題線索：空格後方是「they could deploy the hotfix by dawn」這個完整子句（主詞+情態動詞+動詞），且語意是表達前一動作的目的。適用文法規則：so that + 完整子句，表示「為了、以便」，引導目的子句；in order to 後面須接原形動詞而非完整子句。為何是正解：so that they could deploy 文法正確（可接完整子句），且語意表達「徹夜工作是為了能在天亮前完成部署」的目的關係。","optionNotes":["because of 是介系詞片語表原因，只能接名詞，且語意也偏向原因而非目的，與句意不符。","although 表示「雖然」的讓步語意，與「徹夜工作是為了完成部署」的目的語意不符。","正解：so that 引導目的子句，可接完整子句 they could deploy...，文法與語意皆正確。","in order to 後面必須直接接原形動詞（如 in order to deploy），不能接「主詞+情態動詞」的完整子句 they could deploy，詞性不合。"],"keyWords":[{"word":"deploy","pos":"v.","meaning":"部署","freq":"中頻"},{"word":"hotfix","pos":"n.","meaning":"緊急修復程式","freq":"低頻"},{"word":"overnight","pos":"adv.","meaning":"徹夜、通宵","freq":"中頻"}],"pattern":{"name":"so that + S + 情態動詞 + V","note":"so that 引導目的子句時，子句中常搭配 can/could、will/would 等情態動詞，表示「以便能夠…」；in order to 則直接接原形動詞，不能接完整子句。","example":"The team documented every step so that new members could follow the process easily."}},{"id":"x-q143","category":"prep","categoryName":"介係詞","question":"The factory assembly lines are fully operational even ___ holidays.","options":["during","unless","on","despite of"],"answer":2,"difficulty":"進階","translation":"工廠的組裝生產線即使在假日也全面運作。","explanation":"解題線索：句中有「even」強調「甚至」的語氣，且空格後方是「holidays」這個表日期性質的名詞。適用文法規則：even on + 特定日子/節日，表示「即使在…的日子」，on 用於表達特定的日子；despite of 為錯誤搭配（despite 本身即為介系詞，後面不可再加 of，正確應為 despite 或 in spite of）。為何是正解：even on holidays 文法正確且語意通順，表達生產線連假日都持續運作。","optionNotes":["during 通常接一段有起訖的時間名詞（如 during the holiday season），單獨接 holidays（複數，泛指各個假日）較不自然，且與 even 連用不如 on 常見。","unless 是連接詞，表示「除非」的條件語意，且須接完整子句，與「甚至在假日」這種讓步語意不符。","正解：on 用於表達特定的日子（如 on holidays、on weekends），搭配 even 強調「甚至在假日也」，語意與文法皆正確。","despite of 為錯誤搭配，despite 本身已是完整的介系詞，後面不可再接 of（正確用法為 despite 或 in spite of），此為故意設計的錯誤誘答。"],"keyWords":[{"word":"operational","pos":"adj.","meaning":"可運作的、營運中的","freq":"中頻"},{"word":"assembly line","pos":"n.","meaning":"組裝生產線","freq":"中頻"},{"word":"holiday","pos":"n.","meaning":"假日、節日","freq":"高頻"}],"pattern":{"name":"even on + 特定日子","note":"even 可加在介系詞前加強語氣，表示「甚至連…都」；on 用於特定的日子或節日，注意 despite 不可加 of，是常見錯誤陷阱。","example":"The customer service hotline stays open even on national holidays."}},{"id":"x-q144","category":"prep","categoryName":"介係詞","question":"The legal contract remains valid ___ a period of exactly five calendar years.","options":["for","in","since","during"],"answer":0,"difficulty":"中階","translation":"這份法律合約有效期恰好為五個日曆年。","explanation":"解題線索：空格後方是「a period of exactly five calendar years」，這是一段具體的時間長度。適用文法規則：for + 時間長度，表示「持續多長的時間」，常搭配 remain、last、valid 等描述持續狀態的字詞；during 須接特定的、有名稱的時間範圍（如 during the contract period）而非單純的時間長度數字。為何是正解：for a period of five years 精準表達合約效力持續的時間長度。","optionNotes":["正解：for + 時間長度，表示狀態持續的期間，符合「合約有效期為五年」的語意。","in 用於較長的時間範圍或某年份（in 2026），不能表達「持續五年」的時間長度概念。","since 表示「自從某個時間點起」，須搭配完成式時態，且後面接的應是起點而非持續期間，與句意不符。","during 須搭配特定、有名稱的時間段（如 during the fiscal year），不能直接接「a period of five years」這種單純的時間長度表達，用法不合。"],"keyWords":[{"word":"valid","pos":"adj.","meaning":"有效的","freq":"高頻"},{"word":"calendar year","pos":"n.","meaning":"日曆年","freq":"中頻"},{"word":"period","pos":"n.","meaning":"期間","freq":"高頻"}],"pattern":{"name":"for + 時間長度","note":"for 後接一段時間長度，表示動作或狀態持續多久，常與 remain、last、has been 等搭配。","example":"The warranty remains in effect for a period of two years from the purchase date."}},{"id":"x-q145","category":"prep","categoryName":"介係詞","question":"The quality audit team examined every wafer ___ a high-powered digital microscope.","options":["by","throughout","from","with"],"answer":3,"difficulty":"基礎","translation":"品質稽核團隊使用高倍數的數位顯微鏡檢查每一片晶圓。","explanation":"解題線索：空格後方是「a high-powered digital microscope」，這是執行檢查動作所使用的工具。適用文法規則：with + 工具/器具，表示「使用某工具進行動作」；by 通常用於被動語態中表示動作的執行者，或表示交通/傳遞方式，而非手持工具。為何是正解：examined...with a microscope 精準表達「用顯微鏡檢查」的工具用法，是主動句中表達使用工具的標準介系詞。","optionNotes":["by 通常用於被動語態表示動作執行者（be examined by the team），或表交通/傳遞方式（by email），此處是主動句描述使用的器具，用 with 更精準。","throughout 表示「貫穿整個範圍或期間」，與「使用顯微鏡」這個工具語意無關。","from 表示「來自、出發點」，與「使用顯微鏡進行檢查」的工具語意不符。","正解：with 表示「使用某工具」進行動作，符合「用顯微鏡檢查晶圓」的語意。"],"keyWords":[{"word":"wafer","pos":"n.","meaning":"晶圓","freq":"低頻"},{"word":"high-powered","pos":"adj.","meaning":"高倍數的、高功率的","freq":"低頻"},{"word":"microscope","pos":"n.","meaning":"顯微鏡","freq":"中頻"}],"pattern":{"name":"with + 工具（使用某物進行動作）","note":"with 在此表示「使用…作為工具或手段」，是主動語態中描述動作方式的常見介系詞，與被動語態常用的 by（表示執行者）不同。","example":"The technician sealed the container with an industrial-grade adhesive."}},{"id":"x-q146","category":"conj","categoryName":"連接詞辨析","question":"The engineer modified the logic gate structure ___ optimize processing speed.","options":["for","so that","in order that","to"],"answer":3,"difficulty":"中階","translation":"工程師修改了邏輯閘結構，以便優化處理速度。","explanation":"解題線索：空格後方直接接動詞原形「optimize」，且語意是表達修改動作的目的。適用文法規則：不定詞 to + 原形動詞，是表達目的最基本、最常見的方式（意同 in order to）；for 之後須接名詞或動名詞而非原形動詞；so that／in order that 之後須接「主詞+動詞」的完整子句。為何是正解：to optimize 文法正確，簡潔表達「修改結構是為了優化速度」的目的。","optionNotes":["for 之後應接名詞或動名詞（如 for optimizing speed），不能直接接原形動詞 optimize，詞性不合。","so that 之後必須接「主詞+動詞」的完整子句（如 so that it could optimize），不能直接接原形動詞，詞性不合。","in order that 同樣須接完整子句，且語氣較正式繁複，直接接原形動詞 optimize 不符文法規則。","正解：不定詞 to + 原形動詞 optimize，是表目的最直接常見的用法，文法與語意皆正確。"],"keyWords":[{"word":"logic gate","pos":"n.","meaning":"邏輯閘","freq":"低頻"},{"word":"optimize","pos":"v.","meaning":"優化","freq":"中頻"},{"word":"modify","pos":"v.","meaning":"修改","freq":"高頻"}],"pattern":{"name":"to + V原形（不定詞表目的）","note":"不定詞 to V 是英文中表達目的最簡潔常見的方式，意同 in order to；so that 與 in order that 則須接完整子句。","example":"The team redesigned the packaging to reduce shipping costs."}},{"id":"x-q147","category":"prep","categoryName":"介係詞","question":"The corporate guidelines apply to all personnel, ___ senior executives.","options":["including","include","includes","included"],"answer":0,"difficulty":"中階","translation":"公司規範適用於所有人員，包括高階主管在內。","explanation":"解題線索：空格前方已有逗號隔開一個完整的句子「The corporate guidelines apply to all personnel」，空格後方接名詞「senior executives」，需要一個能連接名詞片語、補充說明前述範圍的詞。適用文法規則：including 是介系詞化的現在分詞，可直接接名詞，表示「包含…在內」；include 是原形動詞、included 是過去式/分詞、includes 是第三人稱單數動詞，三者皆為動詞形式，若使用會需要額外的主詞或造成句子結構錯誤（逗號後不能直接接另一個限定動詞）。為何是正解：including senior executives 是分詞片語補充說明，文法正確且為 Part 5 常考的「介系詞化分詞」考點。","optionNotes":["正解：including 為介系詞化的現在分詞，逗號後直接接名詞片語 senior executives，補充說明範圍，是固定且高頻的用法。","include 是原形動詞，逗號後方不能直接接另一個限定動詞造成句子結構破碎（會產生兩個動詞卻無連接詞的錯誤），詞性不合。","includes 是第三人稱單數現在式動詞，逗號後方不能再接一個限定動詞，會造成一句話出現兩個主要動詞卻缺乏連接詞的文法錯誤。","included 雖可作過去分詞使用，但若解讀為過去式動詞則會造成同樣的句子結構錯誤；即使作分詞獨立結構，也不如 including（主動語意「包含」）符合語境。"],"keyWords":[{"word":"personnel","pos":"n.","meaning":"人員、員工","freq":"高頻"},{"word":"senior executive","pos":"n.","meaning":"高階主管","freq":"高頻"},{"word":"guideline","pos":"n.","meaning":"規範、準則","freq":"高頻"}],"pattern":{"name":"including + N（介系詞化分詞）","note":"including 已固化為介系詞用法，意為「包含、包括」，後面直接接名詞或名詞片語，常用於列舉或補充說明範圍。","example":"The renovation covers the entire building, including the parking garage."}},{"id":"x-q148","category":"prep","categoryName":"介係詞","question":"The network router was placed ___ the top shelf to maximize signal distribution.","options":["on","in","at","to"],"answer":0,"difficulty":"基礎","translation":"為了讓訊號傳輸範圍最大化，這台網路路由器被放置在最上層的架子上。","explanation":"解題線索：空格後方是「the top shelf」，一個有平面、可放置物品在其上方且與物品有接觸的表面。適用文法規則：on + 表面，表示「在某平面之上且有接觸」，是放置物品的標準介系詞；in 用於封閉空間內部（如 in the drawer）；at 用於定點；to 用於方向終點。為何是正解：on the top shelf 表達路由器直接放置在架子表面上，符合「放置在架子上」的實際情境。","optionNotes":["正解：on 表示「在某平面之上且接觸」，符合「放在架子上」的實際物理情境。","in 用於封閉的內部空間（如 in the cabinet 抽屜/櫃子內部），架子（shelf）是開放平面而非封閉空間，用法不合。","at 通常用於視為一個點的定點位置，不強調「表面接觸」的放置關係，與此處語意不符。","to 表示方向或移動的終點，與「靜態放置在架子上」的語意不符。"],"keyWords":[{"word":"router","pos":"n.","meaning":"路由器","freq":"中頻"},{"word":"maximize","pos":"v.","meaning":"最大化","freq":"高頻"},{"word":"distribution","pos":"n.","meaning":"分佈、傳輸範圍","freq":"高頻"}],"pattern":{"name":"on + 表面（放置於某物之上）","note":"on 用於描述物體放置在某個平面之上並產生接觸，如 on the shelf、on the desk、on the wall。","example":"The backup generator is mounted on a reinforced platform in the basement."}},{"id":"x-q149","category":"conj","categoryName":"連接詞辨析","question":"The firm achieved record output ___ the technical team optimized the layout.","options":["after","before","until","unless"],"answer":0,"difficulty":"中階","translation":"在技術團隊優化了廠房佈局之後，公司達到了創紀錄的產量。","explanation":"解題線索：空格後方是「the technical team optimized the layout」這個完整子句，且語意是「先優化佈局，後達到高產量」的時間先後順序。適用文法規則：after + 子句，表示「在…之後」，引導時間子句說明前一事件發生的時間點；before 語意相反（在…之前），若套入會變成「優化佈局之前就達到了紀錄產量」，因果順序不合理。為何是正解：after the team optimized 精準表達「優化佈局之後才達到創紀錄產量」的合理因果時序。","optionNotes":["正解：after 表示「在…之後」，符合「優化佈局之後達到創紀錄產量」的合理時間與因果順序。","before 表示「在…之前」，若套入會變成「在優化佈局之前就達到創紀錄產量」，與常理（先優化才能提升產量）矛盾，不合邏輯。","until 表示「直到…為止」，通常搭配持續性的狀態或否定句，與「達到創紀錄產量」這種單一事件的時間點語意不符。","unless 表示「除非」的條件語意，與描述「優化之後達到紀錄」的既成時間順序事實不符。"],"keyWords":[{"word":"output","pos":"n.","meaning":"產量、產出","freq":"高頻"},{"word":"layout","pos":"n.","meaning":"佈局、配置","freq":"中頻"},{"word":"optimize","pos":"v.","meaning":"優化","freq":"中頻"}],"pattern":{"name":"after + S + V（事件發生順序）","note":"after 引導的子句說明「先發生的事件」，主句則是「後發生的結果」，用於描述兩個動作的先後時間順序。","example":"Sales improved significantly after the company redesigned its website."}},{"id":"x-q150","category":"prep","categoryName":"介係詞","question":"The database cluster is protected against external intrusions ___ a multi-layered hardware firewall.","options":["by","from","through","with"],"answer":0,"difficulty":"進階","translation":"資料庫叢集透過多層次的硬體防火牆防範外部入侵。","explanation":"解題線索：句子已用「against external intrusions」表達「抵禦…的對象」，空格後方需要說明「執行防護這個動作的機制/媒介」。適用文法規則：be protected against A by B，表示「靠B的作用抵禦A」，by 在此引導執行防護動作的機制，屬於被動語態中常見的「by + 動作執行者/機制」結構；with 若在此重複使用會與 against 的介系詞邏輯衝突，語感上不如 by 直接銜接被動語態的執行機制。為何是正解：protected against intrusions by a firewall 文法清晰，by 精準點出「防火牆」是達成防護效果的機制。","optionNotes":["正解：by 在被動句中引導動作的執行者或機制，protected...by a firewall 表示防火牆是達成防護效果的機制，文法標準。","from 通常搭配 protect...from...表示「保護…免於」，但此處 from 前方應直接接保護對象而非再引出防護機制，若放在此處會與句首的 against 語意重複衝突。","through 表示「透過某方式/媒介」，語意上可通但不如 by 在「protected by + 機制」這個被動句型中來得標準、常見。","with 表示使用的工具，但此句已用 against 表達抵禦對象，再用 with 銜接會使句子出現兩個並列介系詞片語而語意疊床架屋，不如 by 銜接被動語態自然。"],"keyWords":[{"word":"intrusion","pos":"n.","meaning":"入侵","freq":"中頻"},{"word":"firewall","pos":"n.","meaning":"防火牆","freq":"中頻"},{"word":"cluster","pos":"n.","meaning":"叢集","freq":"低頻"}],"pattern":{"name":"be protected against A by B","note":"protect A from/against B 表示「保護A免受B侵害」；被動句中若要再指出「靠什麼機制達成保護」，常用 by + 機制/工具，形成 be protected against B by C 的結構。","example":"The facility is safeguarded against unauthorized access by a biometric security system."}},{"id":"x-q151","category":"conj","categoryName":"連接詞辨析","question":"The quality control team will not approve the release ___ all testing logs are completed.","options":["despite","during","whereas","unless"],"answer":3,"difficulty":"中階","translation":"除非所有測試日誌都已完成，否則品管團隊不會核准發布。","explanation":"解題線索：空格後方是「all testing logs are completed」這個完整子句，且主句是否定句「will not approve」，語意是「缺少此條件則不核准」。適用文法規則：unless + 子句，表示「除非」，等同於 if...not...，引導否定條件子句；during 是介系詞須接名詞不能接子句。為何是正解：unless all logs are completed 精準表達「除非測試日誌全部完成，否則不予核准」的條件邏輯，是品管流程中常見的表達方式。","optionNotes":["despite 是介系詞，同樣只能接名詞，且語意「儘管」與此處的條件邏輯不符。","during 是純介系詞，只能接名詞片語（如 during the testing phase），不能直接接完整子句 all testing logs are completed，詞性不合。","whereas 表示「然而、對比」，用於比較兩個相反的情況，與「除非達成某條件才核准」的條件語意不符。","正解：unless 表示「除非」，符合「除非日誌完成，否則不核准」的否定條件語意，且可接完整子句。"],"keyWords":[{"word":"approve","pos":"v.","meaning":"核准","freq":"高頻"},{"word":"testing log","pos":"n.","meaning":"測試日誌","freq":"低頻"},{"word":"release","pos":"n.","meaning":"發布、版本","freq":"高頻"}],"pattern":{"name":"unless + S + V（除非，等同 if...not）","note":"unless 引導的子句表示「除非」，語意上等同於「if...not...」，常用於描述必要條件不滿足時的否定結果。","example":"The vendor will not release the goods unless full payment has been received."}},{"id":"x-q152","category":"prep","categoryName":"介係詞","question":"Please keep your security badge visible ___ all times while within the corporate perimeter.","options":["at","in","on","with"],"answer":0,"difficulty":"基礎","translation":"在公司範圍內時，請隨時保持識別證清楚可見。","explanation":"解題線索：空格後方是「all times」，這是固定片語的一部分。適用文法規則：at all times 為固定介系詞片語，意為「隨時、任何時候」，是英文中表達「一直、始終」的標準用法。為何是正解：at all times 是唯一符合英語慣用搭配的組合，其餘介系詞不能與 all times 搭配出「隨時」的意思。","optionNotes":["正解：at all times 為固定片語，意為「隨時、無論何時」，是安全規範文件中極常見的用語。","in 用於較長的時間範圍（如 in the future），與 all times 不構成慣用搭配。","on 通常用於特定日期或依據某平台，不與 all times 構成固定搭配。","with 表示「伴隨、使用」，與「隨時保持可見」的固定片語用法不符。"],"keyWords":[{"word":"visible","pos":"adj.","meaning":"可見的","freq":"中頻"},{"word":"perimeter","pos":"n.","meaning":"周界、範圍","freq":"中頻"},{"word":"security badge","pos":"n.","meaning":"安全識別證","freq":"中頻"}],"pattern":{"name":"at all times","note":"at all times 為固定慣用片語，意為「隨時、始終」，常見於規範、守則類文件中要求持續遵守的描述。","example":"Visitors must wear an identification badge at all times inside the facility."}},{"id":"x-q153","category":"prep","categoryName":"介係詞","question":"___ the recent upgrade in software architecture, the processing time has decreased by half.","options":["While","Even if","Following","Unless"],"answer":2,"difficulty":"進階","translation":"在最近的軟體架構升級之後，處理時間已減少了一半。","explanation":"解題線索：空格後方是「the recent upgrade in software architecture」這個名詞片語，並非完整子句。適用文法規則：Following 可作介系詞使用，意同 after，直接接名詞片語；While、Unless、Even if 皆為連接詞，須接「主詞+動詞」的完整子句。為何是正解：Following the recent upgrade 文法正確（介系詞+名詞），且語意表達「軟體升級之後，處理時間隨之減少」的時間因果順序。","optionNotes":["While 是連接詞，須接完整子句（如 while the software was upgraded），不能直接接名詞片語 the recent upgrade，詞性不合。","Even if 是連接詞片語，表示「即使」的假設讓步語意，須接完整子句，同樣不能直接接名詞片語。","正解：Following 作介系詞使用，意同 after，可直接接名詞片語 the recent upgrade，文法與語意皆正確。","Unless 是連接詞，表示「除非」的條件語意，須接完整子句，且與「升級之後處理時間減少」的既成事實語意不符。"],"keyWords":[{"word":"architecture","pos":"n.","meaning":"架構","freq":"中頻"},{"word":"upgrade","pos":"n./v.","meaning":"升級","freq":"高頻"},{"word":"processing time","pos":"n.","meaning":"處理時間","freq":"中頻"}],"pattern":{"name":"Following + N（介系詞，意同 after）","note":"Following 放在句首作介系詞使用時，意同 after，後面直接接名詞片語，說明後續結果發生的時間背景。","example":"Following the policy change, employee turnover dropped noticeably."}},{"id":"x-q154","category":"prep","categoryName":"介係詞","question":"The legal department requested that the contract be delivered ___ courier service.","options":["at","in","on","by"],"answer":3,"difficulty":"基礎","translation":"法務部門要求合約透過快遞服務送達。","explanation":"解題線索：空格後方是「courier service」，這是遞送合約所採用的傳遞方式/管道。適用文法規則：by + 傳遞/交通方式，表示「透過…的方式」，如 by courier、by email、by mail、by train，是固定的表方式介系詞。為何是正解：by courier service 精準表達合約是透過快遞這個管道送達的。","optionNotes":["at 用於定點位置，與「透過快遞服務遞送」的方式語意不符。","in 用於較長時間範圍或封閉空間，不能表達「藉由某種遞送方式」的手段語意。","on 通常用於依據某平台或表面接觸，不用於表達「透過某種遞送方式」。","正解：by 表示「透過某種傳遞/交通方式」，courier service 是遞送合約的管道，用法標準。"],"keyWords":[{"word":"courier service","pos":"n.","meaning":"快遞服務","freq":"中頻"},{"word":"deliver","pos":"v.","meaning":"遞送、交付","freq":"高頻"},{"word":"legal department","pos":"n.","meaning":"法務部門","freq":"高頻"}],"pattern":{"name":"by + 傳遞/交通方式","note":"by 常用於表達「透過某種方式或管道」，如 by courier、by email、by phone、by bus，是描述遞送或聯繫方式的標準介系詞。","example":"The signed documents were sent by courier to ensure same-day delivery."}},{"id":"x-q155","category":"prep","categoryName":"介係詞","question":"The project schedule remains unchanged ___ the unexpected delay in material delivery.","options":["because of","so that","unless","in spite of"],"answer":3,"difficulty":"中階","translation":"儘管材料交貨出現了意外延誤，專案時程仍維持不變。","explanation":"解題線索：空格後方是「the unexpected delay in material delivery」這個名詞片語，且與前句「時程維持不變」形成語意上的轉折反差。適用文法規則：in spite of + 名詞，表示「儘管」的讓步關係，後接名詞片語；because of 表因果、so that 須接子句表目的、unless 須接子句表條件，皆與此處的讓步邏輯或詞性不符。為何是正解：in spite of the unexpected delay 精準表達「儘管發生了意外延誤，時程仍不受影響」的讓步語意。","optionNotes":["because of 表示因果關係「因為」，若套入會變成「因為延誤所以時程不變」，因果邏輯不合常理。","so that 是連接詞須接完整子句表目的（如 so that the schedule remains），不能直接接名詞片語 the unexpected delay，詞性不合。","unless 是連接詞須接完整子句表條件，且語意「除非」與「儘管發生延誤仍不變」的既成事實讓步語意不符。","正解：in spite of 表示「儘管」的讓步語意，後接名詞片語 the unexpected delay，符合「延誤發生但時程不變」的轉折邏輯。"],"keyWords":[{"word":"unchanged","pos":"adj.","meaning":"不變的","freq":"中頻"},{"word":"material delivery","pos":"n.","meaning":"材料交貨","freq":"中頻"},{"word":"unexpected","pos":"adj.","meaning":"意外的、預料之外的","freq":"高頻"}],"pattern":{"name":"in spite of / despite + N（讓步）","note":"in spite of 與 despite 用法相同，皆為介系詞片語，後接名詞或動名詞，表示「儘管」的讓步轉折，與 although/even though + 子句可互換但詞性不同。","example":"Sales figures improved in spite of the challenging economic conditions."}},{"id":"x-q1
