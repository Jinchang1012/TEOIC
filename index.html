mplishments"],"freq":"中頻","tip":"動詞 accomplish（達成），常出現在表揚信或推薦信中，與 achievement 幾乎同義。"},{"id":"x-v716","theme":"biz","themeName":"會議、行銷與業務","word":"hold","pos":"v.","meaning":"舉辦","example":"The marketing department will hold a product launch event next month.","exampleZh":"行銷部門下個月將舉辦一場產品發表活動。","collocations":["hold an event","hold a meeting","hold a position"],"freq":"極高頻","tip":"hold a meeting/event（舉行會議/活動）是多益必考搭配，另有「持有職位」等多重字義。"},{"id":"x-v717","theme":"trv","themeName":"出差與旅遊","word":"accompany","pos":"v.","meaning":"伴隨、陪同","example":"An interpreter will accompany the delegation throughout their business trip.","exampleZh":"一位口譯員將全程陪同代表團的商務出差行程。","collocations":["accompany sb","be accompanied by","accompanying documents"],"freq":"中頻","tip":"常見被動式 be accompanied by（由…陪同），accompanying documents（隨附文件）也常出現在信函中。"},{"id":"x-v718","theme":"office","themeName":"辦公室與人資","word":"in recognition of","pos":"phr.","meaning":"以表彰、肯定","example":"She received a bonus in recognition of her outstanding sales performance.","exampleZh":"她因傑出的銷售表現而獲得獎金以資表彰。","collocations":["in recognition of her efforts","award in recognition of","gain recognition"],"freq":"中頻","tip":"常出現在頒獎或表揚信函開頭，句構固定為 in recognition of + N，介系詞不可換成 for。"},{"id":"x-v719","theme":"office","themeName":"辦公室與人資","word":"agency","pos":"n.","meaning":"仲介機構","example":"The company hired a recruitment agency to fill the vacant management position.","exampleZh":"公司委託一家人力仲介機構來填補這個空缺的管理職位。","collocations":["recruitment agency","travel agency","government agency"],"freq":"高頻","tip":"recruitment/travel/government agency 是常見複合詞，字尾 -cy 名詞注意拼寫。"},{"id":"x-v720","theme":"office","themeName":"辦公室與人資","word":"contribution","pos":"n.","meaning":"貢獻","example":"The team praised his contribution to the successful product launch.","exampleZh":"團隊讚揚他對這次成功產品發表所做的貢獻。","collocations":["make a contribution","contribution to","valuable contribution"],"freq":"高頻","tip":"動詞 contribute（貢獻），固定介系詞 contribution to（對…的貢獻），感謝信函高頻字。"},{"id":"x-v721","theme":"office","themeName":"辦公室與人資","word":"apply for","pos":"phr.","meaning":"申請…","example":"Candidates interested in the position should apply for it by Friday.","exampleZh":"對這個職位有興趣的應徵者應在週五前提出申請。","collocations":["apply for a job","apply for a loan","apply for leave"],"freq":"極高頻","tip":"名詞 application（申請書），apply to（申請就讀某校）與 apply for（申請某物）介系詞不同要分清。"},{"id":"x-v722","theme":"office","themeName":"辦公室與人資","word":"in response to","pos":"phr.","meaning":"回應…","example":"In response to customer feedback, the app added a dark mode feature.","exampleZh":"為回應顧客的意見反映，這款應用程式新增了深色模式功能。","collocations":["in response to feedback","respond to a request","in response to inquiries"],"freq":"高頻","tip":"常置於句首當轉折語，後接名詞而非子句，動詞 respond to 需固定搭配介系詞 to。"},{"id":"x-v723","theme":"office","themeName":"辦公室與人資","word":"excellence in","pos":"phr.","meaning":"在…方面卓越","example":"The award recognizes excellence in customer service among retail employees.","exampleZh":"這個獎項表彰零售業員工在顧客服務方面的卓越表現。","collocations":["award for excellence in","excellence in service","strive for excellence"],"freq":"中頻","tip":"常見於獎項名稱 Award for Excellence in + 領域，形容詞 excellent 是常考詞性轉換。"},{"id":"x-v724","theme":"media","themeName":"媒體與活動","word":"post","pos":"v.","meaning":"發表、張貼","example":"The HR department posted the job opening on the company's career website.","exampleZh":"人資部門把職缺公告張貼在公司的徵才網站上。","collocations":["post a job opening","post online","post a notice"],"freq":"高頻","tip":"也可當名詞指「職位」（apply for a post），社群媒體用法為「發文」，多重字義需依語境判斷。"},{"id":"x-v725","theme":"office","themeName":"辦公室與人資","word":"development","pos":"n.","meaning":"發展、開發","example":"The firm allocated more resources to product development this year.","exampleZh":"該公司今年撥出更多資源用於產品開發。","collocations":["product development","professional development","career development"],"freq":"極高頻","tip":"professional/career development（職涯發展）在人資文件中極常見，動詞 develop 三態要熟記。"},{"id":"x-v726","theme":"office","themeName":"辦公室與人資","word":"bachelor's degree","pos":"n.","meaning":"學士學位","example":"A bachelor's degree in business administration is preferred for this role.","exampleZh":"這個職位偏好具有企業管理學士學位的應徵者。","collocations":["hold a bachelor's degree","bachelor's degree in","master's degree"],"freq":"高頻","tip":"與 undergraduate degree 同義，注意所有格撇號 bachelor's，徵才啟事學歷要求常見詞。"},{"id":"x-v727","theme":"office","themeName":"辦公室與人資","word":"effort","pos":"n.","meaning":"努力","example":"The department made a joint effort to meet the tight project deadline.","exampleZh":"該部門共同努力以趕上緊迫的專案期限。","collocations":["joint effort","make an effort","in an effort to"],"freq":"高頻","tip":"in an effort to（為了…而努力）是常見轉折片語，後接原形動詞，商業報導文章高頻用語。"},{"id":"x-v728","theme":"office","themeName":"辦公室與人資","word":"extensive","pos":"adj.","meaning":"廣泛的","example":"The candidate has extensive experience managing international teams.","exampleZh":"這位候選人擁有管理跨國團隊的豐富經驗。","collocations":["extensive experience","extensive research","extensive network"],"freq":"高頻","tip":"常搭配 experience/research/damage，副詞 extensively 也常見，強調範圍或程度之廣。"},{"id":"x-v729","theme":"office","themeName":"辦公室與人資","word":"promote","pos":"v.","meaning":"促進、晉升","example":"She was promoted to senior manager after five years with the firm.","exampleZh":"她在公司任職五年後被晉升為資深經理。","collocations":["promote to","promote a product","get promoted"],"freq":"高頻","tip":"兩大字義：人事晉升（be promoted to）與行銷推廣（promote a product），名詞 promotion 同樣雙義。"},{"id":"x-v730","theme":"media","themeName":"媒體與活動","word":"awareness","pos":"n.","meaning":"認知、意識","example":"The campaign aims to raise public awareness of workplace safety issues.","exampleZh":"這項活動旨在提升大眾對職場安全議題的意識。","collocations":["raise awareness","public awareness","brand awareness"],"freq":"高頻","tip":"raise awareness（提升認知）與 brand awareness（品牌知名度）是行銷與公關文章高頻搭配。"},{"id":"x-v731","theme":"office","themeName":"辦公室與人資","word":"actual","pos":"adj.","meaning":"實際的","example":"The actual cost of the renovation exceeded the original estimate.","exampleZh":"裝修的實際費用超過了原本的估算。","collocations":["actual cost","actual figures","in actual fact"],"freq":"高頻","tip":"常與 estimated/projected（預估的）對比出現在財報中，副詞 actually 常表轉折「事實上」。"},{"id":"x-v732","theme":"office","themeName":"辦公室與人資","word":"achievement","pos":"n.","meaning":"成就","example":"The annual report highlights the company's key achievements this year.","exampleZh":"年度報告凸顯了公司今年的重要成就。","collocations":["key achievement","sense of achievement","academic achievement"],"freq":"高頻","tip":"動詞 achieve，與 accomplishment 幾乎同義可互換，常見於年度回顧與表揚類文章。"},{"id":"x-v733","theme":"office","themeName":"辦公室與人資","word":"simulate","pos":"v.","meaning":"模擬","example":"The training program simulates real customer service scenarios for new hires.","exampleZh":"這套訓練課程為新進員工模擬真實的客服情境。","collocations":["simulate a scenario","computer simulation","simulate conditions"],"freq":"中頻","tip":"名詞 simulation（模擬），常見於訓練與測試類文章，如 simulate real-world conditions。"},{"id":"x-v734","theme":"office","themeName":"辦公室與人資","word":"tireless","pos":"adj.","meaning":"孜孜不倦的","example":"Her tireless dedication to the project earned her a special recognition award.","exampleZh":"她對這個專案孜孜不倦的奉獻為她贏得了一項特別表揚獎。","collocations":["tireless dedication","tireless effort","tireless work ethic"],"freq":"中頻","tip":"tire（疲累）加 -less（無…的），字面「不知疲倦的」，常見於表揚信中形容員工的努力。"},{"id":"x-v735","theme":"office","themeName":"辦公室與人資","word":"peer","pos":"n.","meaning":"同儕","example":"Employees can nominate a peer for the monthly recognition award.","exampleZh":"員工可以提名一位同儕角逐每月的表揚獎項。","collocations":["peer review","among peers","peer recognition"],"freq":"中頻","tip":"peer review（同儕審查）是常見複合詞，也可當動詞 peer（凝視），依語境判斷詞性。"},{"id":"x-v736","theme":"office","themeName":"辦公室與人資","word":"dedication","pos":"n.","meaning":"奉獻","example":"The retirement speech praised his years of dedication to the company.","exampleZh":"這場退休致詞讚揚了他多年來對公司的奉獻。","collocations":["years of dedication","dedication to","show dedication"],"freq":"中頻","tip":"動詞 dedicate（奉獻），形容詞 dedicated（盡心盡力的），常見於表揚與惜別類文章。"},{"id":"x-v737","theme":"office","themeName":"辦公室與人資","word":"conscientious","pos":"adj.","meaning":"負責任的、盡責的","example":"The manager described her as a conscientious employee who never misses deadlines.","exampleZh":"經理形容她是一位從不錯過期限、盡責的員工。","collocations":["conscientious employee","conscientious effort","conscientious worker"],"freq":"中頻","tip":"拼字較難注意 -sc-，語意近似 careful and hardworking，常出現在績效評核與推薦信中。"},{"id":"x-v738","theme":"pattern","themeName":"句型","word":"be delighted to do","pos":"句型","meaning":"感到高興做…","example":"We are delighted to announce the opening of our new downtown branch.","exampleZh":"我們很高興宣布市中心新分店的開幕。","collocations":["be delighted to announce","be delighted to inform you","be delighted with"],"freq":"高頻","tip":"be delighted to + 原形動詞，商業書信開頭常見正式用語，比 be happy to 語氣更正式。"},{"id":"x-v739","theme":"office","themeName":"辦公室與人資","word":"suitable","pos":"adj.","meaning":"適當的","example":"The venue was deemed suitable for hosting the annual conference.","exampleZh":"這個場地被認為適合舉辦年度大會。","collocations":["suitable for","most suitable candidate","suitable venue"],"freq":"高頻","tip":"固定介系詞 suitable for（適合於…），反義詞 unsuitable，招募與活動企劃類文章常見。"},{"id":"x-v740","theme":"biz","themeName":"會議、行銷與業務","word":"attend","pos":"v.","meaning":"參加","example":"All department heads are required to attend the quarterly strategy meeting.","exampleZh":"所有部門主管都必須參加這場季度策略會議。","collocations":["attend a meeting","attend a conference","attendance record"],"freq":"極高頻","tip":"attend 是及物動詞，後面不加介系詞（不可說 attend to a meeting 表出席），為常見文法陷阱。"},{"id":"x-v741","theme":"office","themeName":"辦公室與人資","word":"faculty","pos":"n.","meaning":"全體人員、（大學）系所","example":"The faculty voted to revise the employee evaluation process.","exampleZh":"全體教職員投票表決修訂員工考核流程。","collocations":["faculty member","faculty meeting","join the faculty"],"freq":"中頻","tip":"多益中常泛指「（機構）全體職員」，教育類文章則指「（大學）學院、系所」，注意語境。"},{"id":"x-v742","theme":"office","themeName":"辦公室與人資","word":"approach","pos":"n.","meaning":"方法","example":"The consultant recommended a more data-driven approach to decision-making.","exampleZh":"顧問建議採取更以數據為導向的決策方法。","collocations":["approach to","new approach","take a different approach"],"freq":"高頻","tip":"固定介系詞 approach to（…的方法），動詞同形 approach（接近、著手處理），詞性判斷是考點。"},{"id":"x-v743","theme":"office","themeName":"辦公室與人資","word":"give in","pos":"phr.","meaning":"屈服、交出","example":"After lengthy negotiations, management finally gave in to the union's demands.","exampleZh":"經過冗長的協商，管理層最終向工會的要求讓步。","collocations":["give in to demands","give in to pressure","refuse to give in"],"freq":"中頻","tip":"give in to sth（向…屈服讓步），另一義是「繳交」作業，多益考的通常是「讓步」義。"},{"id":"x-v744","theme":"biz","themeName":"會議、行銷與業務","word":"attract","pos":"v.","meaning":"吸引","example":"The discount promotion was designed to attract new customers to the store.","exampleZh":"這項折扣促銷活動的設計是為了吸引新顧客上門。","collocations":["attract customers","attract attention","attract investment"],"freq":"高頻","tip":"名詞 attraction（吸引力、景點），形容詞 attractive（吸引人的），行銷類文章高頻字族。"},{"id":"x-v745","theme":"office","themeName":"辦公室與人資","word":"hand in","pos":"phr.","meaning":"繳交","example":"All employees must hand in their expense reports by the end of the month.","exampleZh":"所有員工必須在月底前繳交費用報告。","collocations":["hand in a report","hand in an application","hand in resignation"],"freq":"高頻","tip":"與 submit 意思相近但較口語，hand in one's resignation（提出辭呈）是常見搭配。"},{"id":"x-v746","theme":"office","themeName":"辦公室與人資","word":"approve","pos":"v.","meaning":"批准","example":"The finance director must approve all expenditures over a certain amount.","exampleZh":"財務總監必須批准所有超過一定金額的支出。","collocations":["approve a request","get approved","subject to approval"],"freq":"極高頻","tip":"名詞 approval，片語 subject to approval（有待核准）常見於合約與流程文件。"},{"id":"x-v747","theme":"office","themeName":"辦公室與人資","word":"employment","pos":"n.","meaning":"雇用、就業","example":"The contract outlines the terms of employment, including salary and benefits.","exampleZh":"這份合約列出了雇用條款，包括薪資與福利。","collocations":["terms of employment","seek employment","employment history"],"freq":"高頻","tip":"terms of employment（雇用條款）、employment history（工作經歷）是徵才與合約高頻搭配。"},{"id":"x-v748","theme":"office","themeName":"辦公室與人資","word":"government","pos":"n.","meaning":"政府","example":"New government regulations require companies to disclose environmental data.","exampleZh":"新的政府法規要求企業揭露環境相關數據。","collocations":["government regulations","government agency","local government"],"freq":"高頻","tip":"government regulations/agency 是政策法規類文章高頻搭配，注意拼字 -rn-。"},{"id":"x-v749","theme":"office","themeName":"辦公室與人資","word":"opportunity","pos":"n.","meaning":"機會","example":"The internship program offers students an opportunity to gain hands-on experience.","exampleZh":"這項實習計畫提供學生獲得實務經驗的機會。","collocations":["opportunity to","job opportunity","equal opportunity"],"freq":"極高頻","tip":"equal opportunity employer（公平雇用機會雇主）是徵才啟事固定用語，介系詞固定為 to。"},{"id":"x-v750","theme":"office","themeName":"辦公室與人資","word":"determine","pos":"v.","meaning":"確定、決定","example":"The committee will determine the winner based on customer votes.","exampleZh":"委員會將根據顧客投票來決定得獎者。","collocations":["determine the outcome","yet to be determined","determine eligibility"],"freq":"高頻","tip":"名詞 determination，片語 to be determined（TBD，尚待確定）常出現在議程與行程表中。"},{"id":"x-v751","theme":"fin","themeName":"財務、採購與物流","word":"stockholder","pos":"n.","meaning":"股東","example":"Stockholders will vote on the proposed merger at the annual meeting.","exampleZh":"股東將在年度會議上針對提議的合併案進行表決。","collocations":["stockholder meeting","majority stockholder","stockholder approval"],"freq":"中頻","tip":"與 shareholder 同義可互換，財報與公司治理文章常見，注意複數形拼寫。"},{"id":"x-v752","theme":"office","themeName":"辦公室與人資","word":"corporation","pos":"n.","meaning":"公司、企業","example":"The corporation announced record profits for the third consecutive quarter.","exampleZh":"這家企業宣布連續第三季創下獲利紀錄。","collocations":["multinational corporation","corporation tax","incorporate a business"],"freq":"高頻","tip":"形容詞 corporate（企業的，如 corporate culture），常見縮寫 Corp. 出現在公司名稱中。"},{"id":"x-v753","theme":"office","themeName":"辦公室與人資","word":"entirely","pos":"adv.","meaning":"完全地","example":"The decision to relocate the office was entirely based on cost considerations.","exampleZh":"搬遷辦公室的決定完全是基於成本考量。","collocations":["entirely based on","entirely different","not entirely sure"],"freq":"中頻","tip":"形容詞 entire（整個的），常修飾 based on/different，強調「毫無例外地」。"},{"id":"x-v754","theme":"est","themeName":"租賃與房產","word":"resident","pos":"n.","meaning":"居民","example":"Local residents were notified in advance about the upcoming road construction.","exampleZh":"當地居民事先被告知即將進行的道路施工。","collocations":["local resident","notify residents","resident association"],"freq":"高頻","tip":"形容詞同形 resident（居住的），residence（名詞，住所）常搭配使用，租賃類文章高頻字。"},{"id":"x-v755","theme":"office","themeName":"辦公室與人資","word":"concern about","pos":"phr.","meaning":"對…感到擔心","example":"Several staff members expressed concern about the upcoming layoffs.","exampleZh":"幾位員工對即將到來的裁員表達了擔憂。","collocations":["express concern about","growing concern about","concern about safety"],"freq":"高頻","tip":"介系詞固定用 about（而非 for），動詞可用 be concerned about，人資與新聞報導類文章常見。"},{"id":"x-v756","theme":"trv","themeName":"出差與旅遊","word":"vehicle","pos":"n.","meaning":"車輛","example":"The company provides a company vehicle for employees who travel frequently.","exampleZh":"公司為經常出差的員工提供公務車輛。","collocations":["company vehicle","rental vehicle","vehicle maintenance"],"freq":"高頻","tip":"正式用字，泛指所有交通工具（car/truck/van 等），常搭配 rental/company/maintenance。"},{"id":"x-v757","theme":"est","themeName":"租賃與房產","word":"district","pos":"n.","meaning":"地區","example":"The new office is located in the city's central business district.","exampleZh":"新辦公室位於市中心的商業區。","collocations":["business district","shopping district","school district"],"freq":"高頻","tip":"business district（商業區）是房地產與都市規劃類文章高頻複合詞，比 region 範圍小且具行政意涵。"},{"id":"x-v758","theme":"biz","themeName":"會議、行銷與業務","word":"dealer","pos":"n.","meaning":"經銷商","example":"The manufacturer relies on authorized dealers to distribute its products locally.","exampleZh":"製造商依靠授權經銷商在當地銷售其產品。","collocations":["authorized dealer","car dealer","dealer network"],"freq":"中頻","tip":"動詞 deal（交易），authorized dealer（授權經銷商）是常見搭配，注意與 retailer/wholesaler 區別。"},{"id":"x-v759","theme":"office","themeName":"辦公室與人資","word":"protect","pos":"v.","meaning":"保護","example":"The new policy is designed to protect employees' personal data.","exampleZh":"這項新政策旨在保護員工的個人資料。","collocations":["protect data","protect employees","protection against"],"freq":"高頻","tip":"名詞 protection，固定介系詞 protection against/from（防範…的保護），資安與人資文件常見。"},{"id":"x-v760","theme":"office","themeName":"辦公室與人資","word":"department","pos":"n.","meaning":"部門","example":"The finance department is reviewing all vendor contracts this quarter.","exampleZh":"財務部門本季度正在審查所有供應商合約。","collocations":["finance department","department head","interdepartmental"],"freq":"極高頻","tip":"department head（部門主管）是職稱高頻詞，interdepartmental（跨部門的）也常出現於閱讀題。"},{"id":"x-v761","theme":"trv","themeName":"出差與旅遊","word":"book","pos":"v.","meaning":"預約、預訂","example":"Please book your flights at least two weeks before the conference.","exampleZh":"請在會議開始前至少兩週訂好機票。","collocations":["book a flight","book a hotel room","fully booked"],"freq":"極高頻","tip":"fully booked（已被訂滿）常出現在旅遊與住宿類文章，名詞用法 book（書）需依語境區分。"},{"id":"x-v762","theme":"biz","themeName":"會議、行銷與業務","word":"bid for","pos":"phr.","meaning":"對…出價、投標","example":"Three construction firms submitted bids for the new office building project.","exampleZh":"三家營造公司針對這項新辦公大樓專案提交了投標。","collocations":["bid for a contract","submit a bid","successful bid"],"freq":"中頻","tip":"名詞用法 submit a bid（提交標案）也很常見，動詞三態 bid-bid-bid 不規則變化要注意。"},{"id":"x-v763","theme":"biz","themeName":"會議、行銷與業務","word":"personalized","pos":"adj.","meaning":"個人化的","example":"The app offers personalized recommendations based on customer purchase history.","exampleZh":"這款應用程式根據顧客購買紀錄提供個人化推薦。","collocations":["personalized service","personalized recommendation","personalized experience"],"freq":"中頻","tip":"動詞 personalize（客製化），行銷類文章常搭配 service/recommendation/experience。"},{"id":"x-v764","theme":"fin","themeName":"財務、採購與物流","word":"bankrupt","pos":"adj.","meaning":"破產的","example":"The retailer filed for bankruptcy after years of declining sales.","exampleZh":"這家零售商在銷售額連年下滑後申請破產。","collocations":["go bankrupt","file for bankruptcy","declare bankruptcy"],"freq":"中頻","tip":"名詞 bankruptcy（破產），固定片語 file for bankruptcy（聲請破產），財經新聞高頻用語。"},{"id":"x-v765","theme":"office","themeName":"辦公室與人資","word":"detail","pos":"v.","meaning":"詳述","example":"The memo details the new procedures for submitting expense reports.","exampleZh":"這份備忘錄詳細說明了提交費用報告的新程序。","collocations":["detail the procedure","in detail","further details"],"freq":"高頻","tip":"當動詞是「詳述」，名詞則是「細節」，in detail（詳細地）為常見副詞片語。"},{"id":"x-v766","theme":"fin","themeName":"財務、採購與物流","word":"installation","pos":"n.","meaning":"安裝","example":"The technician scheduled the installation of new equipment for Monday morning.","exampleZh":"技術人員安排週一早上進行新設備的安裝。","collocations":["installation process","schedule an installation","installation fee"],"freq":"中頻","tip":"動詞 install（安裝），常搭配 process/fee/schedule，製造與IT相關文章高頻字。"},{"id":"x-v767","theme":"fin","themeName":"財務、採購與物流","word":"glue","pos":"n.","meaning":"黏著劑","example":"The manufacturer switched to a stronger glue to prevent packaging from coming apart.","exampleZh":"製造商改用更強效的黏著劑，以防止包裝散開。","collocations":["strong glue","apply glue","glue together"],"freq":"中頻","tip":"也可當動詞 glue sth together（把…黏在一起），製造業產品說明書常見用字。"},{"id":"x-v768","theme":"office","themeName":"辦公室與人資","word":"impressive","pos":"adj.","meaning":"令人印象深刻的","example":"The candidate's impressive résumé stood out among all the applicants.","exampleZh":"這位候選人令人印象深刻的履歷在所有應徵者中脫穎而出。","collocations":["impressive résumé","impressive results","truly impressive"],"freq":"高頻","tip":"動詞 impress（使印象深刻），常搭配 résumé/results/performance 等正面名詞。"},{"id":"x-v769","theme":"fin","themeName":"財務、採購與物流","word":"strength","pos":"n.","meaning":"強度、優勢","example":"The material's strength makes it ideal for heavy industrial use.","exampleZh":"這種材料的強度使其非常適合用於重工業用途。","collocations":["material strength","strength and weakness","financial strength"],"freq":"中頻","tip":"strengths and weaknesses（優缺點）是常見對比片語，也可指「財務實力」financial strength。"},{"id":"x-v770","theme":"med","themeName":"醫療與保健","word":"suffer","pos":"v.","meaning":"遭受","example":"The company suffered significant losses due to the supply chain disruption.","exampleZh":"該公司因供應鏈中斷而遭受重大損失。","collocations":["suffer losses","suffer from","suffer a setback"],"freq":"高頻","tip":"suffer from（罹患、深受…之苦）常用於健康或問題語境，suffer losses 則用於財務語境。"},{"id":"x-v771","theme":"office","themeName":"辦公室與人資","word":"witness","pos":"v.","meaning":"見證、目擊","example":"The industry has witnessed rapid growth in online sales over the past decade.","exampleZh":"該產業在過去十年間見證了網路銷售的快速成長。","collocations":["witness growth","witness a change","eyewitness account"],"freq":"中頻","tip":"常以非人稱主詞（industry/market/city）搭配 witness growth/change，是報導文章常見修辭。"},{"id":"x-v772","theme":"est","themeName":"租賃與房產","word":"ventilation","pos":"n.","meaning":"通風","example":"The building's poor ventilation was cited as a health and safety concern.","exampleZh":"這棟建築物通風不良被列為健康與安全方面的疑慮。","collocations":["poor ventilation","ventilation system","proper ventilation"],"freq":"中頻","tip":"動詞 ventilate（使通風），常見於租賃房產與職業安全類文章描述建築物條件。"},{"id":"x-v773","theme":"fin","themeName":"財務、採購與物流","word":"combine","pos":"v.","meaning":"結合","example":"The two departments will combine their budgets to fund the new initiative.","exampleZh":"這兩個部門將合併預算以資助這項新計畫。","collocations":["combine resources","combine forces","in combination with"],"freq":"高頻","tip":"名詞 combination，片語 in combination with（與…結合）常見於財務與策略類文章。"},{"id":"x-v774","theme":"hosp","themeName":"餐飲與住宿","word":"nutritious","pos":"adj.","meaning":"營養的","example":"The cafeteria now offers more nutritious meal options for employees.","exampleZh":"員工餐廳現在提供更多營養的餐點選擇。","collocations":["nutritious meal","nutritious diet","nutritious food"],"freq":"中頻","tip":"名詞 nutrition（營養），與 nutritional（營養學上的）拼寫相近但詞性不同，需分辨。"},{"id":"x-v775","theme":"biz","themeName":"會議、行銷與業務","word":"innovative","pos":"adj.","meaning":"創新的","example":"The startup is known for its innovative approach to sustainable packaging.","exampleZh":"這家新創公司以其對永續包裝的創新方法而聞名。","collocations":["innovative approach","innovative solution","innovative technology"],"freq":"高頻","tip":"名詞 innovation（創新），動詞 innovate，行銷與科技類文章高頻字族，注意詞性轉換考點。"},{"id":"x-v776","theme":"fin","themeName":"財務、採購與物流","word":"ship","pos":"v.","meaning":"運送","example":"Orders placed before noon will be shipped the same business day.","exampleZh":"中午前下的訂單將於當天營業日內出貨。","collocations":["ship an order","shipping cost","ship overseas"],"freq":"極高頻","tip":"名詞 shipment（貨物、運送），shipping cost（運費）是電商與物流類文章必考複合詞。"}];
const BUILTIN_READING = /*R_DATA*/[{"id":"x-r1","part":6,"title":"【官方考點改編】師徒培訓計畫公告（對應官方 No.131-134）","genre":"官方考點改編","difficulty":"中階","passages":[{"label":"電子郵件","text":"To: All Team Supervisors\nFrom: Elena Vasquez\nSubject: Mentoring Program\n\nTo all Brightwell Consulting supervisors:\n\nOver the next several weeks, we will be launching a mentoring program for [[1]] staff members. At Brightwell Consulting, we believe that with steady guidance and support from our veteran supervisors, newly hired employees can quickly [[2]] the confidence they need to manage client accounts on their own. [[3]], they can strengthen their ability to communicate clearly across departments. When staff at all experience levels exchange ideas, every employee's skill level rises and the whole organization benefits. For that reason, we are asking veteran supervisors to sign up for at least one of the weekly mentoring workshops planned for next quarter. [[4]]\n\nThank you for your cooperation.\n\nElena Vasquez\nBrightwell Consulting"}],"questions":[{"q":"空格 [1]","options":["interest","interests","interesting","interested"],"answer":3,"explanation":"考點：分詞形容詞辨析（-ed vs -ing）。空格修飾 staff members（人），指「有意願參加的員工」，描述人的心理狀態要用過去分詞形容詞 interested（感興趣的）。interesting 描述事物「令人感興趣」，修飾人時意思會變成「這個人很有趣」，不合本文報名情境；interest 與 interests 是名詞或動詞，不能直接作前位修飾語表達此意。官方原題同樣考 interested employees 的 -ed 形容詞選擇。","optionNotes":["interest 為名詞／動詞原形，放在名詞前會形成複合名詞誤讀，無法表達「感興趣的」。","interests 為名詞複數或動詞第三人稱單數，同樣不能作形容詞修飾 staff members。","interesting 是「令人感興趣的」，修飾事物；用來修飾人會變成「有趣的員工」，偏離「有意願報名」的語意，是最強誘答。","interested 是「感到有興趣的」，修飾人，指有意願參加計畫的員工，為正解。"]},{"q":"空格 [2]","options":["develop","raise","open","complete"],"answer":0,"explanation":"考點：動詞與名詞的慣用搭配。空格受詞是 the confidence（信心），四個選項文法皆可，只能比搭配：develop confidence（培養／建立信心）是標準搭配，對應官方原題 develop a deep understanding 的考法。raise 常配 funds、awareness、prices；open 配 an account、a branch；complete 配 a form、a project，皆與 confidence 不搭。","optionNotes":["develop 與抽象名詞（confidence、understanding、skills）搭配，表「逐步培養」，為正解。","raise 雖有「提升」義，慣用受詞是 awareness、funds、questions，raise the confidence 不是自然搭配。","open 接具體可開啟之物或帳戶、分店，與 confidence 完全不搭。","complete 表「完成」，接有明確終點的事物（表單、專案），信心無法被「完成」。"]},{"q":"空格 [3]","options":["After all","For instance","Even so","At the same time"],"answer":3,"explanation":"考點：轉承副詞。定位前後句邏輯：前句說新進員工能快速建立獨立作業的信心，後句說他們「還能」強化跨部門溝通能力——兩句是並列遞進關係（同時獲得另一項好處），用 At the same time（同時）銜接。After all 表「畢竟」用於補述理由；For instance 表舉例，但後句不是前句的例子；Even so 表「即便如此」的讓步轉折，前後句並無對立。官方原題正解同為 At the same time。","optionNotes":["After all 表「畢竟、終究」，用來補一個支持前句的理由，前後句非因果補述關係。","For instance 表「例如」，後句必須是前句的具體實例，此處是新增的另一項好處而非例子。","Even so 表「即便如此」，需要前後語意對立轉折，本文前後句方向一致。","At the same time 表「同時、與此同時」，銜接並列遞進的兩項好處，為正解。"]},{"q":"插入句","options":["Let me review the schedule for next week's client visit.","We hope that many of you will decide to take part.","Unfortunately, today's workshop has been postponed until Monday.","This will be the final message you receive about the program."],"answer":1,"sentenceInsertion":true,"explanation":"考點：段落收尾句插入。定位空格前一句：「因此我們請資深主管報名至少一場工作坊」——這是全文的行動呼籲，收尾句應延續呼籲、表達期待參與，故選 We hope that many of you will decide to take part.（希望各位踴躍參加），與官方原題收尾句「We hope that you will strongly consider joining us」考法一致。其餘選項不是引入無關話題，就是與「計畫即將展開」的事實矛盾。","optionNotes":["客戶拜訪行程與本信主題（師徒培訓計畫）無關，突兀岔題。","承接前句報名呼籲、以期待參與作結，語氣連貫，為正解。","說今天的工作坊延期，與前文「工作坊排在下一季、尚未開始」矛盾。","說這是最後一封通知，與「接下來幾週即將啟動、後續仍會聯繫」的語境矛盾。"]}],"translation":"收件人：全體團隊主管\n寄件人：Elena Vasquez\n主旨：師徒培訓計畫\n\n致 Brightwell 顧問公司全體主管：\n\n未來幾週，我們將為有意願參加的員工推出師徒培訓計畫。在 Brightwell，我們相信在資深主管的穩定指導與支持下，新進員工能快速培養獨立管理客戶帳戶所需的信心。同時，他們也能強化跨部門清楚溝通的能力。當各種年資的員工彼此交流，每位員工的能力都會提升，整個組織都將受益。因此，我們請資深主管報名參加下一季每週舉辦的師徒工作坊至少一場。希望各位踴躍參加。\n\n感謝您的配合。\n\nElena Vasquez\nBrightwell 顧問公司","keyWords":[{"word":"mentoring","pos":"n.","meaning":"師徒指導、輔導","freq":"高頻"},{"word":"veteran","pos":"adj./n.","meaning":"資深的；老手","freq":"中頻"},{"word":"sign up for","pos":"phr.","meaning":"報名參加","freq":"極高頻"},{"word":"benefit","pos":"v./n.","meaning":"受益；好處","freq":"極高頻"}]},{"id":"x-r2","part":7,"title":"【官方考點改編】二手機車出售廣告（對應官方 No.147-148）","genre":"官方考點改編","difficulty":"基礎","passages":[{"label":"廣告","text":"FOR SALE — 2022 Corvia 300 Motor Scooter\n\nOne owner, 9,800 km. Garage-kept and in excellent condition. New brakes and a new battery were installed at Benson Motors just last month. Reliable, easy to park, and inexpensive to run.\n\nAsking $2,150 or best offer. I am relocating to Singapore for a new position at the end of June, so the scooter must be sold before then. Serious inquiries only, please.\n\nContact: Daniel Reyes, 555-0173 (evenings after 6 P.M.)"}],"questions":[{"q":"What is suggested about the scooter?","options":["It was recently serviced.","It has had more than one owner.","It has been for sale for six months.","It is being sold by a dealership."],"answer":0,"explanation":"考點：推論題（What is suggested...）。定位第一段：New brakes and a new battery were installed at Benson Motors just last month（上個月剛在車行換了煞車與電瓶）——「最近做過保養維修」是合理推論，對應官方原題「It was recently repaired」的考法。廣告明說 one owner（一手車），排除 (B)；六月底前必須售出是「期限」不是「已賣六個月」，排除 (C)；賣家是個人 Daniel Reyes 而非車行，排除 (D)。","optionNotes":["由「上個月剛換新煞車與電瓶」可推知近期做過維修保養，為正解。","廣告開頭明寫 One owner（僅一位車主），與本選項直接矛盾。","文中只說六月底前要賣掉（未來期限），沒有任何「已刊登六個月」的資訊。","聯絡人是個人賣家，Benson Motors 只是做保養的店家，並非賣方。"]},{"q":"Why is Mr. Reyes selling the scooter?","options":["He can no longer repair it.","He finds it too expensive to maintain.","He would like a newer model.","He is moving to another country."],"answer":3,"explanation":"考點：細節題（原因）。定位第二段：I am relocating to Singapore for a new position at the end of June（六月底將因新職務移居新加坡），故售車原因是移居國外，對應官方原題「She is leaving for another country」。其餘三個選項在文中都找不到依據，且 (A)(B) 與「狀況極佳、剛保養完、省油好養」的描述相反。","optionNotes":["廣告強調車況極佳且剛換新零件，沒有修不好的問題。","文中說 inexpensive to run（使用成本低），與「養車太貴」相反。","全文未提到想換新車。","relocating to Singapore 即移居他國，為售車的明確原因，正解。"]}],"translation":"出售——2022 年 Corvia 300 速克達\n\n一手車，里程 9,800 公里。車庫保存，狀況極佳。上個月才在 Benson 車行換上全新煞車與電瓶。性能可靠、好停車、使用成本低。\n\n開價 2,150 美元，可議價。本人六月底將因新職務移居新加坡，機車必須在此之前售出。意者請認真洽詢。\n\n聯絡人：Daniel Reyes，555-0173（晚間六點後）","keyWords":[{"word":"relocate","pos":"v.","meaning":"搬遷、移居","freq":"高頻"},{"word":"install","pos":"v.","meaning":"安裝","freq":"高頻"},{"word":"inquiry","pos":"n.","meaning":"詢問、洽詢","freq":"高頻"},{"word":"or best offer","pos":"phr.","meaning":"（售價）可議","freq":"中頻"}]},{"id":"x-r3","part":7,"title":"【官方考點改編】咖啡連鎖店收購報導（對應官方 No.149-151）","genre":"官方考點改編","difficulty":"中階","passages":[{"label":"報導文章","text":"On Thursday, Harbour Foods, a major beverage distributor headquartered in Toronto, announced its plans to acquire the Rosetti's café chain. Marco Rosetti, the chain's owner, had initially considered putting the business up for auction. In the end, he chose to sell directly to Harbour Foods without inviting other bids. People familiar with the negotiations say that Harbour Foods has agreed to keep the Rosetti's name as a condition of the purchase. Mr. Rosetti opened his first coffee stand 35 years ago, shortly after completing culinary school, in his hometown of Windsor. He later added locations in Ottawa and Hamilton, and today there are more than 40 Rosetti's cafés across the country."}],"questions":[{"q":"What is suggested about Mr. Rosetti?","options":["He has hired Harbour Foods to distribute his coffee.","He has agreed to sell his business to Harbour Foods.","He was recently hired to teach at a culinary school.","He will become the new president of Harbour Foods."],"answer":1,"explanation":"考點：推論題。定位第二、三句：他原本考慮拍賣，「最終選擇直接賣給 Harbour Foods、不再徵求其他出價」——即已同意出售事業，對應官方原題「He has agreed to sell his business」。(A) 混淆了 Harbour Foods 的「經銷商」身分與本次「收購方」角色；(C) 挪用 culinary school 字眼但他是 35 年前「畢業」而非去任教；(D) 全文未提任何職位安排。","optionNotes":["Harbour Foods 是收購方，不是被聘來經銷咖啡的合作商，屬角色錯置誘答。","由「決定直接售予 Harbour Foods、不邀其他競價」可知已同意出售，為正解。","文中只說他 35 年前從烹飪學校畢業，沒有去任教的資訊，是關鍵字挪用陷阱。","全文未提他將出任對方公司任何職務。"]},{"q":"According to the article, where is Mr. Rosetti from?","options":["Windsor","Ottawa","Toronto","Hamilton"],"answer":0,"explanation":"考點：細節定位題。定位倒數第二句：in his hometown of Windsor（在他的家鄉溫莎開了第一個咖啡攤），故他來自 Windsor，對應官方原題以 hometown 一字定位答案的考法。Toronto 是收購方總部所在地，Ottawa 與 Hamilton 是後來展店的城市，三者都是文中出現過的地名誘答。","optionNotes":["hometown of Windsor 明確指出家鄉，為正解。","Ottawa 是他後來展店的城市之一，非家鄉。","Toronto 是 Harbour Foods 總部所在地，張冠李戴。","Hamilton 同為後續展店城市，非家鄉。"]},{"q":"What is indicated about the Rosetti's café chain?","options":["It was sold at an auction.","It will soon change its name.","It was founded 35 years ago.","It operates in several countries."],"answer":2,"explanation":"考點：細節事實題。定位：Mr. Rosetti opened his first coffee stand 35 years ago——連鎖店的起點是 35 年前的第一個攤位，即創立於 35 年前，對應官方原題「It was founded 40 years ago」的同款考點。(A) 拍賣只是「曾考慮」最後沒辦；(B) 收購條件正是「保留店名」；(D) across the country 是全國多地，不是跨國。","optionNotes":["文中說他原本考慮拍賣但最終直接出售，拍賣從未發生。","收購條件恰恰是保留 Rosetti's 店名，與本選項相反。","第一個咖啡攤開於 35 年前，即品牌創立時間，為正解。","nationwide／across the country 指加拿大國內多城市，並非跨國經營，是 country 與 countries 的單複數陷阱。"]}],"translation":"週四，總部位於多倫多的大型飲料經銷商 Harbour Foods 宣布計畫收購 Rosetti's 咖啡連鎖店。連鎖店老闆 Marco Rosetti 原本考慮將事業公開拍賣，最終決定不徵求其他出價、直接售予 Harbour Foods。知情人士透露，Harbour Foods 已同意將保留 Rosetti's 店名作為收購條件之一。Rosetti 先生 35 年前自烹飪學校畢業後不久，便在家鄉溫莎開設了第一個咖啡攤，之後陸續在渥太華與漢米爾頓展店，如今全國已有超過 40 家 Rosetti's 咖啡店。","keyWords":[{"word":"acquire","pos":"v.","meaning":"收購、取得","freq":"高頻"},{"word":"distributor","pos":"n.","meaning":"經銷商","freq":"高頻"},{"word":"auction","pos":"n.","meaning":"拍賣","freq":"中頻"},{"word":"bid","pos":"n.","meaning":"出價、投標","freq":"高頻"},{"word":"headquartered","pos":"adj.","meaning":"總部設於……的","freq":"中頻"}]},{"id":"x-r4","part":7,"title":"【官方考點改編】車站接送簡訊對話（對應官方 No.152-153）","genre":"官方考點改編","difficulty":"中階","passages":[{"label":"簡訊對話","text":"Rika Sato [11:50 A.M.]\nHi Tomas. My train from Lyon arrives at 3:20 P.M. Could you pick me up at Central Station?\n\nTomas Weber [11:52 A.M.]\nOf course. Same place as last time?\n\nRika Sato [11:55 A.M.]\nYou mean the north exit, where you waited when I came for the March workshop? That works for me.\n\nTomas Weber [11:57 A.M.]\nActually, parking near the north exit has become difficult lately. Could we meet at the café beside the main entrance instead?\n\nRika Sato [12:00 P.M.]\nNo problem. I'll text you when we are about ten minutes away.\n\nTomas Weber [12:01 P.M.]\nPerfect. Your meeting with the Halden Group doesn't start until 4:30, so we will have plenty of time."}],"questions":[{"q":"What is suggested about Ms. Sato?","options":["She is traveling for business.","She works at Central Station.","She has never met Mr. Weber before.","She is Mr. Weber's supervisor."],"answer":0,"explanation":"考點：簡訊對話推論題。整合兩條線索：她三月曾來參加 workshop、這次抵達後 4:30 要與 Halden Group 開會——可推知此行是商務出差，對應官方原題「He is on a business trip」的推論考法。(B) 車站只是接送地點；(C) 與「上次同一個地方等你」矛盾（顯然見過面）；(D) 兩人是互相配合的同事口吻，無上下屬證據。","optionNotes":["抵達當天即有客戶會議，加上先前來參加工作坊，商務出差是最合理推論，正解。","Central Station 是接送地點，沒有任何她在車站工作的資訊。","對話提到「上次三月你在北出口等我」，兩人顯然見過面。","全文看不出職級關係，屬無中生有。"]},{"q":"At 12:00 P.M., what does Ms. Sato mean when she writes, \"No problem\"?","options":["She has confirmed the train's arrival time.","She is sure she can find a parking space.","She agrees to meet at the café by the main entrance.","She knows the client meeting will not start late."],"answer":2,"explanation":"考點：說話者意圖題（多益固定題型：At X:XX, what does ... mean when he/she writes...）。解法是往前看一則訊息：Weber 提議「北出口不好停車，改約正門旁的咖啡店好嗎？」Sato 回 No problem——即答應改地點，對應官方原題「He agrees to wait at the door near the customs area」的考法。其餘選項把 No problem 錯接到火車時刻、停車、會議時間等別的訊息上。","optionNotes":["火車時刻是她自己一開始提供的資訊，No problem 不是在回覆這件事。","停車困難是 Weber 那邊的狀況，且正因難停車才改地點，與本選項相反。","No problem 直接回覆上一則「改約正門旁咖啡店」的提議，表示同意，為正解。","會議 4:30 開始是 Weber 之後才補充的資訊，時間順序不符。"]}],"translation":"Rika Sato［上午 11:50］：嗨 Tomas，我從里昂出發的火車下午 3:20 到，可以到中央車站接我嗎？\n\nTomas Weber［上午 11:52］：當然。老地方嗎？\n\nRika Sato［上午 11:55］：你是說北出口吧？三月我來參加工作坊時你就在那裡等我。可以啊。\n\nTomas Weber［上午 11:57］：其實北出口附近最近很難停車，我們改約正門旁邊的咖啡店好嗎？\n\nRika Sato［下午 12:00］：沒問題。快到前十分鐘我再傳訊息給你。\n\nTomas Weber［下午 12:01］：太好了。你跟 Halden 集團的會議 4:30 才開始，時間很充裕。","keyWords":[{"word":"pick up","pos":"phr.","meaning":"接（人）、取（物）","freq":"極高頻"},{"word":"entrance","pos":"n.","meaning":"入口","freq":"高頻"},{"word":"plenty of","pos":"phr.","meaning":"充裕的、大量的","freq":"高頻"}]},{"id":"x-r5","part":7,"title":"【官方考點改編】社區中心展示櫃使用須知（對應官方 No.161-164）","genre":"官方考點改編","difficulty":"中階","passages":[{"label":"公告","text":"Display Case Space Available to Local Artists\n\nAshford Community Centre is pleased to invite local artists to exhibit their work, free of charge, in the new display case located in the main lobby. Space in the case is available for up to three weeks at a time.\n\nArtworks must be approved in advance at the reception desk and must meet the following requirements. All pieces must be suitable for viewing by general audiences. Each work must be framed or mounted and must measure no more than 60 cm by 90 cm. The requested start and end dates for the exhibition should be written on a card attached to the back of the work. — [1] —. Any submissions that do not meet these requirements will not be considered and will be returned to the artist. — [2] —.\n\n— [3] —. Applications are now being accepted at the Ashford Community Centre reception desk. Please bring the actual work, ready for display, when you apply. Within two business days, you will receive an e-mail confirming that your work has been scheduled for exhibition. — [4] —.\n\nAshford Community Centre\nwww.ashfordcc.org.nz"}],"questions":[{"q":"What is indicated about display space in the Ashford Community Centre case?","options":["It is available at no cost.","It may be used for any length of time.","It is open to commercial galleries.","It is intended mainly for photographs."],"answer":0,"explanation":"考點：細節事實題（同義改寫）。定位第一段：free of charge（免費）改寫成 at no cost，對應官方原題 free advertising space → available at no charge 的同義轉換考法。(B) 與「一次最多三週」矛盾；(C) 對象是 local artists 而非商業畫廊；(D) 文中未限定作品類型。","optionNotes":["free of charge 即 at no cost，標準同義改寫，正解。","文中明定一次最多展出三週，並非不限期限。","邀請對象是本地藝術家，未開放商業畫廊。","全文未說以攝影作品為主，屬無中生有。"]},{"q":"What is NOT a stated requirement for a work to be displayed?","options":["It must be within certain size limits.","It must be marked with exhibition dates.","It must be approved beforehand.","It must be signed by the centre's director."],"answer":3,"explanation":"考點：NOT 題（三真一假，逐項回文核對）。(A) 對應「不得超過 60 cm × 90 cm」；(B) 對應「起訖日期須寫在卡片上」；(C) 對應「須事先於服務台核准」。只有 (D)「須經中心主任簽名」全文未提，為正解。對應官方原題「It must be signed by a librarian」同款考法——NOT 題的錯誤選項常是把「核准單位」偷換成「某人簽名」。","optionNotes":["尺寸上限 60 cm × 90 cm 明確寫在第二段，是既載明的要求。","展出起訖日期須寫在作品背面卡片上，文中有載。","作品須事先在服務台核准，文中有載。","全文從未要求中心主任簽名，此為文中沒有的要求，正解。"]},{"q":"What should an artist bring to the centre when applying?","options":["A sketch of a proposed piece","The finished work itself","A completed application form","A letter of recommendation"],"answer":1,"explanation":"考點：細節題（同義改寫）。定位第三段：Please bring the actual work, ready for display, when you apply（申請時請攜帶可直接展出的作品本身），actual work 改寫為 the finished work itself，對應官方原題 actual notice → a final version 的考法。草圖、表格、推薦信文中皆未要求。","optionNotes":["文中要求帶「實際作品」而非構想草圖。","the actual work, ready for display 即完成品本身，正解。","文中未提任何申請表格。","文中未要求推薦信。"]},{"q":"In which of the positions marked [1], [2], [3], and [4] does the following sentence best belong?\n\"The artist's name and telephone number must also be written clearly on the same card.\"","options":["[1]","[2]","[3]","[4]"],"answer":0,"sentenceInsertion":true,"explanation":"考點：句子插入位置題。解法抓插入句的指涉詞：the same card（同一張卡片）必須緊跟在提到「卡片」的句子之後。全文只有 [1] 前一句提到 a card attached to the back of the work（寫日期的卡片），插入句補充「姓名與電話也要寫在同一張卡片上」，指涉自然、且仍在「要求清單」段落內，故選 [1]。對應官方原題以「on the back／the same card」型指涉詞定位 [1] 的考法。[2] 之前講的是不合格作品退件，[3][4] 已進入申請流程段，都接不上 the same card。","optionNotes":["[1] 緊接「日期寫在卡片上」之後，the same card 指涉成立，正解。","[2] 前句在講不符要求會退件，插入卡片說明會打斷語意。","[3] 位於申請流程段落開頭，前文沒有卡片可供指涉。","[4] 在確認信句之後，離「卡片」原句最遠，指涉斷裂。"]}],"translation":"展示櫃空間開放本地藝術家使用\n\nAshford 社區中心誠摯邀請本地藝術家免費使用大廳新設置的展示櫃展出作品。展示櫃空間一次最長可使用三週。\n\n作品須事先於服務台核准，並符合下列要求：所有作品內容須適合一般大眾觀賞；作品須裱框或裱板，尺寸不得超過 60 公分 × 90 公分；希望展出的起訖日期應寫在附於作品背面的卡片上。——[1]——。不符合上述要求的作品將不予受理並退還藝術家。——[2]——。\n\n——[3]——。Ashford 社區中心服務台現正受理申請。申請時請攜帶可直接展出的作品本身。兩個工作天內，您將收到電子郵件確認作品已排入展出檔期。——[4]——。\n\nAshford 社區中心\nwww.ashfordcc.org.nz\n\n（插入句：藝術家的姓名與聯絡電話也必須清楚寫在同一張卡片上。）","keyWords":[{"word":"free of charge","pos":"phr.","meaning":"免費","freq":"高頻"},{"word":"in advance","pos":"phr.","meaning":"事先","freq":"極高頻"},{"word":"submission","pos":"n.","meaning":"提交（物）","freq":"高頻"},{"word":"measure","pos":"v.","meaning":"尺寸為……","freq":"中頻"},{"word":"business day","pos":"n.","meaning":"工作日","freq":"高頻"}]},{"id":"x-r6","part":7,"title":"【官方考點改編】語音錄製服務廣告與客戶來信（對應官方 No.176-180）","genre":"官方考點改編","difficulty":"進階","passages":[{"label":"廣告","text":"CLEARVOICE STUDIO — Make Every Call Count\n\nDoes your company's phone greeting sound as professional as your business? ClearVoice Studio produces customized greetings and on-hold announcements for business phone systems of any size. Visit our Web site, www.clearvoicestudio.com, to listen to sample recordings by more than 30 professional voice artists. We also offer script consultation, licensed background music, and production in eight languages.\n\nMention this advertisement from the City Gazette and receive 10% off your first order. Call 555-0148 today — a project coordinator will contact you within one business day of your inquiry."},{"label":"電子郵件","text":"From: Priya Raman <p.raman@ramandental.com>\nTo: ClearVoice Studio <orders@clearvoicestudio.com>\nSubject: New phone recordings\n\nHello,\n\nI saw your advertisement in the City Gazette, and your service seems to be exactly what my clinic needs. I run a dental practice with two locations, and our current phone greeting was recorded years ago by a former receptionist. I would like a new main greeting as well as on-hold announcements describing our extended weekend hours. I have already written out the exact wording myself, so I will not need any help preparing the text. However, since many of our patients prefer Spanish, could the recordings be produced in both English and Spanish? Please send me a price estimate.\n\nBest regards,\nPriya Raman\nOwner, Raman Family Dental"}],"questions":[{"q":"According to the advertisement, why should customers visit the ClearVoice Studio Web site?","options":["To hear samples of voice recordings","To register a new phone number","To submit a payment","To download a price list"],"answer":0,"explanation":"考點：單篇細節題（According to the advertisement 限定回廣告找）。定位廣告第一段：Visit our Web site ... to listen to sample recordings by more than 30 professional voice artists，即上網站是為了「試聽錄音樣本」，對應官方原題「To hear voice samples」。其餘三項網站功能文中皆未提及。","optionNotes":["listen to sample recordings 即試聽聲音樣本，正解。","廣告未提供電話號碼登錄功能。","付款方式全文未提。","價目表下載全文未提，報價須來信洽詢。"]},{"q":"What is suggested about ClearVoice Studio?","options":["It completes orders once a week.","It advertises in a newspaper.","It works only with medical clients.","It recently opened a second studio."],"answer":1,"explanation":"考點：推論題（跨段整合）。廣告末段自述「Mention this advertisement from the City Gazette」，電郵開頭也說「I saw your advertisement in the City Gazette」——City Gazette 是報紙，可推知該公司在報上登廣告，對應官方原題「It advertises in the newspaper」。(A) 一個工作日內回覆說的是聯繫速度非出貨頻率；(C) 客戶是牙醫診所不代表只服務醫療業；(D) 兩個據點的是 Raman 的診所，不是錄音室。","optionNotes":["文中只說專員一個工作日內回覆，沒有每週出貨一次的資訊。","廣告刊於 City Gazette（報紙），且客戶正是看報而來，正解。","廣告面向所有企業電話系統，非僅醫療業。","有兩個據點的是 Raman 家庭牙醫，張冠李戴陷阱。"]},{"q":"Who most likely is Ms. Raman?","options":["A voice artist","A script writer","A receptionist","A business owner"],"answer":3,"explanation":"考點：身分推論題。定位電郵兩處：I run a dental practice with two locations（我經營一間有兩個據點的牙醫診所）與署名 Owner, Raman Family Dental——她是診所負責人，即企業主，對應官方原題「A business owner」。receptionist 是文中「多年前錄舊問候語的前櫃檯人員」，典型的角色錯置誘答。","optionNotes":["配音員是 ClearVoice 提供的服務資源，不是 Raman 的身分。","她自己寫好文稿不代表職業是寫稿人。","前櫃檯人員是錄舊問候語的別人，角色錯置陷阱。","run a dental practice＋署名 Owner，即企業主，正解。"]},{"q":"What service does Ms. Raman NOT request from ClearVoice Studio?","options":["A new main phone greeting","Help with writing the script","On-hold announcements","Production in more than one language"],"answer":1,"explanation":"考點：NOT 題（跨選項回文核對）。她要求了：新的主問候語 (A)、說明週末延長時段的等候語音 (C)、英西雙語製作 (D)。唯獨文稿她明說 I have already written out the exact wording myself, so I will not need any help preparing the text（已自行寫好、不需協助），故未請求的是 (B) 撰稿協助，對應官方原題 NOT request 考法。","optionNotes":["a new main greeting 明確在需求清單中。","她已自行寫好文字、明言不需文稿協助，此為未請求的服務，正解。","on-hold announcements 明確在需求清單中。","英語＋西班牙語雙語製作有明確請求。"]},{"q":"What will most likely happen within one business day of Ms. Raman's inquiry?","options":["She will visit the recording studio.","She will receive a revised script.","A project coordinator will contact her.","A discount coupon will be mailed to her."],"answer":2,"explanation":"考點：跨篇推論題（雙篇組核心題型）。廣告承諾：a project coordinator will contact you within one business day of your inquiry；電郵即是 Raman 的 inquiry——兩篇連起來可推知一個工作日內專員會與她聯繫，對應官方原題「Speak with a representative」的跨篇考法。(A)(B)(D) 都不是廣告承諾的一日內事項。","optionNotes":["全文未安排到錄音室參觀。","她不需文稿服務，也就不會收到修訂稿。","廣告承諾詢問後一個工作日內由專案協調員聯繫，電郵即為詢問，正解。","九折優惠須下單時提及廣告，並非寄送折價券。"]}],"translation":"【廣告】CLEARVOICE 錄音室——讓每通電話都加分\n\n貴公司的電話問候語聽起來和您的事業一樣專業嗎？ClearVoice 錄音室為各種規模的企業電話系統製作客製化問候語與等候語音。請上官網 www.clearvoicestudio.com 試聽 30 多位專業配音員的樣本錄音。我們也提供文稿諮詢、合法授權背景音樂，以及八種語言的製作服務。\n\n來電時提及本則刊於《City Gazette》的廣告，首次訂單即享九折。今天就撥打 555-0148——專案協調員將於您詢問後一個工作日內與您聯繫。\n\n【電子郵件】寄件人：Priya Raman／收件人：ClearVoice 錄音室／主旨：新電話錄音\n\n您好：\n\n我在《City Gazette》上看到貴公司的廣告，你們的服務正是我的診所需要的。我經營一間有兩個據點的牙醫診所，目前的電話問候語是多年前由一位前櫃檯人員錄製的。我想製作新的主問候語，以及說明本診所週末延長看診時段的等候語音。文字內容我已經自己寫好，所以不需要文稿方面的協助。不過，由於許多病患偏好西班牙語，錄音可以同時製作英語和西班牙語兩種版本嗎？請提供報價。\n\nRaman 家庭牙醫負責人\nPriya Raman 敬上","keyWords":[{"word":"customized","pos":"adj.","meaning":"客製化的","freq":"高頻"},{"word":"coordinator","pos":"n.","meaning":"協調員、專員","freq":"高頻"},{"word":"estimate","pos":"n.","meaning":"報價、估價單","freq":"極高頻"},{"word":"practice","pos":"n.","meaning":"（醫師等的）診所、執業","freq":"中頻"},{"word":"inquiry","pos":"n.","meaning":"詢問","freq":"高頻"}]},{"id":"x-r7","part":7,"title":"【官方考點改編】油漆訂購三篇組（對應官方 No.196-200）","genre":"官方考點改編","difficulty":"進階","passages":[{"label":"廣告","text":"TRUEHUE PAINTS — Premium Colors, Delivered\n\nTrueHue Paints brings professional-quality interior paint straight to your door. Our Web site features our customers' top shades in every color family, along with planning tools for your project. Because colors on a screen can look different from colors on a wall, we advise customers to order free sample cards of several similar shades before choosing a paint. Paint orders are delivered within two business days, and shipping is free on orders over $50."},{"label":"線上購物車","text":"TRUEHUE PAINTS — Online Shopping Cart\nOrder number: #8214\nCustomer: Dana Whitfield\nOrder date: May 3\n\n1 x Sample card — TH 310 (Morning Fog) — Free\n1 x Sample card — TH 311 (Silver Birch) — Free\n1 x Sample card — TH 312 (Pale Slate) — Free\n1 x Interior paint, 4 L — TH 311 (Silver Birch) — $62.00\n\nShipping: Free\nTotal: $62.00"},{"label":"電子郵件","text":"From: Dana Whitfield <d.whitfield@bmail.com>\nTo: Customer Support <support@truehuepaints.com>\nDate: May 5\nSubject: Order #8214\n\nHello,\n\nThank you for sending my order #8214 — it arrived this morning. Unfortunately, the paint inside was not the one I had chosen. I selected TH 311 but received TH 312 (Pale Slate) instead. The two shades appear side by side on your Web site, so they may have been mixed up during packing. Could you send me the paint I originally ordered, along with a few more sample cards close to TH 310? That shade looked best on my walls; the others seemed too dark in the evening light.\n\nThank you,\nDana Whitfield"}],"questions":[{"q":"In the advertisement, the word \"top\" in paragraph 1, line 2, is closest in meaning to","options":["maximum","favorite","important","upper"],"answer":1,"explanation":"考點：語意近義題（vocabulary in context）。定位廣告原句：Our Web site features our customers' top shades——「顧客的 top 色號」指顧客「最喜愛、最常選」的色號，故最接近 favorite。對應官方原題同字 top 的近義考法與同組選項。此題型切忌背字典義硬套：top 單獨看可指 maximum（最大值）或 upper（上方的），但放回「customers' top shades」的語境只有 favorite 通。","optionNotes":["maximum 是數量上限之意（top speed 可通），但「顧客的最大色號」不知所云。","customers' top shades＝顧客最愛的色號，favorite 語境吻合，正解。","important 缺「受喜愛、排名居前」的核心語意。","upper 是物理位置的上方，與語境無關。"]},{"q":"What are TrueHue Paints customers advised to do?","options":["Compare paint colors at a local store","Adjust the settings on their computer monitors","Order samples of several similar shades","Hire a professional painter"],"answer":2,"explanation":"考點：細節題（advise 建議句定位）。定位廣告：we advise customers to order free sample cards of several similar shades before choosing a paint，即建議先訂購多張相近色樣卡再決定，對應官方原題「Order samples of several similar colors」。(B) 是把「螢幕顯色會失真」的原因句偷換成「去調整螢幕」的行動，典型偷換誘答。","optionNotes":["廣告主打宅配到府，未建議去實體店比色。","文中說螢幕顯色與實牆不同，是建議訂色卡的「原因」，不是要你去調螢幕。","advise customers to order ... several similar shades 原句直接對應，正解。","全文未提聘請油漆師傅。"]},{"q":"What is most likely true about order #8214?","options":["It arrived within two business days.","It included an extra sample card.","It was shipped in April.","It was damaged during delivery."],"answer":0,"explanation":"考點：跨篇推論題（三篇組招牌題型，需串兩篇資訊）。購物車顯示訂購日 May 3，電郵說 it arrived this morning 而電郵日期是 May 5——3 日訂、5 日到，正好落在廣告承諾的 delivered within two business days 之內，對應官方原題「It arrived within two business days」需串廣告＋購物車＋電郵的考法。其餘選項：色卡三張都在訂單內沒有多送、5 月訂購非 4 月出貨、電郵抱怨的是寄錯色號而非損壞。","optionNotes":["May 3 下單、May 5 送達，符合廣告「兩個工作日內送達」，正解（跨三篇整合）。","購物車列出的三張色卡都是自己訂的，沒有加贈。","訂購日是 5 月 3 日，不可能 4 月出貨。","問題是寄錯色號，不是貨品毀損。"]},{"q":"Which color does Ms. Whitfield indicate that she likes?","options":["Morning Fog","Silver Birch","Pale Slate","Harbor Gray"],"answer":0,"explanation":"考點：跨篇對照題（代號↔名稱轉換）。電郵說 sample cards close to TH 310? That shade looked best on my walls（TH 310 在牆上效果最好＝她喜歡的色號），但電郵只給代號；回購物車查對照表：TH 310 = Morning Fog，故答案是 Morning Fog。對應官方原題以 SP 722 代號回購物車查色名的招牌跨篇考法。誘答全是購物車出現過的其他色名，Harbor Gray 則是文中根本沒有的色名。","optionNotes":["TH 310 她明說效果最好，購物車對照 TH 310＝Morning Fog，正解。","Silver Birch（TH 311）是她訂購但沒收到的油漆色，非她評價最好的色。","Pale Slate（TH 312）是寄錯來的顏色，且她嫌其他色太暗。","Harbor Gray 三篇中皆未出現，純虛構誘答。"]},{"q":"What problem does Ms. Whitfield mention in her e-mail?","options":["She was charged twice for one order.","She received the wrong item.","The delivery took too long.","Some sample cards were missing."],"answer":1,"explanation":"考點：細節題（問題定位）。定位電郵：the paint inside was not the one I had chosen. I selected TH 311 but received TH 312——選了 TH 311 卻收到 TH 312，即收到錯誤商品，對應官方原題「He received the wrong item」。收費、延遲、缺件文中皆未抱怨；配送反而很快（兩天內到）。","optionNotes":["全文未提重複扣款。","訂 TH 311 收到 TH 312，即收錯商品，正解。","兩個工作日內就送達，配送並不慢。","三張色卡皆如訂單送達，她只是「另外加要」更多相近色卡。"]}],"translation":"【廣告】TRUEHUE 油漆——頂級色彩，宅配到府\n\nTrueHue 油漆將專業級室內油漆直送您家。官網匯集各色系中最受顧客喜愛的色號，並提供工程規劃工具。由於螢幕顯色可能與實際牆面不同，我們建議顧客在決定油漆前，先免費索取數張相近色號的樣本色卡。油漆訂單於兩個工作日內送達，訂單滿 50 美元免運費。\n\n【線上購物車】TRUEHUE 油漆——線上購物車／訂單編號：#8214／顧客：Dana Whitfield／訂購日期：5 月 3 日\n樣本色卡 TH 310（晨霧灰）×1——免費／樣本色卡 TH 311（銀樺白）×1——免費／樣本色卡 TH 312（淺板岩）×1——免費／室內油漆 4 公升 TH 311（銀樺白）×1——62 美元\n運費：免費／總計：62 美元\n\n【電子郵件】寄件人：Dana Whitfield／收件人：客服／日期：5 月 5 日／主旨：訂單 #8214\n\n您好：\n\n感謝寄送我的訂單 #8214——今天早上已送達。可惜箱內的油漆不是我選購的那一款：我選的是 TH 311，收到的卻是 TH 312（淺板岩）。這兩個色號在貴公司網站上緊鄰排列，可能是包裝時弄混了。能否補寄我原本訂購的油漆，並附上幾張與 TH 310 相近的樣本色卡？那個色號刷在我家牆上效果最好，其他的在傍晚光線下都顯得太暗。\n\n謝謝！\nDana Whitfield","keyWords":[{"word":"shade","pos":"n.","meaning":"色調、色號","freq":"高頻"},{"word":"mix up","pos":"phr.","meaning":"弄混、搞錯","freq":"中頻"},{"word":"originally","pos":"adv.","meaning":"原本、最初","freq":"高頻"},{"word":"shipping","pos":"n.","meaning":"運費、出貨","freq":"極高頻"},{"word":"feature","pos":"v.","meaning":"以……為特色、收錄","freq":"高頻"}]},{"id":"xc-r1","part":6,"title":"【Bridge 考點改編】社區圖書館開放公告","genre":"公告","difficulty":"基礎","passages":[{"label":"公告","text":"Notice to All Residents\n\nThe Riverside Community Library will begin its new summer hours starting next Monday. The library will be [[1]] from 9:00 a.m. to 8:00 p.m., Monday through Saturday. We are also introducing a new reading program for children. Kids who [[2]] at least five books this summer will receive a free notebook and a certificate. [[3]] Parents are welcome to [[4]] their children up at the front desk anytime during library hours.\n\nThank you for your continued support of our library.\n\nRiverside Community Library Staff"}],"questions":[{"q":"空格 [1]","options":["open","opens","opener","opening"],"answer":0,"explanation":"暖身題（Bridge 考點改編）。考點：be 動詞後接形容詞當主詞補語。空格前是 will be，後面沒有受詞，句意是描述圖書館「開放的」狀態，要用形容詞 open。opens 是動詞變化形，不能疊在 be 動詞後面；opener、opening 都是名詞，語意不通。","optionNotes":["open 是形容詞，修飾主詞 the library，表示「是開放的」，為本題正解。","opens 是動詞第三人稱單數形，與前面的 be 動詞 will be 重複疊加，結構錯誤。","opener 是名詞，指「開瓶器」等物品，與圖書館狀態無關。","opening 作名詞指「開幕、空缺」，與句意「圖書館營業中」不符。"]},{"q":"空格 [2]","options":["read","reads","reading","to reading"],"answer":0,"explanation":"暖身題（Bridge 考點改編）。考點：關係子句中動詞與主詞的一致。空格所在的 who 子句主詞是複數的 Kids，動詞需與複數主詞一致，一般現在式用原形 read。reads 是第三人稱單數形，與複數主詞 Kids 不一致；reading、to reading 都不是限定動詞形式，無法作為 who 子句裡的主要動詞。","optionNotes":["read 是動詞原形，與複數主詞 Kids 一致，為本題正解。","reads 是第三人稱單數動詞形，只能搭配單數主詞，與複數的 Kids 不一致。","reading 是現在分詞或動名詞，不能單獨當作子句的限定動詞使用。","to reading 不是標準的不定詞或動名詞用法組合，此處文法上不成立。"]},{"q":"空格 [3]","options":["The library will be closed next week for repairs.","This offer is only available to library staff.","The program runs from June 1 to August 31.","Please remember to renew your books on time."],"answer":2,"sentenceInsertion":true,"explanation":"暖身題（Bridge 考點改編）。考點：段落補句銜接。前一句介紹「讀完五本書可得筆記本與證書」的暑期閱讀計畫，後一句提到家長可到櫃檯為孩子報名，中間需要一句補充「計畫實施的時間範圍」，讓讀者知道活動期間，故選 The program runs from June 1 to August 31.（活動於 6/1 至 8/31 舉行）。其餘選項或與圖書館持續營業的事實矛盾，或限定對象錯誤，或與上下文話題無關。","optionNotes":["說圖書館下週因整修休館，與前文「將於下週一起每天開放到晚上八點」的內容互相矛盾。","說優惠僅限圖書館員工，與前文「鼓勵孩童閱讀」的活動對象不符。","說明活動實施期間為 6 月 1 日至 8 月 31 日，承接前一句的閱讀活動介紹，並自然引出後一句的報名說明，為本題正解。","提醒讀者準時還書，與本文「介紹暑期閱讀計畫」的主題無關，是插入了不相關話題的干擾選項。"]},{"q":"空格 [4]","options":["sign","signs","signing","signed"],"answer":0,"explanation":"暖身題（Bridge 考點改編）。考點：祈使句／原形動詞用法。此句其實是原文中 Parents are welcome to sign their children up 的動詞部分，welcome to 後面須接不定詞的原形動詞 sign，構成 to sign up（報名）的固定用法。signs 是第三人稱單數動詞形，不能接在 to 後面；signing、signed 皆非不定詞應有的原形，不符合 to V 的文法規則。","optionNotes":["sign 是動詞原形，符合 to sign up 的不定詞固定結構，為本題正解。","signs 是第三人稱單數動詞形，不能出現在 to 之後，違反不定詞需接原形動詞的規則。","signing 是現在分詞／動名詞形式,不定詞 to 後面不接此形式。","signed 是過去式／過去分詞,同樣不符合 to 加原形動詞的文法要求。"]}],"translation":"致全體居民公告\n\nRiverside 社區圖書館下週一起將實施新的夏季開放時間。圖書館將於週一至週六，早上 9 點開放至晚上 8 點。我們也將推出全新的兒童閱讀計畫。今年夏天讀完至少五本書的小朋友，可獲得一本免費筆記本與一張證書。活動實施期間為 6 月 1 日至 8 月 31 日。家長歡迎隨時在圖書館開放時間內到櫃檯為孩子報名。\n\n感謝您一直以來對本圖書館的支持。\n\nRiverside 社區圖書館工作人員","keyWords":[{"word":"resident","pos":"n.","meaning":"居民","freq":"中頻"},{"word":"certificate","pos":"n.","meaning":"證書","freq":"中頻"},{"word":"sign up","pos":"phr.","meaning":"報名","freq":"極高頻"},{"word":"front desk","pos":"n.","meaning":"櫃檯","freq":"高頻"}]},{"id":"xc-r2","part":7,"title":"【Bridge 考點改編】訊息對話：變更野餐地點","genre":"簡訊對話","difficulty":"基礎","passages":[{"label":"簡訊對話","text":"Wendy (2:10 p.m.): Hi! Are we still meeting at Lakeview Park for the picnic on Saturday?\n\nTom (2:12 p.m.): Actually, I heard it might rain on Saturday afternoon. Maybe we should pick an indoor spot instead, just in case.\n\nWendy (2:14 p.m.): That makes sense. Do you have a place in mind?\n\nTom (2:15 p.m.): There's a community hall near the station with a big kitchen. We could still cook and eat together there.\n\nWendy (2:17 p.m.): Sounds good. Can you book it for us?"}],"questions":[{"q":"What does Tom want to change about the picnic plan?","options":["The date","The location","The number of guests","The food menu"],"answer":1,"explanation":"考點：對話重點定位。Tom 在 2:12 p.m. 提到擔心週六下午下雨，建議「改找室內地點」（pick an indoor spot instead），可知他想改變的是活動「地點」，而非日期、人數或菜單，這三項對話中完全沒有提到。","optionNotes":["對話中兩人一直討論的是週六，日期本身沒有被提出更動。","Tom 建議因為天氣考量改找室內地點，正是想更動的項目，為本題正解。","對話全程沒有提到參加人數的變化。","對話中提到「可以一起煮飯吃飯」，但沒有具體討論菜單內容的更動。"]},{"q":"Select the best response to Wendy's last message.","options":["\"Sure, I'll take care of it.\"","\"It rained all last week.\"","\"I already ate lunch.\"","\"The park is closed on Sundays.\""],"answer":0,"explanation":"考點：對話應答選擇。Wendy 最後一句問 Tom「你可以幫我們訂那個場地嗎？」(Can you book it for us?)，屬於請求對方採取行動的問句，最合理的回應是同意並表示會處理，也就是 \"Sure, I'll take care of it.\"（沒問題，我會處理）。其餘選項分別答非所問：談過去天氣、談自己吃過午餐、談公園週日休館，都沒有正面回應「能不能訂場地」這個問題。","optionNotes":["直接肯定地回答會處理訂場地一事，正面回應 Wendy 的請求，為本題正解。","回應的是「上星期一直在下雨」，答非所問，沒有回應是否會訂場地。","回應「我已經吃過午餐了」與訂場地的請求完全無關。","提到「公園週日不開放」，離題到與本題無關的資訊，也未回應請求。"]}],"translation":"Wendy（下午 2:10）：嗨！我們週六野餐還是約在 Lakeview 公園碰面嗎？\n\nTom（下午 2:12）：其實我聽說週六下午可能會下雨。也許我們該先改選室內地點，以防萬一。\n\nWendy（下午 2:14）：有道理。你有想到什麼地方嗎？\n\nTom（下午 2:15）：車站附近有一個社區活動中心，裡面有很大的廚房，我們還是可以在那裡一起煮飯、一起吃。\n\nWendy（下午 2:17）：聽起來不錯。你可以幫我們訂那個場地嗎？","keyWords":[{"word":"indoor","pos":"adj.","meaning":"室內的","freq":"中頻"},{"word":"just in case","pos":"phr.","meaning":"以防萬一","freq":"高頻"},{"word":"community hall","pos":"n.","meaning":"社區活動中心","freq":"中頻"},{"word":"book","pos":"v.","meaning":"預訂","freq":"極高頻"}]},{"id":"xd-r1","part":6,"title":"雲端儲存系統升級通知","genre":"內部通知","difficulty":"中階","passages":[{"label":"內部通知","text":"To: All Engineering Personnel\nFrom: IT System Administration\nDate: October 18\nSubject: Cloud Storage Protocol Update\n\nPlease be advised that our corporate cloud server will undergo an architecture upgrade starting next Tuesday at 10:00 PM. This modification is designed to improve data access speeds and bolster system [[1]] across all regional offices.\n\nDuring the six-hour maintenance window, access to shared code repositories will be temporarily unavailable. [[2]] We strongly advise all developers to save their local files and disconnect from the network prior to the scheduled shutdown.\n\nAny file transfer errors or login anomalies encountered after normal operations [[3]] on Wednesday morning should be reported immediately. Please direct all technical inquiries to the network [[4]] via the ticketing portal."}],"questions":[{"q":"空格 [1]","options":["secure","securely","security","securing"],"answer":2,"explanation":"考點：詞性辨析——名詞當受詞。動詞 bolster（強化）之後需要一個名詞當受詞，且此受詞要與前面的 data access speeds（資料存取速度，名詞片語）並列，做為 improve 與 bolster 共同的受詞群。security（安全性）是名詞，指「系統安全性」，語意通順、詞性正確，為正解。secure 是形容詞或動詞原形，securely 是副詞，securing 是動名詞／現在分詞，三者都無法直接作 bolster 的名詞受詞。","optionNotes":["secure：形容詞（安全的）或動詞原形，不能單獨作受詞放在 bolster 後面。","securely：副詞，修飾動詞，不能當受詞，且句中沒有動詞可供其修飾。","security：名詞「安全性」，作 bolster 的受詞，與 data access speeds 並列，為正解。","securing：動名詞/現在分詞，若作受詞需搭配自己的受詞（securing what?），此處語意不完整，非最佳選擇。"],"sentenceInsertion":false},{"q":"空格 [2]","options":["The annual budget report was approved by the executive board yesterday.","Failure to back up active projects may result in permanent data loss.","The marketing department will host a seminar in the main conference room.","You can download the updated product catalog from the corporate website."],"answer":1,"explanation":"考點：句子插入題——上下文邏輯連貫。空格前一句說「共用程式碼庫在維護期間將暫時無法存取」，空格後一句緊接著「強烈建議所有開發人員在關機前備份本機檔案並斷線」。因此空格處必須是一句能承先啟後的警示語，說明「為什麼要備份」——(B)「未備份進行中的專案可能導致資料永久遺失」正好點出不備份的後果，才會讓後一句「強烈建議備份」顯得合理。(A) 年度預算報告核准、(C) 行銷部門研討會、(D) 產品型錄下載，三者皆與雲端維護、資料備份完全無關，是不相關選項。","optionNotes":["(A) 敘述董事會核准預算報告，與雲端維護通知的主題無關，純屬干擾選項。","(B) 說明未備份可能導致資料永久遺失，直接鋪陳後句「強烈建議備份」的原因，邏輯連貫，為正解。","(C) 敘述行銷部門研討會地點，與 IT 維護、資料存取完全無關。","(D) 敘述下載產品型錄的方式，與段落主題（雲端維護、備份）無關。"],"sentenceInsertion":true},{"q":"空格 [3]","options":["resume","resumes","resumed","will resume"],"answer":0,"explanation":"考點：時間副詞子句的動詞時態。空格所在的部分為 after normal operations ___ on Wednesday morning，是由 after 引導、修飾「錯誤發生時間點」的時間子句，描述「星期三早上恢復正常運作」這件尚未發生（相對於發文當下）的未來事件。英文文法規則：在 after／when／once／before 等表時間的副詞子句中，即使指涉未來，也要用「現在式」取代 未來式（will + 原形），故用 resume。resumes（第三人稱單數）在文法上雖然可用於現在式，但主詞 normal operations 為複數名詞，動詞需用原形 resume 才符合主謂一致；resumed 為過去式，與「星期三早上恢復」這個未來時間點矛盾；will resume 則違反時間子句不用未來式的規則。","optionNotes":["resume：原形動詞，主詞 operations 為複數，時間子句中以現在式表未來，為正解。","resumes：現在式但為第三人稱單數形態，與複數主詞 operations 不一致，文法錯誤。","resumed：過去式，與句意「星期三早上（尚未到來）恢復運作」的未來時間點矛盾。","will resume：未來式，但 after 引導的時間副詞子句依規則須用現在式表未來，此為常見誤答陷阱。"],"sentenceInsertion":false},{"q":"空格 [4]","options":["administer","administrator","administration","administrative"],"answer":1,"explanation":"考點：詞性辨析——複合名詞（人稱名詞 vs. 抽象名詞）。空格前為 the network，兩字組成複合名詞，指「負責處理該部門詢問的人或單位」；後句 via the ticketing portal（透過工單系統）暗示詢問會被「送交某個負責處理的對象」，語意上最合理的是「網路管理員」這個職稱，即 network administrator。administration 雖也是名詞，但指「管理部門／行政」這個抽象機構整體，語感較生硬且通常不會用「direct inquiries to the network administration」這種說法；administer 是動詞原形，administrative 是形容詞，兩者詞性皆不符合名詞複合詞的位置需求。","optionNotes":["administer：動詞原形（管理），不能放在 the network 之後充當名詞角色。","administrator：名詞，指「管理員」這個職稱角色，與 network 組成 network administrator（網路管理員），為正解，語意最自然。","administration：名詞，指「管理部門、行政單位」這個抽象整體，與語境中「將詢問導向特定負責人」的語感略有落差，為次要誘答。","administrative：形容詞（行政的、管理的），需接名詞使用，此處空格本身就是句子唯一的名詞位置，詞性不符。"],"sentenceInsertion":false}],"translation":"【內部通知】收件人：全體工程人員／發件人：資訊系統管理部／日期：10 月 18 日／主旨：雲端儲存系統升級通知\n\n請注意，本公司雲端伺服器將於下週二晚間 10:00 起進行架構升級。此次升級旨在提升資料存取速度，並強化各區域辦公室的系統安全性。\n\n在為期六小時的維護期間，共用程式碼庫將暫時無法存取。未備份進行中的專案可能導致資料永久遺失。我們強烈建議所有開發人員在排定關機前，先儲存本機端檔案並中斷網路連線。\n\n若在星期三早上正常運作恢復後，遇到任何檔案傳輸錯誤或登入異常，請立即回報。所有技術問題請透過工單系統，聯繫網路管理員。","keyWords":[{"word":"bolster","pos":"v.","meaning":"強化、支撐","freq":"中頻"},{"word":"maintenance window","pos":"n.phr.","meaning":"維護時段","freq":"高頻"},{"word":"repository","pos":"n.","meaning":"儲存庫","freq":"中頻"},{"word":"anomaly","pos":"n.","meaning":"異常狀況","freq":"中頻"},{"word":"ticketing portal","pos":"n.phr.","meaning":"工單系統入口","freq":"中頻"}]},{"id":"xd-r2","part":6,"title":"辦公室搬遷計畫備忘錄","genre":"備忘錄","difficulty":"中階","passages":[{"label":"備忘錄","text":"To: All Project Managers\nFrom: Facilities Management Office\nDate: November 2\nSubject: Office Relocation Schedule\n\nAs part of our corporate expansion, the Hsinchu project management team will relocate to the new Technology Park campus next Friday. To ensure a smooth transition, all staff members must adhere to the packing guidelines outlined below.\n\nAll desktop computers, monitors, and peripheral hardware must be labeled clearly with your employee ID number. [[1]], please place all active project files and physical reference manuals into the designated moving crates by Thursday at 3:00 PM.\n\nThe moving contractors will begin transporting equipment at 6:00 PM. [[2]] the relocation process is underway, unauthorized personnel will not be permitted inside either facility.\n\nWe anticipate that the new office setup [[3]] by Monday morning at 8:00 AM. Your cooperation and [[4]] throughout this transition period are greatly appreciated."}],"questions":[{"q":"空格 [1]","options":["In contrast","Furthermore","Regrettably","On the contrary"],"answer":1,"explanation":"考點：轉承副詞——語意銜接（附加 vs. 對比）。前句說「所有桌上型電腦、螢幕與周邊設備都必須清楚標示員工編號」，後句接著說「請將進行中的專案檔案與紙本參考手冊放入指定搬運箱」——兩句都是同一類指令（打包規範）的延伸項目，屬於「補充、追加」的關係，而非對比或轉折，因此應選表示「此外、再者」的 Furthermore。In contrast 與 On the contrary 都表示「相反、對比」，但前後兩句並無矛盾或對立；Regrettably（遺憾地）帶有負面情緒語氣，與純粹列出打包指示的中性語境不符。","optionNotes":["In contrast：表示「相較之下」，用於呈現兩件對立的事物，此處前後句並非對比關係。","Furthermore：表示「此外、再者」，用於補充同性質的另一項規定，與前後句同為打包指示的邏輯相符，為正解。","Regrettably：表示「遺憾地」，帶負面情緒，與本段純粹說明打包程序的中性語氣不合。","On the contrary：表示「恰恰相反」，用於推翻前述說法，此處後句並未推翻前句。"],"sentenceInsertion":false},{"q":"空格 [2]","options":["While","During","Owing to","Despite"],"answer":0,"explanation":"考點：連接詞 vs. 介系詞——後方接完整子句還是名詞片語。空格後方為 the relocation process is underway，這是一個含主詞（the relocation process）與動詞（is underway）的完整子句，因此空格必須填「連接詞」而非「介系詞」。While（當……的時候／在……期間，可接完整子句）文法正確，且語意上「當搬遷正在進行時，不得有未授權人員進入」也完全合理。During、Owing to、Despite 皆為介系詞，後面只能接名詞或名詞片語（如 during the relocation），不能直接接一個主詞+動詞的完整子句，因此在文法上都不成立。","optionNotes":["While：從屬連接詞，可直接連接完整子句，表示「當……時」，文法與語意皆通順，為正解。","During：介系詞，後面須接名詞（如 during the relocation），不能接完整子句 the relocation process is underway，文法錯誤。","Owing to：介系詞片語，意為「由於」，表因果而非時間關係，且同樣不能接完整子句，文法與語意皆不合。","Despite：介系詞，意為「儘管」，表讓步對比，且不能接完整子句，文法錯誤。"],"sentenceInsertion":false},{"q":"空格 [3]","options":["completes","completed","will be completed","has completed"],"answer":2,"explanation":"考點：主被動與時態辨析。主詞 the new office setup（新辦公室的整備工作）是被「完成」的對象，而非主動完成的行為者，因此需用被動語態；句尾 by Monday morning at 8:00 AM（在星期一早上 8 點之前）是明確的未來截止時間點，搭配未來式最合乎邏輯，故答案為 will be completed（將會被完成）。completes 是主動語態且為現在式，語意變成「辦公室整備『自己主動』完成」，不合邏輯也不合時態；completed 是主動過去式，與尚未發生的未來時間矛盾；has completed 是主動現在完成式，同樣犯了主動語態的邏輯錯誤（setup 不能自己完成自己）。","optionNotes":["completes：主動語態現在式，語意上「整備工作」不能主動「完成」自己，且時態不搭配未來時間點，錯誤。","completed：主動語態過去式，與句尾未來時間 by Monday morning 矛盾。","will be completed：被動語態未來式，主詞是被完成的對象，且搭配未來截止時間，文法與語意皆正確，為正解。","has completed：主動語態現在完成式，同樣不符合被動邏輯，且現在完成式強調「已經完成」，與尚未到來的星期一早上矛盾。"],"sentenceInsertion":false},{"q":"空格 [4]","options":["assist","assistant","assisted","assistance"],"answer":3,"explanation":"考點：詞性辨析——並列名詞結構。空格與前面的 cooperation（合作，名詞）以 and 連接，並列的兩者詞性必須一致，且共同作主詞（Your cooperation and ___）。cooperation 是抽象名詞，因此空格也應填抽象名詞 assistance（協助），使句意為「感謝您在此過渡期間的合作與協助」。assist 是動詞原形，assistant 是「助理」這種具體職稱名詞（與抽象語境不搭），assisted 是動詞過去式／過去分詞，三者詞性都不能與 cooperation 並列作主詞。","optionNotes":["assist：動詞原形，不能與名詞 cooperation 並列作主詞，詞性不符。","assistant：名詞，但指「助理」這個具體職位角色，與抽象名詞 cooperation 語意類別不搭。","assisted：動詞的過去式或過去分詞，不能作主詞使用，詞性不符。","assistance：抽象名詞「協助」，與 cooperation 詞性一致、語意搭配，為正解。"],"sentenceInsertion":false}],"translation":"【備忘錄】收件人：全體專案經理／發件人：總務管理處／日期：11 月 2 日／主旨：辦公室搬遷計畫\n\n因應公司擴編，新竹專案管理團隊將於下週五遷至新竹科學園區新園區。為確保搬遷過程順利，所有員工皆須遵守以下打包規範。\n\n所有桌上型電腦、螢幕及周邊設備都必須清楚標示員工編號。此外，請於星期四下午 3:00 前，將所有進行中的專案檔案及紙本參考手冊放入指定的搬運箱。\n\n搬家承包商將於晚間 6:00 開始搬運設備。當搬遷作業進行期間，未經授權人員將不得進入兩處場地。\n\n我們預計新辦公室的整備工作將於星期一早上 8:00 前完成。非常感謝您在此過渡期間的合作與協助。","keyWords":[{"word":"peripheral hardware","pos":"n.phr.","meaning":"周邊硬體設備","freq":"中頻"},{"word":"designated","pos":"adj.","meaning":"指定的","freq":"高頻"},{"word":"crate","pos":"n.","meaning":"板條箱、搬運箱","freq":"中頻"},{"word":"underway","pos":"adj.","meaning":"進行中的","freq":"中頻"},{"word":"unauthorized personnel","pos":"n.phr.","meaning":"未經授權人員","freq":"高頻"}]},{"id":"xd-r3","part":6,"title":"貨運延遲通知商務 Email","genre":"商務Email","difficulty":"中階","passages":[{"label":"商務Email","text":"To: david.wu@marketech-intl.com\nFrom: c.miller@apex-logistics.com\nDate: September 25\nSubject: Update on Shipping Schedule: Order #MK-4402\n\nDear Mr. Wu,\n\nThank you for your recent purchase order (#MK-4402) for 200 high-precision optical sensors. We are writing to inform you of a temporary logistics adjustment regarding your shipment.\n\nDue to unexpected customs clearance backlogs at the regional export terminal, our dispatch schedule has been impacted. [[1]], the departure of your freight will be delayed by approximately three business days.\n\n[[2]] Our supply chain coordination team has already upgraded your shipping tier to express air freight at no additional charge. This measure will ensure that your components arrive well before your assembly line initialization date.\n\nPlease confirm receipt of this notice by replying to this email. If you have any immediate concerns regarding your delivery timeline, please do not hesitate to contact our customer servicing desk [[3]]. We remain committed to providing [[4]] service to support your manufacturing operations.\n\nSincerely,\nChristian Miller\nSenior Operations Supervisor"}],"questions":[{"q":"空格 [1]","options":["Consequently","Competitively","Mutually","Hesitantly"],"answer":0,"explanation":"考點：轉承副詞——因果關係。前句說明「由於海關通關作業積壓，出貨排程受到影響」（原因），後句說「貨物出貨將延遲約三個工作天」（結果），前後兩句是明確的因果關係，因此應選表示「因此、結果」的 Consequently。Competitively（競爭地）、Mutually（相互地）、Hesitantly（猶豫地）三者皆為描述方式或態度的副詞，與「原因→結果」的邏輯關係無關，語意也不通順。","optionNotes":["Consequently：表示「因此、結果」，承接前句的原因（海關積壓）帶出後句的結果（延遲出貨），邏輯正確，為正解。","Competitively：意為「競爭地」，與本句因果邏輯無關，語意不通。","Mutually：意為「相互地」，通常用於雙方互惠情境，與此處單向說明延遲原因不符。","Hesitantly：意為「猶豫地」，形容動作方式，與因果轉承的語意功能不符。"],"sentenceInsertion":false},{"q":"空格 [2]","options":["The optical sensors are manufactured under strict technical guidelines.","To minimize project downtime, we have expedited the final transit leg.","You can review our standard warranty terms on the corporate portal.","All payment invoices must be settled within thirty calendar days."],"answer":1,"explanation":"考點：句子插入題——段落主旨的承轉。空格前一段結尾說貨物將延遲三個工作天；空格後緊接「我方供應鏈協調團隊已將您的貨運等級免費升級為快遞空運」及「此措施將確保您的零件在裝配線啟用日期前抵達」。可知本段主旨是「公司為彌補延遲、加速出貨所採取的補救措施」，且後句用 This measure（此措施）指代空格句所描述的行動，形成「概括說明→具體細節」的常見段落結構。(B)「為降低專案停工風險，我們已加速了最後一段運輸行程」正是對這項補救措施的概括性開場句，銜接後方 This measure 的具體說明，邏輯最連貫。(A) 感測器製造規範、(C) 保固條款查詢、(D) 付款發票條款，皆與本段「加速出貨、彌補延遲」的主題無關。","optionNotes":["(A) 說明感測器依嚴格技術規範製造，與本段「延遲後的補救措施」主題無關，屬干擾選項。","(B) 概括說明「為降低專案停工風險已加速最後一段運輸」，與後句 This measure（此措施）指代一致，並為下一句「升級為快遞空運」的具體說明鋪陳，邏輯連貫，為正解。","(C) 引導讀者查詢保固條款，與出貨延遲、加速補救的主題無關。","(D) 說明付款發票須於三十天內結清，屬於財務條款，與運輸延遲補救措施無關。"],"sentenceInsertion":true},{"q":"空格 [3]","options":["direct","directly","direction","director"],"answer":1,"explanation":"考點：詞性辨析——副詞修飾動詞。空格所在句為 please do not hesitate to contact our customer servicing desk ___，動詞 contact（聯繫）之後加上受詞 our customer servicing desk 後，句子的核心結構已完整，此時空格是用來修飾動詞 contact 的方式副詞，表示「直接聯繫（不經轉介）」，故應填副詞 directly。direct 是形容詞或動詞原形，direction 與 director 皆為名詞，三者都不能在此處擔任修飾動詞的副詞角色。","optionNotes":["direct：可作形容詞（直接的）或動詞原形（指揮），但此處句子已有主要動詞 contact，不需要也不能再放一個動詞或裸形容詞在句尾修飾動詞。","directly：副詞，修飾動詞 contact，表示「直接聯繫」，詞性與語意皆正確，為正解。","direction：名詞「方向、指示」，不能作副詞修飾動詞。","director：名詞「主管、董事」，放在句尾語意不通，且詞性不符。"],"sentenceInsertion":false},{"q":"空格 [4]","options":["exception","exceptionally","exceptional","except"],"answer":2,"explanation":"考點：詞性辨析——形容詞修飾名詞。空格後方為名詞 service（服務），providing 是及物動詞，其受詞為「___ service」這個名詞片語，因此空格需填形容詞來修飾 service，表示「提供卓越的服務」，故選 exceptional（卓越的、非凡的）。exception 是名詞「例外」，exceptionally 是副詞（通常修飾形容詞或動詞，如 exceptionally good），except 是介系詞／連接詞（除了……之外），三者詞性皆不能直接修飾名詞 service。","optionNotes":["exception：名詞「例外」，與 service 連用會形成語意不通的複合詞，詞性不符。","exceptionally：副詞，通常修飾形容詞或副詞（如 exceptionally good service 才通），若直接修飾名詞 service 則詞性錯誤。","exceptional：形容詞「卓越的、非凡的」，直接修飾名詞 service，表示「providing exceptional service（提供卓越服務）」，語意通順，為正解。","except：介系詞或連接詞，意為「除了……之外」，放在此處語意不通，詞性也不符。"],"sentenceInsertion":false}],"translation":"【商務Email】收件人：david.wu@marketech-intl.com／發件人：c.miller@apex-logistics.com／日期：9 月 25 日／主旨：訂單 #MK-4402 出貨排程更新\n\n吳先生您好，\n\n感謝您日前訂購 200 個高精密光學感測器（訂單編號 #MK-4402）。我們寫這封信是要通知您，貴訂單的物流安排有一項暫時性調整。\n\n由於區域出口轉運站的海關通關作業出現非預期積壓，我方的出貨排程因此受到影響。因此，您貨物的出發時間將延遲約三個工作天。\n\n為降低專案停工風險，我方已加速了最後一段運輸行程。我方供應鏈協調團隊已將您的貨運等級免費升級為快遞空運。此措施將確保您的零組件能在您產線啟用日期之前順利送達。\n\n請回覆本郵件確認收到此通知。若您對交貨時程有任何立即疑慮，歡迎直接聯繫我方客服中心。我們將持續致力於提供卓越服務，以支援貴公司的製造營運。\n\n此致\nChristian Miller 敬上\n資深營運主管","keyWords":[{"word":"customs clearance","pos":"n.phr.","meaning":"海關通關","freq":"高頻"},{"word":"dispatch schedule","pos":"n.phr.","meaning":"出貨排程","freq":"中頻"},{"word":"expedite","pos":"v.","meaning":"加速進行","freq":"中頻"},{"word":"transit leg","pos":"n.phr.","meaning":"運輸行程中的一段","freq":"中頻"},{"word":"initialization","pos":"n.","meaning":"啟用、開始運作","freq":"中頻"}]},{"id":"xe-r1","part":7,"title":"NextGen Cloud Database 系統升級公告","genre":"網頁公告","difficulty":"中階","passages":[{"label":"網頁公告","text":"NextGen Cloud Database Platform - System Release 4.2\nReleased by: Core Software Development Division\nEffective Date: October 1\n\nWe are excited to announce the official launch of NextGen Cloud Database Release 4.2. This major software update introduces advanced query optimization scripts and an intuitive user interface designed to streamline data retrieval for enterprise analytics teams.\n\nKey Features of Release 4.2:\n- Automated Indexing: The platform now automatically scans query logs every 24 hours to re-index high-frequency search terms, reducing server latency by up to 30 percent.\n- Enhanced Security Protocols: All data in transit is protected using multi-layered 256-bit encryption, meeting global corporate banking security benchmarks.\n- Token Optimization Dashboard: System administrators can monitor real-time API token consumption across different departmental projects, allowing for precise budget tracking and cost control.\n\nDeployment Instructions: Existing corporate subscribers can upgrade to Release 4.2 without incurring extra licensing fees. System administrators must log into the management console and click the \"Execute Upgrade\" button during off-peak hours (recommended between 1:00 AM and 5:00 AM). The automated installation process takes approximately 45 minutes. During this period, active client database connections will be temporarily suspended."}],"questions":[{"q":"What is the primary purpose of the announcement?","options":["To introduce a new software update and its key features","To announce an increase in corporate subscription fees","To recruit software developers for a cloud infrastructure project","To report a security breach in the banking system"],"answer":0,"explanation":"考點：主旨題。全文開頭即點明「official launch of NextGen Cloud Database Release 4.2」，接著用 Key Features 段落逐一列出自動化索引、加密安全、Token 儀表板三項新功能，最後說明部署方式，通篇都是圍繞「新版本上市＋功能介紹」展開，故正解為 (A)。(B) 文中反而說升級「without incurring extra licensing fees」，不是漲價；(C) 全文沒有任何招募訊息；(D) 提到的是安全「防護規格」（256-bit 加密），並非發生資安事故的通報。","optionNotes":["公告開頭與 Key Features 段落均圍繞新版本功能展開，為正解。","文中明言升級不需額外費用，與漲價相反，是誘答。","全文無徵才相關文字，純屬無中生有。","提到的是加密防護標準，不是資安事件報告，字面 security 被挪用為誘答。"]},{"q":"According to the announcement, how does the new automated indexing feature benefit users?","options":["It eliminates the need for manual data entry.","It reduces server response latency by up to 30 percent.","It generates automated financial reports for project managers.","It allows unlimited API token consumption."],"answer":1,"explanation":"考點：細節定位題。定位 Automated Indexing 條列句：「reducing server latency by up to 30 percent」，直接對應選項 (B) 的敘述，為正解。(A) 文中談的是重新索引「查詢紀錄」而非資料鍵入，主題不同；(C) 財務報告功能屬於 Token Optimization Dashboard 的預算追蹤，不是自動索引的效果，且原文也沒有「生成報告」的說法；(D) Token Optimization Dashboard 是用來監控與控管 token 用量，恰與「無限制使用」相反。","optionNotes":["文中未提手動資料輸入的議題，屬無關混淆。","與 Automated Indexing 條列句「reducing server latency by up to 30 percent」完全對應，為正解。","生成財務報告的敘述並非索引功能所述，屬於張冠李戴。","Token Dashboard 是用來監控與控管用量，並非放任無限使用，與原文相反。"]},{"q":"What are system administrators advised to do when deploying the upgrade?","options":["Contact the customer support desk for an activation code.","Back up physical servers before clicking the upgrade button.","Execute the installation process during off-peak hours.","Pay an additional licensing fee through the management console."],"answer":2,"explanation":"考點：細節定位題。定位 Deployment Instructions 段：「must log into the management console and click the \"Execute Upgrade\" button during off-peak hours (recommended between 1:00 AM and 5:00 AM)」，明確指示應在離峰時段執行升級，對應選項 (C)。(A) 全文未提客服啟用碼；(B) 文中沒有備份實體伺服器的指示，只提到升級期間用戶端連線會暫停；(D) 文中反而強調升級「without incurring extra licensing fees」，不需額外付費。","optionNotes":["全文未出現聯繫客服或啟用碼的敘述，純屬捏造。","文中僅提及升級期間連線會暫停，並無備份伺服器的指示。","與 Deployment Instructions 段落「during off-peak hours」直接對應，為正解。","原文明言升級不需額外授權費用，與此選項相反。"]}],"translation":"NextGen 雲端資料庫平台－第 4.2 版系統發布\n發布單位：核心軟體開發部門\n生效日期：10 月 1 日\n\n我們很高興正式宣布 NextGen 雲端資料庫第 4.2 版上線。此次重大軟體更新導入了進階查詢最佳化腳本，以及設計精簡的直覺化使用者介面，旨在協助企業分析團隊加快資料檢索速度。\n\n第 4.2 版重點功能：\n－自動索引：平台現在每 24 小時自動掃描查詢紀錄，重新索引高頻搜尋詞，可將伺服器延遲降低最多 30%。\n－強化安全協定：所有傳輸中的資料皆採多層 256 位元加密保護，符合全球企業銀行業安全基準。\n－Token 用量優化儀表板：系統管理員可即時監控各部門專案的 API token 使用量，以利精準控管預算與成本。\n\n部署說明：現有企業訂閱戶可免額外授權費用升級至第 4.2 版。系統管理員須登入管理主控台，於離峰時段（建議凌晨 1:00 至 5:00）點擊「執行升級」按鈕。自動安裝流程約需 45 分鐘，期間用戶端資料庫連線將暫時中斷。","keyWords":[{"word":"optimization","pos":"n.","meaning":"最佳化","freq":"高頻"},{"word":"latency","pos":"n.","meaning":"延遲","freq":"中頻"},{"word":"encryption","pos":"n.","meaning":"加密","freq":"中頻"},{"word":"consumption","pos":"n.","meaning":"消耗、用量","freq":"高頻"},{"word":"deployment","pos":"n.","meaning":"部署、實施","freq":"高頻"}]},{"id":"xe-r2","part":7,"title":"企業語言訓練補助計畫內部信","genre":"內部email","difficulty":"中階","passages":[{"label":"內部email","text":"To: All Full-Time Staff\nFrom: Human Resources Training Division\nDate: November 10\nSubject: Corporate Language Training Subsidy Program\n\nAs part of our commitment to professional development and international communication excellence, Marketech International is expanding its language learning subsidy program for the upcoming fiscal year.\n\nStarting December 1, all full-time employees can apply for a 100% reimbursement on premium subscriptions to approved interactive language learning platforms, including Speak and Promova. This initiative is aimed at helping team members enhance their business English conversation skills and technical presentation fluency.\n\nApplication & Reimbursement Guidelines:\n1. Eligibility: Employees must have completed at least six months of continuous service with the company prior to the application date.\n2. Registration: Submit an online training request form through the internal HR portal before purchasing a subscription. You must select an approved platform and state your specific learning goals.\n3. Reimbursement: Upon completing a minimum of 20 hours of interactive speech training within a three-month period, submit your original digital payment receipts along with the platform's automated completion certificate to the finance department for full expense reimbursement.\n\nPlease note that applications submitted after December 20 will not be processed until the second quarter of next year. For further details regarding platform selection or eligibility verification, contact HR representative Claire Lin at extension 4401."}],"questions":[{"q":"Who is eligible to apply for the language training subsidy?","options":["Part-time interns and contract workers","Full-time staff who have worked at the company for at least six months","Only senior project managers and executives","Employees who have completed overseas business trips"],"answer":1,"explanation":"考點：細節定位題。定位標題下方第一句「all full-time employees can apply」與 Eligibility 條款「must have completed at least six months of continuous service」，兩處合併即為「任職滿六個月的全職員工」，對應選項 (B)。(A) 全文只針對 full-time staff，未含兼職實習生或約聘人員；(C) 文中未限定僅限資深主管或高層才能申請；(D) 出差經歷與申請資格完全無關，屬憑空捏造。","optionNotes":["主旨對象是 full-time 員工，並未包含兼職實習生或約聘人員，屬條件錯置。","同時對應「all full-time employees」與「至少六個月年資」兩項條件，為正解。","全文未限定僅資深主管或高層才可申請。","文中未提及出差紀錄與申請資格有關，純屬無關混淆。"]},{"q":"What must employees submit to the finance department to receive reimbursement?","options":["A written recommendation letter from their division head","A physical copy of a textbook and a study schedule","Payment receipts and an automated completion certificate","A standardized English proficiency test score report"],"answer":2,"explanation":"考點：細節定位題。定位 Reimbursement 條款：「submit your original digital payment receipts along with the platform's automated completion certificate to the finance department」，直接對應選項 (C)，為正解。(A) 文中沒有提及需要主管推薦信；(B) 課程是數位互動式訓練，並無實體教科書或讀書計畫的要求；(D) 文中要求的是平台的自動完成證明，而非標準化英語能力測驗成績單。","optionNotes":["全文未提需要主管推薦信作為核銷文件。","課程性質為線上互動訓練，未要求實體教科書或讀書計畫。","與 Reimbursement 條款「原始付款收據＋平台自動完成證明」完全對應，為正解。","文中要求的是平台自動核發的完成證明，不是外部英語檢定成績單，屬混淆誘答。"]},{"q":"What will happen if an employee submits an application on December 25?","options":["The application will be rejected permanently.","The employee will receive a 50 percent subsidy instead of a full reimbursement.","The request will be processed immediately by the finance team.","The application processing will be delayed until the second quarter."],"answer":3,"explanation":"考點：條件推論題。文末註明「applications submitted after December 20 will not be processed until the second quarter of next year」，12 月 25 日晚於 12 月 20 日期限，故申請會被延後至次年第二季才處理，對應選項 (D)。(A) 文中只說延後處理，並非永久拒絕；(B) 全文自始至終都是 100% 全額補助，沒有打折的規定；(C) 恰與原文「will not be processed until Q2」相反，是立即處理的反義誘答。","optionNotes":["原文說延後處理而非永久拒絕，程度過重，非正解。","全文自始強調 100% 全額補助，並無依逾期打折的規定。","與原文「延後至次年第二季才處理」直接相反，是反義誘答。","與「applications submitted after December 20 will not be processed until the second quarter」完全對應，為正解。"]}],"translation":"收件者：全體全職員工\n寄件者：人力資源訓練部\n日期：11 月 10 日\n主旨：企業語言訓練補助計畫\n\n身為對專業發展與國際溝通卓越表現的承諾之一，Marketech International 將於下一個會計年度擴大其語言學習補助計畫。\n\n自 12 月 1 日起，所有全職員工皆可申請對指定互動式語言學習平台（包含 Speak 與 Promova）付費訂閱方案的 100% 費用補助。此計畫旨在協助團隊成員提升商務英語會話能力與技術簡報的流暢度。\n\n申請與核銷須知：\n1. 資格：申請日前須在公司連續在職滿六個月。\n2. 登記：購買訂閱方案前，須先透過內部人資入口網站提交線上訓練申請表，並選定核可平台、說明具體學習目標。\n3. 核銷：於三個月內完成至少 20 小時的互動式口說訓練後，須將原始數位付款收據連同平台自動核發的完成證明一併提交財務部門，以獲得全額費用補助。\n\n請注意，12 月 20 日後提交的申請，將延後至明年第二季才會處理。若對平台選擇或資格認定有疑問，請洽人資代表 Claire Lin，分機 4401。","keyWords":[{"word":"subsidy","pos":"n.","meaning":"補助、津貼","freq":"高頻"},{"word":"reimbursement","pos":"n.","meaning":"報銷、費用返還","freq":"高頻"},{"word":"eligibility","pos":"n.","meaning":"資格、合格條件","freq":"高頻"},{"word":"continuous","pos":"adj.","meaning":"連續的","freq":"中頻"},{"word":"proficiency","pos":"n.","meaning":"熟練度、能力水準","freq":"中頻"}]},{"id":"xe-r3","part":7,"title":"台北貿易與職涯博覽會參展須知","genre":"參展注意事項","difficulty":"中階","passages":[{"label":"參展須知","text":"Taipei Trade & Career Expo 2026 - Exhibitor Registration Guidelines
