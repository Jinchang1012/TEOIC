<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F5F4EE">
<title>訓練場</title>
<style>
:root{
  --paper:#F5F4EE; --card:#FFFFFF; --line:#E3E1D4; --line-soft:#EDEBDF;
  --ink:#1C2B23; --ink-soft:#5C6B60; --ink-faint:#939C92;
  --pine:#24513B; --pine-deep:#16352A; --pine-tint:#E9F0E9; --pine-mid:#3E7157;
  --brass:#A87B24; --brass-tint:#F7F0DC; --brass-line:#E3D5AC;
  --clay:#B0492A; --clay-tint:#F8EAE3; --clay-line:#E5C4B4;
  --radius:14px;
  --sans:"Segoe UI","Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
  --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer}
button:focus-visible,textarea:focus-visible,details summary:focus-visible{outline:2px solid var(--pine);outline-offset:2px;border-radius:6px}
#app{max-width:760px;margin:0 auto;padding:22px 16px 90px}

/* ── 頂部 ── */
.masthead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.eyebrow{font-size:11px;letter-spacing:.22em;color:var(--ink-faint);font-weight:600}
.masthead h1{margin:2px 0 0;font-size:32px;font-weight:800;letter-spacing:.01em}
.score-chip{display:flex;align-items:baseline;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 18px;white-space:nowrap;font-variant-numeric:tabular-nums}
.score-chip .now{font-size:22px;font-weight:800;color:var(--pine)}
.score-chip .goal{font-size:14px;color:var(--ink-soft)}

/* ── 分頁 ── */
.tabs{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px;margin-bottom:18px;overflow-x:auto}
.tabs button{flex:1;padding:10px 8px;border-radius:999px;font-size:14px;font-weight:600;color:var(--ink-soft);white-space:nowrap;min-width:64px}
.tabs button.on{background:var(--pine-deep);color:#fff}
.tabs button .n{display:inline-block;margin-left:4px;font-size:11px;font-variant-numeric:tabular-nums;opacity:.75}
.tabs button .tab-ic{display:none}
.tabs button .tab-tx{display:inline}

/* ── 通用 ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.lbl{font-size:12px;letter-spacing:.26em;color:var(--ink-faint);font-weight:700;margin-bottom:8px}
.chiprow{display:flex;flex-wrap:wrap;gap:8px}
.fchip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);font-size:13.5px;color:var(--ink-soft)}
.fchip.on{background:var(--pine);border-color:var(--pine);color:#fff;font-weight:600}
.voicesel{padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:var(--card);font-size:13.5px;color:var(--ink-soft);max-width:150px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 22px;border-radius:12px;font-size:15px;font-weight:700}
.btn.primary{background:var(--pine);color:#fff}
.btn.primary:hover{background:var(--pine-deep)}
.btn.ghost{border:1.5px solid var(--line);color:var(--ink-soft);background:var(--card)}
.btn.ghost:hover{border-color:var(--ink-faint)}
.btn.small{padding:8px 14px;font-size:13.5px;border-radius:10px}
.btn:disabled{opacity:.45;cursor:default}
.muted{color:var(--ink-soft)} .faint{color:var(--ink-faint)}
.tagline{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--pine-tint);color:var(--pine)}
.tag.diff{background:var(--paper);color:var(--ink-soft);border:1px solid var(--line)}
.tag.clay{background:var(--clay-tint);color:var(--clay)}
.tag.brass{background:var(--brass-tint);color:var(--brass)}
.empty{padding:36px 12px;text-align:center;color:var(--ink-faint)}
.hr{border:none;border-top:1px dashed var(--line);margin:16px 0}

/* ── 總覽 ── */
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:560px){.statgrid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.stat .v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.2}
.stat .k{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.catrow{display:flex;align-items:center;gap:12px;padding:7px 0}
.catrow .nm{width:118px;flex:none;font-size:14px}
.catrow .bar{flex:1;height:9px;background:var(--line-soft);border-radius:99px;overflow:hidden}
.catrow .bar i{display:block;height:100%;border-radius:99px;background:var(--pine-mid)}
.catrow .bar i.low{background:var(--clay)} .catrow .bar i.mid{background:var(--brass)}
.catrow .pc{width:86px;flex:none;text-align:right;font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
.today-acts{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.callout{background:var(--brass-tint);border:1px solid var(--brass-line);border-radius:12px;padding:12px 16px;font-size:14.5px;margin-top:12px}

/* ── 單字卡 ── */
.v-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.fc{perspective:1400px;height:380px;margin-bottom:14px}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.3,.7,.3,1)}
.fc.flip .fc-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;display:flex;flex-direction:column;overflow-y:auto}
.face.back{transform:rotateY(180deg)}
.face .top{display:flex;justify-content:space-between;align-items:center}
.fc-word{font-family:var(--serif);font-size:44px;font-weight:600;letter-spacing:.01em;text-align:center;margin:auto 0 4px;line-height:1.15;word-break:break-word}
.fc-pos{text-align:center;color:var(--ink-faint);font-style:italic;margin-bottom:auto}
.fc-hint{text-align:center;font-size:12.5px;color:var(--ink-faint);letter-spacing:.1em}
.fc-word-sm{font-family:var(--serif);font-size:22px;font-weight:600}
.fc-meaning{font-size:19px;font-weight:700;margin:10px 0 2px}
.fc-ex{font-family:var(--serif);font-size:16.5px;margin-top:10px;line-height:1.65}
.fc-ex b{color:var(--pine);font-weight:700}
.fc-exzh{font-size:13.5px;color:var(--ink-soft);margin-top:2px}
.fc-collo{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.fc-collo span{font-size:12.5px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:3px 10px;color:var(--ink-soft)}
.fc-tip{margin-top:12px;background:var(--brass-tint);border:1px solid var(--brass-line);border-radius:10px;padding:9px 13px;font-size:13.5px}
.grade{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grade button{padding:14px 8px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);font-weight:700;font-size:15px}
.grade .g0:hover{border-color:var(--clay);color:var(--clay)}
.grade .g1:hover{border-color:var(--brass);color:var(--brass)}
.grade .g2:hover{border-color:var(--pine);color:var(--pine)}
.grade small{display:block;font-weight:400;font-size:11.5px;color:var(--ink-faint);margin-top:2px}
.starbtn{font-size:22px;line-height:1;color:var(--ink-faint)}
.starbtn.on{color:var(--brass)}
.speakbtn{font-size:17px;line-height:1;color:var(--ink-faint);background:none;border:none;padding:2px 4px;cursor:pointer;vertical-align:middle}
.speakbtn:hover{color:var(--pine)}
.boxdots{display:flex;gap:3px}
.boxdots i{width:7px;height:7px;border-radius:99px;background:var(--line)}
.boxdots i.f{background:var(--pine-mid)}

/* ── Part 5 ── */
.q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.q-sent{font-size:19.5px;line-height:1.75;font-weight:600;margin:10px 0 18px}
.q-sent .blank{display:inline-block;min-width:74px;border-bottom:2.5px solid var(--pine);margin:0 3px;text-align:center;color:var(--pine);font-weight:800}
.q-sent .kw-mark{border-bottom:2px dotted var(--brass);font-weight:700}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:center;gap:13px;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);text-align:left;font-size:15.5px;transition:border-color .12s}
.opt:hover{border-color:var(--ink-faint)}
.opt .abc{flex:none;width:26px;height:26px;border-radius:8px;background:var(--paper);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--ink-soft)}
.opt.correct{border-color:var(--pine);background:var(--pine-tint)}
.opt.correct .abc{background:var(--pine);border-color:var(--pine);color:#fff}
.opt.wrong{border-color:var(--clay);background:var(--clay-tint)}
.opt.wrong .abc{background:var(--clay);border-color:var(--clay);color:#fff}
.opt.dim{opacity:.5}
.opt[disabled]{cursor:default}
.opt[disabled]:hover{border-color:var(--line)}
.opt.correct[disabled]:hover{border-color:var(--pine)} .opt.wrong[disabled]:hover{border-color:var(--clay)}
.verdict{font-size:16px;font-weight:800;margin:14px 0 4px}
.verdict.ok{color:var(--pine)} .verdict.no{color:var(--clay)}
.exp{border-top:1px dashed var(--line);margin-top:14px;padding-top:14px}
.exp .sec{margin-bottom:16px}
.exp p{margin:6px 0;font-size:15px}
.onote{display:flex;gap:9px;font-size:14px;padding:7px 10px;border-radius:9px;margin-top:5px;background:var(--paper)}
.onote.ok{background:var(--pine-tint)}
.onote .m{flex:none;font-weight:800;width:38px}
.onote.ok .m{color:var(--pine)} .onote .m.x{color:var(--clay)}
.kwchips{display:flex;flex-direction:column;gap:7px}
.kwchip{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;background:var(--brass-tint);border:1px solid var(--brass-line);border-radius:11px;padding:8px 13px;font-size:14px}
.kwchip .w{font-family:var(--serif);font-weight:700;font-size:15.5px}
.kwchip .p{font-style:italic;color:var(--ink-faint);font-size:12.5px}
.kwchip .f{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--brass)}
.patternbox{background:var(--pine-tint);border-radius:12px;padding:13px 16px;font-size:14.5px}
.patternbox .pname{font-family:var(--serif);font-weight:700;font-size:16px;color:var(--pine-deep)}
.patternbox .pex{font-family:var(--serif);font-style:italic;margin-top:5px;color:var(--ink-soft)}
.q-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
.prog{height:5px;background:var(--line-soft);border-radius:99px;overflow:hidden;margin-bottom:14px}
.prog i{display:block;height:100%;background:var(--pine);border-radius:99px;transition:width .2s}
.sum-score{text-align:center;padding:8px 0 2px}
.sum-score .big{font-size:52px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--pine)}
.setup-note{font-size:13px;color:var(--ink-faint);margin-top:10px}

/* ── 收藏/錯題 ── */
.fav-item{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:var(--card)}
.fav-item .qt{font-size:15px;font-weight:600;margin:7px 0 3px;line-height:1.55}
.fav-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fav-meta .sp{margin-left:auto;display:flex;align-items:center;gap:10px}
.wordrow{display:flex;align-items:baseline;gap:10px;padding:9px 2px;border-bottom:1px dashed var(--line-soft);flex-wrap:wrap}
.wordrow .w{font-family:var(--serif);font-weight:700;font-size:16.5px}
.wordrow .m{color:var(--ink-soft);font-size:14px}

/* ── 題庫 ── */
textarea{width:100%;min-height:150px;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-family:Consolas,"Cascadia Mono",monospace;font-size:13px;background:var(--card);color:var(--ink);resize:vertical}
.imp-msg{border-radius:10px;padding:10px 14px;font-size:14px;margin-top:10px}
.imp-msg.ok{background:var(--pine-tint);color:var(--pine-deep)}
.imp-msg.err{background:var(--clay-tint);color:var(--clay)}
.gbanner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-radius:12px;margin-bottom:14px;font-size:14px;line-height:1.5;flex-wrap:wrap}
.gbanner.err{background:var(--clay-tint);border:1px solid var(--clay-line);color:var(--clay)}
.gbanner .x{background:none;border:none;color:inherit;font-size:16px;line-height:1;padding:2px 6px;cursor:pointer;flex:none;font-weight:700}
.diag-grid{display:grid;gap:6px;font-size:13px;color:var(--ink-soft)}
.diag-grid code{background:var(--paper);border-radius:6px;padding:1px 6px;font-size:12px}
details{border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-top:12px;background:var(--card)}
details summary{cursor:pointer;font-weight:700;font-size:14.5px;color:var(--ink-soft)}
details[open] summary{margin-bottom:10px}
pre.schema{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:12px;overflow-x:auto;line-height:1.5}
.bank-row{display:flex;justify-content:space-between;align-items:center;padding:8px 2px;border-bottom:1px dashed var(--line-soft);font-size:14px;gap:8px}
.bank-row .del{color:var(--clay);font-size:13px;font-weight:600;flex:none}

/* ── 閱讀 6・7 ── */
.passage{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:10px 0 12px}
.plabel{font-size:11.5px;letter-spacing:.18em;color:var(--ink-faint);font-weight:700;margin-bottom:6px}
.ptext{font-family:var(--serif);font-size:16px;line-height:1.8}
.ptext .blank{font-family:var(--sans)}
.pblank{display:inline-block;min-width:54px;text-align:center;border-bottom:2.5px solid var(--pine);color:var(--pine);font-family:var(--sans);font-size:12.5px;font-weight:800;padding:0 6px}
.pblank.cur{background:var(--pine-tint);border-radius:7px 7px 0 0}
.rset{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:var(--card)}
.rset .t{font-size:15.5px;font-weight:700;margin:6px 0 2px}
.rq .qtext{font-size:16px;font-weight:700;margin:4px 0 12px}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
@media(max-width:560px){
  .masthead h1{font-size:26px}
  .q-sent{font-size:17.5px}
  .fc-word{font-size:36px}
  .catrow .nm{width:96px;font-size:13px}
}

/* ── 行動裝置（APK / 手機瀏覽器）── */
@media(max-width:640px){
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{font-size:16px}
  #app{max-width:100%;padding:14px 14px calc(72px + env(safe-area-inset-bottom))}

  /* masthead 精簡 */
  .masthead{gap:8px;margin-bottom:14px}
  .eyebrow{font-size:9px}
  .masthead h1{font-size:22px}
  .voicesel{max-width:120px;font-size:12.5px}

  /* 底部導覽（App 風格 tab bar）*/
  .tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    display:flex;background:#fff;border:none;border-top:1px solid var(--line);
    border-radius:0;padding:4px 2px calc(4px + env(safe-area-inset-bottom));
    margin-bottom:0;overflow-x:visible;
  }
  .tabs button{
    flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:2px;padding:6px 2px;border-radius:10px;
    font-size:10.5px;font-weight:600;white-space:normal;
  }
  .tabs button.on{background:transparent;color:var(--pine-deep)}
  .tabs button .tab-ic{display:block;font-size:20px;line-height:1}
  .tabs button .tab-tx{display:flex;align-items:center;gap:2px;line-height:1.1}
  .tabs button .n{display:none}

  /* 卡片／按鈕全寬、觸控友善 */
  .card{padding:16px;margin-bottom:12px}
  .btn{width:100%;min-height:48px;font-size:16px}
  .opt{min-height:48px;padding:13px 14px;font-size:17px}
  .fchip{min-height:40px;display:inline-flex;align-items:center;white-space:nowrap;flex:0 0 auto}
  .chiprow{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .chiprow::-webkit-scrollbar{display:none}

  /* 單字卡 */
  .fc{height:min(58vh,460px)}
  .fc-word{font-size:32px}
  .fc-word-sm{font-size:19px}

  /* Part 5 題目 */
  .q-sent{font-size:18px}

  /* 閱讀 6・7 */
  .rset{padding:12px 14px}
  .ptext{line-height:1.7}
}
</style>

<div id="app">
  <header class="masthead">
    <div>
      <div class="eyebrow">TOEIC TRAINING GROUND</div>
      <h1>訓練場</h1>
    </div>
    <select id="voicesel" class="voicesel"></select>
  </header>
  <nav class="tabs" id="tabs" role="tablist"></nav>
  <div id="globalBanner"></div>
  <main id="view"></main>
</div>

<script>
'use strict';
/* =====================================================================
   內建題庫（由 Claude 維護：之後把新題目貼給 Claude，
   Claude 會轉成同格式加進下面兩個陣列並重新發佈）
   ===================================================================== */
const BUILTIN_QUESTIONS = /*Q_DATA*/[{"id":"pos-1","category":"pos","categoryName":"詞性","question":"All shipments ___ from the Taoyuan warehouse must be inspected before they leave the loading dock.","options":["depart","departure","departing","departed"],"answer":2,"difficulty":"基礎","translation":"所有從桃園倉庫出發的貨運,在離開裝卸區前都必須經過檢查。","explanation":"看空格前後結構:空格前是名詞 shipments,空格後是介系詞片語 from the Taoyuan warehouse,再後面才是主要動詞 must be inspected。這代表空格要填一個能修飾 shipments、且能帶出介系詞片語的成分,也就是分詞當形容詞用。departing 是現在分詞,表示「正在出發的」,與 shipments 是主動關係(貨運自己出發),放在名詞後面修飾,是典型的分詞後位修飾結構。depart 是原形動詞不能直接修飾名詞;departure 是名詞,兩個名詞不能疊放;departed 雖是過去分詞,但 depart 是不及物動詞,不能用被動式的過去分詞來修飾名詞(不存在「被出發」的邏輯),故不合語意。","optionNotes":["depart 是動詞原形,不能放在名詞後面直接修飾名詞,句子會少了主要動詞而結構破碎,是誤把此空格當成該子句唯一動詞的陷阱。","departure 是名詞,若填入會變成「shipments departure」兩個名詞並列,不符合英文語法,是誤以為前面出現名詞就該再填名詞的陷阱。","departing 為現在分詞,與 shipments 為主動關係(貨運本身出發),置於名詞後方修飾,結構與語意皆正確,為本題正解。","departed 是過去分詞,depart 為不及物動詞無被動語態,「被出發」不合邏輯,是誤把及物動詞的被動分詞規則套用到不及物動詞上的陷阱。"],"keyWords":[{"word":"shipment","pos":"n.","meaning":"貨運、裝運","freq":"高頻"},{"word":"warehouse","pos":"n.","meaning":"倉庫","freq":"高頻"},{"word":"inspect","pos":"v.","meaning":"檢查","freq":"中頻"}],"pattern":{"name":"現在分詞後位修飾名詞","note":"當分詞子句與被修飾的名詞是主動關係時,用現在分詞(V-ing)放在名詞後面,等同於省略關代與 be 動詞的形容詞子句(= shipments which depart from...)。","example":"Employees working overtime this week will receive additional compensation."}},{"id":"pos-2","category":"pos","categoryName":"詞性","question":"The finance director reviewed the report ___ before submitting the annual budget proposal to the board.","options":["carefully","care","careful","carefulness"],"answer":0,"difficulty":"基礎","translation":"財務總監在向董事會提交年度預算提案之前,仔細審閱了這份報告。","explanation":"看空格前後結構:空格前是「主詞+動詞+受詞」(reviewed the report)已是完整句子,空格後接的是分詞片語 before submitting...,代表句子主結構已經完整,不再需要任何名詞或形容詞成分。此時空格只能填副詞,用來修飾動詞 reviewed,說明「審閱」這個動作的方式,carefully(仔細地)符合語意也符合結構。careful 是形容詞,不能修飾動詞;care 是名詞或動詞原形,放在此處不合文法;carefulness 是名詞,同樣無法修飾動詞。","optionNotes":["carefully 是副詞,修飾動詞 reviewed,說明審閱報告的方式,句意通順、結構正確,為本題正解。","care 兼具名詞與動詞原形詞性,但句子已有主要動詞 reviewed,不需要也不能再插入一個動詞或裸名詞,是誤選常見單字卻忽略句子已有動詞的陷阱。","careful 是形容詞,只能修飾名詞或作主詞補語,不能直接接在及物動詞的受詞後面修飾動詞,是誤把「動詞+受詞」結構看成需要形容詞補語的陷阱。","carefulness 是抽象名詞,句子已有受詞 the report,再放一個名詞會造成兩個名詞並列、句構混亂,是誤以為空格要填名詞的陷阱。"],"keyWords":[{"word":"submit","pos":"v.","meaning":"提交","freq":"極高頻"},{"word":"proposal","pos":"n.","meaning":"提案","freq":"高頻"},{"word":"board","pos":"n.","meaning":"董事會","freq":"高頻"}]},{"id":"pos-3","category":"pos","categoryName":"詞性","question":"Employees who fail to submit their timesheets by Friday will not receive their ___ on schedule.","options":["compensate","compensating","compensated","compensation"],"answer":3,"difficulty":"中階","translation":"未能在週五前繳交工時表的員工,將無法準時領到薪酬。","explanation":"看空格前後結構:空格前是所有格代名詞 their,空格後接介系詞片語 on schedule,而動詞 receive 已經出現,代表這個空格要當 receive 的受詞,必須是名詞。their 後面只能接名詞(或形容詞+名詞),compensation(薪酬、報酬)是抽象名詞,符合「所有格+名詞」的結構,也符合語意「領到薪酬」。compensate 是動詞原形,不能接在所有格後面;compensating 是動名詞或現在分詞,雖然動名詞理論上可接所有格,但語意上「他們的補償(動作)」不通順,此處要表達的是「薪酬」這個具體事物而非動作;compensated 是過去分詞/過去式,不能作名詞使用。","optionNotes":["compensate 是動詞原形,所有格 their 後面不能直接接原形動詞,是誤把動詞當作名詞使用的陷阱。","compensating 為動名詞,雖然形式上可接在所有格後面,但語意會變成「他們補償的行為」,與「準時領到」的語意搭配不通順,是誤以為 -ing 結尾都能通用的陷阱。","compensated 是過去分詞或過去式動詞,不具名詞功能,不能放在所有格後面當受詞,是誤把字尾 -ed 與形容詞化混淆的陷阱。","compensation 是名詞,置於所有格 their 之後、作為 receive 的受詞,語意「領到薪酬」通順自然,為本題正解。"],"keyWords":[{"word":"timesheet","pos":"n.","meaning":"工時表","freq":"中頻"},{"word":"on schedule","pos":"phr.","meaning":"準時、按時程","freq":"高頻"},{"word":"compensation","pos":"n.","meaning":"薪酬、補償","freq":"高頻"}]},{"id":"pos-4","category":"pos","categoryName":"詞性","question":"Despite the ___ increase in raw material costs, the manufacturer decided not to raise product prices this quarter.","options":["considerably","considerable","considerate","consideration"],"answer":1,"difficulty":"中階","translation":"儘管原物料成本大幅增加,製造商仍決定本季不調漲產品售價。","explanation":"看空格前後結構:空格前是定冠詞 the,空格後是名詞 increase,「the + ___ + 名詞」的結構代表空格要填形容詞來修飾 increase。considerable 意思是「相當大的、可觀的」,形容 increase(增加的幅度),語意通順。這題最大的陷阱是 considerable 與 considerate(體貼的)這組850分必背的易混淆形近字——considerate 雖然也是形容詞,詞性正確,但語意是「體貼的、為他人著想的」,用來形容「成本增加」完全不合邏輯。considerably 是副詞,不能修飾名詞 increase;consideration 是名詞,「the consideration increase」會變成兩個名詞並列,不符合語法。","optionNotes":["considerably 是副詞,只能修飾動詞、形容詞或副詞,不能直接修飾名詞 increase,是誤以為空格前後有形容詞用法就該選副詞的陷阱。","considerable 是形容詞,意為「相當大的」,修飾名詞 increase 語意通順,詞性與語意皆正確,為本題正解。","considerate 詞性雖是形容詞、字形與正解極相似,但語意是「體貼的、考慮周到的」,用來形容成本「增加」不合邏輯,是850分近義字陷阱中最容易誤選的選項。","consideration 是名詞,若填入會與後面的 increase 形成兩個名詞並列(the consideration increase),結構不通,是誤把字尾當作唯一判斷依據的陷阱。"],"keyWords":[{"word":"considerable","pos":"adj.","meaning":"相當大的、可觀的","freq":"高頻"},{"word":"raw material","pos":"n.phr.","meaning":"原物料","freq":"中頻"},{"word":"quarter","pos":"n.","meaning":"季度","freq":"高頻"}],"pattern":{"name":"despite + N (despite 為介系詞)","note":"despite 和 in spite of 都是介系詞,後面只能接名詞或名詞片語,不能接子句;若要接子句需改用 although / even though。","example":"Despite the delayed shipment, the client remained satisfied with the overall service."}},{"id":"pos-5","category":"pos","categoryName":"詞性","question":"The HR department will ___ notify all staff of the revised leave policy before it takes effect next month.","options":["prompt","promptly","promptness","prompted"],"answer":1,"difficulty":"進階","translation":"人資部門將在新休假政策生效前,盡快通知全體員工修訂後的內容。","explanation":"看空格前後結構:空格前是助動詞 will,空格後是原形動詞 notify,「助動詞+___+原形動詞」中間夾的成分不能是動詞或名詞,只能是副詞,用來修飾後面的動詞 notify,說明「通知」的方式或時間性。promptly(立即地、迅速地)放在助動詞與原形動詞之間,是典型的副詞插入位置,語意也通順(盡快通知)。prompt 雖可作形容詞或動詞原形,但形容詞不能修飾動詞,動詞原形又會與 notify 重複造成兩個動詞疊放;promptness 是名詞,不能出現在 will 與原形動詞之間;prompted 是過去式/過去分詞,同樣不能放在助動詞後面。","optionNotes":["prompt 可作形容詞或動詞原形,但此位置需要副詞修飾動詞 notify,形容詞不能修飾動詞,若當動詞原形則會與 notify 形成兩個動詞相疊,結構錯誤,是誤把常見詞形套入的陷阱。","promptly 是副詞,置於助動詞 will 與原形動詞 notify 之間,修飾 notify 的方式,結構與語意皆正確,為本題正解。","promptness 是名詞,不能夾在助動詞與原形動詞中間,此位置不接受名詞成分,是誤以為只要詞意合理就能忽略詞性限制的陷阱。","prompted 是過去式或過去分詞,will 之後必須接原形動詞或副詞+原形動詞,不能出現過去式動詞,是誤把時態變化套用到助動詞後方的陷阱。"],"keyWords":[{"word":"notify","pos":"v.","meaning":"通知","freq":"高頻"},{"word":"revised","pos":"adj.","meaning":"修訂後的","freq":"高頻"},{"word":"take effect","pos":"phr.","meaning":"生效","freq":"高頻"}]},{"id":"pos-6","category":"pos","categoryName":"詞性","question":"The proposal submitted by the marketing team received unanimous ___ from senior management during yesterday's meeting.","options":["approve","approving","approval","approved"],"answer":2,"difficulty":"進階","translation":"行銷團隊提交的提案在昨天的會議中獲得高階管理層一致的核准。","explanation":"看空格前後結構:空格前是動詞 received 加上形容詞 unanimous,空格後接介系詞片語 from senior management,代表空格要填一個名詞,作為 received 的受詞,並且要能被形容詞 unanimous(一致的)修飾。approval(核准、同意)是抽象名詞,符合「received + 形容詞 + 名詞」的受詞結構,語意也通順(獲得一致核准)。這題陷阱在於主詞 The proposal 前面已經有一個動詞 submitted(其實是過去分詞修飾 proposal,整句主要動詞其實是 received),很多690分考生會誤以為空格前的 unanimous 是在修飾動詞而選成 approving 或 approved 這類分詞形式,忽略了 unanimous 本身是形容詞、只能修飾名詞的事實。","optionNotes":["approve 是動詞原形,不能放在形容詞 unanimous 之後、作為及物動詞 received 的受詞,是誤把此空格看成需要動詞的陷阱。","approving 是現在分詞或動名詞,若作動名詞可作名詞用,但語意會變成「核准的動作」,且與形容詞 unanimous 搭配不如 approval 自然,ETS 較不採用此種分詞名詞化用法,是混淆詞性界線的陷阱。","approval 是名詞,作為 received 的受詞,並被形容詞 unanimous 修飾,結構與語意皆最通順自然,為本題正解。","approved 是過去分詞,通常作形容詞修飾名詞(如 an approved plan)或構成被動語態,不能單獨作為 received 的受詞名詞,是誤把 -ed 字尾當作名詞用法的陷阱。"],"keyWords":[{"word":"unanimous","pos":"adj.","meaning":"一致的、無異議的","freq":"中頻"},{"word":"senior management","pos":"n.phr.","meaning":"高階管理層","freq":"高頻"},{"word":"approval","pos":"n.","meaning":"核准、同意","freq":"極高頻"}]},{"id":"verb-1","category":"verb","categoryName":"動詞時態與語態","question":"The quarterly report ___ to all department heads before the budget meeting begins next Monday.","options":["distributes","distributing","will be distributed","have distributed"],"answer":2,"difficulty":"基礎","translation":"季度報告將在下週一預算會議開始前分發給所有部門主管。","explanation":"解題線索：主詞 The quarterly report 是「被分發」的對象（報告不會自己分發），且句尾有 before...begins next Monday 這個未來時間點。文法規則：(1) 主詞與動詞是被動關係，須用被動語態 be + p.p.；(2) 未來時間子句 before...begins 對應主句用未來式。正解 will be distributed 同時滿足「未來」與「被動」兩個條件，故為唯一正解。","optionNotes":["distributes 是現在式主動語態，690分考生常因看到現在式動詞就選它，卻忽略主詞是被分發的對象，犯了語態誤判的陷阱。","distributing 是現在分詞，不能單獨作句子主要動詞，缺少 be 動詞會讓句子不成立，是誘答典型的「詞性混淆」陷阱。","正解：will be distributed 是未來式被動語態，符合報告被分發、且時間點在未來（next Monday）的語意。","have distributed 是現在完成式主動語態，時態與語態皆錯，且與 next Monday 這種明確未來時間點不搭配。"],"keyWords":[{"word":"quarterly report","pos":"n.","meaning":"季度報告","freq":"高頻"},{"word":"department head","pos":"n.","meaning":"部門主管","freq":"高頻"},{"word":"distribute","pos":"v.","meaning":"分發、分配","freq":"極高頻"}]},{"id":"verb-2","category":"verb","categoryName":"動詞時態與語態","question":"A number of employees ___ requested flexible working hours since the new policy was introduced last spring.","options":["has","have","is","was"],"answer":1,"difficulty":"中階","translation":"自從去年春天推行新政策以來，已有許多員工要求彈性工時。","explanation":"解題線索：主詞是 A number of employees，且句尾有 since the new policy was introduced last spring，代表動作從過去持續到現在，須用現在完成式。文法規則：850 進階版筆記提到「a number of + 複數動詞」（意思是『許多』，重點在 employees）vs「the number of + 單數動詞」（意思是『數量』，重點在 number）。正解為何：A number of 後面接複數名詞 employees，動詞須用複數形態的 have，且搭配 requested 構成現在完成式 have requested。","optionNotes":["has 是單數動詞，690分考生常誤以為 number 是主詞中心詞而選單數動詞，這正是 a number of vs the number of 的經典陷阱。","正解：have 為複數動詞，正確對應 a number of employees（許多員工）的複數語意，並與 requested 組成現在完成式。","is 不僅單複數錯誤，且不能與過去分詞 requested 組成正確的現在完成式結構（is requested 語意也不合邏輯，變成被要求）。","was 除了單複數錯誤外，同時是過去式 be 動詞，無法與 requested 組成現在完成式，時態也不符合 since 子句的用法。"],"keyWords":[{"word":"a number of","pos":"phr.","meaning":"許多的（接複數動詞）","freq":"高頻"},{"word":"flexible working hours","pos":"n.","meaning":"彈性工時","freq":"中頻"},{"word":"introduce","pos":"v.","meaning":"推行、引進","freq":"高頻"}],"pattern":{"name":"a number of + N(複數) + V(複數) vs the number of + N(複數) + V(單數)","note":"a number of 意思是「許多」，主詞焦點在後面的複數名詞，動詞用複數；the number of 意思是「……的數量」，主詞焦點在 number 本身，動詞用單數。","example":"The number of complaints has decreased significantly this quarter."}},{"id":"verb-3","category":"verb","categoryName":"動詞時態與語態","question":"By the time the auditor arrives tomorrow morning, the finance team ___ all the outstanding invoices.","options":["will have reconciled","reconciles","was reconciling","will reconcile"],"answer":0,"difficulty":"進階","translation":"等到稽核員明天早上抵達時，財務團隊將已經核對完所有未付的發票了。","explanation":"解題線索：句首 By the time + 現在式子句（arrives）描述未來某個時間點，主句動作必須在該時間點「之前」已完成，這是未來完成式的典型句型標記。文法規則：By the time + S + V(現在式) 表示以未來某動作為基準點，主句要用 will have + p.p.（未來完成式）表示在那之前就已完成的動作。為何是正解：will have reconciled 精準表達「在稽核員抵達之前，核對工作就已經完成」的先後順序，是本題唯一符合邏輯與文法的選項。","optionNotes":["正解：will have reconciled 為未來完成式，正確表達在未來某時間點（稽核員抵達）之前已完成核對發票的動作。","reconciles 是現在式，690分考生容易因為子句 arrives 也是現在式而誤選『時態一致』，但主句需要的是未來完成式而非現在式。","was reconciling 是過去進行式，時態方向完全錯誤（本句談的是未來，不是過去），是混淆過去與未來的常見陷阱。","will reconcile 是單純未來式，只表示『將會核對』，但沒有『在稽核員抵達前已經完成』的完成意涵，語意不夠精準，漏掉 by the time 隱含的完成概念。"],"keyWords":[{"word":"auditor","pos":"n.","meaning":"稽核員","freq":"中頻"},{"word":"outstanding invoice","pos":"n.","meaning":"未付的發票","freq":"高頻"},{"word":"reconcile","pos":"v.","meaning":"核對、核銷（帳目）","freq":"中頻"}],"pattern":{"name":"By the time + S + V(現在式)，S + will have + p.p.","note":"表示「等到某未來時間點時，另一件事已經完成」，子句用現在式代表未來，主句用未來完成式強調完成的先後順序。","example":"By the time the shipment reaches the port, the customs documents will have been prepared."}},{"id":"verb-4","category":"verb","categoryName":"動詞時態與語態","question":"The new safety regulations ___ strictly enforced ever since the accident occurred at the assembly plant.","options":["are being","were","has been","have been"],"answer":3,"difficulty":"進階","translation":"自從那起意外在組裝廠發生以來，新的安全規範就一直被嚴格執行。","explanation":"解題線索：主詞 The new safety regulations 是複數名詞，且句尾 ever since the accident occurred 是明確的現在完成式時間標記（since + 過去時間點的子句，表示動作從過去持續至今）。文法規則：本題同時考「主詞動詞一致」（複數主詞需配複數 be 動詞）與「時態＋語態」的結合（現在完成式的被動語態為 have/has been + p.p.）。為何是正解：regulations 為複數，須用 have（而非 has），且與 enforced 搭配構成現在完成式被動 have been enforced，精準呼應 ever since 引導的『從過去到現在』語意。","optionNotes":["are being 是現在進行式被動，只強調『現在正在』的動作，缺乏 ever since 所需的『從過去持續至今』的完成語意，時態方向錯誤。","were 是過去式 be 動詞，無法與 ever since + 過去子句搭配出現在完成式的持續語意，且單獨的 were 也無法與 enforced 組成正確的被動語態時態。","has been 語態與時態的組合正確，但 has 是單數動詞，690分考生容易忽略主詞其實是複數的 regulations，只看鄰近的字就選錯，是主詞動詞一致的陷阱。","正解：have been 是複數現在完成式 be 動詞，正確對應複數主詞 regulations，並與 enforced 組成現在完成式被動語態，呼應 ever since 的時間邏輯。"],"keyWords":[{"word":"regulation","pos":"n.","meaning":"規範、規定","freq":"高頻"},{"word":"enforce","pos":"v.","meaning":"執行、實施（法規）","freq":"中頻"},{"word":"assembly plant","pos":"n.","meaning":"組裝廠","freq":"中頻"}],"pattern":{"name":"ever since + S + V(過去式)，S + have/has been + p.p.","note":"ever since 引導的子句用過去式表示起點，主句用現在完成式被動語態，表示某狀態從過去持續影響到現在。","example":"The warehouse has been monitored closely ever since the inventory shortage was discovered."}},{"id":"verb-5","category":"verb","categoryName":"動詞時態與語態","question":"Each of the branch managers ___ required to submit a monthly expense report by the fifth business day.","options":["are","were","is","have been"],"answer":2,"difficulty":"中階","translation":"每一位分店經理都必須在每月第五個工作日前提交月度費用報告。","explanation":"解題線索：主詞是 Each of the branch managers，雖然 of 後面接的 branch managers 是複數名詞，但 Each 才是真正的主詞中心詞。文法規則：Each of + 複數名詞 一律視為單數，動詞須用單數形態；這點常與「A number of」的複數用法搞混，是主詞動詞一致的高頻陷阱。為何是正解：is 為單數現在式 be 動詞，正確對應 Each（單數），並與 required 組成 be required to V（必須做……）的高頻句型，語意及文法皆成立。","optionNotes":["are 是複數動詞，690分考生常被 of the branch managers 這個複數名詞片語誤導而選複數動詞，忽略了 Each 才是決定單複數的主詞核心。","were 雖然可能被誤認為與 are 類似的複數形態，但同時還是過去式，與句子描述『每月固定要求』的現在式慣例語意不符，屬單複數與時態雙重錯誤。","正解：is 是單數現在式動詞，正確對應 Each（視為單數）的主詞動詞一致規則，並構成 be required to 的正確句型。","have been 除了時態為完成式、與句子描述的『恆常規定』現在式語意不合外，其動詞形式也需搭配複數主詞，與 Each 的單數規則衝突，是雙重錯誤的誘答。"],"keyWords":[{"word":"branch manager","pos":"n.","meaning":"分店經理","freq":"中頻"},{"word":"expense report","pos":"n.","meaning":"費用報告","freq":"高頻"},{"word":"business day","pos":"n.","meaning":"工作日","freq":"高頻"}],"pattern":{"name":"Each of + 複數名詞 + 單數動詞","note":"Each（每一個）本身是單數代名詞，即使後面接 of + 複數名詞，動詞仍要用單數形態，常與 both of / several of（複數動詞）混淆。","example":"Each of the suppliers is expected to confirm the delivery schedule in advance."}},{"id":"verb-6","category":"verb","categoryName":"動詞時態與語態","question":"Had the shipment been inspected more carefully, the defective components ___ before delivery to the client.","options":["would be identified","would have been identified","will be identified","had identified"],"answer":1,"difficulty":"進階","translation":"假如當初貨運有被更仔細檢查，這些瑕疵零件在交付給客戶前就會被發現了。","explanation":"解題線索：句首 Had the shipment been inspected 是 If the shipment had been inspected 的倒裝形式，屬於與過去事實相反的假設語氣（過去式假設）。文法規則：與過去事實相反的假設句，if 子句用 had + p.p.，主句須用 would have + p.p.（且此句主詞 components 是被發現的對象，須為被動）。為何是正解：would have been identified 同時符合『過去式假設語氣的主句形態』與『被動語態』兩個條件，精準對應倒裝句 Had...been inspected 所設定的假設情境。","optionNotes":["would be identified 是與現在事實相反的假設語氣主句形態（would + V），時態誤判為現在式假設，690分考生常忽略 Had...been inspected 已經明示這是『過去』的假設，是時態層次的陷阱。","正解：would have been identified 是與過去事實相反假設語氣的正確主句形態（would have p.p.），且為被動語態，正確對應句首的過去式倒裝假設子句。","will be identified 屬於直說語氣的未來式被動，與假設語氣的倒裝句型 Had...been inspected 完全不搭配，忽略了整句『與事實相反』的語氣線索。","had identified 雖然是過去完成式，但用的是主動語態，且不符合假設語氣主句 would have + p.p. 的固定結構，屬於誤把子句時態套用到主句的陷阱。"],"keyWords":[{"word":"shipment","pos":"n.","meaning":"貨運、裝運","freq":"極高頻"},{"word":"defective","pos":"adj.","meaning":"有瑕疵的","freq":"高頻"},{"word":"component","pos":"n.","meaning":"零件、組件","freq":"中頻"}],"pattern":{"name":"Had + S + p.p.,S + would have + p.p.（與過去事實相反假設句的倒裝）","note":"為了正式或書面語氣，if 可省略、主詞與 had 倒裝；主句維持 would have + p.p. 不變，常見於商業書信與報告中描述『若當初……就會……』的情境。","example":"Had the contract been reviewed by legal counsel, the ambiguous clause would have been revised."}},{"id":"prep-1","category":"prep","categoryName":"介係詞","question":"The quarterly financial report must be submitted ___ Friday afternoon so the accounting team can finish the audit before the deadline.","options":["during","since","by","in"],"answer":2,"difficulty":"基礎","translation":"季度財務報告必須在星期五下午之前送交,以便會計團隊能在期限前完成稽核。","explanation":"解題線索:空格後接的是一個明確的時間點「Friday afternoon」,且句意是「在此時間點之前完成某動作」。適用文法規則:by + 特定時間點,表示「不遲於、最晚在……之前」,強調動作必須在該時間點前完成,常與 submit、finish、complete 等動詞搭配。為何是正解:by Friday afternoon 精準表達「星期五下午前」的截止概念,與後面「before the deadline」的語意呼應,故為正解。","optionNotes":["during 後面須接一段「有起訖的時間名詞」(如 during the meeting),不能接單一時間點如 Friday afternoon,誘答考生誤以為與時間有關就可用。","since 表示「自從某時間點起(延續至今)」,須搭配現在完成式動詞,句中是未來須完成的動作(must be submitted),時態邏輯不合,是常見誘答。","by 表示「不遲於、最晚在……之前」,是 690 分考生易與 in 混淆但這裡正確的答案。","in 不能直接接單一明確時間點(如 Friday afternoon),此處若要表達『在星期五下午』應用 on Friday afternoon 而非 in,且 in 也不能表示『不遲於』的截止語感,語意不合。"],"keyWords":[{"word":"submit","pos":"v.","meaning":"提交、送交","freq":"高頻"},{"word":"audit","pos":"n.","meaning":"稽核","freq":"高頻"},{"word":"deadline","pos":"n.","meaning":"期限","freq":"極高頻"}]},{"id":"prep-2","category":"prep","categoryName":"介係詞","question":"All new hires are required to complete the onboarding session ___ their first week, as stated in the orientation schedule.","options":["within","among","between","beside"],"answer":0,"difficulty":"中階","explanation":"解題線索:空格後方是「their first week」這樣一段有長度的時間範圍,而句意強調「在此期限範圍內完成」某件事。適用文法規則:within + 一段時間,表示「在……範圍之內」,常搭配 complete、finish、respond 等動詞,強調不超過該時間長度。為何是正解:within their first week 表達「在到職第一週這段期間內完成」,語意上與 required to complete 呼應,是唯一合理的介系詞。","optionNotes":["within 表示「在……(期間)之內」,強調時間範圍不被超過,是正解。","among 用於「三者以上之間」,通常接複數名詞表示「在……之中」,與時間範圍無關,是考生誤把 first week 當作群體對象時會誤選的陷阱。","between 用於「兩者之間」,若接時間需搭配 A and B(如 between Monday and Friday),單獨接 their first week 不合語法。","beside 表示「在……旁邊」,是地點介系詞而非時間用法,考生若只看到後面接名詞未細看語意,可能誤選。"],"translation":"所有新進員工都必須在到職第一週內完成新人培訓課程,如職前說明會的行程表所述。","keyWords":[{"word":"onboarding","pos":"n.","meaning":"新人培訓","freq":"中頻"},{"word":"be required to V","pos":"phr.","meaning":"被要求去做……","freq":"極高頻"},{"word":"orientation","pos":"n.","meaning":"職前說明會、新人引導","freq":"高頻"}],"pattern":{"name":"be required to V","note":"表示「被要求/必須做某事」,V 一律用原形動詞,是多益公告與人資文件中極常見的被動句型,語氣比 must 更正式。","example":"Employees are required to submit their expense reports within five business days."}},{"id":"prep-3","category":"prep","categoryName":"介係詞","question":"The warehouse supervisor is directly responsible ___ ensuring that all shipments are inspected before they leave the facility.","options":["at","with","of","for"],"answer":3,"difficulty":"中階","explanation":"解題線索:空格前是形容詞 responsible,後面接動名詞 ensuring,這是典型的「形容詞 + 介系詞」固定搭配考點。適用文法規則:be responsible for + N/Ving,表示「對……負責」,for 後面可接名詞或動名詞。為何是正解:responsible 固定搭配 for,其餘介系詞都不是此形容詞的慣用搭配,故 for 為唯一正解。","optionNotes":["at 通常用於地點或技能相關搭配(如 good at),與 responsible 無固定搭配關係。","with 常見於 deal with、comply with 等搭配,但非 responsible 的固定用法,考生若混淆其他『負責/處理』相關片語時容易誤選。","of 常見於 be capable of、in charge of 等搭配,但不是 responsible 的固定搭配,考生易因『負責某事物』的中文語感誤選。","for 是 responsible 唯一正確的固定搭配介系詞,表示『對……負責』,為正解。"],"translation":"倉庫主管直接負責確保所有貨運在離開廠區前都經過檢查。","keyWords":[{"word":"responsible for","pos":"phr.","meaning":"對……負責","freq":"極高頻"},{"word":"shipment","pos":"n.","meaning":"貨運","freq":"高頻"},{"word":"inspect","pos":"v.","meaning":"檢查","freq":"高頻"}]},{"id":"prep-4","category":"prep","categoryName":"介係詞","question":"Despite the recent budget cuts, the marketing department managed to launch the campaign ___ schedule.","options":["in","at","on","to"],"answer":2,"difficulty":"基礎","explanation":"解題線索:句首 Despite 已表明是「儘管有預算刪減」的讓步語氣,後半句描述活動如期推出,空格後接名詞 schedule。適用文法規則:on schedule 是固定片語,意思是「按照預定時程、準時」,屬於介系詞與名詞的慣用搭配,需整體記憶。為何是正解:on schedule 表達「如期、準時」之意,與句意「儘管刪減預算仍準時推出」完全吻合,是唯一正確搭配。","optionNotes":["in 常與 in time(來得及)混淆,但 in schedule 不是英文中的固定用法,考生易因『in +時間相關名詞』的直覺誤選。","at 常見於 at once、at present 等固定片語,但不與 schedule 搭配,是常見誘答之一。","on 與 schedule 搭配為固定片語 on schedule(按時、如期),是唯一正解。","to 沒有 to schedule 這種固定片語用法,考生若不熟悉此片語可能隨意猜測。"],"translation":"儘管最近有預算刪減,行銷部門仍設法按照原定時程推出了這項活動。","keyWords":[{"word":"on schedule","pos":"phr.","meaning":"按時、如期","freq":"高頻"},{"word":"budget cut","pos":"phr.","meaning":"預算刪減","freq":"中頻"},{"word":"launch","pos":"v.","meaning":"推出、發表","freq":"高頻"}],"pattern":{"name":"Despite + N","note":"despite 為介系詞,後面直接接名詞或動名詞,不可接完整子句(子句需用 although/though),常出現在商業書信與公告開頭表達讓步語氣。","example":"Despite the shipping delay, the client received the order in good condition."}},{"id":"prep-5","category":"prep","categoryName":"介係詞","question":"The new safety regulations will remain ___ effect until the facility completes its annual renovation next spring.","options":["with","in","for","on"],"answer":1,"difficulty":"進階","explanation":"解題線索:空格前是動詞 remain,後面接名詞 effect,句意是「規定持續有效」。適用文法規則:in effect 是固定片語,意思是「生效中、有效」,常與 remain、stay、be 等連綜動詞搭配使用,屬於商業/法規文件高頻用語。為何是正解:in effect 精確表達「(法規)持續生效」之意,是唯一符合語意與慣用搭配的介系詞,其餘選項都不構成與 effect 的固定片語。","optionNotes":["with 沒有 with effect 這種固定用法(雖有 with effect from + 日期的特殊句型,但此處語境不符,句中無 from + 日期結構),故不適用。","in 與 effect 組成固定片語 in effect(生效中),是正解。","for 沒有 for effect 表示『生效』的用法,for effect 另有『為了效果』之意,與句意不符,是考生望文生義的陷阱。","on 常見於 on duty、on schedule 等片語,但不與 effect 搭配表示『生效』,是常見誤選項。"],"translation":"新的安全規定將持續生效,直到廠區明年春天完成年度翻修為止。","keyWords":[{"word":"in effect","pos":"phr.","meaning":"生效中、有效","freq":"中頻"},{"word":"renovation","pos":"n.","meaning":"翻修","freq":"高頻"},{"word":"regulation","pos":"n.","meaning":"規定、法規","freq":"高頻"}]},{"id":"prep-6","category":"prep","categoryName":"介係詞","question":"The revised inventory report indicates that the surplus stock resulted ___ an overly optimistic sales projection last quarter.","options":["from","in","at","about"],"answer":0,"difficulty":"進階","explanation":"解題線索:空格前是動詞 resulted,後面接的是「造成剩餘庫存的原因」(過度樂觀的銷售預估),即空格後接的是「原因」而非「結果」。適用文法規則:result from + 原因,表示「起因於、由……造成」;相對地 result in + 結果,表示「導致……結果」。兩者方向完全相反,是 850 分考生必辨析的重點搭配。為何是正解:句中 surplus stock(剩餘庫存)是結果,sales projection(銷售預估)是原因,因此必須用 result from 表達「剩餘庫存起因於樂觀預估」,故選 from。","optionNotes":["from 用於 result from + 原因,正確表達『起因於』,與句意『剩餘庫存起因於樂觀預估』相符,為正解。","in 用於 result in + 結果,但本句空格後接的是原因(sales projection),而非動作造成的結果,方向相反,是本題最大陷阱,690 分考生常在此失分。","at 沒有 result at 這種固定搭配,不符合英文慣用法。","about 沒有 result about 這種固定搭配,考生若不熟悉 result 的兩種介系詞用法,可能隨意猜測。"],"translation":"修訂後的庫存報告顯示,剩餘庫存是起因於上一季過度樂觀的銷售預估。","keyWords":[{"word":"result from","pos":"phr.","meaning":"起因於、由……造成","freq":"高頻"},{"word":"surplus","pos":"n.","meaning":"剩餘、過剩","freq":"中頻"},{"word":"projection","pos":"n.","meaning":"預估","freq":"中頻"}],"pattern":{"name":"result in vs. result from","note":"result in + 結果(導致……);result from + 原因(起因於……),兩者主詞與受詞的因果方向相反,務必依句意判斷何者為因、何者為果。","example":"The delayed shipment resulted from a system malfunction at the warehouse."}},{"id":"conj-1","category":"conj","categoryName":"連接詞辨析","question":"The shipment will arrive on schedule ___ the recent congestion at the port that delayed several other carriers.","options":["despite","although","because","unless"],"answer":0,"difficulty":"基礎","translation":"儘管港口最近的壅塞已延誤了其他好幾家貨運商，這批貨仍會準時抵達。","explanation":"解題線索：空格後面接的是「the recent congestion...」這個名詞片語，而不是主詞+動詞的完整子句。適用文法規則：despite 是介系詞，後面直接加名詞/名詞片語；although 是從屬連接詞，後面必須接「主詞+動詞」的子句。為何是正解：因為空格後只有名詞片語沒有動詞，只能選介系詞 despite，選 although 會造成句子缺乏對應的連接詞結構（除非後面補一個子句）。","optionNotes":["正解：despite 為介系詞，可直接接名詞片語 the recent congestion，語意「儘管」完全符合上下文的轉折關係。","although 是從屬連接詞，必須接完整子句（主詞+動詞），但空格後只有名詞片語，文法不合，是最容易選錯的陷阱，因為中文意思一樣都是「儘管」。","because 表示因果關係「因為」，語意上與句子「準時抵達」和「壅塞延誤別人」的轉折邏輯相反，會誤導成因果解釋。","unless 表示「除非」的條件關係，與句意的「儘管」轉折關係完全不符，套入後語意不通。"],"keyWords":[{"word":"congestion","pos":"n.","meaning":"壅塞、擁塞","freq":"中頻"},{"word":"shipment","pos":"n.","meaning":"貨運、裝運","freq":"高頻"},{"word":"on schedule","pos":"phr.","meaning":"準時、按時程","freq":"高頻"}],"pattern":{"name":"despite / in spite of + N","note":"despite 和 in spite of 都是介系詞片語，後面只能接名詞或動名詞，不能接子句；若要接子句要用 although/though/even though。","example":"Despite the tight budget, the marketing team launched the campaign successfully."}},{"id":"conj-2","category":"conj","categoryName":"連接詞辨析","question":"The finance director insisted that the report be revised ___ it contained several outdated figures from last quarter.","options":["despite","because of","because","due to"],"answer":2,"difficulty":"基礎","translation":"財務總監堅持報告必須修訂，因為裡面有好幾個上一季的過時數據。","explanation":"解題線索：空格後面是「it contained several outdated figures」，這是一個完整的子句（主詞 it + 動詞 contained）。適用文法規則：because 是從屬連接詞，後面接「主詞+動詞」的完整子句；because of / due to 是介系詞（片語），後面只能接名詞或名詞片語。為何是正解：因為空格後接的是完整子句，只有 because 符合詞性要求。","optionNotes":["despite 是介系詞且語意為「儘管」的轉折關係，既不符合詞性（後面是子句）也不符合語意（此處是因果關係）。","because of 是介系詞片語，只能接名詞（如 because of the outdated figures），不能直接接子句 it contained，是典型的詞性誤用陷阱。","正解：because 為從屬連接詞，可直接接主詞+動詞的完整子句 it contained...，且語意「因為」符合報告需修訂的原因說明。","due to 同樣是介系詞片語，用法與 because of 相同，只能接名詞片語，不能接完整子句，屬於常見誤用。"],"keyWords":[{"word":"insist","pos":"v.","meaning":"堅持","freq":"高頻"},{"word":"revise","pos":"v.","meaning":"修訂","freq":"極高頻"},{"word":"figure","pos":"n.","meaning":"數據、數字","freq":"高頻"}],"pattern":{"name":"because + S + V vs. because of / due to + N","note":"because 為連接詞接子句，because of 和 due to 為介系詞片語接名詞，三者中文都可翻「因為」但詞性完全不同，是 Part 5 超高頻陷阱。","example":"The meeting was rescheduled because of a system outage, not because the manager was unavailable."}},{"id":"conj-3","category":"conj","categoryName":"連接詞辨析","question":"Employees who transfer to the overseas branch will receive ___ a relocation allowance but also a temporary housing subsidy.","options":["either","not only","both","as well as"],"answer":1,"difficulty":"中階","translation":"調任海外分公司的員工不僅會拿到搬遷津貼，還會拿到臨時住房補貼。","explanation":"解題線索：句子後半段出現「but also a temporary housing subsidy」，這是判斷相關連接詞的關鍵訊號。適用文法規則：not only...but also 是固定搭配的相關連接詞，兩者必須成對出現，連接兩個對等的名詞（此處為 a relocation allowance 和 a temporary housing subsidy）。為何是正解：句中已出現 but also，前面空格只能填與它配對的 not only，其餘選項都無法與 but also 搭配。","optionNotes":["either 要與 or 搭配（either A or B），與句中的 but also 不匹配，是常見的相關連接詞混淆陷阱。","正解：not only 與後面的 but also 形成固定搭配 not only A but also B，文法與語意皆通順。","both 要與 and 搭配（both A and B），無法與 but also 呼應，套入後結構不成立。","as well as 本身可獨立表示「以及」，不需要也不能與句中已出現的 but also 一起使用，會造成連接詞重複衝突。"],"keyWords":[{"word":"relocation","pos":"n.","meaning":"搬遷、遷移","freq":"中頻"},{"word":"allowance","pos":"n.","meaning":"津貼","freq":"高頻"},{"word":"subsidy","pos":"n.","meaning":"補貼","freq":"中頻"}],"pattern":{"name":"not only A but also B","note":"相關連接詞，A、B 需詞性/結構對等；口語或書面皆可省略 also，但 Part 5 常考完整形式，且需留意與 either...or、both...and 的固定搭配不能混用。","example":"The new policy not only reduces paperwork but also shortens the approval process."}},{"id":"conj-4","category":"conj","categoryName":"連接詞辨析","question":"___ the supplier confirmed the order in writing, the warehouse staff refused to accept the delivery without a signed purchase order.","options":["Despite","In spite of","Because of","Even though"],"answer":3,"difficulty":"中階","translation":"儘管供應商已經以書面確認訂單，倉庫人員仍拒絕在沒有簽署採購單的情況下收貨。","explanation":"解題線索：空格後是「the supplier confirmed the order in writing」，含主詞 the supplier 與動詞 confirmed，是完整子句；且主要子句「倉庫人員拒絕收貨」與這句話語意上是轉折（供應商都確認了，還是被拒絕）。適用文法規則：只有 even though 是從屬連接詞可接完整子句，其餘三個選項都是介系詞（片語），只能接名詞。為何是正解：句首子句是完整的主詞+動詞結構，必須用連接詞而非介系詞。","optionNotes":["despite 是介系詞，後面只能接名詞或動名詞（如 despite the supplier's confirmation），不能直接接主詞+動詞的子句，是最常見的誤用陷阱。","in spite of 用法與 despite 相同，都是介系詞片語，同樣不能接完整子句。","because of 雖然也是介系詞片語，但除了詞性不合之外，語意也錯誤（表因果而非轉折），雙重錯誤。","正解：even though 是從屬連接詞，可接完整子句 the supplier confirmed...，語意「儘管」也符合前後轉折關係。"],"keyWords":[{"word":"in writing","pos":"phr.","meaning":"以書面形式","freq":"中頻"},{"word":"purchase order","pos":"n.","meaning":"採購單","freq":"高頻"},{"word":"warehouse","pos":"n.","meaning":"倉庫","freq":"高頻"}],"pattern":{"name":"even though + S + V vs. despite/in spite of/because of + N","note":"even though 為從屬連接詞可接完整子句，despite、in spite of、because of 皆為介系詞（片語）只能接名詞，是 Part 5 高頻詞性混淆陷阱。","example":"Even though the vendor missed the original deadline, the client agreed to extend the contract."}},{"id":"conj-5","category":"conj","categoryName":"連接詞辨析","question":"The quarterly earnings report will be released as planned ___ the accounting team has not yet finished reconciling all subsidiary accounts.","options":["even though","provided that","so that","now that"],"answer":0,"difficulty":"進階","translation":"即使會計團隊尚未完成所有子公司帳目的核對，季度財報仍將按計畫發布。","explanation":"解題線索：主要子句「報告將如期發布」與從屬子句「會計團隊尚未完成核對」之間存在明顯的語意矛盾／讓步關係——照理說沒做完應該不能發布，但句子卻說「仍照常發布」。適用文法規則：even though 表示「儘管、即使」，用來連接語意相反或出乎意料的兩件事；provided that（只要）表條件、so that（以便）表目的、now that（既然）表原因，三者語意都與「讓步」不符。為何是正解：唯有 even though 能合理呈現「明明有阻礙，結果卻不受影響」的邏輯關係。","optionNotes":["正解：even though 表讓步「儘管、即使」，精準呈現「還沒做完但仍如期發布」的矛盾語意，是唯一合理選項。","provided that 表示「只要、假設」為條件句連接詞，套入後語意會變成「只要會計還沒核對完，報告才會發布」，邏輯完全不通。","so that 表示「以便、為了讓」，用於表達目的而非讓步，套入後語意變成報告發布是「為了」讓核對沒完成，不合邏輯。","now that 表示「既然」，用來說明原因，若套入會變成「既然還沒核對完，所以才如期發布」，因果邏輯錯誤且與常理相反。"],"keyWords":[{"word":"reconcile","pos":"v.","meaning":"核對、調節（帳目）","freq":"中頻"},{"word":"subsidiary","pos":"n./adj.","meaning":"子公司（的）","freq":"中頻"},{"word":"quarterly","pos":"adj.","meaning":"季度的","freq":"高頻"}],"pattern":{"name":"even though + S + V（讓步子句）","note":"even though 語氣比 although 更強調對比，常用於「事實已發生卻不影響結果」的情境；注意與表條件的 provided that、表原因的 now that 做語意區分，是進階考生常混淆的一組連接詞。","example":"Even though the vendor missed the original deadline, the client agreed to extend the contract."}},{"id":"conj-6","category":"conj","categoryName":"連接詞辨析","question":"Neither the sales manager nor the regional directors ___ aware that the pricing policy had been revised without notice.","options":["was","being","were","is"],"answer":2,"difficulty":"進階","translation":"無論是業務經理還是區域主管，都沒有察覺到定價政策已被在未通知的情況下修訂。","explanation":"解題線索：本句主詞是相關連接詞 neither...nor 連接的兩個並列主詞：the sales manager（單數）與 the regional directors（複數）。適用文法規則：neither A nor B 當主詞時，動詞須與最接近的 B（the regional directors）保持一致，稱為「就近原則」；由於 the regional directors 是複數，動詞須用複數形式。為何是正解：were 是複數動詞，符合就近原則對應到 the regional directors。","optionNotes":["was 是單數動詞，若考生誤以為要對應到第一個主詞 the sales manager（單數）就會選這個，忽略了「就近原則」應對應最接近的名詞。","being 是動名詞/現在分詞形式，不能單獨作為句子的主要動詞使用，此處需要一個限定動詞（finite verb）來搭配主詞補語 aware，being 在文法上不成立。","正解：were 為複數動詞，正確對應到緊鄰空格的複數主詞 the regional directors，符合 neither...nor 就近原則。","is 同樣是單數動詞，是與 was 相同類型的誤用陷阱，考生若只看到句首的 sales manager 就可能誤選。"],"keyWords":[{"word":"aware","pos":"adj.","meaning":"察覺到的、知悉的","freq":"高頻"},{"word":"revise","pos":"v.","meaning":"修訂","freq":"極高頻"},{"word":"without notice","pos":"phr.","meaning":"未經通知","freq":"中頻"}],"pattern":{"name":"neither A nor B + V（動詞就近一致）","note":"neither...nor、either...or、not only...but also 連接兩個主詞時，動詞需與最靠近它的那個主詞（B）保持單複數一致，是主詞動詞一致的進階考點，常與連接詞辨析結合出題。","example":"Neither the interns nor the supervisor was informed of the schedule change."}},{"id":"pron-1","category":"pron","categoryName":"代名詞與關係詞","question":"The HR manager asked all new hires to submit ___ signed contracts before the onboarding session on Monday.","options":["their","they","them","themselves"],"answer":0,"difficulty":"基礎","translation":"人資經理要求所有新進員工在週一的新人培訓前繳交他們已簽署的合約。","explanation":"解題線索：空格後面直接接名詞 signed contracts，代表空格要修飾這個名詞。適用文法規則：能放在名詞前面當修飾語的代名詞形式是「所有格」（my/your/his/her/its/our/their），因為所有格的功能就是「限定＋修飾」後面的名詞。為何是正解：their 放在 signed contracts 前面，表示「他們的合約」，語意通順、詞性正確；主格 they、受格 them、反身代名詞 themselves 都不能直接放在名詞前面修飾名詞，所以 their 是唯一正解。","optionNotes":["their 是所有格，可直接放在名詞前面表示「屬於他們的」，符合空格後接名詞 contracts 的結構，是唯一正解。","they 是主格，只能當主詞用，不能放在名詞前面修飾名詞，此處空格後有名詞 contracts，用主格會造成句構錯誤，是考生看到複數名詞就選代名詞而忽略詞性的典型陷阱。","them 是受格，功能是當動詞或介系詞的受詞，同樣不能直接修飾後面的名詞，考生常因為句意是「他們的」而誤選受格，忽略了受格不具修飾名詞的功能。","themselves 是反身代名詞，通常用來加強語氣或作反身受詞（如 submit themselves），不能放在名詞前當修飾語，考生容易因為主詞是複數 new hires 而誤選反身代名詞。"],"keyWords":[{"word":"onboarding","pos":"n.","meaning":"新人培訓","freq":"高頻"},{"word":"submit","pos":"v.","meaning":"繳交、提交","freq":"極高頻"},{"word":"contract","pos":"n.","meaning":"合約","freq":"極高頻"}]},{"id":"pron-2","category":"pron","categoryName":"代名詞與關係詞","question":"The consultant ___ recommendations were adopted by the board will present the final report next Thursday.","options":["who","whose","which","whom"],"answer":1,"difficulty":"中階","translation":"那位建議被董事會採納的顧問將於下週四發表最終報告。","explanation":"解題線索：空格後面接的是名詞 recommendations，且整個關係子句在說明「顧問的建議」被採納了，也就是「顧問」與「建議」之間是所有格的關係。適用文法規則：當關係子句要表達「先行詞的某樣東西」時，要用所有格關係代名詞 whose，且 whose 後面必須直接接名詞。為何是正解：whose recommendations 表示「這位顧問的建議」，文法與語意都通順；who/whom 是主格/受格，後面應接動詞或主詞+動詞，不能直接接名詞；which 通常代替物，且同樣不具備所有格功能。","optionNotes":["who 是主格關係代名詞，後面應直接接動詞（如 who submitted...），但此處空格後接的是名詞 recommendations，用 who 會使子句缺少所有格意涵，語法不通。","whose 是所有格關係代名詞，可代替人或物的所有格，後面直接接名詞 recommendations，表示「顧問的建議」，文法正確且語意通順，是正解。","which 通常用來代替「物」作先行詞，且後面同樣需接動詞或受詞，不能表達「屬於誰的」所有格關係，考生易因先行詞看似可與 recommendations 連結而誤選。","whom 是受格關係代名詞，用於子句中作受詞（如 the consultant whom we hired），但此處空格後直接接名詞而非動詞，用 whom 無法成立，是考生常混淆 who/whom 用法的陷阱。"],"keyWords":[{"word":"recommendation","pos":"n.","meaning":"建議","freq":"高頻"},{"word":"adopt","pos":"v.","meaning":"採納、採用","freq":"中頻"},{"word":"board","pos":"n.","meaning":"董事會","freq":"極高頻"}]},{"id":"pron-3","category":"pron","categoryName":"代名詞與關係詞","question":"The warehouse ___ the defective shipment was stored has since been renovated to improve safety.","options":["which","when","where","who"],"answer":2,"difficulty":"中階","translation":"存放瑕疵貨品的那座倉庫，之後已經整修過以提升安全性。","explanation":"解題線索：先行詞是地點名詞 warehouse，空格後面是一個完整的子句 the defective shipment was stored（主詞+被動式動詞，句子成分完整，不缺主詞或受詞）。適用文法規則：當先行詞是地點，且後面子句成分完整（不缺任何句子元素）時，要用關係副詞 where，因為 where 相當於 in/at which，本身已包含介系詞的功能，不需要再佔一個句子成分。為何是正解：where 銜接完整子句 the shipment was stored，語意是「貨品存放的倉庫」，文法正確；which 後面若不接介系詞則子句會不完整（應為 in which）；when 用於時間先行詞；who 用於人。","optionNotes":["which 作關代時，若後面子句已經完整（無缺主詞或受詞），單獨使用 which 會造成句構錯誤，正確應寫成 in which，考生常忽略「子句是否完整」這個判斷關代或關副的關鍵線索。","when 是用於時間先行詞的關係副詞，但此處先行詞 warehouse 是地點而非時間，用 when 語意不合，是考生看到「關係副詞」選項就不細究先行詞詞性的常見失誤。","where 是關係副詞，用於先行詞為地點且後方子句成分完整時，相當於 in/at which，此處 warehouse 是地點、子句完整，故為正解。","who 只能用於人當先行詞，此處先行詞是地點 warehouse，用 who 明顯詞性錯誤，屬於基礎誤判但仍可能因看錯先行詞而誤選。"],"keyWords":[{"word":"warehouse","pos":"n.","meaning":"倉庫","freq":"極高頻"},{"word":"defective","pos":"adj.","meaning":"有瑕疵的","freq":"高頻"},{"word":"shipment","pos":"n.","meaning":"貨運、貨品","freq":"極高頻"}]},{"id":"pron-4","category":"pron","categoryName":"代名詞與關係詞","question":"Employees should familiarize ___ with the updated expense reimbursement policy before submitting claims.","options":["them","their","they","themselves"],"answer":3,"difficulty":"進階","translation":"員工在提交報銷申請之前，應該讓自己熟悉最新的費用報銷政策。","explanation":"解題線索：動詞 familiarize 是一個常搭配反身代名詞的動詞，其固定用法為 familiarize oneself with sth（讓自己熟悉某事），且句子主詞 Employees 與空格所指對象是同一群人。適用文法規則：當動作的執行者與承受者是同一人/同一群體時，受詞要用反身代名詞而非一般受格代名詞，這是「反身動詞片語」的固定搭配，類似 avail oneself of、consider oneself。為何是正解：themselves 呼應主詞 Employees（複數），且符合 familiarize oneself with 的固定用法；them 雖是複數受格但語意上會變成「熟悉『他們』（別人）」，不合邏輯；their 是所有格不能單獨當受詞；they 是主格不能放在動詞後面當受詞。","optionNotes":["them 是一般受格代名詞，若填入會表示員工要熟悉「另一群人」，語意矛盾，因為此處动作的施與受其實是同一群人，是考生忽略 familiarize oneself with 固定搭配而誤選的常見陷阱。","their 是所有格，不能單獨作為動詞的受詞使用，也無法接在 familiarize 後面構成合理句構，屬於詞性誤用。","they 是主格，只能作主詞，不能放在及物動詞後面當受詞，此處空格明顯是動詞 familiarize 的受詞位置，用主格是基礎文法錯誤。","themselves 是反身代名詞，呼應主詞 Employees 且符合 familiarize oneself with 的固定片語用法，故為正解。"],"pattern":{"name":"familiarize oneself with + N","note":"「使自己熟悉某事物」，oneself 需隨主詞變化（myself/yourself/himself/herself/itself/ourselves/yourselves/themselves），是多益商業書信中常見的反身動詞片語，其他類似用法還有 avail oneself of（利用）、consider oneself（自認為）。","example":"New interns are encouraged to familiarize themselves with the safety guidelines on their first day."},"keyWords":[{"word":"familiarize","pos":"v.","meaning":"使熟悉","freq":"中頻"},{"word":"reimbursement","pos":"n.","meaning":"報銷","freq":"高頻"},{"word":"claim","pos":"n.","meaning":"申請、索賠","freq":"高頻"}]},{"id":"pron-5","category":"pron","categoryName":"代名詞與關係詞","question":"The quarterly report, ___ figures had been verified twice, still contained a significant error in the revenue section.","options":["whose","that","which","who"],"answer":0,"difficulty":"進階","translation":"那份財報的數字雖然已經被核對過兩次，但營收部分仍然有一項重大錯誤。","explanation":"解題線索：逗號隔開的部分是非限定用法的關係子句，用來補充說明先行詞 report，且空格後面直接接名詞 figures，語意是「報告的數字」。適用文法規則：（1）非限定關係子句不能用 that；（2）當關係子句要表達先行詞的所有格關係且後面直接接名詞時，須用 whose，whose 可用於人也可用於物。為何是正解：whose figures 表示「報告的數字」，且逗號結構允許 whose 引導非限定子句，語意通順；that 不能用在逗號後的非限定子句；which 後面若接名詞會缺少所有格意涵，語法不通（須改寫成 the figures of which 或 of which the figures，單獨接名詞不合文法）；who 只能指人，不能指 report。","optionNotes":["whose 可用於人或物的所有格關係代名詞，後面直接接名詞 figures，表示「報告的數字」，且可用於逗號隔開的非限定子句，故為正解。","that 一般不用於逗號後的非限定關係子句（補充說明用法），此處以逗號隔開先行詞和子句，屬非限定用法，故不能選 that，是考生常忽略「逗號」這個線索的陷阱。","which 是關代但後面若直接接名詞 figures，會變成單純的名詞片語而非「所有格」關係，語法不完整，正確須改寫成 the figures of which 或 of which the figures，考生易因 which 可代替物而誤選，忽略了空格後緊接名詞代表需要所有格。","who 只能代替人當先行詞，此處先行詞是 report（物），用 who 詞性錯誤，屬於基礎誤判。"],"keyWords":[{"word":"quarterly","pos":"adj.","meaning":"季度的","freq":"高頻"},{"word":"verify","pos":"v.","meaning":"核對、驗證","freq":"中頻"},{"word":"revenue","pos":"n.","meaning":"營收","freq":"極高頻"}]},{"id":"pron-6","category":"pron","categoryName":"代名詞與關係詞","question":"Ms. Lin, ___ oversees the logistics department, will chair the meeting when the director is on business travel.","options":["whom","who","whose","which"],"answer":1,"difficulty":"基礎","translation":"負責監督物流部門的林小姐，將在主管出差時主持會議。","explanation":"解題線索：空格後面直接接動詞 oversees（單數動詞），代表空格在子句中要當「主詞」，且先行詞 Ms. Lin 是人。適用文法規則：關係子句中若先行詞在子句內擔任主詞角色，且先行詞是人，要用主格關係代名詞 who。為何是正解：who oversees... 中 who 就是 oversees 的主詞，語意是「監督物流部門的林小姐」，文法正確；whom 是受格，後面不能直接接動詞當主詞；whose 是所有格，後面須接名詞而非動詞；which 只能代替物，不能指人。","optionNotes":["whom 是受格關係代名詞，只能在子句中作受詞（後面通常接主詞+動詞），但此處空格後直接接動詞 oversees，代表空格本身就是主詞，用受格 whom 會使子句缺少主詞，文法不通。","who 是主格關係代名詞，用於先行詞是人且在子句中擔任主詞時，此處 who 後接動詞 oversees，文法正確，為正解。","whose 是所有格，後面必須直接接名詞（如 whose department），但此處空格後接的是動詞 oversees，用 whose 語法不合，是考生看到人物先行詞就直覺聯想所有格的常見誤判。","which 只能代替「物」作先行詞，此處先行詞是人 Ms. Lin，詞性明顯錯誤，屬於基礎陷阱。"],"keyWords":[{"word":"oversee","pos":"v.","meaning":"監督","freq":"中頻"},{"word":"logistics","pos":"n.","meaning":"物流","freq":"高頻"},{"word":"chair","pos":"v.","meaning":"主持（會議）","freq":"中頻"}]},{"id":"verbal-1","category":"verbal","categoryName":"分詞與不定詞","question":"All employees ___ in the upcoming safety training must register online before Friday.","options":["participate","participated","to participating","participating"],"answer":3,"difficulty":"基礎","translation":"所有將參加即將舉行的安全訓練的員工，必須在星期五前完成線上報名。","explanation":"解題線索：空格後面接介系詞片語 in the upcoming safety training，且空格前是名詞 employees，代表這裡要用分詞當形容詞來修飾 employees，形成「employees who are participating in...」的省略形式。文法規則：現在分詞（Ving）表主動、正在進行的意涵，修飾主詞為「執行動作者」；過去分詞（Vp.p.）則表被動或已完成。因為 employees 是「參加」這個動作的主動執行者（員工主動參加訓練，而非被參加），所以要用現在分詞 participating 當形容詞子句的省略形式，直接修飾 employees。這是分詞當形容詞修飾名詞的基礎考法，先判斷主動被動關係就能鎖定答案。","optionNotes":["participate 是原形動詞，不能直接放在名詞後面當修飾語，句子會出現兩個動詞卻沒有連接詞，文法不通，是誤把此空格當成本句主要動詞的陷阱。","participated 是過去分詞，表被動或動作已完成，但「參加」這個動作對 employees 而言是主動的，不會被誰參加，故文法邏輯不合，是分詞主動被動判斷錯誤的典型陷阱。","to participating 文法上不存在這種形式（不定詞後面應接原形動詞，不會接 Ving），純粹是拼裝出的錯誤選項，690 分考生可能因為看到 to 而誤以為是不定詞用法。","正解：employees 與 participate 是主動關係（員工主動參加），故用現在分詞 participating 修飾 employees，等於 employees who are participating in...的省略。"],"keyWords":[{"word":"participate in","pos":"phr.v.","meaning":"參加","freq":"高頻"},{"word":"register","pos":"v.","meaning":"登記、報名","freq":"高頻"}]},{"id":"verbal-2","category":"verbal","categoryName":"分詞與不定詞","question":"The manager found the client's feedback rather ___, so she scheduled a follow-up call immediately.","options":["concerning","concerned","concern","to concern"],"answer":0,"difficulty":"中階","translation":"經理覺得客戶的意見相當令人擔憂，因此立刻安排了一通後續電話。","explanation":"解題線索：這是 find + 受詞 + 補語的句型（find the client's feedback rather ___），受詞是 the client's feedback（客戶的意見，一個「事物」）。文法規則：情緒動詞的分詞形容詞要看主詞/受詞是「引發情緒的一方」還是「感受情緒的一方」——事物通常是引發情緒的一方，用現在分詞（Ving，主動、令人感到...）；人通常是感受情緒的一方，用過去分詞（Vp.p.，被動、感到...）。這裡的受詞補語是在形容 feedback（意見本身）而不是形容經理這個人，意見是「讓人感到擔憂的來源」，所以用 concerning（令人擔憂的）。若填 concerned 則變成在形容「經理感到擔憂」，但句構上補語是接在 feedback 後面說明 feedback 的性質，故此處須用 concerning。","optionNotes":["正解：feedback 是引發擔憂情緒的事物（令人擔憂的意見），情緒分詞用現在分詞 concerning 表示「令人感到...的」性質，修飾事物。","concerned 是過去分詞，表示「（人）感到擔憂的」，若填入此處會變成在形容 feedback 本身「感到擔憂」，但意見不會自己感到擔憂，是情緒分詞主被動判斷顛倒的典型陷阱。","concern 是原形動詞或名詞，直接放在 rather 後面不符合 find + O + adj. 的句型結構，文法上說不通。","to concern 是不定詞，不能當形容詞放在受詞後面做補語，且此句意也不需要不定詞表目的，是硬湊的誤導選項。"],"keyWords":[{"word":"feedback","pos":"n.","meaning":"意見回饋","freq":"高頻"},{"word":"follow-up","pos":"adj./n.","meaning":"後續的、後續動作","freq":"高頻"},{"word":"concerning","pos":"adj.","meaning":"令人擔憂的","freq":"中頻"}],"pattern":{"name":"find + O + 分詞形容詞","note":"此句型表示「覺得某物/某人如何」，分詞當受詞補語時要依受詞是主動引發情緒還是被動感受情緒來選現在分詞或過去分詞。","example":"The board found the quarterly results quite encouraging."}},{"id":"verbal-3","category":"verbal","categoryName":"分詞與不定詞","question":"___ the shipment before the holiday, the warehouse staff worked overtime for three consecutive days.","options":["Complete","Completing","Completed","To have completed"],"answer":1,"difficulty":"中階","translation":"在假期前完成這批貨物出貨之際，倉庫員工連續三天加班。","explanation":"解題線索：逗號前是一個沒有主詞、沒有連接詞的片語，逗號後才出現主要子句 the warehouse staff worked overtime，這是典型的分詞構句考法。文法規則：分詞構句要先判斷邏輯主詞（即主要子句的主詞 the warehouse staff）與分詞動作之間是主動還是被動關係——warehouse staff 是「完成」這個動作的執行者（員工主動完成出貨），所以要用現在分詞 Completing 開頭，等於 As they were completing / While completing 的省略。分詞構句本身表達的是動作與主要子句之間的伴隨或原因關係，不是不定詞的目的用法，主動關係一律用 Ving 開頭。","optionNotes":["Complete 是原形動詞，不能在逗號前單獨形成沒有主詞的片語去修飾後面的完整句子，文法結構不成立。","正解：warehouse staff 主動執行「完成出貨」這個動作，主動關係的分詞構句用現在分詞 Completing 開頭，等於 As they were completing the shipment...的省略。","Completed 是過去分詞，用在分詞構句開頭表示被動意涵（即「被完成」），但出貨不是被員工「被完成」，而是員工主動完成，主被動關係顛倒，是分詞構句最常見的判斷錯誤。","To have completed 是完成式不定詞，用來表示「已經完成」的動作先後關係，但此處分詞構句表達的是伴隨/原因關係而非目的，且不定詞開頭不構成典型的分詞構句，故不適用。"],"keyWords":[{"word":"shipment","pos":"n.","meaning":"貨運、出貨","freq":"高頻"},{"word":"consecutive","pos":"adj.","meaning":"連續的","freq":"中頻"},{"word":"warehouse","pos":"n.","meaning":"倉庫","freq":"高頻"}],"pattern":{"name":"分詞構句（Ving 開頭）","note":"當句首出現無主詞、無連接詞的動詞片語加逗號時，須判斷該動作與主要子句主詞的主被動關係；主動用現在分詞開頭，被動用過去分詞開頭。","example":"Reviewing the contract carefully, the legal team identified several ambiguous clauses."}},{"id":"verbal-4","category":"verbal","categoryName":"分詞與不定詞","question":"The HR department recommends ___ the employee handbook before signing the new contract.","options":["review","to review","reviewing","reviewed"],"answer":2,"difficulty":"基礎","translation":"人資部門建議在簽署新合約前先詳閱員工手冊。","explanation":"解題線索：空格前的動詞是 recommends，後面接的是要不要做某件事的受詞。文法規則：recommend 是「動名詞控制動詞」（同類還有 suggest、consider、avoid、finish、mind），這類動詞後面只能接動名詞（Ving）當受詞，不能直接接不定詞（to V）或原形動詞。這是動名詞 vs 不定詞考點中最基礎、最常考的「特定動詞接固定形式」規則，只要背熟 recommend 這個字後面固定接 Ving，就能直接選出答案，不需要再分析句意。","optionNotes":["review 是原形動詞，recommend 後面不能直接接原形動詞當受詞，文法不成立。","to review 是不定詞，recommend 雖然中文常翻成「建議去做」讓人直覺聯想到 to V，但 recommend 文法上固定搭配動名詞而非不定詞，是很多考生會弄混的陷阱。","正解：recommend 是後面固定接動名詞（Ving）當受詞的動詞，reviewing 在此當 recommends 的受詞，等於「建議複習這件事」。","reviewed 是過去分詞或過去式，不能當動詞的受詞使用，文法上不合，是考生誤把它當成被動語態用法所選的錯誤選項。"],"keyWords":[{"word":"recommend","pos":"v.","meaning":"建議、推薦","freq":"極高頻"},{"word":"handbook","pos":"n.","meaning":"手冊","freq":"中頻"}],"pattern":{"name":"recommend + Ving","note":"recommend、suggest、consider、avoid、finish、mind 等動詞後面只能接動名詞當受詞，不可接不定詞。","example":"The auditor suggested revising the expense report before submission."}},{"id":"verbal-5","category":"verbal","categoryName":"分詞與不定詞","question":"Given the ___ results of the pilot program, management decided to expand it to all regional offices.","options":["promise","promising","promised","promisingly"],"answer":1,"difficulty":"進階","translation":"鑑於試辦計畫的結果令人充滿希望，管理層決定將其推廣到所有地區辦公室。","explanation":"解題線索：空格夾在 the 與 results 之間，代表這裡要填一個形容詞來修飾 results（結果）這個事物，且整句主詞是 management，句意是「因為結果讓人感到有希望，所以管理層決定擴大實施」。文法規則：情緒分詞形容詞的判斷不是看整句主詞，而是看空格所修飾的名詞本身是「引發感受的一方」還是「感受到情緒的一方」——results 是「令人感到有希望」的來源（結果本身讓人產生期待感），屬於主動引發情緒，須用現在分詞 promising；若 results 是「感到有希望的」一方（即結果本身會感到期待），則明顯不合邏輯，因為事物不會主動產生感受。這是情緒分詞中容易與「整句主詞是人」搞混的進階陷阱，關鍵在於鎖定空格緊鄰修飾的名詞是誰。","optionNotes":["promise 是名詞或原形動詞，直接放在 the 與 results 之間無法構成「the + N + N」的合理複合名詞用法，且句意也不通，是詞性判斷錯誤的陷阱。","正解：results 是引發「有希望」這種感受的來源（事物令人感到有希望），情緒分詞用現在分詞 promising 表達「令人感到有希望的」，修飾 results。","promised 是過去分詞，表示「被感到有希望的」或「已承諾的」，但 results 不是被動地「被賦予希望」，而是主動讓人產生希望感，且 promised results 語意會偏向「已承諾的結果」，與句意不符，是情緒分詞方向判斷錯誤的典型誘答。","promisingly 是副詞，副詞不能置於 the 與名詞 results 之間修飾名詞，只能修飾動詞或形容詞，此處文法結構不允許，是詞性判斷疏忽的陷阱。"],"keyWords":[{"word":"pilot program","pos":"n. phr.","meaning":"試辦計畫","freq":"中頻"},{"word":"expand","pos":"v.","meaning":"擴展、推廣","freq":"高頻"},{"word":"promising","pos":"adj.","meaning":"有前景的、令人期待的","freq":"中頻"}]},{"id":"verbal-6","category":"verbal","categoryName":"分詞與不定詞","question":"Employees are encouraged ___ their supervisors of any safety hazards immediately upon discovery.","options":["notifying","notify","to notify","notified"],"answer":2,"difficulty":"進階","translation":"員工一發現任何安全隱患，就應立即通知主管。","explanation":"解題線索：本句是被動語態 be encouraged 後面接的補語，且句尾出現 notify + 人 + of + 事的固定搭配（notify somebody of something，通知某人某事）。文法規則：encourage 是「不定詞控制動詞」，主動語態時的固定用法是 encourage + O + to V（鼓勵某人做某事），改成被動語態時受詞變主詞，動詞片語就變成 be encouraged to V，這個 to V 的形式在被動轉換後依然保留。690 分考生常見的盲點是看到 be encouraged 後面直覺想接 Ving 或原形動詞，但其實只要記得 encourage someone to do 這個主動句型，被動化之後 to V 不會消失，直接對應到 to notify。","optionNotes":["notifying 是動名詞，encourage 這類動詞的主動與被動固定搭配都是接不定詞 to V，不會接動名詞，是把 encourage 誤認成動名詞控制動詞（如 recommend、suggest）的混淆陷阱。","notify 是原形動詞，被動語態 be encouraged 後面不能直接接原形動詞，必須維持 to V 的形式，是漏看 to 的陷阱選項。","正解：encourage + O + to V 的主動句型被動化後為 be encouraged to V，to notify 保留了不定詞形式，符合 be encouraged 後固定接不定詞的文法規則。","notified 是過去分詞，不能接在 be encouraged 後面當受詞或補語使用，此處若填入會使句子缺少完整的動詞結構，文法不通，是誤把它當成被動疊加用法的錯誤選項。"],"keyWords":[{"word":"notify ... of ...","pos":"phr.v.","meaning":"將...通知...","freq":"高頻"},{"word":"hazard","pos":"n.","meaning":"危害、隱患","freq":"中頻"},{"word":"supervisor","pos":"n.","meaning":"主管","freq":"高頻"}],"pattern":{"name":"be encouraged/required/asked to V（被動 + 不定詞）","note":"encourage、require、ask、allow 等動詞的主動句型為 V + O + to V，改為被動語態時受詞變主詞，to V 保留不變，形成 be + p.p. + to V 的固定結構。","example":"All visitors are required to sign in at the front desk before entering the facility."}},{"id":"collo-1","category":"collo","categoryName":"慣用搭配與比較","question":"The maintenance team is responsible ___ inspecting all warehouse equipment before the monthly audit begins.","options":["of","to","with","for"],"answer":3,"difficulty":"基礎","translation":"維護團隊負責在每月稽核開始前檢查所有倉庫設備。","explanation":"解題線索：空格前面是形容詞 responsible，後面接動名詞 inspecting（動作）。適用的文法規則：be responsible for + N/V-ing 是固定搭配，表示「對……負責」，for 之後可接名詞或動名詞當受詞。為何是正解：這是850分筆記中列出的高頻介系詞搭配之一，responsible 只能配 for，不能配 of／to／with，這些都是常見誤植但語意或文法不成立的組合。","optionNotes":["of：學生常誤以為「負責『的』」該用 of，但英文中 responsible 不與 of 連用，屬於中文思維直譯的陷阱。","to：容易與 be accountable to（向某人負責）搞混，但 responsible 本身不接 to 表示負責對象。","with：可能聯想到 deal with 等片語動詞而誤選，但 responsible with 不是英文中存在的搭配。","正解：be responsible for 是固定搭配，for 後接動名詞 inspecting，語意完整且文法正確。"],"keyWords":[{"word":"be responsible for","pos":"片語","meaning":"對……負責","freq":"極高頻"},{"word":"inspect","pos":"v.","meaning":"檢查","freq":"高頻"},{"word":"warehouse","pos":"n.","meaning":"倉庫","freq":"高頻"}],"pattern":{"name":"be responsible for + N/V-ing","note":"表示「負責某事」，for 之後可接名詞或動名詞，是多益介系詞搭配最常考的組合之一。","example":"The logistics coordinator is responsible for tracking every shipment that leaves the warehouse."}},{"id":"collo-2","category":"collo","categoryName":"慣用搭配與比較","question":"Because the new printer runs much ___ than the old one, the office no longer experiences long delays before meetings.","options":["fast","faster","fastest","as fast"],"answer":1,"difficulty":"基礎","translation":"由於新印表機的運轉速度比舊的快很多，辦公室在會議前不再經歷長時間的延誤。","explanation":"解題線索：句尾出現 than the old one，這是比較級的明確訊號。適用的文法規則：fast 的比較級是 faster，句型為「A + 比較級 + than + B」。為何是正解：than 只能搭配比較級，faster than 語法完整，而原級 fast、最高級 fastest、as...as 結構都無法與 than 並用。","optionNotes":["fast：原級形容詞/副詞，690分考生常忽略後面的 than 線索而誤選原級。","faster：與 than 搭配的比較級形式，符合「比……更快」的語意與文法。","fastest：最高級需搭配 the 且後面接 of/in，不能接 than，是常見的最高級誤用陷阱。","as fast：as...as 結構表示「一樣快」，但句中已出現 than，兩者不能混用，是混淆比較句型的典型錯誤。"],"keyWords":[{"word":"delay","pos":"n./v.","meaning":"延誤","freq":"高頻"},{"word":"than","pos":"conj.","meaning":"比……（比較級用）","freq":"極高頻"}],"pattern":{"name":"A + 比較級 + than + B","note":"表示兩者比較，比較級後必須接 than，不能與 as...as 或最高級混用。","example":"The revised schedule works much better than the original plan did."}},{"id":"collo-3","category":"collo","categoryName":"慣用搭配與比較","question":"Employees who submit expense reports late will not be reimbursed, ___ how urgent the original purchase was.","options":["in spite","because of","regardless of","as well as"],"answer":2,"difficulty":"中階","translation":"遲交報銷單的員工將不會獲得報銷，無論原始採購有多緊急。","explanation":"解題線索：空格後面接 how urgent...was，這是一個名詞子句（間接問句），且句意是「不管多緊急都不會報銷」，帶有讓步語氣。適用的文法規則：regardless of + 名詞/wh-子句，表示「不管、不論」，可直接接 how 引導的子句。為何是正解：in spite 少了 of 不能單獨接受詞，because of 表因果而非讓步、語意矛盾，as well as 表並列而非讓步，只有 regardless of 才能表達「無論如何」並直接銜接 how 子句。","optionNotes":["in spite：學生常忘記 in spite 必須寫成 in spite of 才能接受詞，單獨使用文法不完整，是常見漏字陷阱。","because of：表達因果關係，若填入會變成「因為原始採購有多緊急」，與句意「不會報銷」矛盾，語意不通。","regardless of：表示「不論、不管」，可接 wh-子句，語意與句子的讓步邏輯完全吻合，為正解。","as well as：表示「以及、也」，是並列而非讓步關係，放入句中無法表達「無論多緊急」的意思。"],"keyWords":[{"word":"regardless of","pos":"片語介系詞","meaning":"不論、不管","freq":"高頻"},{"word":"reimburse","pos":"v.","meaning":"報銷","freq":"高頻"},{"word":"urgent","pos":"adj.","meaning":"緊急的","freq":"中頻"}],"pattern":{"name":"regardless of + N/wh-子句","note":"表示「不論……」，後面可直接接名詞或 how/what/whether 引導的子句，是進階讓步語氣的常考片語。","example":"The warranty covers all repairs, regardless of where the product was purchased."}},{"id":"collo-4","category":"collo","categoryName":"慣用搭配與比較","question":"Sales representatives are expected to follow ___ with potential clients within 48 hours of the initial inquiry.","options":["through","out","over","up"],"answer":3,"difficulty":"中階","translation":"業務代表被要求在初次詢問後的48小時內對潛在客戶進行後續跟進。","explanation":"解題線索：follow 後面接 with potential clients，且語境是業務在初次詢問後應該做的動作。適用的文法規則：follow up (with sb.) 是固定片語動詞，意思是「跟進、後續聯繫」，介系詞 up 不可替換。為何是正解：follow up with 是商務情境高頻片語動詞，表示對客戶進行後續追蹤聯繫；其餘 through／out／over 與 follow 搭配後意思不通或不是與 with clients 連用的固定搭配，只有 up 能使句子文法正確且語意通順。","optionNotes":["through：follow through 意為「貫徹執行、堅持到底」，但此片語固定接 on（follow through on a plan），不與 with + 人 搭配，故不能表示「聯繫客戶」，語意及搭配皆不成立。","out：follow out 不是英文中常見的固定片語動詞，此選項純屬干擾，不成立。","over：學生可能聯想 take over 等片語而誤選，但 follow over 不是存在的搭配。","up：正解。follow up (with sb.) 表示「跟進、後續聯繫」，是業務情境的固定片語動詞，語意與搭配完全吻合。"],"keyWords":[{"word":"follow up (with)","pos":"片語動詞","meaning":"跟進、後續聯繫","freq":"極高頻"},{"word":"potential client","pos":"n.","meaning":"潛在客戶","freq":"高頻"},{"word":"inquiry","pos":"n.","meaning":"詢問","freq":"高頻"}],"pattern":{"name":"follow up (with sb./on sth.)","note":"表示「跟進、後續聯繫」，接人用 with，接事用 on，是業務往來情境中最常考的片語動詞之一，勿與 follow through (on) 混淆。","example":"Please follow up with the vendor if you haven't received a confirmation by Friday."}},{"id":"collo-5","category":"collo","categoryName":"慣用搭配與比較","question":"The revised logistics plan reduced shipping costs far more effectively ___ the previous approach had over the past year.","options":["that","as","than","so"],"answer":2,"difficulty":"進階","translation":"修訂後的物流計畫在過去一年中比先前的做法更有效地降低了運輸成本。","explanation":"解題線索：空格前面出現 more effectively，這是副詞比較級的訊號，且後面接了完整子句 the previous approach had（過去一年的做法）。適用的文法規則：more + 副詞/形容詞 + than 是比較級句型，than 之後可接省略動詞的子句（had [reduced costs]）。為何是正解：more...than 是固定配對，that／so 不能與比較級連用，as 只能搭配原級（as...as）而非比較級，只有 than 能與 more effectively 搭配構成完整比較句。","optionNotes":["that：常與 so...that（如此……以致於）混淆而誤選，但此處前面是 more 而非 so，that 無法與比較級搭配。","as：容易聯想成 as...as 原級比較，但句中已用 more effectively 表示比較級，as 不能與比較級連用。","than：與 more effectively 搭配的比較級連接詞，句型「more + adv. + than」文法正確且語意完整，為正解。","so：so 通常與 that 構成 so...that 結果子句，或用於 so + adj./adv.，不能接在比較級之後表示比較對象。"],"keyWords":[{"word":"effectively","pos":"adv.","meaning":"有效地","freq":"高頻"},{"word":"logistics","pos":"n.","meaning":"物流","freq":"高頻"},{"word":"reduce","pos":"v.","meaning":"減少","freq":"極高頻"}],"pattern":{"name":"more + adv./adj. + than + 子句","note":"表示比較級語氣，than 後方常接省略重複動詞的子句，是進階閱讀中常考的比較句型。","example":"The new system processed orders far more efficiently than the outdated one ever did."}},{"id":"collo-6","category":"collo","categoryName":"慣用搭配與比較","question":"The quarterly earnings report ___ to reflect the updated depreciation figures before it is submitted to the board.","options":["must revise","must be revised","must revising","must have revised"],"answer":1,"difficulty":"進階","translation":"季度盈餘報告必須被修訂以反映更新後的折舊數字，然後才能提交給董事會。","explanation":"解題線索：主詞 report 是「被修訂」的對象（報告不會自己修訂），且句尾有 before it is submitted，顯示動作尚未發生、屬於未來須完成的被動義務。適用的文法規則：情態動詞 must 後面接原形動詞，若主詞是被動承受者則需用被動語態 must be + p.p.。為何是正解：must be revised 同時滿足「情態動詞後接原形」與「主詞為受動者」兩個條件，是被動語態與情態動詞結合的正確形式，其餘選項在語態或動詞形式上都不成立。","optionNotes":["must revise：主動語態，意味著 report 自己去修訂別的東西，與主詞應為受詞的邏輯矛盾，是忽略被動線索的典型錯誤。","must be revised：must 後接被動原形 be + p.p.，符合主詞 report 是被修訂對象的邏輯，文法與語意皆正確，為正解。","must revising：情態動詞後面只能接原形動詞，不能接動名詞，此為動詞形式錯誤的干擾選項。","must have revised：must have + p.p. 表示對過去的推測（一定已經修訂過），但句尾 before it is submitted 顯示動作在未來才完成，時態邏輯不符。"],"keyWords":[{"word":"depreciation","pos":"n.","meaning":"折舊","freq":"中頻"},{"word":"quarterly","pos":"adj.","meaning":"季度的","freq":"高頻"},{"word":"board","pos":"n.","meaning":"董事會","freq":"高頻"}],"pattern":{"name":"must be + p.p.（情態動詞的被動語態）","note":"當主詞是動作的承受者時，情態動詞後需用被動形式 be + 過去分詞，常與需要判斷主動/被動的題型結合出現。","example":"All defective units must be returned to the warehouse within seven business days."}},{"id":"word-1","category":"word","categoryName":"字彙辨析","question":"The finance director's ___ comments during the budget review helped junior staff feel comfortable raising concerns about the projected deficit.","options":["considerable","considerate","considering","considered"],"answer":1,"difficulty":"基礎","translation":"財務總監在預算審查時體貼的評論，讓資淺員工能安心地提出對預估赤字的疑慮。","explanation":"解題線索：空格後面是名詞 comments，前面有 director's 所有格，代表這裡要選一個形容詞來修飾 comments。四個選項中 considerable（相當大的）、considerate（體貼的）、considering（考慮到；介系詞用法）、considered（被認為的、經過考慮的）都可能是形容詞或分詞，容易混淆。適用文法規則：形容詞辨義題要看語意搭配——後半句「helped junior staff feel comfortable」說明這些評論的效果是讓人感到自在、被照顧，因此語意上要選 considerate（體貼的、為他人著想的），而不是 considerable（份量大、數量多的，通常修飾 amount、number、sum 等）。為何是正解：considerate 描述人對他人態度上的體貼，恰好呼應後文「讓資淺員工感到自在」的因果關係，故選 (B) considerate。","optionNotes":["considerable 意為「相當大的、可觀的」，用來形容數量、程度（如 considerable expense），與「讓人感到自在」的語意不符，是形似字陷阱。","正解：considerate 意為「體貼的、為他人著想的」，用來形容人的態度，符合後文因果語意。","considering 作形容詞用法罕見，常見用法是介系詞（考慮到…）或連接詞，放在此處修飾 comments 不合語意邏輯。","considered 是過去分詞當形容詞，意為「經過深思熟慮的」（如 a considered opinion），語意偏向決策的周全性而非待人態度，與句意不符。"],"keyWords":[{"word":"considerate","pos":"adj.","meaning":"體貼的","freq":"高頻"},{"word":"considerable","pos":"adj.","meaning":"相當大的","freq":"高頻"},{"word":"deficit","pos":"n.","meaning":"赤字","freq":"中頻"}]},{"id":"word-2","category":"word","categoryName":"字彙辨析","question":"Employees who wish to transfer to the Taichung branch must submit a formal request ___ to the human resources department by the end of this month.","options":["direct","directive","directly","direction"],"answer":2,"difficulty":"基礎","translation":"希望調任台中分公司的員工必須在本月底前直接向人資部門提交正式申請書。","explanation":"解題線索：空格前是名詞 request，後面接介系詞片語 to the human resources department，整句已經有主要動詞 submit 和受詞 a formal request，句構完整。適用文法規則：當句子結構已完整（主詞+動詞+受詞）卻仍多出一個空格，且空格前後是動詞片語的延伸（submit...to...），代表要用副詞來修飾動詞 submit 的方式，說明「如何提交」。為何是正解：directly（直接地）是副詞，可以插入動詞片語中間修飾 submit，意指「直接遞交（不經轉手）」，語意通順也符合文法角色，故選 (C) directly。","optionNotes":["direct 除了當動詞、形容詞外也可作副詞用（如 fly direct），但那是口語化的慣用固定搭配；在正式書面商業英文中，submit 之後應搭配標準的 -ly 副詞形式 directly，690分考生常誤選這個非正式用法。","directive 是名詞，意為「指令、指示」，放入句中會讓句子多出一個名詞卻無連接詞或介系詞銜接，文法不通。","正解：directly 是副詞，修飾動詞 submit，表示提交的方式是「直接」，句意通順，是正式書面英文的標準用法。","direction 是名詞，意為「方向、指示」，同樣會造成句構錯誤，且與後面的 to 介系詞片語邏輯不合。"],"keyWords":[{"word":"directly","pos":"adv.","meaning":"直接地","freq":"極高頻"},{"word":"submit","pos":"v.","meaning":"提交","freq":"高頻"},{"word":"branch","pos":"n.","meaning":"分公司","freq":"高頻"}],"pattern":{"name":"submit A to B","note":"「將 A 提交給 B」，A 通常是文件、申請書，B 是收件單位或部門，動詞 submit 常與副詞（如 directly, promptly）搭配說明提交方式。","example":"All expense reports should be submitted promptly to the accounting office for reimbursement."}},{"id":"word-3","category":"word","categoryName":"字彙辨析","question":"Although the marketing team's proposal was ___ in most respects, the board rejected it because the projected launch date was unrealistic.","options":["sound","sounded","sounding","soundly"],"answer":0,"difficulty":"中階","translation":"雖然行銷團隊的提案在大多數方面都很合理健全，董事會仍以預定上市日期不切實際為由否決了它。","explanation":"解題線索：句型是 be動詞 was ___，且句中有 Although 引導的讓步子句，主詞是 the proposal。適用文法規則：was 後面接的應該是形容詞或名詞當主詞補語，而 sound 這個字很特別——它除了大家熟悉的名詞（聲音）、動詞（發出聲音）外，也是一個常考的形容詞，意為「合理的、健全的、可靠的」（如 a sound argument, sound advice）。690分考生容易被字尾 -ly 的 soundly 誤導成副詞優先直覺，但此處 was 後面須接形容詞補語而非副詞。為何是正解：sound 作形容詞使用，修飾主詞 proposal，符合「be + 形容詞」的補語結構，且語意上「提案在大多數方面是合理的」與後文轉折（但發布日期不切實際）形成對比，邏輯通順，故選 (A) sound。","optionNotes":["正解：sound 在此作形容詞，意為「合理的、站得住腳的」，放在 was 之後當主詞補語，文法與語意皆通。","sounded 是動詞 sound（聽起來）的過去式，若選此項則 was sounded 會變成不合邏輯的被動語態組合，且 sound 作動詞時態上也不需要與 was 連用，文法錯誤。","sounding 是現在分詞，若填入 was sounding 會變成過去進行式，語意變成「提案正在發出聲音」，明顯不合邏輯，是誤把 sound 只當動詞看待的陷阱。","soundly 是副詞（意為「徹底地、酣然地」，如 sleep soundly），此處 was 後面需要的是形容詞補語而非副詞，690分考生常因字尾 -ly 直覺選副詞而落入陷阱。"],"keyWords":[{"word":"sound","pos":"adj.","meaning":"合理的、健全的","freq":"中頻"},{"word":"proposal","pos":"n.","meaning":"提案","freq":"高頻"},{"word":"unrealistic","pos":"adj.","meaning":"不切實際的","freq":"中頻"}],"pattern":{"name":"Although + S + V, S + V","note":"although 為連接詞，後面須接完整子句（主詞+動詞），常用於表達讓步或轉折語氣，不可與介系詞 despite 混用。","example":"Although the new system was costly to install, it significantly reduced processing errors."}},{"id":"word-4","category":"word","categoryName":"字彙辨析","question":"The quarterly report shows that overall sales have increased ___, rising nearly 40 percent compared with the same period last year.","options":["considerately","considerable","considering","considerably"],"answer":3,"difficulty":"中階","translation":"季度報告顯示整體銷售額大幅成長，與去年同期相比上升了將近百分之四十。","explanation":"解題線索：空格前面是動詞片語 have increased（現在完成式），後面用逗號接一個分詞片語 rising nearly 40 percent 進一步說明增長的程度。適用文法規則：動詞後面若要修飾「增加的程度」，須使用副詞，而非形容詞。considerable 和 considerate 是兩個形近字但詞性都是形容詞，不能直接修飾動詞 increased；只有字尾加上 -ly 的副詞形式才能放在動詞後面表示程度。為何是正解：considerably 意為「相當地、大幅地」，用來修飾 increased 的程度，且後文 rising nearly 40 percent 也印證了「大幅增加」的語意，前後呼應，故選 (D) considerably。","optionNotes":["considerately 是「considerate（體貼的）」的副詞形式，意為「體貼地」，用於描述待人接物的態度，與「銷售額增加」的語意完全不符，是義近字陷阱。","considerable 是形容詞，不能直接修飾動詞 increased，若考生沒注意到空格要填副詞就會誤選此項，是詞性陷阱。","considering 作介系詞使用時意為「考慮到」，作分詞則需接受詞，兩種用法放在此處都無法通順地修飾 increased 的動詞後位置，文法不通。","正解：considerably 是副詞，意為「相當地、大幅地」，修飾動詞 increased 的增加程度，與後文 40 percent 的語意呼應。"],"keyWords":[{"word":"considerably","pos":"adv.","meaning":"相當地、大幅地","freq":"高頻"},{"word":"quarterly report","pos":"n. phrase","meaning":"季度報告","freq":"高頻"},{"word":"compared with","pos":"phrase","meaning":"與…相比","freq":"高頻"}]},{"id":"word-5","category":"word","categoryName":"字彙辨析","question":"Since the merger, the two companies' accounting systems have been operating ___, causing frequent discrepancies in the consolidated financial statements.","options":["independent","independence","independently","independents"],"answer":2,"difficulty":"進階","translation":"自從合併以來，兩家公司的會計系統一直是各自獨立運作，導致合併財務報表經常出現差異。","explanation":"解題線索：空格前是現在完成進行式 have been operating，動詞片語已經完整；空格後用逗號接一個分詞片語 causing frequent discrepancies，說明「獨立運作」所導致的結果。適用文法規則：動詞（含進行式、完成式）後面若無受詞、只需補充說明動作的方式或狀態，應使用副詞而非形容詞或名詞。為何是正解：independently（獨立地）是副詞，修飾 operating 的方式，表示兩套系統是各自分開運作，且此語意與後文「導致合併報表出現差異」形成合理的因果關係——正因為系統各自獨立、未整合，才會有數據對不上的問題，故選 (C) independently。","optionNotes":["independent 是形容詞，若填入 operating independent 則詞性不合，動詞後面不能直接接形容詞來修飾動作方式，是690分考生忽略詞性判斷的常見錯誤。","independence 是抽象名詞，意為「獨立性」，若填入會使句子變成「systems have been operating independence」，動詞後方出現不相干的名詞，文法結構不通。","正解：independently 是副詞，修飾 operating 這個動作的方式，且與後文「造成報表差異」的因果邏輯吻合。","independents 是名詞 independent 的複數形（指「獨立人士/獨立經營者」），語意上與「會計系統運作方式」完全無關，且此處也不需要名詞，是形似字陷阱。"],"keyWords":[{"word":"independently","pos":"adv.","meaning":"獨立地、各自地","freq":"中頻"},{"word":"discrepancy","pos":"n.","meaning":"差異、不一致","freq":"中頻"},{"word":"consolidated financial statements","pos":"n. phrase","meaning":"合併財務報表","freq":"中頻"}],"pattern":{"name":"have been + V-ing (現在完成進行式)","note":"表示動作從過去某時間點持續到現在，且強調動作的持續性或造成的結果，常與 since + 時間點連用。","example":"The warehouse staff have been working overtime since the shipment volume increased last quarter."}},{"id":"word-6","category":"word","categoryName":"字彙辨析","question":"The consultant recommended that the outdated inventory system be replaced ___, rather than gradually phased out over the next two years as originally planned.","options":["economical","economically","economic","economics"],"answer":1,"difficulty":"進階","translation":"顧問建議應該以節省成本的方式更換這套過時的庫存系統，而不是像原訂計畫那樣在未來兩年內逐步淘汰。","explanation":"解題線索：空格前是被動語態 be replaced，空格後用逗號接對比片語 rather than gradually phased out，rather than 前後應對比兩種「更換方式」。適用文法規則：動詞（含被動式）後方若無受詞、僅補充動作方式，須用副詞；而 economic 與 economical 是一組常考的義近形容詞辨析——economic 指「經濟學上的、與經濟體制相關的」（如 economic policy），economical 才是「節省的、划算的」。690分考生常混淆這兩字，但此處連詞性都不對，因為空格要修飾動詞 replaced 的方式，須用副詞。為何是正解：economically 在此作副詞，意為「以節省成本的方式」，修飾 be replaced，並與 rather than gradually phased out（相對於「逐步淘汰」）形成方式上的對比，語意通順，故選 (B) economically。","optionNotes":["economical 是形容詞，意為「節省的、划算的」，雖然語意方向正確，但詞性不合，動詞後面不能直接接形容詞修飾動作方式，是義近字陷阱加詞性陷阱。","正解：economically 是副詞，修飾 be replaced 的方式，意為「以節省成本、划算的方式」，並與 rather than 後方的對比片語邏輯一致。","economic 意為「經濟的、經濟學上的」（如 economic growth, economic policy），與「節省成本」的語意不同，690分考生常把 economic 和 economical 搞混，此為義近字陷阱。","economics 是名詞，意為「經濟學」這門學科，放入句中會使動詞後方出現不相干的學科名詞，文法與語意都不通。"],"keyWords":[{"word":"economically","pos":"adv.","meaning":"節省地、划算地","freq":"中頻"},{"word":"phase out","pos":"phrasal verb","meaning":"逐步淘汰","freq":"中頻"},{"word":"inventory system","pos":"n. phrase","meaning":"庫存系統","freq":"高頻"},{"word":"recommend that + V原形","pos":"phrase","meaning":"建議應該（子句用假設語氣動詞原形）","freq":"高頻"}],"pattern":{"name":"recommend that + S + (should) + 原形動詞","note":"recommend、suggest、propose、require 等表建議/要求的動詞，後面 that 子句要用「(should) + 原形動詞」的假設語氣，不受主詞單複數影響。","example":"The auditor suggested that the finance team review all outstanding invoices before the fiscal year ends."}},{"id":"x-q1","category":"pos","categoryName":"詞性","question":"【官方考點改編 No.101】Guest surveys indicate that the hotel's online booking steps are surprisingly ___.","options":["confusion","confuses","confuse","confusing"],"answer":3,"difficulty":"基礎","translation":"住客問卷顯示，這間飯店的線上訂房步驟出乎意料地令人困惑。","explanation":"考點是「be 動詞＋副詞＋＿＿」的詞性判斷。定位空格前結構：steps are surprisingly ___，be 動詞 are 之後接主詞補語，副詞 surprisingly 只能修飾形容詞，所以空格必須填形容詞。confusing 是現在分詞轉形容詞，表示「（事物）令人困惑的」，主詞 steps 是造成困惑的來源，用 -ing 形容詞正確。confusion 是名詞，前面已有 are 又被副詞修飾，名詞放不進這個位置；confuses 與 confuse 都是動詞，句中已有 be 動詞 are，不能再疊一個動詞。此題與官方樣題同構：主詞＋be＋程度副詞＋形容詞空格，四個選項為同字根的名詞、動詞、形容詞變化。","optionNotes":["confusion 是名詞「困惑」，be 動詞後雖可接名詞作補語，但前面的副詞 surprisingly 不能修飾名詞，且語意上「步驟是困惑」不通，是看到 be 動詞就想填名詞的陷阱。","confuses 是第三人
