"freq":"高頻","tip":"efficient（形容詞）→ efficiency（名詞）；別與 effectiveness（成效）混淆，efficiency 強調省時省力。"},{"id":"x-v269","theme":"fin","themeName":"財務、採購與物流","word":"productivity","pos":"n.","meaning":"生產力","example":"Flexible work hours have boosted employee productivity noticeably.","exampleZh":"彈性工時明顯提升了員工的生產力。","collocations":["boost productivity","productivity level","measure productivity"],"freq":"高頻","tip":"productive（形容詞）→ productivity（名詞）；常見搭配動詞 boost、improve、increase。"},{"id":"x-v270","theme":"fin","themeName":"財務、採購與物流","word":"sourcing","pos":"n.","meaning":"（原料/供應商）尋找、採購","example":"Global sourcing helped the company cut manufacturing costs.","exampleZh":"全球採購幫助公司降低了製造成本。","collocations":["global sourcing","sourcing strategy","sourcing department"],"freq":"中頻","tip":"source 當動詞是「找到來源、採購」，sourcing 為其動名詞形式，常見於供應鏈用語。"},{"id":"x-v271","theme":"fin","themeName":"財務、採購與物流","word":"vendor","pos":"n.","meaning":"供應商、賣家","example":"The procurement team compared prices from three different vendors.","exampleZh":"採購團隊比較了三家不同供應商的報價。","collocations":["approved vendor","vendor contract","select a vendor"],"freq":"高頻","tip":"vendor 與 supplier 常互換使用，但 vendor 更強調交易對象，也可指路邊攤販。"},{"id":"x-v272","theme":"fin","themeName":"財務、採購與物流","word":"wholesale","pos":"n.","meaning":"批發","example":"The company sells its goods at wholesale prices to retailers.","exampleZh":"該公司以批發價將商品賣給零售商。","collocations":["wholesale price","wholesale market","sell wholesale"],"freq":"中頻","tip":"與 retail（零售）相對；wholesale 也可作形容詞或副詞，如 sell wholesale。"},{"id":"x-v273","theme":"fin","themeName":"財務、採購與物流","word":"bulk","pos":"adj.","meaning":"大量的、批量的","example":"Ordering in bulk qualifies customers for a ten percent discount.","exampleZh":"大量訂購可讓顧客獲得百分之十的折扣。","collocations":["in bulk","bulk order","bulk discount"],"freq":"中頻","tip":"常見片語 in bulk（大量地）；bulk 也可當名詞指「大部分」，如 the bulk of the order。"},{"id":"x-v274","theme":"fin","themeName":"財務、採購與物流","word":"freight","pos":"n.","meaning":"貨運、運費","example":"Freight charges rose sharply due to fuel price increases.","exampleZh":"由於油價上漲，貨運費用大幅提高。","collocations":["freight charges","freight forwarder","by freight"],"freq":"中頻","tip":"不可數名詞，指大宗貨物運輸；freight forwarder 是報關/貨運承攬業者，常考詞彙。"},{"id":"x-v275","theme":"fin","themeName":"財務、採購與物流","word":"cargo","pos":"n.","meaning":"貨物","example":"The cargo ship was delayed at port due to bad weather.","exampleZh":"這艘貨輪因天候不佳而在港口延誤。","collocations":["cargo ship","cargo plane","load cargo"],"freq":"中頻","tip":"cargo 特指船舶或飛機載運的貨物，與 freight（運輸方式/費用）語意略有不同。"},{"id":"x-v276","theme":"fin","themeName":"財務、採購與物流","word":"stock","pos":"n.","meaning":"庫存","example":"The item is currently out of stock at all retail locations.","exampleZh":"這項商品目前在所有零售據點都缺貨。","collocations":["out of stock","in stock","stock level"],"freq":"高頻","tip":"固定片語 in stock / out of stock；stock 另有「股票」之意，需依語境判斷詞義。"},{"id":"x-v277","theme":"fin","themeName":"財務、採購與物流","word":"dispatch","pos":"v.","meaning":"派送、發送","example":"The warehouse will dispatch the order within 24 hours.","exampleZh":"倉庫將在二十四小時內將訂單發送出去。","collocations":["dispatch an order","dispatch a team","dispatch promptly"],"freq":"中頻","tip":"dispatch 語氣比 send 更正式、強調迅速派出，常用於出貨與人員派遣情境。"},{"id":"x-v278","theme":"fin","themeName":"財務、採購與物流","word":"courier","pos":"n.","meaning":"快遞員、快遞公司","example":"A courier delivered the contract for same-day signature.","exampleZh":"快遞員送來合約，需要當天簽署。","collocations":["courier service","by courier","send by courier"],"freq":"中頻","tip":"courier 可指人也可指公司（如快遞業者）；片語 by courier 表示「以快遞方式」。"},{"id":"x-v279","theme":"fin","themeName":"財務、採購與物流","word":"customs clearance","pos":"n.","meaning":"清關","example":"The container is still waiting for customs clearance at the port.","exampleZh":"這個貨櫃仍在港口等待清關。","collocations":["customs clearance process","clear customs","delay in customs clearance"],"freq":"中頻","tip":"customs（海關，恆用複數形）+ clearance（放行）；動詞片語則說 clear customs。"},{"id":"x-v280","theme":"fin","themeName":"財務、採購與物流","word":"packaging","pos":"n.","meaning":"包裝","example":"Eco-friendly packaging has become a selling point for many brands.","exampleZh":"環保包裝已成為許多品牌的賣點。","collocations":["eco-friendly packaging","packaging design","packaging material"],"freq":"中頻","tip":"不可數名詞，指包裝材料或包裝方式；package 則可作可數名詞（一個包裹）或動詞。"},{"id":"x-v281","theme":"trv","themeName":"出差與旅遊","word":"itinerary","pos":"n.","meaning":"行程表","example":"The travel agent emailed a detailed itinerary for the business trip.","exampleZh":"旅行社寄來了這趟出差的詳細行程表。","collocations":["travel itinerary","detailed itinerary","itinerary change"],"freq":"高頻","tip":"拼字較難，考題常出現拼寫或同義替換（schedule of travel）；重音在第二音節。"},{"id":"x-v282","theme":"trv","themeName":"出差與旅遊","word":"reservation","pos":"n.","meaning":"預訂","example":"He made a hotel reservation for three nights in Osaka.","exampleZh":"他預訂了大阪的飯店三晚住宿。","collocations":["make a reservation","confirm a reservation","cancel a reservation"],"freq":"高頻","tip":"reserve（動詞，預訂）→ reservation（名詞）；固定搭配 make/confirm/cancel a reservation。"},{"id":"x-v283","theme":"trv","themeName":"出差與旅遊","word":"boarding pass","pos":"n.","meaning":"登機證","example":"Passengers must present a boarding pass before entering the gate.","exampleZh":"旅客進入登機門前必須出示登機證。","collocations":["show a boarding pass","print a boarding pass","boarding pass number"],"freq":"高頻","tip":"board（登機，動詞）+ pass（通行證）；常與 gate、check-in counter 同場景出現。"},{"id":"x-v284","theme":"trv","themeName":"出差與旅遊","word":"delay","pos":"n./v.","meaning":"誤點、延誤","example":"The flight delay caused several passengers to miss their connections.","exampleZh":"班機誤點導致好幾位乘客錯過了轉機。","collocations":["flight delay","due to a delay","delay a departure"],"freq":"高頻","tip":"名詞、動詞同形；後接 in + Ving 表「在…方面延遲」，如 delay in shipping。"},{"id":"x-v285","theme":"trv","themeName":"出差與旅遊","word":"depart","pos":"v.","meaning":"出發","example":"The train will depart from Platform 3 at 8:15 sharp.","exampleZh":"這班列車將於八點十五分準時從第三月台出發。","collocations":["depart from","depart on time","scheduled to depart"],"freq":"高頻","tip":"depart 恆搭介係詞 from（地點）；名詞形式為 departure，常見於機場廣播用語。"},{"id":"x-v286","theme":"trv","themeName":"出差與旅遊","word":"baggage","pos":"n.","meaning":"行李","example":"Please keep your baggage with you at all times in the terminal.","exampleZh":"請在航廈內隨時將行李帶在身邊。","collocations":["baggage allowance","excess baggage","check in baggage"],"freq":"高頻","tip":"不可數名詞，與 luggage 同義可互換；不可加 s 變複數，這是常見文法陷阱。"},{"id":"x-v287","theme":"trv","themeName":"出差與旅遊","word":"accommodation","pos":"n.","meaning":"住宿","example":"The company covers accommodation costs for all business trips.","exampleZh":"公司會支付所有出差的住宿費用。","collocations":["accommodation expenses","arrange accommodation","book accommodation"],"freq":"高頻","tip":"英式用法多為不可數，美式偶爾複數化（accommodations）；考題常考搭配詞 arrange/book。"},{"id":"x-v288","theme":"trv","themeName":"出差與旅遊","word":"shuttle","pos":"n.","meaning":"接駁車","example":"A free shuttle runs between the hotel and the convention center.","exampleZh":"飯店與會議中心之間有免費接駁車往返。","collocations":["airport shuttle","shuttle service","take the shuttle"],"freq":"中頻","tip":"shuttle 本義「梭子」，來回穿梭之意；也可作動詞，如 shuttle passengers between two places。"},{"id":"x-v289","theme":"trv","themeName":"出差與旅遊","word":"layover","pos":"n.","meaning":"轉機停留","example":"We have a three-hour layover in Singapore before the final leg.","exampleZh":"我們在新加坡有三小時的轉機停留，之後才搭最後一段航班。","collocations":["long layover","layover in","during the layover"],"freq":"中頻","tip":"美式用語，英式常說 stopover；注意與 connecting flight（轉接班機本身）搭配使用區別。"},{"id":"x-v290","theme":"trv","themeName":"出差與旅遊","word":"detour","pos":"n.","meaning":"繞道","example":"Road construction forced drivers to take a lengthy detour.","exampleZh":"道路施工迫使駕駛人繞了一大段路。","collocations":["take a detour","make a detour","detour around"],"freq":"中頻","tip":"固定搭配動詞 take/make a detour；也可作動詞，如 detour around the construction site。"},{"id":"x-v291","theme":"trv","themeName":"出差與旅遊","word":"board","pos":"n./v.","meaning":"董事會、板子；登（機/船）","example":"Passengers began to board the aircraft twenty minutes before departure.","exampleZh":"乘客在起飛前二十分鐘開始登機。","collocations":["board the plane","board of directors","boarding time"],"freq":"高頻","tip":"多義詞：動詞「登機」與名詞「董事會」意義完全不同，需依語境判斷，是多益常考陷阱字。"},{"id":"x-v292","theme":"trv","themeName":"出差與旅遊","word":"confirmation","pos":"n.","meaning":"確認（訂位/訂單）","example":"You will receive a confirmation email once the booking is complete.","exampleZh":"訂位完成後您將收到一封確認電子郵件。","collocations":["confirmation email","booking confirmation","await confirmation"],"freq":"高頻","tip":"confirm（動詞）→ confirmation（名詞）；常搭配 email、number 等名詞組成複合詞。"},{"id":"x-v293","theme":"trv","themeName":"出差與旅遊","word":"connecting flight","pos":"n.","meaning":"轉接班機","example":"She almost missed her connecting flight due to the long layover.","exampleZh":"她因為轉機停留時間太長，差點錯過了轉接班機。","collocations":["miss a connecting flight","catch a connecting flight","connecting flight to"],"freq":"中頻","tip":"connect（銜接）+ flight；與 layover（停留時間）常在同一段旅程敘述中一起出現。"},{"id":"x-v294","theme":"trv","themeName":"出差與旅遊","word":"departure","pos":"n.","meaning":"出發、啟程","example":"Please arrive at the gate one hour before departure time.","exampleZh":"請於出發時間前一小時抵達登機門。","collocations":["departure time","departure gate","departure lounge"],"freq":"高頻","tip":"depart（動詞）→ departure（名詞），與 arrival（抵達）成對出現，是機場情境高頻字。"},{"id":"x-v295","theme":"trv","themeName":"出差與旅遊","word":"arrival","pos":"n.","meaning":"抵達","example":"The arrival of the shipment was delayed by customs inspection.","exampleZh":"這批貨物因海關檢查而延遲抵達。","collocations":["arrival time","upon arrival","arrival hall"],"freq":"高頻","tip":"固定片語 upon arrival（一抵達就…）；與 departure 成對記憶效果更好。"},{"id":"x-v296","theme":"trv","themeName":"出差與旅遊","word":"cancellation","pos":"n.","meaning":"取消","example":"The hotel offers a full refund for cancellations made in advance.","exampleZh":"飯店對提前取消的訂房提供全額退款。","collocations":["cancellation policy","flight cancellation","due to a cancellation"],"freq":"高頻","tip":"cancel（動詞）→ cancellation（名詞，注意雙 l）；常搭配 policy、fee 出現在訂房情境。"},{"id":"x-v297","theme":"trv","themeName":"出差與旅遊","word":"baggage claim","pos":"n.","meaning":"行李提領處","example":"Passengers can collect their luggage at baggage claim area 4.","exampleZh":"旅客可在第四號行李提領區領取行李。","collocations":["baggage claim area","wait at baggage claim","baggage claim carousel"],"freq":"中頻","tip":"claim 在此當名詞「領取處」，動詞則是 claim your baggage（領取行李）。"},{"id":"x-v298","theme":"trv","themeName":"出差與旅遊","word":"carry-on","pos":"n.","meaning":"隨身行李","example":"Only one carry-on bag is allowed per passenger on this airline.","exampleZh":"這家航空公司規定每位乘客只能攜帶一件隨身行李。","collocations":["carry-on bag","carry-on luggage","carry-on allowance"],"freq":"中頻","tip":"複合字帶連字號，常作形容詞修飾 bag/luggage；與需託運的 checked baggage 相對。"},{"id":"x-v299","theme":"trv","themeName":"出差與旅遊","word":"customs","pos":"n.","meaning":"海關","example":"Travelers must pass through customs before leaving the airport.","exampleZh":"旅客離開機場前必須通過海關。","collocations":["go through customs","customs officer","clear customs"],"freq":"高頻","tip":"指「海關」時恆用複數形 customs，指「習俗」時則依語境可數；別與 custom（客製）混淆。"},{"id":"x-v300","theme":"trv","themeName":"出差與旅遊","word":"declare","pos":"v.","meaning":"申報（海關）","example":"You must declare any goods over the duty-free limit.","exampleZh":"超過免稅額度的物品必須向海關申報。","collocations":["declare goods","nothing to declare","declare at customs"],"freq":"中頻","tip":"機場常見標語 nothing to declare（無申報物品）；也可泛指「宣布、聲明」。"},{"id":"x-v301","theme":"trv","themeName":"出差與旅遊","word":"visa","pos":"n.","meaning":"簽證","example":"Business travelers to that country need a visa in advance.","exampleZh":"前往該國的商務旅客需要事先辦理簽證。","collocations":["apply for a visa","visa application","valid visa"],"freq":"高頻","tip":"固定搭配 apply for a visa（申請簽證）；注意與 Visa（信用卡品牌）大小寫語境不同。"},{"id":"x-v302","theme":"trv","themeName":"出差與旅遊","word":"passport control","pos":"n.","meaning":"證照查驗","example":"The line at passport control moved faster than expected.","exampleZh":"證照查驗處的排隊速度比預期快。","collocations":["pass through passport control","wait at passport control","passport control officer"],"freq":"中頻","tip":"機場入境流程用語，常與 customs、baggage claim 依序出現在同一段敘述中。"},{"id":"x-v303","theme":"trv","themeName":"出差與旅遊","word":"terminal","pos":"n.","meaning":"航廈","example":"International flights depart from Terminal 2 at this airport.","exampleZh":"這座機場的國際航班從第二航廈出發。","collocations":["airport terminal","Terminal 2","terminal building"],"freq":"中頻","tip":"terminal 也可指電腦終端機，在機場情境固定指航廈，考題常搭配航班資訊出現。"},{"id":"x-v304","theme":"trv","themeName":"出差與旅遊","word":"commute","pos":"v.","meaning":"通勤","example":"Many employees commute over an hour to reach the office.","exampleZh":"許多員工通勤超過一小時才能抵達辦公室。","collocations":["commute to work","daily commute","commute by train"],"freq":"中頻","tip":"動詞 commute 常搭 to work/by train；名詞形式 commute 也很常見，如 a long commute。"},{"id":"x-v305","theme":"trv","themeName":"出差與旅遊","word":"rental car","pos":"n.","meaning":"租賃車","example":"He picked up a rental car right outside the airport terminal.","exampleZh":"他在機場航廈外就直接取了租賃車。","collocations":["rental car company","pick up a rental car","rental car agreement"],"freq":"中頻","tip":"rent（租，動詞）+ -al（形容詞化）+ car；同義詞組 car rental 也常見，詞序可互換。"},{"id":"x-v306","theme":"trv","themeName":"出差與旅遊","word":"mileage","pos":"n.","meaning":"里程","example":"The company reimburses employees for mileage on business trips.","exampleZh":"公司會補貼員工出差的里程費用。","collocations":["mileage reimbursement","high mileage","mileage allowance"],"freq":"中頻","tip":"mile（英里）+ -age（名詞化）；也可指「燃油效率」，如 good gas mileage。"},{"id":"x-v307","theme":"trv","themeName":"出差與旅遊","word":"toll","pos":"n.","meaning":"過路費","example":"Drivers must pay a toll before entering the expressway.","exampleZh":"駕駛人進入高速公路前必須支付過路費。","collocations":["pay a toll","toll booth","toll road"],"freq":"中頻","tip":"toll booth（收費站）、toll road（收費道路）為常見複合詞；toll 也可指「傷亡人數」，語境不同。"},{"id":"x-v308","theme":"trv","themeName":"出差與旅遊","word":"congestion","pos":"n.","meaning":"（交通）壅塞","example":"Traffic congestion downtown delayed the client meeting by an hour.","exampleZh":"市中心的交通壅塞讓客戶會議延誤了一小時。","collocations":["traffic congestion","ease congestion","congestion charge"],"freq":"中頻","tip":"congest（動詞，使壅塞）+ -ion；congestion charge 指「塞車費/進城費」，倫敦等城市常見制度。"},{"id":"x-v309","theme":"trv","themeName":"出差與旅遊","word":"gridlock","pos":"n.","meaning":"交通阻塞","example":"A traffic accident caused total gridlock on the main highway.","exampleZh":"一起交通事故造成主要高速公路完全阻塞。","collocations":["traffic gridlock","cause gridlock","stuck in gridlock"],"freq":"中頻","tip":"gridlock 比 congestion 語氣更嚴重，指「完全動彈不得」的癱瘓狀態，也可比喻政治僵局。"},{"id":"x-v310","theme":"trv","themeName":"出差與旅遊","word":"expressway","pos":"n.","meaning":"高速公路","example":"Take the expressway to avoid the congestion in the city center.","exampleZh":"走高速公路可避開市中心的交通壅塞。","collocations":["take the expressway","expressway exit","merge onto the expressway"],"freq":"中頻","tip":"美式常用 expressway/freeway，英式多用 motorway；搭配動詞 take/merge onto。"},{"id":"x-v311","theme":"trv","themeName":"出差與旅遊","word":"fare","pos":"n.","meaning":"票價、車資","example":"The airline raised its fares due to rising fuel costs.","exampleZh":"這家航空公司因燃油成本上漲而調高了票價。","collocations":["airfare","raise fares","one-way fare"],"freq":"中頻","tip":"fare 專指交通票價（別與 fee、price 混用）；airfare（機票費）是常見複合詞。"},{"id":"x-v312","theme":"trv","themeName":"出差與旅遊","word":"timetable","pos":"n.","meaning":"時刻表","example":"The revised timetable adds two more trains during rush hour.","exampleZh":"修訂後的時刻表在尖峰時段多加了兩班列車。","collocations":["train timetable","check the timetable","revised timetable"],"freq":"中頻","tip":"英式用語，美式較常用 schedule；也可抽象指「進度表」，如 project timetable。"},{"id":"x-v313","theme":"trv","themeName":"出差與旅遊","word":"platform","pos":"n.","meaning":"（車站）月台","example":"The express train to the airport departs from Platform 5.","exampleZh":"往機場的快車從第五月台發車。","collocations":["departure platform","wait on the platform","Platform 5"],"freq":"中頻","tip":"platform 在科技語境指「平台」，在交通語境固定指「月台」，需依上下文判斷詞義。"},{"id":"x-v314","theme":"trv","themeName":"出差與旅遊","word":"cruise","pos":"n.","meaning":"郵輪之旅","example":"The company rewarded top performers with an all-inclusive cruise.","exampleZh":"公司以全包式郵輪之旅獎勵表現最優秀的員工。","collocations":["go on a cruise","cruise ship","cruise itinerary"],"freq":"中頻","tip":"cruise 當動詞也可表「巡航、緩速行駛」；名詞常搭配 ship、line（郵輪公司）。"},{"id":"x-v315","theme":"trv","themeName":"出差與旅遊","word":"embark","pos":"v.","meaning":"登船、啟程","example":"Passengers will embark on the cruise ship at 4 p.m. sharp.","exampleZh":"乘客將於下午四點準時登船。","collocations":["embark on a journey","embark on the ship","about to embark"],"freq":"中頻","tip":"em-（進入）+ bark（船，古字）；片語 embark on 也常比喻「展開（新計畫、新旅程）」。"},{"id":"x-v316","theme":"trv","themeName":"出差與旅遊","word":"disembark","pos":"v.","meaning":"下船、下車","example":"Passengers were asked to disembark in an orderly manner.","exampleZh":"乘客被要求依序有秩序地下船。","collocations":["disembark from the ship","disembark passengers","time to disembark"],"freq":"中頻","tip":"dis-（相反）+ embark（登船）→下船；與 embark 成對記憶，多益偶考同義詞替換。"},{"id":"x-v317","theme":"svc","themeName":"客服與售後","word":"complaint","pos":"n.","meaning":"客訴、抱怨","example":"The manager personally handled the customer's formal complaint.","exampleZh":"經理親自處理了這位顧客的正式客訴。","collocations":["file a complaint","handle a complaint","customer complaint"],"freq":"高頻","tip":"complain（動詞）→ complaint（名詞）；固定搭配 file/lodge a complaint（提出客訴）。"},{"id":"x-v318","theme":"svc","themeName":"客服與售後","word":"exchange","pos":"n.","meaning":"換貨","example":"The store allows a free exchange within fourteen days of purchase.","exampleZh":"這家店允許購買後十四天內免費換貨。","collocations":["free exchange","exchange policy","request an exchange"],"freq":"中頻","tip":"exchange 也可指「交流、匯兌」，在客服情境固定指「換貨」，常與 refund（退款）並列。"},{"id":"x-v319","theme":"svc","themeName":"客服與售後","word":"apologize","pos":"v.","meaning":"道歉","example":"The representative apologized for the inconvenience caused.","exampleZh":"客服代表為造成的不便致歉。","collocations":["apologize for","sincerely apologize","apologize to a customer"],"freq":"高頻","tip":"英式拼法為 apologise；動詞恆搭介係詞 for，不可直接接受詞。"},{"id":"x-v320","theme":"svc","themeName":"客服與售後","word":"inconvenience","pos":"n.","meaning":"不便","example":"We apologize for any inconvenience this delay may cause.","exampleZh":"對於此次延誤可能造成的不便，我們深感抱歉。","collocations":["cause inconvenience","apologize for the inconvenience","minor inconvenience"],"freq":"高頻","tip":"in-（否定）+ convenience（便利）；客服信件開頭固定句型 We apologize for any inconvenience。"},{"id":"x-v321","theme":"svc","themeName":"客服與售後","word":"resolve","pos":"v.","meaning":"解決（問題）","example":"The technician resolved the issue within twenty minutes.","exampleZh":"技術人員在二十分鐘內解決了這個問題。","collocations":["resolve an issue","resolve a complaint","quickly resolve"],"freq":"高頻","tip":"resolve 常搭 issue/problem/complaint 等受詞；名詞形式為 resolution。"},{"id":"x-v322","theme":"svc","themeName":"客服與售後","word":"resolution","pos":"n.","meaning":"解決方案","example":"The company aims to reach a resolution within 48 hours.","exampleZh":"公司目標在四十八小時內提出解決方案。","collocations":["reach a resolution","satisfactory resolution","resolution process"],"freq":"中頻","tip":"resolve（動詞）→ resolution（名詞）；也可指「新年新希望」，需依語境判斷詞義。"},{"id":"x-v323","theme":"svc","themeName":"客服與售後","word":"follow up","pos":"v.","meaning":"後續追蹤","example":"A representative will follow up with you within one business day.","exampleZh":"客服代表將於一個工作天內對您進行後續追蹤。","collocations":["follow up with","follow up on an issue","follow-up call"],"freq":"高頻","tip":"動詞片語 follow up（兩字分開）；名詞則連字號寫作 follow-up，如 a follow-up email。"},{"id":"x-v324","theme":"svc","themeName":"客服與售後","word":"helpline","pos":"n.","meaning":"服務專線","example":"Customers can reach the technical helpline around the clock.","exampleZh":"顧客可以全天候撥打技術服務專線。","collocations":["call the helpline","24-hour helpline","technical helpline"],"freq":"中頻","tip":"help（幫助）+ line（電話線）；與 hotline 意義相近，常見於官方支援管道稱呼。"},{"id":"x-v325","theme":"svc","themeName":"客服與售後","word":"hotline","pos":"n.","meaning":"專線","example":"The company set up a hotline for urgent product recalls.","exampleZh":"公司設立了一條專線來處理緊急產品召回事宜。","collocations":["set up a hotline","call the hotline","24-hour hotline"],"freq":"中頻","tip":"hotline 強調「緊急、直接」的專線，helpline 則偏一般諮詢，語感略有差異。"},{"id":"x-v326","theme":"svc","themeName":"客服與售後","word":"representative","pos":"n.","meaning":"客服代表","example":"A customer service representative answered the call within seconds.","exampleZh":"一位客服代表在幾秒內就接起了電話。","collocations":["customer service representative","sales representative","speak to a representative"],"freq":"高頻","tip":"常縮寫為 rep（口語）；represent（動詞，代表）+ -ative（形容詞/名詞化）。"},{"id":"x-v327","theme":"svc","themeName":"客服與售後","word":"assistance","pos":"n.","meaning":"協助","example":"Please let us know if you need further assistance with your order.","exampleZh":"若您對訂單需要進一步協助，請隨時告知我們。","collocations":["need assistance","provide assistance","assistance with"],"freq":"高頻","tip":"assist（動詞）→ assistance（不可數名詞）；固定搭配介係詞 with，如 assistance with the form。"},{"id":"x-v328","theme":"svc","themeName":"客服與售後","word":"inquiry","pos":"n.","meaning":"詢問、查詢","example":"We received your inquiry regarding the return policy.","exampleZh":"我們收到了您關於退貨政策的詢問。","collocations":["make an inquiry","inquiry form","in response to your inquiry"],"freq":"高頻","tip":"英式拼法 enquiry；動詞形式為 inquire，常搭配 regarding/about 說明查詢主題。"},{"id":"x-v329","theme":"svc","themeName":"客服與售後","word":"inquire","pos":"v.","meaning":"詢問","example":"Customers often inquire about shipping times before ordering.","exampleZh":"顧客在下單前常會詢問運送時間。","collocations":["inquire about","inquire whether","please inquire"],"freq":"中頻","tip":"動詞恆搭介係詞 about，或接 wh- 子句（inquire whether/how）；名詞為 inquiry。"},{"id":"x-v330","theme":"svc","themeName":"客服與售後","word":"respond","pos":"v.","meaning":"回覆、回應","example":"The support team responds to emails within 24 hours.","exampleZh":"客服團隊會在二十四小時內回覆電子郵件。","collocations":["respond to","respond promptly","fail to respond"],"freq":"高頻","tip":"動詞恆搭介係詞 to；名詞形式 response 亦同，如 in response to your email。"},{"id":"x-v331","theme":"svc","themeName":"客服與售後","word":"responsiveness","pos":"n.","meaning":"回應速度、應變力","example":"Customers praised the company's responsiveness to feedback.","exampleZh":"顧客讚賞這家公司對意見反映的回應速度。","collocations":["responsiveness to feedback","improve responsiveness","customer responsiveness"],"freq":"中頻","tip":"responsive（形容詞）+ -ness（名詞化）；抽象名詞，常見於服務滿意度調查用語。"},{"id":"x-v332","theme":"svc","themeName":"客服與售後","word":"satisfaction","pos":"n.","meaning":"滿意度","example":"The survey measures customer satisfaction after every service call.","exampleZh":"這項調查在每次服務通話後衡量顧客滿意度。","collocations":["customer satisfaction","satisfaction survey","to your satisfaction"],"freq":"高頻","tip":"satisfy（動詞）→ satisfaction（名詞）；固定片語 to your satisfaction（讓您滿意）。"},{"id":"x-v333","theme":"svc","themeName":"客服與售後","word":"dissatisfaction","pos":"n.","meaning":"不滿","example":"The report highlighted growing dissatisfaction with delivery times.","exampleZh":"這份報告凸顯了對配送時間日益增長的不滿。","collocations":["express dissatisfaction","customer dissatisfaction","growing dissatisfaction"],"freq":"中頻","tip":"dis-（否定）+ satisfaction（滿意）；與 satisfaction 成對記憶，考題常互為反義詞替換。"},{"id":"x-v334","theme":"svc","themeName":"客服與售後","word":"feedback form","pos":"n.","meaning":"意見回饋表","example":"Guests are encouraged to fill out a feedback form at checkout.","exampleZh":"我們鼓勵房客在退房時填寫意見回饋表。","collocations":["fill out a feedback form","submit a feedback form","online feedback form"],"freq":"中頻","tip":"feedback 為不可數名詞，複合詞 feedback form 指具體的「表單」，動詞常搭 fill out/submit。"},{"id":"x-v335","theme":"svc","themeName":"客服與售後","word":"courteous","pos":"adj.","meaning":"有禮貌的","example":"The staff remained courteous even during the busiest hours.","exampleZh":"即使在最忙碌的時段，員工仍保持有禮貌的態度。","collocations":["courteous service","courteous staff","remain courteous"],"freq":"中頻","tip":"court（宮廷）衍生字，形容如宮廷禮儀般得體有禮；名詞為 courtesy（禮貌）。"},{"id":"x-v336","theme":"svc","themeName":"客服與售後","word":"prompt","pos":"adj.","meaning":"迅速的、及時的","example":"We appreciate your prompt response to our previous email.","exampleZh":"感謝您對我們先前那封郵件的迅速回覆。","collocations":["prompt response","prompt action","prompt payment"],"freq":"高頻","tip":"prompt 當動詞是「促使」，當形容詞是「迅速的」；多益常考詞性判斷，注意句中位置。"},{"id":"x-v337","theme":"svc","themeName":"客服","word":"accommodate","pos":"v.","meaning":"（為需求）通融、配合","example":"The airline agreed to accommodate the passenger's special dietary request.","exampleZh":"航空公司同意配合這名乘客的特殊飲食需求。","collocations":["accommodate a request","accommodate a need","accommodate guests"],"freq":"高頻","tip":"常考accommodate + 人/需求，意指「滿足、配合」，勿與accommodating（形容詞）混淆詞性。"},{"id":"x-v338","theme":"svc","themeName":"客服","word":"accommodating","pos":"adj.","meaning":"樂於配合的、通融的","example":"Our support team is known for being accommodating to last-minute changes.","exampleZh":"我們的客服團隊以樂於配合臨時變更著稱。","collocations":["accommodating staff","very accommodating","an accommodating attitude"],"freq":"中頻","tip":"字尾-ing當形容詞形容「人的態度」，別誤用accommodated這種被動形式。"},{"id":"x-v339","theme":"svc","themeName":"客服","word":"troubleshoot","pos":"v.","meaning":"故障排除、疑難排解","example":"The technician will troubleshoot the printer issue over the phone first.","exampleZh":"技術人員會先透過電話排解印表機的問題。","collocations":["troubleshoot an issue","troubleshoot a problem","troubleshoot remotely"],"freq":"中頻","tip":"trouble（問題）+ shoot（射擊），想像精準擊中問題根源；名詞化為troubleshooting。"},{"id":"x-v340","theme":"svc","themeName":"客服","word":"replacement","pos":"n.","meaning":"替換品、替代物","example":"The company shipped a replacement unit at no extra charge.","exampleZh":"公司免費寄送了一台替換機給客戶。","collocations":["a replacement unit","request a replacement","replacement part"],"freq":"高頻","tip":"replace（動詞）→replacement（名詞），常搭配for：a replacement for the damaged item。"},{"id":"x-v341","theme":"svc","themeName":"客服","word":"loyalty program","pos":"n.","meaning":"忠誠會員方案","example":"Members of the loyalty program earn points on every purchase.","exampleZh":"忠誠會員方案的會員每次消費都能累積點數。","collocations":["join a loyalty program","loyalty program member","enroll in the loyalty program"],"freq":"中頻","tip":"複合名詞整組記，客服/行銷情境常見，同義詞為rewards program。"},{"id":"x-v342","theme":"est","themeName":"租賃與房產","word":"lease","pos":"n.","meaning":"租約","example":"The tenant signed a two-year lease on the downtown office space.","exampleZh":"房客簽了一份為期兩年的市中心辦公空間租約。","collocations":["sign a lease","renew a lease","break a lease"],"freq":"極高頻","tip":"也可當動詞用（lease out出租），名詞常搭配sign/renew/terminate。"},{"id":"x-v343","theme":"est","themeName":"租賃與房產","word":"tenant","pos":"n.","meaning":"房客","example":"The tenant reported a leaking faucet to the building manager.","exampleZh":"房客向大樓管理員通報了一個漏水的水龍頭。","collocations":["current tenant","tenant complaint","potential tenant"],"freq":"高頻","tip":"對應詞landlord（房東），考題常考兩者權利義務的對比。"},{"id":"x-v344","theme":"est","themeName":"租賃與房產","word":"premises","pos":"n.","meaning":"場所、房舍","example":"Smoking is strictly prohibited on the premises at all times.","exampleZh":"本場所全時段嚴禁吸菸。","collocations":["on the premises","leave the premises","company premises"],"freq":"中頻","tip":"恆為複數形，即使指單一場所也不加s以外的變化，常見片語on the premises。"},{"id":"x-v345","theme":"est","themeName":"租賃與房產","word":"renovation","pos":"n.","meaning":"翻修","example":"The lobby will be closed for renovation for the next three weeks.","exampleZh":"大廳將因翻修工程休館三週。","collocations":["undergo renovation","renovation project","under renovation"],"freq":"高頻","tip":"動詞renovate，常見片語under renovation（翻修中），為多益高頻通知用語。"},{"id":"x-v346","theme":"est","themeName":"租賃與房產","word":"maintenance","pos":"n.","meaning":"維護","example":"Routine maintenance of the elevator is scheduled for Sunday morning.","exampleZh":"電梯的例行維護保養排定在週日上午進行。","collocations":["routine maintenance","maintenance fee","maintenance crew"],"freq":"極高頻","tip":"不可數名詞，常搭配building/routine/preventive，注意動詞maintain的拼字差異。"},{"id":"x-v347","theme":"est","themeName":"租賃與房產","word":"facility","pos":"n.","meaning":"設施","example":"The apartment complex offers a fitness facility for all residents.","exampleZh":"這棟公寓大樓為所有住戶提供健身設施。","collocations":["fitness facility","facility management","on-site facility"],"freq":"高頻","tip":"單數指「一項設施」、複數facilities指「整套設施」，也可指「廠房、設備」。"},{"id":"x-v348","theme":"est","themeName":"租賃與房產","word":"occupancy","pos":"n.","meaning":"入住率、使用權","example":"The new complex reached full occupancy within six months.","exampleZh":"這棟新大樓在六個月內就達到滿租狀態。","collocations":["occupancy rate","full occupancy","occupancy permit"],"freq":"中頻","tip":"抽象名詞，常與rate連用表示比率，occupancy permit則指「使用執照」。"},{"id":"x-v349","theme":"est","themeName":"租賃與房產","word":"landlord","pos":"n.","meaning":"房東","example":"The landlord agreed to lower the rent for a longer lease term.","exampleZh":"房東同意為換取更長租期而降低租金。","collocations":["landlord and tenant","notify the landlord","landlord's approval"],"freq":"高頻","tip":"與tenant成對出現，考題常考landlord-tenant關係中的責任歸屬。"},{"id":"x-v350","theme":"est","themeName":"租賃與房產","word":"rent","pos":"v.","meaning":"租、出租","example":"The company decided to rent additional storage space nearby.","exampleZh":"公司決定在附近租用額外的倉儲空間。","collocations":["rent a space","rent out","rent from"],"freq":"極高頻","tip":"rent out（出租給人）vs. rent from（向人承租），介係詞方向不可搞混。"},{"id":"x-v351","theme":"est","themeName":"租賃與房產","word":"rental","pos":"n.","meaning":"租金、租賃物","example":"Car rental rates increase significantly during the holiday season.","exampleZh":"假期期間租車費率會大幅上漲。","collocations":["rental rate","car rental","rental agreement"],"freq":"高頻","tip":"可當名詞（租賃物）或形容詞（rental car），與rent動詞用法區分。"},{"id":"x-v352","theme":"est","themeName":"租賃與房產","word":"utility","pos":"n.","meaning":"水電等公共事業服務","example":"Utility costs are included in the monthly rent for this unit.","exampleZh":"這個單位的月租已包含水電等公用事業費用。","collocations":["utility bill","utility company","utilities included"],"freq":"高頻","tip":"常見複數utilities指水電瓦斯總稱，注意與utility（實用性，單數抽象義）區分。"},{"id":"x-v353","theme":"est","themeName":"租賃與房產","word":"occupant","pos":"n.","meaning":"居住者、使用人","example":"The current occupant must vacate the unit by the end of the month.","exampleZh":"目前的居住者必須在月底前搬離該單位。","collocations":["current occupant","building occupant","occupant's consent"],"freq":"中頻","tip":"比tenant更中性，可泛指任何佔用空間的人，不限於承租關係。"},{"id":"x-v354","theme":"est","themeName":"租賃與房產","word":"real estate","pos":"n.","meaning":"房地產","example":"Investing in commercial real estate requires significant upfront capital.","exampleZh":"投資商業房地產需要大筆的前期資金。","collocations":["real estate investment","real estate market","commercial real estate"],"freq":"極高頻","tip":"不可數名詞片語，前面不加冠詞a，常搭配market/investment/agent。"},{"id":"x-v355","theme":"est","themeName":"租賃與房產","word":"real estate agent","pos":"n.","meaning":"房仲","example":"The real estate agent arranged three viewings for the buyer this week.","exampleZh":"房仲這週為買家安排了三場看屋行程。","collocations":["hire a real estate agent","licensed real estate agent","real estate agent's commission"],"freq":"高頻","tip":"與broker略有不同：agent通常受雇於broker之下執業，考題多視為同義詞。"},{"id":"x-v356","theme":"est","themeName":"租賃與房產","word":"broker","pos":"n.","meaning":"仲介","example":"An experienced broker negotiated a better price for the property.","exampleZh":"一位經驗豐富的仲介為這筆物件談到了更好的價格。","collocations":["insurance broker","real estate broker","broker a deal"],"freq":"高頻","tip":"也可當動詞用，broker a deal（斡旋促成交易），不限於房地產領域。"},{"id":"x-v357","theme":"est","themeName":"租賃與房產","word":"mortgage","pos":"n.","meaning":"房貸、抵押貸款","example":"The couple applied for a mortgage to purchase their first home.","exampleZh":"這對夫妻申請房貸以購買他們的第一間房子。","collocations":["apply for a mortgage","pay off a mortgage","mortgage rate"],"freq":"高頻","tip":"字首mort-（死）+ gage（誓約），常搭配rate/payment/lender等金融詞彙。"},{"id":"x-v358","theme":"est","themeName":"租賃與房產","word":"down payment","pos":"n.","meaning":"頭期款","example":"Buyers typically need a down payment of at least ten percent.","exampleZh":"買家通常需要準備至少一成的頭期款。","collocations":["make a down payment","down payment amount","require a down payment"],"freq":"中頻","tip":"複合名詞整組記，動詞常搭配make，指購屋或大額交易的首付款項。"},{"id":"x-v359","theme":"est","themeName":"租賃與房產","word":"closing","pos":"n.","meaning":"（房產交易）結案、交割","example":"The closing on the house is scheduled for next Friday afternoon.","exampleZh":"這棟房子的交割手續預定在下週五下午完成。","collocations":["closing date","closing costs","attend the closing"],"freq":"中頻","tip":"房地產情境專指「完成交易的最後手續」，注意與一般字義「關閉」區分語境。"},{"id":"x-v360","theme":"est","themeName":"租賃與房產","word":"deed","pos":"n.","meaning":"產權契約","example":"The deed to the property was transferred to the new owner.","exampleZh":"這筆物件的產權契約已過戶給新屋主。","collocations":["transfer a deed","sign a deed","deed of trust"],"freq":"中頻","tip":"法律文件用詞，常與title（產權）搭配出現，考閱讀題時多見於房產類文章。"},{"id":"x-v361","theme":"est","themeName":"租賃與房產","word":"title","pos":"n.","meaning":"產權","example":"The bank will not approve the loan until the title is verified.","exampleZh":"銀行在產權確認完成前不會核准這筆貸款。","collocations":["clear title","title search","transfer of title"],"freq":"中頻","tip":"房產情境指「所有權」，與職稱（job title）為多益常考的一詞多義。"},{"id":"x-v362","theme":"est","themeName":"租賃與房產","word":"zoning","pos":"n.","meaning":"土地分區使用規範","example":"The proposed warehouse violates the area's residential zoning laws.","exampleZh":"這座擬建的倉庫違反了該區域的住宅分區使用規範。","collocations":["zoning law","zoning permit","commercial zoning"],"freq":"中頻","tip":"常搭配law/regulation/permit，多出現在都市開發相關的閱讀文章。"},{"id":"x-v363","theme":"est","themeName":"租賃與房產","word":"permit","pos":"n.","meaning":"許可證","example":"Contractors must obtain a permit before starting the renovation.","exampleZh":"承包商必須在開始翻修前取得許可證。","collocations":["obtain a permit","building permit","permit application"],"freq":"高頻","tip":"名詞重音在前permit，動詞（允許）重音在後permit，多益聽力常考重音辨義。"},{"id":"x-v364","theme":"est","themeName":"租賃與房產","word":"remodel","pos":"v.","meaning":"改建、重新裝修","example":"The homeowner plans to remodel the kitchen before selling the house.","exampleZh":"屋主打算在賣房前重新裝修廚房。","collocations":["remodel a kitchen","remodel the interior","completely remodeled"],"freq":"中頻","tip":"re-（重新）+ model（塑造），語感比renovate更強調「改變格局」。"},{"id":"x-v365","theme":"est","themeName":"租賃與房產","word":"refurbish","pos":"v.","meaning":"翻新","example":"The hotel refurbished all guest rooms over the winter off-season.","exampleZh":"這間飯店在冬季淡季翻新了所有客房。","collocations":["refurbish a building","newly refurbished","refurbish the lobby"],"freq":"中頻","tip":"常以被動分詞newly refurbished（全新翻修的）修飾名詞，考題愛考此搭配。"},{"id":"x-v366","theme":"est","themeName":"租賃與房產","word":"commercial property","pos":"n.","meaning":"商業不動產","example":"The firm specializes in leasing commercial property downtown.","exampleZh":"這家公司專門承辦市中心商業不動產的租賃業務。","collocations":["commercial property owner","lease commercial property","commercial property market"],"freq":"中頻","tip":"與residential property（住宅不動產）相對，閱讀題常比較兩種物件用途。"},{"id":"x-v367","theme":"est","themeName":"租賃與房產","word":"residential","pos":"adj.","meaning":"住宅的","example":"This neighborhood is zoned strictly for residential use.","exampleZh":"這個社區被劃定為僅供住宅使用。","collocations":["residential area","residential zoning","residential building"],"freq":"高頻","tip":"與commercial（商業的）成對出現，常修飾area/zone/building。"},{"id":"x-v368","theme":"est","themeName":"租賃與房產","word":"condominium","pos":"n.","meaning":"公寓大廈","example":"The couple bought a two-bedroom condominium near the subway station.","exampleZh":"這對夫妻在捷運站附近買了一間兩房公寓。","collocations":["condominium unit","condominium association","luxury condominium"],"freq":"中頻","tip":"口語常縮寫為condo，指有共同管理委員會的產權公寓。"},{"id":"x-v369","theme":"est","themeName":"租賃與房產","word":"homeowners association","pos":"n.","meaning":"住戶管理委員會","example":"The homeowners association voted to raise the monthly maintenance fee.","exampleZh":"住戶管理委員會投票通過調漲每月的管理費。","collocations":["homeowners association fee","join the homeowners association","homeowners association meeting"],"freq":"中頻","tip":"常縮寫HOA，出現在社區規約、費用通知類的閱讀文章中。"},{"id":"x-v370","theme":"est","themeName":"租賃與房產","word":"sublet","pos":"v.","meaning":"轉租","example":"The lease clearly states that tenants may not sublet the apartment.","exampleZh":"租約明確規定房客不得將公寓轉租他人。","collocations":["sublet an apartment","sublet without permission","sublet clause"],"freq":"中頻","tip":"sub-（次、下）+ let（出租），指「二房東」式的再出租行為。"},{"id":"x-v371","theme":"est","themeName":"租賃與房產","word":"eviction","pos":"n.","meaning":"驅逐（房客）","example":"Failure to pay rent for two months can result in eviction.","exampleZh":"連續兩個月未繳房租可能導致遭到驅逐。","collocations":["eviction notice","face eviction","eviction process"],"freq":"中頻","tip":"動詞evict，常見片語eviction notice（驅逐通知），多見於租約糾紛情境。"},{"id":"x-v372","theme":"est","themeName":"租賃與房產","word":"relocation","pos":"n.","meaning":"搬遷","example":"The firm offered a relocation package to employees transferring abroad.","exampleZh":"公司為外派海外的員工提供了搬遷補助方案。","collocations":["relocation package","relocation assistance","office relocation"],"freq":"中頻","tip":"動詞relocate，常搭配package/assistance，泛指公司或個人的搬遷。"},{"id":"x-v373","theme":"hosp","themeName":"餐飲與住宿","word":"complimentary","pos":"adj.","meaning":"免費贈送的","example":"The hotel provides a complimentary breakfast for all guests.","exampleZh":"這間飯店為所有房客提供免費早餐。","collocations":["complimentary breakfast","complimentary Wi-Fi","complimentary shuttle service"],"freq":"高頻","tip":"意近free，但語氣更正式、常用於商業服務贈品，勿與complementary（互補的）混淆拼字。"},{"id":"x-v374","theme":"hosp","themeName":"餐飲與住宿","word":"voucher","pos":"n.","meaning":"兌換券","example":"Guests received a voucher for a complimentary spa treatment.","exampleZh":"房客獲得了一張免費水療護理的兌換券。","collocations":["gift voucher","redeem a voucher","meal voucher"],"freq":"中頻","tip":"常搭配動詞redeem（兌換），是餐旅、行銷情境常見的補償或優惠形式。"},{"id":"x-v375","theme":"hosp","themeName":"餐飲與住宿","word":"front desk","pos":"n.","meaning":"櫃台","example":"Please leave your key at the front desk before checking out.","exampleZh":"退房前請將鑰匙留在櫃台。","collocations":["front desk staff","contact the front desk","front desk clerk"],"freq":"高頻","tip":"複合名詞整組記，飯店情境的核心地點詞，常搭配staff/clerk/manager。"},{"id":"x-v376","theme":"hosp","themeName":"餐飲與住宿","word":"concierge","pos":"n.","meaning":"禮賓服務人員","example":"The concierge arranged tickets to the local museum for the guests.","exampleZh":"禮賓服務人員為房客安排了當地博物館的門票。","collocations":["concierge service","ask the concierge","concierge desk"],"freq":"中頻","tip":"源自法文，發音特殊（con-see-erzh），多益聽力題常考此類外來詞發音。"},{"id":"x-v377","theme":"hosp","themeName":"餐飲與住宿","word":"housekeeping","pos":"n.","meaning":"客房清潔服務","example":"Guests can request extra towels by calling housekeeping directly.","exampleZh":"房客可以直接致電客房清潔部門索取額外的毛巾。","collocations":["housekeeping staff","contact housekeeping","housekeeping service"],"freq":"高頻","tip":"不可數名詞，指飯店的清潔部門或服務本身，不加冠詞a。"},{"id":"x-v378","theme":"hosp","themeName":"餐飲與住宿","word":"amenities","pos":"n.","meaning":"（飯店等）設施、便利設備","example":"The resort's amenities include a rooftop pool and a fitness center.","exampleZh":"這間度假村的設施包括頂樓泳池和健身中心。","collocations":["hotel amenities","modern amenities","amenities include"],"freq":"高頻","tip":"通常以複數形出現，統稱飯店提供的各項便利設施。"},{"id":"x-v379","theme":"hosp","themeName":"餐飲與住宿","word":"check-in","pos":"n.","meaning":"報到、住房登記","example":"Early check-in is available upon request, subject to room availability.","exampleZh":"如有需要可申請提前入住登記，須視空房狀況而定。","collocations":["early check-in","check-in time","check-in process"],"freq":"極高頻","tip":"名詞連字號寫法check-in，動詞片語則分開寫check in，考題常考詞性差異。"},{"id":"x-v380","theme":"hosp","themeName":"餐飲與住宿","word":"check-out","pos":"n.","meaning":"退房","example":"Late check-out will incur an additional fee after 2 p.m.","exampleZh":"下午兩點後辦理延遲退房將酌收額外費用。","collocations":["late check-out","check-out time","express check-out"],"freq":"高頻","tip":"與check-in成對記憶，同樣要注意連字號名詞與動詞片語的拼寫差異。"},{"id":"x-v381","theme":"hosp","themeName":"餐飲與住宿","word":"catering","pos":"n.","meaning":"餐飲服務、外燴","example":"The company hired a catering service for the annual banquet.","exampleZh":"公司為年度宴會聘請了一家外燴服務公司。","collocations":["catering service","catering company","in-house catering"],"freq":"中頻","tip":"動詞cater to（迎合、供應餐飲），名詞化後常搭配service/company。"},{"id":"x-v382","theme":"hosp","themeName":"餐飲與住宿","word":"caterer","pos":"n.","meaning":"外燴業者","example":"The caterer confirmed the menu three days before the event.","exampleZh":"外燴業者在活動前三天確認了菜單內容。","collocations":["hire a caterer","local caterer","caterer's menu"],"freq":"中頻","tip":"字尾-er表示「從事此業的人／公司」，與catering（服務本身）區分詞性。"},{"id":"x-v383","theme":"hosp","themeName":"餐飲與住宿","word":"buffet","pos":"n.","meaning":"自助餐","example":"The conference hotel offers a breakfast buffet from 6 to 9 a.m.","exampleZh":"這間會議飯店提供早上六點到九點的自助早餐。","collocations":["breakfast buffet","buffet-style","buffet table"],"freq":"中頻","tip":"法文借詞，t不發音，常搭配breakfast/lunch表示某餐形式。"},{"id":"x-v384","theme":"hosp","themeName":"餐飲與住宿","word":"cuisine","pos":"n.","meaning":"菜餚、料理","example":"The restaurant specializes in authentic regional cuisine.","exampleZh":"這間餐廳專精於道地的地方料理。","collocations":["local cuisine","authentic cuisine","fine cuisine"],"freq":"中頻","tip":"法文借詞，指某地區或風格的整體料理文化，較food正式。"},{"id":"x-v385","theme":"hosp","themeName":"餐飲與住宿","word":"appetizer","pos":"n.","meaning":"開胃菜","example":"We recommend the shrimp cocktail as an appetizer.","exampleZh":"我們推薦鮮蝦盅作為開胃菜。","collocations":["order an appetizer","appetizer menu","share an appetizer"],"freq":"中頻","tip":"appetite（食慾）衍生字，餐廳菜單常見分類詞，對應主菜entrée。"},{"id":"x-v386","theme":"hosp","themeName":"餐飲與住宿","word":"entrée","pos":"n.","meaning":"主菜","example":"Each entrée on the set menu comes with a side salad.","exampleZh":"套餐菜單上的每道主菜都附一份沙拉。","collocations":["choice of entrée","entrée selection","main entrée"],"freq":"中頻","tip":"法文借詞，注意重音在後（en-TRAY），美式菜單中指主菜而非法文原意的「前菜」。"},{"id":"x-v387","theme":"hosp","themeName":"餐飲與住宿","word":"beverage","pos":"n.","meaning":"飲料","example":"All beverages are included in the price of the buffet.","exampleZh":"自助餐的價格已包含所有飲料。","collocations":["beverage selection","complimentary beverage","alcoholic beverage"],"freq":"高頻","tip":"較drink正式，常見於菜單、帳單等書面情境，多益閱讀題高頻詞。"},{"id":"x-v388","theme":"hosp","themeName":"餐飲與住宿","word":"garnish","pos":"v.","meaning":"裝飾（食物）","example":"The chef garnished the dish with fresh herbs before serving.","exampleZh":"主廚在上菜前用新鮮香草裝飾這道菜。","collocations":["garnish a dish","garnish with herbs","garnished plate"],"freq":"中頻","tip":"名詞也可用（as a garnish作為配飾），餐飲情境常見過去分詞garnished。"},{"id":"x-v389","theme":"hosp","themeName":"餐飲與住宿","word":"gratuity","pos":"n.","meaning":"小費","example":"A gratuity of eighteen percent is automatically added to large parties.","exampleZh":"多人聚餐會自動加收百分之十八的小費。","collocations":["add a gratuity","gratuity included","leave a gratuity"],"freq":"中頻","tip":"較tip正式，帳單、服務條款常用此字，常見片語gratuity included。"},{"id":"x-v390","theme":"hosp","themeName":"餐飲與住宿","word":"dietary restriction","pos":"n.","meaning":"飲食限制","example":"Please inform the caterer of any dietary restrictions in advance.","exampleZh":"請事先告知外燴業者任何飲食限制事項。","collocations":["have a dietary restriction","accommodate dietary restrictions","dietary restriction form"],"freq":"中頻","tip":"複合名詞整組記，常見於活動報名表、飯店入住問卷等情境。"},{"id":"x-v391","theme":"hosp","themeName":"餐飲與住宿","word":"hospitality","pos":"n.","meaning":"款待、餐旅業","example":"She has worked in the hospitality industry for over a decade.","exampleZh":"她在餐旅業已經工作超過十年了。","collocations":["hospitality industry","warm hospitality","hospitality sector"],"freq":"高頻","tip":"抽象名詞，可指「熱情款待」或泛指整個「餐旅／服務業」，本主題詞根字。"},{"id":"x-v392","theme":"hosp","themeName":"餐飲與住宿","word":"banquet","pos":"n.","meaning":"宴會","example":"The awards banquet will be held in the grand ballroom.","exampleZh":"頒獎宴會將在大宴會廳舉行。","collocations":["awards banquet","banquet hall","host a banquet"],"freq":"中頻","tip":"比一般party正式盛大，常搭配hall/room等場地詞或awards等修飾詞。"},{"id":"x-v393","theme":"hosp","themeName":"餐飲與住宿","word":"gala","pos":"n.","meaning":"盛大慶祝活動","example":"Tickets for the charity gala sold out within two hours.","exampleZh":"這場慈善盛會的門票兩小時內就售罄了。","collocations":["charity gala","gala dinner","annual gala"],"freq":"中頻","tip":"常搭配charity/annual，指正式、盛大且通常需購票的社交慶祝活動。"},{"id":"x-v394","theme":"hosp","themeName":"餐飲與住宿","word":"attentive","pos":"adj.","meaning":"細心周到的","example":"Guests praised the staff for being attentive throughout their stay.","exampleZh":"房客稱讚員工在整趟住宿期間都相當細心周到。","collocations":["attentive service","attentive staff","remain attentive"],"freq":"中頻","tip":"attend（服侍、照料）衍生字，形容服務業人員「留意細節、體貼周到」。"},{"id":"x-v395","theme":"hosp","themeName":"餐飲與住宿","word":"sanitary","pos":"adj.","meaning":"衛生的","example":"The kitchen must meet strict sanitary standards at all times.","exampleZh":"廚房必須隨時符合嚴格的衛生標準。","collocations":["sanitary standards","sanitary conditions","unsanitary practices"],"freq":"中頻","tip":"常搭配standards/conditions，反義字加un-變成unsanitary（不衛生的）。"},{"id":"x-v396","theme":"hosp","themeName":"餐飲與住宿","word":"perishable","pos":"adj.","meaning":"易腐壞的","example":"Perishable items should be refrigerated immediately upon delivery.","exampleZh":"易腐壞的物品送達後應立即冷藏。","collocations":["perishable items","perishable goods","highly perishable"],"freq":"中頻","tip":"perish（腐壞、消亡）+ -able，常見於食材配送、倉儲相關的閱讀文章。"},{"id":"x-v397","theme":"hosp","themeName":"餐飲與住宿","word":"refill","pos":"v.","meaning":"續杯、補滿","example":"The server offered to refill our coffee cups several times.","exampleZh":"服務生多次主動為我們續了咖啡。","collocations":["refill a cup","free refill","refill a prescription"],"freq":"中頻","tip":"餐飲情境指「續杯」，醫療情境則指「補開處方藥」，一詞多義。"},{"id":"x-v398","theme":"hosp","themeName":"餐飲與住宿","word":"takeout","pos":"n.","meaning":"外帶","example":"The restaurant added a discount for online takeout orders.","exampleZh":"這間餐廳為線上外帶訂單提供了折扣優惠。","collocations":["takeout order","order takeout","takeout menu"],"freq":"中頻","tip":"美式用法為takeout，英式常用takeaway，兩者意思相同。"},{"id":"x-v399","theme":"med","themeName":"醫療與保健","word":"diagnosis","pos":"n.","meaning":"診斷","example":"The physician confirmed the diagnosis after reviewing the test results.","exampleZh":"醫師在檢視檢驗結果後確認了診斷結果。","collocations":["make a diagnosis","confirm a diagnosis","early diagnosis"],"freq":"高頻","tip":"複數diagnoses，動詞diagnose，常搭配make/confirm。"},{"id":"x-v400","theme":"med","themeName":"醫療與保健","word":"prescription","pos":"n.","meaning":"處方","example":"The doctor wrote a prescription for a two-week course of antibiotics.","exampleZh":"醫師開立了一份兩週療程抗生素的處方。","collocations":["write a prescription","fill a prescription","prescription medication"],"freq":"高頻","tip":"動詞prescribe，藥局取藥用fill a prescription，注意搭配動詞不同。"},{"id":"x-v401","theme":"med","themeName":"醫療與保健","word":"physician","pos":"n.","meaning":"內科醫師","example":"Patients are advised to consult a physician before starting the diet.","exampleZh":"建議患者在開始這項飲食計畫前先諮詢內科醫師。","collocations":["consult a physician","primary care physician","physician's assistant"],"freq":"高頻","tip":"較doctor正式，常見片語primary care physician（家庭醫師）。"},{"id":"x-v402","theme":"med","themeName":"醫療與保健","word":"practitioner","pos":"n.","meaning":"開業醫師","example":"She has been a general practitioner in this town for twenty years.","exampleZh":"她在這個小鎮擔任家庭科開業醫師已有二十年。","collocations":["general practitioner","medical practitioner","licensed practitioner"],"freq":"中頻","tip":"常見縮寫GP（general practitioner），泛指各領域的執業從業人員。"},{"id":"x-v403","theme":"med","themeName":"醫療與保健","word":"symptom","pos":"n.","meaning":"症狀","example":"Patients should report any new symptoms to their doctor immediately.","exampleZh":"患者一旦出現任何新症狀應立即告知醫師。","collocations":["experience symptoms","symptom of","common symptom"],"freq":"高頻","tip":"常搭配動詞experience/report，注意複數形symptoms較常見。"},{"id":"x-v404","theme":"med","themeName":"醫療與保健","word":"treatment","pos":"n.","meaning":"治療","example":"The clinic offers several treatment options for chronic back pain.","exampleZh":"這間診所為慢性背痛提供了多種治療選項。","collocations":["treatment option","undergo treatment","effective treatment"],"freq":"極高頻","tip":"動詞treat，常搭配undergo（接受治療），為醫療主題核心字。"},{"id":"x-v405","theme":"med","themeName":"醫療與保健","word":"therapy","pos":"n.","meaning":"療法","example":"Physical therapy helped him regain mobility after the surgery.","exampleZh":"物理治療幫助他在手術後恢復了行動能力。","collocations":["physical therapy","therapy session","undergo therapy"],"freq":"中頻","tip":"常搭配physical/speech等修飾詞，指持續性的療程，區別於一次性treatment。"},{"id":"x-v406","theme":"med","themeName":"醫療與保健","word":"medication","pos":"n.","meaning":"藥物","example":"The pharmacist explained how to take the medication properly.","exampleZh":"藥師說明了這款藥物的正確服用方式。","collocations":["take medication","prescribe medication","medication label"],"freq":"高頻","tip":"較medicine正式且常指處方藥，注意與treatment（治療行為）語意區分。"},{"id":"x-v407","theme":"med","themeName":"醫療與保健","word":"dosage","pos":"n.","meaning":"劑量","example":"Never exceed the recommended dosage printed on the label.","exampleZh":"切勿超過標籤上建議的劑量。","collocations":["recommended dosage","dosage instructions","adjust the dosage"],"freq":"中頻","tip":"dose（一劑）+ -age，指「劑量規範」整體概念，常見於藥品標示。"},{"id":"x-v408","theme":"med","themeName":"醫療與保健","word":"side effect","pos":"n.","meaning":"副作用","example":"Dizziness is a common side effect of this medication.","exampleZh":"暈眩是這款藥物常見的副作用。","collocations":["common side effect","experience side effects","possible side effect"],"freq":"高頻","tip":"複合名詞整組記，常搭配common/possible，是藥品說明書的高頻詞。"},{"id":"x-v409","theme":"med","themeName":"醫療與保健","word":"allergy","pos":"n.","meaning":"過敏","example":"Please list any food allergies on the registration form.","exampleZh":"請在報名表上列出任何食物過敏事項。","collocations":["food allergy","seasonal allergy","allergy symptoms"],"freq":"中頻","tip":"形容詞allergic（to過敏於），注意名詞allergy與形容詞allergic的介係詞搭配。"},{"id":"x-v410","theme":"med","themeName":"醫療與保健","word":"vaccination","pos":"n.","meaning":"接種疫苗","example":"Employees are required to show proof of vaccination before travel.","exampleZh":"員工出差前須出示疫苗接種證明。","collocations":["vaccination record","require vaccination","vaccination certificate"],"freq":"中頻","tip":"動詞vaccinate，常搭配record/certificate/proof等文件類名詞。"},{"id":"x-v411","theme":"med","themeName":"醫療與保健","word":"immunization","pos":"n.","meaning":"免疫接種","example":"The clinic keeps a full immunization record for every patient.","exampleZh":"這間診所為每位病患保存完整的免疫接種紀錄。","collocations":["immunization record","immunization schedule","routine immunization"],"freq":"中頻","tip":"與vaccination意義相近可互換，較常見於官方衛生文件或兒童健檢情境。"},{"id":"x-v412","theme":"med","themeName":"醫療與保健","word":"referral","pos":"n.","meaning":"轉診","example":"The general practitioner gave her a referral to a specialist.","exampleZh":"家庭科醫師開了一張轉診單，將她轉介給專科醫師。","collocations":["give a referral","referral letter","need a referral"],"freq":"中頻","tip":"動詞refer to（轉介至），常見片語referral letter，也可指人脈推薦。"},{"id":"x-v413","theme":"med","themeName":"醫療與保健","word":"specialist","pos":"n.","meaning":"專科醫師","example":"She was referred to a specialist for further evaluation of her knee.","exampleZh":"她被轉診至專科醫師以進一步評估膝蓋狀況。","collocations":["see a specialist","refer to a specialist","medical specialist"],"freq":"高頻","tip":"與general practitioner相對，指「專精單一領域」的醫師，也可泛指各行專家。"},{"id":"x-v414","theme":"med","themeName":"醫療與保健","word":"surgery","pos":"n.","meaning":"手術","example":"The patient is expected to fully recover within weeks after surgery.","exampleZh":"病患預計在手術後數週內完全康復。","collocations":["undergo surgery","perform surgery","surgery scheduled"],"freq":"高頻","tip":"不可數名詞，常搭配undergo/perform，英式用法也可指「診所、診間」。"},{"id":"x-v415","theme":"med","themeName":"醫療與保健","word":"recovery","pos":"n.","meaning":"康復","example":"A balanced diet can speed up recovery after an illness.","exampleZh":"均衡飲食有助於加速病後的康復。","collocations":["full recovery","recovery period","speedy recovery"],"freq":"高頻","tip":"動詞recover，常見祝福語wish someone a speedy recovery（祝早日康復）。"},{"id":"x-v416","theme":"med","themeName":"醫療與保健","word":"rehabilitation","pos":"n.","meaning":"復健","example":"He began rehabilitation exercises two weeks after the operation.","exampleZh":"他在手術後兩週開始進行復健運動。","collocations":["rehabilitation program","undergo rehabilitation","physical rehabilitation"],"freq":"中頻","tip":"常縮寫rehab（口語），常搭配program/center等機構或計畫名詞。"},{"id":"x-v417","theme":"med","themeName":"醫療與保健","word":"chronic","pos":"adj.","meaning":"慢性的","example":"Chronic conditions like diabetes require ongoing management.","exampleZh":"像糖尿病這類慢性病需要持續的管理照護。","collocations":["chronic condition","chronic illness","chronic pain"],"freq":"高頻","tip":"與acute（急性的）相對，常搭配condition/illness/pain。"},{"id":"x-v418","theme":"med","themeName":"醫療與保健","word":"acute","pos":"adj.","meaning":"急性的","example":"She was admitted for acute abdominal pain late last night.","exampleZh":"她昨晚深夜因急性腹痛被送醫住院。","collocations":["acute pain","acute condition","acute care"],"freq":"中頻","tip":"與chronic相對，acute care指「急重症照護」，注意與「敏銳的」語意區分。"},{"id":"x-v419","theme":"med","themeName":"醫療與保健","word":"contagious","pos":"adj.","meaning":"有傳染性的","example":"Employees with a contagious illness should work from home.","exampleZh":"患有傳染性疾病的員工應在家工作。","collocations":["highly contagious","contagious disease","remain contagious"],"freq":"中頻","tip":"指「透過接觸傳染」，近義詞infectious，常搭配highly/disease。"},{"id":"x-v420","theme":"med","themeName":"醫療與保健","word":"quarantine","pos":"n.","meaning":"隔離檢疫","example":"Travelers from the affected region were placed under quarantine.","exampleZh":"來自疫區的旅客被安排接受隔離檢疫。","collocations":["under quarantine","quarantine period","enforce quarantine"],"freq":"中頻","tip":"可當名詞或動詞，常見片語under quarantine（隔離中），公衛政策常考詞。"},{"id":"x-v421","theme":"med","themeName":"醫療與保健","word":"insurance coverage","pos":"n.","meaning":"保險給付範圍","example":"Please verify your insurance coverage before scheduling the procedure.","exampleZh":"安排療程前請先確認您的保險給付範圍。","collocations":["verify insurance coverage","insurance coverage limit","lack insurance coverage"],"freq":"中頻","tip":"複合名詞整組記，coverage指「涵蓋範圍」，常搭配verify/limit。"},{"id":"x-v422","theme":"med","themeName":"醫療與保健","word":"claim","pos":"n.","meaning":"（保險）理賠申請","example":"She filed a claim with her insurance company after the accident.","exampleZh":"她在事故發生後向保險公司提出了理賠申請。","collocations":["file a claim","process a claim","claim form"],"freq":"高頻","tip":"常搭配動詞file/submit/process，也可當動詞（主張、聲稱），一詞多義。"},{"id":"x-v423","theme":"media","themeName":"媒體與活動","word":"broadcast","pos":"v.","meaning":"廣播、播送","example":"The interview will be broadcast live across three networks.","exampleZh":"這場專訪將在三家電視網同步現場播送。","collocations":["broadcast live","broadcast nationwide","broadcast a program"],"freq":"高頻","tip":"過去式/過去分詞同形broadcast，不加-ed，常搭配live/nationwide。"},{"id":"x-v424","theme":"media","themeName":"媒體與活動","word":"publication","pos":"n.","meaning":"出版品、刊物","example":"The magazine is a well-respected publication in the finance industry.","exampleZh":"這本雜誌是財經界頗受推崇的一份刊物。","collocations":["trade publication","monthly publication","date of publication"],"freq":"中頻","tip":"可指「出版行為」或「出版品本身」，trade publication指產業專刊。"},{"id":"x-v425","theme":"media","themeName":"媒體與活動","word":"press release","pos":"n.","meaning":"新聞稿","example":"The company issued a press release announcing the merger.","exampleZh":"公司發布了一份新聞稿宣布這起合併案。","collocations":["issue a press release","release a press release","press release announcement"],"freq":"高頻","tip":"複合名詞整組記，常搭配動詞issue/release，是公關情境的高頻詞。"},{"id":"x-v426","theme":"media","themeName":"媒體與活動","word":"headline","pos":"n.","meaning":"標題","example":"The bold headline drew readers' attention to the front page.","exampleZh":"這則醒目的標題吸引了讀者對頭版的注意。","collocations":["make headlines","bold headline","front-page headline"],"freq":"中頻","tip":"片語make headlines指「成為新聞焦點、上頭條」，可當動詞用。"},{"id":"x-v427","theme":"media","themeName":"媒體與活動","word":"advertisement","pos":"n.","meaning":"廣告","example":"The company placed an advertisement in the local newspaper.","exampleZh":"這家公司在當地報紙刊登了一則廣告。","collocations":["place an advertisement","advertisement campaign","print advertisement"],"freq":"高頻","tip":"口語常縮寫ad，動詞advertise，常搭配place/run表示「刊登」。"},{"id":"x-v428","theme":"media","themeName":"媒體與活動","word":"commercial","pos":"n.","meaning":"（電視）廣告","example":"The soft drink commercial aired during the championship game.","exampleZh":"這則飲料廣告在冠軍賽轉播期間播出。","collocations":["television commercial","air a commercial","commercial break"],"freq":"高頻","tip":"名詞指「電視廣告」，形容詞則指「商業的」，注意詞性切換的語境。"},{"id":"x-v429","theme":"media","themeName":"媒體與活動","word":"sponsor","pos":"n.","meaning":"贊助商","example":"The event's main sponsor will have its logo on all banners.","exampleZh":"這場活動的主要贊助商標誌將出現在所有橫幅上。","collocations":["main sponsor","corporate sponsor","sponsor a program"],"freq":"高頻","tip":"可當名詞或動詞（贊助），名詞化為sponsorship，商展與活動情境高頻詞。"},{"id":"x-v430","theme":"media","themeName":"媒體與活動","word":"exhibit","pos":"v.","meaning":"展出","example":"Local artists will exhibit their work at the gallery this month.","exampleZh":"當地藝術家本月將在藝廊展出他們的作品。","collocations":["exhibit work","exhibit at a gallery","currently on exhibit"],"freq":"中頻","tip":"名詞exhibition（展覽），動詞exhibit（展出），注意詞性搭配的介係詞at。"},{"id":"x-v431","theme":"media","themeName":"媒體與活動","word":"exhibition","pos":"n.","meaning":"展覽","example":"The museum's new exhibition features contemporary photography.","exampleZh":"這間博物館的新展覽以當代攝影為主題。","collocations":["hold an exhibition","exhibition hall","art exhibition"],"freq":"高頻","tip":"英式用法exhibition，美式較常用exhibit當名詞，多益兩者皆考。"},{"id":"x-v432","theme":"media","themeName":"媒體與活動","word":"trade show","pos":"n.","meaning":"商展","example":"The firm will showcase its latest products at the trade show.","exampleZh":"公司將在這場商展中展示最新產品。","collocations":["attend a trade show","trade show booth","annual trade show"],"freq":"高頻","tip":"複合名詞整組記，常搭配booth/attend，是商業行銷情境的核心詞。"},{"id":"x-v433","theme":"media","themeName":"媒體與活動","word":"keynote speaker","pos":"n.","meaning":"主題演講者","example":"The conference organizers invited a renowned economist as the keynote speaker.","exampleZh":"大會主辦單位邀請了一位知名經濟學家擔任主題演講者。","collocations":["invite a keynote speaker","keynote speaker's address","serve as keynote speaker"],"freq":"中頻","tip":"複合名詞整組記，keynote原指「主旨、基調」，此職稱是研討會的核心角色。"},{"id":"x-v434","theme":"media","themeName":"媒體與活動","word":"audience","pos":"n.","meaning":"觀眾、聽眾","example":"The speaker adjusted her tone based on the audience's reaction.","exampleZh":"講者根據觀眾的反應調整了她的語氣。","collocations":["target audience","audience reaction","engage the audience"],"freq":"高頻","tip":"集合名詞，視為單數或複數皆可，target audience（目標客群）是行銷高頻詞。"},{"id":"x-v435","theme":"media","themeName":"媒體與活動","word":"ratings","pos":"n.","meaning":"收視率","example":"The show's ratings dropped sharply after the time slot changed.","exampleZh":"這節目的收視率在時段更換後大幅下滑。","collocations":["ratings drop","high ratings","ratings survey"],"freq":"中頻","tip":"恆用複數形表示「收視率、評分」，單數rating則指「單一評等」。"},{"id":"x-v436","theme":"media","themeName":"媒體與活動","word":"footage","pos":"n.","meaning":"影片片段","example":"The news team reviewed the footage before airing the segment.","exampleZh":"新聞團隊在播出這則單元前先審視了影片片段。","collocations":["review footage","raw footage","security footage"],"freq":"中頻","tip":"不可數名詞，raw footage指「未剪輯的原始影片」，常見於媒體製作情境。"},{"id":"x-v437","theme":"media","themeName":"媒體與活動","word":"segment","pos":"n.","meaning":"（節目）單元、片段","example":"The morning show added a new segment on local business news.","exampleZh":"這個晨間節目新增了一個地方商業新聞的單元。","collocations":["news segment","segment of the show","market segment"],"freq":"中頻","tip":"媒體情境指「節目單元」，商業情境則指「市場區隔」，一詞多義。"},{"id":"x-v438","theme":"media","themeName":"媒體與活動","word":"coverage","pos":"n.","meaning":"（新聞）報導","example":"The merger received extensive coverage in the financial press.","exampleZh":"這起合併案在財經媒體獲得了廣泛的報導。","collocations":["media coverage","extensive coverage","provide coverage"],"freq":"高頻","tip":"媒體情境指「報導」，保險情境則指「給付範圍」，注意語境判斷詞義。"},{"id":"x-v439","theme":"media","themeName":"媒體與活動","word":"correspondent","pos":"n.","meaning":"特派記者","example":"Our correspondent in the region filed the report this morning.","exampleZh":"我們派駐該地區的特派記者今早發回了這則報導。","collocations":["foreign correspondent","correspondent's report","senior correspondent"],"freq":"中頻","tip":"foreign correspondent（駐外特派記者）為常見片語，動詞correspond（通訊、符合）。"},{"id":"x-v440","theme":"media","themeName":"媒體與活動","word":"columnist","pos":"n.","meaning":"專欄作家","example":"The columnist wrote a critical piece about the new tax policy.","exampleZh":"這位專欄作家針對新稅收政策撰寫了一篇批判性文章。","collocations":["newspaper columnist","guest columnist","columnist's opinion"],"freq":"中頻","tip":"column（專欄）+ -ist（從事者），字尾-mn組合中n不發音，注意發音陷阱。"},{"id":"x-v441","theme":"media","themeName":"媒體與活動","word":"editorial","pos":"n.","meaning":"社論","example":"The newspaper published an editorial criticizing the budget proposal.","exampleZh":"這家報社刊登了一篇批評預算提案的社論。","collocations":["publish an editorial","editorial board","editorial opinion"],"freq":"中頻","tip":"名詞指「社論」，形容詞則指「編輯的」（editorial team），一詞多義。"},{"id":"x-v442","theme":"media","themeName":"媒體與活動","word":"censorship","pos":"n.","meaning":"審查制度","example":"The documentary explores the impact of censorship on independent media.","exampleZh":"這部紀錄片探討了審查制度對獨立媒體的影響。","collocations":["media censorship","censorship law","strict censorship"],"freq":"中頻","tip":"動詞censor（審查、刪減），抽象名詞censorship常見於媒體政策類文章。"},{"id":"x-v443","theme":"media","themeName":"媒體與活動","word":"copyright","pos":"n.","meaning":"版權","example":"The publisher owns the copyright to all articles in the magazine.","exampleZh":"出版社擁有這本雜誌所有文章的版權。","collocations":["own the copyright","copyright infringement","copyright law"],"freq":"中頻","tip":"常搭配infringement（侵權），也可當動詞（賦予版權），媒體法律高頻詞。"},{"id":"x-v444","theme":"media","themeName":"媒體與活動","word":"licensing","pos":"n.","meaning":"授權","example":"The studio signed a licensing agreement to distribute the film abroad.","exampleZh":"這間製片廠簽署了一份授權協議以在海外發行這部電影。","collocations":["licensing agreement","licensing fee","licensing rights"],"freq":"中頻","tip":"動詞license（授權、發給執照），常搭配agreement/fee/rights。"},{"id":"x-v445","theme":"media","themeName":"媒體與活動","word":"streaming","pos":"n.","meaning":"串流","example":"The network launched a streaming service to compete with rivals.","exampleZh":"這家電視網推出了串流服務以與對手競爭。","collocations":["streaming service","live streaming","streaming platform"],"freq":"高頻","tip":"動詞stream衍生的現在分詞名詞化，常搭配service/platform，是當代媒體核心詞。"},{"id":"x-v446","theme":"media","themeName":"媒體與活動","word":"promotional event","pos":"n.","meaning":"宣傳活動","example":"The brand held a promotional event to launch its newest product line.","exampleZh":"這個品牌舉辦了一場宣傳活動來推出最新的產品系列。","collocations":["hold a promotional event","promotional event schedule","attend a promotional event"],"freq":"中頻","tip":"複合名詞整組記，promotional（促銷的）+ event，行銷情境常見活動類型。"},{"id":"x-v447","theme":"office","themeName":"辦公室與人資","word":"acquire","pos":"v.","meaning":"取得、獲得","example":"The firm plans to acquire a smaller competitor by the end of the year.","exampleZh":"這家公司計畫在年底前收購一家較小的競爭對手。","collocations":["acquire a company","acquire skills","newly acquired"],"freq":"高頻","tip":"商業情境常指「收購」，名詞acquisition，注意與obtain（單純取得）語感的差異。"},{"id":"x-v448","theme":"office","themeName":"辦公室與人資","word":"congress","pos":"n.","meaning":"國會、代表大會","example":"The senator addressed congress about the proposed labor reform.","exampleZh":"這位參議員向國會針對勞工改革提案發表演說。","collocations":["address congress","act of congress","congress member"],"freq":"中頻","tip":"指美國國會時大寫Congress，多益閱讀偶見於法規背景文章，勿與conference混淆。"},{"id":"x-v449","theme":"office","themeName":"辦公室與人資","word":"redraft","pos":"v.","meaning":"重新起草、改寫","example":"The legal team was asked to redraft the contract before Friday's meeting.","exampleZh":"法務團隊被要求在週五會議前重新起草這份合約。","collocations":["redraft a contract","redraft a proposal","redraft the policy"],"freq":"中頻","tip":"re-（重新）+ draft（草稿），常見於合約、提案修訂情境，名詞可作draft直接用。"},{"id":"x-v450","theme":"fin","themeName":"財務、採購與物流","word":"bill","pos":"n.","meaning":"帳單、法案","example":"Please make sure to settle the electricity bill before the due date.","exampleZh":"請務必在到期日前結清這筆電費帳單。","collocations":["settle a bill","utility bill","pass a bill"],"freq":"極高頻","tip":"財經情境指「帳單」，政治情境指「法案」，動詞bill someone則指「向某人請款」。"},{"id":"x-v451","theme":"office","themeName":"辦公室與人資","word":"prior to","pos":"phr.","meaning":"在～之前","example":"Employees must submit their reports prior to the quarterly review.","exampleZh":"員工必須在季度審查之前提交報告。","collocations":["prior to the meeting","prior to departure","prior notice"],"freq":"高頻","tip":"後接名詞或動名詞，較before正式，常見於通知、公告類文章。"},{"id":"x-v452","theme":"office","themeName":"辦公室與人資","word":"remove","pos":"v.","meaning":"移除、去除","example":"The technician removed the outdated software from every workstation.","exampleZh":"技術人員把過時的軟體從每台工作站移除了。","collocations":["remove a file","remove from office","remove an obstacle"],"freq":"極高頻","tip":"多益常考remove A from B的介係詞搭配，考點在於固定用法而非字義本身。"},{"id":"x-v453","theme":"office","themeName":"辦公室與人資","word":"legislation","pos":"n.","meaning":"法律、立法","example":"New legislation requires all factories to reduce carbon emissions.","exampleZh":"新的法規要求所有工廠都必須減少碳排放。","collocations":["pass legislation","new legislation","legislation on"],"freq":"中頻","tip":"不可數名詞，恆用單數形，動詞搭配pass/enact，注意與legislature（立法機構）區分。"},{"id":"x-v454","theme":"fin","themeName":"財務、採購與物流","word":"cost-effective","pos":"adj.","meaning":"符合成本效益的","example":"Switching to digital invoices proved to be a cost-effective solution.","exampleZh":"改用電子發票證實是一項符合成本效益的解決方案。","collocations":["cost-effective solution","cost-effective way","highly cost-effective"],"freq":"高頻","tip":"複合形容詞連字號不可省，常修飾solution/method/way，是採購決策情境高頻詞。"},{"id":"x-v455","theme":"pattern","themeName":"句型","word":"be committed to","pos":"句型","meaning":"致力於","example":"The company is committed to reducing its environmental footprint by 2030.","exampleZh":"這家公司致力於在2030年前減少其環境足跡。","collocations":["be committed to","commitment to","fully committed"],"freq":"高頻","tip":"to為介係詞，後接名詞（如上例environmental footprint作受詞前的動名詞reducing），勿誤用原形動詞；與be committed to doing為同一句型的兩種標示。"},{"id":"x-v456","theme":"office","themeName":"辦公室與人資","word":"solution to","pos":"n.","meaning":"解決…的方法","example":"Management proposed a practical solution to the staffing shortage.","exampleZh":"管理層針對人力短缺提出了一項務實的解決方案。","collocations":["solution to a problem","practical solution","find a solution"],"freq":"高頻","tip":"固定搭配介係詞to（非for），常考的介係詞陷阱題，動詞用solve。"},{"id":"x-v457","theme":"office","themeName":"辦公室與人資","word":"sustain","pos":"v.","meaning":"維持、支撐","example":"The company must sustain its growth rate to attract new investors.","exampleZh":"公司必須維持成長率才能吸引新的投資人。","collocations":["sustain growth","sustain damage","sustain an economy"],"freq":"中頻","tip":"名詞化為sustainability（永續性），也可指「遭受」（sustain damage），一詞多義。"},{"id":"x-v458","theme":"office","themeName":"辦公室與人資","word":"recent","pos":"adj.","meaning":"最近的、近來的","example":"A recent survey shows that remote work boosts employee satisfaction.","exampleZh":"一項近期調查顯示遠距工作能提升員工滿意度。","collocations":["recent survey","recent study","in recent years"],"freq":"極高頻","tip":"常與現在完成式連用，副詞recently則需注意句中位置，多益文法題常考詞性辨析。"},{"id":"x-v459","theme":"office","themeName":"辦公室與人資","word":"environment","pos":"n.","meaning":"環境","example":"The new office layout creates a more collaborative work environment.","exampleZh":"新的辦公室配置打造出更具協作性的工作環境。","collocations":["work environment","business environment","protect the environment"],"freq":"高頻","tip":"可指「自然環境」或「工作氛圍」，形容詞environmental常搭配policy/impact。"},{"id":"x-v460","theme":"office","themeName":"辦公室與人資","word":"graduate","pos":"n.","meaning":"（大學）畢業生","example":"The firm recruits recent graduates for its management trainee program.","exampleZh":"這家公司招募應屆畢業生加入其儲備幹部培訓計畫。","collocations":["recent graduate","graduate program","college graduate"],"freq":"高頻","tip":"名詞重音在前graduate，動詞（畢業）發音尾音不同，多益聽力常考詞性轉換。"},{"id":"x-v461","theme":"office","themeName":"辦公室與人資","word":"a variety of","pos":"phr.","meaning":"多樣的、各式各樣的","example":"The training program covers a variety of leadership skills.","exampleZh":"這項培訓計畫涵蓋了多樣的領導技能。","collocations":["a variety of options","a variety of products","offer a variety of"],"freq":"高頻","tip":"後接可數名詞複數，動詞依variety單數呼應（a variety of skills is offered較少見，實務上常隨後面名詞變化，多益偏好整組背誦）。"},{"id":"x-v462","theme":"office","themeName":"辦公室與人資","word":"position","pos":"n.","meaning":"職位","example":"She was promoted to a managerial position after two years.","exampleZh":"她在兩年後被晉升到管理職位。","collocations":["fill a position","managerial position","apply for a position"],"freq":"極高頻","tip":"人事情境核心字，也可指「立場、位置」，注意fill a position（補職缺）常考搭配。"},{"id":"x-v463","theme":"fin","themeName":"財務、採購與物流","word":"material","pos":"n.","meaning":"材料、原料","example":"The factory imports raw material from several overseas suppliers.","exampleZh":"這間工廠從多家海外供應商進口原料。","collocations":["raw material","building material","material cost"],"freq":"高頻","tip":"raw material（原物料）為固定搭配，複數materials可指「用品、資料」，注意單複數語意差異。"},{"id":"x-v464","theme":"office","themeName":"辦公室與人資","word":"consult","pos":"v.","meaning":"參考、查閱、諮詢","example":"Employees should consult the handbook before filing a reimbursement request.","exampleZh":"員工在提交報帳申請前應先查閱員工手冊。","collocations":["consult a manual","consult with","consult an expert"],"freq":"高頻","tip":"consult + 資料（查閱）vs. consult with + 人（會商），名詞consultation，考點在介係詞有無。"},{"id":"x-v465","theme":"office","themeName":"辦公室與人資","word":"review","pos":"v.","meaning":"檢閱、審查","example":"The manager will review all applications before the interview stage.","exampleZh":"經理會在面試階段之前審查所有的應徵資料。","collocations":["review an application","performance review","review a contract"],"freq":"極高頻","tip":"可作動詞（審查）或名詞（review，如performance review績效考核），詞性依句構判斷。"},{"id":"x-v466","theme":"office","themeName":"辦公室與人資","word":"operation","pos":"n.","meaning":"營運、運作","example":"The company streamlined its daily operations to cut overhead costs.","exampleZh":"公司簡化了每日的營運流程以削減管理成本。","collocations":["daily operation","business operation","in operation"],"freq":"高頻","tip":"常用複數operations指「營運事務」，in operation指「運作中」，動詞operate。"},{"id":"x-v467","theme":"office","themeName":"辦公室與人資","word":"submit","pos":"v.","meaning":"提交、呈交","example":"All employees must submit their expense reports by the fifth of each month.","exampleZh":"所有員工必須在每月五號前提交報銷報告。","collocations":["submit a report","submit an application","submit for approval"],"freq":"極高頻","tip":"多益高頻動詞，常搭配report/application/proposal，名詞化為submission。"},{"id":"x-v468","theme":"office","themeName":"辦公室與人資","word":"receive","pos":"v.","meaning":"得到、收到","example":"Customers who register early will receive a complimentary gift.","exampleZh":"提早註冊的顧客將可獲得一份免費贈品。","collocations":["receive a gift","receive an order","receive feedback"],"freq":"極高頻","tip":"考點常在receive（收到，主動語態）vs. be received（被收到），以及與accept（接受）的字義區分。"},{"id":"x-v469","theme":"fin","themeName":"財務、採購與物流","word":"outlook","pos":"n.","meaning":"展望、前景","example":"Analysts remain optimistic about the company's financial outlook this quarter.","exampleZh":"分析師對公司本季的財務展望依然抱持樂觀態度。","collocations":["financial outlook","economic outlook","positive outlook"],"freq":"中頻","tip":"常搭配financial/economic，形容詞常用positive/bleak修飾，財經閱讀常見詞。"},{"id":"x-v470","theme":"office","themeName":"辦公室與人資","word":"feedback on","pos":"phr.","meaning":"對…的意見反饋","example":"The supervisor asked staff to give feedback on the new scheduling system.","exampleZh":"主管請員工針對新的排班系統提供意見反饋。","collocations":["feedback on","give feedback","positive feedback"],"freq":"高頻","tip":"feedback為不可數名詞，恆用介係詞on接主題，不可加冠詞a或變複數。"},{"id":"x-v471","theme":"fin","themeName":"財務、採購與物流","word":"annually","pos":"adv.","meaning":"每年一次地","example":"The board reviews executive salaries annually.","exampleZh":"董事會每年一次審查高階主管的薪資。","collocations":["reviewed annually","increase annually","held annually"],"freq":"中頻","tip":"與形容詞annual（每年的）區分詞性，句中常置於動詞後或句末。"},{"id":"x-v472","theme":"biz","themeName":"會議、行銷與業務","word":"offer","pos":"v.","meaning":"提供","example":"The store is offering a twenty percent discount on all winter apparel.","exampleZh":"這間店正對所有冬季服飾提供二十趴的折扣。","collocations":["offer a discount","offer a service","offer to help"],"freq":"極高頻","tip":"offer + 雙受詞（offer sb sth）或offer to do，行銷情境高頻動詞，名詞offer也常見（a job offer）。"},{"id":"x-v473","theme":"biz","themeName":"會議、行銷與業務","word":"host","pos":"v.","meaning":"舉辦、主辦（活動）","example":"The convention center will host the annual technology expo next month.","exampleZh":"這間會議中心下個月將舉辦年度科技博覽會。","collocations":["host an event","host a conference","host a workshop"],"freq":"高頻","tip":"也可作名詞（主持人、地主），常搭配event/conference/workshop等活動名詞。"},{"id":"x-v474","theme":"office","themeName":"辦公室與人資","word":"limited","pos":"adj.","meaning":"有限的","example":"Seating for the seminar is limited, so early registration is advised.","exampleZh":"這場研討會的座位有限，建議提早報名。","collocations":["limited seating","limited time offer","limited availability"],"freq":"高頻","tip":"limited time offer（限時優惠）為行銷常見片語，動詞limit，考點常在被動語態limited to。"},{"id":"x-v475","theme":"media","themeName":"媒體與活動","word":"charity","pos":"n.","meaning":"慈善團體、慈善","example":"The company donated a portion of its profits to a local charity.","exampleZh":"公司將部分利潤捐給了一家當地的慈善團體。","collocations":["donate to charity","local charity","charity event"],"freq":"中頻","tip":"可數（指機構）或不可數（指慈善行為），charity event常見於媒體活動類文章。"},{"id":"x-v476","theme":"fin","themeName":"財務、採購與物流","word":"manual","pos":"n.","meaning":"說明書、手冊","example":"Refer to the instruction manual before assembling the equipment.","exampleZh":"組裝設備前請先參閱使用說明書。","collocations":["instruction manual","user manual","training manual"],"freq":"高頻","tip":"形容詞manual則指「手動的、體力的」（manual labor），注意詞性切換語境。"},{"id":"x-v477","theme":"office","themeName":"辦公室與人資","word":"encounter","pos":"v.","meaning":"面臨、遭遇","example":"The project team encountered several delays due to supply shortages.","exampleZh":"專案團隊因為供應短缺而遭遇了幾次延誤。","collocations":["encounter a problem","encounter difficulty","encounter resistance"],"freq":"中頻","tip":"較encounter difficulty/problem正式，可作動詞或名詞（an encounter with）。"},{"id":"x-v478","theme":"office","themeName":"辦公室與人資","word":"policy","pos":"n.","meaning":"政策、規定","example":"The company updated its remote work policy last quarter.","exampleZh":"公司在上一季更新了遠距工作政策。","collocations":["company policy","policy on","update a policy"],"freq":"極高頻","tip":"人事、法規文章核心字，常搭配on表主題，也可指保險單（insurance policy）。"},{"id":"x-v479","theme":"office","themeName":"辦公室與人資","word":"evaluate","pos":"v.","meaning":"評估","example":"Supervisors will evaluate each employee's performance at year's end.","exampleZh":"主管將在年底評估每位員工的績效表現。","collocations":["evaluate performance","evaluate a proposal","carefully evaluate"],"freq":"高頻","tip":"名詞evaluation，常搭配performance/proposal，較assess略正式且常見於人資文章。"},{"id":"x-v480","theme":"office","themeName":"辦公室與人資","word":"poorly","pos":"adv.","meaning":"糟糕地、不佳地","example":"The product launch was poorly organized, leading to customer complaints.","exampleZh":"這場產品發表會籌辦不當，導致了顧客的抱怨。","collocations":["poorly organized","poorly managed","perform poorly"],"freq":"中頻","tip":"常修飾過去分詞（poorly managed/organized），反義well，多益文法題常考副詞位置。"},{"id":"x-v481","theme":"est","themeName":"租賃與房產","word":"maintain","pos":"v.","meaning":"維護、保養","example":"The building management team maintains the elevators on a monthly basis.","exampleZh":"大樓管理團隊每月定期維護保養電梯。","collocations":["maintain equipment","maintain a building","well maintained"],"freq":"高頻","tip":"名詞maintenance，well maintained（保養良好的）常修飾房產、設備類名詞。"},{"id":"x-v482","theme":"media","themeName":"媒體與活動","word":"renowned","pos":"adj.","meaning":"著名的、聞名的","example":"A renowned architect was hired to redesign the museum's entrance.","exampleZh":"一位知名建築師被聘請重新設計博物館的入口。","collocations":["renowned architect","world-renowned","renowned for"],"freq":"中頻","tip":"常搭配for表原因（renowned for its cuisine），比famous更正式，多見於媒體報導。"},{"id":"x-v483","theme":"office","themeName":"辦公室與人資","word":"contract","pos":"n.","meaning":"合約","example":"Both parties signed the contract after negotiating the final terms.","exampleZh":"雙方在協商完最終條款後簽署了合約。","collocations":["sign a contract","contract terms","breach a contract"],"freq":"極高頻","tip":"名詞重音在前，動詞（訂約、收縮）重音在後，注意contractor（承包商）為衍生字。"},{"id":"x-v484","theme":"office","themeName":"辦公室與人資","word":"expert","pos":"n.","meaning":"專家","example":"The firm brought in an outside expert to advise on the merger.","exampleZh":"公司請來一位外部專家就這起合併案提供建議。","collocations":["outside expert","expert advice","industry expert"],"freq":"高頻","tip":"常搭配介係詞in/on表領域，形容詞expert也可直接修飾名詞（expert advice）。"},{"id":"x-v485","theme":"media","themeName":"媒體與活動","word":"protest","pos":"n.","meaning":"抗議","example":"Local residents staged a protest against the factory's noise pollution.","exampleZh":"當地居民針對工廠的噪音污染發起了一場抗議。","collocations":["stage a protest","protest against","peaceful protest"],"freq":"中頻","tip":"可作名詞或動詞，動詞後直接接受詞或against，常見於社會新聞類閱讀文章。"},{"id":"x-v486","theme":"biz","themeName":"會議、行銷與業務","word":"motivational","pos":"adj.","meaning":"激勵性的","example":"The keynote speaker delivered a motivational speech to close the conference.","exampleZh":"這位主題演講者以一場激勵人心的演說為大會作結。","collocations":["motivational speech","motivational speaker","motivational poster"],"freq":"中頻","tip":"衍生自motivate/motivation，常修飾speech/speaker，會議簡報情境常見形容詞。"},{"id":"x-v487","theme":"office","themeName":"辦公室與人資","word":"get involved in","pos":"phr.","meaning":"參與…","example":"New hires are encouraged to get involved in cross-department projects.","exampleZh":"新進員工被鼓勵參與跨部門專案。","collocations":["get involved in","become involved in","actively involved"],"freq":"中頻","tip":"in為固定介係詞，被動become/get involved in為常考搭配，勿誤用to。"},{"id":"x-v488","theme":"fin","themeName":"財務、採購與物流","word":"analyst","pos":"n.","meaning":"分析師","example":"The financial analyst predicted a modest rise in quarterly earnings.","exampleZh":"這位財務分析師預測了本季獲利將溫和成長。","collocations":["financial analyst","market analyst","industry analyst"],"freq":"高頻","tip":"動詞analyze，名詞analysis，analyst專指「從事分析工作的人」，財經閱讀高頻詞。"},{"id":"x-v489","theme":"media","themeName":"媒體與活動","word":"march","pos":"n.","meaning":"遊行","example":"Thousands joined the march to raise awareness about climate change.","exampleZh":"數千人加入了這場遊行以喚起大眾對氣候變遷的關注。","collocations":["join a march","organize a march","peaceful march"],"freq":"中頻","tip":"注意與月份March大小寫區分，此處為普通名詞「遊行」，也可作動詞（行軍、邁步）。"},{"id":"x-v490","theme":"biz","themeName":"會議、行銷與業務","word":"take place","pos":"phr.","meaning":"發生、舉行","example":"The shareholders' meeting will take place in the main conference room.","exampleZh":"股東大會將在主會議室舉行。","collocations":["take place in","scheduled to take place","take place annually"],"freq":"高頻","tip":"不用被動語態（無be taken place），常搭配未來式描述活動排程，會議情境高頻片語。"},{"id":"x-v491","theme":"fin","themeName":"財務、採購與物流","word":"production","pos":"n.","meaning":"生產","example":"The factory increased production to meet the holiday season demand.","exampleZh":"這間工廠提高了產量以滿足假期旺季的需求。","collocations":["increase production","production line","production cost"],"freq":"高頻","tip":"動詞produce，production line（生產線）為製造業高頻搭配，注意與product（產品）詞形相近易混淆。"},{"id":"x-v492","theme":"media","themeName":"媒體與活動","word":"bystander","pos":"n.","meaning":"旁觀者","example":"Several bystanders captured the incident on their phones.","exampleZh":"好幾位旁觀者用手機拍下了這起事件。","collocations":["innocent bystander","bystander effect","among bystanders"],"freq":"中頻","tip":"by-（在旁）+ stand（站立）+ er，innocent bystander（無辜的旁觀者）為常見片語。"},{"id":"x-v493","theme":"office","themeName":"辦公室與人資","word":"interpersonal","pos":"adj.","meaning":"人際間的","example":"Strong interpersonal skills are essential for a customer service role.","exampleZh":"良好的人際溝通技巧對客服職位而言至關重要。","collocations":["interpersonal skills","interpersonal relationship","interpersonal communication"],"freq":"高頻","tip":"inter-（之間）+ personal，履歷、職缺描述常見片語interpersonal skills。"},{"id":"x-v494","theme":"office","themeName":"辦公室與人資","word":"fantastic","pos":"adj.","meaning":"極好的、極佳的","example":"The client gave fantastic feedback on the final design proposal.","exampleZh":"客戶對最終的設計提案給予了極佳的回饋。","collocations":["fantastic feedback","fantastic opportunity","truly fantastic"],"freq":"中頻","tip":"語意等同excellent/wonderful，多益聽力對話中常用來表達正面評價。"},{"id":"x-v495","theme":"office","themeName":"辦公室與人資","word":"perseverance","pos":"n.","meaning":"毅力、堅持不懈","example":"Her perseverance through setbacks eventually earned her a promotion.","exampleZh":"她在挫折中展現的毅力最終為她贏得了晉升。","collocations":["show perseverance","perseverance and dedication","require perseverance"],"freq":"中頻","tip":"動詞persevere（堅持），抽象名詞常見於人物特質描述類閱讀文章。"},{"id":"x-v49
