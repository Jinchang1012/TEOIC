6","theme":"pattern","themeName":"句型","word":"allow A to do B","pos":"句型","meaning":"允許A去做B事情","example":"The new policy allows employees to work from home twice a week.","exampleZh":"新政策允許員工每週在家工作兩天。","collocations":["allow sb to do","be allowed to do","allow for"],"freq":"高頻","tip":"被動式be allowed to do為常考考法，另allow for（考慮到、容許）為不同意義的介係詞片語，勿混淆。"},{"id":"x-v497","theme":"media","themeName":"媒體與活動","word":"fundraising","pos":"adj.","meaning":"募款的","example":"The nonprofit organized a fundraising gala to support local schools.","exampleZh":"這間非營利組織舉辦了一場募款晚會以支持當地學校。","collocations":["fundraising event","fundraising campaign","fundraising gala"],"freq":"中頻","tip":"fund（資金）+ raising（籌募），可作形容詞修飾event/campaign，也可作名詞（募款活動本身）。"},{"id":"x-v498","theme":"pattern","themeName":"句型","word":"be encouraged to do","pos":"句型","meaning":"被鼓勵做…（事情）","example":"Staff members are encouraged to submit suggestions during the review period.","exampleZh":"員工被鼓勵在審查期間提交建議。","collocations":["be encouraged to","strongly encouraged","encourage sb to do"],"freq":"高頻","tip":"被動語態，常見於公告用語表委婉建議；主動式encourage sb to do為同一句型的另一面向，考題常互換考。"},{"id":"x-v499","theme":"office","themeName":"辦公室與人資","word":"firm","pos":"n.","meaning":"公司、商號","example":"The accounting firm hired five new associates this quarter.","exampleZh":"這家會計師事務所本季聘用了五名新員。","collocations":["accounting firm","law firm","consulting firm"],"freq":"高頻","tip":"常指專業服務業公司（law firm/accounting firm），形容詞firm則指「堅定的」，一詞多義。"},{"id":"x-v500","theme":"biz","themeName":"會議、行銷與業務","word":"participate in","pos":"phr.","meaning":"參與","example":"All department heads are expected to participate in the strategy meeting.","exampleZh":"所有部門主管都被要求參與這場策略會議。","collocations":["participate in","participation in","active participant"],"freq":"高頻","tip":"固定介係詞in，名詞participation，會議情境常見片語，勿誤用join in的搭配方式。"},{"id":"x-v501","theme":"office","themeName":"辦公室與人資","word":"possibility","pos":"n.","meaning":"可能性","example":"There is a strong possibility that the merger will be finalized next month.","exampleZh":"這起合併案下個月定案的可能性相當高。","collocations":["strong possibility","possibility of","explore the possibility"],"freq":"中頻","tip":"常搭配of + 名詞或that子句，形容詞possible，注意與probability（機率）語感差異。"},{"id":"x-v502","theme":"office","themeName":"辦公室與人資","word":"professional","pos":"adj.","meaning":"專業的","example":"The consultant offered professional advice on improving workflow efficiency.","exampleZh":"這位顧問就提升工作流程效率提供了專業建議。","collocations":["professional advice","professional development","act professionally"],"freq":"極高頻","tip":"也可作名詞（專業人士），professional development（職涯發展）為人資高頻片語。"},{"id":"x-v503","theme":"biz","themeName":"會議、行銷與業務","word":"convention","pos":"n.","meaning":"會議、大會","example":"Thousands of retailers attended the annual trade convention downtown.","exampleZh":"數千名零售商參加了在市中心舉行的年度貿易大會。","collocations":["attend a convention","trade convention","convention center"],"freq":"中頻","tip":"convention center（會議中心）為固定搭配，也可指「慣例、習俗」，注意語境判斷詞義。"},{"id":"x-v504","theme":"office","themeName":"辦公室與人資","word":"decision","pos":"n.","meaning":"決定","example":"The board reached a final decision on the merger after weeks of talks.","exampleZh":"董事會在數週的討論後對這起合併案做出了最終決定。","collocations":["make a decision","reach a decision","final decision"],"freq":"極高頻","tip":"動詞decide，常搭配make/reach，decision-making（決策）為常見複合名詞。"},{"id":"x-v505","theme":"trv","themeName":"出差與旅遊","word":"cancel","pos":"v.","meaning":"取消","example":"The airline canceled the flight due to severe weather conditions.","exampleZh":"這家航空公司因為惡劣天候取消了這班航班。","collocations":["cancel a flight","cancel a reservation","cancel an order"],"freq":"高頻","tip":"名詞cancellation，注意拼字雙l為英式、單l為美式，多益兩者皆可能出現。"},{"id":"x-v506","theme":"pattern","themeName":"句型","word":"regard A as B","pos":"句型","meaning":"認為A是B","example":"Many customers regard this brand as the industry leader in reliability.","exampleZh":"許多顧客認為這個品牌是業界在可靠度方面的領導者。","collocations":["regard A as B","be regarded as","in this regard"],"freq":"中頻","tip":"as不可省略也不可換成to be，被動式be regarded as為常考型態，另in this regard（就此而言）為固定片語，語意不同。"},{"id":"x-v507","theme":"biz","themeName":"會議、行銷與業務","word":"affordable","pos":"adj.","meaning":"負擔得起的","example":"The startup offers affordable pricing plans for small businesses.","exampleZh":"這家新創公司為小型企業提供了負擔得起的價格方案。","collocations":["affordable price","affordable housing","remain affordable"],"freq":"高頻","tip":"afford（負擔得起，動詞）+ -able，行銷情境常搭配price/plan/housing。"},{"id":"x-v508","theme":"office","themeName":"辦公室與人資","word":"neglect to do","pos":"phr.","meaning":"忽略做…（事情）","example":"The clerk neglected to attach the required signature on the form.","exampleZh":"這名職員忽略在表格上附加必要的簽名。","collocations":["neglect to do","neglect a duty","neglect maintenance"],"freq":"中頻","tip":"neglect + to V（忘記去做，含疏忽意味）vs. neglect + Ving較少見，考題常辨析與forget的語感差異。"},{"id":"x-v509","theme":"fin","themeName":"財務、採購與物流","word":"pollution","pos":"n.","meaning":"污染","example":"The new regulation aims to reduce air pollution from factories.","exampleZh":"這項新規定旨在減少工廠造成的空氣污染。","collocations":["air pollution","reduce pollution","pollution control"],"freq":"中頻","tip":"不可數名詞，動詞pollute，pollution control（污染防治）常見於製造業法規文章。"},{"id":"x-v510","theme":"fin","themeName":"財務、採購與物流","word":"accounting","pos":"n.","meaning":"會計","example":"She transferred from marketing to the accounting department last year.","exampleZh":"她去年從行銷部門調到了會計部門。","collocations":["accounting department","accounting firm","accounting software"],"freq":"高頻","tip":"不可數名詞，指「會計這門學科／業務」，accountant則指「會計師（人）」，詞性不可混淆。"},{"id":"x-v511","theme":"fin","themeName":"財務、採購與物流","word":"labor","pos":"n.","meaning":"勞工、勞力","example":"Rising labor costs forced the company to automate part of its production.","exampleZh":"不斷上漲的勞動成本迫使公司將部分生產自動化。","collocations":["labor cost","labor force","manual labor"],"freq":"高頻","tip":"不可數名詞，labor force（勞動力）、labor cost（人力成本）為製造業常見搭配，英式拼法labour。"},{"id":"x-v512","theme":"office","themeName":"辦公室與人資","word":"mention","pos":"v.","meaning":"提到","example":"The manager mentioned the upcoming deadline during the team briefing.","exampleZh":"經理在團隊簡報中提到了即將到來的截止日期。","collocations":["mention a deadline","as mentioned above","fail to mention"],"freq":"高頻","tip":"as mentioned above/earlier（如前所述）為書信、報告常見片語，不接介係詞about。"},{"id":"x-v513","theme":"office","themeName":"辦公室與人資","word":"regulation","pos":"n.","meaning":"規定、法規","example":"All employees must comply with the new safety regulations.","exampleZh":"所有員工都必須遵守新的安全規定。","collocations":["comply with regulation","safety regulation","government regulation"],"freq":"高頻","tip":"常搭配comply with/violate，複數regulations指「一套規範」，動詞regulate。"},{"id":"x-v514","theme":"fin","themeName":"財務、採購與物流","word":"account","pos":"n.","meaning":"帳戶","example":"Please transfer the deposit to the company's business account.","exampleZh":"請將訂金匯入公司的商業帳戶。","collocations":["business account","open an account","account balance"],"freq":"高頻","tip":"也可指「客戶」（在業務情境，account manager客戶經理）或動詞account for（說明、佔比），一詞多義。"},{"id":"x-v515","theme":"office","themeName":"辦公室與人資","word":"impact","pos":"n.","meaning":"影響、衝擊","example":"The policy change had a significant impact on employee morale.","exampleZh":"這項政策變動對員工士氣造成了顯著的影響。","collocations":["have an impact on","significant impact","negative impact"],"freq":"高頻","tip":"固定搭配have an impact on，也可作動詞（impact直接接受詞，不需加on），文法題常考及物用法。"},{"id":"x-v516","theme":"biz","themeName":"會議、行銷與業務","word":"release","pos":"v.","meaning":"發表、上市","example":"The company will release its newest smartphone model next spring.","exampleZh":"這家公司將在明年春天推出最新款智慧型手機。","collocations":["release a product","release a statement","newly released"],"freq":"高頻","tip":"也可作名詞（新聞稿press release、新品release），行銷情境核心動詞。"},{"id":"x-v517","theme":"office","themeName":"辦公室與人資","word":"reverse","pos":"v.","meaning":"撤銷、反轉","example":"The board decided to reverse its earlier decision on the budget cut.","exampleZh":"董事會決定撤銷先前對於預算刪減的決定。","collocations":["reverse a decision","reverse the trend","in reverse order"],"freq":"中頻","tip":"reverse a decision（推翻決定）為常見搭配，也可作形容詞/名詞（in reverse反向）。"},{"id":"x-v518","theme":"biz","themeName":"會議、行銷與業務","word":"latest","pos":"adj.","meaning":"最新的","example":"The showroom is now displaying the latest models from the collection.","exampleZh":"這間展示間目前正展示該系列的最新款式。","collocations":["the latest model","latest news","latest update"],"freq":"高頻","tip":"late的最高級，恆加定冠詞the latest，行銷、產品發表情境高頻形容詞。"},{"id":"x-v519","theme":"biz","themeName":"會議、行銷與業務","word":"chairperson","pos":"n.","meaning":"主席","example":"The chairperson called the meeting to order at nine o'clock sharp.","exampleZh":"主席在九點整宣布會議開始。","collocations":["chairperson of the board","act as chairperson","elect a chairperson"],"freq":"中頻","tip":"中性詞取代chairman/chairwoman，會議情境常搭配of the board，動詞chair也可直接使用。"},{"id":"x-v520","theme":"fin","themeName":"財務、採購與物流","word":"appliance","pos":"n.","meaning":"電器（家用電器）","example":"The store offers free delivery on all major kitchen appliances.","exampleZh":"這間店對所有主要廚房電器提供免費送貨服務。","collocations":["kitchen appliance","household appliance","appliance repair"],"freq":"中頻","tip":"常搭配household/kitchen，多益製造出貨情境常見商品類別詞。"},{"id":"x-v521","theme":"office","themeName":"辦公室與人資","word":"refuse to","pos":"phr.","meaning":"拒絕做…（事情）","example":"The vendor refused to lower the price despite the large order size.","exampleZh":"儘管訂單數量龐大，這家供應商仍拒絕降價。","collocations":["refuse to do","refuse a request","flatly refuse"],"freq":"中頻","tip":"後接原形動詞的to V，不可接動名詞；名詞refusal，考點常在動詞後接形式。"},{"id":"x-v522","theme":"office","themeName":"辦公室與人資","word":"perform","pos":"v.","meaning":"表現、執行","example":"The new hire performed exceptionally well during the probation period.","exampleZh":"這名新進員工在試用期間表現得非常出色。","collocations":["perform well","perform a task","perform duties"],"freq":"高頻","tip":"名詞performance，perform a duty（履行職責）與perform well（表現良好）為常考搭配。"},{"id":"x-v523","theme":"office","themeName":"辦公室與人資","word":"expel","pos":"v.","meaning":"除名、開除","example":"The committee voted to expel the member for violating the code of conduct.","exampleZh":"委員會投票決議因違反行為準則而將該會員除名。","collocations":["expel a member","expel from","be expelled"],"freq":"中頻","tip":"常見被動式be expelled from，語氣較fire/dismiss正式且多用於組織、學校情境。"},{"id":"x-v524","theme":"office","themeName":"辦公室與人資","word":"provide","pos":"v.","meaning":"提供","example":"The company provides comprehensive training for all new employees.","exampleZh":"公司為所有新進員工提供完整的培訓。","collocations":["provide training","provide sb with sth","provide a service"],"freq":"極高頻","tip":"固定搭配provide sb with sth或provide sth for sb，是多益文法題常考的雙受詞動詞。"},{"id":"x-v525","theme":"office","themeName":"辦公室與人資","word":"council","pos":"n.","meaning":"委員會、議會","example":"The city council approved the new zoning proposal last night.","exampleZh":"市議會在昨晚通過了這項新的分區提案。","collocations":["city council","council member","council meeting"],"freq":"中頻","tip":"注意與counsel（建議、法律顧問）同音異義字，考題常出現拼字陷阱。"},{"id":"x-v526","theme":"pattern","themeName":"句型","word":"be committed to doing","pos":"句型","meaning":"致力於（做）","example":"The management team is committed to improving workplace safety standards.","exampleZh":"管理團隊致力於提升職場安全標準。","collocations":["be committed to doing","committed to improving","remain committed"],"freq":"高頻","tip":"此為be committed to的動名詞延伸版，to為介係詞需接Ving，常與improving/reducing/providing等詞連用，是多益文法陷阱常客。"},{"id":"x-v527","theme":"office","themeName":"辦公室與人資","word":"remain","pos":"v.","meaning":"維持、保持","example":"Despite the setback, the team remained confident about hitting the target.","exampleZh":"儘管遭遇挫折，團隊仍對達成目標保持信心。","collocations":["remain confident","remain open","remain unchanged"],"freq":"高頻","tip":"連綜動詞，後接形容詞補語（remain + adj.），不可接副詞，多益文法常考詞性選擇。"},{"id":"x-v528","theme":"biz","themeName":"會議、行銷與業務","word":"top-class","pos":"adj.","meaning":"最高級的、頂級的","example":"The hotel is known for offering top-class service to its guests.","exampleZh":"這間飯店以提供給房客頂級的服務而聞名。","collocations":["top-class service","top-class facility","top-class performance"],"freq":"中頻","tip":"複合形容詞，連字號不可省略，常修飾service/facility，語感近似first-class。"},{"id":"x-v529","theme":"office","themeName":"辦公室與人資","word":"at all times","pos":"phr.","meaning":"總是、隨時","example":"Visitors must wear identification badges at all times while on site.","exampleZh":"訪客在場區內必須隨時配戴識別證。","collocations":["at all times","required at all times","maintained at all times"],"freq":"中頻","tip":"常見於規範、公告用語，強調「無例外地持續」，比always更正式。"},{"id":"x-v530","theme":"media","themeName":"媒體與活動","word":"performer","pos":"n.","meaning":"表演者","example":"The festival lineup features performers from over a dozen countries.","exampleZh":"這場節慶的陣容囊括來自十幾個國家的表演者。","collocations":["featured performer","talented performer","live performer"],"freq":"中頻","tip":"動詞perform衍生字，也可比喻指「表現優異者」（a top performer），一詞多義。"},{"id":"x-v531","theme":"media","themeName":"媒體與活動","word":"local","pos":"adj.","meaning":"在地的、當地的","example":"The festival showcases dishes prepared by local restaurants.","exampleZh":"這場節慶展示了由當地餐廳準備的菜餚。","collocations":["local restaurant","local resident","local news"],"freq":"高頻","tip":"也可作名詞（locals指「當地居民」），多益閱讀報導文章常見形容詞。"},{"id":"x-v532","theme":"office","themeName":"辦公室與人資","word":"employ","pos":"v.","meaning":"雇用","example":"The manufacturing plant employs over three hundred workers.","exampleZh":"這間製造工廠雇用了三百多名員工。","collocations":["employ workers","employ a strategy","be employed by"],"freq":"中頻","tip":"也可指「運用」（employ a strategy），名詞employee（受雇者）／employer（雇主）需分清方向。"},{"id":"x-v533","theme":"media","themeName":"媒體與活動","word":"cover","pos":"v.","meaning":"報導","example":"Local news stations covered the grand opening of the new stadium.","exampleZh":"地方新聞台報導了這座新體育館的盛大開幕。","collocations":["cover a story","cover an event","media coverage"],"freq":"高頻","tip":"名詞化為coverage（報導範圍），也可指「支付、包含」（cover the cost），媒體情境核心動詞。"},{"id":"x-v534","theme":"office","themeName":"辦公室與人資","word":"file","pos":"v.","meaning":"提出（申請）","example":"The employee filed a complaint with the human resources department.","exampleZh":"這名員工向人力資源部門提出了一項投訴。","collocations":["file a complaint","file a claim","file paperwork"],"freq":"高頻","tip":"file a complaint/claim為固定搭配，名詞file則指「資料、檔案」，一詞兩用需依句構判斷。"},{"id":"x-v535","theme":"pattern","themeName":"句型","word":"force A to do","pos":"句型","meaning":"強迫A去做…","example":"The sudden budget cut forced the department to postpone the project.","exampleZh":"突如其來的預算刪減迫使該部門延後這項專案。","collocations":["force A to do","be forced to","forced into"],"freq":"中頻","tip":"被動式be forced to do為常考型態，語感較require/compel強烈，多用於外在壓力導致的結果。"},{"id":"x-v536","theme":"svc","themeName":"客服與售後","word":"fine","pos":"n.","meaning":"罰款","example":"Customers who return the equipment late will be charged a fine.","exampleZh":"逾期歸還設備的顧客將被收取罰款。","collocations":["pay a fine","impose a fine","late fine"],"freq":"中頻","tip":"也可作形容詞（美好的、健康的），此處為客服／逾期情境的名詞義，注意語境判斷。"},{"id":"x-v537","theme":"media","themeName":"媒體與活動","word":"comment on","pos":"phr.","meaning":"對…做評論","example":"The spokesperson declined to comment on the ongoing investigation.","exampleZh":"這位發言人拒絕針對這起進行中的調查發表評論。","collocations":["comment on","decline to comment","further comment"],"freq":"中頻","tip":"固定介係詞on，decline to comment on為新聞報導常見用語，名詞comment也可獨立使用。"},{"id":"x-v538","theme":"fin","themeName":"財務、採購與物流","word":"automatically","pos":"adv.","meaning":"自動地","example":"The machine automatically shuts down when it overheats.","exampleZh":"這台機器過熱時會自動關機。","collocations":["automatically shut down","renew automatically","update automatically"],"freq":"中頻","tip":"形容詞automatic，常修飾動詞描述無需人工介入的流程，製造業說明書常見副詞。"},{"id":"x-v539","theme":"office","themeName":"辦公室與人資","word":"thoroughly","pos":"adv.","meaning":"完整地、徹底地","example":"Please review the proposal thoroughly before submitting your feedback.","exampleZh":"請在提交意見前徹底審閱這份提案。","collocations":["review thoroughly","thoroughly examine","thoroughly enjoyed"],"freq":"中頻","tip":"形容詞thorough，常修飾review/examine/check等審查類動詞，強調「一絲不苟」。"},{"id":"x-v540","theme":"pattern","themeName":"句型","word":"deduct A from B","pos":"句型","meaning":"從B裡面扣除A","example":"The accounting office will deduct the parking fee from the employee's salary.","exampleZh":"會計室將從該員工的薪資中扣除停車費。","collocations":["deduct A from B","tax deductible","deduction from"],"freq":"中頻","tip":"介係詞固定為from，被動式be deducted from也常見，名詞deduction（扣除額）為財務常考詞。"},{"id":"x-v541","theme":"office","themeName":"辦公室與人資","word":"found","pos":"v.","meaning":"創立","example":"The two engineers founded the company in a small garage in 2005.","exampleZh":"這兩位工程師在2005年於一間小車庫裡創立了這家公司。","collocations":["found a company","newly founded","founding member"],"freq":"中頻","tip":"注意found為find的過去式同形詞，此處作原形動詞「創立」時三態為found-founded-founded。"},{"id":"x-v542","theme":"fin","themeName":"財務、採購與物流","word":"earning","pos":"n.","meaning":"收入、所得","example":"The company reported record earnings for the third consecutive quarter.","exampleZh":"公司連續第三季呈報了創紀錄的獲利。","collocations":["report earnings","earnings report","annual earnings"],"freq":"高頻","tip":"財經情境常用複數earnings指「盈餘、獲利」，earnings report為財報公告核心詞。"},{"id":"x-v543","theme":"office","themeName":"辦公室與人資","word":"register","pos":"v.","meaning":"註冊、登記","example":"Attendees must register online before the conference begins.","exampleZh":"與會者必須在會議開始前完成線上註冊。","collocations":["register for","register online","registration form"],"freq":"高頻","tip":"固定搭配register for（為…註冊），名詞registration，會議報名情境高頻動詞。"},{"id":"x-v544","theme":"office","themeName":"辦公室與人資","word":"aspect","pos":"n.","meaning":"（事情的）方面","example":"The training covers every aspect of customer service management.","exampleZh":"這項培訓涵蓋了客服管理的每個層面。","collocations":["every aspect of","key aspect","in this aspect"],"freq":"中頻","tip":"常搭配of + 名詞，every aspect of為固定用語，表「全方位、各層面」。"},{"id":"x-v545","theme":"office","themeName":"辦公室與人資","word":"deliberately","pos":"adv.","meaning":"刻意地、故意地","example":"The manager deliberately delayed the announcement until after the meeting.","exampleZh":"經理刻意將這項公告延後到會議結束後才發布。","collocations":["deliberately delay","deliberately ignore","act deliberately"],"freq":"中頻","tip":"形容詞deliberate，強調「有意為之」，與accidentally（意外地）為反義對比詞。"},{"id":"x-v546","theme":"office","themeName":"辦公室與人資","word":"major","pos":"adj.","meaning":"主要的、重大的","example":"The merger represents a major shift in the company's business strategy.","exampleZh":"這起合併案代表公司經營策略的一項重大轉變。","collocations":["major change","major shift","play a major role"],"freq":"高頻","tip":"也可作名詞（大學主修科系）或動詞（major in主修），一詞多義需依詞性判斷。"},{"id":"x-v547","theme":"office","themeName":"辦公室與人資","word":"highly","pos":"adv.","meaning":"非常地、高度地","example":"The candidate comes highly recommended by her previous employer.","exampleZh":"這名應徵者受到前雇主高度的推薦。","collocations":["highly recommended","highly skilled","highly regarded"],"freq":"高頻","tip":"常修飾過去分詞（highly recommended/regarded/skilled），語氣比very更正式，履歷、人事文章高頻副詞。"},{"id":"x-v548","theme":"office","themeName":"辦公室與人資","word":"respected","pos":"adj.","meaning":"受尊敬的","example":"He is a highly respected figure in the manufacturing industry.","exampleZh":"他在製造業界是一位備受尊敬的人物。","collocations":["highly respected","widely respected","well-respected"],"freq":"中頻","tip":"動詞respect的過去分詞作形容詞，常與highly/widely搭配，人物介紹類文章常見。"},{"id":"x-v549","theme":"office","themeName":"辦公室與人資","word":"avoid","pos":"v.","meaning":"避免","example":"Employees should back up their files to avoid losing important data.","exampleZh":"員工應備份檔案以避免遺失重要資料。","collocations":["avoid losing","avoid a conflict","avoid delay"],"freq":"高頻","tip":"後接動名詞Ving，不可接to V，是多益文法題常考的動詞接續型態陷阱。"},{"id":"x-v550","theme":"office","themeName":"辦公室與人資","word":"code","pos":"n.","meaning":"法規、準則","example":"All contractors must follow the local building code during construction.","exampleZh":"所有承包商在施工期間都必須遵守當地的建築法規。","collocations":["building code","dress code","code of conduct"],"freq":"中頻","tip":"code of conduct（行為準則）、dress code（服裝規定）為常見複合詞，也可指「密碼、代碼」。"},{"id":"x-v551","theme":"fin","themeName":"財務、採購與物流","word":"steadily","pos":"adv.","meaning":"穩定地","example":"The company's revenue has grown steadily over the past five years.","exampleZh":"這家公司的營收在過去五年間穩定地成長。","collocations":["grow steadily","increase steadily","steadily improve"],"freq":"中頻","tip":"形容詞steady，常修飾grow/increase/rise等趨勢動詞，財報描述常見副詞。"},{"id":"x-v552","theme":"office","themeName":"辦公室與人資","word":"requirements","pos":"n.","meaning":"需求、規定","example":"Applicants must meet the minimum requirements listed in the job posting.","exampleZh":"應徵者必須符合職缺公告中列出的最低要求。","collocations":["meet requirements","minimum requirement","legal requirement"],"freq":"高頻","tip":"常用複數形，動詞搭配meet/satisfy，動詞require，人事招募情境核心詞。"},{"id":"x-v553","theme":"fin","themeName":"財務、採購與物流","word":"increase","pos":"v.","meaning":"增加、成長","example":"The firm plans to increase its marketing budget by fifteen percent.","exampleZh":"這家公司計畫將行銷預算提高百分之十五。","collocations":["increase by","increase in","sharply increase"],"freq":"極高頻","tip":"increase by（增加了多少）vs. increase to（增加到多少）為常考介係詞辨析，也可作名詞。"},{"id":"x-v554","theme":"fin","themeName":"財務、採購與物流","word":"crew","pos":"n.","meaning":"工作小組、全體人員","example":"A maintenance crew was dispatched to repair the malfunctioning machinery.","exampleZh":"一組維修人員被派去修理故障的機械。","collocations":["maintenance crew","construction crew","crew member"],"freq":"中頻","tip":"集合名詞，指「一組共同作業的人員」，常搭配maintenance/construction/film等修飾詞。"},{"id":"x-v555","theme":"fin","themeName":"財務、採購與物流","word":"fabric","pos":"n.","meaning":"織品、布料","example":"The designer chose a durable fabric for the new uniform line.","exampleZh":"這位設計師為新款制服系列選用了耐用的布料。","collocations":["durable fabric","fabric quality","cotton fabric"],"freq":"中頻","tip":"不可數名詞，製造業常搭配durable/quality描述材質特性，勿與fiber（纖維）混淆。"},{"id":"x-v556","theme":"fin","themeName":"財務、採購與物流","word":"deliver","pos":"v.","meaning":"運送、遞送","example":"The supplier promised to deliver the order within three business days.","exampleZh":"供應商承諾在三個工作天內送達這批訂單。","collocations":["deliver an order","deliver on time","deliver a speech"],"freq":"高頻","tip":"名詞delivery，deliver a speech（發表演說）為延伸義，物流情境常搭配on time。"},{"id":"x-v557","theme":"fin","themeName":"財務、採購與物流","word":"overdue","pos":"adj.","meaning":"逾期的","example":"A late fee will apply to any invoice that remains overdue.","exampleZh":"任何逾期未付的發票都將被收取滯納金。","collocations":["overdue invoice","overdue payment","long overdue"],"freq":"中頻","tip":"over-（超過）+ due（到期），常修飾invoice/payment，long overdue則指「早該發生卻遲遲未發生」。"},{"id":"x-v558","theme":"fin","themeName":"財務、採購與物流","word":"damage","pos":"n.","meaning":"損壞","example":"The shipment arrived with visible damage to the packaging.","exampleZh":"這批貨到達時包裝出現明顯的損壞。","collocations":["cause damage","report damage","damage to"],"freq":"高頻","tip":"不可數名詞，恆用單數，動詞常搭配cause/report/repair，物流理賠情境高頻詞。"},{"id":"x-v559","theme":"fin","themeName":"財務、採購與物流","word":"charge","pos":"v.","meaning":"收費","example":"The hotel charges an additional fee for early check-in.","exampleZh":"這間飯店對提前入住收取額外費用。","collocations":["charge a fee","charge for","free of charge"],"freq":"高頻","tip":"charge sb for sth為固定搭配，free of charge（免費）為常見片語，也可作名詞。"},{"id":"x-v560","theme":"office","themeName":"辦公室與人資","word":"essential","pos":"adj.","meaning":"必要的、不可或缺的","example":"Clear communication is essential for a successful team project.","exampleZh":"清楚的溝通對於一項成功的團隊專案是不可或缺的。","collocations":["essential for","essential skill","essential to"],"freq":"高頻","tip":"後接介係詞for或to皆可，語意不變，常用於強調必要性的正式建議句型it is essential that。"},{"id":"x-v561","theme":"fin","themeName":"財務、採購與物流","word":"income","pos":"n.","meaning":"收入","example":"The freelancer's monthly income fluctuates depending on project volume.","exampleZh":"這名自由工作者的月收入會依專案量而波動。","collocations":["monthly income","household income","income tax"],"freq":"高頻","tip":"不可數名詞，income tax（所得稅）為固定搭配，注意與earnings（多指企業盈餘）語境略有不同。"},{"id":"x-v562","theme":"office","themeName":"辦公室與人資","word":"expertise","pos":"n.","meaning":"專業技術、專門知識","example":"The firm relies on the analyst's expertise in emerging markets.","exampleZh":"這家公司仰賴這位分析師在新興市場方面的專業知識。","collocations":["technical expertise","area of expertise","expertise in"],"freq":"高頻","tip":"不可數名詞，恆為單數形，固定介係詞in，注意與expert（專家，人）詞性區分。"},{"id":"x-v563","theme":"fin","themeName":"財務、採購與物流","word":"tax","pos":"n.","meaning":"稅","example":"The government plans to raise the sales tax next fiscal year.","exampleZh":"政府計畫在下一個財政年度調高營業稅。","collocations":["sales tax","tax return","raise a tax"],"freq":"高頻","tip":"可作動詞（課稅），常見複合詞tax return（報稅）、income tax（所得稅），財經核心字。"},{"id":"x-v564","theme":"office","themeName":"辦公室與人資","word":"complete","pos":"v.","meaning":"完成","example":"New employees must complete the orientation training within the first week.","exampleZh":"新進員工必須在第一週內完成新人培訓。","collocations":["complete a task","complete training","complete a form"],"freq":"極高頻","tip":"也可作形容詞（完整的），動詞用法常搭配task/form/training，注意與finish語感相近但更正式。"},{"id":"x-v565","theme":"svc","themeName":"客服與售後","word":"return","pos":"v.","meaning":"歸還、退貨","example":"Customers may return defective items within thirty days for a full refund.","exampleZh":"顧客可在三十天內退回瑕疵商品以獲得全額退款。","collocations":["return an item","return policy","return for a refund"],"freq":"高頻","tip":"return policy（退貨政策）為客服核心複合詞，也可作名詞，注意與refund（退款）搭配使用。"},{"id":"x-v566","theme":"office","themeName":"辦公室與人資","word":"immediately","pos":"adv.","meaning":"馬上地、立即地","example":"Please contact the IT department immediately if your account is locked.","exampleZh":"如果您的帳戶被鎖定，請立即聯繫資訊部門。","collocations":["contact immediately","immediately following","act immediately"],"freq":"高頻","tip":"immediately following（緊接在…之後）為常見片語，語氣強調時間上「零延遲」。"},{"id":"x-v567","theme":"svc","themeName":"客服與售後","word":"apologize to","pos":"phr.","meaning":"向…道歉","example":"The manager personally apologized to the customer for the shipping delay.","exampleZh":"經理親自為出貨延誤向這位顧客道歉。","collocations":["apologize to","apologize for","sincere apology"],"freq":"中頻","tip":"apologize to sb for sth為固定搭配，介係詞to接對象、for接原因，名詞apology。"},{"id":"x-v568","theme":"office","themeName":"辦公室與人資","word":"fill out","pos":"phr.","meaning":"填寫","example":"New members are asked to fill out a registration form at the front desk.","exampleZh":"新會員被要求在櫃台填寫一份註冊表。","collocations":["fill out a form","fill in the blank","fill out an application"],"freq":"高頻","tip":"fill out（填寫整份表格）美式常用，fill in（填入空格）兩者常互換，皆為可分離片語動詞。"},{"id":"x-v569","theme":"hosp","themeName":"餐飲與住宿","word":"patron","pos":"n.","meaning":"顧客、贊助人","example":"Regular patrons receive a discount card after their tenth visit.","exampleZh":"常客在第十次消費後可獲得一張折扣卡。","collocations":["regular patron","patron discount","loyal patron"],"freq":"中頻","tip":"較customer正式，常用於餐廳、藝文機構情境，也可指「贊助人」，一詞多義。"},{"id":"x-v570","theme":"est","themeName":"租賃與房產","word":"closure","pos":"n.","meaning":"關閉","example":"The mall announced a temporary closure for renovation next month.","exampleZh":"這間購物中心宣布下個月將因整修而暫時關閉。","collocations":["temporary closure","road closure","announce a closure"],"freq":"中頻","tip":"動詞close，closure為抽象名詞形式，常搭配temporary/road/store描述關閉的對象。"},{"id":"x-v571","theme":"office","themeName":"辦公室與人資","word":"go into effect","pos":"phr.","meaning":"實施、生效","example":"The updated safety policy will go into effect starting next Monday.","exampleZh":"更新後的安全政策將從下週一開始生效。","collocations":["go into effect","take effect","in effect"],"freq":"中頻","tip":"與take effect同義可互換，常搭配未來式描述法規、政策的生效時間點。"},{"id":"x-v572","theme":"office","themeName":"辦公室與人資","word":"period","pos":"n.","meaning":"期間","example":"Employees can request time off during the holiday period in advance.","exampleZh":"員工可以提前申請假期期間的休假。","collocations":["trial period","during a period","grace period"],"freq":"高頻","tip":"grace period（寬限期）、trial period（試用期）為常考複合詞，指一段有起訖的時間範圍。"},{"id":"x-v573","theme":"pattern","themeName":"句型","word":"be required to do","pos":"句型","meaning":"必須做","example":"All visitors are required to sign in at the security desk upon arrival.","exampleZh":"所有訪客抵達時都必須在安全櫃台簽到。","collocations":["be required to","require sb to do","requirement for"],"freq":"高頻","tip":"被動式強調規定的強制性，語氣比must委婉正式，常見於公告、規範類文章開頭句。"},{"id":"x-v574","theme":"office","themeName":"辦公室與人資","word":"simply","pos":"adv.","meaning":"僅僅、只是","example":"To reset your password, simply click the link provided in the email.","exampleZh":"要重設密碼，只需點擊電子郵件中提供的連結即可。","collocations":["simply click","simply because","quite simply"],"freq":"中頻","tip":"常用於說明步驟的簡易性，simply because則強調原因單純，說明文常見副詞。"},{"id":"x-v575","theme":"fin","themeName":"財務、採購與物流","word":"raise","pos":"v.","meaning":"提升、調漲","example":"The board voted to raise the minimum wage for hourly employees.","exampleZh":"董事會投票通過調漲時薪員工的最低薪資。","collocations":["raise the price","raise a concern","raise funds"],"freq":"高頻","tip":"及物動詞，需接受詞（raise the price），勿與不及物的rise（上升）混淆，文法題常考此組。"},{"id":"x-v576","theme":"est","themeName":"租賃與房產","word":"entrance","pos":"n.","meaning":"入口","example":"Visitors should use the main entrance located at the front of the building.","exampleZh":"訪客應使用位於大樓正面的主要入口。","collocations":["main entrance","entrance fee","entrance to"],"freq":"中頻","tip":"動詞enter，entrance fee（入場費）為常見複合詞，反義詞exit（出口）。"},{"id":"x-v577","theme":"fin","themeName":"財務、採購與物流","word":"rate","pos":"n.","meaning":"價格、費率","example":"The hotel offers a discounted rate for guests staying more than a week.","exampleZh":"這間飯店為住宿超過一週的房客提供優惠的價格。","collocations":["discounted rate","interest rate","exchange rate"],"freq":"高頻","tip":"可指「費率、比率」，interest rate（利率）、exchange rate（匯率）為財經常考複合詞。"},{"id":"x-v578","theme":"trv","themeName":"出差與旅遊","word":"commuter","pos":"n.","meaning":"通勤者","example":"The new express train was designed to reduce travel time for commuters.","exampleZh":"這款新型快速列車是為了縮短通勤者的搭乘時間而設計的。","collocations":["commuter train","daily commuter","commuter traffic"],"freq":"中頻","tip":"動詞commute（通勤），commuter train/traffic為交通報導常見複合詞。"},{"id":"x-v579","theme":"office","themeName":"辦公室與人資","word":"realize","pos":"v.","meaning":"了解、意識到","example":"The team realized the deadline could not be met without extra staff.","exampleZh":"團隊意識到若沒有額外的人力，截止期限將無法達成。","collocations":["realize that","fail to realize","gradually realize"],"freq":"高頻","tip":"後接that子句，英式拼法realise，也可指「實現」（realize a goal），一詞多義。"},{"id":"x-v580","theme":"office","themeName":"辦公室與人資","word":"practice","pos":"n.","meaning":"常規、慣常做法","example":"It is standard practice to confirm appointments a day in advance.","exampleZh":"提前一天確認預約是標準的常規做法。","collocations":["standard practice","best practice","common practice"],"freq":"高頻","tip":"best practice（最佳實務）為商業文章常見複合詞，動詞practice則指「練習、執業」。"},{"id":"x-v581","theme":"est","themeName":"租賃與房產","word":"suburb","pos":"n.","meaning":"郊區","example":"Many young families are moving to the suburbs for more affordable housing.","exampleZh":"許多年輕家庭正搬到郊區以尋求更負擔得起的住房。","collocations":["move to the suburbs","suburban area","quiet suburb"],"freq":"中頻","tip":"常用複數suburbs泛指郊區地帶，形容詞suburban，與downtown/urban（市區）相對。"},{"id":"x-v582","theme":"hosp","themeName":"餐飲與住宿","word":"comfortable","pos":"adj.","meaning":"舒適的","example":"The lobby features comfortable seating for guests waiting to check in.","exampleZh":"大廳為等候入住的房客提供了舒適的座位。","collocations":["comfortable seating","comfortable stay","feel comfortable"],"freq":"高頻","tip":"餐飲住宿情境常修飾seating/stay/room，注意重音在第二音節com-FORT-able。"},{"id":"x-v583","theme":"office","themeName":"辦公室與人資","word":"currently","pos":"adv.","meaning":"現在、目前","example":"The position is currently open and accepting applications.","exampleZh":"這個職缺目前是開放且正在接受應徵的。","collocations":["currently open","currently unavailable","currently seeking"],"freq":"高頻","tip":"常與現在進行式或現在式連用，強調「當下狀態」，形容詞current則修飾名詞。"},{"id":"x-v584","theme":"office","themeName":"辦公室與人資","word":"in order to","pos":"phr.","meaning":"為了、以便","example":"The team worked overtime in order to meet the product launch deadline.","exampleZh":"團隊加班工作以便趕上產品發表的截止期限。","collocations":["in order to","in order for","in order that"],"freq":"高頻","tip":"後接原形動詞表目的，比to更強調「為達成某目的」，語氣正式，適合書面文章開頭。"},{"id":"x-v585","theme":"est","themeName":"租賃與房產","word":"renew","pos":"v.","meaning":"更新、續約","example":"Tenants must notify the landlord thirty days before choosing to renew the lease.","exampleZh":"房客若選擇續約，必須在三十天前通知房東。","collocations":["renew a lease","renew a contract","renew a subscription"],"freq":"高頻","tip":"名詞renewal，常搭配lease/contract/subscription，租賃情境核心動詞。"},{"id":"x-v586","theme":"office","themeName":"辦公室與人資","word":"effectively","pos":"adv.","meaning":"有效地","example":"The new software allows teams to communicate more effectively across departments.","exampleZh":"這套新軟體讓團隊能更有效地跨部門溝通。","collocations":["communicate effectively","work effectively","effectively manage"],"freq":"中頻","tip":"形容詞effective，常修飾communicate/manage/use等動詞，也可指「實際上」（effectively meaning）。"},{"id":"x-v587","theme":"est","themeName":"租賃與房產","word":"expire on","pos":"phr.","meaning":"在…到期","example":"The current rental agreement expires on the last day of August.","exampleZh":"目前的租賃協議將在八月的最後一天到期。","collocations":["expire on","about to expire","expiration date"],"freq":"中頻","tip":"固定介係詞on接日期，名詞expiration/expiry，租約、證照文章常見動詞片語。"},{"id":"x-v588","theme":"office","themeName":"辦公室與人資","word":"due to","pos":"phr.","meaning":"因為…（後接名詞）","example":"The flight was delayed due to unexpected mechanical issues.","exampleZh":"這班航班因為突發的機械問題而延誤。","collocations":["due to","due to the fact that","overdue"],"freq":"高頻","tip":"後接名詞或名詞片語，不可直接接子句（需搭配the fact that），與because of用法相同，是常考文法點。"},{"id":"x-v589","theme":"office","themeName":"辦公室與人資","word":"incredible","pos":"adj.","meaning":"不可思議的、驚人的","example":"The sales team achieved incredible results during the holiday promotion.","exampleZh":"業務團隊在假期促銷期間創造了驚人的業績。","collocations":["incredible result","incredible growth","truly incredible"],"freq":"中頻","tip":"字義為形容詞「不可思議的」，副詞形為incredibly（不可思議地）；in-（否定）+ credible（可信的），詞性辨析為多益考點。"},{"id":"x-v590","theme":"biz","themeName":"會議、行銷與業務","word":"purchase","pos":"v.","meaning":"購買","example":"Customers who purchase online receive free shipping on orders over fifty dollars.","exampleZh":"線上購買的顧客在訂單滿五十美元時可享免運費。","collocations":["purchase online","make a purchase","purchase order"],"freq":"高頻","tip":"較buy正式，purchase order（採購單）為商業高頻複合詞，也可作名詞。"},{"id":"x-v591","theme":"office","themeName":"辦公室與人資","word":"restraint","pos":"n.","meaning":"限制、管制措施","example":"The company imposed cost restraints across all departments this quarter.","exampleZh":"公司本季對所有部門實施了成本管制措施。","collocations":["cost restraint","impose restraint","exercise restraint"],"freq":"中頻","tip":"動詞restrain，常搭配impose/exercise，cost restraint為財務管控情境常見複合詞。"},{"id":"x-v592","theme":"office","themeName":"辦公室與人資","word":"at least","pos":"phr.","meaning":"至少","example":"Applicants should have at least two years of relevant work experience.","exampleZh":"應徵者應具備至少兩年的相關工作經驗。","collocations":["at least","at the very least","not least"],"freq":"高頻","tip":"常修飾數量詞，反義at most（至多），求職條件描述常見片語。"},{"id":"x-v593","theme":"fin","themeName":"財務、採購與物流","word":"reduce","pos":"v.","meaning":"減少","example":"The company aims to reduce operating costs by ten percent this year.","exampleZh":"公司今年的目標是將營運成本減少百分之十。","collocations":["reduce cost","reduce by","significantly reduce"],"freq":"極高頻","tip":"名詞reduction，reduce A by B（減少B的量）為常考介係詞搭配，財務目標文章高頻動詞。"},{"id":"x-v594","theme":"fin","themeName":"財務、採購與物流","word":"spend","pos":"v.","meaning":"花費（時間、金錢）","example":"The department spent most of its budget on new equipment this year.","exampleZh":"該部門今年把大部分預算都花在新設備上。","collocations":["spend on","spend time","spend a budget"],"freq":"高頻","tip":"spend + 時間/金錢 + on + 名詞或Ving，名詞spending，三態spend-spent-spent。"},{"id":"x-v595","theme":"fin","themeName":"財務、採購與物流","word":"substantial","pos":"adj.","meaning":"大量的、可觀的","example":"The firm reported a substantial increase in overseas sales this year.","exampleZh":"這家公司今年呈報了海外銷售額的大幅成長。","collocations":["substantial increase","substantial amount","substantial growth"],"freq":"中頻","tip":"常修飾increase/amount/growth，語感比large更正式，財報用語高頻形容詞。"},{"id":"x-v596","theme":"fin","themeName":"財務、採購與物流","word":"balance","pos":"n.","meaning":"餘額、平衡","example":"Please check your account balance before making a large withdrawal.","exampleZh":"進行大額提款前請先確認您的帳戶餘額。","collocations":["account balance","balance sheet","maintain a balance"],"freq":"高頻","tip":"account balance（帳戶餘額）、balance sheet（資產負債表）為財務核心複合詞，也可作動詞（使平衡）。"},{"id":"x-v597","theme":"office","themeName":"辦公室與人資","word":"suggestion","pos":"n.","meaning":"建議","example":"The manager welcomed suggestions from staff on improving the workflow.","exampleZh":"經理歡迎員工提出改善工作流程的建議。","collocations":["make a suggestion","suggestion box","welcome suggestions"],"freq":"中頻","tip":"動詞suggest，suggestion box（意見箱）為常見職場複合詞，常搭配make/offer。"},{"id":"x-v598","theme":"office","themeName":"辦公室與人資","word":"management","pos":"n.","meaning":"管理","example":"Senior management approved the proposal after a thorough review.","exampleZh":"高階管理層在徹底審查後核准了這項提案。","collocations":["senior management","management team","time management"],"freq":"極高頻","tip":"可指「管理階層（人）」或「管理這門學問／行為」，time management（時間管理）為常見複合詞。"},{"id":"x-v599","theme":"med","themeName":"醫療與保健","word":"make an appointment","pos":"phr.","meaning":"預約","example":"Patients are advised to make an appointment online to avoid long waits.","exampleZh":"建議病患透過線上預約以避免長時間等候。","collocations":["make an appointment","reschedule an appointment","appointment with"],"freq":"高頻","tip":"固定搭配make（而非take）an appointment，取消預約用cancel，醫療情境核心片語。"},{"id":"x-v600","theme":"office","themeName":"辦公室與人資","word":"ideal","pos":"adj.","meaning":"理想的、完美的","example":"This candidate seems ideal for the newly created marketing position.","exampleZh":"這位應徵者似乎非常適合這個新設立的行銷職位。","collocations":["ideal candidate","ideal for","ideal solution"],"freq":"中頻","tip":"常搭配介係詞for表適用對象，也可作名詞（an ideal理想典範），求職廣告常見形容詞。"},{"id":"x-v601","theme":"trv","themeName":"出差與旅遊","word":"availability","pos":"n.","meaning":"可用性、空房／空位情形","example":"Please check room availability before confirming the travel dates.","exampleZh":"請在確認出差日期前先查詢房間的空房情形。","collocations":["check availability","subject to availability","limited availability"],"freq":"中頻","tip":"形容詞available，subject to availability（視供應狀況而定）為訂房、訂票常見免責用語。"},{"id":"x-v602","theme":"office","themeName":"辦公室與人資","word":"resource","pos":"n.","meaning":"資源","example":"The department lacks the resources needed to complete the project on time.","exampleZh":"該部門缺乏按時完成這項專案所需的資源。","collocations":["human resource","allocate resources","lack resources"],"freq":"高頻","tip":"常用複數resources，human resources（人力資源，縮寫HR）為職場核心複合詞。"},{"id":"x-v603","theme":"office","themeName":"辦公室與人資","word":"regulation on","pos":"phr.","meaning":"關於…的規定","example":"The government issued a new regulation on data privacy last week.","exampleZh":"政府上週發布了一項關於資料隱私的新規定。","collocations":["regulation on","strict regulation","comply with regulation"],"freq":"中頻","tip":"固定介係詞on接主題，也可用regarding替換，法規類閱讀文章常見搭配。"},{"id":"x-v604","theme":"biz","themeName":"會議、行銷與業務","word":"share","pos":"v.","meaning":"共享、分享","example":"The two companies agreed to share marketing resources for the campaign.","exampleZh":"這兩家公司同意為這場行銷活動共享行銷資源。","collocations":["share resources","share information","market share"],"freq":"高頻","tip":"也可作名詞（market share市佔率、股份stock share），行銷合作情境常見動詞。"},{"id":"x-v605","theme":"trv","themeName":"出差與旅遊","word":"transit","pos":"n.","meaning":"運輸、轉運","example":"The package was damaged in transit and had to be replaced.","exampleZh":"這件包裹在運送途中受損，因此必須更換。","collocations":["in transit","transit time","public transit"],"freq":"中頻","tip":"in transit（運送中）為固定片語，public transit（大眾運輸）為出差旅遊情境常見複合詞。"},{"id":"x-v606","theme":"trv","themeName":"出差與旅遊","word":"transportation","pos":"n.","meaning":"交通、運輸","example":"The company provides transportation for employees attending the offsite training.","exampleZh":"公司為參加外訓的員工提供交通接送。","collocations":["public transportation","provide transportation","transportation cost"],"freq":"高頻","tip":"不可數名詞，英式用法transport，常搭配public/provide，出差情境高頻詞。"},{"id":"x-v607","theme":"office","themeName":"辦公室與人資","word":"option","pos":"n.","meaning":"選擇","example":"Employees have the option to work remotely two days a week.","exampleZh":"員工有權選擇每週遠距工作兩天。","collocations":["have the option","payment option","viable option"],"freq":"高頻","tip":"常搭配have/choose，動詞opt（選擇），payment option（付款方式）為常見複合詞。"},{"id":"x-v608","theme":"office","themeName":"辦公室與人資","word":"as soon as possible","pos":"phr.","meaning":"儘快","example":"Please submit the signed contract as soon as possible to avoid delays.","exampleZh":"請儘快提交已簽署的合約以避免延誤。","collocations":["as soon as possible","respond as soon as possible","ASAP"],"freq":"高頻","tip":"常縮寫為ASAP，商業書信中表達急迫性的常見結尾用語。"},{"id":"x-v609","theme":"office","themeName":"辦公室與人資","word":"division","pos":"n.","meaning":"部門、分部","example":"The sales division exceeded its quarterly target by twelve percent.","exampleZh":"業務部門超越了本季目標百分之十二。","collocations":["sales division","division head","division of labor"],"freq":"高頻","tip":"較department略大或指「事業部」，division of labor（分工）為常見延伸用法。"},{"id":"x-v610","theme":"fin","themeName":"財務、採購與物流","word":"outlet","pos":"n.","meaning":"（電器的）插座；直營店","example":"Make sure the outlet can support the appliance's voltage requirements.","exampleZh":"請確認插座能支援這項電器的電壓需求。","collocations":["electrical outlet","retail outlet","outlet store"],"freq":"中頻","tip":"可指「插座」或「直營／暢貨中心」（outlet store），依製造出貨或零售情境判斷詞義。"},{"id":"x-v611","theme":"office","themeName":"辦公室與人資","word":"instead of","pos":"phr.","meaning":"代替…、而不是","example":"The team chose to hold the meeting online instead of in person.","exampleZh":"團隊選擇以線上會議取代實體會議。","collocations":["instead of","in place of","rather than"],"freq":"高頻","tip":"後接名詞或動名詞，與rather than語意相近但用法略有不同，多益文法題常考接續形式。"},{"id":"x-v612","theme":"biz","themeName":"會議、行銷與業務","word":"voice","pos":"v.","meaning":"表達（意見、擔憂）","example":"Several employees voiced their concerns about the new attendance policy.","exampleZh":"幾位員工對新的出勤政策表達了他們的擔憂。","collocations":["voice concerns","voice an opinion","voice support"],"freq":"高頻","tip":"當動詞時是「說出來」，別跟名詞「聲音」搞混，考點常是詞性判斷。"},{"id":"x-v613","theme":"office","themeName":"辦公室與人資","word":"normal","pos":"adj.","meaning":"一般的、正常的","example":"Normal business hours will resume next Monday after the holiday.","exampleZh":"假期結束後，下週一將恢復正常營業時間。","collocations":["normal business hours","return to normal","normal procedure"],"freq":"極高頻","tip":"常見搭配 normal business hours（正常營業時間），閱讀題常考對比詞 abnormal/unusual。"},{"id":"x-v614","theme":"office","themeName":"辦公室與人資","word":"concern","pos":"n.","meaning":"關心、擔憂（的事）","example":"Management addressed employees' concerns during the town hall meeting.","exampleZh":"管理層在全員大會上回應了員工的擔憂。","collocations":["address a concern","raise a concern","main concern"],"freq":"極高頻","tip":"as far as ... be concerned（就…而言）是固定句型，也常考 concerned about 搭配 about。"},{"id":"x-v615","theme":"fin","themeName":"財務、採購與物流","word":"wear","pos":"n.","meaning":"磨損","example":"Regular inspections help detect wear on the factory's assembly line parts.","exampleZh":"定期檢查有助於發現工廠生產線零件的磨損。","collocations":["wear and tear","signs of wear","wear resistance"],"freq":"中頻","tip":"固定片語 wear and tear（正常耗損）常出現在保固條款中，動詞三態 wear-wore-worn 也常考。"},{"id":"x-v616","theme":"media","themeName":"媒體與活動","word":"circulate","pos":"v.","meaning":"使傳播、傳遞（資訊）","example":"Please circulate the meeting minutes to all department heads by Friday.","exampleZh":"請在週五前把會議記錄傳給所有部門主管。","collocations":["circulate a memo","circulate information","circulate widely"],"freq":"高頻","tip":"circle（圓圈）同源，想像資訊像圓圈般傳遞開來，常搭配 memo/report 等文件受詞。"},{"id":"x-v617","theme":"fin","themeName":"財務、採購與物流","word":"accidental","pos":"adj.","meaning":"意外的","example":"The insurance policy covers accidental damage to equipment during shipping.","exampleZh":"該保單涵蓋運送途中設備的意外損壞。","collocations":["accidental damage","accidental loss","purely accidental"],"freq":"中頻","tip":"名詞 accident 加 -al 變形容詞，保險與物流文件中常見 accidental damage/loss 搭配。"},{"id":"x-v618","theme":"fin","themeName":"財務、採購與物流","word":"withdraw","pos":"v.","meaning":"提領（錢）","example":"Customers can withdraw cash from any of our branch locations nationwide.","exampleZh":"顧客可以在全國任何一家分行提領現金。","collocations":["withdraw cash","withdraw funds","withdraw an application"],"freq":"高頻","tip":"三態 withdraw-withdrew-withdrawn；也可表示「撤回」申請或提案，注意語境判斷字義。"},{"id":"x-v619","theme":"fin","themeName":"財務、採購與物流","word":"breakage","pos":"n.","meaning":"破損","example":"The warehouse reported minimal breakage after switching to sturdier packaging.","exampleZh":"倉庫在改用更堅固的包裝後回報的破損率降到最低。","collocations":["report breakage","minimize breakage","breakage rate"],"freq":"中頻","tip":"break 加 -age 變名詞，物流業常搭配 minimize/reduce breakage 使用。"},{"id":"x-v620","theme":"fin","themeName":"財務、採購與物流","word":"remit","pos":"v.","meaning":"匯款","example":"Please remit payment within 30 days of receiving the invoice.","exampleZh":"請於收到發票後 30 天內匯款付清。","collocations":["remit payment","remit funds","remit by wire transfer"],"freq":"中頻","tip":"名詞 remittance（匯款）也常考，財務文件中 remit payment 是固定用法。"},{"id":"x-v621","theme":"fin","themeName":"財務、採購與物流","word":"uninterrupted","pos":"adj.","meaning":"不間斷的","example":"The backup generator ensures uninterrupted power supply during outages.","exampleZh":"備用發電機確保停電期間電力供應不中斷。","collocations":["uninterrupted power supply","uninterrupted service","uninterrupted flow"],"freq":"中頻","tip":"interrupt（中斷）加 un- 及 -ed，常見於「不斷電系統 UPS＝uninterrupted power supply」。"},{"id":"x-v622","theme":"office","themeName":"辦公室與人資","word":"in person","pos":"phr.","meaning":"親自","example":"New hires must submit identification documents in person at the HR office.","exampleZh":"新進員工必須親自到人資辦公室繳交身分證明文件。","collocations":["attend in person","apply in person","meet in person"],"freq":"高頻","tip":"與 in advance、on time 同類固定介系詞片語，常對比 online/by mail 等其他方式。"},{"id":"x-v623","theme":"office","themeName":"辦公室與人資","word":"potentially","pos":"adv.","meaning":"潛在地","example":"The merger could potentially double the company's market share within two years.","exampleZh":"這樁合併案可能在兩年內讓公司市佔率翻倍。","collocations":["potentially harmful","potentially increase","potentially affect"],"freq":"高頻","tip":"potential（潛在的）的副詞形式，常修飾未來可能發生的結果，語氣比 certainly 保守。"},{"id":"x-v624","theme":"office","themeName":"辦公室與人資","word":"set up","pos":"phr.","meaning":"建立","example":"IT will set up new laptops for all incoming employees before their first day.","exampleZh":"資訊部會在新員工到職前為他們設定好新筆電。","collocations":["set up a meeting","set up an account","set up equipment"],"freq":"極高頻","tip":"多益高頻片語動詞，也常變名詞 setup（架構、設定），注意連寫與分寫的詞性差異。"},{"id":"x-v625","theme":"office","themeName":"辦公室與人資","word":"own","pos":"v.","meaning":"擁有","example":"The firm owns three warehouses located near major shipping ports.","exampleZh":"該公司在主要港口附近擁有三座倉庫。","collocations":["own property","own shares","own outright"],"freq":"極高頻","tip":"當動詞是「擁有」，當形容詞則是「自己的」（my own idea），詞性判斷是常見考點。"},{"id":"x-v626","theme":"office","themeName":"辦公室與人資","word":"primary","pos":"adj.","meaning":"主要的","example":"Improving customer retention is the primary goal of this year's strategy.","exampleZh":"提升顧客回購率是今年策略的主要目標。","collocations":["primary goal","primary reason","primary concern"],"freq":"極高頻","tip":"近義字 main、principal、chief 可互換，副詞 primarily（主要地）也常考。"},{"id":"x-v627","theme":"office","themeName":"辦公室與人資","word":"CEO","pos":"n.","meaning":"執行長","example":"The CEO announced a new expansion plan at the annual shareholders meeting.","exampleZh":"執行長在年度股東大會上宣布了新的擴張計畫。","collocations":["newly appointed CEO","CEO of the company","CEO announced"],"freq":"極高頻","tip":"Chief Executive Officer 縮寫，同類詞還有 COO（營運長）、CFO（財務長），閱讀題常需辨識職稱。"},{"id":"x-v628","theme":"media","themeName":"媒體與活動","word":"disaster","pos":"n.","meaning":"災害","example":"The company set up a relief fund to help employees affected by the natural disaster.","exampleZh":"公司設立救助基金，協助受天然災害影響的員工。","collocations":["natural disaster","disaster relief","disaster recovery plan"],"freq":"中頻","tip":"常見搭配 disaster recovery plan（災難復原計畫），公司治理與IT文件中頻繁出現。"},{"id":"x-v629","theme":"office","themeName":"辦公室與人資","word":"COO","pos":"n.","meaning":"營運長","example":"The COO is responsible for overseeing daily operations across all branches.","exampleZh":"營運長負責督導所有分公司的日常營運。","collocations":["COO oversees","appointed as COO","COO's office"],"freq":"高頻","tip":"Chief Operating Officer 縮寫，記憶法：COO 管 Operating（營運），CFO 管 Financial（財務）。"},{"id":"x-v630","theme":"trv","themeName":"出差與旅遊","word":"reserve","pos":"v.","meaning":"保留、預訂","example":"We have reserved a conference room for the client presentation on Thursday.","exampleZh":"我們已經為週四的客戶簡報預訂了一間會議室。","collocations":["reserve a room","reserve a seat","reserve the right to"],"freq":"高頻","tip":"名詞 reservation（預訂）更常見於閱讀題；片語 reserve the right to（保留…的權利）常出現在合約中。"},{"id":"x-v631","theme":"office","themeName":"辦公室與人資","word":"deem","pos":"v.","meaning":"認為","example":"The committee deemed the proposal unsuitable for the current budget.","exampleZh":"委員會認為這項提案不適合目前的預算。","collocations":["deem it necessary","deem appropriate","deem unsuitable"],"freq":"中頻","tip":"正式用字，常接受詞補語如 deem sth (to be) + adj.，法規與正式信函中常見。"},{"id":"x-v632","theme":"office","themeName":"辦公室與人資","word":"urgent","pos":"adj.","meaning":"緊急的","example":"Please respond to this urgent request before the end of the business day.","exampleZh":"請在今日下班前回覆這項緊急請求。","collocations":["urgent request","urgent matter","urgently need"],"freq":"極高頻","tip":"副詞 urgently 常修飾 need/request，郵件主旨常見 URGENT 大寫標記。"},{"id":"x-v633","theme":"office","themeName":"辦公室與人資","word":"excessive","pos":"adj.","meaning":"過度的","example":"The audit flagged excessive spending in the marketing department's budget.","exampleZh":"稽核報告指出行銷部門預算有過度支出的情形。","collocations":["excessive spending","excessive amount","excessive noise"],"freq":"中頻","tip":"exceed（超出）同源，excessive 強調「超過合理範圍」，常與 spending/cost/noise 搭配。"},{"id":"x-v634","theme":"office","themeName":"辦公室與人資","word":"abusive","pos":"adj.","meaning":"濫用的、辱罵的","example":"The company has a zero-tolerance policy toward abusive behavior in the workplace.","exampleZh":"公司對職場中的辱罵行為採取零容忍政策。","collocations":["abusive behavior","abusive language","zero-tolerance for abusive"],"freq":"中頻","tip":"abuse（濫用、虐待）的形容詞，人資政策文件中常搭配 behavior/language。"},{"id":"x-v635","theme":"fin","themeName":"財務、採購與物流","word":"financial","pos":"adj.","meaning":"財務的","example":"The startup secured financial backing from three venture capital firms.","exampleZh":"這家新創公司獲得三家創投公司的財務支持。","collocations":["financial backing","financial statement","financial report"],"freq":"極高頻","tip":"financial statement/report（財務報表）是多益必考搭配，注意與 finance（名詞/動詞）區分詞性。"},{"id":"x-v636","theme":"fin","themeName":"財務、採購與物流","word":"shortage","pos":"n.","meaning":"短缺","example":"A shortage of raw materials has delayed production at the plant.","exampleZh":"原物料短缺已經延誤了工廠的生產進度。","collocations":["shortage of materials","staff shortage","face a shortage"],"freq":"高頻","tip":"short（不足）加 -age，常見搭配 labor/staff shortage（人力短缺），供應鏈類文章高頻字。"},{"id":"x-v637","theme":"biz","themeName":"會議、行銷與業務","word":"present","pos":"v.","meaning":"發表、呈現","example":"The sales team will present quarterly results to the board next week.","exampleZh":"業務團隊下週將向董事會發表季度業績報告。","collocations":["present findings","present a proposal","present to the board"],"freq":"極高頻","tip":"動詞重音在第二音節 preSENT，名詞/形容詞重音在第一音節 PREsent（禮物/目前的），發音是常考聽力點。"},{"id":"x-v638","theme":"office","themeName":"辦公室與人資","word":"alternative","pos":"n.","meaning":"替代方案","example":"The manager suggested remote work as an alternative to relocating the office.","exampleZh":"經理建議以遠距工作作為搬遷辦公室的替代方案。","collocations":["viable alternative","alternative to","as an alternative"],"freq":"高頻","tip":"常搭配介系詞 to（alternative to sth），形容詞用法 alternative solution 也常見。"},{"id":"x-v639","theme":"fin","themeName":"財務、採購與物流","word":"emission","pos":"n.","meaning":"（廢氣）排放","example":"The factory installed new filters to reduce carbon emissions significantly.","exampleZh":"工廠安裝了新的過濾裝置以大幅減少碳排放。","collocations":["carbon emissions","reduce emissions","emission standards"],"freq":"中頻","tip":"emit（排放）的名詞，環保法規類文章常見 carbon emissions/emission standards。"},{"id":"x-v640","theme":"pattern","themeName":"句型","word":"be estimated to do","pos":"句型","meaning":"預計會做…","example":"The new factory is estimated to increase production capacity by 30 percent.","exampleZh":"這座新工廠預計會將產能提高百分之三十。","collocations":["is estimated to reach","is estimated to grow","is estimated to cost"],"freq":"高頻","tip":"被動語態＋不定詞，主詞為「被估計的對象」；常與 be projected to、be expected to 互換，to 後一律接原形動詞。"},{"id":"x-v641","theme":"fin","themeName":"財務、採購與物流","word":"tool","pos":"n.","meaning":"工具","example":"Management adopted a new software tool to track inventory in real time.","exampleZh":"管理層採用一套新的軟體工具即時追蹤庫存。","collocations":["software tool","marketing tool","powerful tool"],"freq":"極高頻","tip":"常比喻用法，如 a tool for growth（成長的工具），不限實體器械，抽象名詞用法要注意。"},{"id":"x-v642","theme":"fin","themeName":"財務、採購與物流","word":"generate","pos":"v.","meaning":"產生","example":"The new product line is expected to generate significant revenue next quarter.","exampleZh":"新產品線預計將在下季度創造可觀的營收。","collocations":["generate revenue","generate interest","generate income"],"freq":"高頻","tip":"常搭配 revenue/income/profit 等財務名詞，名詞 generation 也可指「世代」，注意語境。"},{"id":"x-v643","theme":"fin","themeName":"財務、採購與物流","word":"electricity","pos":"n.","meaning":"電力","example":"The manufacturing plant uses solar panels to reduce its electricity costs.","exampleZh":"這座製造工廠使用太陽能板來降低電力成本。","collocations":["electricity costs","electricity supply","generate electricity"],"freq":"中頻","tip":"不可數名詞，常搭配 supply/cost/bill；形容詞 electric（電動的）與副詞 electrical（電子的）易混淆。"},{"id":"x-v644","theme":"fin","themeName":"財務、採購與物流","word":"detach","pos":"v.","meaning":"拆開","example":"Please detach the order confirmation slip before shipping the package.","exampleZh":"寄送包裹前請先撕下訂單確認聯。","collocations":["detach the form","detach the slip","easily detachable"],"freq":"中頻","tip":"attach（附上）的反義詞，形容詞 detachable（可拆卸的）常見於產品說明書。"},{"id":"x-v645","theme":"pattern","themeName":"句型","word":"be projected to","pos":"句型","meaning":"預計會做…","example":"Sales figures are projected to rise sharply during the holiday season.","exampleZh":"銷售數字預計在假期期間將大幅上升。","collocations":["is projected to increase","is projected to exceed","is projected to decline"],"freq":"高頻","tip":"與 be estimated to 幾乎同義可互換，project 當動詞時是「預測」，常出現在財報與市場分析文章。"},{"id":"x-v646","theme":"fin","themeName":"財務、採購與物流","word":"bottom","pos":"adj.","meaning":"底部的","example":"The bottom line of the report shows a 15 percent increase in net profit.","exampleZh":"報告的最下方數字顯示淨利成長了百分之十五。","collocations":["bottom line","bottom price","from the bottom up"],"freq":"中頻","tip":"財務慣用語 bottom line（損益表最後一行，引申為「最終結果／重點」），閱讀題常考此比喻義。"},{"id":"x-v647","theme":"fin","themeName":"財務、採購與物流","word":"supply","pos":"v.","meaning":"供應","example":"The vendor agreed to supply parts to the assembly plant on a weekly basis.","exampleZh":"供應商同意每週向組裝廠供應零件。","collocations":["supply parts","supply chain","in short supply"],"freq":"極高頻","tip":"supply chain（供應鏈）是多益必考複合名詞，in short supply（供不應求）也常出現。"},{"id":"x-v648","theme":"fin","themeName":"財務、採購與物流","word":"portion","pos":"n.","meaning":"部分","example":"A significant portion of the budget was allocated to employee training.","exampleZh":"預算中有很大一部分被分配給員工培訓。","collocations":["a portion of","allocate a portion","large portion"],"freq":"中頻","tip":"常搭配 a portion of + 名詞，同義字 part/share，正式書面用語比 part 更常見於財報。"},{"id":"x-v649","theme":"fin","themeName":"財務、採購與物流","word":"coastal","pos":"adj.","meaning":"海岸的","example":"The logistics company built a new distribution center near the coastal region.","exampleZh":"這家物流公司在沿海地區附近興建了一座新的配送中心。","collocations":["coastal region","coastal city","coastal area"],"freq":"中頻","tip":"coast（海岸）加 -al，物流與地產類文章常提及 coastal area 作為港口據點。"},{"id":"x-v650","theme":"biz","themeName":"會議、行銷與業務","word":"draw","pos":"n.","meaning":"抽獎","example":"Customers who register today will automatically be entered into the prize draw.","exampleZh":"今天註冊的顧客將自動被納入抽獎名單。","collocations":["prize draw","lucky draw","enter the draw"],"freq":"中頻","tip":"名詞作「抽獎」用，動詞 draw 則是「畫、抽（籤）、吸引」，常見片語 draw attention（吸引注意）。"},{"id":"x-v651","theme":"fin","themeName":"財務、採購與物流","word":"region","pos":"n.","meaning":"區域、地區","example":"Sales performance varies significantly across different regions of the country.","exampleZh":"銷售表現在該國不同區域之間有顯著差異。","collocations":["across the region","regional office","this region"],"freq":"極高頻","tip":"形容詞 regional（區域性的）常見於 regional manager/office，比 area 更強調行政或地理劃分。"},{"id":"x-v652","theme":"fin","themeName":"財務、採購與物流","word":"equipment","pos":"n.","meaning":"設備","example":"The factory invested in new equipment to improve manufacturing efficiency.","exampleZh":"工廠投資了新設備以提升製造效率。","collocations":["office equipment","safety equipment","upgrade equipment"],"freq":"極高頻","tip":"不可數名詞，不能加 s 也不能用 an，常見錯誤是誤加冠詞或複數，是文法考點。"},{"id":"x-v653","theme":"fin","themeName":"財務、採購與物流","word":"site","pos":"n.","meaning":"地點","example":"Construction on the new warehouse site is scheduled to begin next month.","exampleZh":"新倉庫用地的建設工程預計下個月開始。","collocations":["construction site","on site","job site"],"freq":"高頻","tip":"on site（現場）是常考片語，與 sight（視力）、cite（引用）為同音異義字，聽力易混淆。"},{"id":"x-v654","theme":"office","themeName":"辦公室與人資","word":"factor","pos":"n.","meaning":"因素","example":"Employee satisfaction is a key factor in reducing staff turnover.","exampleZh":"員工滿意度是降低離職率的關鍵因素。","collocations":["key factor","contributing factor","a factor in"],"freq":"高頻","tip":"常搭配 key/major/contributing 等形容詞，介系詞用 factor in（在…中的因素）。"},{"id":"x-v655","theme":"media","themeName":"媒體與活動","word":"criticize","pos":"v.","meaning":"批評","example":"The report criticized the company for failing to disclose the data breach promptly.","exampleZh":"這份報告批評該公司未能及時揭露資料外洩事件。","collocations":["criticize for","widely criticized","criticize openly"],"freq":"中頻","tip":"常接 for + 原因（criticize sb for doing sth），名詞 criticism、形容詞 critical 三態要能靈活轉換。"},{"id":"x-v656","theme":"media","themeName":"媒體與活動","word":"influence","pos":"n.","meaning":"影響","example":"Social media has a growing influence on how consumers choose products.","exampleZh":"社群媒體對消費者選擇產品的方式有越來越大的影響。","collocations":["have influence on","under the influence of","growing influence"],"freq":"高頻","tip":"介系詞固定用 influence on（對…的影響），動詞同形 influence sb/sth，注意詞性判斷考點。"},{"id":"x-v657","theme":"fin","themeName":"財務、採購與物流","word":"safety","pos":"n.","meaning":"安全","example":"All warehouse staff must complete safety training before operating machinery.","exampleZh":"所有倉庫員工必須先完成安全訓練才能操作機械。","collocations":["safety training","safety regulations","for safety reasons"],"freq":"極高頻","tip":"safety regulations/training 是製造業高頻搭配，形容詞是 safe，副詞是 safely，三者需分清詞性。"},{"id":"x-v658","theme":"fin","themeName":"財務、採購與物流","word":"value","pos":"n.","meaning":"價值","example":"The consultant helped the firm identify ways to increase customer value.","exampleZh":"顧問協助該公司找出提升顧客價值的方法。","collocations":["increase value","market value","value for money"],"freq":"極高頻","tip":"動詞用法 value sth（重視、評估價值）也常考，value for money（物超所值）是行銷常用語。"},{"id":"x-v659","theme":"fin","themeName":"財務、採購與物流","word":"destruction","pos":"n.","meaning":"破壞","example":"The storm caused widespread destruction to the company's coastal facilities.","exampleZh":"這場暴風雨對公司的沿海設施造成了大範圍的破壞。","collocations":["cause destruction","widespread destruction","destruction of property"],"freq":"中頻","tip":"動詞是 destroy，形容詞是 destructive，名詞字尾 -tion 常是多益詞性轉換考點。"},{"id":"x-v660","theme":"biz","themeName":"會議、行銷與業務","word":"retail","pos":"n.","meaning":"零售","example":"The company plans to expand its retail presence in major shopping districts.","exampleZh":"該公司計畫在主要商圈擴大零售據點。","collocations":["retail price","retail store","retail industry"],"freq":"高頻","tip":"對比字 wholesale（批發），retail price（零售價）常出現在價目表與廣告文宣中。"},{"id":"x-v661","theme":"est","themeName":"租賃與房產","word":"landscape","pos":"n.","meaning":"景觀、風景","example":"The new office building offers a stunning view of the surrounding landscape.","exampleZh":"這棟新辦公大樓可欣賞周圍壯麗的景觀。","collocations":["scenic landscape","business landscape","landscape design"],"freq":"中頻","tip":"也可比喻用法如 competitive landscape（競爭格局），商業文章中常見此引申義。"},{"id":"x-v662","theme":"office","themeName":"辦公室與人資","word":"improvement","pos":"n.","meaning":"改進、改善","example":"The team implemented several improvements to speed up the approval process.","exampleZh":"團隊實施了幾項改進措施，加快了核准流程。","collocations":["make improvements","significant improvement","room for improvement"],"freq":"高頻","tip":"動詞 improve，片語 room for improvement（尚有改進空間）是常見商務用語。"},{"id":"x-v663","theme":"fin","themeName":"財務、採購與物流","word":"unreliable","pos":"adj.","meaning":"無法信賴的","example":"The client switched suppliers after the previous one proved unreliable.","exampleZh":"由於前一家供應商證實不可靠，客戶因而更換了供應商。","collocations":["unreliable supplier","prove unreliable","unreliable data"],"freq":"中頻","tip":"reliable（可靠的）加 un-，反義詞對照考點，常搭配 supplier/source/data。"},{"id":"x-v664","theme":"office","themeName":"辦公室與人資","word":"unfortunate","pos":"adj.","meaning":"不幸的","example":"It was an unfortunate incident that led to the temporary closure of the office.","exampleZh":"那是一起導致辦公室暫時關閉的不幸事件。","collocations":["unfortunate incident","unfortunate circumstances","unfortunately"],"freq":"中頻","tip":"副詞 unfortunately 常置於句首當轉折語，用來引出負面消息，正式信函中常見。"},{"id":"x-v665","theme":"biz","themeName":"會議、行銷與業務","word":"point to","pos":"phr.","meaning":"指出…","example":"The latest survey results point to a growing demand for eco-friendly packaging.","exampleZh":"最新的調查結果指出，對環保包裝的需求正在增加。","collocations":["results point to","point to a trend","data points to"],"freq":"中頻","tip":"常用主詞為 data/results/survey 等非人稱主詞，同義片語 indicate/suggest 可互換。"},{"id":"x-v666","theme":"office","themeName":"辦公室與人資","word":"vote to do","pos":"phr.","meaning":"投票表決…","example":"The board voted to approve the merger during Tuesday's meeting.","exampleZh":"董事會在週二的會議中投票通過了這樁合併案。","collocations":["vote to approve","vote to postpone","vote in favor of"],"freq":"中頻","tip":"vote to + 原形動詞（表決去做…），另有 vote for/against（贊成/反對）與 vote in favor of。"},{"id":"x-v667","theme":"office","themeName":"辦公室與人資","word":"alleviate","pos":"v.","meaning":"減輕、減緩","example":"The new hires were brought in to alleviate the workload on the current staff.","exampleZh":"新進員工的加入是為了減輕現有員工的工作負擔。","collocations":["alleviate the burden","alleviate stress","alleviate pressure"],"freq":"中頻","tip":"正式用字，同義詞 ease/reduce，常搭配 burden/stress/pressure 等負面名詞。"},{"id":"x-v668","theme":"office","themeName":"辦公室與人資","word":"creation","pos":"n.","meaning":"創作、製作","example":"The marketing team is responsible for the creation of all promotional content.","exampleZh":"行銷團隊負責製作所有的宣傳內容。","collocations":["job creation","content creation","the creation of"],"freq":"中頻","tip":"動詞 create，job creation（創造就業機會）是經濟類文章常見複合詞。"},{"id":"x-v669","theme":"fin","themeName":"財務、採購與物流","word":"paralyze","pos":"v.","meaning":"使癱瘓","example":"A power outage paralyzed operations at the distribution center for several hours.","exampleZh":"一場停電讓配送中心的營運癱瘓了好幾個小時。","collocations":["paralyze operations","paralyze the system","completely paralyzed"],"freq":"中頻","tip":"常以被動式 be paralyzed by 出現，用來描述系統或營運遭重大事件癱瘓。"},{"id":"x-v670","theme":"office","themeName":"辦公室與人資","word":"continue to","pos":"phr.","meaning":"繼續做…（事情）","example":"The company will continue to invest in employee development programs next year.","exampleZh":"該公司明年將繼續投資於員工發展計畫。","collocations":["continue to grow","continue to provide","continue to support"],"freq":"極高頻","tip":"continue 可接 to V 或 V-ing，兩者皆可，是多益文法題常考的動詞接法彈性用字。"},{"id":"x-v671","theme":"office","themeName":"辦公室與人資","word":"switch to","pos":"phr.","meaning":"轉變為…","example":"The company decided to switch to a four-day workweek starting next quarter.","exampleZh":"該公司決定從下季度開始改為四天工作制。","collocations":["switch to a new system","switch to remote work","switch providers"],"freq":"高頻","tip":"switch to + 名詞/V-ing，表示從舊制度轉換到新制度，商業變革類文章常見。"},{"id":"x-v672","theme":"biz","themeName":"會議、行銷與業務","word":"target","pos":"v.","meaning":"對準、以…為目標","example":"The advertising campaign targets young professionals in urban areas.","exampleZh":"這個廣告活動的目標客群是都市地區的年輕專業人士。","collocations":["target customers","target audience","on target"],"freq":"高頻","tip":"target audience（目標客群）是行銷必考複合詞，名詞用法 sales target（銷售目標）也常見。"},{"id":"x-v673","theme":"office","themeName":"辦公室與人資","word":"related","pos":"adj.","meaning":"相關的","example":"Employees can submit work-related expenses for reimbursement each month.","exampleZh":"員工每個月都可以提交與工作相關的費用申請核銷。","collocations":["work-related","related to","closely related"],"freq":"高頻","tip":"常以複合詞出現如 work-related（與工作相關的），介系詞固定搭配 related to。"},{"id":"x-v674","theme":"office","themeName":"辦公室與人資","word":"be up to","pos":"phr.","meaning":"由…決定","example":"The final decision on the budget is up to the finance director.","exampleZh":"預算的最終決定權在財務總監身上。","collocations":["it's up to you","up to the manager","be up to par"],"freq":"中頻","tip":"be up to sb（由某人決定）與 be up to par（達到標準）意思不同，需依語境判斷。"},{"id":"x-v675","theme":"office","themeName":"辦公室與人資","word":"conduct","pos":"v.","meaning":"實施、執行","example":"The HR department will conduct a survey to assess employee satisfaction.","exampleZh":"人資部門將實施一項調查以評估員工滿意度。","collocations":["conduct a survey","conduct research","conduct an interview"],"freq":"極高頻","tip":"常搭配 survey/research/interview 等正式行動，名詞用法 conduct（行為舉止）發音重音不同。"},{"id":"x-v676","theme":"fin","themeName":"財務、採購與物流","word":"stuck","pos":"adj.","meaning":"卡住","example":"The shipment got stuck at customs due to incomplete paperwork.","exampleZh":"這批貨物因文件不齊全而卡在海關。","collocations":["get stuck","stuck at customs","stuck in traffic"],"freq":"中頻","tip":"get stuck（卡住、動彈不得）是口語化但多益也考的實用片語，常搭配地點。"},{"id":"x-v677","theme":"office","themeName":"辦公室與人資","word":"arrange","pos":"v.","meaning":"安排","example":"The assistant arranged a car to pick up the visiting clients from the airport.","exampleZh":"助理安排了一輛車到機場接送來訪的客戶。","collocations":["arrange a meeting","arrange transportation","make arrangements"],"freq":"極高頻","tip":"名詞 arrangement 常用複數 make arrangements for（為…做安排），是商務書信高頻用語。"},{"id":"x-v678","theme":"office","themeName":"辦公室與人資","word":"on the job","pos":"phr.","meaning":"工作中","example":"New employees receive on-the-job training during their first two weeks.","exampleZh":"新進員工在到職的前兩週會接受在職訓練。","collocations":["on-the-job training","injured on the job","learn on the job"],"freq":"中頻","tip":"on-the-job training（在職訓練）常以連字號複合形容詞出現在名詞前，注意拼寫形式。"},{"id":"x-v679","theme":"office","themeName":"辦公室與人資","word":"individual","pos":"n.","meaning":"個人","example":"The award recognizes an individual who has shown outstanding leadership.","exampleZh":"這個獎項表彰展現卓越領導力的個人。","collocations":["a talented individual","individual performance","as an individual"],"freq":"高頻","tip":"形容詞用法 individual performance（個人績效）也常見，注意與 person 語域不同，較正式。"},{"id":"x-v680","theme":"office","themeName":"辦公室與人資","word":"transfer","pos":"v.","meaning":"轉移、調動","example":"She requested to transfer to the Taipei branch for family reasons.","exampleZh":"她因家庭因素申請調動到台北分公司。","collocations":["transfer to","transfer funds","request a transfer"],"freq":"高頻","tip":"名詞同形 transfer 但重音在前，動詞重音在後（trans-FER），人事調動與匯款轉帳皆可用。"},{"id":"x-v681","theme":"office","themeName":"辦公室與人資","word":"retire","pos":"v.","meaning":"退休","example":"The founder plans to retire from the company at the end of this year.","exampleZh":"創辦人計畫在今年年底從公司退休。","collocations":["retire from","plan to retire","retire early"],"freq":"高頻","tip":"名詞 retirement（退休），常搭配 retirement party/plan，人事類文章高頻字。"},{"id":"x-v682","theme":"office","themeName":"辦公室與人資","word":"occur","pos":"v.","meaning":"發生","example":"Delays in shipment may occur due to unforeseen weather conditions.","exampleZh":"因無法預見的天氣狀況，出貨可能會發生延誤。","collocations":["occur due to","commonly occur","occur frequently"],"freq":"高頻","tip":"三態 occur-occurred-occurred（重複子音），名詞 occurrence 拼字常考，注意雙 r 雙 c。"},{"id":"x-v683","theme":"office","themeName":"辦公室與人資","word":"consider","pos":"v.","meaning":"考慮","example":"The board will consider several candidates for the vacant position.","exampleZh":"董事會將考慮數位候選人來填補這個空缺職位。","collocations":["consider a proposal","take into consideration","under consideration"],"freq":"極高頻","tip":"consider + V-ing（不接 to V），是多益文法必考動詞接法；名詞片語 take sth into consideration。"},{"id":"x-v684","theme":"fin","themeName":"財務、採購與物流","word":"invest in","pos":"phr.","meaning":"投資於…","example":"The company plans to invest in renewable energy technology next fiscal year.","exampleZh":"該公司計畫在下個會計年度投資再生能源技術。","collocations":["invest in technology","invest heavily","return on investment"],"freq":"高頻","tip":"名詞 investment，固定搭配 return on investment（投資報酬率，縮寫 ROI）財經文章常見。"},{"id":"x-v685","theme":"fin","themeName":"財務、採購與物流","word":"remuneration","pos":"n.","meaning":"薪酬、報酬","example":"The remuneration package includes a base salary plus performance bonuses.","exampleZh":"這份薪酬方案包含基本薪資加上績效獎金。","collocations":["remuneration package","fair remuneration","annual remuneration"],"freq":"中頻","tip":"正式用字，同義於 compensation/pay，常見於招募文件的 remuneration package（薪酬方案）。"},{"id":"x-v686","theme":"fin","themeName":"財務、採購與物流","word":"reliable","pos":"adj.","meaning":"可靠的","example":"The firm chose the supplier known for reliable on-time delivery.","exampleZh":"該公司選擇了以準時可靠出貨聞名的供應商。","collocations":["reliable supplier","reliable source","highly reliable"],"freq":"高頻","tip":"反義詞 unreliable，常搭配 supplier/source/service，副詞 reliably 也常考。"},{"id":"x-v687","theme":"office","themeName":"辦公室與人資","word":"dismiss","pos":"v.","meaning":"解雇","example":"The manager was dismissed following the internal investigation's findings.","exampleZh":"這位經理在內部調查結果出爐後遭到解雇。","collocations":["dismiss an employee","dismiss a claim","wrongful dismissal"],"freq":"中頻","tip":"名詞 dismissal，常搭配 wrongful dismissal（不當解雇），也可指「駁回（主張）」。"},{"id":"x-v688","theme":"fin","themeName":"財務、採購與物流","word":"fixed","pos":"adj.","meaning":"固定的","example":"Employees on a fixed salary do not receive overtime pay.","exampleZh":"領固定薪資的員工不會領取加班費。","collocations":["fixed salary","fixed rate","fixed cost"],"freq":"高頻","tip":"fixed cost（固定成本）與 variable cost（變動成本）是財會對比概念，常出現在圖表題。"},{"id":"x-v689","theme":"pattern","themeName":"句型","word":"prevent A from doing","pos":"句型","meaning":"阻止A去做…","example":"The new security system prevents unauthorized visitors from entering the building.","exampleZh":"這套新的安全系統阻止未經授權的訪客進入大樓。","collocations":["prevent accidents from happening","prevent losses from occurring","prevent delays from"],"freq":"高頻","tip":"from 後面固定接動名詞（doing），常見誤用是接原形動詞，被動式 be prevented from doing 也常考。"},{"id":"x-v690","theme":"office","themeName":"辦公室與人資","word":"initial","pos":"adj.","meaning":"剛開始的","example":"The initial phase of the project focuses on market research.","exampleZh":"這個專案的初期階段著重於市場調查。","collocations":["initial phase","initial cost","initial reaction"],"freq":"高頻","tip":"副詞 initially（起初），常出現在敘述時間順序的文章開頭，對比 later/eventually。"},{"id":"x-v691","theme":"fin","themeName":"財務、採購與物流","word":"foreman","pos":"n.","meaning":"領班","example":"The foreman inspected the assembly line before the morning shift began.","exampleZh":"領班在早班開始前檢查了裝配線。","collocations":["site foreman","construction foreman","foreman's report"],"freq":"中頻","tip":"複數為 foremen（不規則變化），製造業與工地現場常見的基層管理職稱。"},{"id":"x-v692","theme":"office","themeName":"辦公室與人資","word":"alert","pos":"v.","meaning":"使警覺、通知","example":"The system automatically alerts staff when inventory levels run low.","exampleZh":"當庫存量偏低時，系統會自動通知員工。","collocations":["alert staff","send an alert","alert sb to sth"],"freq":"高頻","tip":"alert sb to sth（提醒某人注意某事），名詞用法如 email alert（電子郵件通知）也很常見。"},{"id":"x-v693","theme":"svc","themeName":"客服與售後","word":"guarantee","pos":"n.","meaning":"保證","example":"The product comes with a two-year guarantee against manufacturing defects.","exampleZh":"這項產品附有兩年的製造瑕疵保固。","collocations":["money-back guarantee","two-year guarantee","guarantee against"],"freq":"高頻","tip":"與 warranty（保固）意思相近可互換，動詞同形 guarantee sth（保證），售後服務文件常用字。"},{"id":"x-v694","theme":"fin","themeName":"財務、採購與物流","word":"a bundle of","pos":"phr.","meaning":"一捆…","example":"The warehouse worker stacked a bundle of cables onto the delivery cart.","exampleZh":"倉庫工人把一捆電纜堆到送貨推車上。","collocations":["a bundle of cables","a bundle of documents","bundle together"],"freq":"中頻","tip":"bundle 也可當動詞（捆綁、包裝銷售），行銷用語 bundle products（產品組合銷售）也常見。"},{"id":"x-v695","theme":"office","themeName":"辦公室與人資","word":"at regular interval","pos":"phr.","meaning":"每隔一定期間","example":"Fire drills are conducted at regular intervals to ensure staff preparedness.","exampleZh":"消防演習每隔一定期間就會舉行，以確保員工做好準備。","collocations":["at regular intervals","check at intervals","interval of time"],"freq":"中頻","tip":"常用複數形 at regular intervals，指「有規律地每隔一段時間」，安全與維護類文章常見。"},{"id":"x-v696","theme":"office","themeName":"辦公室與人資","word":"at this point","pos":"phr.","meaning":"到這個時候","example":"At this point, the negotiations have not yet reached a final agreement.","exampleZh":"到目前為止，談判尚未達成最終協議。","collocations":["at this point in time","at this stage","up to this point"],"freq":"中頻","tip":"與 at this stage 同義，常用於報告或會議中表達「目前為止的現況」。"},{"id":"x-v697","theme":"office","themeName":"辦公室與人資","word":"sue","pos":"v.","meaning":"控告、提出訴訟","example":"The former employee decided to sue the company for wrongful termination.","exampleZh":"這位前員工決定就不當解雇一事對公司提出訴訟。","collocations":["sue for","sue the company","threaten to sue"],"freq":"中頻","tip":"sue sb for sth（因某事控告某人），法律糾紛類文章常搭配 wrongful termination/dismissal。"},{"id":"x-v698","theme":"fin","themeName":"財務、採購與物流","word":"premium","pos":"n.","meaning":"津貼、保費","example":"Employees who choose the enhanced plan pay a slightly higher premium.","exampleZh":"選擇升級方案的員工需支付稍高的保費。","collocations":["insurance premium","pay a premium","premium rate"],"freq":"高頻","tip":"保險常用字，也可形容詞化如 premium service（頂級服務），注意語境判斷詞性與字義。"},{"id":"x-v699","theme":"office","themeName":"辦公室與人資","word":"wrongful","pos":"adj.","meaning":"不當的","example":"The lawsuit alleges wrongful termination based on the employee's age.","exampleZh":"這起訴訟指控該公司因員工年齡而不當解雇。","collocations":["wrongful termination","wrongful dismissal","wrongful conduct"],"freq":"中頻","tip":"幾乎只搭配法律用語 termination/dismissal，law 相關字尾 -ful 表「帶有…性質的」。"},{"id":"x-v700","theme":"office","themeName":"辦公室與人資","word":"term","pos":"n.","meaning":"期限、條款","example":"Both parties must agree to the terms outlined in the contract.","exampleZh":"雙方都必須同意合約中列出的條款。","collocations":["terms and conditions","term of office","in terms of"],"freq":"極高頻","tip":"terms and conditions（條款與細則）是合約必見詞組；in terms of（就…而言）也是高頻轉折片語。"},{"id":"x-v701","theme":"office","themeName":"辦公室與人資","word":"case","pos":"n.","meaning":"（訴訟）案件、官司","example":"The lawyer reviewed the case before recommending a settlement.","exampleZh":"律師在建議和解之前先審閱了這起案件。","collocations":["legal case","in that case","case study"],"freq":"高頻","tip":"in case（以防萬一）與 in that case（那樣的話）是常考連接語，注意跟「案件」字義區分。"},{"id":"x-v702","theme":"pattern","themeName":"句型","word":"be satisfied with","pos":"句型","meaning":"對…感到滿意","example":"Most customers reported being satisfied with the speed of the delivery service.","exampleZh":"大多數顧客表示對送貨服務的速度感到滿意。","collocations":["fully satisfied with","satisfied with the outcome","customer satisfaction"],"freq":"高頻","tip":"be satisfied with + N/V-ing，過去分詞當形容詞用；名詞 satisfaction 常見於顧客調查類文章。"},{"id":"x-v703","theme":"fin","themeName":"財務、採購與物流","word":"charge for","pos":"phr.","meaning":"為…收費","example":"The hotel charges an extra fee for early check-in requests.","exampleZh":"飯店對提早入住的要求會額外收費。","collocations":["charge a fee for","free of charge","charge extra"],"freq":"高頻","tip":"free of charge（免費）是固定片語，charge sb for sth（向某人收取某費用）常出現在帳單類文章。"},{"id":"x-v704","theme":"office","themeName":"辦公室與人資","word":"go through","pos":"phr.","meaning":"進行（程序）、經歷","example":"All new applicants must go through a background check before hiring.","exampleZh":"所有新申請人在錄用前都必須經過背景調查。","collocations":["go through a process","go through training","go through the details"],"freq":"高頻","tip":"go through 也可指「仔細檢查」文件細節，是多益閱讀常見的動詞片語，語意隨受詞變化。"},{"id":"x-v705","theme":"med","themeName":"醫療與保健","word":"injure","pos":"v.","meaning":"使受傷","example":"A worker was injured on the factory floor due to faulty equipment.","exampleZh":"一名員工因設備故障而在工廠現場受傷。","collocations":["injure sb","get injured","injured worker"],"freq":"中頻","tip":"名詞 injury（傷害），常以被動式 be injured 出現，職業安全類文章高頻字。"},{"id":"x-v706","theme":"office","themeName":"辦公室與人資","word":"support","pos":"v.","meaning":"支持","example":"The IT team provides technical support to employees around the clock.","exampleZh":"資訊團隊全天候為員工提供技術支援。","collocations":["technical support","support staff","support a decision"],"freq":"極高頻","tip":"technical support（技術支援）與 customer support（客服）是複合名詞高頻搭配。"},{"id":"x-v707","theme":"pattern","themeName":"句型","word":"catch A's eye","pos":"句型","meaning":"吸引A的目光","example":"The bold new packaging design is sure to catch shoppers' eyes on store shelves.","exampleZh":"這個大膽的新包裝設計必定能在貨架上吸引顧客的目光。","collocations":["catch the eye of","catch sb's attention","eye-catching design"],"freq":"中頻","tip":"常見變化為形容詞 eye-catching（吸睛的），行銷與產品設計類文章常用此意象表達「引人注目」。"},{"id":"x-v708","theme":"office","themeName":"辦公室與人資","word":"take advantage of","pos":"phr.","meaning":"利用","example":"Employees are encouraged to take advantage of the free training courses offered.","exampleZh":"公司鼓勵員工善用所提供的免費培訓課程。","collocations":["take full advantage of","take advantage of an opportunity","have an advantage"],"freq":"高頻","tip":"常搭配 opportunity/offer/discount 等正面名詞，也可表「佔…便宜」，依語境判斷褒貶。"},{"id":"x-v709","theme":"office","themeName":"辦公室與人資","word":"existing","pos":"adj.","meaning":"現有的、存在的","example":"The update is compatible with all existing versions of the software.","exampleZh":"這次更新與所有現有版本的軟體皆相容。","collocations":["existing customers","existing system","existing policy"],"freq":"高頻","tip":"exist（存在）的現在分詞轉形容詞，常對比 new（新的），修飾 customer/system/policy 等名詞。"},{"id":"x-v710","theme":"office","themeName":"辦公室與人資","word":"look forward to","pos":"phr.","meaning":"期待做…","example":"We look forward to welcoming you at our upcoming annual conference.","exampleZh":"我們期待在即將到來的年度大會上歡迎您的到來。","collocations":["look forward to hearing from you","look forward to meeting","look forward to working with"],"freq":"極高頻","tip":"to 為介系詞，後面固定接動名詞（V-ing），常見於商務書信結尾，誤用原形動詞是常見錯誤。"},{"id":"x-v711","theme":"office","themeName":"辦公室與人資","word":"advantage","pos":"n.","meaning":"優點","example":"One major advantage of the new system is its ease of use.","exampleZh":"新系統的一大優點就是使用簡便。","collocations":["advantage of","competitive advantage","have an advantage over"],"freq":"高頻","tip":"competitive advantage（競爭優勢）是商業策略類文章常見複合詞，反義詞 disadvantage。"},{"id":"x-v712","theme":"media","themeName":"媒體與活動","word":"celebrate","pos":"v.","meaning":"慶祝","example":"The company held a banquet to celebrate its twentieth anniversary.","exampleZh":"公司舉辦了一場宴會來慶祝二十週年。","collocations":["celebrate an anniversary","celebrate the achievement","celebrate together"],"freq":"高頻","tip":"名詞 celebration，常搭配 anniversary/achievement/milestone 等值得慶祝的事件。"},{"id":"x-v713","theme":"office","themeName":"辦公室與人資","word":"undergraduate degree","pos":"n.","meaning":"學士學位","example":"Applicants must hold an undergraduate degree in a related field.","exampleZh":"應徵者必須擁有相關領域的學士學位。","collocations":["hold an undergraduate degree","undergraduate program","undergraduate studies"],"freq":"中頻","tip":"與 bachelor's degree 同義可互換，常見於徵才啟事的學歷要求段落。"},{"id":"x-v714","theme":"office","themeName":"辦公室與人資","word":"occasional","pos":"adj.","meaning":"偶爾的","example":"The role requires occasional travel to overseas branch offices.","exampleZh":"這個職位需要偶爾出差到海外分公司。","collocations":["occasional travel","occasional visits","on an occasional basis"],"freq":"中頻","tip":"副詞 occasionally（偶爾地），常出現在職缺說明中描述出差頻率，語氣比 frequently 少。"},{"id":"x-v715","theme":"office","themeName":"辦公室與人資","word":"accomplishment","pos":"n.","meaning":"成就","example":"Her promotion was recognized as a major accomplishment by the entire team.","exampleZh":"她的升遷被整個團隊視為一項重大的成就。","collocations":["major accomplishment","proud accomplishment","list of acco
